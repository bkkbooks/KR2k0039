body:
  text: 錢法制式回部舊屬準噶爾所用普爾錢文質以紅銅為之制小而厚形圓撱而首微鋭中無方孔當策妄阿喇布坦時面鑄其形背附回字噶爾丹策凌嗣立即易名更制乾隆二十四年西域底定更鑄錢文初仍舊式後改如內地面鐫乾隆通寶漢字而以設局地名附于背如鑄局在葉爾羌者書葉爾羌字在阿克蘇者書阿克蘇字在烏什者書烏什字在伊犂者書伊犂字初鑄時每一普爾重二錢乾隆三十六年更定每一普爾重一錢五分三十九年更定每一普爾重一錢二分按漢武帝時公卿請令鑄官錢赤仄一以當五官用非赤仄不得行如淳注謂以赤銅為其郛也今回部錢用紅銅即古赤仄之意但漢則祗以赤銅為郛回錢則全用赤銅為少異耳錢有兩面漢五銖錢及唐宋各年號錢皆一面有字一面無字有字者謂之面亦謂之文無字者謂之漫亦謂之幕以其平漫而無文也其時西域之錢則兩面俱有文或作人馬之形或作王與夫人之面視今回部錢文又復有異我朝錢式於面冠以年號於幕舊用清漢文附省名今回部既入版圖從各省之例附彼處城名于其幕而正面遵用天朝年號以彰同文之治幕文兼用回字者從其俗也爐局葉爾羌於乾隆二十五年設局以軍營備帶餘銅鑄錢五十餘萬易回部舊錢銷燬更鑄新錢初議得新錢十萬騰格即停鑄二十六年以舊錢查收未竣酌增卯限至三十二年奏停俟後積有舊普爾再為銷鑄三十三年續收舊錢二百六十餘騰格加至一次三十四年於烏什阿克蘇撥銅三千斤交葉爾羌鼓鑄尋議停阿克蘇於乾隆二十六年設局以各城回民交納額銅本城伯克交納貢銅及官採銅斤開鑄至三十年移設烏什其阿克蘇爐局議停烏什於乾隆三十一年設局開鑄如阿克蘇例伊犂於乾隆四十年設局由烏什解銅三千斤又阿克蘇喀什噶爾哈喇沙爾等城以餘糧折銅二千三百四十餘斤共五千四百餘斤開鑄為例名數回人稱錢為雅爾瑪克以一錢為一普爾普爾為言文也每一普爾直銀一分初以五十普爾為一騰格後定以百普爾為一騰格直銀一兩回語謂一曰必爾二曰伊奇三曰玉聚四曰托爾托五曰别實六曰阿勒題七曰葉題八曰薩奇資九曰托科資十曰溫百曰玉資千曰明萬曰圖璊回語謂溫圖璊蓋十萬騰格也按漢時銀八兩直錢一千緣當時銀賤錢貴之故今回部錢文初以五十普爾為一騰格直銀一兩則千錢直銀二十兩視漢時之錢約更貴倍有半矣入版圖後價就平減近以百錢直一兩則聖朝休養有方泉貝流通充溢之概略可想見云行使葉爾羌開鑄之始令民以舊普爾易新錢應用舊普爾盡後以銀易錢自爐局移安烏什後其錢文由烏什按照解撥葉爾羌之銅三千斤鑄就錢文解送葉爾羌備用阿克蘇烏什先後開鑄其錢文以六分散給納銅回民四分存官搭放兵餉又於回民六分錢內抽回十分之二添備支餉之用其貢銅及官採銅斤所鑄錢文全支兵餉庫車沙雅爾喀什噶爾哈喇沙爾諸城每嵗專遣伯克解交納額徵斤詳見貢賦到局即領回錢文分别散給回民搭支兵餉如例其不徵額銅處所亦得次第流通利民日用按準噶爾部舊徵回部普爾即以回部所輸普爾錢文資用凡台吉新立則於錢面易名改鑄其法先鑄新錢一萬換易舊錢新者以一當二旋換旋鑄舊錢銷盡乃已我朝于新疆入版圖後葉爾羌開鑄伊始因其舊俗以新錢一易舊普爾二乾隆二十六年三月奉上諭回民交納舊普爾兑換新錢原為流通新錢之地換收回民舊普爾宜視其力量辦理况交舊普爾二枚換給新錢一文以來已二三載矣諒收舊鑄新已可足用若仍如前例以一易二回民力恐難支于伊等生計無益嗣後著加恩以普爾一枚換給新錢一文庶民力可紓而普爾亦得收獲著曉諭回民等咸知朕意大哉王言誠保民如赤中外一體之至計也和通黔庶感沐皇仁謳歌樂利之長永享圜緍之澤豈不休哉至各回城額徵紅銅鉛斤詳貢賦門兹不復載御製命儒臣排次回部錢文及所有古銅錢因題以句庚辰天佑西師蕆大功勞徠泉府貴流通形猶騰格因其俗寶鑄乾隆奉我同回城既定部人以騰格輸賦將軍等請仍其舊式惟于陽面加鑄乾隆通寶以行又驛致回中所有古錢蓋古時妻主輸繒所致因命儒臣排次之景德開元溯所有和親互市鑑于中篋藏詎詡聲靈鬯垂德懷柔慎自躬御製駐劄葉爾羌大臣呈覽所鑄乾隆通寶至因用排次回部錢文詩韻紀事庚辰昨嵗元戎奏定功早籌鼓鑄市鄽通即看大冶範鎔就仍屬司農職掌同將軍兆惠歸為戶部尚書寶是乾隆來自外錢殊景德去由中排次回部古錢時有開元景德諸錢彼時未能臣服其地自屬中國擕往者用權子母底其貢載戢干戈省厥躬按周官太宰以九府斂財賄注云財錢穀也又云賦口率出錢也漢律有口算人出百二十錢然第施之丁男而已唐定兩稅法始以錢為惟正之供宋因之元代用鈔惟武宗時嘗一鑄錢未幾即罷故其時課入及俸給皆用銀明洪武間詔嵗解稅課錢鈔道里險逺者許易銀以進正統後遂專用白金今回部以騰格輸稅蓋尚沿唐宋之舊也開元景德古錢流傳當唐元宗宋真宗時以和親互市羈縻異域偶自中土攜往留貽至今實無當于大同之治也若乃採精良于絶徼仿鎔範于中朝既發新型兼排古制我皇上前民利用之至意與懷柔載戢之深恩並垂千古矣漢書西域傳罽賔以金銀為錢文為騎馬幕為人面烏弋山離錢貨之屬與罽賔同其錢獨文為人面幕為騎馬安息亦以銀為錢文獨為王面幕為夫人面王死乃輒更鑄後漢書西域傳大秦以金銀為錢銀錢十當金錢一鄰國使到其界首者乘驛詣王給以金錢唐書西域傳泥婆羅鑄銅為錢面文人形背牛馬形文獻通考三童常貨多用蕉越犀象作金幣文效王之面亦效王后之面軒渠幣貨同三童阿鈎羌市用錢為貨利得國市易用銅錢有文漫圓徑如中國之制但實其中心不貫穿耳明史西域傳巴什伯里舊作别失八里今改正交易用銀錢大小三等不禁私鑄惟輸稅于酋長用印記無印記者禁不用奇爾穆爾舊作乞力麻兒今改正交易用鐵錢按西域諸國錢幣多用金銀間有用鐵者惟泥婆羅利得則以銅為之但中無穿孔猶是金銀為錢之式今回部錢文即其遺式第不用金銀耳至如史書所紀大秦三童軒渠諸國或不盡屬今之西域而其鑄錢之法有可稽者爰為附見於此欽定皇輿西域圖志卷三十五欽定四庫全書欽定皇輿西域圖志卷三十五
