  text: 欽定四庫全書欽定皇輿西域圖志卷三目録
  hash: sha256:d8ba97269ebf69723f09eb08862c9a9ff6841019f209c9979d6ee1832e3b5d2a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0039_WYG_003-1a, image: WYG0500/WYG0500-0088a.png}
body:
  text: 圖考三厯代西域圖前漢後漢三國晉北魏周隋唐五代宋元明欽定皇輿西域圖志卷三目録厯代西域圖説厯代史傳考西域者莫詳於漢唐而道里逺近則班傳尤備東自玉門西訖蔥嶺天山南北諸國方位較然三國以還雖諸部强弱分併不一而疆圉之廣狹可推若其山水形勢則古今莫之能易也兹繪厯代西域圖其周袤大概以皇輿西域為準自兩漢以下得圖共十有二定其山川方位次其列國相距道里率權輿漢書及厯代正史雖沿革靡常而崖略可睹此二萬餘里中考諸前代多有風教不通之境雖漢唐之經營開置而或僅遣使一至或但遙設州府其間時絶時通總不入幅隕之内爰摭前史統論西域之大略附諸篇末以資考證云史記大宛傳張騫使月氐經匈奴身所至者大宛大月氐大夏康居而傳聞其旁大國五六具為天子言之是後天子數問騫大夏之屬以騫為中郎將使烏孫分遣副使使大宛康居大月氐大夏安息身毒於窴及諸旁國騫還烏孫乃益重漢其後嵗餘騫所遣使通大夏之屬者皆頗與其人俱來於是西北國始通於漢矣杜佑通典自張騫開西域之迹其後霍去病擊破匈奴右地降渾邪休屠王遂空其地始築令居以西初置酒泉郡後稍發徙人充實之分置武威張掖燉煌列四郡據兩闗焉自李廣利伐大宛之後西域震懼多遣使來貢獻于是東自燉煌西至鹽澤往往起亭障征和中搜粟都尉桑𢎞羊與丞相御史奏言故輪臺以東捷枝渠黎皆故國地廣饒水草有溉田五千頃以上處溫和田美可益通溝渠種五穀與中國同時熟田一嵗有積穀募民壯健有累重敢徙者詣田所就畜積為本業益墾溉田稍築列亭連城而西以威西國詔不行昭帝時用桑𢎞羊前議以給使外國者至宣帝遣衛司馬使䕶鄯善以西數國破姑師分以為車師前後王及山北六國時漢獨䕶南道未能盡并北道也神雀三年匈奴日逐王來降䕶鄯善以西使者鄭吉迎之乃因使求并䕶北道故號曰都䕶于是徙屯田于北胥鞬都䕶督察烏孫康居諸外國理烏壘城於西域為中故治焉至元帝復戊巳二校尉屯田車師前王庭哀平間自相分割為五十五國凡國自侯王將相以下佩漢印綬凡三百七十六人而康居大月氐安息罽賓烏弋之屬皆以絶逺不在數中其來貢獻則與相報不督録總領也至王莽時四邊擾亂與中國遂絶並復役屬匈奴後漢永平中匈奴乃脇諸國共冦河西郡縣明帝命將北征匈奴取伊吾盧地置宜禾都尉以屯田遂通西域于闐諸國西域自絶六十五載乃復通焉明年始復置都䕶戊巳校尉章帝時焉耆龜兹攻没都䕶陳睦匈奴車師圍戊巳校尉乃迎還校尉不復遣都䕶罷屯田匈奴因遣兵守伊吾地時軍司馬班超留于闐綏集諸國和帝永元初竇憲大破匈奴因遣副校尉閻槃擊伊吾破之三年班超遂定西域因以超為都䕶居龜兹復置戊巳校尉於是五十餘國悉納質内屬其條支安息諸國至於海濱四萬里外皆重譯貢獻九年班超遣掾甘英窮臨西海而還安帝初西域背叛頻攻圍都䕶任尚段禧等遂罷都䕶棄西域北匈奴即復收屬諸國共為邊寇十餘載元初中置䕶西域副校尉居燉煌羈縻而已其後匈奴連與車師入冦河西漢不能禁延光二年以班超子勇為西域長史將五百人西屯栁中勇遂破平車師自建武至于延光西域三絶復通順帝永建二年勇復擊降焉耆于是龜兹疎勒于闐莎車等十七國皆來服從而烏孫蔥嶺以西遂絶六年帝以伊吾舊膏腴之地復令開設屯田如永元時事置伊吾司馬一人陽嘉以後朝威稍損諸國驕放轉相陵伐自魏及晉中原多故西域朝貢不過三數國焉至後魏太武帝使董琬使西域於是貢獻者十有六國隋煬帝時遣侍御史韋節司隷從事杜行滿使于西蕃諸國復令裴矩于武威張掖間往來以引致之皆啗以厚利轉相諷諭大業中來朝者三十餘國帝因置西戎校尉以應接之伊吾車師為西域門户漢常與匈奴争其地以制西域至隋伊吾有商胡雜居勝兵千餘人附于鐵勒人甚驕悍厥田良沃隋末内屬置伊吾郡後又臣突厥按通典西戎總敘上自西漢下逮唐初頗稱賅備文獻通考因之未經續輯今録本文至隋止其自唐迄明根據史傳補撰事蹟列於左方唐興突厥强盛西域諸國多役屬武徳中來朝貢者高昌龜兹等十數國貞觀四年太宗擒突厥頡利伊吾城長舉七城以獻以其地為西伊州九年疏勒内附置疏勒都督府髙昌王麴文泰與西突厥通共擊伊吾壅掠朝使又與西突厥乙毘設破焉耆三城十三年乃拜侯君集為交河道大總管討之十四年文泰子智盛降遂俘以歸披其地皆為州縣號西昌州尋改西州更置安西都䕶府初文泰厚結西突厥欲谷設約有急為表裏髙昌平欲谷設亦來降以其地為庭州後置北庭大都䕶府君集之討髙昌也遣使與焉耆相聞其王龍突騎支引兵佐唐後與西突厥相約為輔車勢不朝貢十八年命安西都䕶郭孝恪為西州道總管伐焉耆執突騎支歸更立其弟粟婆準而從兄薛婆阿那支自為王號瞎千執粟婆準獻龜兹龜兹殺之是時龜兹王訶黎布失畢方臣西突厥先嘗遣兵與焉耆影援拒郭孝恪兵頗貳於唐帝怒其佐焉耆叛而擅殺粟婆準也二十一年以阿史那社爾為崑邱道大總管討龜兹焉耆王阿那支佐龜兹社尒禽斬以徇復立突騎支弟婆伽利為王以其地為焉耆都督府社尒進攻龜兹二十三年俘龜兹王及其相那利將羯獵顛西域震懼于闐王伏屠信亦入朝社尒立龜兹王弟葉䕶王其國始徙安西都䕶于其都統于闐碎葉疏勒號四鎮髙宗立復封訶黎布失畢為龜兹王與那利羯獵顛歸國後王來朝還羯獵顛拒不納遣使降賀魯詔左屯衛大將軍楊胄發兵禽羯獵顛以其地為龜兹都督府尋徙安西都䕶府于其國以故安西為西州都督府時顯慶三年也初太宗立西突厥利邲咄陸可汗其族人步真率處月等入朝步真之弟彌射亦歸國其留者咄陸以賀魯統之及賀魯降置瑤池都督府永徽初賀魯反冦庭州廢瑤池都督府即處月地置金滿沙陀二州皆領都督顯慶二年伊麗道行軍大總管蘇定方討禽賀魯裂其地為州縣以處諸部於是西域平詔許敬宗與史官譔西域圖志龍朔元年西域遣使内屬乃分置十六都督府於吐火羅國所治遏換城置月氐都督府以其王葉䕶之部内分置二十四州都督統之咸亨元年吐蕃入殘羈縻十八州安西四鎮並廢詔右衛威大將軍薛仁貴為邏娑道大總管討吐蕃敗績上元初于闐國王來朝擊吐蕃有功帝以其地為毘沙都督府長夀元年武威道總管王孝傑破吐蕃復四鎮置安西都䕶府于龜兹以兵鎮守元宗開元中安西節度使湯嘉惠表以焉耆備四鎮詔馬耆龜兹疏勒于闐征西域賈各食其征由北道者輪臺征之時小勃律王沒謹忙迫吐蕃數為所困吐蕃曰我非謀爾國假道攻四鎮爾北庭節度使張孝嵩救之大破吐蕃沒謹忙三傳至蘇失利之為吐蕃隂誘妻以女故西北二十餘國皆臣吐蕃貢獻不入安西都䕶三討之無功天寶六載詔副都䕶髙仙芝伐之吐蕃不能救遂平其國於是西域諸胡七十二國皆震恐歸附以小勃律國置歸仁軍十載仙芝劾石國王無蕃臣禮請率兵討王約降仙芝遣使者䕶送俘斬闕下西域咸怨王子走大食乞兵攻怛羅斯城敗仙芝軍自是臣大食初諸蕃内屬即其部落列置州縣大者為都督府以其首領為都督皆世襲貢賦版籍多不上户部號曰羈縻州凡西域諸國内屬𨽻隴右道者為府五十一州百九十八安史之亂其地漸次没于吐蕃迨貞元三年安西北庭陷隴右州縣盡矣大中五年沙州人張義潮以瓜沙伊肅等十一州縣來歸而宣懿徳微不暇疆理惟名存有司而已五季迭興綱紀自紊逺人慕義無所適從晉天福三年于闐國王李聖天嘗遣使一至而突厥沙陀烏孫回鶻轄戛斯髙昌于闐諸部亦服屬于遼宋有天下河内外地悉屬西夏與西域暌阻若天竺于闐回鶻髙昌龜兹等國筐篚偶通聲教不訖南渡後益濶絶焉元太祖肇迹北方蕩平西域盡以諸王駙馬為之君長前代國名易䝉古語蓋始諸此明初既定陜西太祖命將守嘉峪闗永樂二年諸蕃遣使貢馬始即其地設哈密赤斤罕東阿端曲先安定諸衛封哈密舊王昻克特穆爾舊名安克帖木兒為忠順王兄子托都舊名脱脱襲諸國事土爾畨酋長亦後先入貢厥後寖强侵有火州栁城入據哈密朝廷屢求忠順王族裔俾主哈密三立三絶迄不能復興正統中沙州衛最先廢諸衛亦漸不立肅州遂以多事其土爾番西諸國太祖嘗遣招諭罕有至者成祖時西域之使凡數輩諸蕃貢使始通終明之世凡貢道由嘉峪闗入其略可考者賽瑪爾堪等國僅以奉貢通名天朝者哈三等部然蕃商貪中國財帛且利市易率詭稱貢使真偽既莫可辨即所稱部落諸名殆無足深考也統觀厯代經營西域之蹟大率詳于山南而略于山北如漢之都䕶校尉唐之四鎮俱在山南猶且户口不登于天府貢賦不入于司農聊示羈縻之方曾無開置之實至山北諸境漢張騫僅獲一履其地唐雖遙置都督諸州亦復名存實去有元西北疆域稍廣然考元史西北地附録紀載弗詳規為未備惟我聖朝徳業鴻逺舉從古未撫之西域全境井牧其地而冠裳其民設官定賦與赤縣神州相比埒是不惟創建非常之原而大荒以西不啻鴻濛之開闢矣豈非極覆幬之無外為曠古所莫及者歟欽定皇輿西域圖志卷三
