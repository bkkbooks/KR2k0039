front:
  text: 欽定四庫全書欽定皇輿西域圖志卷三十五
  hash: sha256:fe817700246f44284efaeac2c2fc3996a95666eafae1a2ed7154006e63a11af0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0039_WYG_057-1a}
body:
  text: 錢法臣等謹按西域錢法載諸史傳者罽賔安息大秦金銀以為質人馬以為文略見彼地緍錢之概非能以中土圜法推而行之九服之外也漢唐以來力征經營郵傳往來資斧所攜暨妻主輸繒所致有由中國流通其地者是以開元景德錢迄今猶存回部而即于彼地依山採銅專官督鑄則古未前聞宋熙寧中削除前禁沿邊軍州多闌出境外每貫例收稅錢元祐中嚴出境首從流徙編配之法而侍郎蘇轍則議于邊境行使鐵錢用防透漏緣其時中外阻絶恐以內地鼓鑄之利舟遷車轉裱散外藩兢兢專事隄防規制尤為𥚹隘我國家聲教逺訖無中外之判蔥山蒲海間版圖式廓利用宜饒始因回部普爾之制銷舊易新繼藉每嵗輸將額銅兼設官丁採取於是獻地寶於金方飾良倕于圜府選材合冶與內地司農所掌無異爰稽其小大肉好之形輕重銖兩之等爐局安設之方兵民積散之數彚力于編因以見刀貝紛羅市廛闐溢不減于繩行沙度之區治理倍徵廣逺抑臣等伏讀御製排次回部錢文詩示懷柔之德意戢干戈以省躬借鑒于和親互市往轍之非殫心于鼓鑄流通新猷之逺且仍騰格之舊名順和通之公好被潤澤而大豐美固非水衡少府之常經所得盡其利賴也已志錢法第十二
  hash: sha256:dfdf989217e2bf8859ad7ee067ef715c61c0a959dccf584a35aa9c618cf41e77
