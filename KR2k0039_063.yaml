front:
  text: 欽定四庫全書欽定皇輿西域圖志卷三十四
  hash: sha256:5001bc4705c8e245230631cbdade9667e62b5fe40dbd1973fae137fb26b3add2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0039_WYG_063-1a}
body:
  text: 貢賦臣等謹按禹貢一書首載中邦成賦而九牧貢金鑄鼎島夷皮卉兼納至於西戎即敘則既賦其璆琳熊羆之屬復以織皮為貢初非長駕逺馭好勤逺物之謂蓋將以聨中外之勢通遐邇之情示王者一統無外意至深逺也逮武王通道西旅貢􅋙作書必以四夷咸賓歸美於明王慎德周公相成王定九畿之貢在三千里外者謂之要服貢其貨物在九州外者謂之蕃國各以所貴寶為摯地則領於大司馬貢則輸於大行人而又有懷方氏掌來逺方之民致方貢逺物而送逆之其制益詳而厥田厥賦要不得與三壤之則同論若漢武初通西域偶得天馬作歌告廟論史者往往侈泰貽譏其後歷代史牒所書備列外蕃貢獻然其來也無常期其使也無常員其物也無常品義取羈縻弗絶而已未聞行井牧之法爾宅爾田以疆理戎索豈非力不足以制之德不足以容之乎國家昄章之厚逺越隆古頃者準夷內訌回酋濟惡我皇上推取亂侮亡之義天罰龔行罪人斯得俘其酋帥拔彼名城洎乎徂維求定弓矢載櫜即環籲元戎輸租請吏惟恐尺土不隸職方一夫不登齒版一絲一粟不入內府即自外於生成覆載者聖天子猶重軫瘡痍蘇其困憊酌盈劑虛取足供軍屯之費而止視向者役屬厄魯特時悉索敝賦不啻挈陷穽而登袵席矣屬八紘於扃闥撫異類如赤子周官九畿之制實未足以賅之又何有於漢唐以下哉爰舉新疆貢賦諸額著於篇西域舊俗強弱相役歷代以來征輸久為成例採托往籍用資旁攬因彚列焉志貢賦第十一
  hash: sha256:606b1a8fdc338e16c2817f323c20a232f518ff55c7654c2f75a3e9f326e74336
