body:
  text: 疆域十天山南路四烏什屬烏什哈喇和卓闢展森尼木魯克察克托克三雅爾洋赫布干罕都連木齊木雅木什英額阿里克必特克里克古古爾魯克沙圖巴什雅克瑪古木克齊克色帕爾拜呼蘭齊克扎木必勒阿斯提齋都伯素衮巴爾昌喀什噶爾屬喀什噶爾霍爾干伯什克勒木伊克斯哈拉玉斯屯阿喇圖什阿斯騰阿喇圖什鄂什阿喇古阿爾巴特牌租阿巴特赫色勒布伊汗阿里克哈喇刻爾提斯衮嶽普爾和塞爾們托克庫爾薩克鄂坡勒塔什巴里克英噶薩爾托璞魯克和什庫珠克阿喇楚勒葉什勒庫勒欽定皇輿西域圗志卷十七目録欽定四庫全書欽定皇輿西域圖志卷十七目録疆域十天山南路四烏什屬烏什哈喇和卓闢展森尼木魯克察克托克三雅爾洋赫布干罕都連木齊木雅木什英額阿里克必特克里克古古爾魯克沙圖巴什雅克瑪古木克齊克色帕爾拜呼蘭齊克扎木必勒阿斯提齋都伯素衮巴爾昌喀什噶爾屬喀什噶爾霍爾干伯什克勒木伊克斯哈拉玉斯屯阿喇圖什阿斯騰阿喇圖什鄂什阿喇古阿爾巴特牌租阿巴特赫色勒布伊汗阿里克哈喇刻爾提斯衮嶽普爾和塞爾們托克庫爾薩克鄂坡勒塔什巴里克英噶薩爾托璞魯克和什庫珠克阿喇楚勒葉什勒庫勒欽定皇輿西域圗志卷十七目録欽定四庫全書欽定皇輿西域圖志卷十七疆域十天山南路四烏什屬東至噶斯干接阿克蘇界西至色帕爾拜通喀什噶爾界南至庫珠克達巴踰山通葉爾羌和闐北路界北至天山踰山通伊犂西路界烏什烏什在阿克蘇西境哲爾格哲克得西九十里距京師一萬九百九十里城周三里二分髙二丈五尺東西南三門三面踞山其西面因山為城南崖陡峻北帶長流形勢絶勝所屬村莊凡十有一乾隆二十三年八月將軍兆惠等兵至哲爾格哲克得和闐城舊伯克霍集斯及其長子烏什城阿奇木伯克漠咱帊爾等馳書詣軍門投誠霍集斯者回部望族也平定伊犂時嘗從大兵擒達瓦齊遂偕霍集占奉使招撫回城霍集占叛脅之為逆泊聞大兵至即有意歸正末由自拔霍集占自庫車敗逃道經烏什霍集斯父子將以計誘入城擒獻為所覺未果因擊走霍集占固守烏什城以待我師及是遂以城降兆惠等令漠咱帊爾入覲挈霍集斯從軍而西尋以大臣駐其地乾隆三十年駐劄大臣素誠與阿奇木伯克阿布都拉措置乖方擾纍回衆二月伯克賴黑木圖拉等乘機煽亂上命伊犂將軍明瑞等率師往討八月平之逆黨伏誅徙其餘衆移駐阿克蘇大臣於此御製烏什城酋長霍集斯伯克攜回衆獻城降詩以紀事戊寅執渠早是被恩榮先是達瓦齊自格登窮竄霍集斯伯克奉軍墩設計縛獻録功褒賞畏逼遷隨尚近情霍集斯伯克與小和卓木均係回目特為所強懾因附和觀釁罪在可宥識順料伊將倒戟常與軍機大臣籌畫軍情曽諭及霍集斯伯克有擒獻逹瓦齊一節我軍至其地彼或降順比大兵既近伊果筵欵小和卓木計圖擒縛因為潛覺遁去遂率衆投欵軍門剪凶匪我願佳兵申明昧雉霜嚴令庫車之圍逆酋唾手就獲而失律者貽誤因命將軍兆惠往代就途次執失律之臣明示顯戮軍威大振疊見牽羊肉袒迎天佑人歸逮底績越因兢業凛虧盈御製烏什戰圖補詠有序戊子自庚辰西師凱旋之後伊犁則築城墾野回部則減賦薄徴視地之大小險夷各駐以大臣戍以兵卒晏然無事矣越五年乙酉而有烏什之變烏什者介於阿克蘇喀什噶爾之間為回部適中之地依山為城有險可恃田肥饒水充足又有牧埸可滋長馬牛羊故變亂之後逆賊守至六越月始盡力窮縛其酋以獻於是誅戮其精壯遷徙其婦稚凡烏什之城及其所附村落皆為官有駐以大臣戍以兵卒如前制而更申明紀律焉夫烏什固據形勝得扼吭捩臂之勢而宜厚駐我兵以鎮壓衆回部之地也初以王師勦逆撫順不可無故奪之今值彼變亂自取屠滅因以為回部適中官軍都會之地是又開惑論所謂愈變而愈康者非天垂貺豈能若是哉而渺躬之荷龍綏勵兢業又當何如哉其致變之由及我官軍之奮勇克復條為六事各繫以詠如左聞變乙酉二月烏什小伯克賴黑木圖拉等聚衆五百餘乘夜縱火焚掠戕殺官軍駐守之副都統素誠自殺賊遂據城為變時駐阿克蘇之副都統卞塔海聞之急郵奏報覽其詞過于張皇知其庸懦不足集事且回衆久懷德威使非激之致亂不應自棄化外庸可不察其由以示懲創因降旨駐伊犂之將軍明瑞細查致變之由以聞南巡三月返春舟六百飛傳計里郵卞塔海初奏烏什事由六百里馳達時方自杭州回蹕即于行舟批笞並籌度調兵諸機宜展視乃知烏什變報來始自阿蘇投回語阿克蘇急呼則為阿蘇烏什卡倫官全福等聞城中變急投阿克蘇報知卞塔海即據以入告輕徭本是常施惠倡亂何當彼取尤師駐伊犁定赴援重臣宣命察因由回衆蠢動固罪無可逭若召釁有由亦不可不申國法以警其餘因密諭明瑞于赴援時訪實速奏師援阿克蘇喀什噶爾與烏什相掎角應援最近而卞塔海與駐喀什噶爾之都統納世通雖亦領兵往救但二人素未經戰陳無益于事時明瑞聞而統兵赴援兼程遄進至則申明軍律並力攻賊賊始困窘勳戚伊犂董重兵明瑞於平定回部時奮勇追勦屢著功績素為回人所憚因命其為將軍駐伊犂統轄諸回城事早年回部得威名變聞遂率雄師援途逺仍教兼驛行計明瑞聞烏什事必率師赴援但伊犂相距幾二千里慮武稽時奏至知其兼程前進為之欣慰可笑無能還妬阻納世通甫至烏什聞明瑞統兵赴援之信恐其分功遽行文阻止奏至降旨嚴飭而明瑞亦不從其言決計迅赴幸因未聽遂遄征逆回始相入聲倉皇守壁壘新知紀律明卞塔海納世通諸事失措為逆回所輕及明瑞至申嚴軍律賊衆始惶懼死守不敢復出獻諜烏什伯克賴黑木圖拉既叛慮其力之不能抗我師也乃相與聚謀走間諜巴布敦等卑辭厚幣求援于霍罕之厄爾德尼伯克又教為詭語以煽亂所過諸布魯特惟時布魯特久效恭順且知逆黨之妄也遂執巴布敦等遣使詣喀什噶爾以獻逰牧東西勃律連唐之勃律即今之布魯特不同回部列氓編諸回城向苦凖噶爾賦重自己卯底定時即為減定賦額一如內地編户徴納人皆樂輸至布魯特則逐水草而居非若回人之能習耕作盡地利故雖向化內附不令納賦惟入覲時職貢效忱而已負城既叛賴黑木賴黑木圖拉既據烏什即遣其黨巴布敦等偕安集延塔什罕之貿易回人賫書幣潛往霍罕乞援間去聲道潛通安集延布魯適居路徑過去聲駒支驀遇計擒全巴布敦等至布魯特境即詭稱附近烏什各回城同時俱亂冀以煽惑諸部衆適喀什噶爾阿奇木伯克噶代默特遣人告之以叛逆惟烏什一城餘皆安堵時布魯特比齊里克齊遂誘巴布敦等擒之即遣其弟喀爾捫都解送喀什噶爾比者部落之首領即如回部伯克之職捫都解送喀什噶外域輸忠意實虔悉故布魯特既縛獻巴布敦等於喀什噶爾時駐喀什噶爾之副都統柏琨詢其變亂之由則稱烏什之阿奇木伯克阿布都拉橫𣲖黷擾蕩檢宣淫而副都統素誠不但不加督責且與之同流合汙以是回衆不勝其忿遂脅聚生變又納世通卞塔海平時亦妄自尊大凌虐諸回素為衆怨所集且卞塔海初至烏什城下不事詰剖輒施鎗炮以攻及賊出拒復怯而敗走納世通繼至亦茫然不知所措賊益逞其負嵎之勢明瑞詢察得實臚章入告與柏琨所奏悉合因各視其罪重懲之巴布敦辭實可憑周咨我衆又堪徴明瑞查訪致亂所由知素誠擾纍不法及納世通卞塔海庸妄乖謬諸罪狀皆得自貿易人衆臺站諸回之口詢之在事侍衛等亦衆吻如一哥舒翰既少恩甚阿布都拉為哈密回部貝子玉素富同産弟以其久內附之回授為烏什阿奇木伯克乃自蒞事以來不知恤衆每將疲瘦羊馬倍值取利又肆為淫惡致所屬回衆切齒亂作亦並遇害實非意料所及李大宜還耽樂仍素誠在烏什惟事科𣲖苦纍又復淫縱無忌賴黑木圖拉之妻亦曽為所留因而蓄怨生變則素誠實死有餘辜矣一死餘辜真尚有兩駑覂駕愧惟增此雖素誠阿布都拉之罪然用二人以致僨轅之愧實切于懷可同效節加優恤用戒將來示創懲攻堅明瑞等攻烏什數月圍困甚力賊出拒戰者即擒獲誅磔于是賊驚駭聚計謂與其束手就斃毋寧捨死以求生因謀夜出襲營我軍覘知之預為之備賊首賴黑木圖拉中箭死賊黨益窘怖復推賴黑木圖拉之父厄塞木圖拉為阿奇木悉衆死守以延殘喘此皆得之捉生鞫訊者已而明瑞復掄驍鋭夜薄其城登陴毁堞奮擊獲大勝賊自是日危蹙矣罪不容誅賊自知求生捨死死相持誘來平野騎弗進賊知罪在不赦僥幸逭死明瑞等知之即調兵兩隊先後繼進前隊次青努爾擇地張甄以待欲誘賊至平地合後隊奮擊賊即退守城我軍追躡及城下賊猶持火器乘陴拒敵轟以大炮賊乃匿避仰薄髙峯銃競施督以衝堅誠亦易諭令平聲鄭重故因遲烏什初變明瑞即統兵赴援復命尚書阿桂馳驛往會之彼時以烏什蕞爾孤城又無外援易于收服毋庸悉鋭進攻輕攖鋒鏑致多傷我士卒因諭令嚴急攻圍待其勢窮力蹙乘機取之雲梯竪即登城堞賊既窮窘益固守不敢出明瑞等以時屆秋令師旅不宜久羈乃簡巴圖魯六百餘中夜攜雲梯分道濳往薄城兩隅東北隅先登賊未覺挺創交下守陴賊狼狽竄即舉號火招繼進者又循墉自北而東南悉據有之毁其垣垜施鎗箭巨石俯擊殱賊無算後以天明收軍未即得城早使逰魂釡底馳城復登城之捷賊益膽落我軍乃逼城築壘嚴圍斷其樵汲即有突出者並擊敗之賊城糧絶馬飢拆屋以爨撤茅以飼殍仆溢途巷衆皆憂悸離畔沙爾布者烏什之舊商伯克故未從賊為惡乘人心洶懼謀縛厄塞木圖拉詣軍營納欵因以獻城至夜遂內潰先是諭明瑞等曰賊不早悔罪伏法若城埀破始乞降則不可貸當盡殱之以揚我武邌明我軍振旅入城悉戮其黨羽徙其婦孺烏什復平時八月十五日也斧螳鋒蝟勢將平聲成將去聲恐多傷退我兵我東北登城一軍既獲全勝其攻西南者以賊已有備不復能上明瑞等因天已嚮明恐為賊所要襲急撤城上兵遂未得乘鋭搗其巢穴髙壘深壕奚逭命析骸易子茍延生倒戈縳就無完卵輿櫬獻來逮破城教寫陳圖旌衆勇定功惟是凛虛盈漢書西域傳尉頭國王治尉頭谷去長安八千六百五十里東至都護治所千四百一十一里南與疏勒接山道不通西至捐毒千三百一十四里徑道馬行二日魏書西域傳尉頭國居尉頭城在溫宿北去代一萬三千里役屬龜兹唐書地理志河西內屬諸胡曰蔚頭州又一曰鬱頭州在赤河北岸孤石山按漢書溫宿西至尉頭三百里今烏什東去阿克蘇止二百里阿克蘇為古溫宿疑尉頭國地尚在烏什之西然以漢書所載兩國東去都護治所道里計之尉頭國一千四百一十一里溫宿國二千三百八十里似尉頭轉在溫宿之東今以姑墨國東至都護治所一千二十一里之例推之溫宿國當為一千三百八十里二千字為一千字之訛説見前卷而尉頭止云一千四百十里是其國又當近在溫宿西四十里也史家紀載道里逺近或從邊界起數或從都城起數或徑行或繞道廣狹各殊即一書中已有不可合者惟論其大較則溫宿東而尉頭西壤地相接於古無疑今阿克蘇為溫宿城則自是西行得烏什城應屬當時尉頭城矣再漢書稱其南與疏勒接山道不通今烏什以西一帶在兩山間其南山之南為古疏勒詳見本卷則疏勒之北為古尉頭地當復較然而烏什以南之山即漢書所謂山道不通者亦大略可覩矣