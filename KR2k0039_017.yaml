調馬往二萬益以索倫之徑兵以布易回粟供餉回人以布為珍用兵駐阿克蘇時命轉餉者運以易粟膳軍省費三十餘萬復敕內部就産布各省採解不以煩甘涼以被災故也數月休息胥飽騰整師兩路一時進殱渠務使回衆寧回酋兄弟分處兩城枝梧䇿應命將軍兆惠等由烏什往喀什噶爾富德等由和闐往葉爾羌率兵同時並進令其首尾不救以期俘獲屈指此際壓賊境又盼佳信夙夜縈朝來驛致將軍奏兆惠報回衆投誠拆封披摺一詳覽厯厯都悉軍前情進至伊克斯哈拉地名將軍兆惠進兵攻喀什噶爾閏六月初三日行至此地前隊中夜聞人行參贊公明瑞於前隊略地夜聞人騎進圖蹴之詢得喀什噶爾回人和濟默爾等六人同聲納降云云奮勇圍捉喊勿殺是投誠者來相迎久慕歸順大皇帝奈脅霍集占弟兄大和卓木今肆掠想同伊弟潛逃生舊伯克等差我輩願師速往揚威聲馬驢牛羊被虜去欲進擒彼嗟無能懇籲將軍早赴援庶和卓木未逺征兆惠悉此率兵進通信富德同謀乘來降回衆云其屬方分投兩路軍門時兆惠聞信即移知富德軍以便協謀乘勢進取相機持重慮賊詐兆惠奏言回人情辭雖無可疑而受降如受敵兩軍並加意慎重以防詭詐甚協機宜更慰萬里繫念怦四大回城三已得喀什噶爾為逆酋大和卓木窟穴其城更大於先得之烏什阿克蘇二城今已欵降所餘僅葉爾羌一大城矣遊魂釡底焉支撑斷其左臂固美事不無少恨煩懷仍使波羅泥都大和卓木名也就獲以之餌彼弟或聽乃先兵至早跳去復需時日勞軍偵二魁俘虜靖遐壤靜候天佑歌武成漢書西域傳疏勒國王治疏勒城有列市西當大月氏大宛康居道也後漢書西域傳明帝永平十六年龜兹王建攻殺疏勒王成自以龜兹左侯兜題為疏勒王冬漢遣軍司馬班超劫縛兜題而立成之兄子忠為疏勒王忠後反叛超擊斬之後莎車連叛于置屬疏勒疏勒以強故得與龜兹于置為敵國焉安帝元初中疏勒王安國以舅臣磐有罪徙於月氏月氏王親愛之後安國死無子母持國政與國人共立臣磐同産弟子遺腹為疏勒王臣磐聞之請月氏王曰安國無子種人微弱若立母氏我乃遺腹叔父也我當為王月氏乃遣兵送還疏勒國人素敬愛臣磐又畏憚月氏即共奪遺腹印綬迎臣磐立為王更以遺腹為磐藁城侯靈帝建寧三年討疏勒攻楨中城不能下引去班超傳永平十七年春超從間道至疏勒去兜題所居磐槖城九十里逆遣吏田慮先往降之敕慮曰兜題本非疏勒種國人必不用命若不即降便可執之慮既到兜題見慮輕弱殊無降意慮因其無備遂前劫縳兜題左右出其不意皆驚懼奔走慮馳報超超即赴之悉召疏勒將吏説以龜兹無道之狀因立其故王兄子忠為王國人大悅北史西域傳疏勒國文成末其王遣送釋迦牟尼佛袈裟一長二丈餘帝以審是佛衣應有靈異遂燒之以驗虛實置猛火上經日不然觀者莫不悚駭其都城方五里國內有大城十二小城數十唐書地理志疏勒都督府貞觀九年疏勒內附置領州十五西域傳疏勒一曰佉沙王姓裴氏自號阿摩支居迦師城突厥以女妻之儀鳯時吐蕃破其國開元十六年册其君安定為疏勒王宋史外國傳于闐國西北至疏勒二千餘里元史世祖本紀至元十一年四月詔安慰喀什噶爾舊作合失合兒今改正等城明史西域傳喀什噶爾舊作哈實哈兒今改正亦西域部落永樂六年李達等齎敕往賜即奉命十一年遣使入朝貢方物宣德時亦來朝貢天順七年命指揮劉福普賢使其地其貢使亦不能常至按古疏勒東境在今烏什西南境已見前條若漢書所謂疏勒城後漢書西域傳所謂磐藁城即班超傳磐橐城楨中城唐書所謂迦師城北史所謂都城方五里大城十二小城數十者當不在砂磧彌望之區今之喀什噶爾正當疏勒西境山環水帶土地肥腴城堡鱗次可想見當日建庭之舊也自今喀什噶爾西北逾天山西行入布魯特界即漢書所謂西當大月氏大宛康居道者形勢猶存唐時疏勒都督府應亦建此列備四鎮咸亨元年地入吐蕃長壽元年復置都督府五代之際隔不復通宋時于闐通貢而疏勒無聞亦無人至其境者惟元史所謂合失合兒及明史舊稱哈實哈兒與今之喀什噶爾音義相通尋聲求之固當非此不屬至三國志引魏略楨中國莎車國竭石國渠沙國西夜國依耐國滿梨應作蒲犁國億應作德若國榆令國捐毒國休修應作休循國琴國皆并屬疏勒元明以來地屬巴什伯里統龜兹焉耆為一國疆域最大是固不得以喀什噶爾所屬諸城盡之者矣霍爾干霍爾干在喀什噶爾城東北十里木什特們兩河之間伯什克勒木伯什克勒木在霍爾干東南二十五里西距喀什噶爾城三十五里踰木什諤斯騰至其地東北境有特們郭勒伊克斯哈拉伊克斯哈拉在伯什克勒木東五十里西距喀什噶爾城八十里玉斯屯阿喇圖什玉斯屯阿喇圖什在霍爾干北七十里由巴爾昌西南六十里踰山至其地當山口有小城西南踰特們木什兩河距喀什噶爾城東北八十里阿斯騰阿喇圖什阿斯騰阿喇圖什在玉斯屯阿喇圖什西八十里地當山口為特們郭勒發源處西南踰木什諤斯騰至其地東南距喀什噶爾城六十里鄂什鄂什在阿斯騰阿喇圖什西北六十里東南距喀什噶爾城一百二十里又西北踰山通西布魯特界阿喇古阿喇古在玉斯屯阿喇圖什東一百里地當北山南麓支山迤邐西南相抱西南距喀什噶爾城一百四十里阿爾巴特阿爾巴特在伯什克勒木城東南十里木什赫色勒兩河之間西北距喀什噶爾城四十里牌租阿巴特牌租阿巴特在阿爾巴特東一百六十里木什諤斯騰北西距喀什噶爾城二百里赫色勒布伊赫色勒布伊在阿爾巴特西南一百十里赫色勒雅璊雅爾兩河之間有小城西北距喀什噶爾城一百五十里汗阿里克汗阿里克在赫色勒布伊南六十里赫色勒雅璊雅爾兩河之間有小城西北距喀什噶爾城一百四十里哈喇刻爾哈喇刻爾在喀什噶爾城西南三十里赫色勒特爾墨楚克兩河環帶之間提斯衮提斯衮在哈喇刻爾南三十里北距喀什噶爾城八十里嶽普爾和嶽普爾和在提斯衮南三十里北傍黑色勒郭勒北距喀什噶爾城八十里塞爾們塞爾們在喀什噶爾城西南五里赫色勒特爾墨楚克兩河環帶之間與哈喇刻爾東西相望托克庫爾薩克托克庫爾薩克在塞爾們南三十五里雅璊雅爾諤斯騰北岸又一水出西山中東流環其北境東北距喀什噶爾城四十里鄂坡勒鄂坡勒在托克庫爾薩克西八十里雅璊雅爾諤斯騰環其西南境有小城東北距喀什噶爾城一百二十里塔什巴里克塔什巴里克在托克庫爾薩克南一百一十里雅璊雅爾諤斯騰東南西北距喀什噶爾城一百四十里英噶薩爾英噶薩爾在提斯衮南一百四十里踰雅璊雅爾諤斯騰庫森諤斯騰至其地北距喀什噶爾城二百里所屬地曰賽喇克又東北境曰察木倫西北境曰沙瑪拉西境曰特斯比西南境曰額克資雅爾地俱要隘以方位道里考之自庫森諤斯騰以南在古當為依耐國地漢書西域傳依耐國王治去長安萬一百五十里東北至都護治所二千七百三十里至莎車五百四十里至無雷五百四十里北至疏勒六百五十里南與子合接寄田疏勒莎車按依耐於漢為小國介在莎車疏勒之間後漢不著其國當為莎車王賢所并也前漢莎車為今之葉爾羌疏勒為今之喀什噶爾史稱依耐東至莎車北至疏勒揆厥方隅非英噶薩爾莫屬矣班史於東北至都護治所句下例言四至以北至疏勒南接子合之文證之其為東至莎車西至無雷可擬而知也托璞魯克托璞魯克在英噶薩爾東南七十里西北距喀什噶爾城二百七十里以上屬喀什噶爾和什庫珠克和什庫珠克舊對音為霍斯庫魯克在喀什噶爾城西五百里哈喇庫勒西北波羅泥都霍集占自葉爾羌西通參贊大臣毅勇公明瑞以九百人窮追及此賊衆三千擁踞山梁來拒我師明瑞身先士卒奮勇馳突自午及申斬獲無算追奔百餘里賊勢益蹙御製賜明瑞詩并序己卯參贊大臣毅勇公明瑞以逆酋大小和卓木望風先遁率前鋒鋭卒往遮而賊回間道通信逆酋遂兼程走明瑞追及之於霍斯庫魯克以逺馳之旅摧拒險之徒銜枚列隊者甫九百人鳴哨據梁者且六千指而能折負嵎之勢揚卷籜之風轉戰三時辟易百里擒生斬級輜重畢收而副將軍富德等亦以兩城既定統師會勦逆豎計日可擒非其志秉忠誠曷以功隆摧陷雖古名將孰克方兹爰賜是詩以彰其績世胄更勳戚少年能老成從軍俾習事屢戰得英聲適以狂狙遁因將徑旅征欲遮先信漏不捨竟蹤橫地利彼雖擅人和我實勍騎惟九百到賊乃數千迎少卒勝其衆勇還濟以誠勗哉俘二豎衛霍遜功名阿喇楚勒阿喇楚勒舊對音為阿爾楚爾在和什庫珠克達巴西三百里乾隆二十四年八月逆回波羅泥都霍集占自和什庫珠克達巴敗後西竄至阿喇楚勒副將軍富德等率師窮追至此及賊後隊賊占據兩峯頂設伏山腰别遣賊來迎以誘我師是時富德將中軍貝勒銜霍集斯公鄂對領隊大臣端濟布等佐之參贊大臣明瑞領前隊領隊大臣鄂博什等佐之參贊大臣阿桂領中後隊領隊大臣傅景等佐之領隊大臣瑚爾起等領奇兵巴圖魯侍衛老格科帔薩等領援兵為左翼參贊大臣阿里衮領前隊領隊大臣衣柱等佐之參贊大臣巴祿領中後隊領隊大臣鄂穆布等佐之領隊大臣由屯等領奇兵巴圖魯侍衛伍岱等領援兵為右翼巴圖魯侍衛額爾登額等領後隊以偹四面援應領隊大臣齊凌扎布為殿軍陳伍既嚴如牆而進於是賊所占左右兩山為左右翼奇兵所奪據山向下掩殺賊失勢散亂乃以後隊援兵右翼前隊兵與中軍競進左右翼中後隊兵併力馳之奮勇沖擊賊不能支遂各鼠竄我兵追殺二十餘里獲甲器旗纛無算賊復聚衆保一山峯抵拒左右翼兵直前截殺兩翼奇兵後隊援兵潛繞山後轉戰合勦中軍復出疑兵誘之示以劫掠輜重狀賊遂遑遽越山而竄於是以中軍率右翼兵馳往截殺與左翼兵前後合攻賊益潰敗是役也勦四千餘衆擒斬伯克數十人於是我兵乘勝追至葉什勒庫勒詳見後御製副將軍富德等追及兩和卓木大勝回軍捷音至作歌紀事己卯慶霄對月方開筵將軍捷報驛騎傳擘囊展書厯厯閲額手慶慰衷心憐憐者我衆實奮力慰者呵護惟賴天萬有餘里所致馬單營解馬自內地至肅州逺者已四五千里其自肅州至察汗烏蘇又萬餘里而山間繞道崎嶇屢經戈壁均未得飼秣稍休又踰戈壁無水泉裹糧追賊幸尾及彼逃乃在草日前逆酋而和卓木讋我軍威於大兵未至葉爾羌喀什噶爾二十日之前已離巢逺竄明瑞先已折其角未經大創猶抗顔先是參贊公明瑞襲賊於霍斯庫魯克嶺轉戰三時擒斬賊衆甚夥乘勝追擊軍聲大振會日晚我兵馬力不及賊復以其殘衆竄去阿爾楚爾列賊衆避其輜重伏據山輕舉墮術在所戒集思持重勝算先時逆酋方設伏於兩山峯頂少遣賊人迎誘我兵欲逞其狡計副將軍富德知之與參贊大臣等集議營陳攻取不恃勇輕進偏伍彌縫密布置發縱指使皆英賢副將軍富德與霍集斯等統中軍命參贊明瑞阿桂等領左翼參贊阿里衮巴祿等領右翼翼之中各分前中後隊又益以竒兵援兵隊各為二别遣巴圖魯侍衛額爾登額等分率巴圖魯兵二隊偹四面應援而領隊齊凌扎布為殿軍將卒如臂指相維布置實當諸大臣均豫心膂巴圖魯侍衛比肩夙所教養共休戚敵愾兼逮輿儓焉是役雖僕隸無不共奮義勇同心戮力功克就二豎鼠竄圖茍延戰罷檢閲傷一卒殱彼計級乃盈千師難到葉爾竒木况過數千里行遄以少勝衆剪賊黨明瑞既以前鋒九百擊敗賊衆六千兹役也我兵馬步統計不過三千人勦逆回四千餘衆擒斬者已過其四之一而助逆渠魁如阿布都克勒木等大伯克數十人並臨陳殱之逆酋寅惡殆盡云國威赫濯揚天邊優敘未足償勞績捷奏至並有旨從優議敘猶念將軍參贊等殫忱奮勇殊勳非常例可酬立待元凶就縛時特加曠典桂觴欲泛還罷旃百年養士今獲效祖宗福蔭貽萬年佇待俘虜到露布西師之役方稱全西師之役方稱全行張凱宴勞凱旋漢書西域傳無雷國王治盧城去長安九千九百五十里東北至都護治所二千四百六十五里南至蒲犁五百四十里南與烏秅北與捐毒西與大月氏接魏書西域傳鉢和國在渴槃陀西其土尤寒有大雪山望若銀峯一道西行向嚈噠一道西南趣烏萇亦為嚈噠所統唐書西域傳護密者元魏所謂鉢和橫一千六百里縱狹才四五里王居寒迦審城北臨烏滸河地寒沍堆阜曲折沙石流漫顯慶時以地為鳥飛州地當四鎮入土火羅道故役屬吐蕃按阿喇楚勒北通布魯特南接拔達克山西行則踰蔥嶺以漢書無雷國南與烏秅北與捐毒西與大月氏接之文證之則阿喇楚勒宜為無雷國地也漢之無雷至北魏為鉢和於史無明文第考魏書鉢和國在渴槃陀西今葉爾羌西塞爾勒克喀爾楚一帶為渴槃陀國詳見卷十八而鉢和國東與之接其地必當在蔥嶺之中更以唐書護蜜即魏鉢和地當四鎮入吐火羅道之説推之則四鎮在蔥嶺東吐火羅在蔥嶺西魏之鉢和唐之護蜜當屬蔥嶺中往來當道之國今阿喇楚勒在蔥嶺中偏北境上雖不必定為無雷鉢和護蜜諸國之都而要屬諸國之北鄙可無疑矣葉什勒庫勒互見水葉什勒庫勒舊對音為伊西洱庫爾地以水名在阿喇楚勒西南二百里葉什勒庫勒淖爾西南北髙峯對峙北山有小徑通安集延其西限以大嶺踰嶺以南通拔達克山界波羅泥都霍集占自阿喇楚勒敗後波羅泥都先以二百人奔據淖爾之西嶺為逃竄地霍集占擁衆萬餘人踞北山並扼守迤東諸峯副將軍富德率師追至先令參贊阿里衮等由淖爾南岸徑趨西嶺而自於東峯擊賊賊憑髙恃險我師仰攻連舉大炮厯時未克富德選鳥鎗精鋭者數十人從山北攀援而上擊峯頂賊復遣霍集斯伯克等樹立回纛令新降回人大聲傳諭招降俄而山上回衆數千人挈其子女駝載牲畜號呼願降沸聲如雷漫山蔽嶺投奔而下霍集占禁之不能止手創數人奔者愈衆至日夕乃已而阿里衮之趨南岸也南岸山石壁立騎不能前則率兵徒步譟而登以火器遙擊北山諸賊北山之麓瀕水路狹僅容單車隻騎賊輜重徒屬多緣岸擁塞者復於隔岸徹夜遙擊使不得登翼日並哀號乞降凡納降回衆萬二千餘人獲回纛一回劎一牲畜以萬計他器物無數霍集占乘夜繞山徑與波羅泥都奔拔達克山御製捷報并序己卯逆酋霍集占兄弟一創於霍斯庫魯克再創於阿爾楚爾勢蹙窮竄將軍富德等急躡之於伊西洱庫爾是拔達山連界地也時賊衆據峯負固我兵整陳勦擊中發大神威逺炮兼簡偏鋭用鳥鎗夾攻賊中有伯克等悉其大隊呼籲乞降霍集占自山頂遮截至手創之不得止而我兵四路設伏盡起有徒步援絶壁進者轉戰一晝夜賊遂大潰計獲賊衆一萬二千有奇鎗械二千有奇牲畜一萬有奇逆酋僅以殘衆四五百人逸去富德等傳檄拔達山部長曉譬順逆令其克日縛獻至是捷聞朕以二酋一曰不獲軍務一日不竣雖仰賴鴻庥收城服衆而旁午擘畫何能釋懷爰志長言佇期永靖詎得已哉待圍小憩坐孱顔捷報飛馳達玉關奏牘機宜悉覽遍降蕃輜重盡遮還千軍直進伊西洱二豎旋逃拔達山除蔓斯之未底定可辭畫䇿旰宵間漢書西域傳難兜國王治去長安萬一百五十里東北至都護治所二千八百五十里西至無雷三百四十里西南至罽賓三百三十里南與婼羌北與休循西與大月氏接魏書西域傳波知國在鉢和西南土狹人貧依託山谷其王不能總攝有三池傳云大池有龍王次者有龍婦小者有龍子按漢無雷國東北至都護治所二千四百六十五里難兜國東北至都護治所二千八百五十里是難兜為無雷西四百餘里國可知班傳稱難兜西至無雷應屬東至之訛今阿喇楚勒為漢無雷則葉什勒庫勒應為漢難兜也魏波知國在鉢和國西亦與今葉什勒庫勒方位相合今葉什勒有大淖爾廣數十里或即古三池之舊歟以上屬喀什噶爾西境外地欽定皇輿西域圖志卷十七
