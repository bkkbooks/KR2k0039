front:
  text: 欽定四庫全書欽定皇輿西域圖志卷四
  hash: sha256:62d8cafdcda26747d87c15c49083b6049bded95fd510b4eea49ba1f40dbc86f0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0039_WYG_025-1a, image: WYG0500/WYG0500-0580c.png}
body:
  text: 列表臣等謹按史必有表所以詳世系紀沿革也自五代史職方考其疆域分併之跡具列如譜後世作地志者亦開有列表類以時代為經以古今郡國為緯縱横求之較然可睹若西域之於中土通絶不常且有從古未被聲教者史家紀載荒略率傳而不譜故自兩漢以來二十餘年之沿革即博雅之士徴信無由矧在耳傭目僦者哉班志紀三十六國某國某治距長安幾千幾百里宜可寸寸而度不失絫黍而驛使取道紆廽譯言茫昧歴代足跡未至承譌襲舛一經覈實鑿枘紛如下此又無論已洪惟我皇上戡定西域建設府州縣自昔曶爽闇昧之區分疆畫界幾與内地形勢相埒因得詳其端委用皇朝一統志十九省之例表之若兩漢而下都䕶所治校尉所居為詳悉分注李唐遥置都督諸州府雖名號空存不歸版籍亦與附登用資攷証且以見我朝之中外一軌悉入幅􅊷之内實為曠古所未有也其自嘉峪關至玉門縣界西漢屬酒泉郡禄福縣地東漢三國因之晉改福禄縣周隋因之唐改酒泉縣宋屬肅州元屬肅州路明屬肅州衞入皇朝并入甘州府改屬肅州髙臺縣久𨽻内省不復綴述云志列表第三
  hash: sha256:0cf306ef039719371d71fc23a4d8278a8e607bb13f6c9e7f5ba172c5feb8ac9a
