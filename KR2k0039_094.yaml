body:
  text: 土産準噶爾部百穀草木之屬五穀之屬有黍名哈喇塔蘭有高梁名珠古里有糜名哈喇塔拉有大麥名阿爾拜有小麥名察罕塔蘭有小豆名布爾察克青稞名同間有稻米不甚粘名圖魯爾噶有麻名鄂羅遜瓜謂之勾菜謂之諾衮野韭謂之庫瑪郭爾蔥之根大而穗青高者有二尺其名曰松吉結有小蒜其根甚小苗高三四寸許其名曰達爾吉爾蒜名薩爾瑪蘇克野蒜名薩喇納高尺餘色青獨莖頂結小花色深黃其根有黃白二種食之味淡可以作羮木之有果者名阿里瑪有松名哈喇默敦有柏名哈爾垓有桃名沙布多里有李名扎納斯達有蒲萄名烏珠木美者可釀酒木之似枸杞而實正黃者曰齊齊爾噶納亦可食木之無果者有榆名額稜默敦有桑名珠珠瑪有栁名布爾噶蘇有楊名烏里雅蘇葉不甚垂其幹可屈為肉槽剡為舟楫有樹名胡遜形如樺其方苞可為木碗其油可以然燈又有樹曰察爾察形似山茶取其葉可以供飲彼中以之代茶荈其根上旁出之苞可取以為木碗其草之名則識之者罕有烏蘭竒竒克者草本高三五尺不等葉形尖細有微毛花五瓣圓寸許色有深紅淺紅二種以四月開七月落有沙拉竒竒克者三種一如內地之虞美人一如金蓮花一如小黃菊花有察罕竒竒克者花五瓣色白葉小而圓本可高尺餘有庫克竒竒克者色緑花狀如梅有哈喇庫克竒竒克者色深碧有數種或似野菊或似翠翹有曰哈特者高三四尺葉小圓而頭岐花五瓣小如豆其色白結小實如枸杞色紅黑其味酸阿魏名星恭出天山麓根株獨立枝葉如蓋臭氣逼人生取其汁熬膏有羊刺草上生刺蜜味甚甘美山海經北山經潘侯之山其上多松柏其下多榛楛敦薨之山其上多棕柟其下多茈草北嶽之山多枳棘剛木北單之山多蔥韭漢書西域傳烏孫多松樠唐書回鶻傳堅昆國稼有禾粟大小麥青稞步磑以為麵糜穄以三月種九月穫以飯以釀酒而無果蔬木松樺榆栁蒲松高者仰射不能及顛而樺尤多西域傳笯赤建國地沃宜稼多蒲萄五代史四裔傳回鶻其地宜白麥青䴹麥黃麻蔥韭胡荽按準部不乏泉甘土肥性宜生植之地是以百穀園蔬之屬幾於無物不有惜其逐水草事畜牧未能物土之宜而布其利耳今烏魯木齊伊犂諸處耕屯日闢種藝日饒可知天施地生之故不限方隅而曩者準疆風物固地有遺利者歟羽毛鱗介之屬鳥之屬有鶴名岑有鷹名哈爾察該有鷂名豁爾有雕名布爾古特有鴈名喀倫有鷺名渾間亦有孔雀名託古斯其小者則燕名哈拉岱雀名博克碩爾噶鴉名克哷鵲名沙札該雞名塔竒雅雉名郭爾郭特味肥而鮮鴨名遜有鳥焉形如雉色黑尾白班赤睛黃纈名鷟鸑爾其獸則有虎名巴爾有豹名伊爾畢斯有犀名薩爾魯克有熊名哈喇古囉蘇有牛名烏克爾有兕名布拉古囉蘇多鹿麞鹿名布古麞名庫德里及馬名摩林騾名羅薩驢名額爾集根駱駝名特們之屬有羚羊名布空盤羊名烏呼勒拉山羊名伊滿盤羊之形甚肥碩山羊之皮甚堅韌可為弓把豬名噶海蹄多白狗名諾海形絶小免名洮賚狐名烏尼狼名綽諾大者毛長三四寸貓名蜜大者重二三十斤獺名塔爾巴噶毛色青伊犂産者佳有田鼠名呼魯郭納貂鼠名布拉罕灰鼠名克哷穆銀鼠名烏音猿名薩爾瑪沁魚之種類與中土異其無鱗者謂之竒勒必長丈餘者謂之圖魯俱出額爾齊斯郭勒長一二尺有通骨嘴甚長而無刺者名曰易里木長二三尺腹甚扁而濶多腴者名曰納和又有呼爾布百竒里兩種俱大魚之類也蛇名謨該多生水中有渾身金點者蝦名哈畢爾噶和羅垓蟆名謨勒克衣蛤名哈卜濟噶蘇蝦及蟆蛤之屬不以供饌鱉名雅蘇台謨勒克伊龜名拉克謨勒克伊有七八種其最貴者大如拳色如金甲如鋸爪如鈎能緣木御製鷟鸑爾詩有序癸未尚書阿桂還自伊犂以所獲鷟鸑爾鳥進色正黝尾中散白點如雪糝赤睛黃匡翎戢戢駢半雉扇然詢其名既無義可索或請按鳥譜近似者當之豫曰否否昔夏后羽毛作貢厪中土職方恆産厥後吉光生翠又不越嶺表炎洲而止且名率侈艷弗深考乃者新域既屯既城綏逺所徵繄志實是賴則思曩者剡笴之雄風紀今時鳴岐之雅則不其韙乎爰仍其名命郎世寧為之圖而系以詩鷟鸑爾何出伊犂沙水潯戍還因致此鳥譜絶難尋項背如鶹雉間關學戴鵀白斑黑尾點黃暈赤睛深忽得羾京闕能無憶故林聊將紀殊域非是寶珍禽御製俊鶻驄歌戊寅烏良海獻胡青驄天間牧養經再冬本是俊骨易調習今來備駕秋圍中左旋右抽盡如意發小殪大皆從容一馳疊獲鹿曰兩再馳更斃狐之封千二百騎所共覩無此此輩惟面從致力可息佳名賜亦不啻力德並同山海經北山經潘侯之山有獸焉其狀如牛而四節生毛名曰旄牛大咸之山有蛇其毛如彘豪其音如鼓柝敦薨之水其中多赤鮭其獸多兕旄牛其鳥多鳲鳩少咸之山有獸焉其狀如牛而赤身人面馬足名曰窫窳其音如嬰兒是食人敦水多䰽䰽之魚食之殺人懷澤之水其中多䲃魚其狀如鯉而雞足食之已疣有獸焉其狀如犬而人面善投見人則笑其名山􅏈其行如風見則天下大風諸懷之水多鮨魚魚身而犬首其音如嬰兒食之已狂囂水有蛇一首兩身名曰肥遺熊差之山多馬北鮮之山多馬隄山多馬有獸焉其狀如豹而文首名曰狕隄水中多龍龜按山海經所載羽毛鱗介諸屬率多竒誕以今證古核實為難存之以見流傳之舊文人或詭華詞非身履目睹其誤於紀載之沿訛者不少耳漢書西域傳烏孫國多馬富人至四五千匹後漢書西域傳蒲類國有牛馬駱駝羊畜出好馬唐書突厥傳始虜未叛嗚鵽羣飛入塞吏曰所謂突厥雀者南飛胡必至回鶻傳畜多大足羊堅昆國畜馬至壯大以善鬭者為頭馬其獸有野馬骨咄黃羊羱羝鹿黑尾者似麞尾大而黑魚有蔑者長七八尺莫痕者無骨口出頤下鳥雁鶩烏鵲鷹隼西域傳石國多良馬五代史四裔傳回鶻出犛牛緑野馬獨峰駝白貂鼠羚羊角罽㲲騊駼之革裴矩西域圖記其馬騮馬烏馬多赤耳黃馬赤馬多黑耳惟耳色别自餘毛色與常馬不異金石珍寶之屬金名阿勒坦銀名孟固銅名化斯鐵名特穆爾錫名圖固勒噶鉛名和爾郭勒津五金之中多銅鐵錫鉛少黃金白銀其鐵最良産硫黃名庫爾及􅔈硝名察罕碩壘鹽名達布蘇有赤白二種大者如枕堅者如石石名赤堆沙磧之中多産五色石子大者如拳小者如梧子光瑩可愛玉名哈斯色多青碧不如和闐逺甚其餘珍竒之物亦罕聞焉山海經北山經潘侯之山其陽多玉其隂多鐵大咸之山其下多玉少咸之山多青碧渾夕之山多銅玉北史西域傳悅般國南界有大山山傍石皆燋鎔流地數十里乃凝堅人取以為藥即石硫黃也唐書回鶻傳堅昆國有金鐵錫每雨俗必得鐵號迦沙為兵絶犀利西域傳石國生瑟瑟文獻通考回紇出玉碙砂金鋼鑽紅鹽按古稱悅般國産石硫黃回紇出碙砂考字書無碙字疑即􅔈砂􅔈砂本出北庭山中亦名北庭砂本草又云石硫黃一名黃􅔈砂隋西域圖記亦云白山出碙砂則所謂碙砂者或即今硫黃未可知也至如史傳所載金玉瑟瑟之屬今之準部不少概見惟多産鐵錫則古今地理衰旺有不可一概論者回部百穀草木之屬回部土地肥瘠不一五穀之種大抵稻米為少名固倫特餘如黍名塔哩克稷名克資勒庫納克高粱名圖布喇巴什庫納克麥名布赫岱青稞名阿爾帕無所不有豆有豌豆名阿克普爾察克扁豆名羅布雅小豆名納呼圖菉豆名瑪實麻名琨珠特有黑白黃三種瓜名喀衮西瓜名塔爾布斯大者重四五十斤甜瓜名塔特里克喀衮小而脆茄名帕廷干瓠名阿實喀巴克紅蘿蔔名則爾達克白蘿蔔名察木古爾菜名格咱克有野蔥名闢雅資黃芽韭名庫爾德秦椒名塔里瑪穆爾魯楚胡椒名木爾楚薑名贊濟必勒樹之有果者石榴名阿納爾蘋果名阿勒瑪木瓜名必喜梨名那什巴第櫻桃名哲訥斯台杏名額魯克柿名阿拉瓦莫濟特核桃名揚阿克李子名愛納魯蒲萄長者名薩伊必圓者名裕租木别有緑色者味倍甘無核截條栽地而生布哈爾部種也名竒石蜜食桃名密惕薩沙布托里棗名竒蘭其桑椹實大而味厚名裕珠瑪可佐糧儲無子者名沙圖特無果之樹則榆名喀喇雅阿特槐名圖呼瑪克栁名喀拉薩斡特大葉楊名喀喇特哷克有小葉楊枝附幹直上不旁出最堅韌名之曰蘇斡巴達爾塔喇克松名喀楚喇柏名喀爾該桐名圖呼喇克花草之形似內地者如玫瑰名古里蘇魯克吉祥草名訥爾格斯小雞冠名塔吉和喇斯大蜀葵名拉列古勒千日紅名古里雅蘇曼鳯仙名赫納向日葵名阿卜塔卜帕喇斯狗尾花名喀摩楚古勒有草焉沿地蔓為藤花紅白子細而扁圓可煮食亦可飼馬其名曰葉斯穆克有草實如繭中絲如細纑名為克頗斯國人取織以為布御製竒石蜜食癸未回語緑蒲萄之名也凡蒲萄皆有子此獨無子截條植地而生回中古亦無此種云數百年前自布哈爾始得之布哈爾去葉爾羌西又數千里前年命取根移植禁苑今成活結實詩以紀事服食明垂貢旅獒苑中初熟緑蒲萄昔同目宿原有子中國蒲萄相傳種來自西域然皆有子者此便離支寧比高魏文帝詔南方龍眼荔枝寧比西國蒲萄石蜜石蜜之音頗近回語豈當時亦曽見此耶廣志徒傳三種色廣志云蒲萄有黃白黑三種燕歌休詡一杯豪竒石讀作平聲蜜食賓方物慎德那辭乾惕勞枝葉蟬封獻者同碧琉璃顆獨中空采條移植上林茂結實頒餐造物功欲笑醱醅歌太白直疑崖蜜詠坡翁本來無子根何託雞卵誰先辨豈窮御製阿克蘇桑椹熟因成八韻詠事甲申嫩條阿克蘇讀如素音初移結實仍當夏五時食黮殊方還獻黮曰梔爾雅詎為梔祇傳烏白原恆有訝見丹紅實出竒詭異寧同尺以計神異經東方有桑椹長三尺五寸碩魁真比寸猶欺迎眸磊落誠軒意可口甘芳孰朵頤鮮進鳳闈欣逺奠熟頒鷺序沐恩滋銜殘漫擬櫻桃誚解熱奚勞甘蔗隨分賜莫將容易看洸洸曽用濟王師我師平回部時所過桑椹豐穟草美逺踰腹地營中恆佐軍食士卒采摘風戾兼足資糗糒之儲至今傳為盛事山海經西山經崇吾之山有木焉圓葉而白柎赤華而黑理其實如枳不周之山爰有嘉果其實如桃其葉如棗黃華而赤柎峚山其上多丹木圓葉而赤莖黃花而赤實槐隂之山其陽多丹粟其隂多榣木崑崙之邱有木焉其狀如棠黃花赤實其味如李而無核名曰沙棠有草焉名曰薲草其狀如葵其味如蔥符惕之山其上多棕柟水經注西河舊事蔥嶺其山高大上生蔥故曰蔥嶺墨山國多葭葦柳栁胡桐白草漢書西域傳鄯善地沙鹵仰穀旁國多葭葦柳栁胡桐白草且末有蒲萄諸果難兜種五穀蒲萄諸果渠梨種五穀與中國同時熟後漢書西域傳西夜生白草有毒北史西域傳于闐土宜五穀桑麻高昌穀麥一嵗再熟多五果又饒漆有草名羊刺其上生蜜而味甚佳多蒲萄酒焉耆穀有稻粟菽麥有蒲葦龜兹出安息香疏勒土多稻粟菽麥朱居國有麥多林果唐書西域傳高昌土沃麥禾皆再熟有草名白疊擷花可織為布焉耆土宜黍蒲萄龜兹土宜麻麥粳稻蒲萄宋史外國傳龜兹有米麥瓜果王延德高昌行紀伊州生胡桐樹經雨即生胡桐律地産五穀惟無蕎麥多美草不生花明史西域傳栁城四面皆田園流水環繞樹木隂翳土宜穄麥豆麻有桃李棗瓜胡蘆之屬而蒲萄最多小而甘無核名鎖子蒲萄于闐桑麻黍禾宛然中土按回部五穀中稻米絶少而史傳所載焉耆疏勒之屬則稱其多稻似不相合抑有其種者不盡布其利歟更以回部旁國推之北史載漕國多稻米唐書載中天竺稻嵗四熟摩揭陀有異稻巨粒悉立穀宜粳稻越底延多稻米文獻通考載烏萇豐稻麥可知外域不絶粳稻之種或舉其僅見者書之至其常産則黍稷粟高粱之屬為厥土之宜矣明史載鎖子蒲萄甘小無核即今之竒石蜜食回部於數百年前傳布哈爾種在明代固當有之耳羽毛鱗介之屬回部之鳥雕名布爾古特海青名喀爾察海免鶻名伊特勒古鷹名鶻斯寒雅名塔哈納克雁名噶斯多鸛而少鶴鸛名哈爾噶鶴名琿水鵓鴣亦巢於木名克克庫克鸚鵡曰沙圖提雉名克爾果爾班鳩之羽五色陸離名帕哈達克鵲之大者幾如雁名薩克則干燕名哈爾魯阿特雀名阿克庫徹喀徹俱巢於室及濱水之岸他如畫眉名布勒布勒百靈名托爾海倒挂名伊資哈克鷃鶉名伯德訥鴿名喀布特爾雞名圖赫依皆木棲鴨名鶚爾德克鵝名阿克阿斯水禽則鵁鶄名阿克烏喀爾鷺名烏喀爾水鴉名喀爾噶其獸則熊名愛伊克虎名約勒巴爾斯豹名伊勒必斯犛牛名喀拉犀名葉克沙赫馬名阿特騾名喀齊爾驢名額伊沙克駱駝名圖噶盤羊名固勒札山羊牡名特克牝名阿楚庫黃羊名哲楞羱羊名布爾喀克鹿名布輝牝鹿名瑪喇勒獐名伊勒巴遜狼名貝哩狐名圖勒齊貍名摩倫豕名通烏斯貓名穆舒克狗名伊特免名托什干鼠名薩特堪灰鼠名題音銀鼠名阿爾斯貂鼠名布勒罕娑羅鼠名蘇勒遜獺名喀瑪蛇名伊蘭有無鱗之魚焉口甚圓身微扁大者七八尺小者六七尺其名魯赫依龜名克里雅爾有文蛤名帕哈察訥格蝦蟆名帕喀野蠶名闢里雅庫爾圖牛馬驢羊諸畜生札達焉大可如拳色或黃或白或如鸚哥嘴者為最貴其堅如石在蛇腹者尤良牲畜有札達則漸羸瘦久則死以生剖得者為靈彼俗祈雨以札達石浸水中咒之輒有驗其人遂名為札達齊山海經西山經崇吾之山有獸焉其狀如禺而豹文虎臂而善投名曰舉父有鳥焉其狀如鳬而一翼一目相得乃飛名曰蠻蠻見則天下大水自峚山至于鍾山是多竒鳥怪獸竒魚皆異物焉觀水多文鰩魚狀如鯉魚魚身而鳥翼蒼文而白首常行西海遊於東海以夜飛其音如鸞雞其味酸甘食之已狂見則天下大穰邱時之水其中多螺母昆崙之邱有獸焉其狀如羊而四角名曰土螻是食人有鳥焉其狀如蜂大如鴛鴦名曰欽原蠚鳥獸則死蠚木則枯有鳥焉名曰鶉鳥是司帝之百服桃水多䱻魚其狀如蛇而四足是食魚玉山有獸焉其狀如犬而豹文其角如牛其名曰狡其音如吠犬見則其國大穰有鳥焉其狀如翟而赤名勝遇是食魚其音如録長留之山其獸皆文尾其鳥皆文首章峩之山有獸焉其狀如赤豹五尾一角其音如擊石其名如當作曰猙有鳥焉其狀如鶴一足赤文青質而白喙名曰畢方其鳴自呌也見則其邑有訛火隂山濁浴之水其中多文貝有獸焉其狀如狸而白首名曰天狗其音如榴榴可以禦凶三危之山有獸焉其狀如牛白身四角其毫如披蓑其名曰是食人有鳥焉一首而三身其狀如􅣍其名曰鴟騩山下多積蛇翼望之山有獸焉其狀如狸一目而三尾名曰歡其音如百聲注言其能作百種物聲也或曰百獸名是可以禦凶服之已疸有鳥焉其狀如烏三首六尾而善笑名曰鵸鵌服之使人不厭又可以禦凶漢書西域傳鄯善有驢馬多槖它焉耆近海水多魚北史西域傳于闐有好馬駝騾焉耆畜有駝馬養蠶不以為絲惟充綿纊有魚鹽之饒龜兹出皮良馬犎牛等多孔雀羣飛山谷間人取而食之孳乳如雞鶩其王家恆有千餘隻云唐書西域傳高昌狗高六寸長尺能曵馬銜燭云出拂林于闐鼠大如蝟色類金出入羣鼠為從初無桑蠶丐鄰國不肯出其王即求婚許之將迎乃告曰國無帛可持蠶自為衣女聞置蠶帽絮中關守不敢驗自是始有蠶女刻石約無殺蠶蛾飛盡得治繭焉耆國有魚鹽利宋王延德高昌行紀伊州有羊尾大而不能走尾重者三斤小者一斤肉如熊白而甚美貴人食馬餘食羊及鳬雁出貂鼠地多馬王及王后太子各養馬放牧平川中彌亘百餘里以毛色分别為羣莫知其數北庭川長廣數千里鷹鷂雕鶻之所生砂鼠大如䨲鷙禽捕食之善馬直絹一匹駑馬充食才直一丈明史西域傳栁城畜有牛羊馬駝按回部飛走諸族雖繁其大槩亦不離乎中土惟無鱗之魚內地罕聞而準部回部則皆有之至如牛馬生札達陶宗儀輟耕録作鮓答如牛黃狗寶之類理非竒異也宋犖筠廊筆記亦載此物可治竒疾難名者然則札達不但産於回中雖內地亦聞有之耳金石珍寶之屬回部所産五金有黃金名阿勒屯白金名庫穆什紅銅名蜜斯黃銅名圖特而無青銅有鉛名庫爾阿遜鐵名圖摩爾錫不多産名喀里葉又有水銀名斯瑪卜􅔈砂名察爾克庫蜜硫黃名古古爾圖硝名碩喇􅔈砂硫黃産天山中天山為準部南屏回部北屏故準回兩部皆有之玉名哈什産和闐南山者為最良河出山中為玉河有紺黃青碧元白數色小者如拳大者如枕因名其河為哈什庫勒土爾畨北山高崖下白石成堆似玉狀若人骨文縷明析顔色光潤質輕脆而不可握相傳為羅漢靈骨以近似名之而實非也鹽名圖斯白者如玉赤者如朱堅者似石亦有金鋼鑽名阿勒瑪斯百鍊不消可以切玉御製和闐玉己卯和闐昔于闐出玉素所稱不知何以出今乃悉情形石藴山含輝耳食傳書生其實産於水在石亦浪名未治斯為璞卞和識其精設云隔石識怪幻乃不經回域定全部和闐駐我兵其河人常至隨取皆瑶瓊驛致貢天閶瑟若孚勝呈瓌寶固匪求方物亦可聼在彼乃恆有何關王道貞璠璵云於魯珵珩云於荆今胡不見出紀載誰果誠博物折中理祛惑期可徵永言識顛末詎貴摛詞英御製賦得和闐玉庚辰玉隴和闐六城之一宛其玉珍賢詎此珍攄誠底方物慎德幸咸賓却納非柔逺分頒庸展親葆光驗垂草瑞色現浮筠如琢良工命匪求給事巡設將擬堯擲仍覺愧先民御製和闐採玉行丁亥和闐昔于闐音訛傳致差今之和闐惟採玉昔之于闐乃採花採花信無用太白寓意蜚詞華採玉供追琢琅玕豈歎埋泥沙然玉亦有别碔砆貌似寧足誇和闐採玉人抱玉出水涯何曽璞裹之不掩瑜與瑕刖足之語本荒誕千秋紀載百無一實真堪嗟御製玉甕聨句有序庚寅金應穰占鳳律韶華載啓玉徵德産龍章懷質初呈將垂紀實之文用叶臚聲之唱粵自崑邱衍脈闐嶺儲精謝氊包席裹於當時不辱西濛之豪敓抒山元水蒼於此日留充東序之正供痕璺猶存界道微分鋸齒輪囷不改挽輸直壓船脣三河滑碾冰奩詎費萬牛回首四部囏攻水磨漫勞重繭生脛因兹度彼良工斷手須草年以俟爾乃資乎利器匠心甫六載而竣此甕初付工琢按常時寶砂􆂣石磨治法計之須二十年乃得藏事玉人有請用秦中所産鋼片雕鏤者試之殊利捷自癸未冬迄己丑長至月閲六年而成程工省十之七陋紀獻䜌鼎之􅑎然難名法物矜燕珤魯璠之瑟若曷副嘉稱然而數典云遙傳觀自近瑪瑙哆言巨麗玫瑰讕語晶瑩殷商亦祗獲三朡炎漢乃空求六璽謏聞未離乎鼠朴真氣或晦於虹藏越考有元當至正之間相傳酒海艷瀆山之製覆廣寒而作鎮凌瓊島以標竒從官咱馬排筵翻匙惠遍衛士質孫備服立仗儀崇轉流竟落叢祠虀蓄徒淹十斛薰沐旋登員嶠檀施特畀千金相其粗礦留餘得地已圖臻瑞應對此礱鋟具美交光尤契嫓援神雲海沿周范之紋襄炭下觀泰一山龍發虞裳之彩銜輝旁燭槫桑腹圍量九一而更贏軒管適符生數面徑參二五而皆合箕籌還協全規矧夫序屆上章國慶剛逢周甲支臨引達慈歡早洽先辛初元酺宴爰開百執羣斟露液三節田家占正月初三日為上正三節祥霙肇布九農喜浹穀精十幹輪初是日甲申第盤盂而品推甲觀一春告協立春前三日鐫琬琰而質叶申堅敷和則韻押七陽聨宿則躔周四舍期爾吟成特達亦曰惟儒是珍顧豫句郤譁囂詎云昭德之至也哉御製竒物大蒙久祕藏飛來不翼羾天閶象山瓌寶應時顯産此玉在葉爾羌西南之間爾山闢爾者回語謂象也麟閣鴻勳邁古揚五譯遂通蔥嶺道三河直抵玉州疆風郵上奏徵諸實臣尹繼善星使遙臨審厥詳創制六年工尚象觀成萬夀喜躋堂驛從西極西清煥臣劉統勳宴接元正元會慶月館涵和㪺沆瀣霞箋分韻戛宫商未春琪蕊豐占集臣陳宏謀先日銀幡協氣彰天施地生驪栗上嶽輸川效􅒸蒙鄉非其所有莫能取臣官保御製惟德之歸敢弗蘉聞昔伊犂卒艱致玉舊有鋸痕二道深三寸許聞是凖噶爾所鋸蓋欲取而未能致者際今闢爾竟呈祥溪流恰值堅冰結運玉時適河水已凍遂由冰而凂運尢為事半功倍石齒先經引鋸鋩六甲徑煩呵護力五丁底費鑿劖忙溫如倐判貞剛脈臣劉綸瑟若全離紫翠匡凌捷轉圜功迥倍璞遄涉逺候才當崖垠澤裔憑交遞臣託庸屯吏回民共樂將厯塊乍知由勃律指途俄報度蒲昌入關環琯風從舜臣于敏中到闕球琳州貢梁嵗溯後庚支協洽律鄰建子復初陽陳庭臣曰供包匭臣王際華御製庇穀豫惟快兆穰韞石徒稱輝泰冒獻琛果見出崑岡葉爾羌一帶山皆崑崙支脈也器因博大琢成甕用稱輪囷滿挹漿爰進嗅人圻瑑妙略侔剞氏􅒂刀良金為攻錯資原利臣素爾訥沙謝磨礲屏未妨速越痕都運輪磑巧逾喀嗎逞雕裝彭亨中穴堪刳腹臣蔡新犖確邊鎪異截肪凹凸飾隨材適就縱橫體合度均賞哆箕口徑周回緣臣福隆安帖妥趺承曲録牀外計以圍尋有半內衡可受石猶強色休瑳璑玼璊伍臣程景伊御製笵匪瓿罍缶甒量瑪瑙那期盛寶露琉璃却勝貯沙糖雲龍隱見瓊華燦山水彌綸藻采煌軒帝蓋形符邃古伊祈圓象辨殊荒逢逢甫覺芝泥吐臣觀保矯矯真教碧沼翔觸擬合膚肌縝密化幾燒尾焰暉芒垂虹雅與無心類臣索琳畏鐵何曽本性忘峯作夏時層蔚緑鱗更雨後潤浮蒼非煙渾起輝含側臣金甡或躍仍依矩折旁别解雷紋鋟鬲甗疇倫金彩幻青黃糾兮縵縵舒英美臣曹秀先御製靈也昭昭貴道藏出岫一般容靉靅在田九見勢軒昻義詮雜説思韓愈爻系文言闡素王刻畫斐然升筍席規橅魁爾鎮瑶廊易陶尤異齊民術臣倪承寬釋詁咸尋急就章井汲十犍詩想像坐消幾斛語徊徨丹書漫弆金絲宅臣奉寬退筆虛留翰墨香園客􅗀筒輸喻似條支鳥卵試形相閎深欲陋巵無當臣劉星煒特達誰矜邸有璋較玨論區終瑣屑採藍剖楚總荒唐考源史陋陀犁克臣莊存與御製典瑞圖登葉爾羌延喜佩寧同獲禹攄忱貢豈比俘湯四城回部耕桑宴回部城落雖多總以葉爾羌喀什噶爾和闐阿克蘇四大城統之萬里新輿尉候望宿飽士欣炊釡溢屢豐農忭瓦盆嘗于焉任土趨紛繹臣吉夢熊藉此申誠走頡頑筆室墨瓶湘几右瑛壺璿碗廣筵場式循天馬來馳皂臣王杰狀準紈牛宛服箱赤壁佳遊摹玉局桃源仙境寫柴桑洗收菡蓞甘膏液臣毛輝祖杓挽鸕鷀絳雪囊盤詠懷任階左磩盂聨明炳殿東廂巨材相什更相伯臣李中簡御製瑰製載賡宜載揚詎數獨珍傳日下訝看雙珏偶承光元玉甕流傳日久至淪作道人菜甕乙丑冬以千金易得貯之承光殿而系以詩但其質不純玉瑑制亦未精工與今時之甕相去奚啻霄壤且瀆山酒海成至見於正史當時取義亦未當也玢豳精質還過彼斑駁頑姿孰友卬刮楖烏容儕伯仲瑕瑜寧止隔微芒拭塵幸免虀厨溷臣邊繼祖縱飲嗤緣酒海狂退食記殊供掇拾輟耕録太肆夸張猗與贄鰈供鶼盛臣曹文埴允矣周球夏鼎行足鄙五都評價值矧偕九牧萃梯航調和兕爵三豳籥臣金士松斟酌衢尊四達莊署欵􅑍貞攝提格紀年肇叶未渠央譜芳榴實多蕃衍臣彭元瑞御制惡旨銀鏤戒樂康機事難施笑端木銘詞莫匹憶東方希珍奕葉蘄永保慎德名言味最長御製和闐採玉圖辛卯和闐採美玉還成採玉圖撈水出球琳他山攻琢磨叶纒頭採玉嘉無比賚以騰格並以米回人採玉者賚錢米以示奬勞視所採大小多寡等差之上供嵗貢下私鬻亦弗嚴禁聊聽爾和闐採玉充貢嵗有常例餘亦有私售者雖為禁制然利之所在亦弗深求且良玉仍供內地貨肆之用耳即今中華玉頗多追琢其章市肆羅捐金捐珠古有訓其義或得相同科御製和闐採玉壬辰和闐採玉春秋貢小者氊包大輿送置郵互遞其事常亦豈役民致勞衆玉河富産瓊瑶瑛于思掇取久慣經了知非自璞中出空傳刖足泣楚廷傳紀卞和獻玉事以玉在璞中包孕未剖人不知其為玉以致刖足若今和闐之玉産自河中回人皆能取之且可預定玉質之高下並無别有石璞包其外人不易知也向作和闐採玉行是以有何曾璞裹之之句獲玉者賚空弗罰賚以米布用靡詘何有徵丁采藍溪樂府三歎韋應物米布原非金帛偶以此纒頭頗竊取大者固難小易藏蘇揚市鬻翻多有回城採玉取其嵗充職貢不過賜以米布酬勞今南中玉肆所在率多精璆一望知為和闐之産可見回人及往來市儈徇利透漏然仍流通中華可聽之耳利之所在計所工奚必一一嚴究窮製器仍或歸天府擲山不同中之同山海經西山經丹水中多白玉是有玉膏其源沸沸湯湯黃帝食食是饗是生元玉黃帝乃取峚山之玉榮而投之鐘山之陽瑾瑜之玉為良堅栗精密濁澤而有光注濁謂潤厚五色發作以和柔剛天地鬼神是食是饗君子服之以禦不祥槐江之山其上多青雄黃多藏琅玕黃金玉桃水多白玉嬴母之山其下多青石長留之山多文玉石章峩之山多瑶碧符惕之山下多金玉騩山其上多玉而無石天山多金玉有青雄黃泑山其上多嬰短之玉其陽多瑾瑜之玉其隂多青雄黃翼望之山多金玉水經注于闐南山上多玉石墨山國出玉沙車有鐵山出青玉屈茨北二百里有山夜則火光晝日但煙人取此山石灰冶此山鐵恆充三十六國用蒲昌海地廣千里皆為鹽而剛堅行人所徑畜産皆布氊卧之握發其下有大鹽方如巨枕以次相纍故蒲昌亦有鹽澤之稱漢書西域傳鄯善出玉莎車有鐵山出青玉子合出玉石于闐多玉石姑墨出銅鐵雌黃龜兹能鑄冶有鉛山國出鐵難兜有銀銅鐵張華博物志西域硫黃出且彌山去高昌八百里北史西域傳高昌出赤鹽味甚美復有白鹽其形如玉取以為枕貢之中國魏太武討馬耆破之獲其珍竒異玩譎詭難識之物龜兹饒銅鐵西北大山中有如膏者流出成川行數里入地狀如䬾糊甚臭服之髮齒落者更生癘人皆愈疏勒多銅鐵錫雌黃唐書西域傳于闐有玉河國人夜視月光盛處必得美玉龜兹出黃金宋史外國傳于闐有玉一塊重二百三十七斤王延德高昌行紀伊州有礪石剖之得賓鐵謂之喫鐵石金嶺口寶貨所出北庭北山中出碙砂山中常有煙氣涌起無雲霧至夕光焰若炬火照見禽鼠皆赤彩按回部金玉並産而玉石尤良山海經載丹水中多白玉是玉固有産於水者而于闐玉河載諸史傳援古證今尤為毗切琛球輦致輝映上林别有痕都斯坦玉器製作精良痕都斯坦部居回部之南比因化浹天方得與闐産偕來仰邀宸賞至於銅鉛所産足儲泉府之源鹽鐵所資取給民生之用百産滋豐地不愛寶幾與中土比埒即疆域之逺恢致物宜之畢獻誠非曩代侈陳一二異物以誇聲教者比矣欽定皇輿西域圖志卷四十三欽定四庫全書欽定皇輿西域圖志卷四十三
