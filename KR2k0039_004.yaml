front:
  text: 欽定四庫全書欽定皇輿西域圖志卷八
  hash: sha256:ff3af0f8de825942aade62f00a1cb4b88c4ffbca0077cf3e09e2909401b5c28e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0039_WYG_004-1a, image: WYG0500/WYG0500-0107c.png}
body:
  text: 疆域臣等謹按古者度地分野辨服區州禹迹成經職方命氏申郊圻而固封守列藩鎮以周天下莫不賅通八埏條貫九域此地理郡國之志所由作也若夫大荒以外提封不及號稱四塞而西境尤廣夏書即敘之義僅紀流沙王制狄鞮之通未區方域三代以降紀載日詳班范二史舊稱該洽亦不過臚列國之名稱凖道里之逺近其於都城亭堡之殊形原隰墟沙之異致罕得而詳焉唐志西域兼採釋氏所述稱名頗異於古列為州府僅曰羈縻錯壤之疆域不分領州之名號或缺揆厥所由豈非存駕馭之名鮮開闢之實有都護校尉之置而不能革單于之頭銜有安西北庭之𨽻而不能登農部之版籍是以方隅粗具圭臬難徴也歟我朝統一函夏式廓丕基兹復會逄盛際收凖夷之疆索輯回部之昄章其人民足以守耕牧之業其土宜足以昭貢賦之經爰設郡縣建學校與內地赤縣神州相表裏固已逺軼漢唐而上矣今試覽其崖略玉關東峙洱海西環廬帳區分城垣保界莫不仰流鱗集繩貫絲聯以成大一統之盛於是區列部以居方辨廣輪而知數首紀安西南北路次紀天山南北路表百餘年謨烈之長著二萬里聲靈之逺其歷代以來沿革故實史傳足徵者亦隨地引證使首尾貫穿用資考鏡夫不履虞淵之濵不知日月之所屆不登崑崙之頂不悟天地之無窮臣等躬逢郅治記載鴻圖括兩戒於階庭鞏九州如戶闥是誠伊古以來郡國地理諸書所未臻之極軌也志疆域第五
  hash: sha256:a64ca1a074890e7becc1112bee0fa11fe7e45750a22dea56b3ee0a6c3b811b93
