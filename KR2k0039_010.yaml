䕶屯可汗浮圖城與高昌相影響其地必與高昌北境相屬故得藉此以為聲援今濟木薩與東北境之伯什特勒克皆有舊城而自濟木薩南踰天山通闢展即高昌地疑漢時金滿城唐時浮圖城故址于是乎在也處月内屬即其地置金滿沙陀二州金滿居西即漢金滿城舊地又為金滿縣𨽻北庭都䕶府皆以漢城得名又考漢書匈奴東蒲類王降都䕶分車師後王之西為烏貪訾離地以處之烏貪訾離南與且彌接為今之特訥格爾即阜康縣治則特訥格爾以東應屬車師後王地魚豢魏畧載車師後部王治于賴城與漢書所載烏貪訾離國治于婁谷者境本毗連音亦相近疑于賴城即在于婁谷畢陸即漢卑陸字之訛也至漢前國後國即唐前庭後庭名號相沿大畧可証然唐時北庭四縣疆域甚廣應不止車師後王之地以地理志考之後庭縣注云本蒲類是兼有蒲類國也輪臺縣本漢輪臺地是兼有焉耆國也惟金滿縣即金滿城為漢車師後國之地是不得謂唐之後庭即漢之後國者要不得謂漢之後國非唐之北庭矣得勒呼蘇台得勒呼蘇台在伯什特勒克城南五十里其西二十里為伊克呼蘇台又東接奇臺縣界以上屬阜康縣欽定皇輿西域圖志卷十欽定四庫全書欽定皇輿西域圖志卷十疆域三安西北路二迪化州屬統縣三昌吉綏來阜康東至木壘烏蘭烏蘇阜康縣屬之得勒呼蘇台接鎮西府奇臺縣界東南逾山接天山南路闢展界西南接伊犁東路北通塔爾巴噶台西至綏來縣屬之安濟哈雅接天山北路庫爾喀喇烏蘇界迪化州治迪化州治在烏魯木齊東距鎮西府一千三百八十里距京師八千八百九十里居天山之陰地當孔道托克喇鄂拉博克達鄂拉環其東烏可克達巴哲爾格斯鄂拉拱其南鄂倫淖爾瀦其左烏魯木齊郭勒經流其南北山環水繞土膏沃衍宜種殖舊為凖噶爾庫木諾雅特逰牧處亦噶勒丹多爾濟之昻吉乾隆二十年正月大兵進討凖噶爾噶勒丹多爾濟率其屬望風降地皆内屬有舊城周可三里賜名迪化别于舊城北建迪化新城門四東曰惠孚西曰豐慶南曰肇阜北曰憬譓在阿勒塔齊郭勒東支流環抱之内新城内有萬壽宫城隍廟提督駐此城東有關帝廟舊城西亦有闗帝廟龍王廟乾隆三十八年改設直隸迪化州于迪化城西三十里建鞏寧城門四東曰承曦西曰宜穡南曰軌同北曰樞正為知州治城内有萬壽宫闗帝廟城隍廟雷雨風神廟城東為文廟城東南為先農壇龍王廟鎮迪道駐此阿勒塔齊郭勒東西有新舊二屯見屯政門共建六堡堡各四門曰惠徠堡東憬德門西宣威門南迎陽門北拱化門曰屢豐堡東鬯風門西調露門南麗照門北正衡門曰宣仁堡東元善門西利和門南依光門北奉朔門曰懐義堡東登春門西稔秋門南薫溥門北階平門曰樂全堡東引恬門西遂成門南大亨門北永貞門曰寶昌堡東延韶門西成泰門南章教門北翊辰門州境東西一百四十里東至博克達鄂拉東北接阜康縣界西至頭屯河接昌吉縣界南北五百里南至根特克接闢展界北至葦湖按山北凖部為烏孫突厥舊俗逐水草無城郭史傳所稱古今不爽後以回部服屬凖噶爾間有築城山北者而於額魯特穹廬氊帳之舊則未之或易自入版圖後天朝制度維新烏魯木齊為凖部東境勝壤始則築城建堡屯政軍政以次經理復肇設州縣建置學校風教蔚興與内地無異古稱行國不土著之區幸際昌時俾其俗蒸然丕變稱極盛焉其地于漢為蒲類國于唐為北庭大都䕶府後入吐蕃為考証于後漢書西域傳蒲類國王治天山西疏榆谷西南至都䕶治所都䕶治烏壘城今屬哈喇沙爾千三百八十七里後漢書西域傳蒲類國東南去長史所居千二百九十里長史治柳中今屬闢展唐書地理志北庭大都䕶府領後庭縣本蒲類隸西州後來屬寶應元年更名有蒲類郝遮鹹泉三鎮特羅堡元史地理志自上都西北行六千里至回鶻五城唐號北庭置都䕶府至元五年海都叛世祖逆敗之北庭按天山自托克喇鄂拉至博克達鄂拉百餘里之間南北綿亘迪化州當其西境漢書西域傳獨於蒲類國曰在天山西者當即今迪化州境也又傳稱東蒲類王兹力支降都䕶分車師後王之西為烏貪訾離地以居之是蒲類故地初在東陲既降都䕶後乃始西遷為蒲類國在天山西也漢書烏貪訾離國蒲類國雖並載而不啻一國在今則為迪化州昌吉縣境特其二國分界處不可考耳唐後庭縣注本蒲類故有蒲類鎮亦以舊國得名其郝遮鹹泉特羅諸鎮堡方隅疆域不可考矣唐書回鶻傳阿史那賀魯之盗北庭婆閏以騎五萬助契苾何力等破賀魯收北庭安西北庭自天寶末失闗隴朝貢道隔伊西北庭節度使李元忠數遣使奉表不至貞元二年假道回鶻乃得至長安帝進元忠為北庭大都䕶自是道雖通而虜求取無涘沙陀别部六千帳與北庭相依亦厭裒索至三葛禄白眼宇厥素臣回鶻者宻附吐蕃故吐蕃因沙陀共寇北庭北庭䧟葛禄取深圖川回鶻大恐稍南其部落以避之吐蕃傳北庭沙陀别部叛吐蕃因是陷北庭都䕶府安西道絶獨西川人尚為唐守按唐貞觀二十三年以阿史那賀魯部落置瑶池都督府永徽四年廢顯慶二年擒賀魯分其地置都䕶都督諸府其役屬諸胡皆為州總隸北庭都䕶自今迪化州西抵伊犁皆其境也而迪化州屬境為天山北一大都會應為唐時北庭都䕶駐防之所爰舉史傳証之其隨地分見者析著各條之下復統論北庭大略如此顧唐自天寶末貢道中阻厥後北庭䧟入吐蕃伊西以外均非唐有即初擒賀魯開置北庭之始亦不過遙設州府以示覊縻實則户口不登貢賦不入曾不再傳俱歸淪棄是則天山迤北從古未隸中國輿圖信有徴矣非我皇朝德威遐鬯什百曩古曷由胥化外而疆索之哉頭道灣庄頭道灣庄在州治北二十五里阿勒塔齊郭