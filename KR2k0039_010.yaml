彬格遜淖爾南境左右諸河環抱之間與今綏來縣全境形勢適符而唐得之以為鹽泊都督府者也惟地理志鹽泊都督府隸北庭都䕶突厥傳隸安西都䕶説不相同然考當時北庭大都䕶府統縣四金滿輪臺後庭西海輪臺在龜兹東西海應即西突厥傳所謂雷翥海是北庭所轄之境甚廣且據地理志十姓部落皆隸北庭惟四鎮都督府州三十四河西内屬諸胡州十二府二西域府十六州七十二則隸安西都䕶府兩都䕶府境地多寡適中如突厥傳所云則十姓部落亦隸安西其北庭所轄不應太小且安得輪臺西海而縣之邪此當以地理志之説為正也陽巴勒噶遜陽巴勒噶遜在縣治東三十里舊説以為古陽闗者非是説詳疆域一敦煌縣條圖古里克圖古里克在陽巴勒噶遜東五十里西北距綏來縣治八十里圖古里克郭勒出天山北麓北流經其地有圖古里克塘巴克呼蘇巴克呼蘇在綏來縣治西四十里南距哈屯博克達鄂拉一百里當孔道設有破城子塘按唐書突厥傳由焉耆北八日行得西突厥北庭與處月處宻諸種雜處月即漢車師後城金滿地處宻應其西又咄陸以處月處宻兵圍天山而不克孝恪追北抵遏索山斬千餘級降處宻部而歸遏索山應即今哈屯博克達鄂拉處宻部應在其北疑與今之巴克呼蘇相近烏蘭烏蘇烏蘭烏蘇在巴克呼蘇西四十里和爾郭斯和爾郭斯舊對音為和落霍澌在烏蘭烏蘇西十里東距綏來縣治八十里地有和爾郭斯郭勒乾隆二十三年正月超勇郡王將軍䇿布登扎布以四百人追凖噶爾從賊布庫察漢哈薩克沙喇等至此賊衆千餘以輜重先行賊據險設伏我兵至賊蜂聚鎗礟四集䇿布登扎布奮勇突圍擒其宰桑渥赭特殱衆四百我軍無一傷者賊乃潰散御製和落霍澌行戊寅今春我師勦逆夷首戰實和落霍澌斬將搴旗早報㨗酬勞頒賚已有差即今生解俘囚至曰渥赭特宰桑伊散秩大臣曾授職乃敢倡亂如鴞鴟面詢彼所致敗故咋舌惟嘆天奪其彼衆猶有千餘騎覘知我寡設計奇輜重逺行誘我逐層層伏賊據險巇官兵四百始馳至少騎示弱山之陲我進彼乃蠭甬集鋭礟如雨循環施我軍曾無一傷者百靈擁䕶信有之衝鋒突入矢齊發賊乃喪膽紛離披鹿埵隴種各逃兵大鞣大膞張軍威殱彼屍僵近四百負傷遁者數無訾是誠天助額手慶奮勇要亦資人為問率軍者其人誰超勇親王家聲貽將軍䇿布登扎布為超勇親王額駙䇿楞之子其兄成衮扎布襲封親王䇿布登扎布以奮勇著績爵封郡王亦賜號超勇博羅特克圖魯庫博羅特克圖魯庫在巴克呼蘇西二十里東距綏來縣治一百里和爾郭斯郭勒西安濟哈雅安濟哈雅在博羅特克圖魯庫西南五十里東距綏來縣治一百五十里南北有山安濟哈雅郭勒經流其地形勢𦂳嚴饒水草宜耕牧舊凖噶爾部噶勒丹多爾濟之姪扎納噶爾布㳺牧於此乾隆二十二年四月呢嗎與噶勒丹多爾濟不協説扎納噶爾布殺之及所屬舊宰桑等據其餘衆與呢嗎扎哈沁為一欲據凖噶爾為台吉乃自安濟哈雅移博羅塔拉而去後為布爾古特台吉渾齊等擒殺其部悉定東為巴哈安濟哈雅西為伊克安濟哈雅西接庫爾喀喇烏蘇界以上屬綏來縣阜康縣治阜康縣治舊地名特訥格爾在迪化州治東北二百里舊為凖噶爾圖爾古特部㳺牧處入版圖後建阜康堡門四東曰綏惠西曰振武南曰麗陽北曰寧朔乾隆四十一年設阜康縣隸迪化州縣境東西三百十里東至得勒呼蘇台接鎮西府奇臺縣界西至甘泉舖接迪化州界南至天山北至葦湖漢書西域傳烏貪訾離國王治于婁谷東與單桓南與且彌西與烏孫接按漢且彌國在天山南金嶺北為山北六國之一烏貪訾離南與且彌國接可知其國在博克達鄂拉之北與今阜康縣治之特訥格爾方位相合應即其地又烏貪訾離與烏魯木齊字音相近特訥格爾與烏魯木齊境界毗接在漢時當是一國地故其名雖變而不相離也又漢書稱烏貪訾離為車師後王西境分國是其東境應與車師後國接今阜康縣屬東境當屬車師後王國地詳見後濟木薩條賽因塔喇賽因塔喇在阜康縣治東六十里南距博克達鄂拉八十里平原沃壤廣饒水草宜耕牧又東三十里為滋泥泉塘漢書西域傳單桓國治單桓城去長安八千八百七十里按漢烏貪訾離國東與單桓接今阜康縣治為烏貪訾離地賽因塔喇居其東境應即單桓國地漢書西域傳稱單桓户止二十七其國甚小略如今縣屬之一塘耳庫里葉圖庫里葉圖在賽因塔喇東六十里西距阜康縣治一百二十里納里特納里特在庫里葉圖東二十里西距阜康縣治一百四十里又東十里為三台塘濟木薩濟木薩在三台塘東七十里西距阜康縣治二百三十里舊城一乾隆三十七年增築賜名愷安門三東曰麗旭西曰同風南曰覃惠又新建保惠城門三東曰舒景西曰阜登南曰萃昌舊城西五里為柳樹溝建堡一曰時和門三東曰皥平西曰肅正南曰麗照又西二十五里為雙岔河建堡一曰育昌門三東曰廣生西曰徠極南曰兆嘉俱有屯田見屯政門濟木薩東北四十里為伯什特勒克有舊城漢書西域傳車師後王姑句與匃奴南將軍地接普戊巳校尉徐普欲分明其界召姑句使證之不肯擊之姑句馳突出髙昌壁入匃奴單于執送因請其罪不聽斬姑句建國二年車師後王須置離欲亡入匈奴戊巳校尉刁䕶聞之騐問詞服都䕶但欽斬置離兄輔國侯狐蘭支將置離衆二千餘人驅畜産舉國亡降匈奴後漢書西域𫝊置戊部候居車師後部候城相去五百里又自髙昌壁北通後部金滿城五百里後王居塗務谷去長史所居五百里去洛陽九千六百二十里北與匈奴接後部西通烏孫建武二十一年遣子入侍光武遣還之乃附屬匈奴永元八年戊巳校尉索頵欲廢後部王涿鞮涿鞮反擊前王尉卑明年漢討涿鞮入北匈奴追斬之立涿鞮弟農奇為王永寧元年後王軍就及母沙麻叛殺部司馬延光四年長史班勇擊斬之永建元年勇率農奇子加特奴擊呼衍王破之立為後王陽嘉四年呼衍王侵後部救之永興元年車師後部王阿羅多亡走北匈奴中立後部故王軍就質子卑君為後部王後阿羅多還與卑君爭國戊校尉閻詳許復為王乃詣詳降於是收奪所賜卑君印綬更立阿羅多為王魏畧西戎傳北新道西行東至且彌國西且彌國單桓國畢陸國蒲陸國烏貪國皆并屬車師後部王治于賴城魏賜其王號大都尉受魏王印唐書西域傳髙昌王文泰與西突厥通以金厚餉西突厥欲谷設約有急為表裏使葉䕶屯可汗浮圖城地理志北庭大都䕶府本廷州貞觀十四年平髙昌以西突厥泥伏沙鉢羅葉䕶阿史那賀魯部落置長安二年為北庭都䕶府縣四金滿輪臺後庭西海按漢車師後國南與車師前國接班書謂之後國范書謂之後部今天山南闢展屬為車師前部地詳見天山南路自濟木薩南踰天山通闢展所屬之交河即漢書由前部高昌壁通後部金滿城之路是車師後王國在今阜康縣境内而所謂金滿城者與今濟木薩為近似矣闢展北倚天山踰山為唐西突厥地葉䕶屯可汗浮圖城與高昌相影響其地必與高昌北境相屬故得藉此以為聲援今濟木薩與東北境之伯什特勒克皆有舊城而自濟木薩南踰天山通闢展即高昌地疑漢時金滿城唐時浮圖城故址于是乎在也處月内屬即其地置金滿沙陀二州金滿居西即漢金滿城舊地又為金滿縣𨽻北庭都䕶府皆以漢城得名又考漢書匈奴東蒲類王降都䕶分車師後王之西為烏貪訾離地以處之烏貪訾離南與且彌接為今之特訥格爾即阜康縣治則特訥格爾以東應屬車師後王地魚豢魏畧載車師後部王治于賴城與漢書所載烏貪訾離國治于婁谷者境本毗連音亦相近疑于賴城即在于婁谷畢陸即漢卑陸字之訛也至漢前國後國即唐前庭後庭名號相沿大畧可証然唐時北庭四縣疆域甚廣應不止車師後王之地以地理志考之後庭縣注云本蒲類是兼有蒲類國也輪臺縣本漢輪臺地是兼有焉耆國也惟金滿縣即金滿城為漢車師後國之地是不得謂唐之後庭即漢之後國者要不得謂漢之後國非唐之北庭矣得勒呼蘇台得勒呼蘇台在伯什特勒克城南五十里其西二十里為伊克呼蘇台又東接奇臺縣界以上屬阜康縣欽定皇輿西域圖志卷十
