body:
  text: 疆域三安西北路二迪化州屬統縣三昌吉綏來阜康東至木壘烏蘭烏蘇阜康縣屬之得勒呼蘇台接鎮西府奇臺縣界東南逾山接天山南路闢展界西南接伊犁東路北通塔爾巴噶台西至綏來縣屬之安濟哈雅接天山北路庫爾喀喇烏蘇界迪化州治迪化州治在烏魯木齊東距鎮西府一千三百八十里距京師八千八百九十里居天山之陰地當孔道托克喇鄂拉博克達鄂拉環其東烏可克達巴哲爾格斯鄂拉拱其南鄂倫淖爾瀦其左烏魯木齊郭勒經流其南北山環水繞土膏沃衍宜種殖舊為凖噶爾庫木諾雅特逰牧處亦噶勒丹多爾濟之昻吉乾隆二十年正月大兵進討凖噶爾噶勒丹多爾濟率其屬望風降地皆内屬有舊城周可三里賜名迪化别于舊城北建迪化新城門四東曰惠孚西曰豐慶南曰肇阜北曰憬譓在阿勒塔齊郭勒東支流環抱之内新城内有萬壽宫城隍廟提督駐此城東有關帝廟舊城西亦有闗帝廟龍王廟乾隆三十八年改設直隸迪化州于迪化城西三十里建鞏寧城門四東曰承曦西曰宜穡南曰軌同北曰樞正為知州治城内有萬壽宫闗帝廟城隍廟雷雨風神廟城東為文廟城東南為先農壇龍王廟鎮迪道駐此阿勒塔齊郭勒東西有新舊二屯見屯政門共建六堡堡各四門曰惠徠堡東憬德門西宣威門南迎陽門北拱化門曰屢豐堡東鬯風門西調露門南麗照門北正衡門曰宣仁堡東元善門西利和門南依光門北奉朔門曰懐義堡東登春門西稔秋門南薫溥門北階平門曰樂全堡東引恬門西遂成門南大亨門北永貞門曰寶昌堡東延韶門西成泰門南章教門北翊辰門州境東西一百四十里東至博克達鄂拉東北接阜康縣界西至頭屯河接昌吉縣界南北五百里南至根特克接闢展界北至葦湖按山北凖部為烏孫突厥舊俗逐水草無城郭史傳所稱古今不爽後以回部服屬凖噶爾間有築城山北者而於額魯特穹廬氊帳之舊則未之或易自入版圖後天朝制度維新烏魯木齊為凖部東境勝壤始則築城建堡屯政軍政以次經理復肇設州縣建置學校風教蔚興與内地無異古稱行國不土著之區幸際昌時俾其俗蒸然丕變稱極盛焉其地于漢為蒲類國于唐為北庭大都䕶府後入吐蕃為考証于後漢書西域傳蒲類國王治天山西疏榆谷西南至都䕶治所都䕶治烏壘城今屬哈喇沙爾千三百八十七里後漢書西域傳蒲類國東南去長史所居千二百九十里長史治柳中今屬闢展唐書地理志北庭大都䕶府領後庭縣本蒲類隸西州後來屬寶應元年更名有蒲類郝遮鹹泉三鎮特羅堡元史地理志自上都西北行六千里至回鶻五城唐號北庭置都䕶府至元五年海都叛世祖逆敗之北庭按天山自托克喇鄂拉至博克達鄂拉百餘里之間南北綿亘迪化州當其西境漢書西域傳獨於蒲類國曰在天山西者當即今迪化州境也又傳稱東蒲類王兹力支降都䕶分車師後王之西為烏貪訾離地以居之是蒲類故地初在東陲既降都䕶後乃始西遷為蒲類國在天山西也漢書烏貪訾離國蒲類國雖並載而不啻一國在今則為迪化州昌吉縣境特其二國分界處不可考耳唐後庭縣注本蒲類故有蒲類鎮亦以舊國得名其郝遮鹹泉特羅諸鎮堡方隅疆域不可考矣唐書回鶻傳阿史那賀魯之盗北庭婆閏以騎五萬助契苾何力等破賀魯收北庭安西北庭自天寶末失闗隴朝貢道隔伊西北庭節度使李元忠數遣使奉表不至貞元二年假道回鶻乃得至長安帝進元忠為北庭大都䕶自是道雖通而虜求取無涘沙陀别部六千帳與北庭相依亦厭裒索至三葛禄白眼宇厥素臣回鶻者宻附吐蕃故吐蕃因沙陀共寇北庭北庭䧟葛禄取深圖川回鶻大恐稍南其部落以避之吐蕃傳北庭沙陀别部叛吐蕃因是陷北庭都䕶府安西道絶獨西川人尚為唐守按唐貞觀二十三年以阿史那賀魯部落置瑶池都督府永徽四年廢顯慶二年擒賀魯分其地置都䕶都督諸府其役屬諸胡皆為州總隸北庭都䕶自今迪化州西抵伊犁皆其境也而迪化州屬境為天山北一大都會應為唐時北庭都䕶駐防之所爰舉史傳証之其隨地分見者析著各條之下復統論北庭大略如此顧唐自天寶末貢道中阻厥後北庭䧟入吐蕃伊西以外均非唐有即初擒賀魯開置北庭之始亦不過遙設州府以示覊縻實則户口不登貢賦不入曾不再傳俱歸淪棄是則天山迤北從古未隸中國輿圖信有徴矣非我皇朝德威遐鬯什百曩古曷由胥化外而疆索之哉頭道灣庄頭道灣庄在州治北二十五里阿勒塔齊郭勒北行分流處東有二道灣三道灣四道灣庄五道灣庄五道灣庄在州治東北二十五里踰阿勒塔齊郭勒至其地在屢豐堡東又東有六道灣七道灣八道灣庄九道灣庄九道灣庄在五道灣東八里踰河至其地又東有熱水泉按自頭道灣庄至此凡九庄兹舉居民殷庶者著為綱餘從附叙云卡子灣庄卡子灣庄在五道灣北十里自五道灣至此博克達鄂拉峙其東南山麓流泉環帶庄户鱗比致為勝秀古木古木在州治東北四十里乾隆二十七年于其地建輯懐城門四東曰承恩西曰敷信南曰暘若北曰星從城北有輯懐城塘地窩舖地窩舖在州治西三十里當鞏寧城北踰烏魯木齊支河至其地有地窩舖塘土墩子土墩子在地窩舖西三十里東距州治六十里當鞏寧城西北踰烏魯木齊支河至其地有土墩子塘三個泉庄三個泉庄在鞏寜城西北三十里東距州治七十里其南二十里為西三個泉泉皆滙流入烏魯木齊郭勒倉房溝庄倉房溝庄在西三個泉庄南二十里大西溝大西溝在鞏寧城東南三十里東北距州治二十里當烏魯木齊郭勒發源處水泉饒沃居民櫛比東踰烏魯木齊郭勒十里有小河出南山麓北流居民依之稱南山户庄鹽池墩鹽池墩在州治南五十里阿勒塔齊郭勒流其東有鹽池墩塘又東南行踰阿勒塔齊郭勒循南山麓稱達巴根户庄又東南為多倫達巴又東南行出山接闢展界以上屬迪化州本境昌吉縣治昌吉縣治舊地名昌吉在迪化州西東距州治一百二十里昌吉郭勒經流其地乾隆二十七年於昌吉郭勒西建寧邊城門四東曰文同西曰武定南曰諧邇北曰爕遐乾隆三十八年設縣隸迪化州縣治東有文廟八蜡廟火神廟城北有闗帝廟東北有先農壇昌吉郭勒東西有三屯見屯政門縣境東西二百里東至頭屯河接迪化州界西至呼圖克拜郭勒接綏來縣界南至天山北至葦湖羅克倫羅克倫在縣治西二十里昌吉羅克倫舊為噶勒丹多爾濟逰牧之所乾隆二十年三月大兵進討凖噶爾噶勒丹多爾濟偕其兄子扎納噶爾布以二千五百餘户降二十一年十一月扎納噶爾布叛二十二年二月殺噶勒丹多爾濟於安濟哈雅扎納噶爾布旋為布爾古特台吉渾齊等擒斬以獻所部乃平漢書西域𫝊蒲類後國王去長安八千六百三十里按漢書西域傳載蒲類前國去長安八千三百六十里後國去長安八千六百三十里則後國當居前國之西北境今昌吉縣東南與迪化州接壤迪化州為蒲類前國則昌吉為蒲類後國可知也又按羅克倫與樓蘭字音相近疑即其國故地然考樓蘭漢元鳯四年改名鄯善後漢書稱自敦煌出玉門闗涉鄯善玉門闗在今安西州敦煌縣西以方位道里考之樓蘭故地當在今敦煌縣西境外之色爾騰海今之羅克倫在天山北與敦煌西境之色爾騰海南北相去千餘里似非樓蘭故地或當時樓蘭人曾徙居山北即名其地為樓蘭後遂訛為羅克倫未可知耳蘆草溝蘆草溝在羅克倫西五十里東距昌吉縣治七十里東為小蘆草溝設有大小蘆草溝塘呼圖克拜呼圖克拜舊對音呼圖壁在蘆草溝西二十里東距昌吉縣治九十里乾隆二十九年建景化城門四東曰熙景西曰寶成南曰阜薫北曰溥信呼圖克拜郭勒出天山北麓北流經其東以上屬昌吉縣綏來縣治綏來縣治舊地名瑪納斯在昌吉縣西北東南距昌吉縣治二百二十里距迪化州治三百四十里瑪納斯郭勒環其西塔什郭勒一名哈齊克郭勒經其東俱從天山北麓發源北流百餘里左右迴抱地勢寛平水泉饒裕亦古都會也舊為凖噶爾呼拉瑪部㳺牧地納木奇之昻吉乾隆二十八年入版圖後建綏來堡門三曰即叙曰迪康曰覃化四十二年建左右二城左為綏寧城門四東曰迎羲西曰兆成南曰來薫北曰寧漠右為康吉城門四東曰延旭西曰慶豐南曰麗端北曰鞏遐兩城南北相倚西面設闗曰靖逺闗門之内闗帝廟城隍廟在焉四十四年設綏來縣隸迪化州縣境東西一百二十里東至圖古里克接昌吉縣界西南至安濟哈雅接庫爾喀喇烏蘇界南至天山北至葦湖縣治東二十里有塔什河塘漢書西域傳宣帝初即位公主及昆彌皆遣使上書言匈奴復連發大兵侵擊烏孫取車延惡師地收人民去使使謂烏孫趣持公主來欲隔絶漢後漢書西域傳移支國居蒲類地其人勇猛敢戰以冦鈔為事皆被髪隨畜逐水草不知田作唐書突厥傳西突厥由焉耆北八日行得北庭乙毗鉢羅肆葉䕶可汗忌泥孰泥孰亡入焉耆後肆葉䕶可汗走康居國人迎泥孰於焉耆立之是為咄陸可汗賀魯取咄陸可汗故地及敗裂其地為州縣以處諸部胡禄屋闕部為鹽泊都督府隸安西都䕶府地理志鹽泊都督府以胡禄屋闕部置隸北庭都䕶府按酈道元水經注焉耆之北敦薨之山在匈奴之西烏孫之東是匈奴烏孫交界處在焉耆之北今自山南哈喇沙爾北踰天山是其地也今之迪化州昌吉縣為漢時蒲類前後國説見本卷其直北當屬匈奴西境由是以西為烏孫東境南與焉耆相直如今伊犂東南路即漢時烏孫國之東境也後漢書移支國居蒲類地應在今昌吉縣西與今綏來縣全境方位相合應屬後漢移支國地陽巴勒噶遜南去哈喇沙爾五百里以唐書由焉耆北八日行為西突厥北庭之文証之則此當屬唐時西突厥北庭惟其境在焉耆正北本相近附是以泥孰亡入焉耆國人迎而立之也再考當時五咄陸部俱屬西突厥東境而葛邇禄胡屋即胡禄屋闕鼠尼施三姓於聖厯四年内屬境地毗連以今地位考之葛邏禄居北當在塔爾巴噶台納林和博克一帶與處木昆部雜居鼠尼施為處半部在裕勒都斯一帶更以博羅塔拉左右之為攝舍提暾部伊犁左右之為突騎施索葛莫賀部伊犁以西之為突騎施阿利施部推之説並見十二十三卷及本卷各條下則所謂胡禄屋闕部者應在今額彬格遜淖爾南境左右諸河環抱之間與今綏來縣全境形勢適符而唐得之以為鹽泊都督府者也惟地理志鹽泊都督府隸北庭都䕶突厥傳隸安西都䕶説不相同然考當時北庭大都䕶府統縣四金滿輪臺後庭西海輪臺在龜兹東西海應即西突厥傳所謂雷翥海是北庭所轄之境甚廣且據地理志十姓部落皆隸北庭惟四鎮都督府州三十四河西内屬諸胡州十二府二西域府十六州七十二則隸安西都䕶府兩都䕶府境地多寡適中如突厥傳所云則十姓部落亦隸安西其北庭所轄不應太小且安得輪臺西海而縣之邪此當以地理志之説為正也陽巴勒噶遜陽巴勒噶遜在縣治東三十里舊説以為古陽闗者非是説詳疆域一敦煌縣條圖古里克圖古里克在陽巴勒噶遜東五十里西北距綏來縣治八十里圖古里克郭勒出天山北麓北流經其地有圖古里克塘巴克呼蘇巴克呼蘇在綏來縣治西四十里南距哈屯博克達鄂拉一百里當孔道設有破城子塘按唐書突厥傳由焉耆北八日行得西突厥北庭與處月處宻諸種雜處月即漢車師後城金滿地處宻應其西又咄陸以處月處宻兵圍天山而不克孝恪追北抵遏索山斬千餘級降處宻部而歸遏索山應即今哈屯