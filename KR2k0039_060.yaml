front:
  text: 欽定四庫全書欽定皇輿西域圖志卷三十六
  hash: sha256:be27d8c49cb1025d301c456613b4aacecb4ff92d3967e1e4fd3c0ad890021fca
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0039_WYG_060-1a}
body:
  text: 學校臣等謹按西域風土剛徑性桀黠樂戰鬪囿於習尚教化不先又其地與中土隔絶流移僑寄所不及詩書羽籥之盛渺乎未有聞焉粵稽兩漢鄭吉班超之倫都護經年惟督率要約是務一二屯田郵政外修明化導事弗暇為若有唐貞觀開元間分裂四鎮廣置羈縻州府大都虛立名號風教雖通地實未歸版籍間或希風慕義時遣子弟入侍入學而上國之衣冠禮樂卒無由移置絶徼以大耀於光明此學校之制宜為紀外域者所罕詳也我聖朝化洽西濛宏開疆索農耕其野商出其途招徠生息民多秀良巴爾庫勒烏魯木齊諸境喁喁向風或附進額於安西三縣或開義熟於迪化寧邉二廳固已人思振奮矣爰於建置州郡之始興學育才以彰盛治璘㻞炳蔚千古一時於焉仰數仞之宫牆秩兩丁之彛典溢生徒於膠序儲選造於閭閻居斯土者咸雍容焉束帶結髮以佇為國華有殊榮也已抑又思凖回舊俗其記載文字竹木筆旁行之素與內地不侔而英敏秀出之姿天稟未嘗或絀且回民之舊居中土者薰習變化往往逰鄉校登賢書亦所在多有兹際武功告成文教遐被之餘於商民流寓子弟有造者栽培樂育以為之倡將俾傾心內靣之侣耳目濡染嵗月漸摩潛移默率鼓鐘於倫之比且遍西域而同歸也豈不休哉志學校第十三
  hash: sha256:310cc89f8dbaf7a0d7b8f77ea507d20fc32760dfdf019327d991b80528050be7
