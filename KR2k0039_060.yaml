front:
  text: 欽定四庫全書欽定皇輿西域圖志卷三十六
  hash: sha256:be27d8c49cb1025d301c456613b4aacecb4ff92d3967e1e4fd3c0ad890021fca
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0039_WYG_060-1a}
body:
  text: 學校臣等謹按西域風土剛勁性桀黠樂戰闘囿於習尚教化不先又其地與中土隔絶流移僑寄所不及詩書羽籥之盛𣺌乎未有聞焉粤稽兩漢鄭吉班超之倫都䕶經年惟督率要約是務一二屯田郵政外修明化導事弗暇為若有唐貞觀開元間分裂四鎮廣置羈縻州府大都虚立名號風教雖通地實未歸版籍間或希風慕義時遣子弟入侍入學而上國之衣冠禮樂卒無由移置絶徼以大耀於光明此學校之制宜為紀外域者所罕詳也我聖朝化洽西濛宏開疆索農耕其野商出其途招徠生息民多秀良巴爾庫勒烏魯木齊諸境喁喁向風或附進額於安西三縣或開義熟於迪化寕邉二㕔固已人思振奮矣爰於建置州郡之始興學育才以彰盛治璘㻞炳蔚千古一時於焉仰数仞之宫牆秩兩丁之彛典溢生徒於膠序儲選造於閭閻居斯土者咸雍容焉束帶結髪以佇為國華有殊榮也已抑又思凖回舊俗其記載文字竹木筆旁行之素與内地不侔而英敏秀出之姿天禀未嘗或絀且回民之舊居中土者薰習變化徃徃逰鄉校登賢書亦所在多有兹際武功告成文教遐被之餘於商民流寓子弟有造者栽培樂育以為之倡將俾傾心内靣之侣耳目濡染嵗月漸摩潜移黙率鼓鐘於倫之比且遍西域而同歸也豈不休哉志學校第十三
