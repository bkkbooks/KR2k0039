  text: 欽定四庫全書欽定皇輿西域圖志卷三十二
  hash: sha256:794f89cacb6ac3f940b50b75b1bbefa4f1438cff2d6f86795207494f5c5a830b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0039_WYG_054-1a}
body:
  text: 屯政一按安西州為靖逆赤金柳溝安西沙州五衛地舊屬軍民屯種之所自本朝裁衛改設府縣後地畝久經定額升科惟瓜州踏實小灣三堡舊居土爾番回人乾隆二十一年移歸土爾番所遺地畝招佃承種每户地三十畝官給耔種牛具秋成後扣存籽種外以什之四輸官至二十五年亦經定額升科編入民賦故兹編所載斷自哈密屬始哈密塔爾納沁屯田七千三十畝乾隆二十四年置五千六百七十畝二十五年增五百畝二十七年減一百七十畝三十二年增一千三十畝如今額管屯都司把總外委各員於哈密協標屬營內派撥無定額屯兵一百七十名乾隆二十四年設屯兵二百名二十七年裁三十名如今額遣犯乾隆二十七年派一百三十名現無增減按塔爾納沁屯田于乾隆二十一年由總督黃廷桂奏請于黃墩營撥兵二百名試墾二十三年益以哈密卡倫兵二百名試墾均有成效于二十四年開屯設兵為定制土宜小麥胡麻菜子糜青稞收穫乾隆二十四年收穫九分二釐二十五年收穫九分八釐二十六年收穫十分二十七年收穫八分二十八年收穫六分八釐二十九年收穫十分三釐三十年收穫十分六釐三十一年收穫六分二釐三十二年收穫七分二釐三十三年收穫六分八釐三十四年收穫七分二釐三十五年收穫七分三十六年收穫七分三釐三十七年收穫七分五釐三十八年收穫七分五釐三十九年收穫七分七釐四十年收穫八分一釐四十一年收穫七分九釐四十二年收穫八分一釐按收穫分數或以籽粒計或以畝計惟是籽粒土宜不一布種多寡復以地殊積算參差難于合會兹載收穫分數概以畝計每畝以斗起分以畝收一石為十分合各種土宜統計成分庶編紀畫一覽若列眉而嵗入糧儲之實數亦緣是可考見云蔡巴什湖屯田四千六十五畝乾隆二十七年置三千畝三十三年增一千六十五畝如今額管屯把總外委各員于哈密協標屬營內派撥無定額屯兵一百名乾隆二十七年設遣犯乾隆二十七年𣲖五十名土宜小麥穀糜收穫乾隆二十七年收穫六分二十八年收穫七分二釐二十九年收穫七分四釐三十年收穫八分四釐三十一年收穫十一分二釐三十二年收穫九分六釐三十三年收穫九分三釐三十四年收穫九分八釐三十五年收穫九分六釐三十六年收穫九分六釐三十七年收穫九分八釐三十八年收穫九分八釐三十九年收穫九分五釐四十年收穫九分八釐四十一年收穫八分八釐四十二年收穫八分九釐牛毛湖屯田二百五畝乾隆三十二年置管屯把總一員係蔡巴什湖把總兼轄屯兵十名乾隆三十二年設土宜小麥豌豆收穫乾隆三十二年收穫六分一釐三十三年收穫八分一釐三十四年收穫九分七釐三十五年收穫九分七釐三十六年收穫九分八釐三十七年收穫九分八釐三十八年收穫九分八釐三十九年收穫九分七釐四十年收穫九分五釐四十一年收穫九分八釐四十二年收穫九分六釐按牛毛湖屯田於乾隆三十一年初由蔡巴什湖管屯把總姚成仁私墾成熟查出入官嗣後照例撥兵屯種後漢書西域傳永平十六年取伊吾盧地置宜禾都尉以屯田建初二年罷屯田伊吾元初六年遣行長史索班將千餘人屯伊吾永建六年帝以伊吾舊膏腴之地傍近西域胸奴資之以為鈔暴復令開設屯田如永元時事按哈密在漢時為伊吾盧地自明帝迄順帝其屯田興廢之迹有可考者地宜五穀桑麻香棗蒲萄準諸禹貢厥田上上故漢常置田官於此以控制西域焉元并天下兼有西陲甘肅瓜沙以西皆置屯田與塔爾納沁相近明初封元裔忠順王於此頗修軍屯至嘉靖間委之於土爾番於是乎關門不啓敦煌以西名臯沃野俱置之度外矣不隸聖朝疆索安能睹原濕龍鱗之盛歟鎮西府即巴爾庫勒朴城子屬宜禾縣屯田一萬八千七百畝乾隆二十三年置二萬九百畝二十五年增一百畝二十六年增一千畝二十七年裁七千七百畝三十一年增二千二百畝三十二年增二千二百畝如今額管屯遊擊千總把總外委各員於巴爾庫勒鎮標屬營內派撥無定額屯兵五百名乾隆二十三年設一千名二十七年裁六百名三十一年增一百名如今額遣犯乾隆二十七年派二百五十名三十二年增一百名現三百五十名土宜小麥豌豆青稞收穫乾隆二十三年收穫五分七釐八毫二十四年收穫六分九釐九毫二十五年收穫六分八釐七毫二十六年收穫六分七釐二十七年收穫四分七釐二十八年收穫五分一釐二十九年收穫七分三十年收穫七分六釐三十一年收穫八分三毫三十二年收穫八分五釐三十三年收穫八分二釐五毫三十四年收穫八分二釐七毫三十五年收穫八分二釐九毫三十六年收穫九分三十七年收穫八分五毫三十八年收穫八分三十九年收穫八分五釐四十年收穫八分五釐四十一年收穫七分一釐四十二年收穫七分三釐按乾隆二十三年於鎮西府屬之朴城子及奎蘇二處開設兩屯調派甘州涼州西寧肅州寧夏固原河州七提鎮營官兵一千名統以副將遊擊守備諸員經理屯務至三十六年十月將前派官兵撤回並裁減奎蘇一屯别派巴爾庫勒鎮標遊擊各員管理如今制古城屬竒臺縣屯田一萬二千一百畝乾隆三十七年置八千畝三十八年增四千一百畝如今額管屯遊擊千總把總各員係古城本營專轄屯兵五百五十名乾隆三十七年設四百名三十八年增一百五十名如今額土宜小麥豌豆收穫乾隆三十七年收穫十三分九釐三十八年收穫十四分三十九年收穫十三分九釐四十年收穫十三分六釐四十一年收穫十二分一釐四十二年收穫十二分三釐木壘竒臺屬竒臺縣屯田一萬畝乾隆三十一年置二千二百四十畝三十二年增七千七百六十畝如今額管屯守備千總把總各員於巴爾庫勒鎮標屬營內派撥無定額屯兵五百名乾隆三十一年設二百名三十二年增三百名如今額土宜小麥青稞收穫乾隆二十一年收穫九分二釐三十二年收穫二十三分三十三年收穫十二分七釐三十四年收穫二十四分二釐按乾隆三十一年屯木壘兼東濟爾瑪台三十二年屯竒臺兼西濟爾瑪台三十三年屯竒臺兼吉布庫三十四年屯竒臺木壘兼東葛根略仿古一易再易之法至三十五年後專於吉布庫開屯而統於古城營遊擊總理其木壘竒臺等處屯田遺地均給民户耕種詳貢賦門吉布庫屯田三千三百畝乾隆三十五年置三千畝三十八年增三百畝如今額管屯都司守備千總把總各員於巴爾庫勒鎮標屬營內派撥無定額屯兵一百五十名乾隆三十五年設土宜小麥豌豆收穫乾隆三十五年收穫十三分三十六年收穫十三分九釐三十七年收穫十四分三十八年收穫十四分三十九年收穫十三分九釐四十年收穫十三分六釐四十一年收穫十二分一釐四十二年收穫十二分三釐迪化州即烏魯木齊五堡屬州昌吉羅克倫屬昌吉縣屯田六萬五千三百四十八畝乾隆二十五年置八萬七千一百七十四畝二十六年增一百六十三畝二十七年裁四萬六百畝二十八年增二萬二千三百十九畝二十九年增六千一百三十二畝三十年增二千一百三十畝三十一年增一萬九千八百二十畝三十二年裁一萬五千六百七十一畝三十三年增二萬三千四百七十五畝三十四年裁五千三百五十八畝三十五年裁八百九十六畝三十六年裁三萬三千八百八十八畝三十七年裁四百七十四畝三十八年增五千三百七十三畝三十九年增二千八百四十四畝四十年裁七千一百八十三畝如今額管屯副將參將遊擊都司守備千總把總外委各員於烏魯木齊提標屬營內派撥無定額屯兵三千一百九十五名乾隆二十五年設四千三百七十四名二十六年裁三百十八名二十七年裁一千一百七十名二十八年增五百四十五名二十九年增一百名三十年裁二百名三十二年增二百四十九名三十三年增一千五十一名三十六年裁一千名三十七年裁四百二十名三十八年增六百五十九名三十九年裁四十四名如今額遣犯乾隆二十七年派二十八名二十八年增一百八十五名二十九年增一百二十三名三十年增一百九十九名三十一年增六百八十四名三十二年增四百二十七名三十三年增一百一名三十四年裁三百六十七名三十五年裁一百四十七名三十六年裁一千七十四名三十七年增十五名三十八年裁二十五名三十九年裁六十一名四十年增三名現八十一名土宜小麥粟穀胡麻青稞收穫乾隆二十五年收穫九分三釐二十六年收穫八分三釐二十七年歉收止二分四釐二十八年收穫十分二十九年收穫九分三釐三十年收穫八分三十一年收穫七分九釐五毫三十二年收穫七分八釐三十三年收穫八分三十四年收穫八分五釐三十五年收穫八分四釐三毫三十六年收穫七分二釐三十七年收穫五分一釐三十八年收穫六分八釐三十九年收穫六分八釐四十年收穫九分七釐四十一年收穫九分九釐四十二年收穫九分三釐按烏魯木齊之五堡于乾隆二十三年屯兵八百名試墾地八千畝收穫糧三千五百四十二石五斗二十四年屯兵九百八十名試墾萬六千五百七十二畝收穫糧一萬零九十五石有竒當試墾之初猶未及昌吉羅克倫諸處也至二十五年次第興舉始為定制云瑪納斯屬綏來縣屯田二萬八千二百畝乾隆二十七年置一千七百畝二十八年增一千九百畝三十一年增二百四十畝三十二年增四千五百四十八畝三十三年裁六百二十畝三十四年增一萬九千四十四畝三十五年裁五千五百五十六畝三十六年增一萬二千九百三十六畝三十七年裁一萬五千七百四十八畝三十八年舊屯增三千一百一十六畝又設新屯田一萬三千二百畝三十九年新屯增一千四百四十畝共新舊屯田二萬八千二百畝如今額管屯遊擊都司守備千總把總外委各員由陜西甘肅省調撥無定額屯兵一千四百名乾隆二十七年設一百八十名三十二年增一百八十名三十三年裁四十名三十四年增五百四十名三十五年裁三百十五名三十六年增六百三十名三十七年裁七百五十八名三十八年舊屯增一百六十名設新屯兵六百六十名三十九年增新屯兵一百六十三名共新舊屯兵一千四百名如今額遣犯乾隆三十一年派二十名三十二年增七十名三十三年增十五名三十四年增十二名三十五年增六十二名三十六年增二十八名三十七年裁四十九名三十八年裁七十六名三十九年裁四十名四十年裁十九名土宜青稞小麥粟榖收穫乾隆二十七年收穫十三分二十八年收穫十分一釐二十九年收穫十一分九釐三十年收穫九分九釐三十一年收穫九分八釐三十二年收穫十分一釐三十三年收穫八分五釐三十四年收穫十一分五釐三十五年收穫十分六釐三十六年收穫六分一釐三十七年收穫七分三十八年收穫五分四釐三十九年歉收止二分七釐四十年收穫十四分四十一年收護八分六釐四十二年收穫八分四釐濟木薩屬阜康縣屯田一萬五千一百畝乾隆三十三年置二萬畝三十六年裁一千畝三十七年裁二千八百八十畝三十八年裁一千畝三十九年裁二十畝如今額管屯參將遊擊守備千總把總外委各員於陜西甘肅省調撥無定額屯兵七百五十五名乾隆三十三年設一千名三十六年裁五十名三十七年裁一百四十四名三十八年裁五十名三十九年裁一名如今額土宜青稞穀粟小麥收穫乾隆三十三年收穫九分九釐三十四年收穫九分