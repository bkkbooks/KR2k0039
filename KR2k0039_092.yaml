front:
  text: 欽定四庫全書欽定皇輿西域圖志卷四十三
  hash: sha256:78fb25452fbf19517e1eb3f918f9c9245f3c9ecc4192c2cf3270c51349d321c0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0039_WYG_092-1a}
body:
  text: 土産臣等謹按大禹隨刋於九州之物産土宜縷析條分垂之禹貢山海經所載草木禽獸率非耳目間物雖亦足資博覽而徵信無取焉若歴代史家志異域物産者大扺權輿班傳然傳言草木畜産有異乃記頗嫌其略東海甘英周行西土歴條支而抵安西臨西海以望大秦所到之國必區其品彚傳其珍異以廣見聞惜其書不傳無可採摭魏晉以下志方物者往往弔竒尚怪或失之誣方今大化翔洽羣生蕃祉闢振古之狉榛昭維新之景物凡屬夭喬飛走跂行喙息石韞而川含者向皆盲晦於窮荒絶徼之中一旦荷聖主之煦嫗帡幪㒺不欣欣自愛露采呈英以効靈而獻瑞邇時伊犂鷟鸑之鳥烏梁海俊鶻之驄以及和闐之玉葉爾羌之木𤓰安石榴等莫不驛致禁庭而竒石蜜食嘉種鮮聞並獲移植上林寵題篇什雖在微物亦㑹逢夫竒遇焉於是為之稱名辨物類情别性纎悉無遺胥登鉛槧他若史傳所載為旁參而互訂之信以傳信疑以傳疑不得以昔有今無致滋漏略凡在今天山南北境者為摘取而分附焉志土産第十八
  hash: sha256:b4bf60202cbc8abdad58017904737e31dda500f293eb98bf7a2cf626ebde674f
