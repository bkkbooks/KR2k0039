準人避其祖諱改稱釜為海蘇孛汗背正妻與他婦野合生子婦棄之澤中孛汗收養之後嗣統厥部所稱烏林台巴丹台什也巴圖爾渾台吉子十二人長䇿臣次巴圖爾五僧格六噶爾丹博碩克圖僧格為䇿臣巴圖爾所殺噶爾丹博碩克圖初居西藏後歸嗣為汗康熙年間屢侵喀爾喀聖祖仁皇帝親統六師一出拖諾山敗之於昭莫多一出狼居胥山獲其子塞卜騰班珠爾以歸噶爾丹博碩克圖仰藥死諸部乃定僧格次子曰索諾木阿喇布坦為噶爾丹博碩克圖所殺僧格舊臣七人與䇿妄阿喇布坦同逃謂之多倫努庫爾漢語多倫謂七努庫爾為友謂以世臣從患難赦其子孫七世死準人至今猶稱之噶勒丹博碩克圗死後䇿妄阿喇布坦還和羅克薩里復成部落自據汗位䇿妄阿喇布坦時曾受梵封為額爾德尼卓里克圖洪台吉譯言寶權大慶王達賴喇嘛鑄鐵印以賜準噶爾傳世寶也伊犁平後守臣獲此印驛致典屬有御製鐵章記恭録服物門顧實汗裔有和碩特之拉藏汗者居藏地子二曰丹衷曰索爾札康熙年間丹衷自藏還準噶爾娶䇿妄阿喇坦布女博托落克為妻生子班珠爾尋以丹衷習哈拉爾札達術以兩釜夾身烙死雍正年間䇿妄阿喇布坦死子噶勒丹䇿凌復以博托洛克適韋徴和碩齊時方有孕未産後生一子是為阿睦爾撒納雖冒韋徴和碩齊後稱輝特實丹衷子也顧實汗次子索爾札舊居藏地康熙年間䇿妄阿喇布坦令大䇿凌敦多卜襲西藏携索爾札歸伊犁雍正年間噶勒丹䇿凌給户十為資養逮䇿妄多爾濟那木札勒時索爾札已死子納哈察被禁錮至達瓦齊篡立始得釋䇿妄多爾濟那木札勒少時有姊鄂蘭巴雅爾禁其淫亂既長不受制復聽讒謂姊欲自立為扣肯汗扣肯汗者以女人主國事也乃拘繫其姊殺戮諸宰桑噶勒丹䇿凌庶子喇嘛達爾札因鄂蘭巴雅爾之夫薩音伯勒克為亂執䇿妄多爾濟那木札勒遂篡汗位喇嘛達爾札自立後阿睦爾撒納班珠爾欲誘立噶勒丹䇿凌幼子䇿旺達什為汗為喇嘛達爾札所害時達瓦齊亦以喇嘛達爾札之害其近屬達什達瓦也恐禍及偕阿睦爾撒納班珠爾同逃哈薩克尋還準噶爾共謀殺喇嘛達爾札立達瓦齊為汗阿睦爾撒納班珠爾輔之後達瓦齊聼伊犁衆宰桑言與阿睦爾撒納生隙阿睦爾撒納遂據額米爾額爾齊斯諸遊牧以自固達瓦齊以兵蹙之勢不敵始來歸按凖噶爾自䇿妄多爾濟那木札勒嗜殺無道喇嘛達爾札以庶兄篡位自立尋復為達瓦齊所篡攘奪相仍諸部瓦解衆台吉宰桑等欵關內面求脫水火我皇上應天順人師行時雨止殘戢暴康乂羣生重以阿睦爾撒納之反覆狡詐時會適乘大勳斯集良由我國家積纍鴻庥寅承蒼眷而亦準噶爾之違道悖德自底滅亡人事使之然也伏讀御製凖噶爾全部紀略於四衛拉特失國之由歸本於一人之致敗仁義之不施大哉王言洵足為萬古昭鑒矣御製準噶爾全部紀略恭載前天章第一卷附記固爾札廟在伊犁河北阿睦爾撒納之叛廟遭焚燬乾隆乙酉年於熱河避暑山莊之東北岡如固爾札規制建安逺廟凡逹什達瓦部衆之𨽻居熱河及都爾伯特親王䇿凌烏巴什等以朝賀至其地者咸資瞻禮並準達什達瓦屬人入廟為喇嘛其伊犁之固爾札廟不更修建御製安逺廟瞻禮書事有序乙酉伊犁河北舊有廟曰固爾札都綱三層繚垣周一里許當噶爾丹䇿凌時以五集賽更畨居此誦經每嵗首盛夏凖噶爾之衆膜拜頂禮者逺近咸集其俗素奉黃教往往捐珍寶施金銀以事裝嚴廟之閎贍遂甲于漠北阿逆之叛賊黨肆掠焚劫廟乃燬廢曾用韓愈陸渾山火詩韻以紀其事及我師再平伊犁其地並建城堡而梵宇之僅存煨燼之餘者已不可復整亦不必為之復整也因思山莊為秋搜肆覲之所舊蕃新附絡繹鱗集爰規東北岡阜肖固爾札之制營建斯寺名之曰安逺集梵僧演步踏以慶藏事惟時都爾伯特郡王䇿凌烏巴什等適以朝賀至與達什達瓦部衆之𨽻居兹土者歡喜額手僉謂琳宫晃曜妙相莊嚴不啻曩時在固爾札禮都綱聞唄讚也然余之所以為此者非惟闡揚黃教之謂蓋以綏靖荒服柔懷逺人俾之長享樂利永永無極云因系十韻以識緣起如此伊犁兵燹後梵宇為去聲重為縮地齊近逺歸宗何改移今朝初慶落戎索永延釐聳峙輝山麓來瞻渡水涯制仍固爾札境一毗耶離唱唄格隆侣喇嘛中之格隆如僧中之受五戒者歸旗達瓦貽達什達瓦舊屬歸旗者居於此其願為喇嘛者聼之維新同致敬憶舊孰含悲羣訝胡寬市豫懷范燮辭藉無不敗彼詎有覩成斯置器厪安處恢綱靖逺陲按固爾札廟於乾隆二十一年燬於火御製固爾札廟用唐韓愈陸渾山火和皇甫湜韻詩恭載前疆域門伊犁條下準部相撲之戲必袒裼從事雖蹶不釋控首屈肩至地乃為勝乾隆庚辰秋都爾伯特親王䇿凌烏巴什等隨木蘭行圍俾準人為此戲帝嘉其壯賜之羊臛則拱掬呿吞歡喜無量據云準噶爾自喇嘛達爾札搆釁後日就凋敝不得如此飽啖者十年於兹矣按相撲之技蒙古所尚惟脫帽短褠以蹶為負準部則必露身跣足屈背著地而後乃為負視蒙古較異恭讀御製塞宴四事詩於凖夷撲戲備傳梗槩示恩奬勇寓意深長凋敝遺墟重蒙休養其慶幸為何如也御製詩恭録前天章第三卷準噶爾中貧無賴覔食者名嗎哈沁伊犂平後多逃藏山谷間羣出擾害行旅官為搜捕漸就寧輯乾隆二十五年於伊犁編設額魯特旗分奉旨招撫許其悔罪來投收養今準部教育有年風俗移化無復向時嗎哈沁迹矣烏魯木齊附近深山中每當紅栁發生時有名紅栁孩者長僅一二尺許結栁葉為冠赤身跳躑山谷間捉獲之則不食以死蓋亦猩猿之屬特不常見耳漢書西域傳元始中車師後王國有新道戊已校尉徐普欲開以省道里半避龍堆之厄召姑句車師後王名使證之不肯繫之姑句家矛端生火其妻股紫陬曰矛端生火此兵氣也利以用兵魏書西域傳悅般國在烏孫西北真君九年遣使朝獻并送幻人稱為割人喉脈令斷擊人頭令骨陷皆血出或數升或盈斗以草藥內其口中令嚼咽之須臾血止養瘡一月復常又無痕瘢世祖疑其虛乃取死罪囚試之皆驗云中國諸名山皆有此草乃使人受其術而厚遇之又言其國有大術者蠕蠕來抄掠術人能作霖雨狂風大雪及行潦蠕蠕凍死漂亡者十二三唐書突厥傳始虜未叛鳴鵽羣飛入塞吏曰所謂突厥雀者比春還悉墮靈夏間率無首泥孰果亡按車師後國其地當在今迪化州東境烏孫為準部舊壤悅般與之連界唐突厥亦準部地略採事之殊異者數條附載卷末若幻人術者之流今準部所無有而衛拉特以篡奪召亡理關人事鳴鵽徴驗固不足云矣欽定皇輿西域圖志卷四十七欽定四庫全書欽定皇輿西域圖志卷四十七
