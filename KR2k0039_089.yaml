body:
  text: 雜録一準噶爾部世系綽羅斯屬第一世為孛汗元臣脫歡後自脫歡至孛汗世次不可考孛汗子烏林台巴達台什舊音巴靻太師今更正為第二世烏林台巴達台什子達耀為第三世達耀子鄂爾魯克諾顔為第四世鄂爾魯克諾顔子巴圖蘭青森為第五世巴圖蘭青森子額森諾顔為第六世額森諾顔次子額斯墨特達爾汗諾顔為第七世額斯墨特達爾汗諾顔子額斯圖米為第八世額斯圖米子哈木克台什為第九世哈木克台什長子阿喇哈青森為第十世阿喇哈青森子翁郭楚為第十一世翁郭楚子布拉台什為第十二世布拉台什第四子哈喇忽剌為第十三世哈喇忽刺長子巴圖爾渾台吉為第十四世巴圗爾渾台吉第五子僧格為第十五世僧格弟噶勒丹襲位傳僧格長子䇿妄阿喇布坦為第十六世䇿妄阿喇布坦長子噶勒丹䇿凌為第十七世噶勒丹䇿凌次子䇿妄多爾濟那木扎勒為第十八世其庶兄喇嘛逹爾扎篡䇿妄多爾濟那木扎勒位䇿妄阿喇布坦同髙祖兄弟逹瓦齊復篡喇嘛逹爾扎而自立亦孛汗第十八世孫也按以上為準噶爾襲位稱汗者自額森諾顔六世以上無旁支其第七世旁支博羅納哈勒為額斯墨特逹爾汗諾顔兄即都爾伯特始祖别詳都爾伯特條其第十世旁支以下載後第十世旁支阿克賽台什翁郭爾輝為阿喇哈青森弟第十一世旁支阿克賽台什子那巴圗翁郭爾輝子噶勒滿台什為翁郭楚同祖兄弟第十二世旁支那爾巴圗子尼布勒呼噶勒滿台什子圗爾根台什華為布拉台什同曽祖兄弟第十三世旁支額伯內伊勒登額濟內台什圖納克為哈喇忽刺之兄墨爾根諾顔薩哈勒圖阿勒輝丙圖呼爾干台什綽克圖烏巴什為哈喇忽剌之弟尼布勒呼子呼蘭洪郭爾圖爾根台什子巴圖爾台吉巴特瑪喇什為哈喇忽剌同髙祖兄弟第十四世旁支墨爾根代青楚庫爾達爾瑪色楞沙巴圖諾木齊為巴圖爾渾台吉弟額伯內伊勒登子都喇勒和碩齊額爾克塔蘇爾海多爾濟班達巴圖爾索克綽克多爾木圖納克子巴達里墨爾根諾顔子洪霍代巴顔阿巴該薩哈勒圖子都喇勒阿勒輝子巴噶台吉丙圖子墨爾根和碩齊博貝呼爾干台什子索魯木珊敦墨爾根博斯博勒堆阿勒達爾克勒刻巴圖爾楚克楚奎達爾札綽爾圖烏巴什子和碩齊車克齊為巴圖爾渾台吉同祖兄弟呼蘭子諾顔哈什哈巴特瑪喇什子額爾克巴圖爾洪郭爾子薩瑪爾干額爾克為巴圖爾渾台吉同五世祖兄弟第十五世旁支車臣巴圖爾卓里克圖和碩齊為僧格兄溫春多爾濟札布布木朋楚克達什鄂春達爾瑪班達里為僧格弟墨爾根代青子丹津阿海堪布胡土克圖楚庫爾子羅布藏胡土克圖巴噶班第羅布藏䇿凌羅布藏額林沁色楞子鄂克珠木羅布藏阿喇布札為僧格同祖兄弟都喇勒和碩齊子常納多爾濟渾津諾巴哈什哈博霍諾克巴濟額爾克塔蘇爾海子巴喇多爾濟子達木巴班達巴圖爾子阿哈特索克子阿玉竒那木札勒綽克多爾木子色楞衮巴達里子哈代巴圖爾沙里洪霍代巴顔阿巴該子舒古古魯淵丹哈坦色楞都喇勒子古古丹津阿玉竒巴噶台吉子甲都木巴墨爾根和碩齊子昻噶巴噶漠博貝子瑪木特珊敦墨爾根子塔竒齊索魯木子烏克爾堆巴圖爾博斯博勒堆子嶽博摩魯木沙布載克勒刻巴圖爾子敦專布達什里達爾札子多爾濟札勒車克齊子䇿凌札勒和碩齊子色楞達爾札為僧格同曽祖兄弟諾顔哈什哈子博堆扣肯巴圖爾額爾克巴圖爾子根敦薩瑪爾干額爾克子貝多斯為僧格同六世祖兄弟第十六世旁支索諾木阿喇布坦鄂木布為䇿妄阿喇布坦之弟噶勒丹子色布騰巴勒珠爾車臣子札勒溫春子丹濟拉達爾札楚木丕勒布木子䇿凌端多布多爾濟札布子薩爾濟塔爾朋楚克達什子博第木爾那木札勒多爾濟達爾瑪子鄂克卓木羅布藏為䇿妄阿喇布坦同祖兄弟丹津子古木布巴圖爾都噶爾達都古阿海子衮藏巴噶班第子堪都索諾木端多布羅布藏額林沁子阿喇布坦䇿凌特雷格木丕勒烏巴什為䇿妄阿喇布坦同曽祖兄弟巴喇子那木準逹木巴子濟木巴阿哈特子索諾木逹什色楞衮子根敦札布沙里子運丹朋楚克格隆達木巴達爾札烏巴什舒古子布圖古勒古魯淵丹子綽勒東瑪爾特子布木古古丹津子達爾汗烏克爾堆巴圖爾子孟克色布騰阿玉爾敦專子烏巴什楚克楚奎色楞達爾札子特古斯孟克為䇿妄阿喇布坦同髙祖兄弟博堆子敏楚扣肯巴圖爾子達什貝多斯子那瑪斯竒為䇿妄阿喇布坦同七世祖兄弟第十七世旁支羅布藏舒努舒努達木巴巴朗巴噶巴朗為噶勒丹䇿凌之弟鄂木布子阿雜納為噶勒丹䇿凌同祖兄弟丹濟拉子多爾濟色布騰逹爾札子多爾濟札勒䇿凌端多布子那木札勒逹什多爾濟逹木巴巴里逹什䇿凌巴勒珠爾薩爾濟塔爾子圖克濟札布衮楚克博第木爾子端多布那木札勒色布騰那木札勒多爾濟子古木札多爾濟噶勒藏多爾濟鄂克卓木子索諾木吹濟羅布藏子齊旺札勒為噶勒丹䇿凌同曾祖兄弟古木布巴圖爾子䇿凌孟克都噶爾子䇿凌堪都阿喇布坦達瑪林達都古子色布騰衮藏子䇿凌多爾濟䇿凌端多克堪都子巴噶䇿凌端多布旺布索諾木端多布子綽爾濟干珠噶那木竒達什為噶勒丹䇿凌同髙祖兄弟濟木巴子索諾木䇿凌孟克子阿喇布坦索諾木達什子旺札勒為噶勒丹䇿凌同五世祖兄弟那瑪斯竒子吹因珠爾為噶勒丹䇿凌同八世祖兄弟第十八世旁支䇿妄達什為䇿妄多爾濟那木札勒之弟多爾濟色布騰子三都布伊達木札布烏巴什丹津多爾濟札勒子沙喇布額林沁那木札勒逹什子逹克巴逹瓦齊雅滿呼勒巴勒珠爾子庫圖津色布騰子賔雜什里色楞札納札納嘎爾布嘎爾瑪都雜噶勒藏多爾濟子諾爾布林沁索諾木吹濟子古木布札布三濟札布堪都子衮楚克索諾木阿喇布珠爾阿喇布坦子䇿凌旺布色布騰旺布達瑪林子漠海䇿凌䇿凌端多克子滿濟䇿凌那木札勒達什達瓦德勒格爾伯格里為䇿妄多爾濟那木札勒同髙祖兄弟按自孛汗傳十八世而亡其旁支亦以十八世為斷後不偹載都爾伯特與綽羅斯同族孛汗第七世孫博羅納哈勒都爾伯特始祖也為第一世博羅納哈勒子額什格台什為第二世額什格台什子雅尼斯台什為第三世雅尼斯台什子特爾格圖台什為第四世特爾格圖台什子噶勒當達賴台什色伊勒登為第五世噶勒當子哈哈勒代諾顔烏巴什達賴台什子敏珠楚托音鄂布木代青和碩齊古木布達額台什塔爾渾台什包伊勒登子鄂羅斯巴特瑪多爾濟額林沁巴圖爾伯什布為第六世哈哈勒代諾顔烏巴什子蘇都奎綽克托喇嘛札布敏珠子鄂博堆烏朗海楚子阿勒達爾台什鄂木布代青和碩齊子齊什竒布察衮車臣塔爾渾台什子孟庫特木爾色特爾鄂羅斯子札布巴特瑪多爾濟子孟和代札勒丹達爾額林沁巴圖爾子孟克得伯布什子䇿凌孟克為第七世蘇都奎綽克托子呼都魯克喇嘛札布子阿玉竒多爾濟滿濟沙克都爾達什阿勒達爾台什子諤勒衮札布齊什竒布子札勒丹津達爾札車臣子布里什第得齊特札布子唐古特達什端多克孟和代子達賴巴圖孟克烏勒木濟札勒子和托郭爾車凌滿推三札布孟克得子巴圖孟克瑪什巴圖䇿凌孟克子齊墨克巴雅勒當博斯和勒為第八世呼都魯克子烏都木圖台什鄂勒衮子䇿凌扎勒子巴噶滿濟䇿凌多爾濟老占喇布坦丹津子喇布坦達克巴巴圖鄂齊爾達爾札子車凌達什伯勒克布里什第子䇿凌唐古特子公格什喇達什端多克子保貝和托內拜英格努斯海達賴子恩克根札布巴圖孟克子達木巴烏勒木濟子剛烏邁和托郭爾車凌子色布騰滿推子薩音察克庫圖齊扣肯達瓦三札布子翁郭帶伯登巴圖孟克子根敦多爾沁車畚空和爾伯省瑪什巴圖子布顔濟爾噶勒門都伯勒克齊墨克子齊巴克巴本為第九世烏都木圖台什子巴拜䇿凌子額克德瑪賚巴拜䇿妄達爾札䇿凌多爾濟子布逹札布達瓦克什克伯什阿噶什達瓦濟特根則巴克喇布坦子達什䇿凌烏巴什達克巴子達喇巴札洛壘原端剛多爾濟額爾得尼車凌達什子烏巴什伯勒克子多第巴布顔得勒格爾達瓦津䇿凌子索諾木古木布公格什喇子車登古爾古木額爾竒斯孟克特木爾烏朗海恩克子額布根車伯克哈里特根札布子班珠爾竒達達木巴子烏魯斯剛子札納巴克巴齋色布騰子巴桑嘎瓦扣肯根敦子和通扣肯車畚子巴爾布顔濟爾噶勒子和塔拉扣奎達克都爾噶為第十世額克德子訥刻車木伯勒額林沁札木蘇瑪賚子額爾克薩他木䇿妄達爾札子多爾濟喇布坦達什子訥墨庫達瓦克什克子達木巴都噶爾䇿凌烏巴什子索諾木雍隴車登子烏勒墜鄂羅什呼達喇巴札子布圖克森額爾得尼子什喇巴勒為第十一世多爾濟喇布坦子敦多克喇布坦為第十二世按都爾伯特之第十二世即綽羅斯之第十八世也都爾伯特以孛汗第七世孫為始祖故世次不同和碩特以阿克薩噶勒代諾顔為第一世以上無考阿克薩噶勒代諾顔子烏魯克特穆爾為第二世烏魯克特穆爾子博羅特布古為第三世博羅特布古子博羅特特穆爾為第四世博羅特特穆爾子都楞代博為第五世都楞代博子圖古堆為第六世圖古堆子那郭代為第七世那郭代子賽謨勒呼為第八世賽謨勒呼子庫綏為第九世庫綏子鄂博克博貝為第十世鄂博克子雅代青三博貝子哈鼐諾顔洪郭爾為第十一世哈鼐諾顔洪郭爾子拜巴噶斯昆都崙烏巴什布顔鄂特歡札薩克托音雅代青三子吹庫爾哈穆克哈薩克為第十二世吹庫爾子額爾得尼達那多爾濟拜巴噶斯子車臣罕阿巴賴昆都崙烏巴什子瑪邁達賴烏巴什烏巴什渾台吉多爾濟額爾克代青鄂克綽特布第巴卓里克圖諾顔嘎布楚孟克青巴圖爾伊那克巴圖爾伊勒察克賽巴克哈喇庫濟羅布藏達什色楞塔爾巴朋素克札薩克托音子塔爾衮額爾得尼渾台吉阿里魯克三托音額爾得尼托音達爾瑪多札烏巴什瑪賚茂濟喇克庫穆什庫畢爾噶達什烏珊布顔鄂特歡子多郭朗䇿凌諾顔哈喇烏克勒瑪齊克渾台吉伊斯坦濟車木貝多爾濟為第十三世額爾得尼子達蘭台車臣罕子額爾得尼渾台吉噶勒達瑪阿巴賴子阿玉竒察衮齊巴喇嘛瑪邁達賴烏巴什子丹津渾台吉什喇布羅布藏烏巴什渾台吉子都爾格齊雅璊塔爾巴多爾濟子額布根阿海察衮多里斯呼額爾克代青鄂克綽特布子察衮塔爾巴青巴爾圖子楚木伯勒瑪賚朋素克子什喇布原端阿玉錫衮楚克老占什喇布阿里魯克三托音茂濟喇克子額爾得尼楚魯木阿喇布坦淖海都喇勒多郭朗䇿凌子札木蘇代巴圖爾達什車木貝多爾濟子推博噶為第十四世達蘭台子色楞額爾得尼渾台吉子噶勒丹多爾濟噶勒達瑪子羅布藏古木布阿玉竒子索諾木汪札勒察衮子瑪克本阿巴丹津渾台吉子烏巴什達什喇布坦都爾格齊子巴木巴塔爾墨爾根巴圖爾塔爾巴子海努克額布根子索諾木札勒阿海子達什多里斯呼子端多克楚木伯勒子廷沁瑪賚子巴勒勒珠爾鄂端阿玉錫子博羅勒代衮楚克子烏巴什老占什喇布子格木巴勒齊旺公格渾台吉索諾木子札薩克圖達什喇布坦額爾得尼楚魯木子哈爾噶斯阿喇布坦子色布騰和推淖海都喇勒子璊濟塔爾伯色扎木蘇代巴圖爾子瑪什巴雅爾達什子美都推博噶子阿布為第十五世色楞子丹達爾瑪克本子噶勒丹端多布巴雅爾圖達什喇布坦子噶勒丹端多克端多布車凌索諾木扎勒子瑪尼色布騰達什子羅布藏䇿凌廷沁子車凌那木扎勒哈爾