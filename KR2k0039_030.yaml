front:
  text: 欽定四庫全書欽定皇輿西域圖志卷二十
  hash: sha256:9533919955b290dd5375f69bd7200472217ae0e38a4f7525dd57e0bfa68cb411
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0039_WYG_030-1a, image: WYG0500/WYG0500-0655a.png}
body:
  text: 山臣等謹按西北地當艮位扶輿磅礴其勢實居天下之脊語云西北多山有由來矣禹益隨刋世傳山經於西北尤備特其脈絡貫串支幹分合處多略而弗書後世搜竒鑿險之流目擊為難不免支離傳㑹無以徵信來者乃者王師奏凱開闢西陲二萬餘里亘祁連之長梁阨極疑之雄塞其間崇岡疊嶂側嶺横峯參錯逶迤竒偉崿列不可名狀總其要領界以天山北連沙漠有龍行迴顧之竒南挹渾河具鳥翼翕張之勢其餘條旁幹並起伏蜿蜓互標形勝以至鳥飛猿掛棧度繩懸之境靡不谺然砉然軒豁呈露自昔三十六國之雄譚詎誇聚米亦越七十二君之逺略難詡標銅已且夫雪山葱嶺作鎮金方史傳所垂固已標名絶域即今昔稱名荒墟參錯而譯音符契什一猶存如阿爾台之為金山騰格里之為天山木素爾之為雪山悉昭然可指他若突厥建北庭於鏃曷山在伊列河西當屬今伊犁河西之布哈山山經載敦薨山敦薨水出焉西注泑澤泑澤即蒲昌海為今羅布淖爾敦薨水為海都河則山當為今之海都山均堪借証而得况摹永和之碑尋貞觀之石高巖剔蘚境不盡於堯封邃谷磨崖疆未周於戎索以今荒磧不毛伊古棄為甌脱皆得目營手度搜羅遺跡使荆榛晦昧咸耀於光明重以聖天子奎文睿什昭回西極寧第狼居燕然之片石所得擬夫煒煒煌煌者歟志山第六
  hash: sha256:877f6d9ce46ba90ba67aebf68d16acf6f488a5f5c9c5d848c5c2a9e3de2253cc
