body:
  text: 疆域八天山南路二哈喇沙爾屬哈喇沙爾烏沙克塔勒察罕通格楚輝塔噶爾齊特伯勒古碩爾楚克博爾海哈勒噶阿璊庫隴勒車爾楚策特爾英噶薩爾玉古爾鄂頗爾庫車屬兼轄沙雅爾庫車阿巴特托和鼐常格哈喇阿薩爾裕赤哈喇阿勒玉蘇布嬴和逹烏圖庫克體騫哈魯納斯特勒伯額什克巴什特集克竒里什沙雅爾托伊博羅多塔里木塔木根庫勒喀伊木阿塔坡斯查盤哈爾噶齊庫克布葉葉勒阿里克葉伊勒干布古斯孔郭爾郭欽定皇輿西域圖志卷十五目録欽定四庫全書欽定皇輿西域圖志卷十五目録疆域八天山南路二哈喇沙爾屬哈喇沙爾烏沙克塔勒察罕通格楚輝塔噶爾齊特伯勒古碩爾楚克博爾海哈勒噶阿璊庫隴勒車爾楚策特爾英噶薩爾玉古爾鄂頗爾庫車屬兼轄沙雅爾庫車阿巴特托和鼐常格哈喇阿薩爾裕赤哈喇阿勒玉蘇布嬴和逹烏圖庫克體騫哈魯納斯特勒伯額什克巴什特集克竒里什沙雅爾托伊博羅多塔里木塔木根庫勒喀伊木阿塔坡斯查盤哈爾噶齊庫克布葉葉勒阿里克葉伊勒干布古斯孔郭爾郭欽定皇輿西域圖志卷十五目録欽定四庫全書欽定皇輿西域圖志卷十五疆域八天山南路二哈喇沙爾屬東至烏沙克塔勒出蘇巴什塔克口東南至察罕通格出納林竒喇塔克口接闢展界西至第納爾郭勒接庫車界北至天山踰山接安西北路迪化州昌吉綏来縣界南踰沙山至羅布淖爾哈喇沙爾哈喇沙爾在闢展西一千六百里踰哈喇烏蘇至其地距京師九千一百里有舊城二一在海都郭勒西十里一在海都郭勒西南二十里乆廢今移建新城於哈喇沙爾周一里五分土田肥沃魚鹽蒲葦之饒甲於他處為古焉耆國地漢書西域傳焉耆國王治員渠城西南至都䕶治所四百里南至尉犂百里北與烏孫接近海水多魚焉耆國近匈奴叛殺都䕶但欽莽不能討天鳳二年遣五威將王駿等將莎車龜兹兵七千餘人分為數部入焉耆焉耆伏兵要遮駿及姑墨尉犂危須國為反間還共襲擊駿等皆殺之惟戊巳校尉郭欽别将兵後至焉耆焉耆兵未還欽擊殺其老弱引兵還後漢書班超傳永平十八年焉耆攻沒都䕶陳睦永元六年超發龜兹鄯善等八國兵討焉耆焉耆王廣大恐乃欲悉驅其人共入山超大㑹諸國王揚聲當重加賞賜於是廣詣超國相腹久等亡入海超收廣等於陳睦故城斬之傳首京師更立焉耆王於是西域五十餘國悉皆内屬西域傳焉耆國王居南河城北去長史所居八百里其國四面有大山與龜茲相連道險阸易守有海水曲入四山之内周帀其城三十餘里晉書西戎傳焉耆國方四百里武帝太康中其王龍安遣子入侍世子㑹少而勇傑安謂曰我嘗謂龜兹王白山所奪汝能雪之乃吾子也及㑹立襲滅白山遂據其國遣子熈歸本國為王㑹有膽氣籌畧䓤嶺以東莫不率服為龜兹國人羅雲所殺沙州刺史楊宣疆理西域熈率羣下四萬人肉袒於宣吕光討西域復降於光及光僣位熈又遣子入侍魏書西域傳焉耆國在車師南都員渠城白山南七十里其王姓龍名鳩尸卑那即前凉長軌所討龍熈之後東去髙昌九百里西去龜兹九百里皆沙磧東南去𤓰州二千二百里恃地險頗剽刦中國使世祖詔萬度歸討之屠其城其王奔龜兹隋書西域傳焉耆國都白山南七十里漢時舊國也其王姓龍字突騎大業中遣使貢方物唐書西域𫝊焉耆國直京師西七千里而贏横六百里縦四百里東髙昌西龜兹南尉犂北烏孫太宗貞觀六年其王龍突騎支始遣使来朝侯君集討髙昌突騎支引兵佐唐西突厥約為輔車勢不朝貢安西都䕶郭孝恪討之執突騎支以栗婆準攝國事焉耆立栗婆準而從兄薛婆阿那支自為王號瞎千執栗婆準獻龜兹殺之阿史那社尒討龜兹何那支奔之為社尒所禽斬以狥立突騎支弟婆伽利為王以其地為焉耆都督府婆伽利死國人請還前王突騎支髙宗許之開元七年以焉耆備四鎮訖天寳常朝貢地理志焉耆都督府貞觀十八年滅焉耆置突厥傳有特厖勒居焉耆城稱葉䕶餘部保金莎領衆至二十萬唐西域記出髙昌故地自近者始曰阿耆尼國舊曰烏烏為焉字之訛耆東西六百餘里南北四百餘里國大都城周六七里四面據山道險易守衆流交帶引水為田元史地理志至元十五年授巴克察徹爾舊作八撤察里改改正虎符掌巴什伯里舊作别失八里今改正畏兀城子里軍站事十七年以萬户綦公直戊巴什伯里十八年自大和嶺至巴什伯里置新站三十二十年立巴什伯里和州等處宣慰司二十三年遣侍衞新附兵千人屯田巴什伯里置元帥府即其地以總之明史西域傳巴什伯里西域大國也南接于闐北連衞拉特舊作瓦喇今改正西抵賽瑪爾堪舊作撒馬皃罕今改正東抵哈喇和卓舊作火州今改正東南距嘉峪闗三千七百里或曰焉耆或曰龜兹元世祖時設宣慰司尋改為元帥府其後以諸王鎮之洪武中其王喀第爾和卓舊作黒的兒火者今改正即遣千户克瑪里丁舊作哈馬力丁今改正等來朝貢二十四年命主事肯徹舊作寛徹今改正等使西域以書諭哈苐爾和卓成祖即位之冬遣官齎璽書綵幣使其國十六年貢使蘇卜克舊作速哥今改正言其王為從弟烏蘇舊作歪思今改正所弑而自立徙其部而去更國號曰伊勒巴拉舊作亦力把里今改正帝以畨俗不足治授蘇卜克為都督僉事自後使臣多授官成化元年定西域朝貢期令伊勒巴拉三嵗五嵗一貢使者不得過十人自是朝貢遂稀按哈喇沙爾城北倚大雪山額格爾齊塔克屏其東南庫隴勒塔克繞其西南遥山環拱所包地面縱横四五百里當為焉耆國全境後漢書謂四面有大山唐書謂横六百里縱四百里西域記謂東西六百餘里南北四百餘里四面據山者是也山内海都郭勒南趨㑹博斯騰淖爾之水西南出庫隴勒塔克口東赴羅布淖爾羅布淖爾為古蒲昌海所謂海水曲入山南者也云曲入者約畧之詞其實四山内之水流出注海耳哈喇沙爾東去闢展一千六十里西去庫車一千里闢展古髙昌庫車古龜兹與魏書焉耆東去髙昌九百里西去龜茲九百里之說大畧相合則其為古焉耆無疑也惟是城郭變遷今城南去博斯騰淖爾止四里以魏書南去海十餘里之文証之度古員渠城故址猶在今城北十餘里所謂水帀其城三十餘里者形勢宛存至其國本在車師前國西南而魏書云在車師南唐書王名突騎支而隨書止稱突騎此紀載之疏也又按焉耆自宋以後史傳不著其入朝中國然考宋史載咸平四年回鶻可汗王禄勝遣曹萬通來貢稱其國東至黄河西至雪山有小郡數百别有夜落紇通朝貢龜兹亦回鶻别種東至夏州九十日或稱西州回鶻或稱西州龜兹又稱龜兹回鶻自天聖至熈寧五年入貢者七則自西州以至龜兹為今闢展西至庫車之地皆屬回鶻故其名通用而朝貢不絶特焉耆之號無存耳降自元眀國號巴什伯里元置軍站宣慰司元帥府於此而眀史稱其南接于闐北連衞拉特西抵賽瑪爾堪東抵哈喇和卓或曰焉耆或曰龜兹是當時巴什伯里疆域甚廣自今烏沙克塔勒諸城踰哈喇沙爾庫車而西皆其境也烏沙克塔勒烏沙克塔勒在哈喇沙爾城東二百十五里自闢展西行入蘇巴什塔克口又西南行踰庫木什阿克瑪塔克額格爾齊塔克三百四十里至其地為哈喇沙爾東境唐書地理志經盤石百里有張三城守捉按烏沙克塔勒東之額格爾齊塔克為唐地理志所載之盤石説見山由是西行得烏沙克塔勒之廢城應即所謂張三城者也唐置守捉於此固地利所必争歟察罕通格察罕通格在烏沙克塔勒西西南距哈喇沙爾城一百九十五里地有廢城城西有泉委折而南經烏沙克塔勒城東分導灌田自闢展西入納林竒喇塔克博羅圖塔克谷口循博羅圖郭勒踰塔什海至其地為哈喇沙爾東北境楚輝楚輝在烏沙克塔勒西五十里察罕通格西南七十里有城垣西距哈喇沙爾城一百二十五里自烏沙克塔勒察罕通格南北兩道至此㑹而為一魏書焉耆𫝊成周公萬度歸入焉耆東界擊其邉守左回尉犂二城拔之進軍向員渠唐書地理志張三城西南一百四十五里經新城館按左回與楚輝字音相近而居哈喇沙爾城東應屬當時東界邊守之城是今之楚輝即魏左回城更以今之烏沙克塔勒卽唐張三城推之則楚輝應属新城然唐志兩城相去一百四十五里今兩城相距僅五十里則亦非當時舊址也塔噶爾齊嗒噶爾齊在楚輝西三十里踰小河一道至其地西距哈喇沙爾城九十五里特伯勒古特伯勒古在塔噶爾齊西十五里踰竒爾歸圖郭勒至其地有小城西踰哈喇沙爾城八十里自烏沙克塔勒察罕通格楚輝至此得四城皆居哈喇沙爾城東漢時危須國當在此間漢書西域傳危須國王治危須城西至都䕶治所五百里至焉耆百里魏畧危須國并屬焉耆按漢書山國西至尉犂二百四十里至危須二百六十里而尉犂在焉耆南危須在焉耆東境界毗連厥後盡為焉耆所并晉魏隋唐諸史所云四面有大山者舉其旣并之後言之則今自東之額格爾齊塔克西之庫隴勒塔克南之沙山北之石山四山之中盡焉耆國地其在於漢則危須尉犂焉耆三國皆在大山環抱之内縦横四五百里間今以唐書地理志自西州至焉耆鎮城道里考之則所謂焉耆鎮城者當屬今之哈喇沙爾由是而推東為危湏西南為尉犂方位較然是漢時所謂危湏城者必在特伯勒古以東察罕通格以西四城間矣碩爾楚克碩爾楚克東北距哈喇沙爾城四十里有水草可駐牧其東北二十里有舊城博爾海博爾海在碩爾楚克西南二十里東北距哈喇沙爾城六十里哈勒噶阿璊哈勒噶阿璊在碩爾楚克南五十里東北距哈喇沙爾城九十里在古當為尉犂國地海都郭勒繞其南西趨庫隴勒漢書西域傳尉犂國王治尉犂城西至都䕶治所三百里南與鄯善且末接又焉耆國南至尉犂百里魏畧尉棃國并屬焉耆按漢書焉耆西南至都䕶治所四百里尉犂西至都䕶治所三百里是尉犂為焉耆西南百里國可知也云焉耆南至尉犂百里者或傳冩之訛耳夫焉耆正南海水瀰漫海北既無容國之地若在海南何止百里哉况後漢班超討焉耆自西而来先至尉犂界焉耆王廣絶葦橋以拒漢軍超更従他道厲渡觀此則尉犂至焉耆中有水道隔絶明甚今哈喇沙爾之為焉耆既無可疑而哈勒噶阿璊在其西南九十里中隔海都郭勒當年形勢猶有存者則此當属尉犁故城也北魏萬度歸擊其邊守左回尉犂二城左回即楚輝尉犂即漢尉犂國城其為今之哈勒噶噶阿璊城可知魏畧尉梨應犂字之訛稱其并屬焉耆而文獻通考亦云焉耆後并有尉犂盖尉犂既并之後焉耆西境即以今庫隴勒為界云庫隴勒庫隴勒在哈勒噶阿璊西南七十里東北距哈喇沙爾一百八十里山勢險峻古焉耆以西諸國闗隘也山南海都郭勒繞而西流山麓瀕河處右山左河徑極險窄河南岸為庫隴勒城其東境傍山六十里為庫徹瑪南濵羅布淖爾唐書西域傳自焉耆西南步二百里度小山徑大河二又步七百里至龜兹按庫隴勒在漢當屬尉犂國西境與額格爾齊塔克東西環抱為焉耆國之西南屏所謂四面有山者也若今之哈喇沙爾西境直踰玉古爾至第納爾郭勒盖已兼有漢時輪臺渠犂之地未可以焉耆一境當之矣車爾楚車爾楚在庫隴勒西一百七十里東北距哈喇沙爾城三百五十里踰海都郭勒而至西抵額什墨郭勒晉書西域𫝊沙州刺史楊宣疆理西域宣以部将張植為前鋒所向風靡軍次焉耆熈拒戰於賁輪城進屯鐵門未至十餘里熈又率衆先要之於遮留谷植将至或曰谷名遮留殆将有伏單騎嘗之果有伏發植馳擊敗之進據尉犂唐書地理志自焉耆西五十里過鐵門闗又二十里至于術守捉城按晉書鐵門應即唐書之鐵門闗今庫隴勒為古焉耆西境則焉耆西五十里之鐵門闗宜在今車爾楚之東也晉書遮留谷未至鐵門十餘里唐書于術守捉城東去鐵門闗二十里宜與今車爾楚相近晉楊宣部将張植由鐵門遮留谷而進據尉犂尉犂在漢為焉耆西南百里國在晉為焉耆西界之城是時疆理西域還攻焉耆從國之西境入是以先據尉犂而鐵門遮留谷之在今哈喇沙爾西境益無疑也䇿特爾䇿特爾在車爾楚西一百四十里東北距哈喇沙爾城四百九十里踰額什墨郭勒至其地饒水草漢書西域傳宣帝時遣衞司馬使䕶鄯善以西數國時漢獨䕶南道未能盡并北道也神爵三年使鄯善并䕶北道故號曰都䕶督察烏孫康居諸外國治烏壘城去陽闗二千七百三十八里與渠犂田官相近土地肥饒於西域為中故都䕶治焉又云烏壘城與都䕶同治後漢書西域傳莎車王賢攻殺龜兹王遂兼其國乃分龜茲為烏壘國徙駟鞬為烏壘王唐書地理志河西内属諸胡州十二一名烏壘州按烏壘為前漢都䕶治所漢書謂在焉耆西南四百里尉犂西三百里今自哈勒噶阿璊至庫隴勒為尉犂國地則自庫隴勒西至䇿特爾三百里為烏壘之地無疑所謂烏壘城者當於是乎在後漢龜兹為莎車所滅分其地為烏壘國即此城也唐為河西之烏壘州謂之河西者地屬海都郭勒西境烏壘為河西最東之州也自䇿特爾南行瀕額爾勾勒為漢渠犂國地漢書西域傳渠犂城東北與尉犂東南與且末南與精絶接西有河至龜兹五百八十里廣饒水草處温和田美可益通溝渠種五穀與中國同時熟又烏壘南三百三十里至渠犂唐書地理志渠犂都督府按渠犂為漢時小國在烏壘南三百三十里度其地瀕今額爾勾郭勒河水東入羅布淖爾當在渠犂南而史云西有河者水流屈曲或西境薄河舉其近者言之耳地處天山之陽得水泉之利故以為處温和田美可益通溝渠種五穀也晉魏以降其名不著當為龜兹所并唐時渠犂都督府則因其舊而名之耳英噶薩爾英噶薩爾在䇿特爾西七十里東北距哈喇沙爾城五百六十里舊有城㤙楚魯克郭勒經流其地唐書地理志于術守捉城又二百里至榆林守捉按唐于術守捉城與今車爾楚相近則西二百里之榆林守捉宜在英噶薩爾間也又唐書自榆林守捉西五十里至龍泉守捉當在今英噶薩爾之西詳見水玉古爾玉古爾在英噶薩爾西一百二十里踰伊蘭布拉克至其地東北距哈喇沙爾城六百八十里有城垣當孔道盖即古輪臺地也由是西行接庫車界史記大宛傳貳師軍至侖頭侖頭不下攻數月屠之又曰侖頭有田卒數百人漢書西域傳昭帝時以扞彌太子賴丹為校尉將軍田輪臺輪臺與渠犂地相連也龜兹貴人姑翼謂其王曰賴丹本臣屬吾國今佩漢印綬来廹吾國而田必為害王即殺賴丹而上書謝漢漢未能征魏書西域傳龜兹國東有侖臺即漢貳師將軍李廣利所屠者唐書地理志北庭大都䕶府領輪臺縣有静塞軍大厯六年置又有輪臺州都督府又自龍泉守捉六十里至東夷僻守捉按輪頭即輪臺漢時小國李廣利屠之後其國并於龜茲而舊城尚存故漢屯田之使於斯托處漢書稱其與渠犂地相連魏書謂在龜兹國東盖渠犂西去即為輪臺亦瀕河之地漢詔輪臺西於車師千餘里特粗舉其槩耳其實輪臺在車師西南也唐書有輪臺縣復有輪臺州者縣與金滿後庭西海並列所轄之境殊廣州屬北庭二十三都督府之一視縣為小而均𨽻北庭原非兩地又唐書地理志所謂龍泉為伊蘭布拉克詳見水則西六十里之東夷僻守捉當在玉古爾西也又按唐書地理志注云自庭州西延城西六十里有沙鉢城守捉又有馮洛守捉又八十里有耶勒城守捉又八十里有俱六城守捉又百里至輪臺縣鄂頗爾鄂頗爾在英噶薩爾北三十里東距哈喇沙爾城五百九十里自英噶薩爾經此西行可通庫車以上屬哈喇沙爾庫車屬兼轄沙雅爾庫車東至第納爾郭勒接哈喇沙爾界西至烏恰特達里雅亦名鄂根河接賽喇木界南至烏恰特達里雅北至額什克巴什鄂拉通天山北路伊犂界沙雅爾東至托伊博羅多接哈喇沙爾界南至塔里木濵大河西至塔木根庫勒接阿克蘇界北至烏恰特達里雅庫車庫車在第納爾郭勒西二百五十里距京師一萬八十里城周四里六分東南北三面形圓西面形方髙一丈九尺乾隆二十三年五月大兵追討逆回霍集占至此六月霍集占來援庫車我師敗之於烏恰特達里雅以殘兵入庫車城七日復西遁八月逆黨阿布都克勒木拒守未下攻之閱三月舊伯克阿集等以城降城西六十里曰沙爾達朗西行至烏恰特達里雅西北行至赫色勒郭勒御製軍書戊寅軍書羽速至謂喜顧生恨言志兼紀事顛末必傳信先是搴回纛將謂賊渠遁兹因沙雅降雅爾哈善等先以迎𠞰霍集占殱衆搴旗回酋兔脱走報至是沙雅爾城回長阿三和卓木乞降録其供詞始将軍霍集占敗入庫車潰圍不得出後乘夤夜遁去諸將並未追擒情節歴歴叙明伯克親詳訊始知霍集占來救庫車困為我兵所截入城欲伺釁合力旋突出被遮復挫靭仍率四百騎夜出身免憗咄哉堪扼腕選將吾未慎失機有如此是豈踈防僅譬鴞自投羅解放翻成吝夷考自軍興誤事率臣藎徒憐諸士卒奮勇冒白刅賴天雖有成決䇿屢多悶自責不知人遑敢弛國憲御製得庫車誌事有序戊寅庫車之圍將軍雅爾哈善坐失事機方小和卓木率衆來援屢經被殲而任其潜入潜出若罔聞知前後奏報矛遁俱見前詩知其株守淹時必致逆黨兔脱坐得空城以自解今報知悉如所料詩以識恨我師乆圍賊庫車讀作歌韻殲其援者紛如麻惟是將軍無紀律卒至竄走彼么麽軍書之什已誌恨後聞地穴為賊遮雅爾哈善州緑營穴地火攻計轉而為賊覺横截一溝焚燒兵丁乃不自引咎惟委罪将佐塞責預料將得空城耳彼賊腹心仍逃他驛章忽至共披閲一一如言曽不差言則不差事則僨用匪其人愧若何漢書西域傳龜兹國王治延城去長安七千四百八十里南與精絶東南與且末西南與扜彌史記作扞罙後漢書作拘彌北與烏孫西與姑墨接東至都䕶治所烏壘城三百五十里初貳師将軍李廣利擊大宛還過扜彌扜彌遣太子賴丹為質於龜兹廣利責龜兹曰外國皆臣属於漢龜兹何以得受扜彌質即將賴丹入至京師昭帝以丹為校尉將軍田輪臺龜兹王殺賴丹宣帝時長羅侯常恵使烏孫還攻龜兹責以前殺校尉賴丹龜兹王謝曰迺我先王時為貴人姑翼所誤我無罪執姑翼詣恵恵斬之時烏孫公主遣女来至京師學鼓瑟漢遣侍郎樂奉送公主女過龜兹龜兹前遣人至烏孫求公主女未還㑹女過龜兹龜兹王留不遣復使使報公主主許之後公主上書願令女比宗室入朝而龜兹王絳賔亦愛其夫人上書言得尚漢外孫為昆弟願與公主女俱入朝元康元年遂来朝賀王及夫人皆賜印綬夫人號稱公主留且一年厚賜送之後數來朝賀絳賔其子丞徳自謂漢外孫成哀帝時往来尤數漢遇之亦甚親宻東通尉犂六百五十里後漢書西域傳建武二十二年莎車王賢既攻殺龜兹王遂兼其國又自立其子則羅為龜兹王數嵗龜兹國人共殺則羅而遣使向匈奴更請立王匈奴立龜兹貴人身纛為龜兹王龜兹由是属匈奴班超傳龜兹王建為匈奴所立倚恃虜城據有北道攻破疏勒永元三年龜兹降以超為都䕶拜白霸為龜兹王遣司馬姚光送之超與光共脅龜兹廢其王尤利多而立白霸使光將尤利多還京師超居龜兹它乾城六年超發龜兹兵討焉耆延光三年班勇至樓蘭龜兹王白英自疑未下勇開以恩信白英乃率姑墨温宿自縳詣勇降晉書西戎傳龜兹國西去洛陽八千二百八十里俗有城郭其城三重中有佛塔廟千所武帝太康中其王遣子入侍恵懐末遣使貢方物於張重華苻堅時堅遣其將吕光率衆七萬伐之其王白純距境不降光進軍討平之魏書西域傳龜兹國在尉犂西北白山之南一百七十里都延城其王姓白即後涼吕光所立白震之後所居城方五六里東有輪臺其南三百里有大河東流號計式水即黄河也東去焉耆九百里南去于闐一千四百里西去疏勒一千五百里北去突厥牙帳六百餘里東南去𤓰州三百里其東闕城戍冦竊非一世祖詔萬度歸擊之龜兹遣烏羯目提等拒戰度歸擊走之大獲駝馬而還自後毎使朝貢周書異域傳保定元年龜兹遣使來獻隋書西域傳龜兹漢時舊國也東南去𤓰州三千一百里大業中遣使貢方物唐書西域傳龜兹一曰邱兹一曰屈兹東距京師七千里而贏自焉耆西南步二百里度小山經大河二又步七百里乃至横千里縱六百里君姓白氏居伊邏盧城北倚阿羯田山髙祖受禪王蘇伐勃厥遣使入朝㑹死子素伐疊立號時健莫賀俟利發後臣西突厥郭孝恪伐焉耆乃遣兵與焉耆影援自是不朝貢蘇伐疊死弟訶黎布失畢立二十一年兩遣使朝貢然帝怒其佐焉耆叛乃以阿史那社尒為崑丘道行軍大總管部兵十萬討之社尒次磧石去王城三百里先遣伊州刺史韓威以千騎居前右驍衞將軍曹繼叔次之至多褐與王遇大破之追奔八十里王嬰城社尒將圍之王引突騎西走城遂㧞社尒凡破五大城男女數萬遣使者諭降小城七百餘西域震懼社尒立王弟葉䕶王其國勒石紀功始徙安西都䕶於其都統于闐碎葉疏勒號四鎮髙宗復封訶黎布失畢為龜兹王與那利羯獵顛還國久之王来朝還羯獵顛拒不内遣使降賀魯悒悒死詔擒羯獵顛窮誅部黨以其地為龜兹都督府更立子素稽為王授右驍衞大將軍為都督天授三年王延田跌来朝始儀鳳時吐番攻焉耆以西四鎮皆沒長夀元年武威道總管王孝傑破土番復四鎮地置安西都䕶府於龜兹以兵三萬鎮守開元七年王白莫苾死子多市立改名孝節十八年遣弟孝義来朝地理志龜兹都督府貞觀二十年平龜兹置領州九闕唐西域記屈支國東西千餘里南北六百里國大都城周十七八里伽藍百餘所僧徙五千餘人國東境城北天祠前有大龍池諸龍易形交合牝馬遂生龍駒𢤱悷難馭龍駒之子方乃馴駕所以此國多出善馬恃力作威不恭王命王乃引搆突厥殺此城人畧無噍類城今荒蕪人煙斷絶城北四十餘里接山阿隔一河水西北渡河西行六百餘里經小沙磧至䟦禄迦國宋史外國傳龜兹本回鶻别種其國主自稱師子王國有市井而無錢貨東至夏州九十里或稱西州回鶻或稱西州龜兹又稱龜兹回鶻自天聖至景祐四年入貢者五按古龜兹國境後倚白山前臨大河東通輪臺烏壘尉犂焉耆西接姑墨今庫車北去額什克巴什鄂拉一百二十里即魏隋諸書所云在南山南一百七十唐書北倚阿羯田山亦曰白山者也南有額爾勾郭勒横亘於前東歸羅布淖爾距孔道二百餘里即魏書所謂南三百里大河東流號計式水即黄河者也輪臺今之玉古爾烏壘今之䇿特爾尉犂今之哈勒噶阿璊及庫隴勒焉耆國都城今之哈喇沙爾皆屬庫車東境即漢書所謂東至都䕶治所烏壘城三百五十里東通尉犂六百五十里魏書所謂東有輪臺東至焉耆九百里唐書所謂自焉耆西南步二百里又步七百里乃至者也姑墨當今庫車西境即漢書所謂西與姑墨接唐西域記所謂從此西行六百餘里至䟦禄迦國者也第考漢魏二史俱稱龜兹居延城漢書謂焉耆西南至都䕶治所四百里龜兹至都䕶治所三百里合計凡七百五十里又為焉耆南至尉犂百里龜兹東通尉犂六百五十里合計數亦相符而魏書則云東去焉耆九百里夫同此延城東去焉耆里數兩史互異如此及唐書伊邏盧城不知即舊延城與否其與焉耆相距里数乃與魏書正同史家記里前後牴牾容有不必核其實者抑漢之記里長魏若唐計里短也今考漢書車師前國西南至焉耆八百三十五里魏書焉耆東至髙昌九百里髙昌都城在今土爾番而今之哈喇沙爾東去土爾番實止七百餘里可知魏以後計里最短漢較長而今之計里為最長也里短故數多里長則數少此一定之理試以此例推之庫車東去哈喇沙爾九百八十里如即以為龜兹所都不應今之里數反浮於古大抵延城伊邏盧城故址當在今額什克巴什郭勒之東阿巴特托和鼐間而庫車特其西境爾是以魏書稱其東有輪臺見輪臺逼近延城之東而漢書東至烏壘城三百里可無疑於計里之太近也其地去𤓰州絶逺當以隋書東南去𤓰州三千一百里之説為是而魏書去𤓰州三百里應是三千字之訛也至三國志引魏畧稱姑墨國温宿國尉頭國皆屬龜兹是其西境已兼有今之阿克蘇烏什眀史稱巴什伯里為西域大國南接于闐北連衞拉特西抵賽瑪爾堪東抵哈喇和卓是其東境又兼有今之哈喇沙爾也至元史所載之巴什伯里其疆圉濶逺大畧相符可想見矣阿巴特阿巴特為庫車最東境西距庫車城二百里西瀕竒里什郭勒唐書地理志東夷僻守捉又七十里西夷僻守捉按東夷僻守捉在玉古爾西則西七十里之西夷僻守捉當在今阿巴特也托和鼐托和鼐在阿巴特西南一百四十里村落比連烟户稠蜜西距庫車城六十里乾隆二十三年六月大兵討逆回波羅泥都霍集占進圍庫車散秩大臣鄂對告將軍雅爾哈善托和鼐西南有地名托木洛克者道賽喇木拜兩城為逆回援兵要路乃遣侍衞達克他那率兵往偵霍集占以兵三千由托木洛克來㧞達克他那誇至托和鼐遣副都統順徳納等増兵進禦前張兩翼賊依溝升阜列陣未安我兵競進環其四面鎗矢風發喊震林木賊大亂退伏溝隂惟以短兵自衞我軍益賈勇争進自午迄未殲之盡無一賊脱者器甲山積獲馬駝羊無算御製托和鼐行戊寅我師攻圍賊庫車臨衝茀茀四面羅舊降伯克回部中宰桑謂之伯克為我用其名鄂對顯職加授職散秩大臣備知彼中之形勢悉告將臣防周遮托和鼐地名通賽里木地名賊來援者所必過爰遣達克他那藍翎侍衞名瞭遂見踪跡詳寡多以計誘賊賊遂至達克他那緩行誘賊賊住亦住賊進則退遂引至近軍營處請為前導𠞰賊窠發師順徳訥副都統領隊大臣率往堂堂之陣誰逆賊賊不自量犯兩翼兩翼飛馳張鸛鵝長箭大礟如雨下狂回奔亂氣消磨填溝受殺敢迴顧血流漂杵時無何𠞰賊二千四百餘傷我十數忠堪嘉是為征回第一戰遂叨天祐威荒遐軍書日馳六百里奏函夜至披衣視賜官錫禄酬庸勲克城更待頒恩㫖討逆伐罪非得已鯨鯢京觀豈所喜常格常格在庫車城南七十里廬舎比密為大村莊哈喇阿薩爾哈喇阿薩爾在常格北三十里北距庫車城四十里裕赤哈喇裕赤哈喇在哈喇阿薩爾北二十里西北距庫車城二十里阿勒玉蘇布阿勒玉蘇布在裕赤哈喇東南十里西北距庫車城三十里嬴和嬴和在裕赤哈喇西南四十里東北距庫車城七十里達烏圖達烏圖在嬴和東北三十里東北距庫車城四十里庫克體騫庫克體騫在達烏圖北十五里東北距庫車城二十五里哈魯納斯哈魯納斯在庫克體騫北十里東北距庫車城十五里特勒伯特勒伯在常格東南三十里西北距庫車城一百里不通路徑額什克巴什額什克巴什在天山南麓西北距庫車城九十里特集克特集克在常格西北四十里東北距庫車城一百里傍烏恰特逹里雅竒里什竒里什在庫車城東北六十里其正北境當天山正幹阿爾坦呼蘇南麓距庫車城一百里又西北地名沙爾達朗以上屬庫車沙雅爾沙雅爾北距庫車城一百五十里踰烏恰特達里雅而至距京師一萬二百三十里城周二里許髙一丈四尺南北二門霍集占自伊犂歸時裭其舊有伯克烏哈墨第以逆黨阿布爾什木為伯克横征口糧驅虜牲畜回氏愁怨未敢發乾隆二十三年六月我師攻圍庫車賊自沙雅爾來援者為大兵擊敗阿布爾木什聞風震懾挈妻子逃奔阿克蘇烏哈墨第乃遣其子阿三和卓以沙雅爾城内附按唐西域傳龜兹横千里縱六百里阿史那社尒討龜兹破五大城遣使諭降小城七百當時龜兹并有姑墨是以東西拓地千里其小城七百之舊雖難悉考如今賽喇木拜沙雅爾諸城在五大城數内則大畧可覩也托伊博羅多托伊博羅多在沙雅爾城東一百二十里踰烏恰特達里雅而至東通哈喇沙爾界塔里木塔里木在沙雅爾城南臨大河塔木根庫勒塔木根庫勒在沙雅爾城西一百四十里地多沙磧不可耕喀伊木阿塔喀伊木阿塔在沙雅爾城東南四十里南臨大河不通徑路坡斯坡斯在沙雅爾城東北三十里查盤查盤在沙雅爾城西南四十里又西南通阿克蘇境哈爾噶齊哈爾噶齊一名卡魯瓦乞在沙雅爾城西北五十里烏恰特達里雅南西通阿克蘇境庫克布葉庫克布葉在沙雅爾西北四十里城垣卑小東傍烏恰特達里雅以上屬沙雅爾葉勒阿里克葉勒阿里克在沙雅爾西南七十里南距大河八十里葉伊勒干葉伊勒干在葉勒阿里克西八十里布古斯孔郭爾郭布古斯孔郭爾郭在葉伊勒干西二百五十里按自沙雅爾西行至此為漢姑墨南境唐屬龜兹西南境南傍塔里木鄂斯騰即水經所謂河水東逕姑墨國南唐書地理志所謂自撥換碎葉西南渡渾河者也以上係沙雅爾西南境外地欽定皇輿西域圖志卷十五
