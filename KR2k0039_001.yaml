body:
  text: 圖考一皇輿全圖西域全圖安西南路圖安西北路圖一安西北路圖二天山北路圖一天山北路圖二天山北路圖三天山南路圖一天山南路圖二天山南路圖三天山南路圖四天山南路圖五天山南路圖六欽定皇輿西域圗志卷一目録欽定四庫全書欽定皇輿西域圖志卷一圖考臣等謹按周禮職方大司徒土訓諸職並掌土地之圖然核其疆域廣輪與夫墳衍邱陵藪澤之所隸率不出中區九畿而止我聖朝撫有方夏丕基式闊既衰直省郡邑之記為一統志備列輿圖麟麟炳炳載在册府宮司掌之維西域古稱絶徼史籍荒邈好博者不過臚舉人物怪異以為侈談無禆實用洪惟聖祖仁皇帝軫情邉計遣使咨訪已繪有全圖勒諸銅版我皇上纘承前烈宏啓新疆凖噶爾部回部並入昄章分命臣工傳乘履勘方輿晷度並得諸目擊身親逺近翔實訂證舊圖務俾無毫髮爽進御之日宸章寵冠自此氷天火州與腹地川原同登指掌矣兹輯圖志用尺幅為縮本復據駐防大吏各就所轄分繪互勘形勢倍顯總圖所未能悉者重以分圖圖所未能賅者系以帖説而山川端委則務規全局源流脈絡灼然可尋藩屬疆索亦列簡中用昭環拱之盛至于由今溯昔纍朝沿革之迹約以漢書為綱領本其道里方位旁𠫭道元水經循環閗筍取證新圖合猶符節晉魏以下雖詳略互異而次第可推庶于縱橫上下間得印合今古較如聚米且見聖代幅員之廣幪覆無外實邁越萬古云志圖考第一皇輿全圖説中華當大地之東北西域則中華之西北為大地直北境也自嘉峪關西迄凖部回部外列藩部圓廣二萬餘里其疆圉之濶逺幾與中土埒自古英君誼辟聲教有所不通有時力征經營而羈縻服屬卒未聞有混而一之者厥故安在蓋以德之所覆有其及之必有遺也量之所包有其舉之必有失也其德與量之弱者即一中華而離為十二合為六七三分之國南北之朝猶不足以囊括而包舉必俟諸數十年或數百年而後見大一統之盛况其外焉者乎若夫德足以充六字而六宇不足以究其德量足以配八極不足以殫其量則舉從古帝王經營不及之區域亦將全畀之以副德與量之所歸其事雖創而其理則常也我皇上神靈天亶舉堯舜禹湯文武之所以為君者集其大成以宰制宇內夫固清和咸理矣而無窮之德量猶恢恢乎有餘地焉於是乎帝心攸眷乾貺彌隆用創鴻規以翊我聖人未有之竒功於前古後今之際而後中土之與西域始合為一家撫斯圖者當凜然於千秋功烈之駿惟我皇之德與量有以致之此固以堯舜禹湯文武之為君而不能得於中天之世者也西域全圖説西域在古為西戎自漢孝武始通其境厥後二千年來向背靡常前史備載其事大抵文弱之世規模不逺外夷酋長各若其國以長世稱雄互相吞噬不奉朝命及當中國強盛鋭意外攘職貢所通稍受約束三代以降宋時隔越西夏併不獲與接境明則棄地閉關退葸已甚其長駕逺馭號稱濶大者莫如漢唐然考其時僅設都護府置羈縻州虛存統率之名初無服屬之實夷酋之稱王稱汗畫地以守者自若是以旋服旋叛反覆無定英君誼辟力征經營訖不能以混一皇上乾綱獨斷神武布昭初因機會之可乘嗣以根株之必絶星馳電掃雷厲風行遂使數千年阻深汶昧之區子臣其民版籍其地咸得耀於光明視大禹之敘西戎祗以織皮通貢其難易廣狹何如而自漢以下益無論矣其地在肅州嘉峪關外東南接肅州東北直喀爾喀西接䓤嶺北抵俄羅斯南界畨藏輪廣二萬餘里天山以北凖噶爾部居之人皆強悍逐水草無城郭天山以南回部居之風氣柔弱有城郭土田良沃人習耕種利矢猛炮其力足以戰重岡疊嶂其險足以守此天地之奧區纍代以來畨夷迭居得以抗衡中國者職是之故間考漢書西域三十六國皆在胸奴之西烏孫之南南北有大山中央有河東則接漢厄以玉門陽關西則限以䓤嶺諸國大率土著有城郭田畜與胸奴烏孫異俗故皆役屬胸奴今自鎮西府西至伊犁天山綿亘三千餘里即漢書之北山也敦煌縣西之黨河口紅山口古玉門陽關遺址也喀什噶爾葉爾羌以西之山即古䓤嶺其自嘉峪關外迤南自東而西以達於蔥嶺即所謂南山者也而中央之河今之羅布淖爾是也由是言之則今回部諸城為古西域有城郭之三十六國確然無疑至凖夷在天山北並為烏孫地其東境猶屬胸奴也故古之稱西域者指南北兩大山內之諸國言之而新闢皇輿之西域兼及北山之北古烏孫胸奴故境拓地尤廣至左右哈薩克東西布魯特霍罕安集延那木干塔什罕拔逹克山博洛爾布哈爾愛烏罕痕都斯坦巴勒提諸部揆諸往古當屬康居大宛休循損毒烏托難兜月氏罽賔諸國奉朔獻琛實踰重譯分繪全圖以限於楮幅祗載山川都會之大者而備論其梗概如此安西南路圖説唐之安西初治西州後移龜兹特為羈縻外藩之所今之安西即漢酒泉敦煌故壤久為西陲屏衛近復置設州縣與內地相維出嘉峪關而西延袤千里皆其地也昔人稱為國當乾位地列艮墟水有縣泉之神山有鳴沙之異川無蛇虺澤無兕虎形勢之美亶其然乎披圖而考三危流沙其迹最古因以訪玉門陽關之遺址慨吐蕃西夏之竊據稽前明諸衛之廢興俯仰千載倍深生逢盛世之幸矣安西北路圖説一此安西州北哈密暨鎮西府之全境也道周千里不必屬於安西亦以安西名者其地向無統名今道員已移駐府境舊稱安西道則因安西以連及之也哈密鎮西府同在天山東陲南北相隔中為庫圖扼形勝控極徼誠西域之咽喉邉關之鎖鑰往時以哈密為外藩故嘉峪關西連設五衛而安西屹然為重鎮今則幅員萬里皆我版圖於是設守令於瓜沙舊墟駐總兵於伊吾故壤天山要路鎮以軍門沿山而西郵傳絡繹遐陬逖土指臂相聨洵得制御荒服之要矣安西北路圖説二凖部以伊犁為定自今鎮西府西行至伊犁三千里之間以烏魯木齊為適中膏潤之地今為迪化州全境東南傍近祁連山環水帶最稱腴壤兩漢以來未入中國唐得之為北庭都護府非以其水深土厚鬱成都會之區歟其左右諸境水泉饒裕並宜耕牧居今稽古則單桓蒲類移支諸國之於漢處月處密諸部後庭金滿諸境之於唐遺壤斯在兹並入聖人之字而康衢萬里斥堠風清豈如古者羈縻服屬僅録其招降開置之目以相震耀者歟天山北路圖説一太白山隂凖夷是宅而北境尤廣東抵阿勒坦北界俄羅斯南臨沙磧中間土地肥腴厥名塔爾巴噶台為古胸奴烏孫交壤處唐則西突厥諸部在焉山形水脈逶迤西走長流巨浸都在岡巒襟帶間往時部落錯處利賴保居金山以為屏邏水以為池何必非形勝所憑而桀黠反覆卒就芟夷覽者於此考五單于角逐之場稽三葛邏憑陵之迹益共仰聖謨之運不徒誇地勢之雄若其南境與迪化州接畛斥鹵彌望略同浣海蓋即唐之沙陀州云天山北路圖説二伊犁形勢甲西域髙山長河表裏環抱漢之烏孫大昆彌治唐之突厥可汗庭當在於此也雖俗不土著雲集烏散而厥酋負阻是有常區以為鬬智角力之藉亦所謂扼要者歟自是東南行五百餘里胥水泉之腴壤實山川之隩區蓋凖部以伊犁為庭而自哈什迄裕勒都斯其門户也於焉訪岑陬射匱之遺壤溯鷹娑伊列之故流振古梗化之區悉歸王度豈非習染久汚剝極而復遂得耀于光明之宇歟天山北路圖説三自伊犁而西洪流奔逝北瀦為澤踰河眺覽境地忽開羣山界畫萬川輸委形勢所擅稱兌域之隩區焉以漢武雄材經營盡瘁可謂長駕逺馭而烏孫西境則車轍未之能及豈非境地愈逺聲教之推暨愈難與方今聖德誕敷廣被無垠之域伊犁既我侯旬而右境悉屬版圖頌格登之鴻文功與蒼山並峙矣其在於古則赤城栁谷之墟碎葉千泉之𣲖閲嵗二千雲煙陳迹而臨水登山訪求故實猶能想見其大概焉天山南路圖説一西域城郭多於山南而闢展所屬為尤盛周圍千有餘里之間雉堞參差煙火彌望近依金嶺逺抱天山南北流泉彎環如帶訪髙昌之故壘溯交河之舊流兩漢以來久稱勝地昔者回人是宅見逼凖夷內慕王化遷附甘沙西州故墟棄為榛莽近以大功耆定俾復故地沐浴膏澤尤深他部史所云地勢髙敞人庶昌盛者皆可按圖而得之夫山川千古不易而人民有時盛衰則彼花門帕首之儔固何幸而得際此升平之會歟天山南路圖説二漢西域三十六國惟焉耆龜兹最饒地利班趨五年孤守疏勤二國獨未服從猶俟上書請兵然後通貢入侍今考其遺墟當闢展西境北倚祁連南連計式縱橫之間形勢合沓良田嘉禾蒲葦魚鹽之美潤澤乎疇壤充牣乎海曲是以漢時都護屯田之使於兹託處李唐四鎮並重而碎葉龜兹居二於此豈非當西域之中而雄區猶擅者歟若夫溯蒲海之宏流窺潛行之故迹印合水經不暌分寸有與積石河源相發明者為並繪於圖天山南路圖説三自庫車西出為賽喇木拜阿克蘇三城古龜兹西境姑墨溫宿兩國地也赫色勒郭勒哈布薩朗郭勒木素爾郭勒阿克蘇郭勒托什干達里雅經流環抱於三城之間而阿克蘇城為尤大且居回部之中審求形勢宰制區域洵扼要地也北踰木素爾鄂拉路通凖部髙峯峻坂人艱登涉是曰白山亦曰雪山冬夏積雪不消千里同縞鄭樵云郡縣之設有時而改山川之秀千古不易旨哉言乎木素爾謂氷蓋回語云天山南路圖説四回部名城不一而喀什噶爾為之冠西屏蔥嶺東引長河疏勒遺都宅深阻隩漢時定逺侯班超長驅扼要是經是營二十餘年殊方馴服無有異萌非地勢之所居有可以建瓴而治者歟其東為烏什城亦山南諸境適中扼要地我朝武功逺軼漢代西陲膏沃咸收襟帶之間自烏什以西暨於喀什噶爾城堡鱗次披圖而覽地勢之邈綿仰神機之廣運訪求磐藁楨中之迹移易兜題安國之風當有慶逢斯盛者矣天山南路圖説五西域以蔥嶺為西屏蔥嶺之東南北名域相望有若對待而葉爾羌地近南山左接于闐右臨疏勒山縈水帶境尤寬廣誠邉徼之上腴足同功於內地也漢代莎車王賢建國於此陵躐兼并雄視一時雖皆其所自為亦憑依者厚歟襟帶之間得古皮山梁莎西夜子合諸國在右毗連遺墟可指而要以葉爾羌為極西門户西通布魯特拔達克山諸藩部則控扼綦嚴今者銷氛濛汜包甲虎皮削石蒼崖勝蟬聖藻梯航之侶萬里來王均得取道名都而欽心於駿烈之垂焉天山南路圖説六漢自敦煌西南行為南道通于闐晉魏以降南道阻絶唐時號為磧尾設毗莎鎮于此其地即今和闐也境阻宅幽三采韞輝璇源方折於回部中為最南境而南山之南地通西藏舊屬版圖聮南北為一家儼康衢之可達是不惟重關扼要而阻深幽絶之境咸得耀于光明矣由是溯崑崙之古源尋樹枝之舊𣲖當時博望西馳惟是粗傳崖略今者星軺絡繹玉石紛羅河出于闐之舊有不徒案古圖書而可得之於目睹者矣欽定皇輿西域圖志卷一
