body:
  text: 御製皇輿西域圖志序語云耕當問僕織當問婢志廣輿者不稽之厯代建置沿革將無從數典而志西域則有不能盡稽之厯代者實以幅員所限言語不通雖漢唐盛時亦頗能威行天山迤南建官設都而天山迤北本不能至也即有一二羈縻之國然叛服不常征調弗應又安能履其地而疆索之哉且漢唐之程督異域者仍漢唐人而已其與凖噶爾回部人語奚啻粵問而燕答則其所記魯魚亥豕之紛不待言而可知兹者叨天佑藉羣力湊時會幸成是役準噶爾回部之人皆在廷執事而國語切音譯外藩語又甚便且易我諸臣馳驅往來其間目覩身厯非若耳聞口傳者比俾司校勘而正其訛傳其真較僕婢耕織之問為尤詳且厄魯特語及回語朕亦因暇而習焉時御丹槧為之改正是西域志之書必應及是時成之用開厯代之羣疑垂千秋之信録間亦涉及諸史以存述古總計分部二十分卷五十有二繪圖系説蔚為完書若夫闢地蕆功文臣或有過頌朕所不取惟是籌耕牧計久長圖所以永乾貺奠丕基思日孜孜持盈益凜豫安得有功成無事之説哉乾隆二十七年十二月初一日欽定四庫全書欽定皇輿西域圖志諭旨乾隆二十一年二月十三日奉上諭自軍營至伊犂以抵哈薩克率漢唐來胸奴西域地其山川部落前史類多訛舛蓋外蕃本無載籍史官無所徵信又未嘗親履其地惟藉傳聞而方言口授輕重緩急間語音頓異况復時代遷移益難追考然即今留意核之如落克蘭急呼之則為落蘭當即樓蘭其聲轉耳漢書屈里計其地即今伊犂以此證之往往可通前曽以此諭鄂容安據奏既無可考蓋必求之圖志碑碣自非荒陬絶徼所可得彼時伊以軍務為急無暇分營因姑置之今已擒賊奏功劉統勳在軍營無所職掌當專辦此事現命何國宗赴伊犂一帶測量亦經面諭著傳諭劉統勳即會同何國宗前往所有山川地名按其疆域方隅考古驗今彚為一集咨詢覩記得自身所經厯自非沿襲故紙者可比數千年疑誤悉為是正良稱快事必當成於此時亦千載會也可將此傳諭知之欽此乾隆二十一年四月初九日奉上諭何國宗原係奉差前往伊犂一帶測量晷度並令繪畫地圖現在即由巴里坤一帶及額林哈必爾漢等處已儘足伊等今嵗辦理至冬間氷雪凝寒或回至巴里坤或哈密居住俟明春草長再行前進現今厄魯特當殘敝之後人多窮困既無可交易兼恐中途攘奪伊等所賞資斧本自寬裕可即從巴里坤自行備裹乾糧從容前往劉統勳亦即會同何國宗一路行走遵照前旨將所有山川地名考驗纂録進呈並傳諭劉統勳知之欽此乾隆二十六年六月十八日奉旨劉統勳何國宗所辦西域圖志著交軍機處方略館辦理欽此乾隆四十二年三月二十九日奉旨西域圖志總裁著派福康安劉墉欽此乾隆四十二年六月二十八日奉旨西域圖志總裁著派于敏中英廉錢汝誠欽此御製大宛馬識語嵗乙亥準噶爾平越明年左右部哈薩克以次內附又明年使臣入覲隨獵有詩紀事並加按定哈薩克為漢之康居又越二年哈薩克來貢馬因成是歌仍謂之大宛者以自古相傳大宛産善馬也夫西域諸國何地不産馬而大宛獨擅其名漢時人足未履其地僅聞其名阻閡䀛昧遂以為大宛所獨耳不寧惟是即我朝西極未定之前準噶爾所貢馬率謂之大宛向按大宛部落疆盛附庸者多哈薩克當是其部中之一國非臆説也史記載康居南羈事月氏東羈事胸奴則康居固他人之屬國耳張騫使月氏為丐奴所閉及亡抵大宛而大宛遂能為發導驛抵康居是康居本聽大宛役屬也唐書載石國故康居小王窳匿城地漢書所謂康居小五王之一而唐顯慶中以為大宛都督府亦其一證故哈薩克以漢語言之則為康居自其服屬言之則原大宛近三十年來軍吏塗經貢使踵接汗血之馬服早獨樹之迹寄題非如前代鑿空者比此歌與丁丑按語固相印合不得以異同致疑矣幾暇重書是卷因識之乾隆二十七年十一月二十九日大學士一等忠勇公臣傅恆等奉敕纂輯西域圖志初稿告成謹奉表恭進者欽惟我皇上神武懋昭德威遐被智勇超乎百代鴻貺彌臻聲教式于九圍前猷允迪二萬里狉榛之窟逺護風雲三千年濛汜之區新懸日月事屬生民所未有境為亘古所罕通天惟純佑我皇清帝實肇開兹西域齊文軌於流沙之外勳名早紀雲臺指山川於納日而遙疆索宜登策府原夫六師獻捷兩部歸懷戮叛誅逋則功成於回地持危治亂則策定於凖疆當狐􅓔濟惡之餘遘蠻觸紛爭之會慰逺人之獻欵策凌首沐衣冠假新附以前驅厄魯方深水火馬首羣攜潼酒知昂吉之偕來狼頭已折風竿卜綽羅之早定草五騎格登之旅競傳壯士翻營六千餘濟拉之師終見名王繫組詎謂飢鷹飽揚沙陀偏少赤心應知鋌鹿狂奔羅剎能收白骨總台吉之機心素具先幾早炳宸衷雙親王之恩遇偏孤貫惡寧逃天譴是用犁其庭穴釋彼羈囚方事􅌢戈俄聞衷甲在凖逆既窮猿入檻而回酋復黠鼠跳囊方王旅之西征沙蟲掃迹更天戈之南指風鶴傳聲白山則雪窖晨翻已著搴旗勝迹黑水則雲濤夜湧猶聞堅壁餘威集占遁而庭幕空萬馬破弟兄之膽霍斯來而都城墮一檄傾父子之心推堅而淖過伊西早見飛廉影匿服逺而山通拔達還看二負尸僵於是威集二勳化行萬落負罪者孽由自作既落距而摧牙懷德者誠有同歸自駢肩而接踵慶庭方於哈薩宜來宛馬驤雲嘉獻馘於坦沙旋見食刀營雪所以不煩六慰三宣之力胥靖一苞二孽之萌擬傅介之績著樓蘭不自陽關而近視班超之威行定逺無須卅載為期者也今試覽勝地於金方辨名皋于兊域闢天方之門戶信中原不盡提封鬯昧谷之聲靈知西極自占形勢四衛拉經營之地井牧重新兩和卓割據之場耕煙相望博克達之靈峰欲削百尺盤雲穆薩爾之雪幛初開千層積玉北渚則百泉俱濬滙圖斯庫以西流南河則四派同歸經厄爾勾而東注大抵疆分鄂托沿山之鄂博星羅亦惟地接和通臨水之和屯碁布當年選佛曽集喇嘛此日談經初逢阿渾溯宗喀巴之遺教還聞梵唱于西圖稽派罕帕之流風尚驗雲雷於鮓答試問凹睛凸鼻孰外陶甄幾同赤縣神州咸收襟帶由是頓天紘而規逺服翻古籍以鏡前模自烏孫以阻康居磧北久稱行國始焉耆而迄疏勒山南舊建名城伊犂實伊麗之流一鏡澄波可溯和闐即于闐之壤萬重琛玉偕來碑嶺巃嵸未泐裴岑之石星源咫尺疑乘博望之槎雨後耕犂曽傳戊校尉已校尉之説風前鼓角還聞都護府都督府之開九昭武角逐之區競説重關鎖鑰十部落回翔之地長留四鎮聲名然或列外藩而僅備羈縻誇逺略而粗通貢獻留其侍子既鄭質之終攜結以和親究戎心之不靖泥守在四夷之説每涉拘墟哆傳聞旁國之談終鄰鑿空幸際五周之盛烈式恢九有之方輿超周室之咸賔邁禹王之即敘漢史唐書之紀真成坐井而觀山經水注之垂宜可極陬而勘爰乃陳諸圭臬省厥風謡測量首命司天無間于星躔月朏采訪兼咨珥筆不遺于瀚海氷崖檢點行縢喜江山之放眼編摩載籍遂紙墨之經年爰宣史館以成書更集樞臣而訂義分一十八門之紀載備四十餘帙之搜羅雖制度加新異日猶煩裒輯而規模燦列大端約可臚陳于焉欽廟略之淵深頌奎章之炳煥神機獨寫蕭曹莫贊髙深睿什親裁褒鄂遙承經緯藉仰窺夫宵旰謹録冠乎縹緗由是成縮地之圖廣輪如繪列旁行之譜沿革堪稽星分參井之躔宛珠聨而璧合疆劃大蒙之宇儼罫列而區分層峰與孤嶂同標不盡䓤山雪曉巨浸與長流並載非徒蒲海霞明存葉護之頭銜鷺序鵷班並肅表勝兵之風烈龍韜豹略皆竒興屯踰烏壘之墟髣佛千塍入繡則壤過龍沙之境分明萬寶成圖採方言則清濁殊音全似舌人之臚句考木筆則縱橫異體略同瞽史之書名翻新曲於和聲疑傳兜勒西涼之譜備良材於日用如數波斯列市之珍殊俗紀於遐方則白帽黃衣自垂風教珍産傳於絶域則金蹄玉碗亦獻菁華至於玉帛雲蒸琛球霧集志來庭之侯服不限梯航備奉朔之藩封遙通象譯靡不登諸鉛槧彚入編題凡義例所畢賅總部居之莫混撫卷而形同目擊何煩金馬之求開函而境已身親無事東風之驗詎比西申獨鹿僅哆名王會圖中還同赤水方山堪紀迹大荒經外允備西瀛之典宜儲東觀之裁臣等時際恢紘才慚聚米陋甘英之纂述珍異空傳薄裴矩之編摩見聞失據王延德髙昌之紀惟載程途髙居誨于闐之篇粗傳山水伏睹虞廷啓化正階前舞羽之時欣逢周索開疆當柱下操觚之會恍過祁連而削石紀盛於東西天竺之間如臨洱海以濡毫探竒於大小月氐之外於以琅環紀實寧惟銅柱名髙因之清晏貽庥長使金甌祚永臣等誠歡誠忭稽首頓首恭進以聞本日奉旨書留覽欽此乾隆四十七年五月初十日大學士臣英廉遵旨增纂西域圖志告成謹率同纂修諸臣統校畫一奉表恭進者欽惟我皇上功髙統一德被懷柔拓西極之山川二萬里同歸幬載照中天之日月億千年永懋經綸史編垂麟閣初成早目張而綱舉郵治軼龍沙逺屆逾月盛而日新允觀規制之大全宜效纂言於極備懿惟六師偃伯氛消月朏之區四塞恢紘化浹天山之路規勝地則和屯遞建爭開額魯新疆撫名城則伯克分羅樂順筠沖舊俗荷頻年之休養雨潤日暄慶逺服之歸依雲從星拱惟帝德之包涵廣博不藉招徠故天心之佑助靈長頻邀寵錫爰稽凖裔留額濟勒之荒墟為遡卯秋來阿玉竒之全部指盈億兆提擕皆內面之儔程閲暑寒經涉盡不毛之地儼三策凌之獻欵並錫圭符恰四衛拉之投懷均登衽席山莊賚晏伊綿符拱極之占藩院書名卓里著邁羣之號軫流離於始至遍給餼糧謀生聚於方來長資耕牧洵會歸之盛軌尤胞與之鴻模若夫河過重源疆連四鎮腴壤舊傳烏什變且彌康戰圖重上紫光久而有耀溯庚辰之飲至五年正慶恬熙會乙酉之滋萌六事還勤宵旰駑材覂駕僨轅嚴斧鉞之鋒健將先登壓陳煥旌旗之色乃穴庭之淨掃旋都會之新開一隅既倍振聲靈兩部自長貽樂利興屯比耦年年墉櫛占豐職貢成圖處處川巖效媚鼓鴻爐於九府不盡開元景德之貽剖藴璞於六城逈超瑪瑙琉璃之萃嚴鎖鑰則玉關西望髙牙並峙雙霓固屏藩則繡甸中分列堞爭環百雉靖虎旅戈鋋之氣城頭畫角初開革烏孫水草之遺磧尾封疆競表郛郭旁連蒲海不限禆瀛村墟近枕沙陀都成緊望府州縣於焉肇建非同僑置伊西守牧令長此相維不是羈縻都護爰藉武成而文並耀斯當養備而教以興矗美富之宫墻同曕數仞布雍容之几席並肄三餘董以師儒逈超木筆旁行之舊遴其俊秀喜遘青氈坐擁之初陋髙昌之置學官粗識孝經論語嗤吐蕃之遣子弟空遊璧水橋門占鴻漸而願切升階歌鹿鳴而恩邀馳驛乍文明之大啓真荒徼所未逢由是博采前聞旁搜古迹溯烏林之世裔緒不墜於脫歡稽青吉之流風派總沿夫噶木時移炎漢永和之石初完代隔李唐金滿之碑半泐梵竺之鐵章依舊得自沈沙折戟之餘龍泉之瓷碗長留來從小雨扶犁之候愛翾飛於鷟鸑瑞應髙岡美移植於葡萄榮滋上苑獨樹傳由哈薩猶留廣蔭於槎耐精鏤致自痕都競識良工於喀嗎都因久道而物華倍顯並際昌期而聖藻頻邀加以闡謬訂訛發凡起例既譯音之務確亦考義之維精陽關非巴噶遜之遺共識嘉名難附于闐為鄂等答之舛羣知佛教多誣辨星躔於九服之餘悟分野難該井鬼探宿海於重源之會信導河必始崑崙敬秉訓於丹毫一字都懸繩臬勉殫能於汗簡千秋長備規程蔚然東觀鴻編偉矣西濛盛典臣等心欽九伐材愧三長當奏勳虎帳之初業琅函之有秩際錫福鴻圖之久宜柱筆之加詳新猷則遍效編摹並包絡夫蔥山洱海古籍則勤思鉤貫略權輿於班史酈經前分卷以染藝毫時荷楓宸之鑒今彚函而呈玉案允增策府之華五期偕方略之編同登鉛槧六體嫓同文之志並煥縹緗頌居馭于執樞早逺軼二千餘年之聲教繪髙深於聚米不徒傳三十六國之規模從知啓宇八紘遍日出入之區為疆索定卜鞏基億載貽海內外之澤以鴻滂矣臣等無任踴躍歡慕之至謹奉表恭進以聞本日奉旨知道了著交武英殿刋刻并寫入四庫全書欽此凡例十六則一王師先定凖夷繼平回部五年之間西域全地悉歸版圖我皇上睿略髙深神謨邃密幾餘揮翰開示端倪地利兵機包羅融貫今編輯圖志恭稽御製詩文之統論西事全局者敬謹彚録卷首其因地紀事即物抒懷之篇分載各卷聖藻鴻章經緯天地遐陬僻壤並沐光華自古紀地之書所未有也一是編恭録天章為卷首四帙餘自圖考以下分門依類次第編纂得圖考三卷列表二卷晷度二卷疆域十二卷山四卷水五卷官制二卷兵防一卷屯政二卷貢賦一卷錢法一卷學校一卷封爵二卷風俗一卷音樂一卷服物二卷土産一卷藩屬三卷雜録二卷門凡二十卷凡四十有八至户口為休養之驗取附屯政臺站亦軍郵之藉並載兵防各以類從務歸體要一山川方位逺近形勢匪圖弗顯圖舉其形志詳其事舊例類然兹自疆域山水以暨藩屬凡繪總圖分圖得二十一附以厯代西域十二圖共得三十三圖各綴論説特為全書提綱一列表始自兩漢訖於元明遵一統志例也周秦以前有可考證者分見志中表不贅列漢唐諸國通名內地搜訂易於賅備五代以降聲教日淺史傳紀載源流不詳兹為彚採古書取足徵信者參互貫串畢登於帙間有無憑考索之處則慎以傳疑未敢強生附會一自嘉峪關以西安西州哈密鎮西府久隸版籍惟是西域蕩平之後改設州縣移駐提鎮經制攸殊且為新疆門户是編託始於此所以備西域之大全也一西域天文晷度古者言天家所弗詳史傳載有諸國相距里數亦未云的實即今星使往來由人迹起數非必直徑也惟測晷影定北極髙度距京師定偏西度斯為凖確兹編所載髙偏度皆命使遄往隨處測量髙下逺近略無爽漏爰以都會為綱附推四境道路原野概從莭略至分野之説空虛揣測依據為難故不贅及一疆域略分四路凡十二卷出嘉峪關自東而西厯敘新設之安西州玉門敦煌二縣為一卷屬安西南路北自哈密抵鎮西府為一卷敘凖噶爾部烏魯木齊東境新設之迪化州為一卷屬安西北路敘庫爾喀喇烏蘇塔爾巴噶台諸路為一卷伊犁東路為一卷伊犁西路為一卷屬天山北路敘回部之闢展屬為一卷哈喇沙爾庫車沙雅爾屬為一卷賽喇木拜阿克蘇屬為一卷烏什喀什噶爾屬為一卷葉爾羌屬為一卷和闐屬為一卷屬天山南路系卷以路卷有繁簡區地以卷地有分合要取疆域分明篇帙相稱用便覽觀一版泉涿鹿師以地稱亦地因功顯土爾畨以東久經服屬平定伊犁時壺漿載道未動戈鋋逮後逆酋負固敢抗顔行落距摧牙應時撲滅允當隨地紀載為簡册光若夫考戰功之大備廟謨神武徹始徹終備載平定凖噶爾方略兹不多及一西域髙山長流大者延折數千里各有脈絡未宜分裂以隸諸路别志山水二門俾得審求根脈考證源委流峙大觀於斯倍顯一志以述事務求前後備登首尾畢貫而取義攸屬不妨互有折衷西域於兩漢之代通絶不常李唐遙設州府不過空號羈縻自入皇朝版籍創建州縣肇興學校制度規為比隆中土而開屯田以足邊儲詳軍政以固牧圉諸部歸誠後始膺圭組之榮是以學校屯田兵防封爵諸門獨詳王制風俗音樂服物土産苐傳舊俗取備職方其官制貢賦錢法舊有設施而至治維新復經釐定者則首垂憲典而附存舊制於後斟酌義例雜而不越總以紀實為歸一凖部回部山川地名自昔流傳各有音義不為審定指歸輾轉相沿本真盡失兹悉詳加體認務從本義以取正音與西域同文志相為表裏至以漢字對音本無意義同音之字酌歸畫一或間用兩合三合法取兩三字合讀急讀成音總求切合本旨庶免承訛之患一考驗古迹備一方掌故志沿革者所有事也雖塞外無史書碑碣山川異稱城郭非故而於形勢音義間求之往往有合編中遍稽正史旁羅羣籍擇其尤雅凡可考據者引述辨證不厭其詳徵信存疑兼為區析並加按字别之所引原文有與本地本事未為毗切者量加節録有其地兩涉者彼此互引若于史傳脫逸鉤索無從則姑置闕如以昭慎重一凡慕義來歸獻琛班朔之國境有毗連例得備載諸部山川晷度風俗物産之概胥歸卷內無庸分見各門其圖表體例與各卷文字判不相入仍歸本門以清章蔀一城池為官守之責廟宇亦風教之徵地理之書類多排纂準部向無城郭邇年次第建置至廟宇則天山南北遺迹僅存並登疆域一門不立專卷崇簡要也軼事零文統歸雜録廣見聞以資考證也自設學造士後春秋選雋至教漸摩禮樂絃歌風同道一藝文人物佇俟續登一在昔志西域者文人務詭華詞釋氏尤涉荒渺揆諸事實多不足徵厯代正史所記已經史官裁擇稍可據依然爾時境猶割據地未身親襲故沿訛自所不免今中外一家星軺使節如履康莊如行內地臣等得之目擊訪之土人以及軍營之奏章地方大吏之入告靡不搜採故是編所録的確周詳語歸質實一是書於乾隆二十一年丙子春原任大學士劉統勳初奉諭旨纂輯後歸方略館辦理于壬午冬初稿告成邇日新疆規度日詳隨事增輯進御仰荷睿裁欽定蔚為完書夫倚弓刀于褒鄂既集千古未集之勳授筆札于鄒枚宜傳千古不傳之烈即臣等承命編摩不勝撫卷而欣忭者也總目史部十一地理類三都會郡縣之屬卷首一天章一卷首二天章二卷首三天章三卷首四天章四卷一圖考一卷二圖考二卷三圖考三卷四列表一卷五列表二卷六晷度一卷七晷度二卷八疆域一卷九疆域二卷十疆域三卷十一疆域四卷十二疆域五卷十三疆域六卷十四疆域七卷十五疆域八卷十六疆域九卷十七疆域十卷十八疆域十一卷十九疆域十二卷二十山一卷二十一山二卷二十二山三卷二十三山四卷二十四水一卷二十五水二卷二十六水三卷二十七水四卷二十八水五卷二十九官制一卷三十官制二卷三十一兵防卷三十二屯政一卷三十三屯政二卷三十四貢賦卷三十五錢法卷三十六學校卷三十七封爵一卷三十八封爵二卷三十九風俗卷四十音樂卷四十一服物一卷四十二服物二卷四十三土産卷四十四藩屬一卷四十五藩屬二卷四十六藩屬三卷四十七雜録一卷四十八雜録二臣等謹案欽定皇輿西域圖志五十二卷乾隆二十一年奉敕撰乾隆二十九年創成初稿嗣以版圖日闢規制益詳進呈御覽之時隨事訓示復增定為今本首四卷為天章我皇上平定西域題詠至多地勢兵機皆包羅融貫惟恭録統論西師全局者辨冕簡端其因地紀事即物抒懷者則仍分載於各門次圖考三卷自幅員所界以及符節所通共新圖二十有一又附歷代舊圖十有二古今互校益昭聖朝拓宇之功次列表二卷上起秦漢下訖元明以明國土之分合建置之沿革次晷度二卷次疆域十二卷次山四卷次水五卷次官制二卷次兵防一卷臺站附焉次屯政二卷户口附焉次貢賦錢法學校各一卷次封爵二卷皆長駕逺馭之睿略揆文奮武之鴻模也次風俗音樂各一卷服物二卷土産一卷皆如地志之例惟音樂一門為創體以其隸在協律備禁佅兜離之數故也次藩屬三卷次雜録二卷以瑣聞軼事終焉記流沙以外者自史記大宛列傳漢書西域列傳始詳而異域傳聞訛謬亦復不少至法顯元奘之所記附會佛典更多屬子虛蓋龍沙蔥雪道里迢遙非前代兵力所能至即或偶涉其地而終弗能有故記載者依稀影響無由核其實也我皇上逺奮天弧全收月􅒸既使二萬里外咸隸版圖又列戍開屯畫疆置郡經綸宏逺足以鞏固於萬年每嵗虎節往來雁臣出入耳聞目睹皆得其真故詔輯是編足以補前朝輿記之遺而正歷代史書之誤聖人威德之昭宣經綸之久逺事事為二帝三王所不及兹其左驗矣豈徒與甘英諸人侈誇珍怪歟乾隆四十九年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書欽定皇輿西域圖志卷首天章臣等謹按大荒之西伊古聲教阻絶即有勤思逺駕哆語頓紘恢綱而事涉鑿空荒唐難以信今傳後洪惟我皇上文武聖神功邁三五準疆回部並入版圖每乙夜運籌制勝萬里而用兵不得已之深衷時往復於奎文睿什間足為耆定西域之綱領條目本本元元皆於是乎在固非直為新疆斧藻山川發揮氣象而已夫地理廣袤險易按實者無難履境周知至於廟算之周詳神機之妙應有非臣下管蠡所能推測者功成之日特命畫功臣像於紫光閣親製像贊旁列諸戰圖復裒集御製詩文勒石其上以昭信垂逺嗣以土爾扈特部來歸四衛拉特全蒙幬載讀先後紀略之篇暨開惑論西師詩歸順記所闡知曠古偉烈實緣天與人歸有不期然而然者是不待汗簡編摩而仰聖作之輝煌不啻炳丹青而光日月矣昔夏史臣撰次禹貢備載九州土田貢賦疆域形勝而祗台德先二語則大書昭揭以為化原所自起今臣等日趨禁直密勿欽承跪捧宸章具詳端委兹奉命編輯西域圖志敬登御製詩文之關繫西師全局者并功臣像贊分繕四帙用冠全書以為卷首俾億萬世而下睹雲漢之昭回思聲靈之赫濯不惟著美鼎鐘實以取衷宵旰至因地隨時紀事諸作仍謹按緣起分載各卷俾讀者於編摹之次仰洪纎畢貫之宸裁得隨處窺覘萬一共得文十六首古今體詩三百二十五首贊五十首謹排次總目如左欽定四庫全書欽定皇輿西域圖志恭録天章總目文十六首平定凖噶爾告成太學碑文恭録卷首一平定凖噶爾勒銘伊犂碑文恭録卷十二平定凖噶爾後勒銘伊犂碑文恭録卷十二平定凖噶爾勒銘格登山碑文恭録卷二十二平定回部告成太學碑文恭録卷首一平定回部勒銘葉爾羌碑文恭録卷十八平定回部勒銘伊西洱庫爾淖爾碑文恭録卷二十八開惑論恭録卷首一實勝寺後記恭録卷首一西域地名考證敘概恭録卷首一準噶爾全部紀略恭録卷首一鐵章記恭録卷四十一陽關考恭録卷八翻譯明義集正訛恭録卷十九土爾扈特全部歸順記恭録卷三十七土爾扈特紀略恭録卷三十七古今體詩三百二十五首恭奉皇太后啓蹕幸避暑山莊之作有序恭録卷首二懷柔縣恭録卷首二至避暑山莊日都爾伯特台吉策凌等接見恭録卷三十七流杯亭小宴都爾伯特親王策凌等恭録卷三十七宴都爾伯特親王策凌郡王策凌烏巴什等於萬樹園詩以紀事恭録卷三十七山莊燈詞八首恭録卷首二準噶爾輝特部台吉阿睦爾撒納歸誠信至詩以識事恭録卷三十七即事恭録卷首二冬至次日啓蹕再幸避暑山莊即事言懷有序首恭録卷二至避暑山莊日輝特台吉阿睦爾撒納等接見恭録卷三十七錫封輝特親王阿睦爾撒納等謝恩朝見詩以紀事恭録卷三十七錫宴輝特親王阿睦爾撒納等詩以紀事恭録卷三十七即事恭録卷三十七恭謁景陵敬成長句有序恭録卷首二恭謁泰陵有序恭録卷首二準噶爾台吉噶爾藏多爾濟歸化信至詩以紀事恭録卷三十七屢聞西師所指降歸者衆七字成詩一篇示志恭録卷首二西師底定伊犂捷音至詩以述事恭録卷十二平定準噶爾告祭太廟述事恭録卷首二阿玉錫歌恭録卷二十二平定