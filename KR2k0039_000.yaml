無定處故嘗勞衆費材十損一得搢紳之儒守和親介胄之士言征伐征伐則民力竭和親則國威喪於是有守在四夷羈縻不絶地不可耕民不可臣之言興矣然此以論漢唐宋明之中夏而非謂我皇清之中夏也皇清荷天之龍興東海撫華區有元之裔乆屬版章嵗朝貢從征狩執役惟謹準噶爾厄魯特者本有元之臣僕叛出據西海終明世為邊患至噶爾丹而稍强吞噬鄰蕃闌入北塞我皇祖三臨朔漠用大破其師元惡伏㝠誅脅從逺遯跡毋俾遺種於我喀爾喀厥姪策妄阿拉布坦收其遺孽僅保伊犂故嘗索俘取地無敢不共逮夫部落滋聚乃以計襲哈宻入西藏準夷之勢於是而復張兩朝命將問罪雖屢獲捷而庚戌之役逆子噶爾丹策凌能用其父舊人乘我師怠掠畜於巴里坤擣營於科卜多於是而準夷之勢大張然地既險逺主客異焉此勞往而無利彼亦如之故額爾得尼招之敗彼亦以彼貪利而深入也皇考謂我武既揚不可以既允其請和以息我衆予小子敬奉先志無越思焉既而噶爾丹策凌死子䇿妄多爾濟那木扎爾暴殘喇嘛達爾扎簒奪之達瓦齊又簒奪喇嘛達爾扎而酗酒虐下尤甚焉癸酉冬都爾伯特台吉策凌等率數萬人來歸越明年秋輝特台吉阿睦爾撒納和碩特台吉班珠爾又率數萬人來歸朕謂來者不可以不撫而撫之莫若因其地其俗而善循之且毋令滋方來之患於我喀爾喀也於是議進兩路之師問彼罪魁安我新附凡運餉籌䭾長行利戰之事悉備議之始熟經於庚戌之艱者咸懼蹈轍惟大學士忠勇公傅恒見與朕同而新附諸台吉則求之甚力朕謂犂庭掃穴即不敢必然喀爾喀之地必不可以久居若而人毋寧用其鋒而觀厥成即不如志亦非所悔也故凡禡旗命將之典概未舉行亦云偏師嘗試為之耳塞上用兵必以秋而阿睦爾撒納禡木特請以春月欲乘彼馬未肥則不能遯朕謂其言良當遂從之北路以二月丙辰西路以二月己巳各啓行哈宻瀚海向無雨今春乃大雨咸以為時雨之師入賊境凡所過之鄂拓克攜羊酒糗糒迎恐後五月乙亥至伊犂亦如之達瓦齊於格登山麓結營以待兵近萬我兩將軍議以兵取則傷彼必衆彼衆皆我衆多傷非所以體上慈也丁亥遣阿玉錫等二十五人夜斫營覘賊向賊兵大潰相蹂躪死者不可勝數來降者七千餘我二十五人無一人受傷者達瓦齊以百餘騎竄六月庚戌回人特竒木霍集斯伯克執達瓦齊來獻軍門準噶爾平是役也定議不過二人籌事不過一年兵行不過五月無亡矢遺鏃之費大勲以集遐壤以定豈人力哉天也然天垂祐而授之事機設不奉行之以致坐失者多矣可與樂成不可與謀始亦謂蚩蚩之衆云爾豈其卿大夫之謂既克集事則又曰茍知其易將勸為之夫明於事後者必將昧於幾先朕用是寒心且準噶爾一小部落耳一二有能為之長而其樹也固焉一二暴失徳之長而其亡也忽焉朕用是知懼武成而勒碑文廟例也禮臣以為請故據實事書之其辭曰茫茫伊犂大幹之西匪今伊昔化外羈縻條支之東大宛以南随畜獵獸蟻聚狼貪乃世其惡乃恃其逺或激我攻而乘我緩其計在斯其長可窮止戈靖邊化日薰風不侵不距不來其那欵關求市亦不禁呵始慕希珍終居竒貨吏喜無事遷就斯愞漸不可長我豈懼其豈如宋明和市之為既知其然飭我邊吏弗縱弗嚴示之節制不仁之守再世斯斬簒奪相仍飄忽荏苒夙沙革面煎鞏披忱集泮飛鴞食黮懷音錫之爵位榮以華裾膝前面請願效前驅兵分兩路雪甲霜鋒先導中堅如鼂錯攻益以後勁䝉古舊屬八旗子弟其心允篤二月卜吉牙旗飄颻我騎斯騰無待折膠泉涌於磧蕪茁於路我衆歡躍謂有天助匪啻我衆新附亦云黄髮未覩水草富春烏魯木齊波羅搭拉台吉宰桑紛紛欵納牽其肥羊及馬潼酒獻其屠耆合掌雙手予有前諭所禁侵陵以茶交易大愉衆情衆情既愉來者日繼蠢達瓦齊擁兵自衛依山據淖惟旦夕延有近萬人其心十千勇不目逃掄二十五曰阿玉錫率往賊所銜枚夜襲直入其郛揮矛拍馬大聲疾呼彼人既離我志斯合突將無前縱横鞺鞳案角鹿埵隴種東籠自相狼籍孰敢攖鋒狐竄鼠逃將往異域回部遮之兇渠斯得露布既至告廟受俘凡此蕆功荷天之衢在古周宣二年乙亥淮夷是平常武詩載越我皇祖征噶爾丹命將禡旗亦乙亥年既符嵗徳允協師貞兵不血刃漠無王庭昔時準夷弗恭弗譓今随師行為師候尉昔時準夷日戰夜征今也偃卧知樂人生曰匪準夷曰我臣僕自今伊始安爾㳺牧爾牧爾耕爾長孫子曰無向非豈有今是兩朝志竟億載基成側席不遑保泰持盈平定回部告成太學碑文建非常之功者以舉非常之事舉非常之事者以藉非常之人然亦有不藉非常之人而舉非常之事終建非常之功者則頼昊蒼篤貺神運斡旋事若禍而移福機似逆而轉順順天者昌逆天者亡故犂凖夷之庭掃回部之穴五年之間兩勲並集始遲疑猶未敢信終劼劬以底有成荷天之龍在兹畏天之鑒益在兹爰叙其事如左達瓦齊之就俘也伊犂已大定矣無何而阿睦爾撒納叛彼其志本欲藉我力以成已事時也人心未定佐饔者嘗一蜮肆狂萬狙應響蜂屯蟻雜不可爬梳畏難者羣謂不出所料準夷終不可取並有欲棄巴里坤為退守謀然予計其衆志不齊將有歸正倒戈者於是督策將帥之臣整師亟進既而伊犂諸台吉宰桑果悔過勤王思討逆賊以自贖此天恩助順者一也二酋大小和卓木者以回部望族久為準噶爾所拘於阿巴噶斯鄂拓者也我師既定伊犂乃釋其囚以兵送大和卓木波羅泥都歸葉爾羌俾統其舊屬而令小和卓木霍集占居於伊犂撫其在伊犂衆回乃小和卓木助阿逆攻勤王之台吉宰桑䓁阿逆頼以茍延及我師再入阿逆遂逃入哈薩克而霍集占亦即收其餘衆竄歸舊穴此天恩助順者二也準夷之事前紀畧見梗概兹不複記紀興師討回之由則以我將軍兆惠在伊犂時曽遺副都統阿敏道往回議事小和卓木乃以計誘阿敏道而拘之及我師抵庫車問罪彼攜阿敏道以來援至中途害之及從行者百人彼猶逞其狂勃抗我師顔且敢冒死入庫車城乃雅爾哈善略無紀律致彼出入自由然我滿洲索倫衆兵士無不念國家之恩効疆塲之力故能以少勝衆逆渠懼而兎脱此天恩助順者三也知僨轅之無濟掄幹材之可任時將軍兆惠以搜勦準夷餘黨至布魯特部落已欵服其衆因命旋師定回部於是克庫車存沙雅爾定阿克蘇略烏什收和闐師之所至降者望風直至葉爾羌城下而我軍人馬周行萬有餘里亦有强弩之末矣二酋以其逸待之力統數萬人與我三千餘人戰我師之過河者纔四百餘猶能斬將搴旗退而築堡黑水固守以待此天恩助順者四也萬里之外抱水救火其曷能濟乃予以去年六月即降㫖派兵撥馬欲以更易久在行間者耳故兵馬率早在途一䟎進而各爭前恐後人人有敵愾之憤此天恩助順者五也副將軍富徳及㕘贊舒赫徳輩率師進援以速行戈壁中馬力復疲值狂回據險坐俟頗有難進之勢夫援軍不能進則固守以待者危矣而㕘贊阿里衮驅後隊之馬適至夜擣賊營我師内外夾攻彼不知我軍凡有幾萬握炭流湯之徒自相蹂躪顧命不暇於是解黑水之圍鹿駭麞驚遁而保窟我之兩軍合隊全旅以迴阿克蘇此天恩助順者六也既而彼料我必再入泰山之壓難當乃於我師未進之先攜其部落載其重器跳而逺去而葉爾羌喀什噶爾二城之舊伯克等遂獻城以降㕘贊明瑞一邀之於霍斯庫魯克副將軍富徳再陷之於阿爾楚爾於是離心者面内前途者反斾二酋惟挈其妻孥及舊僕僅三百人入拔達克山境此天恩助順者七也人跡不通之地語言不同之國既已雀敺寧不狼顧其授我與否固未可定也然一聞將軍之檄莫不援旗請奮整旅前遮遂得凶渠函首露布遥傳此天恩助順者八也夷考西師之役非予夙願之圖何則實以國家幅員不為不廣屬國不為不多惟厪守成之志無希開創之名兼以承平日久人習於逸既無非常之人安能舉非常之事而建非常之功哉然而輾轉輻凑毎以艱而獲易視若失而反得故自締始以逮定功雖予自問亦將有所不解其故而不敢期其必然者故曰非人力也天也夫天如是顯佑國家者以祖宗之敬天愛民䝉眷顧者深也則我後世子孫其何以心上蒼之心志列祖之志勉繼繩於有永保丕基於無窮乎繫以銘曰二酋偝徳始亂為賊是興王師報怨以直伊犂既平蕞爾奚屑徐議耕闢徐議戌設以噢以咻伊余本懷豈其弗戢圖彼藐回彼回不量怒臂當車戕我王臣助彼狂狙始攻庫車僨轅敗事用人弗當至今為愧悖逆罪重我武宜揚易將整師直壓彼疆阿蘇烏什玉隴和闐傳檄以定肉袒羊牽二酋孽深知不可活狼狽相顧固守其穴桓桓我師周行萬里馬不進焉强弩末矣以四百人戰萬餘虜退猶能守黑水築堡間信達都為之傷悼所幸後軍早行在道督勅速援人同怒心曽不兩月賊境逼臨賊境逼臨彼復徼隙馬繼以進賊營夜斫出其不意賊乃大驚謂自天降孰敢鋒攖大鞣大膊如虎搏兎案角隴種誰敢迴顧黑水圍解合軍暫旋整旅三路期並進焉賊偵軍威信不可支挈其妻孥遁投所依所依亦回豈不自謀豈伊庇猿而受林憂利厥輜重無遺盡掠遣其都丸遂來獻馘詎惟獻馘並以稱臣捧賫表章將詣都門奏凱班師前歌後舞尸逐染鍔温禺釁鼓露布至都正逮初陽慈寧稱慶亞歳迎祥郊廟告成諸典並舉皇皇太學豐碑再樹豐碑再樹敢予喜功用不得已天眷屢䝉始之以武終之以文戡亂惟義撫衆惟仁布惠施恩寰宇共喜古不羈縻今為臣子疆闢二萬兵出五年據實書事永矢乾乾開惑論夫人情有所弗概於懷者則不能無惑况西師之役决機於午夜之宻勿馳檄於絶域之阻閡語言判不相同風俗夐然各别是安能人人而告之以祛其疑故事以問明理以答晰因倣四子講徳之遺意作開惑論其辭曰有春秋碩儒者是古卑今循規蹈矩喜寛衣博帶如魯諸生厭突梯脂韋若楚公子聞信天主人欲有所締搆撻伐雖不敢面折其非而每退有後語也既而定伊犂俘名王成舊志闢新疆兵不血刃而歸馬于華山之陽西陲一役自乙亥春兩路大兵進發所過迎降恐後遂擒達瓦齊定伊犂𨽻屬諸部及秋已告成事無頓弦遺鏃之費乃造於臻成大夫之席曰唉有是哉有是哉走懷杞人之憂有日矣夫守在四夷其徳莫恢佳兵不祥其理莫賅今所見者逈異乎所聞則是秦皇不必築長城而漢武不必悔輪臺也曷以啟予䝉乎大夫曰子不聞長卿之言乎非常者固常人之所疑也無何阿逆叛羣㓙應如蜩如螗曰梟曰獍斷驛擄牧奮臂以逞一二隻行野宿者或致戕其身命阿睦爾撒納潛蓄異志乘我師既平準夷覬為四部大台吉未遂中途叛逃而一時逆黨如伊犂之巴磉克什木西路之阿巴噶斯哈丹北路之包沁等先後煽附斷臺肆掠道路為梗於是碩儒復過大夫之閭曰如何如何果不出吾所訝宜亟罷是役禍庶少輯大夫曰子姑俟之於時師重進渠逺跳順者撫逆者𠞰丙子春我師整旅討逆阿睦爾撒納竄去其黨並就𠞰撫伊犂復定先是喀爾喀有青滚襍卜者􅘀狡僉回之駻獟也以收都爾伯特四部時曽賈其牛羊用賜新撫乃藉以煽惑衆喀爾喀且欲私通阿逆之醜虜青滚襍卜本喀爾喀台吉恩封郡王從征宻㫖令將軍等計擒阿逆時青滚集卜實漏其信復自軍營逃回㳺牧蠱衆為卡甘心從賊撤我㕘贊大臣那木扎爾執送京師得正顯戮阿逆既竄罪人斯得喀爾喀衆以休以息然彼時將帥之臣追阿逆於哈薩克為其所賣同時準噶爾宰桑之在役者皆習為盗而慣軍詐者也見而輕之時阿逆竄跡哈薩克方以譎計緩師而將軍達爾黨阿不審先機竟爾按兵待獻坐失事㑹既罷役則相率為亂欲復其舊制而恥為我臣是和起被欺於闢展兆惠戰出於濟爾哈朗之所因也厄魯特宰桑等從征哈薩克者既心輕將帥所為思逞亂階將軍和起方往追巴雅爾至闢展為逆回莽噶里克厄魯特呢嗎等設計遣散駝馬倉卒被害而將軍兆惠自濟爾哈朗力戰得出賊勢復戢碩儒曰吁是盖禍結兵連吾不知何日之息肩矣爾其重整四甄夾攻兩路阿逆復自哈薩克竄歸適遇我師又倉皇而遁去盖自是哈薩克亦面内歸化欲助我以擒阿逆而阿逆乃隻身入俄羅斯境窮極伏冥誅之故也阿薩克以素稔阿逆反覆且畏懷中朝威徳奉表來歸請以擒賊自効逆勢益蹙僅以殘啄投俄羅斯斃焉遣侍郎三泰騐實以聞豺狼不可以犬豕畜鴟鴞不可以雞鴨育是反覆喜亂之徒再存之再不知感且殘賊為奸焉是惟剪刈灰滅之而已更不可以仁義化遷乃欲姑息了事者又以為不殺降人夫不殺降人可留降人之馬而與之足力以受其愚則大不可滿福之遇難以及助二回酋與我抗衡皆此沙拉斯嗎唬斯二鄂拓之所搆禍也丁丑春復命將軍成衮扎布㕘贊舒赫徳等由朱爾都斯路進伊犂將軍兆惠㕘贊富徳等由額林哈必爾罕路進塔木集賽而成衮扎布等遇克勒特烏魯特沙拉斯嗎唬斯等鄂拓克皆撫降其衆不取其馬駝大軍過而賊皆反去乃遣都統滿福領偏師追勦沙拉斯嗎唬斯二鄂拓克賊人詭持軍門劄自稱已就降撫並云前驅除道以待滿福行次哈拉和卓竟以堕計捐軀至庫車之稽勣實僨轅于逍遥更將申律旗鼓一新遂長驅直入而功垂成於崇朝先是大和卓木既還故部乃阿逆之叛小和卓木孤恩助惡乃興師問罪圍庫車城而小和卓木來援身竄入城自投羅網雅爾哈善縱賊失機遂致養癰遺患黑水之守主客衆寡之勢雖愚者亦知其漂揺以三千餘人敵數萬衆而搜穴得米掘井得泉賊銃著木取鉛丸數無萬反以擊賊無不中賊之酋豪於是兩軍相合賊乃遁逃及窮追異域駐旅馳檄獻馘稱臣遂成耆定之功髙戊寅冬將軍兆惠直薄葉爾羌道逺馬疲被遮固守時經三月深溝髙壘賊不敢侵且屢獲神應而夏前調兵在道副將軍富徳得以檄促赴援又㕘贊大臣阿里衮解馬適至内外夾擊軍威大振至己夘夏酋懼六師繼進棄城逺遁入拔達克山界尋以追兵壓境其汗素爾坦沙聞風歸化殺賊函首以獻回部悉平西陲永定臻成大夫乃進春秋碩儒而詔之曰兩大部落不為不强周二萬餘里不為不廣五年成功不為不速前歌後舞不為不祥子徒見始事之秋選愞畏葸者之騰口是所謂人然亦然人否亦否者也且師旅征伐之於國猶雷霆霜雪之於天非霜雪則萬彚煩囂之氣不蕩滌非雷霆則四時湮鬱之氣不鬯宣非師旅征伐則梗我王化者無以讋伏懲創不敢抗干是以詰戎揚烈益當厪於重熙累洽之年也子獨不見達瓦齊之懵懵乎逹瓦齊献俘後赦不誅且優賜王爵以善終設云事慎首禍禮不納叛是儼然以外夷弑君者為敵國豈不我君哉碩儒曰豈謂是哉陽舒隂惨生民大情離憂合懽品物同性絶者不可復屬死者不可復生損兵折將無補功成大夫曰吁子所謂執迷而不悟者矣成大事者不顧小謀圗大全者寧辭小害示應於近者逺有可察托念於顯者㣲或可概且子亦知損兵折將之由乎彼或内怯於心外受人紿决機不審遲疑擿埴而自貽伊悔豈主人之辠哉若夫虎臣羆士折衝宣力馬超囊足姚期攝幘渇賞損驅實不乏人而一聞如是者午夜為之酸心舉案為之忘食雖刻木結蒲無以加兹而且賞延後昆太常紀績如子所云則漢祖唐宗撥亂草創之初寧無一人結纓死綏者哉禮記聴磬聲則思又何以云乎故非沉幾不足以圗功非果斷不足以定業彼其狼狽相顧潛包禍謀者以螳蜋之斧禦隆車之轍不自笇量何異葦苕之鸋鴂是以王師屢入霆奮席卷如舉炎火而􅌊飛蓬覆湯泉而沃白雪子何不度以全局待以嵗月而為是無稽之説哉碩儒曰若僕者乃隙中觀鬬井裏窺天以今日應機底績論之何妨再遲數年愧矣服矣豁然悚然大夫曰未也子姑聽之夫食椹懷音非納叛臣奬䠞優遇欲集其勲阿逆初降時備陳賊中情形請兵甚力即推誠奬任令副北路將軍以行時或有以厚遇新附竊議者宻敇周防先示戚親時命固倫額駙色布騰巴爾珠爾與阿睦爾撒納偕行宻諭察其動定雖非預存逆億而逆賊狡獪故智未嘗不在意計中也操刀必割所戒逡巡阿逆既以未厭所望在伊犂時居常不衣賜服及用私印行軍檄踪跡頗露不逞屢敇將軍班第㕘贊鄂容安相機擒勦而因循寡斷阿逆得以入覲為詞乘隙生變子云應機亦非至論三隙可乘未興大軍或又以為乘人之釁不知策妄多爾濟乃那木扎爾年幼昏暴此一隙也喇嘛達爾札簒奪又一隙也達瓦齊復篡奪之又一隙也彼時皆未興兵詳見西師詩加征増算何曽於民凡有水旱無不恤賑運輸給價防其蝕侵甘肅嵗賦預免庚辰兩部永靖並及其鄰哈薩布露梟瞷文身無不内屬慕義歸仁鴻庸爰建千古未聞若子者所謂菽麥未辨安足以知我信天主人哉信天主人乃召大夫碩儒而告之曰若二子者所謂楚既失之齊亦未為得也夫順天者昌逆天者亡故粤宛猶不逆時氣而奉若者豈可恃力而誇張且屢危而屢夷愈變而愈康鉦鼓一動遂定二方鑿空二萬餘里蕆事五載已央使畏難而中輟未必不致禍而受殃浮議者方且謂老成之言臧也在易師之上六曰大君有命復之上六曰迷復有眚今得以利用禦冦由頥有慶是不亦大幸乎夫獲此幸者宜思何以獲此幸於昊蒼方將矜矜惴惴懔懔皇皇隕越是懼奚暇計之二子之短長也哉實勝寺後記嵗己巳建實勝寺於西山之下其縁起已見前記不復綴今頼昊天垂佑宗社篤祐平準噶爾回部拓地伊犂喀什噶爾葉爾羌一帶二萬餘里其外覊縻附屬如哈薩克布魯特安集延拔達克山等部不與焉凡乘機决計信賞必罰奉天討罪藉衆集事諸大端具見太學之碑開惑之論西師之詩亦不復綴兹記者寺左近健鋭雲梯營實居之營之兵是役効力為尤多故不可不旌其前勞以勸夫後進先是呼爾璊霍斯庫魯克之戰我師以少敵衆而賊據險伺隙故凡行陣㕘伍彌縫之際略覺旗靡鼓餒處得健鋭兵數十立其間則屹如堅城整而復進遂乃斬將搴旗用成殊績盖索倫兵馬射雖精以之馳突乘勝破陣無不如志而知方守節終不如我滿洲世僕其心定其氣盛夫人出萬死一生為國宣力而為之君者事成而忽若忘獨何心哉朕豈為之哉自己巳設此營而辛巳即收其效不啻樹樹十年之得報是潛移黙運有若天授予亦有所不知其然而然者而敬繩祖武丕揚國烈瞿瞿惴惴惟盛滿之是懼猶初志也是用重勒碑記之且肖喀喇烏蘇襲迫之狀築堡其側嵗時幸香山閱健鋭兵用寓尹鐸晉陽之意不亦可乎西域地名考證叙概禹貢稱析支之叙周書紀西旅之貢自是而外西域之誌經書莫詳詳西域實權輿司馬氏然司馬氏實未身涉其地而詢諸其人也徒以漢武勤逺使張騫輩持賂鑿空繼以貳師興師一狼千羊所得不償所失遷之所記出於傳聞夫魯魚亥豕以華言傳華言尚不能無訛而况語音殊衣服異嗜好不同之絶域哉其不能無訛不待燭照而龜卜矣今我師平西域伊犂之地屯牧者我人回部之城蕃宣者我臣且國語切音實能盡各部轉韻曲折之妙是則傳萬里幅􅊷之悉正千古記載之舛實惟此時漢唐往事無論即如朔漠方略所載初征噶爾丹時有回回國王阿卜都里什特者來降稱其地為葉爾欽哈斯噶爾後盡歸準噶爾我之使臣不過至伊犂而止不能至回部諸城也乙亥興師以來執訊獲醜屢詢其人稱為葉爾竒木哈什哈爾今則二城之人住京師者有之細詢其音乃定為葉爾羌喀什噶爾盖回語謂地為葉爾寛為羌謂各色為喀什謂磚房為噶爾合而言之則葉爾羌者地寛也喀什噶爾者各色磚房也其他類此皆有名義然彼地自隆古以來其名義終未之或易徒以阻隔幅􅊷不通音問遂致屢易文而始得其正夫以國語近各部之轉韻而一譯漢音必待再三詳考始能無訛則史遷之不免闕漏益不待燭照而龜卜矣兹為方畧之書恐分纂之人無所取裁濫觴者毫釐之差承流者且致千里之謬因取各部山川疆域部落姓氏命軍機諸臣詳考確証歸於一是如提要凡例之作而叙其概如右自是之後統以新證之名為指南云爾準噶爾全部紀畧自古無不誌外夷而實者少舛者多非以其方域所限言語不通耶得什一於千百加以魚魯亥豕其堪信者鮮矣兹者平定準部止封達瓦齊子一人居之京都且城伊犂駐將軍鎮守事耕牧焉念彼原一大部落不可無紀故就親詢實事書之亦以便方畧纂叙也凖噶爾四衛拉特者綽羅斯部都爾伯特部和碩特部土爾扈特部是其輝特一部本附庸於都爾伯特後土爾扈特竄歸俄羅斯故别輝特為一部仍稱四衛拉特云衛拉特明史稱為瓦刺其音頗近史所載脱歡太師葢其始祖元亡而其强臣分為三其渠曰馬哈木者即脱歡之父也脱歡者䝉古準語同為釡今凖人語釡為海蘇而䝉古語則仍舊蓋準人自避其祖諱此亦一證也自脱歡逮孛汗其世次不可考孛汗背正妻與他婦野合而生子曰烏林台巴靼太師其母棄之澤中孛汗收養之遂統部落又十一世而傳至賽音諾顔哈喇忽刺是為策妄阿拉布坦之曽祖子曰巴圖魯渾台吉有子十二人五曰僧格策妄之父六曰噶爾丹博碩克圖其餘無事無足稱長曰策臣次曰巴圖魯策臣與巴圖魯殺其弟僧格噶爾丹博碩克圖始自藏中回舊部反俗為汗於康熙年間犯塞戰敗走死先是噶爾丹博碩克圖既殺兄僧格之次子索諾木阿拉布坦僧格舊臣七人與策妄阿拉布坦同逺逃準語所謂多倫努庫爾者是多倫者漢語為七努庫爾者漢語謂友盖其患難相共所謂世臣並赦其子孫七死云及噶爾丹為我兵敗策妄始還和博克薩里收其父舊屬及噶爾丹餘衆復成部落併縛噶爾丹子獻闕下遂自據汗位子噶爾丹策凌噶爾丹策凌子策妄多爾濟那木札爾其庶兄喇嘛達爾札執而簒之達瓦齊復因阿睦爾撒納之計簒奪其位達瓦齊者巴圖魯渾台吉之第七子布木之子大策凌敦多卜之孫於策妄為再從姪孫其小策凌敦多卜則策妄之祖巴圖魯渾台吉之弟黙爾根代青之曽孫其去䇿妄世派盖已逺矣先是康熈年間噶爾丹博碩克圖拘繫和碩特車臣汗收所屬人衆併入準噶爾鄂拓克其時有和碩特之拉藏汗者居唐古忒地即顧實汗之裔也子二人一名丹衷一名索爾札丹衷由唐古忒仍回至厄魯特娶策妄阿拉布坦之女博托洛克為妻後策妄阿拉布坦知其學習哈拉爾查達術即巫蠱事也以兩釡夾丹衷身烙死遂令大策凌敦多卜領兵六千襲西藏擒殺拉藏並虜伊子索爾札我聖祖仁皇帝勅諭策妄阿拉布坦不得繹騷唐古忒地並發大兵進𠞰於是大策凌敦多卜攜索爾札逃回厄魯特藏地復平迨雍正年間策妄阿拉布坦死子噶爾丹策凌欲與唐古忒和好給索爾札户十資養並以博托洛克與韋徵和碩齊為妻其在丹衷處所生子班珠爾給户五資養彼時博托洛克復有孕未産適韋徵和碩齊後乃生一子是曰阿睦爾撒納故阿睦爾撒納雖為輝特台吉實與班珠爾皆丹衷之子噶爾丹策凌死策妄多爾濟那木札爾恐索爾札之子納哈查逃往唐古忒將伊禁錮至達瓦齊簒立始將納哈查釋放又和碩特羅布藏車凌者娶策妄阿拉布坦之女達什色布騰為妻噶爾丹策凌時因羅布藏車凌率領伊屬萬户欲往土爾扈特遂遣兵擒獲羅布藏車凌囚之以其妻給韋徵和碩齊二子交烏魯特鄂拓克宰桑伍巴什安置至青海居住之羅布藏丹津於策妄阿拉布坦時逃至凖噶爾策妄阿拉布坦死後羅布藏車凌羅布藏丹津二人謀殺噶爾丹策凌嗣因羅布藏丹津被拘羅布藏車凌恐亦被囚遂欲逃往土爾扈特故雍正年間我世宗憲皇帝索羅布藏丹津噶爾丹策凌稱已縛送至中途聞進兵而止者非詐也盖彼業經拘繫之囚故不靳固而且欲以為竒貨也噶爾丹策凌於丑年死策妄多爾濟那木札爾年幼其姊鄂蘭巴雅爾同母出也每以善言相勸禁其滛亂策妄多爾濟那木札爾年既長遂不受其禁制並聴讒言謂其姊欲效俄羅斯自立為扣肯汗扣肯汗者女人掌國事也遂將鄂蘭巴雅爾拘繫並殺戮多宰桑其後屠狗盗妻之事無所不為益無忌憚鄂蘭巴雅爾之夫薩音伯勒克遂同噶爾丹策凌庶子喇嘛達爾札攻執策妄多爾濟那木札爾喇嘛達爾札遂簒汗位有噶爾丹策凌幼子策旺達什者阿睦爾撒納班珠爾欲誘出策旺達什立為汗後被喇嘛達爾札知覺遂殺策旺達什阿睦爾撒納班珠爾二人慫惥達瓦齊云喇嘛達爾札既將與爾同讐之達什達瓦小策凌敦多卜之子殺戮恐禍將及爾於是達瓦齊阿睦爾撒納班珠爾三人同逃哈薩克至申年達瓦齊阿睦爾撒納班珠爾復回舊㳺牧處阿睦爾撒納遂殺其兄沙克都爾據其衆復與伊犂喇嘛等合謀殺害喇嘛達爾札立達瓦齊為汗其次即阿睦爾撒納用事二人仍屬親厚有達什達瓦姪訥黙庫濟爾噶爾者欲與達瓦齊分領凖噶爾猝率兵一萬至伊犂與達瓦齊戰達瓦齊敗至舊㳺牧額米爾處與阿睦爾撒納㑹因阿睦爾撒納計誘執訥黙庫濟爾噶爾誅之凖噶爾衆仍立達瓦齊為汗達瓦齊聴伊犂衆宰桑言與阿睦爾撒納生隙阿睦爾撒納本垂涎汗位既失望遂與班珠爾納哈查及都爾伯特訥黙庫等㑹同哈薩克將額米爾一帶住牧者肆行擄掠且耕種額爾齊斯為自固計達瓦齊凡三遣兵𠞰阿睦爾撒納皆不克其後自領兵三萬至阿睦爾撒納㳺牧之額爾齊斯蹙之阿睦爾撒納勢不敵始投誠來歸此準噶爾始終搆亂所由也至準噶爾鄂拓克昂吉之名各異者鄂拓克為其汗之部屬昂吉為各台吉之户下舊鄂拓克凡十有二烏魯特有四宰桑人五千户為一鄂拓克喀拉沁有一宰桑人五千戸為一鄂拓克額爾克騰有一宰桑人五千户為一鄂拓克克里野特有二宰桑人六千戸為一鄂拓克卓托魯克有一宰桑人三千户為一鄂拓克布庫斯有一宰桑人三千户為一鄂拓克阿巴噶斯哈丹各有一宰桑共人四千户為一鄂拓克鄂畢特有一宰桑人三千户為一鄂拓克鄂羅岱有二宰桑人三千户為一鄂拓克多果魯特有一宰桑人四千户為一鄂拓克霍爾博斯有一宰桑人三千戸為一鄂拓克綽和爾有一宰桑人三千户為一鄂拓克其後復立鄂拓克十有二巴爾達木特有三宰桑人四千戸為一鄂拓克庫圖齊納爾有五宰桑人四千户為一鄂拓克噶爾雜特有三宰桑人四千户為一鄂拓克沙拉斯有二宰桑人三千户為一鄂拓克嗎唬斯有一宰桑人五千戸為一鄂拓克布庫努特有一宰桑人二千户圖古特有一宰桑人五百户為一鄂拓克烏拉特有一宰桑人三千户為一鄂拓克阿爾闥沁有一宰桑人五百户為一鄂拓克札哈沁有三宰桑人二千户包沁有三宰桑人一千户為一鄂拓克竒爾吉斯有四宰桑人四千户為一鄂拓克特楞古特有四宰桑人四千户鄂爾楚克有一宰桑人五百户烏爾罕濟蘭有一宰桑人八百户為一鄂拓克明阿特有二宰桑人三千户為一鄂拓克鄂拓克之外復有五集賽阿克把集賽有二宰桑人四千户賚嗎里木集賽杜爾把集賽推素隆集賽伊克胡拉爾集賽各有一宰桑人各一千户其後復立集賽四温都遜集賽善披領集賽各有一宰桑人各一千户桑堆集賽品陳集賽各有一宰桑人各三百户此此九集賽辦理喇嘛一切事務喇嘛有六千餘凖噶爾共六十二宰桑二十四鄂拓克一切供賦俱其汗公物其外復取烏梁海及葉爾羌喀什噶爾阿克蘇和闐四城回人租入其二十一昂吉為各台吉所有而統屬於準噶爾之汗昂吉者準語分支之謂也綽羅斯部之達瓦齊一昂吉達什達瓦一昂吉多爾濟丹巴一昂吉噶爾藏多爾濟一昂吉訥黙庫濟爾噶爾一昂吉鄂齊爾伍巴什一昂吉都爾伯特之策凌一昂吉達什一昂吉伯什阿哈什一昂吉和碩特之沙克都爾曼濟一昂吉輝特之塔爾巴哈沁薩音伯勒克一昂吉和通額黙根一昂吉多羅特舎楞一昂吉敦多克一昂吉葉克明安巴雅爾一昂吉車凌班珠爾一昂吉巴圖爾額黙根一昂吉察罕圖克阿睦爾撒納一昂吉博洛果特台吉諾海竒齊克一昂吉土爾扈特台吉巴圖爾伍巴什一昂吉吞都布一昂吉共二十一向於西師詩稱二十一昂吉為其汗公屬者盖考之而未詳兹始詳詢縷細如右然各台吉雖分領其昂吉凡出師執役無不聴其汗之令則初所譯者亦未為大差也統計其汗之二十四鄂拓克九集賽及各台吉之二十一昂吉得二十餘萬户六十餘萬口成一部落者百十餘年語云十人成之而不足一人敗之而有餘吾於紀準噶爾之事益見其不爽賈生所謂仁義不施而攻守之勢異雖夷狄之有君豈能外是道哉欽定皇輿西域圗志卷首一欽定四庫全書欽定皇輿西域圖志卷首二目録天章二恭奉皇太后啟蹕幸避暑山莊之作有序懐柔縣山莊燈詞八首即事冬至次日啟蹕再幸避暑山莊即事言懐有序恭謁景陵敬成長句有序恭謁泰陵有序屢聞西師所指降歸者衆七字成詩一篇示志平定準噶爾告祭太廟述事平定準噶爾功成恭上皇太后徽號御殿受賀詩以言志六月十八日午門受俘恭奉皇太后幸塞外啟程之作有序駐蹕避暑山莊作熱河啟蹕幸木蘭之作萬樹園燈詞定北將軍班第遣人解達瓦齊至御午門受俘冬夜懐軍前十四韻有序新正小宴外藩頻聞二月十三日啟程躬祭闕里適以是日逆賊阿睦爾撒納就擒㨗音至理宜躬詣祖陵叩謝因以路便命改程先謁泰陵俟曲阜回蹕敬當往謁孝陵景陵七字成詩一心誌慶黄新莊行宫疊去歳韻恭謁泰陵涿鹿行疊去歳韻南苑行宫疊舊作韻有小序恭謁孝陵恭謁景陵御園即事免甘省諸郡正供詩以紀事嘲劉統勲逆賊阿睦爾撒納奔竄哈薩克我師冞入追捕雖屢戰勝而賊踪益逺因念絶域曠時不欲久勞師旅宣諭撤兵詩以述意出師新春小宴外藩降㫖免甘肅本年額賦並積欠詩以誌事涿鹿行再疊舊韻紅杏園再疊前韻詣闕里瞻拜五更大西門樓前較射疊舊作韻有序冬日視朝西陲俄羅斯驛致叛賊阿睦爾撒納死屍信至詩以紀事有序西師即事駐行營仲冬南苑大閲紀事苦衷欽定皇輿西域圖志巻首二目録欽定四庫全書欽定皇輿西域圖志卷首二天章二恭奉皇太后啟蹕幸避暑山莊之作有序溯豐鎬發祥之地靈萃萬年憶椒薌躬薦之秋星周一紀載瞻祖烈祗謁丹邱爰諏日至之上旬適度天中之令節敬扶安輦暫駐山莊時則準噶爾部策凌策凌烏巴什等率衆來歸迎鑾肆覲用即卷阿之勝境錫兹湛露之鴻儀迨夫候屆金􅒫迺復時巡東國禮因事舉詩以日増啟蹕初程命篇伊始追逺柔遐慶典覃天中卜吉啟行驂東巡五載兹惟倍前以乾隆癸亥至盛京閱今十年餘矣西極四夷彼剰三準夷四部曰準噶爾曰都爾伯特曰和碩特曰輝特策凌等則都爾伯特部也計里方欣日正永清塵喜值雨霑甘山莊避暑今年信家法欽承敢即耽懐柔縣此役示懐柔七月自避暑山莊啟程往吉林塞外候寒於行邁為宜且早至旬月者實以宴賚新歸誠之都爾伯特台吉等彼皆未出痘故不可令至京也因之度古州山川繚似繡禾黍緑如油絃誦牛刀試布韋鴻漸求前朝蜂堠在何事守徒修按是歳都爾伯特台吉䇿凌等綽羅斯部台吉噶爾藏多爾濟輝特部台吉阿睦爾撒納等先後入覲賜宴封爵均紀宸什並恭録後封爵門他如歌詠戰功之因地以著者登疆域山水門賦物諸什登服物土産門其統論全局未宜分載者則彚登卷首兹於前卷既恭録天章總目而卷首四帙暨圖考以下諸卷仍敬謹分載以崇體要云山莊燈詞八首傍晩山雲静碧空芳園萬樹幕當中鐻鍝君長新來享應許觀燈示大同火樹騰輝暎緑雲鳳簫聲應鹿鳴聞御園節景年年賞誰識山莊逈出羣巖風入夕覺輕寒五月煙花快意看更向幔城舉首望錘峰早挂玉輪團玉蛾火蕊勢飄蕭借助林巒落翠標今嵗不惟逢閏月都稱閏得上元宵玉塞天闗不礙月雲莊夜静恰宜燈法輪輝朗空王現膜拜殊勝碧眼僧何必夏惟夜方短果然燈與月為縁黄沙青海胥來賀湛露薫風普預筵龍膏鶴燄光明藏翠柏青楓澹蕩宵嘉客欣看千帳會詞臣漫詡九瀛朝倒椀吞刀百戯陳昇平歌裏踏燈輪重裀列坐歡情洽底用通言藉古人即事宵衣報到軍書來逺人歸服萬帳偕安之榮之滿彼懐更籌游牧俾宇恢次第指揮疇咨妥中樞草諭詎待坐平原獵騎已久延草淺兎肥試馺娑須臾馳呈諭草看據鞍筆削寧辭瑣因思陸賈有名言馬上治之却又可冬至次日啓蹕再幸避暑山莊即事言懐有序粤惟今夏序届天中當西渠來覲之辰適東國時巡之會爰臨仙館慰彼瞻依廣錫崇封沛予膏澤繼而西藩部長歸誠而均籲來同時輝特台吉阿睦爾撒納等和碩特台吉班珠爾等均率其屬欵闗内附時乃豐邑祖陵展謁而方勤逺駕念彼生於邊塞入都則痘症足虞因而再幸山莊頒賚而燕衎斯漙次惟三宿期匝一旬良由典重郊禋届一陽之來復更以節逢慈慶祝萬夀之無疆兹惟時哉不遑暇處無非事者用示懐柔長句述情新篇紀事夙識羲經不省方和鸞却事幸山莊惟欽昨始禋穹昊必告朝還謁夀康澤逮新歸盡鳬藻勞因屢駕厪龍驤懐柔要豈耽遊豫戎索方籌永奠疆恭謁景陵敬成長句有序皇祖陟遐於今三十餘載每謁景陵追溯音容不勝感痛今歳適有西師之役蓋準夷自皇祖時恃其險逺鴟張絶漠比遭簒奪部衆分奔内屬者襁至踵接因命帥師徂定仰藉鴻庥敬成夙志祗申黙禱紀以長言比歳來瞻匪事頻吾衷有願此䖍申音容日逺仍如昔松栢雲森又報春伊古一人信巍蕩大清九㝢盡臣民西師欲蕆當年志還冀鴻庥奠漠垠恭謁泰陵有序準噶爾自皇祖時䇿妄阿拉布坦恃逺跳梁即已命將致討我皇考欲繼前志議以兩路進勦適值噶爾丹䇿凌方肆鴟張未及翦盪旋即罷師踐祚以來亦惟置之度外羈縻而已比者達瓦齊簒奪頻仍諸部瓦解名王部落接踵内屬機不可失義有必伸爰命大臣統新附之衆益以八旗良騎分路致討冀以仰成皇考未竟之緒祇謁山陵祈垂黙佑云橋山儀樹鬱蔥然凴几悲深忽廿年承昔懐柔綏月竁逮今歸順接祁連乘時欲事日中􅡢命將因寧漠外邊先志竟成何敢必尚希景佑奏功遄屢聞西師所指降歸者衆七字成詩一篇示志敉寧西極用偏軍天與人歸敬受欣每至夜分遙檄問所希日繼喜音聞有征已是無交戰率附常稱不變芸噶爾藏多爾濟等率屬來歸僉云大兵過時我屬人等仍照常耕種誠心向化籌畫兩朝光烈在覲揚惟謹敢云云平定準噶爾告祭太廟述事告成蠲祀異嘗蒸太室薫風瑞靄凝梗化昔延六十載準噶爾部自策妄阿拉布坦於聖祖時恃逺鴟張厥後簒弑頻仍逋誅者六十餘年矣懐恩今挈百千朋伊犁遼阻奚堪恃列祖威靈寔式憑久計永安方厪念敢因蕆事忘兢兢平定準噶爾功成恭上皇太后徽號御殿受賀詩以言志從來西北不庭方戡亂聊擕數月糧何必先驅張撻伐早知載道迎去聲壺漿遐荒底定千秋晏徽號欣承愛日慶豈不慰思寧即慰訓垂文子懼方長六月十八日午門受俘雷霆申宿令是夜大雷雨曉即晴霽閶闔受新俘詎乃恩全偝巴朗孟克忒木爾去年隨都爾伯特親王策凌等歸化者至六月間二人乃叛去安能誅竟逋羅布藏丹津雍正二年反去者我師至伊犁彼即請降以事既久赦而弗誅緝兇新附奮巴朗等皆新降諸宰桑所緝獲者宥命舊奸瞿謂羅布藏丹津白練陳班末雙頑肆市衢謂巴朗孟克忒木爾快晴天意順大禮衆情愉益切欽心鏡永懐鞏帝圖恭奉皇太后幸塞外啟程之作有序西戎底定素節方臨將宴凱旋之師亦賜新歸以爵載塗者有需時日乘暇而先舉獮蒐覲謁便以木蘭燕衎仍於山館匪效上林之為周阹繁重爰示我朝之度振古如斯用誌言懐無非事者皜日金風發蹕旌武成愷樂愜輿情分茅有待均頒惠櫜矢方將大㑹盟萬里伊犁朝北極三秋多稼閲西成安輿可識増欣豫福夀駢臻算介瀛駐蹕避暑山莊作中外而今果一家止戈奉朔邁流沙兩臨先是曽施惠去歳都爾伯特台吉策凌等來歸以五月宴於山莊比輝特台吉阿睦爾撒納等繼至十一月再至山莊錫宴大賚兹畨永定遐雲館桂芳秋正半山田黍熟歳云嘉勤民繼武願俱愜惟日孜孜敬益加熱河啟蹕幸木蘭之作數日山莊慶典循木蘭時届鹿甡甡白露後鹿始出聲而鳴人肖其聲可呼而至國語曰木蘭今即為圍場之通稱矣櫜鞬早候一千騎䝉古備圍例以一千二百舉成數云村落都看三百囷向北添衣凉益峭自西馳牘喜猶頻新降衆台吉將至哈薩克近亦有遣使歸化之信今年秋獮増佳話曰有條枝執靮人諸宰桑有命為侍衛供役者萬樹園燈詞舉首錘峯月正圓蓮花萬樹爓輝鮮乍教秋夕成春夕共道今年勝去年觻得鈞耆昔受盟賜觀燈事沐光榮綽羅斯氏彼中貴共拜新恩奉大清底須節物玉梁糕菊酒纔過興尚豪四面雲山絶頂處勝他元胄共登髙黄幕穹廬向逺開燈光月色共徘徊紫霞滿酌新分賜毳服儒冠雜遝來内外䝉古汗王台吉以次召至御前賜酒内廷詞臣亦得與賜煙火三畨萬樹園去歳夏宴都爾伯特冬宴輝特和碩特今始合四部衛拉特而封以汗王各爵銀花髙下玊蛾繁今宵未弛金吾禁自九月十三至十五凡三夕都道居然度上元蚖膏鶴燄千重艷雞踏龍銜萬種竒最愛鹿鳴青嶂外分明鼓瑟譜周詩照夜華鐙陳雁塞借春碧海戴鰲山彩箋書得新詞就賡韻還催侍從班九月龍堆了不寒金鳬銀燕萬枝攅恩膏永欲遐方被宴賞寧尋一巳歡定北將軍班第遣人解達瓦齊至御午門受俘鴛瓦繽紛積瑞銀受俘軍禮舉重新今夏獲叛臣巴朗曽御門受俘丹墀羣辟齊肩侍白組名王繫頸陳天徳好生還貸死達瓦齊雖虐亂準噶爾部實未敢犯我戎索故特寛其死祗令幽繫都中海濵多蹇又逢屯準噶爾部邇年屢遭兵燹今俘致達瓦齊意謂自今畧定不意阿睦爾撒納負恩潛逃雖不日成擒而目下窮夷不免沙蟲之嘆刑曹憲典聊遲待例應兵部奏獻俘囚後付刑部行刑以赦達瓦齊死故祇令付理藩院安置指日歐刀剚叛臣冬夜懐軍前十四韻有序今年夏五月大兵定伊犁獲達瓦齊盡撫凖噶爾之衆振旅策勲燕諸台吉於避暑山莊阿睦爾撒納遷延途次潛遣人紿取其孥約日颺去朕預有㫖命駐烏里雅蘇台大臣防備阿睦爾撒納計不行乃獨身竄煽其黨斷軍臺思乘間擾諸部爰命西北兩路兵進勦諸部嚮應雖叛人可計日就縛而届此嚴冬勞我師旅中宵厪念惄焉不能安寢撫事抒懐以遣永夕千軍踰老上五月定伊犁盡撫凖噶平聲爾生擒達瓦齊成功真太速居盛戒無倪天道滿招損人情利致迷樊崇降頓悔哱拜志全擕狼子心終野鷹雛飽不棲傷心縁失楚伊犁既定阿睦爾撒納覬得為總台吉朕以此人必不可使獨㨿準噶爾因分封四衛拉特為四汗彼遂萌叛志嫌畏已連氐阿睦爾撒納初叛包沁等二三小部望風疑畏為所煽動旋為官兵所殱烏合知難固蠻封况各提阿睦爾撒納叛無所歸有謂欲奔哈薩克布魯特者諸部稔知叛又反覆多詐當必不為所容王師因示討義問豈應稽念彼荷戈者仍吟擊鼓兮雪山經岨峿鐡甲卧寒凄為此心常測寧能樂獨禔馳書憐驛馬問夜達晨雞露布重殷佇永清綏狄鞮新正小宴外藩一家中外逮渠搜三接從來禮數優朶朶綵雲成瑞字瀼瀼霑露乏春蒭肆筵每先去聲上元節列席教陪歸義侯達瓦齊加恩封以王爵凡宴會皆令預之行慶底知心喜處即看積玉滿峯頭春園節物始妍和綵服華茵嘉客多桂核蘭湘方授几花雲藕樹未分科毋俾底藉賔筵什易觧教翻牧馬歌樂部笳吹樂章中有牧馬歌䝉古曲也是日奏之逺使堪嘉知悔過也令預宴沐恩波伊犁台吉宰桑等悔罪請擒賊自贖遣使輸誠是日使臣適至亦令入宴頻聞頻聞西師信脅從勦撫多阿巴噶斯諸部脅從者勦其渠魁而撫其餘衆所收人畜甚夥渠魁就獲否遲待音如何華鐙縱酬節萬里懐枕戈情知天助順衆憤惟么麽塗炭其鄂拓䝟貐其綽羅阿睦爾撒納素僄狡兇惡誘達瓦齊戕喇嘛多爾濟迄知為衆所共憤計無復之乃不得已率所屬來歸幸竊恩遇飢鷹忽來投恩顧曽無過封狼終竄去曽匪嚴辭訶本意攘四部事逆理則那恃計計今窮實賴三窟窠獨厪王臣勞浹歳契濶歌更念歸化人游牧廢寢訛佇俟紅旂逓集塞馳明駞䝉古地馳驛皆以駞雪嶺兵氣銷澣海春風和二月十三日啟程躬祭闕里適以是日逆賊阿睦爾撒納就擒㨗音至理宜躬詣祖陵叩謝因以路便命改程先謁泰陵俟曲阜迴蹕敬當往謁孝陵景陵七字成詩一心誌慶撫定伊犁功慶成告功闕里此涓程胡為背徳圖專地卒致生擒逓㨗旌數日紆途近申謝二陵遙望迴懸誠祖功宗徳叨鴻佑益切冰淵戒滿盈鷙性安能飽竟颺逺夷亦自識綱常時將軍策楞帥師深入諸部為阿睦爾撒納煽動者舉悔從逆之非都爾伯特台吉伯什阿噶什率庫本諾音台吉諾爾布等協力致討賊乃就獲虚傳三窟藏身譎實許千廬悔罪良肯使游魂潛釡底寧同飛鳥歎弓藏上年略定伊犁阿睦爾撒納為副將軍功成寵賚甚渥方召赴山莊錫宴而逆賊反覆性成潛萌為四部總台吉之志所圖不遂乃中道叛去脅其黨為亂卒底於誅欽承天貺慰還懼魚海龍堆日月光黄新莊行宫疊去歳韻去歳命貞師邀庥敬謁陵功成信云速而何乖變生討叛重致誅虎旅踐王庭鼓勇合衆力露布傳紅旌澣海銷兵氣天弧靖狼星䝉佑申素悃吾寧漫改程恭謁泰陵載戢干戈弓矢櫜春風露布㨗旂高徂求遂得元兇繫耆定端惟聖澤叨保大今猶籌撫恤詰戎昔尚憶勤勞蕆功成志遑云幸戒滿持盈勵自操涿鹿行疊去歳韻采眊重臨凹字城獻功將為在泮行去年過此師方出尚憶興寄軒轅明鴞翩其集鷹亦飽狡焉颺去自云好由來天道本禍淫險逺安能恃奸巧檻車纍致應自尤腆顔猶詡懐恩稠阿睦爾撒納叛後猶上奏乞為四部總台吉署銜尚稱定邊左副將軍雙親王奏中多受恩圖報語露布正到啟程際叩陵途為三日留天涯盡處銷兵氣干戈包以虎皮收千村耕牧本無事行因釋奠文教修南苑行宫疊舊作韻有小序孔林告祭禮成旋蹕展謁孝陵景陵由趙北口取道而東經臨南苑遷次逾宿循覽舊題感時觸緒輙仍原韻用述近懐離宫信宿重闗情綈几芸編觸目清詎料鹿蠡仍計詐尚教頡利待擒生起鑾日西路軍營馳報擒獲阿睦爾撒納露布蓋㨿以告者乃逆賊緩師之計也已而策楞等知其為詐督兵速進刻期往擒驅除已奏伊犁定初阿睦爾撒納潛跡伊犁聞大兵至乃遁去喇嘛人衆來迎策楞等遂以二月二十四日收復其地旋轉終歸絶域平謨烈在天祈黙佑橋山東望薊雲横恭謁孝陵風雲環衛是先天松栢隂森近百年一脈精神孰知逺萬方基構况承前玉衣石馬驚霜露瑞嶺祥峯切顥烟耆定遐荒藉鴻佑持盈思永益乾乾恭謁景陵三征我武輯寧夷一面姑寛順應時奠逺庶因愉素志告成敢以達衷私音容三十四年隔德澤百千萬禩垂不數斯來縁有事不䟽每到逈含悲御園即事山亭水榭報清和踰月流光迅若何樹試緑隂方張王二字去聲花留紅意亦婆娑亡魂縦是逃獫狁獲醜惟應待洛那叛賊阿睦爾撒納竄入哈薩克界計當擒縛以獻洛那即大宛今哈薩克也也識事難期盡善洗兵志在挽天河去歳平定伊犁而阿睦爾撒納中道叛歸煽惑伊犁宰桑喇嘛等亦有附彼為亂者已而衆知悔過欲擒彼贖罪又以衆志不齊竟致竄逸今我軍既至伊犁大局已定特以窮極遊魂未即致俘而大兵又不可遽撤為可懣耳免甘省諸郡正供詩以紀事上年平定伊犁西北兩路軍需採購輸輓率資之甘凉肅諸郡邑邊氓誠悃服勤有足嘉者用免本年應徵正供以恤勞勩西北屬有事用兵非得已然非翦勁敵討逆執醜耳特以道路遙兼之乏任使伊犁用兵在朕左右贊襄運籌者惟大學士傅恒一人而閫外之寄前後所用往往過於選懦昧於機冝屢致僨事殊為憤懣朕於始事即為之躊躇審顧不欲辦理者以此遂致彼遊魂猶然延釡底屈指初卜征逮今復伊犁叶一年餘數月士卒亦勞止士卒用新附及八旗弟子芻餉皆採購輸輓計價與叶豈如新安吏㸃兵括鄉里猶念購與輓究資民力矣邊郡風樸淳服勤誠足美用免惟正供休息自今始佇待獻逆俘歸馬中外喜嘲劉統勲劉統勲以恊理總督轉運軍儲駐巴里坤逆賊阿睦爾撒納之叛煽阿巴噶斯哈丹等擾我臺站將軍永常聞風恇懼自木壘退師巴里坤劉統勲輕信不察率議棄地退保哈密審爾則何以不數月間大軍旋收伊犁逆賊亦何至窮蹙逺竄耶朕燭照其謬慮搖軍心命禠職治罪今舊疆蕩定逆賊指日就縛念劉統勲一書生也軍旅非所嫻且非所職設令模稜者處此轉以緘黙自全而奮發吐露尚知急於公事是其識雖乖而心可諒爰畀以原官并拈此嘲之集賽伊犁歴一過珠崖請棄竟如何我非勤逺惟觀火卿誤養奸作止戈究勝寒蟬原所諒堪稱老馬可無訛犎牛即駱駝也騎進陽闗矣只恨難為叩角歌逆賊阿睦爾撒納奔竄哈薩克我師冞入追捕雖屢戰勝而賊踪益逺因念絶域曠時不欲久勞師旅宣諭撤兵詩以述意窮寇且莫追天邊命返師一月既三㨗定西將軍達爾黨阿等殺賊於雅爾拉罕巴巴大敗遁去又殺賊於伊什爾罕巴巴罕都拜大敗阿睦爾撒納易服而逃又定邊左副將軍哈達哈等殺賊於毫哈薩拉克山阿布賚大敗走兩路將軍旋以屢戰馬疲請暫退師明春再行進勦而朕先是已降諭㫖命撤師故從之黷武寧爾為伊犁新奠定四部待休滋脱兎丹津似會看俘闕時青海羅布藏丹津竄入準噶爾者三十餘載上年平定伊犁獲之獻俘闕下出師出師在何所仍在西北荒渠魁既未獲醜逆因跳梁留處軍原寡計月輸餱糧協力翦渠羽中路乃乖張反戈忽内向百騎曽奚當噶爾藏多爾濟報將軍兆惠以巴雅爾搶擄人畜請發兵協力共勦兆惠因遣將軍和起調札納噶爾卜等諸部落協擒巴雅爾而札納噶爾卜哈薩克錫拉等中變和起所率兵僅百餘人以衆寡不敵遇害犯臺奪軍食遂致大獗猖迴思去年來饑賑亂與康誰知煦嫗恩不足懐豺狼我直彼則曲六師宜張皇以正討兇亂言順氣倍强勁卒簡子弟召募非編氓叶儲胥發帑項賦役非加常其間或雇賃仍令計價償究不無勞民寛賦頒十行内安外易攘逆靖順受慶丙夜籌軍機九微對燭光宴樂弗耽盤敉寧期久長出師匪得已永言示大方新春小宴外藩南巡將啟駕西苑預開筵節景迎元夜恩波例往年情聯新舊客春在鳳凰絃章黻彬儀度誰云裘是氊叛孽適俘至儔前細鞫情青滚雜卜本和托灰特貝勒世受恩育去歳北路從征中道叛歸騰布謗言欲煽動諸喀爾喀朕命親王成衮札布將兵討擒是日俘至即於宴次鞫其罪狀以示諸外藩明與衆棄之之義設如不䟦扈一例被恩榮極典伊誰取圍觀衆莫驚各其勤職守彰癉有權衡降㫖免甘肅本年額賦並積欠詩以誌事西陲兵未罷戡亂非得已儲胥發官帑詎肯征閭里究之出諸民豈如無事美去年縱蠲賦今復新正矣地瘠貧民良施恩宜在此正供與全豁寛心勤耒耜積欠免歴年奚用愁留抵靖外先安内化日春風裏涿鹿行再疊舊韻影燈喜爆閙郡城民風豐歉覘經行行宫晩景正清絶壁詩歳月標分明西征士騰馬亦飽機縁天凑時誠好其如審勢乏人為西師所至仰䝉統兵天佑可刻日廓清而諸臣各分彼此致失機宜狼子野心殊詭巧降蕃變亂因畏尤阿睦爾撒納巴雅爾等皆因受恩驕恣自知罪狀暴著懼罹誅討遂决計叛亂反面不顧恩遇稠聲罪致討重整旅肯使偝德殘生留七擒南人不復反三年克之鬼方收身此南巡心西海宵衣寧憚軍書修紅杏園再疊前韻練日巡江國乘春發鳳輦昨歳告武成憶曽於斯館豈知馳㨗旌詭計事後顯去春以伊犁底定親告納孔林起鑾時擒獲阿睦爾撒之報適至閱數日乃知叛賊誑言以懈衆志統軍者不審其謬遂馳露布久之屢失機宜迄未擒賊因正軍帥之罪云三軍賴司命一籌何莫展選將更整旅問罪王師遣去歳以阿睦爾撒納未就獲故懐觀望如巴雅爾之類者旋復搆亂因更名喀爾喀親王成衮扎布為定邊將軍以今春統索倫察哈爾等兵進討諸逆佇待奏膚功戡亂靖鄯善詣闕里瞻拜去歳躬親奠素王迴程重謁廟堂皇誰知獻馘翻成偽去春以上年平定伊犁親告闕里啟蹕時適得擒獲阿睦爾撒納之報久之乃知策楞等為賊所紿輕信妄奏遂致餘氛更搆殃逆賊既未就獲颺竄哈薩克其餘孽呢嗎等復與噶爾藏多爾濟紏結為亂豈礙告成斯定局曰惟聲罪不庭方祖功聖徳胥垂佑在泮行歌載戢章五更五更軍書至云速六百里宵衣急披閱乃知報㨗喜呢嗎已俘獲並繫其妻子去歳重猖獗禍魁實曰此札納噶爾布倡和如魚水執魁訊厥踪云亦就拘矣乃因彼中亂操戈同室裏達瓦及渾齊二台吉名縛獻贖罪已呢嗎與札納噶爾卜同謀戕殺噶爾藏多爾濟而札納噶爾卜旋為阿睦爾撒納所襲頃執呢嗎訊之則札納噶爾卜又為台吉達瓦渾齊所縳以出痘尚未來獻先是我北軍早擒巴雅爾亂首大半殱所餘惟二耳哈薩克錫拉組頸期可指阿睦爾撒納喙息尚逃死斯實魍魎渠亦失三窟恃阿睦爾撒納竄入哈薩克竊馬遁還揚言哈薩克助其兵力以煽動逆黨近哈薩克汗阿布賚遣使稱臣約擒逆賊以獻佇待白練牽絶域兵革弭大西門樓前較射疊舊作韻有序戊辰九月較射於此發二十矢中十有九詞臣齊召南以七律四首進呈因用其韻勒之壁間次年己巳孟夏皇太后御樓觀射是日十中其九破的者三仍用韻紀事頃秋獮迴蹕九月廿有三日問安之次引見樓下復命射屢中後懸的最小者亦再破的適哈薩克使臣列觀班末三疊前韻紀之朔塞迴鑾擕貴山扈隨經月六龍間視朝許厠千官末將以廿六日進宫視朝亦命哈薩克使臣入班行禮駐苑聊乗數日閒問寢敬趨慈夀閣亮工敡對鷺鵷班疇咨已罷餘清暇較射令平聲觀騂角彎漏言誰者犯無當跳爰爰脱大黄阿睦爾撒納為官兵追急復投哈薩克阿布賚留之欲擒以獻而為阿睦爾薩納所覺隻身徒步夜遁愧我猶然失前著示伊空自擅穿楊銷兵惟厪肆時夏懐逺因教觀國光和議羅义素應守昔年俄羅斯請和與定十一條内彼此不食逋逃今逆賊已入彼想彼定當縛送闕下也待期縳送致封狼南服災傷重洛嵩慙稱飢溺已躬同旰宵惟亟籌衣食支詘何能適矢弓荒服却因至鶼鰈羽林况復待羆熊聨情示度聊親御連中休誇此素工罷射平蕪一軃鞭山光萬壽正迎前飛樓𨼆入丹霞嶠畫檝衝開碧水天菊放恰疑金布地稻收喜看􅕗遺田陪臣擕賞非驕富惇史傳將自此年冬日祖朝百寮劍佩集明廷班末陪臣贊謁聆是日哈薩克使臣行禮黄道星辰聯畢昴小陽候節靄元冥東鶼西鰈誰分域琉球使臣適亦隨班叩闕北極南荒一太寧逺服邇安心敢肆敬天勤政訓聰聽西陲西陲方蕩定卒未得休師勤逺非初意三年乃逮兹設能先執領安用屢移碁事順乏人幹乏人責在誰西陲用兵非本意具見前記幸成大功斷無中棄之理使任事者智勇兼備早誅一阿睦爾撒納則衆叛惕息必不敢再生事而諸臣屢失事機以致羣孽反覆逆酋逺竄勞我師徒於今三年矣準噶爾素稱雄長諸部哈薩克從來未通中國今伊犁既已平定哈薩克汗阿布賚亦不煩招徠傾心内嚮孰非上蒼之黙佑耶然伊犁耕牧善後與夫一二遺孽尚待剿靖一時不能罷師雖不似古者役民之為而曉夜運籌自覺勞心亦事之不得已也若夫濟事無人則惟深感愧耳俄羅斯驛致叛賊阿睦爾撒納死屍信至詩以紀事有序去歳因阿睦爾撒納由哈薩克竄入俄羅斯境内執言索取爾時浮議或慮致啟邊釁然俄羅斯以逆賊素稱兇狡留之以資其力未即縳送此更不可不力索矣因命典屬嚴辭疊促兹以逆賊患痘身斃俄羅斯遂傳送其屍修辭遣使以祈永睦蓋彼有大圖則不屑守和約而竒貨既亡則毋寧遵舊盟此事理之易見者設使不向取則並此亦不俘獻矣從此俄羅斯之和好益固準噶爾餘孽擕貳自消而為庸懦姑息之浮言者當自知愧赧撫兹事蹟略志顛末既以抒因時斷制之懐且用昭示來兹俾知息事因循實不足與語詰戎固圉之道也聨猭善走更工藏蘇對潛逃又北荒詎識羅义和約固獻來萬里逆屍殭功如彭寵遼東豕執達瓦齊之役阿睦爾撒納原不可謂無功而伊犁既平遂懐擕貳然使任事者能遵朕㫖而中事機亦不致僨事三年之久也心是温禺天外狼遺孽廓清永砥屬持盈益勵敬皇皇早嫌牛腹與鳶肩密㫖丁寧敕事先初命阿睦爾撒納為將軍時恐其有反心密勑固倫額駙色布騰巴爾珠爾及軍營大臣等言彼不叛則已若露叛蹟當先誅之而諸臣徘徊遷延遂致兔脱亂弭安能待訿訿禍成因未塞涓涓由來一勇士之力何致惟姑息以延荒服遵盟歌保定藁街寧逭首明懸西師西師歴四載王臣久于役誰無室家心而能忘契濶始縁趁機動操刀乃必割終以阻逺艱舉碁忌屢易欲罷又未能永言誌顛末皇祖征朔漠即此厄魯特三畨整六師狼羣始窘迫策妄退守巢于以延喙息取馘索賊子惟命無敢逆噶爾丹兵敗仰藥死其子脱身逃竄時策妄阿拉布坦鼠伏一隅畏威赧徳獻出逆屍不敢容留逆子厥後漸滋饒遂復劫西域策妄阿拉布坦逞其詐力勢漸强横計誘拉藏汗以女妻其長子丹衷襲殺拉藏汗大肆劫畧我師抵西藏其酋帥大策零敦多卜始引衆歸巢大䇿零敦多卜即今達瓦齊之祖為策妄族兄終康熈年間蓋未止兵革皇考闡前猷思一勞永逸兩路命大舉帑藏非所惜究因時弗輳勝敗互軒輊雍正年間西北兩路駐兵賊以送還羅布藏丹津為名又值西帥入覲劫竊西路馬羣因藉所獲馬力跳梁北路勢甚猖獗後為額駙策楞擊敗於額爾徳尼招幾至匹馬不返而將帥之臣按兵不追賊衆得以兎脱我武既揚遂有罷兵之議曰予守成訓罷兵事安戢稔知賊所恃其長有二術一曰激我怒勞我衆逺出彼乃邀近功坐絀我物力一曰窺我邊列堠疲戍卒戍久心或懈彼乃逞陵軼知然明告彼以主待其客逺兵既罷征逺戍亦罷撥近邊汝或伺汝逺勞竭蹶噶爾丹策凌聞言乃計絀得失故曉然求和使來亟来亦弗之拒厚往示恩澤如是終彼身無事皆寜謐其子曰阿占即策妄多爾濟那木扎爾之乳名暴虐莫可詰用是失衆心相延為簒奪喇嘛達爾濟戕彼位自襲達瓦齊攘之計蓋由撒納喇嘛達爾濟既簒阿占而奪其位達瓦齊偕阿睦爾撒納奔哈薩克藉其聲援復簒喇嘛達爾濟偕阿睦爾撒納為之謀畫蓋欲自取也綽羅斯汗族達瓦齊一脈阿睦爾撒納輝特别枝葉時慮衆鮮從以此綴旒設終不忘伊犁伊犁蓋四衛拉特㑹宗之地也煽亂事狡譎達瓦齊弗甘兵連禍相結惟時三策凌都爾伯特台吉策凌策凌烏巴什策凌孟克恐禍及已率所部來降避禍來投闕撒納旋亦歸寵遇厠班列熟籌如許衆雜居喀爾喀如狼入羊羣幾不遭咥嚙就其力請師毋寧授之鉞阿睦爾撒納歸命乞帥朕思機既可乘而新降多人若盡處我喀爾喀之地終非長策故定議出師遂命阿睦爾撒納副將軍班第以徃國家全盛時出帑儲胥挈曽弗加賦徭更未廢賑恤八旗及索倫勁旅多英傑其心盡忠篤其技善撇捩那如杜甫詩慘惻新婚别乙亥我出師一矢曽未發五月大功成庶以慰前烈而何狼子心飽揚去飄瞥留語啖衆狙倡亂動戈㦸致我二臣捐驛路四唐突阿逆潛蓄異謀於達瓦齊就擒大兵凱旋時即流言脅衆黨惡之徒倉猝變動班第鄂容安同時致命疆場賊衆紛紛四出竊占伊犁截斷臺路羣言益蜩螗無恠懦者怯欲棄巴里坤堅志斥其説整師重討叛所向復無敵一二畏首尾乃致賊兎脫大兵復進前徒倒戈阿逆衆叛親離成擒在邇乃因將軍䇿楞叅贊玉保等不和又無克敵致果之畧阿逆得以亡命申命事窮追大宛搜三窟於詐應以直殘喘命得乞哈薩克汗阿布賚始意欲留阿睦爾撒納大兵已壓其境相隔一谷阿逆自度力不能支因遣使詭辭稱哈薩克衆即欲擒獻阿逆但其汗阿布賚未到乞暫緩師適以策楞獲罪命達爾黨阿將兵前往我兵以逆賊在目前爭欲進促而達爾黨阿以為天朝當示大義彼既縛獻不宜加師力阻衆兵徘徊觀望而賊得以槖載逺颺矣宰桑勤王者見此笑以竊遂生輕我心旋師反又忽時呢嗎哈薩克錫拉皆以授職從征見達爾黨阿為賊所賣笑其無能自哈薩克還復生變計與巴雅爾莽噶里克等密謀搆亂以害將軍和起賺計我和起奮勇沙場没兆惠全師還則予命往接將軍兆惠以孤軍逺駐伊犁聞呢嗎等作亂整師東旋中途屢殱逆衆值朕命侍衛圖倫楚等率師赴援乃得振旅而歸抵巴里坤丁丑重問罪值彼互殘殺因縁撒納歸遇我竄倉猝諸將分南北兩路直指伊犁維時扎納噶爾卜殺其叔綽羅斯汗噶爾藏多爾濟欲併其衆尋又為台吉達瓦所殺而獻其首軍門時阿睦爾撒納復自哈薩克逃回伊犁聚衆争長突遇我師跳身遁跡富德躡其後大宛徠汗血稱臣許捕冦冦更逃羅刹富徳追阿睦爾撒納適值哈薩克之兵而哈薩克畏我兵威稱臣貢馬且誓擒賊自効阿逆知不能免乃奔俄羅斯俄羅斯一名羅义或曰羅刹或曰不必追或曰不必索或曰捐伊犁築室謀紛汩北荒守和議冥誅致賊骨伊犁倡亂流大半就擒訖初議衆建侯為撫四衛拉二十一昻吉公屬掄閥閲凖噶爾厄魯特又各四衛拉特部内有綽羅斯輝特和碩特都爾伯特四族各領其衆而綽羅斯為長噶爾丹策凌時設二十一昻吉昻吉者部落之稱也為其汗公屬達瓦齊既執歸京師於四部各封一汗而二十一昻吉則歸之公屬如八旗䝉古然仍擇其世族宰桑軰長之是予奉天道好生體造物詎知被孽深歴世不可活以其狙詐類誠如向所畫每歳費豢養終亦背恩蔑是傷我脂膏而育彼羽翼不如反之速掃蕩今將潔䝟貐肆惡流三氏淪亡歇噶爾藏多爾濟被殺綽羅斯族殄滅無幾輝特汗巴雅爾亦以叛逆誅殛和碩特汗沙克都爾曼濟心懐擕貳叅贊大臣雅爾哈善詗知異謀殱之于巴里坤外餘都爾伯特始終守臣節所以至今存耕牧安織殖其廿一宰桑非誅即病殁不善降百殃此理愈昭晰謂禍乃成福致得每於失幸以免衆議孰非鴻佑錫設使司事者惟明更勇决萬全盡美善詎有小差跌都大承平久軍旅誰經歴益因警宴安求全肯過刻先是花門類雜種曰回鶻久屬凖噶爾供役納秷秸羈縻其和卓噶爾丹策凌先以兵威迫脅回人執其酋長和卓拘繋於阿巴噶斯之部落以回民分隸各昻吉下而役使之籠絡其臣妾我師定伊犁乃得釋絏紲我將縱之歸撫衆許朝謁和卓初聞大兵西伐獻欵輸誠備極恭順我將軍班第等因縱還故土俾撫馭其衆納賦執役肉骨生死恩感應久不輟報徳乃以怨轉面凶謀黠我將所遣使百人遇害劇和卓歸故域後我將軍等差副都統阿敏道率百人往㑹盟而彼乃設計盡行戕害是皆奉上命守義遭臬兀茍不報其讐何以勵忠赤厄魯今蕩平回部餘波蕞徒以守堅城未可一時㧞賈勇誠易登傷衆非所悦中夜披軍書萬里遙籌䇿窮荒信安用弦上矢難遏志因繼兩朝變豈防一切蒼靈賴有成浮論寧袪惑開邊竟無已自問多慙徳但思文子言解嘲守弗誖即事厄魯蕩平回部連止戈畢竟是何年固縁弦上矢必發終愧階前羽舞旋勃律正聞踵來接堅昆佇待首誅駢山莊行慶暇奚念念到庫車阿那邊駐行營今年獵塲向迤東崖口外即行營駐曉凉羣己換㫋冠背指離宫猶驛路輕驄得得進圍界漸逺村莊多野趣四十八家率獵騎櫜鞬供役年來赴牛牟駝􅕫滿谷中乳餅馬潼隨意酤厄魯驚嘆有如是伊犁較此難言富山莊幾日陪宴賞宫室衣冠非所諭古來北部輕南朝今日歸新原勝故我聞此語心為怡延美孰非祖烈貽共搢紳士議兵革與介胄士談書詩以水投石昔所譬枘鑿弗入其奚疑習勞繩武益勤懇一家中外綿丕基仲冬南苑大閲紀事廿年一舉寧為數乾隆己未大閲至今蓋廿年矣周禮分明節候論便設軍容示西域時哈薩克布魯特塔什罕回人等皆令預觀佇看露布靖堅昆邇日盼將軍兆惠喜音殊切於懐好齊以暇千旓颭既正還竒萬礟喧風日晴和士挾纊非予恩也總天恩苦衷苦衷早已賦西師孰謂頑回尚守持當俎刀操終必割在弦矢發可容遲獨慙天與人歸㑹竟致窮兵黷武嗤師直理長觀事定目前浮論付憑伊欽定皇輿西域圖志卷首二欽定四庫全書欽定皇輿西域圖志卷首三目録天章三元旦試筆降㫖免陜甘兩省正供並積欠詩以紀事新正瀛臺小宴御前藩王大臣及漠咱帊爾故大學士黄廷桂輓辭降㫖加賑甘省被災州縣詩以紀事有序述懷賜將軍兆惠書扇賜副將軍富徳書扇軍書元正太和殿朝㑹庸作歌降㫖免辛巳年正供詩以紀事邇日御午門受俘馘瀛臺曲宴外藩新正恭奉皇太后幸圓明園即事上元前二日萬夀山賜親藩及諸回部宴詩以紀事上元夕恭奉皇太后觀燈火燕九日作太液池泛舟即事恭謁孝陵恭謁景陵二月廿一日恭謁泰陵啟蹕疉乙亥韻紀事將軍兆惠富徳差乾清門侍衛來請安詩以賜之恭謁泰陵二月廿七日郊勞出征將軍兆惠富徳及諸將士禮成紀事三月朔日御殿定邊將軍兆惠副將軍富徳等率成功諸將士朝謁詩以紀事上巳日凱宴成功諸將士有序射八韻駐防葉爾羌大臣阿里兖等奏報諸回城於三月下旬得雨詩以誌慰有序八月十八日恭奉皇太后木蘭行圍啟蹕之作九月朔日作塞宴四事木蘭迴蹕至避暑山莊作射萬樹園賜宴即席得句萬樹園觀燈火弆藏西師俘獲軍器於紫光閣詩以誌事有序武成殿作尊藏得勝靈纛於紫光閣詩以紀事有序紫光閣寫功臣像及諸戰圖畢集讌落成爰賦六韻仍疊四章有序紫光閣曲宴外藩並回部詩以誌事戰圖補詠有序欽定皇輿西域圗志卷首三目録欽定四庫全書欽定皇輿西域圖志巻首三天章三元旦試筆祥啟屠維冒茆駢青陽一律遍三千嵗開天紀欣迎祚月建王正勵體乾磬管韶英宣太蔟衣冠鴛鷺厠于闐時賜漠咱帊爾公品級冠服諸軍昨報平安信實沐恩禧意倍䖍將軍兆惠等與賊回相持昨據舒赫徳奏報降回至阿克蘇者言我軍中有一厄魯特逃出至回軍稱我營内掘地得回人埋糧百餘窖且布魯特又侵彼喀什噶爾城以此兩和卓木欲議和而我將軍不允此際舒赫徳已領兵進援計日可到餘糧之獲實頼天佑也爆竹千門達曙鳴鞠陵初旭耀晨明土爰稼穡資豐稔木盛春陽肇發生南北東西共文軌京垓億兆願康平金川耆定溯前已平定金川乃已年今嵗又逢已實幸理紀之符願遂武成之慶佇叶貞符聴凱聲降㫖免陜甘兩省正供並積欠詩以紀事西海有征師卒未得息事屈指軍興來届今凡四嵗凖夷則蕩平逆回尚稽繫國威屬觀瞻欲罷焉能置厚集我軍容益勵我士志乘春期一舉永靖遐荒謐叶肅凉近接邊輓運最勞勩連年免正供預豁庚辰逮復思陜連甘豈無所波及叶體察將並寛降㫖付連帥其餘雜欠項概免大施惠肯因討小醜而傷我元氣申命良有司推行俾均被新正瀛臺小宴御前藩王大臣及漠咱帊爾運斗屠維單閼廻順時行慶合瀛臺千羣尚可冰嬉試三接都教春宴陪屏翰何妨厠蔥嶺歡娛齊説到雲來鵠場晴靄因觀射是日發十五矢中十三蓋外夷雖宜宴賚厚惠尤當示之以射獵之事彼更樂亦畏服示逺寧徒好樂哉故大學士黄廷桂輓辭華鐙廣樂正陳時扼擥驚聞辰尾騎慈慶朝儀難並輟强酬節物淚雙垂屈指軍興逮五年儲胥事事合機先凡軍需事宜有經朕先時規畫而傳諭批示甘肅尚未奉到者及郵牘至無不適相脗合亶維良弼蒼生福痛惜摧心敢問天馬利軍行粟賑民彌留兩事尚諄諄遺疏内深以調飤馬匹及地方賑䘏諸務籌辦未竟為憾覽奏䀌傷不忍終幅鞠躬盡瘁今誠已葛亮而來此一人運籌力疾尚勞心驛館誰為下鵲鍼時以督辦軍需赴凉州雖抱疴日劇猶勉力視事邊地素少良醫經布政使蔣炳奏聞即命福隆安挈御醫前往診治甫行而惡耗遽至可勝慟悼賜賻行將歸故里椒漿寫痛定親臨封疆厯三十餘年公正廉明衆共傳皇考時臣所餘幾鼻酸然復思愀然降㫖加賑甘省被災州縣詩以紀事有序甘凉為西陲轉饟孔道土瘠而風醇其民受直執公旬惟謹給復蠲逋之詔嵗既數下其偏隅以薄祲告者廪餼優卹訖於夏五顧念時未登秋節方届閏心有慜焉申命貸之牛種仍予展賑三月庶幾綏我蒼赤資彼青黄即事攄懷以當咨牧凉肅窮邊末鮮逢温飽家何當運餉苦更抱被災嗟討逆非容已思艱詎有涯豁征明嵗預繼賑到秋賖不窘寧無窘雖加可再加所希歌載戢萬户樂休嘉述懷勤逺非本意乘時頼天佑予曰有禦侮予曰有奔走準夷永蕩平敢詡武徳茂夤緣討逆回戰勝頻捷奏重賞實未惜神勇亦屢遘逼巢堅城下强弩致逗遛羽檄繼進軍重圍急援救夾攻士氣張况當疉破冦肉薄豈不易傷衆予心疚以此令稍戢齊力圖其後惟是閱時久待秋乃功就枕戈衆効忠擊鼓五哀閗焦勞分所當萬方均在宥厪彼此詎忘乾惕惟益懋賜將軍兆惠書扇火嶺炎蒸劇將軍未解鞍國威揚萬里臣節率三單贈奬赤心篤持同白羽看黄香思漫引存問悉平安兆惠母年髙時遣人存問賜副將軍富徳書扇師進和闐路擣虛事夾攻恩威僕儓識甘苦伍偏同推解厪予念馳驅勵汝忠箑頭題句贈回部播英風軍書軍書清曉到兩回城已定葉爾羌喀什噶爾兩大城其兩城所屬小城更以十數計皆已傳檄而定賦役及建置惟將軍所令將軍兆惠等既收撫回中諸城請酌定賦役視噶爾丹策凌時徵取之數分别蠲减有差并定錢制廣圍銖兩正面用天朝年號而以城名回字附之于背其建置官屬自三品至五六品詳系職掌名目則各縁其舊俱降㫖如所請行逋逃雖有挈捨而來相迎詢以所去方乃無可投境叶軍中得回人詳詢逆賊潛逃踪跡云初議投安集延既懼為布魯特刦掠繼又得抜達克山伯克回信以往投人衆其地必不能容二酋不得已暫匿附近之塔益嗎地方或就彼竄入塞爾古爾土城苟延殘喘計大兵一經圍壓可以立就俘獲矣邏騎遮其前大軍逐以競此舉或成余載戢載櫜詠佳兵詎得已討逆惟義勝藉衆集大勲盟獨欽天命元正太和殿朝㑹庸作歌晨參晝食肅朝儀正殿春融赤羽旗考夏綜周原舊典戞球舞籥迓新禧十年一舉寧為數正殿朝㑹雖舊典然率不舉行庚午以平定金川又朕四旬之慶故一舉行兹西師武成綏服回部拔達克山安集延哈薩克布魯特皆稱臣入貢兼值五旬大慶故命循例宴饗萬國來同倍切寅吏治民生厪宵旰問方詎止藉斯時祥花瑞葉玉樓棲慶恰占年景福禔耆定不期徠黙克安和惟是洽羣黎漫陳漢殿魚跳水却聴天方鳯奏西時將軍兆惠自葉爾羌得回部樂奏送適至因命於大饗所陳之部末肄之其器有大小鼓簫管提琴洋琴之屬其伎有倒刺都盧及承盌轉碟之屬簮筆誰成元㑹賦持盈應悉敬彌躋降㫖免甘省辛巳年正供詩以紀事邊省民風淳是予亟嘉眷師旅所由經能無勞郡縣連嵗免正供給值酬輸轉遇灾仍賑恤閭閻期惠遍即今縱武成休養寧當緩叶預免循向例去嵗即預免今嵗正供矣初春頒渙汗惠心勿問吉助陽實政見邇日武成歌振旅長途歸凱軍汜勝占三白積玉遍塍鱗邇日更有喜次第奏章聞王畿固普被河南北亦均於東逮登萊於西則晉秦江浙及荆襄盈尺報鋪銀深消遺蝗種淨蠲癘氣氛兵後不易值何修沐天恩敬勤惟益黽遑敢忽笑嚬休養愜恒願額慶同吾民御午門受俘馘函首霍占來月竁傾心素坦欵天閶理官淑問寧須試驃騎窮追實可臧西海永清武保定午門三御典昭詳從今更願無斯事休養吾民共樂康瀛臺曲宴外藩仙臺曲宴荅韶年舊典惟遵憓愫聨北漠户庭真宻邇西瀛裘帕許㕘連蒙古王公等朝正來者賜以曲宴嵗以為常今嵗並令回部來使入席且奏回樂兠離歌與任僸舞拔達山將安集延近悦逺來寧易易側身基命益乾乾新正恭奉皇太后幸圓明園即事西山積素喜迎人今嵗韶春果是春振旅三軍前後接朝天使者到來頻時諸部並遣陪臣入覲安集延使陀克塔嗎特等拔達克山使額穆爾伯克等已先後與宴而布魯特所遣西拉噶斯等亦即日抵京逖疏率與光明耀勞徠猶宜燕衎申略得對時愽慈豫壽徵福履自駢臻上元前二日萬壽山賜親藩及諸回部宴詩以紀事萬壽山光隔嵗㸔初韶行慶駐鳴鑾朱琴儀鳯調伶史翠釡供羊出大官詩孰蔡襄詠嘉祐節同景徳宴蒲端何期戎索兹開拓敬保金甌永乂安上元夕恭奉皇太后觀燈火樓頭嵗嵗奉慈娱今嵗慈娱勝且殊樂聴侏離復僸佅舞看跳劍與都盧明燈忽綴千珠網翠火全張萬壽圖所喜萱階紓念切敢誇蒲海奏功膚燕九日作七日燈宵一日餘自十三日放燈至十九日收燈共七日樓西婪景醼渠胥纒頭羣喜瞻天表挺臂何妨挽月虚是日令肄馬上諸技畢復親率近侍諸藩較射命矢疊中俾回使觀之蓋外夷所重惟武燈宵百戲彼雖愛觀不至如此驚服也慶節發陽原典故騰輝吐爓尚龍魚新年百務咸亨順為去聲是矜矜越凛予太液池泛舟即事錫宴花門備禮容乗間蓬島泛游龍舟名仍擕首俾同樂所喜葵心總致恭春水生來蘭葉細霽烟低處栁條濃西瀛試問為何若道是奚如天上逢半月韶光爾許殊冰消漭沆水平湖更逢雨霽祥暉候可喚仙遊碧海圖理趣鳶飛復魚躍生機白芷與青蒲對時懷逺胥和順益凛虧盈奉化樞恭謁孝陵隔嵗我來東珠丘敬告功衣冠天浩𣺌松栢嵗青葱凡此封疆拓永維庇䕃䝉藎臣皆努力幸與創時同恭謁景陵西域已班師東陵展祀宜闢疆二萬里奏績五年期黙黙深叨佑悽悽更益悲敢云成祖志祖志注今斯二月廿一日恭謁泰陵啟蹕疉乙亥韻紀事東歸既蕆祀西來縁上陵啟蹕疉舊韻往事迴憶生舊作有命師奠西極有事告二陵之句逆者畢掃穴順者胥來庭展謁叩黙佑首頓駐翠旌拓疆萬餘里告功五易星郊勞循祖典即看舉回程將以二十六日贊大告功禮成旋蹕黄新莊時將軍參臣凱旋至郊即於翌辰詣良郷縣南迎勞其築壇張幄列祖纛拜天諸臣以次行禮覲詣一遵制將軍兆惠富徳差乾清門侍衛來請安詩以賜之數年萬里未為遥遥在將逢隔五朝却為勞儀待旋蹕時將軍等凱旋近郊擬以二十七日上陵回程具儀迎勞如三秋念轉無聊恭謁泰陵質明峯樹辨陵園趨謁松宫冠劍存敢曰志成蕩鹽澤亦云功定靖花門凡兹萬里遐宣武總荷九天黙佑恩二十五年如一瞬鼎湖迴憶痛難言二月廿七日郊勞出征將軍兆惠富徳及諸將士禮成紀事京縣郊南親勞軍圜壇陳纛謝成勲出師本意聊嘗試西陲之役始於厄魯特諸台吉率衆欵附請兵甚力我喀爾喀牧圉勢不可以錯處滋患無寧及其鋒而偏師嘗試特計因其地以撫之故禡旗命將之典概未舉行謹具乙亥告成碑記兹凖夷既平而回中諸部以次戡定實荷上蒼宗社鴻庥非敢謂先時逆睹及此也奏凱今朝備禮文釋甲弢戈罷征伐論功行賞策忠勤膝前抱見詢經厯國朝舊制凡出征將領成功還者行抱膝跪見禮以示優異今即遵行一瞬五年戚以欣同心萬里那暌違畢竟歡言賦采薇勇將歸來兼福將黻衣著得解戎衣漫稱偃武修文日恐即嬉文恬武機飲至寧誇暢和樂持盈益勵慎㡬微三月朔日御殿定邊將軍兆惠副將軍富徳等率成功諸將士朝謁詩以紀事黄麾簇仗正衙排奏凱來朝樂孔皆脱劍釋氷摇玉珮卷班按隊叩金階幸逢耆定干戈戢况值熈和風日佳范士爕言予敢忘惴矜保泰是長懷上巳日凱宴成功諸將士有序筵開飲至剛逢祓飲之辰苑啟瀛臺恰奏濛瀛之績於時上公晉斝青郊解甲初還蕃長敷茵黄幄纒頭列侍宫懸陳百部將回中樂府齊登錫爵徧三巡以閣上圖形為次詎因詡挾纊投醪之惠期得抒推心造膝之忱且食刀闐璧偕來包匭宜酬其効順而紫綺朱提並賚簽名合第彼成勞從茲凱宴遐宣足使天堂知樂是用寅承永切毋忘月􅙡依光非矜七徳升歌爰藉八章紀實出勞嘉勲蕆禮旋昇平凱宴液池壖闢疆掃逆誠資衆助順成功總頼天策績林林恩予厚詢勞一一命來前寧惟云不重生望祗覺迴思越悚然日麗風和春未深奬庸備禮有壬林試看偃伯靈臺上詎數流觴曲水潯命預綺筵排伯克也陳夷樂奏任禁笑聆蜀伎無情者那覺西悲動乃心圓幕髙張榆栁垂犒筵喜值禊修時策勲舎爵竟今日鬯武書常允不期誰擬浯溪泐崖頌我歌靈夏出車詩紫光將畫凌烟像西師蕆成大功自元臣及在事將軍㕘贊禁衛統領諸臣第其勲績懋著者命工圖形紫光閣以崇奬勸穆棣同叨乾貺貽成功將士錦衣旋日月光輝軍氣蠲藉我虎臣典宿衛笑他杯酒解兵權將軍兆惠副將軍富徳既以酬庸晉爵均命為御前領侍衛大臣宋藝祖權術駕馭夙所鄙故戲及之八旗子弟心如石萬禩國朝龍荷天宣看瘡瘢猶未愈三等侍衛綽克圖巴圖魯恩特驍勇過人臨陣不避鋒鏑今預宴賜酒時撫其額傷猶未痊復為之惻然能無一體痌瘝連栁舒花放正良辰上日前期福履申三月三日為上已然是日始戊申故云卸甲韔弓盡鳬藻凹睛豐額集魚鱗千秋難遇太平宴百戰歸來義勇身獨憶儲胥宣力者故大學士黄廷桂綜理軍儲調遣諸務備殫忠勤未及武成溘焉先逝故前賜詩冇奪我賢臣何太劇不教留看凱歌迴之句凱廻未見惜斯人敦𤓰烝栗允堪憐二萬何期竟拓邊逺愧周王興六月遲過殷帝克三年依楊霏雪凡經㡬立幟登弧盡陷堅此日征夫真邇止皇州春滿七條絃拔達山人獻馘歸三軍飲至藹晴暉勞心幸我紓宵旰公道憑伊論是非紫綺朱提頒渥澤前歌後舞迓鴻禨歡來憶不同來者軍興以來我大臣將弁等咸以藎忱自奮其間有遇阿逆之叛如將軍公班第㕘贊伯鄂容安遇噶爾藏多爾濟等之叛如寧夏將軍和起而追色楞之逃者如副都統唐喀祿誤聴沙拉斯嗎唬斯之詐者如都統滿福至遇回酋和卓木之叛如副都統阿敏道前鋒統領鄂實副都統三格侍衛特通額總兵髙天喜而奉命在途猝遇亂賊如將軍伯那木扎爾參贊侍郎三泰其巴圖魯侍衛中之竒徹布巴寧阿寧古禮富錫爾璊綽爾圖等並能以死勤事秉節捐軀雖加恩優予旌卹而當功成飲至時迴念義烈炳然尤不勝雪涕云勞爵手持淚暗揮芳節延禧淑氣清禊歌聲是凱歌聲元戎允合躬承衮勇校均教手賜觥藉衆力兹疆地戒勅予心永奉天行從來悟得受招理䖍鞏流謙慎捧盈射八韻有序門啟賢良掄材式資觀徳階陳蕃部肄武兼示柔遐爰循聴政常程庶愜依光夙願耦聨十五子臣之鵠並張雋獲疊雙齊夏之規胥叶以身先為則詎詡穿堅扎七重俾目擊而存共喜侍長楊百歩將告成功而匪懈益遵先制以彌勤華林百戲異靡文差不負春園日永壁上一觀同壯志鎮毋忘朔塞風清勅幾恊九經量職授明廷志敢懈耆定治惟求永寧大䝉胥列侍中國式儀型繁弱月觀魄四侯星寫形骲音鳴未已鵠影落無停擅巧非誇已綏遐所適丁由來重弓矢庶以鬯聲靈赫濯於昭在欽惟懿訓聴駐防葉爾羌大臣阿里衮等奏報諸回城於三月下旬得雨詩以誌慰有序諸回城既隸版圖人忻復業駐防大臣循行勸墾插蒔方興而三月二十一二十二日兩晝夜甘霖大沛葉爾羌喀什噶爾和闐洋阿雜爾同時霑渥回人忭舞欵告詫為希有阿里衮等以聞回湟古稱艱澤之鄉比嵗復苦逆酋蹂躙茲獲天仁降鑒槁壤頓蘇視前此師行瀚磧嘉澍應時均深感荷因欽鴻貺載紀長言蔥嶺火州致艱雨一犂天澤沛今春灌田不藉穿渠力利穡都欣纒首人校尉方將設戊巳神農未始禱庚辛遥遥萬里祈年望敢詡休徵益敬寅八月十八日恭奉皇太后木蘭行圍啟蹕之作每嵗金秋舉獮苗悠悠旌斾馬蕭蕭承歡内外都無間繩武覲揚亦孔昭示法子孫從啟蹕毎嵗木蘭行圍諸皇子皇孫畢從俾習勞也随圍賔客扈來朝今年䝉古諸賔客以祝萬夀來京者衆即由此扈駕而行新攜回部鶻師赤回部霍集斯等皆令随圍彼中放雕鶻者謂之鶻師赤如元史稱司鷹者謂之錫保赤之類髙處興安試放雕雕鶻宜於髙處就下放之滿洲䝉古以騎射為重若回部厄魯特則以此為重云九月朔日作秋季惟朔旦塞圍第一塲千山歛雲氣萬樹絢晴光廻巘鴻絧合深溪魚貫長咸賔逮回部入覲之都爾伯特親王策凌烏巴什等向曽預觀塞圍其回部酋長霍集斯伯克霍什克伯克等以賜爵留居京師並屬櫜鞬從獵則自今嵗始云執役有名王舊扎薩克王公台吉等率所部䝉古随圍執役嵗以為常柔逺繩先切詰戎寓意良寧當懈㡬務獵罷閲封章塞宴四事詐馬詐馬為䝉古舊俗今漢語俗所謂跑等者也然元人所云詐馬實咱馬之誤䝉古語謂掌食之人為咱馬盖呈馬戲之後則治筵以賜食耳所云只孫乃馬之毛色即今䝉古語所謂積蘇者是亦屬魚魯兹扎薩克於進宴時擇名馬數百列二十里外結束􅐢尾去覊韉馳用㓜童皆取其輕捷致逺以鎗聲為節遞施傳響則衆騎齊騁驫駥山谷騰躍爭先不踰晷刻而達掄其先至者三十六騎優賚有差所以柔逺人講武事也名王詐馬存遺風獻筵備陳表敬恭廿里以外列駿驄置郵傳命聴發蹤宣教施銃星火紅連聲遞令頃刻通砰磕萬雷忽落空翩若驚鴻逸若龍雲屯颷歘倒吕洪旁唐閃霍復舂容振林駭谷躙阜嵏平沙草軟淨壒塳駃騠束尾綰其􅐢輕方致速騎以童捷足獨出傑且雄選三十六惟良駥按第行賞務從豐只孫古俗想像中和樂還因寓詰戎什榜什榜䝉古樂名用以侑食今俗所謂十番或因此楊萬里詩有全畨長笛横腰鼓一曲春風出塞聲之句蓋樂曲名畨本塞外語而傳偽耳其器則笳管筝琶絃阮火不思之類將進酒輙於筵前鞠􅎽奏之鼓喉而歌龢羅赴節有太古之遺音焉平原擇向圓幕張酪酥乳酒湘黄羊名王捧觴起上夀較漢公卿禮數詳渾撥四火不思曲長朔管如鞭吹鳴羽發徵氣内運叩角動商響外披初奏君馬黄大海之水不可量曲首句繼作善哉行無貳無虞式榖友朋誰云朔漠無古樂絶勝鄭衛為新聲我惟中外一家用聨上下情亦不侈談有虞氏四裔之樂舞於庭相撲相撲之戲䝉古所最重筵宴時必陳之國朝亦以是練習健士謂之布庫䝉古語謂之布克脱㡌短褠兩兩相角以搏踤仆地決勝負勝者勞以巵酒厄魯特則袒裼而撲雖蹶不釋必控首屈肩至地乃為勝彼嘉其壯賜之羊臛則拱臂探掬顧盼呿吞聲若飲歠其舊俗如此因以示惠云健兒揎袖短後衣席前相撲呈雄嬉捭拖拗拉矜扲掑跮踱踞蹋蹍且䠑乘間伺怠出以竒恧然躓蹶力不支勝者賜酒跽飲之别有厄魯均新附其撲法乃異舊部露身赤脚惟著袴撇捩􅞶踔空拳赴失計忽仆伏地據騰跳翻作康王跨兩肩著地頭倒竪方得謂之决勝負勝者揚揚意實歡負者反求微靦顔宣傳典屬呼來前上方肥羊出厨盤長胾碩臛如舉山七箸不設俾恣餐誰識不足君所言快哉大嚼真壯觀豈對屠門空望懸跪振雙臂攫且搏右哆左噏直下咽倐似長鯨吸百川意氣自若殊昻軒均令染指果腹便小哉食肥張齊賢是蓋衛拉衆俗傳示恩奬勇一試旃食罷命前面詢焉弗兹食者閲十年據云準噶爾自喇嘛達爾扎搆釁以來日就凋敝不得如此飽啖者十年於兹矣教駣教駣攻駒周禮雖載然後世僅知攻駒而不能教駣䝉古則熟習其法謂之騎額爾敏達駻馬三嵗以上曰達駻額爾敏則未施鞍勒者也每嵗扎薩克於所部驅生馬多羣至宴所散逸原野諸王公子弟雄傑者執長竿馳縶之加以覊鞲始則怒騁駥趯或豨突人立嘶齧雷殷馭者騰趠而上控掣自如須㬰調良率得名馬二嵗為駒不勝鞍三嵗為駣始堪教夏官庾人早失傳未若朔漠存古調扎薩戲宴必備觀分羣别色陳平原氊廬賜食較撲罷按轡一覽同名藩名藩子弟皆吉服上馬執竿好結束馭生馬者必馳騎逐之襭衣綰帶持尋丈竿繫革絙其上以為控縶俗名套馬竿敺來萬錦歘披前光采陸離紛奪目薄言駉者有驈皇騂騏駵駱駰騢黄縶之維之取傑驁絏絆未及先跳梁草飲水本天性鞿鞚乍拘自覺病驚軼狂擲詎能無處之以暇堪力勝牽來蹀躞人爭騎驀跨那待覊馽施擢足軒立忽落地翻身騰騗捷於飛盡態極變不可狀駻突雄驅若飜浪毛龍逸虎旋就馴人有餘間據馬上馳驟寧供耳目娱駃騠騄耳中掄諸憑閲考牧悟至理不教而成事所無木蘭迴蹕至避暑山莊作鹿期促駕駐兩日塞上行圍倐又迴美土如斯可漫去逺人爾許况攜來時回部郡王霍集斯伯克等自京随駕都爾伯特親王策凌烏巴什等以入覲扈從秋蒐而哈薩克陪臣都勒特赫勒等亦赴木蘭朝謁既命觀圍並攜至山莊錫宴從容宴樂應教預假借清凉得久陪繩武惠遐綿奕葉山莊嘉兆自天開射射是朝家夙所長承平遊豫那宜忘攜來新附控弦部駐此當年避暑莊親御矢弧聊示度數頒幣帛用旌良樹侯疉中休稱頌是日發矢二十七中十之九破的者六及易小鵠復連中舊部新蕃暨哈薩克陪臣侍觀者無不喜躍稱異敬仰前猷敢不蘉萬樹園賜宴即席得句小陽春旭暖温暾令日筵開萬樹園屈膝捧觴逮鹽澤纒頭式禮厠花門回部郡王霍集斯伯克等及哈薩克陪臣咸預宴敢云一己承先烈或可千秋示後昆坐有鐻鍝如舊僕偏稱兩度沐深恩策凌烏巴什等以甲戌夏入覲曽宴賚於此今入舊扎薩克之列賜坐萬樹園觀燈火巖風傍晩淨魚鱗東望錘峯挂璧輪塞即京華林即上燈原嘉夜月原春千枝蠟鳯燃銀樹百道星虹落玉津義寓光明輝曶爽寧云誇示逺徠人弆藏西師俘獲軍器於紫光閣詩以誌事有序幕庭收絶域運翊風雲臺閣應中台圖兼將相軍儲森列旗常已炳上方陣獲便蕃仗械胥登武庫甲函青瑣得自前驅脱胄之時鎗委緑沉出諸後隊伏􅌢之㑹貫矢詎來肅慎應知貳負先僵佩刀疑壓赫連早識温禺久釁掃蚩尤之長彗還帶氂纓轟尸逐之鋒車曽資鉛彈凡此勲銘百戰無須漂杵矜竒方當績著九功用藉包戈紀實云爾髙閣巍巍表藎忠弆藏俘獲類從同戢干櫜矢肆時夏奪鎧搴旗藉衆功信可傳神留百世寧稱屈指數三雄器書名例太常紀甲胄旗纛之類孰所獲者各書名其上以誌永久一善吾惟憶莫窮武成殿作紫光閣後殿因額武成名千載丹青貌五年宵旰情被天恩獨厚資衆力斯誠那更生餘望迴思幸以驚尊藏得勝靈纛於紫光閣詩以紀事有序亭鄣靖金牙威宣載斾燧烽銷洱海徳表結旌爰開髙閣以圖形并弆靈斿為守器原夫一麾臨閫外彌文不侈禡禨七宿炳壇中壯志初傳鐃鼓方過祁連而壓陣千山風鶴騰聲更驅疏厲以揮軍百部沙蟲埽跡昔也緬李程刁斗遜是森羅今焉輝褒鄂弓刀逾其英特彼龍堆邈矣詎惟銅柱齊標而虎紐纍然合與金符同譜從此電霜生色匪徒充武庫之儲還將日月承華庶永隸奉常之掌麟閣圖形例紫光大師靈纛並尊藏招摇伊古資神佑功績從今紀太常信是元戎篤忠悃肯忘羣力効疆場持盈知足懷乾貺敢復佳兵恃盛彊紫光閣寫功臣像及諸戰圖畢集讌落成爰賦六韻仍疉四章有序勲標偃伯烟銷濛汜之氛蹟炳圖形雲擁趯陂之勝時則掄偉績而系贊先教褒鄂傳神逮一善亦臚名乃屬鄒枚紀實匪詡天經地緯恰符五數之重真逾漢史唐書能覯百賢之萃且聚米狀山川阨塞壁間八陣常存而列星占旌纛飛揚磧裏參斿盡埽試按昇平王㑹詎惟萬里而遥為思宵旰軍書何幸五年式集昨者歸而飲至行觴趁上已良辰兹焉落以慶成展席繼先庚嘉宴凡在股肱心膂藉國家翊運多才應知竹帛旂常承天祖垂庥永靖維億載綏遐有象已被丹青予一人持滿彌殷長鐫金石閣就勝朝址見日下舊聞圖標昭代勲格慙虞帝羽數過漢時雲閣中圖功臣像勲績顯著者五十人朕親製題贊餘命儒臣擬為者又五十人視雲臺二十八將不啻倍蓰大造無私佑諸臣實盡勤五年勞突將此日幸休軍有覺上林表斯干液水濆落成縁戢武錫宴重去聲摛文建置惟旌績運籌匪詡勲永期紀勞勩寧為去聲賞煙雲保大天垂貺開遐予敢勤帑原出内庫督未命將軍掄武駐冬日每科武殿試例于閣下校閱騎射及諸技勇慶成臨沼濆詰戎求世徳寳訓掲鴻文恭讀備懲太宗為萬聖祖法者世宗實録中飭武晏安世大敬勒石閣中以昭訓彛伊犁征不戰五月已成勲將謂業安石誰知事幻雲驅馳常厪逺擘畫不辭勤最恨庫車轍深虞黑水軍事均見厯年詩章轉旋叨昊縡仍執竟淮濆始末親籌筆其觀勒壁文經畫西師前後所製詩文於成功端委運籌次第綜彚刻石壁間示誌實也衛拉勞前烈厄魯特舊謂之四衛拉特重華與放勲敢云成不日惟凛望如雲載先去聲傳柑宴允嘉荷㦸勤歸春舞干旅洗雨伏波軍風嬾中和樂冰酥太液濆賡歌鴛鷺侣可以共論文紫光閣曲宴外藩並回部詩以誌事值嵗外藩入覲顔新増伯克序年班四方來賀誠非易三接推恩未可刪筐篚兩廂頒等第魚龍百戲鬬斑斕西師繪壁思羣力敢曰折衝尊爼間戰圖補詠冇序西師定功於己卯越七年丙戌戰圖始成因詳詢軍營征戰形勢以及結搆丹青有需時日也夫我將士出百死一生為國宣力頼以有成而使其冺滅無聞朕豈忍為哉是以紫光閣既勒有功臣之象而此則各就血戰之地繪其攻堅斫銳斬將搴旗實蹟以旌厥勞而表厥勇爾時披露布已有成詠者即書之幀間其未經㸃筆者兹特補詠凡六事禮不云乎聴鼓鼙之聲則思將帥之臣撫是圖也有不啻若彼之感先是宵旰勤勞雖日神馳於連營列陣之間此則目擊心存竟如指揮諸將士於折衝禦侮之際而痛定之懼予惟益欽天眷於無窮凛月盈於有永遑敢自詡坐謀伐赫濯而忘兢業哉鄂壘扎拉圖之戰丙子冬將軍兆恵聞準噶爾宰桑等煽亂自濟爾哈朗移兵甫至鄂壘扎拉圖突遇達什策凌等賊衆無算因乘其不備夜出衝殺殱千餘人爾時噶爾藏多爾濟扎那噶爾布等渠酋㑹兵邀歸路連戰不退兆惠等且守且進適朕所遣圖掄楚等援兵至并力夾擊賊始解圍遁去我軍全隊迴至巴里坤以誠馭詐致相輕阿逆竄跡哈薩克勢將就縳乃以譎計緩師將軍達爾黨阿不審虚實按兵待獻遂失事㑹而厄魯特宰桑之從征者既心輕將帥所為因復同謀變亂哈薩纔廻譎變生戊巳駐營攜少卒時兆惠為副將軍駐兵濟爾哈朗所攜不過偏師鎮守伊犂等處而已猝值叛賊坌集因以少擊衆全軍而出螳螂怒臂阻前程直何畏曲中宵出一可當千衆賊驚竟得全師逢接騎整軍後入大功成庫隴癸之戰庫隴癸附近伊犂我師三入𠞰賊時叛黨昂克圖塔爾巴等四宰桑據險藏匿兆惠所率將士纔八十餘人夜進山口鏖戰時曉霧迷漫布庫圖特克爾得克二宰桑脱身逃去其餘悉被斬獲時戊寅三月十六日也威弧有事射天狼三穴窮追那許藏挺險賊人雖鼠竄擣虚士氣正鷹揚五更直襲屯營寨兩騎先收牧馬羊兆惠於奪險攻賊時分遣侍衛扎延保投誠厄魯特達什車楞二人收其牧羣以故賊不能脱以少擊多張撻伐將軍誠勇著旂常通古思魯克之戰霍集占兄弟負恩各據城反將軍兆惠既定庫車烏什等遂直抵葉爾羌薄城南賊衆馬步二萬餘兆惠所領兵不過三千率以渡黑水河者纔五百騎迎敵血戰適喀什噶爾賊黨後至我軍遂結營固守經冬渉春己夘正月援兵繼進克敵奏功故繪通古思魯克之戰以紀攻伐葉爾羌回城初交遇險之始事云兩回酋昔困莎車得地忘恩應去聲剪除赤翟蜂屯助白翟僑如狼顧庇榮如渡河騎卒五百耳背郭賊將二萬餘守壘竟同援兵進時副將軍富徳奉命領兵在道因命速進赴援而㕘贊大臣阿里衮所辦巴里坤馬亦刻期至軍營遂大敗賊人兆惠等全軍已出然計我師掘壕守險已及百日矣忠誠迴憶益欷歔霍斯庫魯克之戰逆酋因葉爾羌喀什噶爾既破失其巢窟悉衆逃竄㕘贊大臣公明瑞於閏六月十五日選兵邀截偵知兩酋暫息塞爾古勒是地為去拔達克山安集延兩處之要路時二酋欲赴拔達克山而賊之衆伯克悉力窮追至霍斯庫魯克賊避其輜重婦子以六千人登山成列我軍先至者九百騎即奮勇仰攻轉戰三時斬馘數百俘其男婦駝馬賊遂轉向拔達克山一路而逃明瑞仍督兵追躡後㑹副將軍富徳等軍有阿爾楚爾伊西洱庫爾淖爾等處之戰回城既定進追兇雙耳山前竄跡逢回語霍斯庫魯克者華言雙耳也賊已六千横據嶺兵纔九百仰攻峯遮回安集延逃路直躡拔達平聲山去踪將卒同心奮敵愾千秋國史勒勲庸阿爾楚爾之戰二酋於霍斯庫魯克為明瑞所創懼我師勇鋭難當設伏於阿爾楚爾兩山峯頂以待我師時富徳明瑞等軍皆合諸大臣集議衆寡相殊彼又先據險要非整旅結陣難出萬全因以健鋭營火器當其中堅更張兩翼設竒兵統計以三千人之衆克敵致果所傷者一卒殺賊至千餘人陣斬其大伯克數十始披靡逃竄急追躡之遂及之於伊西洱庫爾淖爾霍斯庫魯遁餘魂合旅窮追至水源蕃部勤王随契苾時布魯特皆随軍為嚮道旗軍勵志定堅昆蚩尤所恃依重險風后宛同握八門健鋭營兵精火器雪山倐作陸渾原伊西洱庫爾淖爾之戰我師乘勝追賊七月十一日抵伊西洱庫爾賊復據山阻水此地山髙石危淖爾縁邊僅容單騎大和卓木波羅泥都先據山嶺為往拔達克山之計小和卓木霍集占以衆賊阻絶淖爾隘口與我對敵我兵分布攻擊竪纛招降衆賊跳崖丐命阻水者蹂躙淤泥中霍集占止之不能遂奪馬繞山㑹其兄遁往拔達克山我軍直壓其境索取賊魁自是之後兵不血刄矣三交三勝武貔雄霍斯庫魯克阿爾楚爾及此凡三戰皆以少勝衆黠鼠徒嗟五技窮一綫㳂溪進魚貫千尋列嶂突蠶叢遊魂釡底雖潛脱馳檄天邊竟定功蕆事追思臨事慎持盈永以勵深衷欽定皇輿西域圖志卷首三欽定四庫全書欽定皇輿西域圖志卷首四目録天章四紫光閣五十功臣像贊有序附奉勅恭撰紫光閣次五十功臣像贊并跋欽定皇輿西域圖志卷首四目録欽定四庫全書欽定皇輿西域圖志卷首四天章四紫光閣五十功臣像贊有序西師之役頼天佑乘時運資衆力拮挶擘畫幸底厥績固非予一人所敢逆料敢期必也然稍可以謝衆論愜深衷者無他則以賞罰信而應機速耳語曰日中必熭操刀必割言應機宜速也書曰罪疑惟輕功疑惟重言賞罰宜信也機之來發於無窮之源而應以萬變之極蓋難言之若夫信賞罰似非難事而亦有所難者則以不能因物付物有所容心於其間耳且罪疑而後從輕若不疑而亦從輕則偷生者何懼焉功不疑而從重其理固當然渉疑而屢從重則冐賞者生心而真功反有向隅者矣是知疑不可也夫不疑而功惟真功賞斯重焉罪惟真罪罰斯必焉則捨命灰軀冒矢石投鋒鏑之倫孰不勸以懲乎兹者事定功成寫諸功臣像於紫光閣朕親御丹鉛各系以贊不過譽不尚藻惟就諸臣實事録之並闡其義如右雲臺二十有八凌煙閣二十有四而此五十人者則以國家中外一統宣力者衆然此猶舉其尤赫者若夫斬將搴旗建一績致一命者亦不忍其泯滅無聞將亦圖其形而命儒臣綴辭焉大學士一等忠勇公傅恒世胄元臣與國休戚早年金川亦建殊績定策西師惟汝予同酇侯不戰宜居首功定邊將軍一等武毅謀勇公户部尚書兆惠濟爾哈朗喀喇烏蘇兩番襲迫均保無虞以智濟險以誠感衆卓哉崇勲闢我提封原定北將軍一等誠勇公兵部尚書班第元戎率師平定伊犁而何阿逆叛亂乘危變出不期投軀西漠故里櫬歸痛哉酹酌原靖逆將軍三等義烈公工部尚書納穆扎爾我懐賢勞命將往代正值黑水猖獗鼠輩以二百衆陷萬賊中因縁狥節勇濟以忠定邊右副將軍親王品級超勇郡王策布登扎布拍馬彎弓無敵所向不曽讀書如古名將和洛霍斯少勝衆彼超勇親王額駙之子定邊右副將軍一等靖逺誠勇侯理藩院尚書富徳古云福將信有其言所遇均吉勇冠軍門不寧一勇兼善於謀吉林拔萃特賜封侯原定逺右副將軍二等超勇伯内大臣薩拉爾彼中宰桑識時早歸副帥以往克贊戎機拔身戰出不忘本朝云胡不死責備則澆原大學士三等忠勤伯陜甘總督黄廷桂外任封疆内司綸綍俾理儲胥經權弗絀殫誠盡智事恊予心未同凱宴痛惜曷任參贊大臣和碩親王固倫額駙色布騰巴爾珠爾惟科爾沁世連婣戚魯舘承訓王庭宣力㕘贊軍務賊營夜侵中創弗退嘉乃忠心㕘贊大臣固山貝子扎拉豐阿準夷之叛奉命在道賊遮中途屢戰不撓其志既篤其材亦英蓋自髫年教養禁廷㕘贊大臣扎薩克多羅郡王羅卜藏多爾濟渭陽所出扎薩穎材命帥本部宣力龍堆及愛隆阿單騎見虜降哈薩克厥功甚鉅參贊大臣多羅郡王額敏和卓土魯番族早年歸正命贊軍務以識回性知無不言言無不宜其心匪石不可轉移㕘贊大臣工部尚書舒赫徳屢受重寄亦屢左遷厲厥意懦䇿厥材賢白衣白水聞黑水信安衆進援爵秩重晉參贊大臣一等果毅公兵部尚書阿里衮富徳入援次呼爾璊䟎行戈壁馬不進焉以馬濟軍敵行夜襲同事建績曰鄂博什原㕘贊大臣三等襄勤伯總督鄂容安世臣知書料善論兵惜弗通語遂弗燭情變起倉卒力戰命畢用違其材實予之失參贊大臣一等承恩毅勇公户部侍郎副都統明瑞椒室懿親年少志雄謂可造就俾學從戎獨出獨入既忠且壯屢立宏勲愜予所望參贊大臣工部侍郎副都統阿桂阿克敦子性頗捷敏力請從戎宜哉惟允身不勝衣心可干城楚材繼出為國之楨原參贊大臣三等子户部侍郎副都統三泰率二百人共詣軍營臨敵而退寧謂忠誠如早聞信何致殞身不前不後失二賢臣原參贊大臣前鋒統領騎都尉又一雲騎尉鄂安其兄徇節其弟忍使欲報兄讎固請不已黑水之挫復以捐身超雪前罪賞延後昆領隊大臣内大臣博爾奔察矍鑠請行索倫巨擘挽五石弓尚能殺賊如鷙之擊不留飛鳥馬援來歸殊恩榮老原領隊大臣安西提督總兵官豆斌宿將行間久矣宣力所董緑營遵其律則隊中獨喪是有命焉裹創慰衆益厪哀憐原領隊大臣甘肅提督總兵官髙天喜爪牙之將用不拘資感予特達効命何辭百戰百進義弗旋踵怒則面赤是謂血勇領隊大臣副都統塔什巴圖魯端濟布將軍黑水先衆徑渡固營待軍實端濟布衆寡稍挫倉卒周防奪回人馬勇且謀長領隊大臣䕶軍統領愛隆阿將門傑種拍張撫髀受將軍檄力戰全歸整師再進賈勇陷堅弟巴靈阿盡節軀捐領隊大臣前鋒統領墨爾根巴圖魯瑪瑺侍衛從征竒功屢立雖賊萬衆單騎直入陷陣馬仆距躍彎弓賊人咋舌稱天上雄領隊大臣内大臣副都統巴圖魯濟爾噶爾都爾伯特部中傑驍嘉其心直授職本朝凡與交戰義弗返顧師濟和闐不孤恩遇散秩大臣穆爾徳木圖巴圖魯齊凌扎布旗籍䝉古偏校從軍殺賊則奮鶻入鵶羣與噶布舒分守和闐保衆集事且有謀焉散秩大臣哈坦巴圖魯噶布舒躍馬抨弧先鋒鏖陣入俄羅斯得阿逆信和闐既定論功策勲衣錦歸籍散秩大臣副都統噶畢雅圖巴圖魯額爾登額軍門統事諸務勤宣亦能力戰突將無前入拔達山索逆回馘曉諭殊方是其偉績郡王霍集斯奉元戎檄擒達瓦齊後稍觀望旋迎我師同大軍進被圍黑水回部望族居之京邸貝子鄂對平伊犁時歸順勤王回部傑出其心允良往諭和闐被圍三月共噶布舒全守卓越内大臣鄂齊爾前無堅對後無返思持矟一呼千賊披靡揚揚英氣洸洸偉身與薩拉爾蓋同部人散秩大臣喀喇巴圖魯阿玉錫於格登山賊據險守率廿四人間道襲後諸賊大潰爰以成功本厄魯特降順効忠原散秩大臣騎都尉達什策凌衛拉從征喑啞咤叱額駙受創衛䕶以出用賜殊恩用益奮感畢命回城每懷惻慘副都統鄂博什索倫營總乙亥出師老而益壯頗識戎機厄魯回部胥聞其名聳身馬上如擊兎鷹副都統圖布巴圖魯温布生不知懼戰不知退亦不受傷銅額鐵背弓可擔水箭如鍫鏵温侯名布是耶非耶副都統克特爾克巴圖魯由屯本射生手狼不暇走以之殺賊如探囊取竒功屢建亦因閲厯世職崇階酬其勞勣原副都統騎都尉又一雲騎尉三格渾齊全遯疎防降謫從軍贖罪每戰必力黑水殞命豁罪論功圖象紫光表忠無窮原頭等侍衛舒布圖鎧巴圖魯竒徹布包沁之叛千賊一身賜巴圖魯昉乎斯人後復屢戰喪哈薩克始終於是曷勝悼惜頭等侍衛博克巴圖魯老格哈薩錫拉呌詉稱亂趨羊適過以計解難後復從軍屢戰屢進單馬衝突獅子奮迅頭等侍衛墨爾根巴圖魯達克塔納庫車圍攻命守要害偵賊來援周防以待賊郤乃前賊前乃郤引至大隊是鞣是膊頭等侍衛薩穆坦厄魯刼運搆釁互戕識時拔出致力疆場首被掄選往拔達山譯語曉譬共索馘還原二等侍衛固濟爾巴圖魯雲騎尉璊綽爾圖捉生以出被回所遮衆寡不敵矢盡堪嗟罵賊以死雖死猶生時共事者達什策凌二等侍衛哈朗圭巴圖魯塔瑪鼐聞戰則喜無生有死五易馬進終弗却視身不及膽心則乏謀用以衝陣勝五百牛原二等侍衛哈布台巴圖魯富錫爾三巴圖魯於中之一要遮色楞忽堕其術不及彎弓白刃揮霍猶斬數人之死弗卻二等侍衛額爾克巴圖魯海蘭察烈風掃枯迅其奚難亦頼衆傑摧敵攻堅於塔巴台射巴雅爾是其偉績勇鮮倫比原二等侍衛雲騎尉富紹黑水築柵未畢賊侵蜂屯蟻雜攘攘林林持將軍令意氣昂藏來往慰衆銃殞堪傷三等侍衛賽音博勒克巴圖魯扎竒圖狗盜雞鳴孟嘗不棄竊馬何害用人之際間道達檄首遴斯人雙雄比肩衝出萬軍三等侍衛什倫哈什哈巴圖魯阿爾丹察騎二駿馬縱兩神鶻回如瓦雀伏不敢發共扎竒圖左旋右抽卒致軍信効力獨優三等侍衛卓里克圖巴圖魯五十保軍檄再發更掄五英馳驛餘月迅至北京捨身報國不可數算舉其尤者圖形作贊附奉勅恭撰紫光閣次五十功臣像贊并跋㕘贊大臣一等誠勇公都統巴禄準部回城咸慴將種慟父殞賊殺賊逾勇兩世濟美同上凌烟古稱定逺其何有焉㕘贊大臣杭州將軍福禄戰呼爾璊險艱戮力建駐和闐亦資部勒出勷贊畫入晉庸封移鎮武林旌節雍容原領隊大臣寧夏將軍一等子和起整旅追亡計擒巴雅肘腋釁成曰維呢嗎一翎歸報嚄唶如生罪人斯得刳祭於塋㕘贊大臣喀爾喀扎薩克和碩親王桑寨多爾濟藩部名王英姿卓鑠繕邊助討匪渝其恪濛瀛冠帶檄調不煩歸爾屏翰以鑰北門㕘贊大臣喀爾喀扎薩克多羅郡王車木楚克扎布朔方蕃衛忠慤夙敦收烏梁海甌脱氣吞更躙叛魁青滚雜卜五等既崇三遷彌速原領隊大臣都統滿福言率新附渠酋是擒而何汙裸鼠首狼心遇伏不撓穿齦賊輩睠彼陣雲精英豈昧領隊大臣甘州提督閆相師薄庫車門石著於額屹不為動觀者舌咋葉羌之役虚擣亢批雄姿偉幹足鎮關西領隊大臣哈密郡王品級貝勒玉素富筠沖望族作蕃伊昔以通回情軍諮是擇六城既納二豎焉逃其鎮烏什吠不夜嘷頭等侍衛副都統西朗阿巴圖魯查拉豐阿手格猛虎曽不色變矧驅羣羊窮回敢面昔巴圖魯曰丁將軍孫西朗阿克紹前聞領隊大臣副都統瑚爾起突擒渾齊其氣如虹及降勃律烏幕占風圍解和闐戰鏖大食麾蝥而登威著西域原領隊大臣副都統阿敏道逆回反噬狂同䝟狗往諭變生恥汚賊手裂眦唾詈止水明操阿克蘇河猶聞怒濤副都統墨爾根巴圖魯伍岱轉戰朔庭鎧盡蟣蝨射昂可圖組縻尺一拔㦸成隊績著回中摧堅入險積健為雄副都統觀音保濟爾哈朗力固噶蘭喀喇烏蘇襲迫復完衆謂神兵出兩竒厄論據守功兵一賊百領隊大臣肅州鎮總兵官五福礮車失衛謫官示懲輜重克全復鎮旌能功於過觀瑕不瑜匿况同苦甘允率爾職回部公和闐阿竒木伯克阿什黙特烏什右姓負弩最先偕我虎臣往收和闐風鶴之時孤城兀守嘉此忠勤俾勸爾後回部公喀什噶爾阿竒木伯克噶岱黙特身本回族願効前驅軍門再欵道梗勿渝出入諸艱始終一節列爵專城以旌英傑前鋒㕘領特古爾得爾巴圖魯艮音太焚箐轟碉金川著績厯戰西陲每當鋒鏑凖夷既喙回部斯瞠所嚮披靡健鋭之英署㕘領額爾克巴圖魯巴岱搤博羅特賊魁莫逋迨捍和闐獨入其郛墜馬驍騰裹搶草草猶左右射應絃輒倒協領布彦圖巴圖魯布爾哈掉鞅伊犁彎弧洱海入陣拍張不煩厲乃踰溝拔寨敚礮傾臺肯辜纓組捦生始迴察哈爾總管蘇朱克圖巴圖魯納蘭圖隨征絶漠戰則請前旋上和門計級絫然手奪賊鎗還以刺賊渾齊之追厥功尤特原領隊大臣察哈爾總管坤都爾巴圖魯巴寧阿見賊輒怒如刺必拔戰布拉齊矢石交戞奮身揮突竟殞賊中既臠叛首祭以報忠索倫總管齊達克齊巴圖魯阿爾哈爾沁背城阻水兼臨斷橋濡泥入坎神力獨超歴事戎行金創常滿遂由伍卒洊階總管索倫總管哈坦巴圖魯薩壘重圍趣援銜枚聴令閲五日夜衝鋒彌勁不寧惟是軍伐夙優招三戎部蹙兩叛酋原索倫總管賽沙爾泰巴圖魯扎爾善黑水一彴躍馬横戈如入無人格殺獨多詎云力盡結纓氣倍烏孫大宛屢試功在索倫佐領克圖爾克巴圖魯諾璊察追固爾板戰哈薩克手與賊持縱銜弛勒屢躓屢起卒俘以還征袍不解創血常殷頭等侍衛什爾瑪海巴圖魯徳爾森保桓桓虎賁擢儁龍江回湟濟師鞚飛駿駹屢蹴逆渠誓作葅醢實副嘉名什爾瑪海頭等侍衛塔蘇爾海巴圖魯占頗圖修羅障日恃其有手一矢洞之血及於肘射巴雅爾能事不虚問所挽弓十四力餘頭等侍衛固勇巴圖魯伊薩穆援兵雖來畫塹相望孰騎而呼為告無恙維巴圖魯偕往趣師其衝賊隊如分水犀三等侍衛克什克巴圖魯伍克什爾圖預軍門選聨鑣致書纏頭㡬萬翩如入虚達阿克蘓趼將及膝鉛彈在背至今未出三等侍衛克爾車赫巴圖魯沙津察誰從間道同緘蠟丸瞋目大呌勢無萬難矢石之交得路一綫克爾車赫洵稱膽練三等侍衛坤都爾巴圖魯扎敦察超距長才且戰且走非突圍者乃斬關手待我具五壯哉此行奚啻同袍蓋心膽并頭等侍衛丹巴巴圖魯莽喀察控弦疆場横槊沙磧還經黑水中流投策蠭屯蟻聚跳盪隻身捉生燒寨勇著索倫頭等侍衛布哈巴圖魯齊里克齊行不旋顧戰不待援既征朔漠還使西宛萬里折衝千夫辟易錫號布哈實惟名覈頭等侍衛卓里克圖巴圖魯額訥慎一戰伊犁再呼爾璊􅑷身入賊賊營夜翻被刺者三搶痕斜竪牌以紀功勇猶可賈原頭等侍衛瑚集圖以五十人斷河源路七千餘衆莫敢泅渡既彰嘉績還送急徵遇賊捐軀悼惜曷勝原二等侍衛克丑巴圖魯寧古禮羽林材武奮跡巖疆單騎冞入捷若探囊花門堞摧黑水礮奪裹革而還生氣咄咄原三等侍衛伊徳爾巴圖魯奎瑪岱枕戈幕庭有進無退更隨大帥馳壁往代長虵封豕首塗告偵死綏倉猝猶揮短兵原三等侍衛特通額絶徼折衝志存幹蠱所向無前不待棡鼓渡河遘險矢盡於房罵賊以殉嚼齒勿忘原藍翎侍衛莫寧察略地湟中嘯聚云火霹靂弦鳴箙無餘笴一間老屋固壘坐焚崑岡貞玉氣尚干雲二等侍衛丹巴巴圖魯那木查爾于思棄甲誰當一隊徑率百人攻其腹背手取回礮回膽盡寒鐵繡糢糊横捎左鞍二等侍衛特古思巴圖魯塔尼布唾手縛賊賊莫能奪引身救人人無不脱西拔達山北俄羅斯獨來獨往翳特古思二等侍衛哈什哈巴圖魯瑪格徃來哈薩訖於諸回長身善戰辰韓異才肉薄葉羌築堡自繕凡三閲月獨當一面原二等侍衛哈什哈巴圖魯達爾漢濟爾哈朗如蘖生苞提㡬歩卒突出前茅諭賊捐身驚呼健者舊隸名蕃達什達瓦三等侍衛卓克托巴圖魯恩特初從參贊追奔漠北復從將軍蹴圍西極路逾萬里時閲百旬洗甲蒲昌餘瘢滿身三等侍衛西爾庫濟巴圖魯伊達木扎布佽飛之杰凌厲朔陲諭降别部介馬而馳援呼爾璊躡伊西洱彼竭我盈么䯢魄褫三等侍衛庫爾察巴圖魯茂漢北路西川舊勞弗替載進祁連新庸孰逮阿爾泰嶺瑪那斯河訥可之獲其功實多三等侍衛舒都拉呼巴圖魯西爾庫爾龍武健士袴褶從戎戰經十數甲不一衷古亦有言殺敵致果聞桴躍鞍金瘡未裹原三等侍衛拜達爾别將百人往探回窟遇賊輒殲如手捫蝨鏖兩晝夜入圍出圍英姿颯爽仗節一揮原藍翎侍衛舒倫巴圖魯喀拉偕拜達爾結隊前鋒射生被遮援絶數重焚柵蹈火火烈具舉望者􅌓眙謂目光炬藍翎侍衛固濟爾巴圖魯伊登古躡巴雅爾戰不避艱追霍集占抵拔達山顯號克膺宜固濟爾用厲顔行成勞是紀臣等伏覩我皇上懋膺天貺丕纘前猷炳睿哲於先㡬攄神謀於獨斷自相臣將臣下逮什伍兜鍪之士靡不禀承方略赴㑹投時是以嵗未五周蕩平準噶爾訖諸回部豐庸偉伐伊古罕臻暨乎告廟策勲上親第其著績尤赫者五十人圖形紫光閣御製序贊系之重示褒異其在事宣勤効命有成勞堪紀者雖功以次及而數亦如之則勅臣等臚名摭實續為之贊臣等間考漢之雲臺唐之凌煙閣其事羶薌志乘然所稱建竪非常足副鉅典者指不多屈其他率參以侍從勛階際㑹成功之侣裁取備數數又不越二十餘人而止以視今日之銘竹帛繪丹青嶽嶽洸洸焜燿後先者詎可同年語哉皇上建伊古未有之大業垂伊古未有之至文傳信所資義無溢美臣等纂言載筆敢有侈矜顧惟幕府之捷書兵曹之功牒章章具在設以五十人中分舉一二置古圖畫間不知如何鋪張藻繢以為英竒卓越擅一代之閎規矣夫功以次及者如是况其著績尤赫者哉况其雄姿輩出奄有百人者哉㫖哉聖訓有云中外一統宣力者衆臣等跽誦繹思竊謂由國運之隆始致人才之盛而得人才之盛益以翊國運之隆嗣時億萬斯年顯融懿爍熙鴻號於無疆信有徵也臣等輇陋下材叨塵樞禁茲獲奉詔颺言綴名簡末無任榮幸無任惶悚臣劉統勲臣劉綸臣于敏中恭跋欽定皇輿西域圗志巻首四御製題輿地圖括地多年仰聖猷輿地圖自康熙年間不能皇祖命人乘傳詣各部詳詢精繪而後定或有身履其地者必周諮博訪而載之既成鎸以銅版垂諸永久覈真今復逮渠搜上年平定凖噶爾迤西諸部悉入版章因命都御史何國宗率西洋人由西北兩路分道至各鄂托克測量星度占侯氣節詳詢其山川險易道里逺近繪圖一如舊制閎誇詎類參軍註阸塞應同主史収益切覲光周誥凜匪闗鑿空上聲漢臣求宇安嵗美吾恒願望蜀寧當意更留御製再題輿地圖叠前韻敢云擴宇蕆前猷偃伯從兹罷勦搜厄魯馬牛無一牧筠冲屯堡並全収乾隆乙亥平定凖噶爾各部既命何國宗等分道測量載入輿圖己卯諸囘部悉𨽻版籍復遣明安圖等前往按地以次釐定上占辰朔下列職方備繪前圖永垂徴信本朝文軌期同奉昧谷寒暄重去聲細求無外皇清王道坦披圖奕葉慎貽留
