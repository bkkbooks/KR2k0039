body:
  text: 御製皇輿西域圖志序語云耕當問僕織當問婢志廣輿者不稽之厯代建置沿革將無從數典而志西域則有不能盡稽之厯代者實以幅員所限言語不通雖漢唐盛時亦頗能威行天山迤南建官設都而天山迤北本不能至也即有一二羈縻之國然叛服不常征調弗應又安能履其地而疆索之哉且漢唐之程督異域者仍漢唐人而已其與凖噶爾回部人語奚啻粤問而燕答則其所記魯魚亥豕之紛不待言而可知兹者叨天佑藉羣力湊時㑹幸成是役準噶爾回部之人皆在廷執事而國語切音譯外藩語又甚便且易我諸臣馳驅往來其間目覩身厯非若耳聞口傳者比俾司校勘而正其訛傳其真較僕婢耕織之問為尤詳且厄魯特語及回語朕亦因暇而習焉時御丹槧為之改正是西域志之書必應及是時成之用開厯代之羣疑垂千秋之信録間亦渉及諸史以存述古總計分部二十分卷五十有二繪圖系説蔚為完書若夫闢地蕆功文臣或有過頌朕所不取惟是籌耕牧計久長圖所以永乾貺奠丕基思日孜孜持盈益凜予安得有功成無事之説哉乾隆二十七年十二月初一日欽定四庫全書欽定皇輿西域圖志諭㫖乾隆二十一年二月十三日奉上諭自軍營至伊犂以抵哈薩克率漢唐來匈奴西域地其山川部落前史類多訛舛蓋外蕃本無載籍史官無所徵信又未嘗親履其地惟藉傳聞而方言口授輕重緩急間語音頓異况復時代遷移益難追考然即今留意核之如落克蘭急呼之則為落蘭當即樓蘭其聲轉耳漢書屈里計其地即今伊犂以此證之往往可通前曽以此諭鄂容安據奏既無可考盖必求之圖誌碑碣自非荒陬絶徼所可得彼時伊以軍務為急無暇分營因姑置之今已擒賊奏功劉統勲在軍營無所職掌當專辦此事現命何國宗赴伊犂一帶測量亦經面諭著傳諭劉統勲即㑹同何國宗前往所有山川地名按其疆域方隅考古騐今彚為一集諮詢覩記得自身所經厯自非沿襲故紙者可比數千年疑誤悉為是正良稱快事必當成於此時亦千載㑹也可將此傳諭知之欽此乾隆二十一年四月初九日奉上諭何國宗原係奉差前往伊犂一帶測量晷度並令繪畫地圖現在即由巴里坤一帶及額林哈必爾漢等處已儘足伊等今嵗辦理至冬間氷雪凝寒或回至巴里坤或哈宻居住俟明春草長再行前進現今厄魯特當殘敝之後人多窮困既無可交易兼恐中途攘奪伊等所賞資斧本自寛裕可即從巴里坤自行備裹乾糧從容前往劉統勲亦即㑹同何國宗一路行走遵照前㫖將所有山川地名考騐纂録進呈並傳諭劉統勲知之欽此乾隆二十六年六月十八日奉㫖劉統勲何國宗所辦西域圖志著交軍機處方畧館辦理欽此乾隆四十二年三月二十九日奉㫖西域圖志總裁著派福康安劉墉欽此乾隆四十二年六月二十八日奉㫖西域圖志總裁著派于敏中英廉錢汝誠欽此御製大宛馬識語嵗乙亥準噶爾平越明年左右部哈薩克以次内附又明年使臣入覲隨獵有詩紀事並加按定哈薩克為漢之康居又越二年哈薩克來貢馬因成是歌仍謂之大宛者以自古相傳大宛産善馬也夫西域諸國何地不産馬而大宛獨擅其名漢時人足未履其地僅聞其名阻閡䀜昩遂以為大宛所獨耳不寕惟是即我朝西極未定之前準噶爾所貢馬率謂之大宛向按大宛部落疆盛附庸者多哈薩克當是其部中之一國非臆説也史記載康居南羈事月氏東羈事匈奴則康居固他人之屬國耳張騫使月氏為匃奴所閉及亡抵大宛而大宛遂能為發導驛抵康居是康居本聴大宛役属也唐書載石國故康居小王窳匿城地漢書所謂康居小五王之一而唐顯慶中以為大宛都督府亦其一証故哈薩克以漢語言之則為康居自其服屬言之則原大宛近三十年來軍吏塗經貢使踵接汗血之馬服早獨樹之蹟寄題非如前代鑿空者比此歌與丁丑按語固相印合不得以異同致疑矣㡬暇重書是卷因識之乾隆二十七年十一月二十九日大學士一等忠勇公臣傅恒等奉勅纂輯西域圖志初稿告成謹奉表恭進者欽惟我皇上神武懋昭徳威遐被智勇超乎百代鴻貺彌臻聲教式于九圍前猷允迪二萬里狉榛之窟逺䕶風雲三千年濛汜之區新懸日月事屬生民所未有境為亘古所罕通天惟純佑我皇清帝實肇開兹西域齊文軌於流沙之外勲名早紀雲臺指山川於納日而遥疆索宜登策府原夫六師獻捷兩部歸懷戮叛誅逋則功成於回地持危治亂則策定於凖疆當狐􅓔濟惡之餘遘蠻觸紛爭之㑹慰逺人之獻欵策凌首沐衣冠假新附以前驅厄魯方深水火馬首羣攜潼酒知昂吉之偕來狼頭已折風竿卜綽羅之早定廿五騎格登之旅競傳壯士翻營六千餘濟拉之師終見名王繫組詎謂饑鷹飽颺沙陀偏少赤心應知鋌鹿狂奔羅刹能收白骨總台吉之機心素具先幾早炳宸衷雙親王之恩遇偏孤貫惡寧逃天譴是用犁其庭穴釋彼羈囚方事􅌢戈俄聞衷甲在凖逆既窮猿入檻而回酋復黠鼠跳囊方王旅之西征沙蟲掃迹更天戈之南指風鶴傳聲白山則雪窖晨翻已著搴旗勝蹟黑水則雲濤夜湧猶聞堅壁餘威集占遁而庭幕空萬馬破弟兄之膽霍斯來而都城堕一檄傾父子之心推堅而淖過伊西早見飛廉影匿服逺而山通拔達還看貳負尸僵於是威集二勲化行萬落負罪者孽由自作既落距而摧牙懷徳者誠有同歸自駢肩而接踵慶庭方於哈薩宜來宛馬驤雲嘉獻馘於坦沙旋見食刀營雪所以不煩六慰三宣之力胥靖一苞二孽之萌儗傅介之績著樓蘭不自陽關而近視班超之威行定逺無須卅載為期者也今試覽勝地於金方辨名皋于兊域闢天方之門戸信中原不盡提封鬯昧谷之聲靈知西極自占形勢四衛拉經營之地井牧重新兩和卓割據之塲耕煙相望博克達之靈峰欲削百尺盤雲穆薩爾之雪幛初開千層積玉北渚則百泉俱濬滙圖斯庫以西流南河則四派同歸經厄爾勾而東注大抵疆分鄂托沿山之鄂博星羅亦惟地接和通臨水之和屯碁布當年選佛曽集喇嘛此日談經初逢阿渾溯宗喀巴之遺教還聞梵唱于西圖稽派罕帕之流風尚騐雲雷於鮓荅試問凹睛凸鼻孰外陶甄幾同赤縣神州咸收襟帶由是頓天紘而規逺服繙古籍以鏡前模自烏孫以阻康居磧北久稱行國始焉耆而迄疏勒山南舊建名城伊犂實伊麗之流一鏡澄波可溯和闐即于闐之壤萬重琛玉偕來碑嶺巃嵸未泐裴岑之石星源咫尺疑乘博望之槎雨後耕犂曽𫝊戊校尉已校尉之説風前鼓角還聞都䕶府都督府之開九昭武角逐之區競説重闗鎖鑰十部落迴翔之地長留四鎮聲名然或列外藩而僅備羈縻誇逺畧而粗通貢獻留其侍子既鄭質之終攜結以和親究戎心之不靖泥守在四夷之説毎涉拘墟哆傳聞旁國之譚終隣鑿空幸際五週之盛烈式恢九有之方輿超周室之咸賔邁禹王之即叙漢史唐書之紀真成坐井而觀山經水注之垂宜可極陬而勘爰廼陳諸圭臬省厥風謡測量首命司天無間于星躔月朏采訪兼咨珥筆不遺于瀚海氷崖檢㸃行縢喜江山之放眼編摩載籍遂紙墨之經年爰宣史館以成書更集樞臣而訂義分一十八門之紀載備四十餘帙之搜羅雖制度加新異日猶煩裒輯而規模燦列大端約可臚陳于焉欽廟畧之淵深頌奎章之炳煥神機獨寫蕭曹莫贊髙深睿什親裁褒鄂遥承經緯藉仰窺夫宵旰謹錄冠乎縹緗由是成縮地之圖廣輪如繪列旁行之譜沿革堪稽星分參井之躔宛珠聨而璧合疆劃大䝉之宇儼罫列而區分層峰與孤嶂同標不盡䓤山雪曉巨浸與長流並載非徒蒲海霞明存葉䕶之頭銜鷺序鵷班並肅表勝兵之風烈龍韜豹畧皆竒興屯踰烏壘之墟髣髴千塍入繡則壤過龍沙之境分明萬寳成圖採方言則清濁殊音全似舌人之臚句考木筆則縱横異體略同瞽史之書名翻新曲於和聲疑傳兜勒西凉之譜備良材於日用如數波斯列市之珍殊俗紀於遐方則白帽黄衣自垂風教珍産傳於絶域則金蹏玉椀亦獻菁華至於玉帛雲蒸琛球霧集誌來庭之侯服不限梯航備奉朔之藩封遥通象譯靡不登諸鉛槧彚入編題凡義例所畢賅總部居之莫混撫卷而形同目擊何煩金馬之求開函而境已身親無事東風之騐詎比西申獨鹿僅哆名王㑹圖中還同赤水方山堪紀蹟大荒經外允備西瀛之典宜儲東觀之裁臣等時際恢紘才慚聚米陋甘英之纂述珍異空傳薄裴矩之編摩見聞失據王延徳髙昌之紀惟載程途髙居誨于闐之篇粗傳山水伏睹虞廷啟化正階前舞羽之時欣逢周索開疆當柱下操觚之㑹恍過祁連而削石紀盛於東西天竺之間如臨洱海以濡毫探竒於大小月氐之外於以琅環紀實寧惟銅柱名髙因之清晏貽庥長使金甌祚永臣等誠歡誠忭稽首頓首恭進以聞本日奉㫖書留覽欽此乾隆四十七年五月初十日大學士臣英廉遵㫖増纂西域圖志告成謹率同纂修諸臣統校畫一奉表恭進者欽惟我皇上功髙統壹徳被懷柔拓西極之山川二萬里同歸幬載照中天之日月億千年永懋經綸史編垂麟閣初成早目張而綱舉郵治軼龍沙逺屆逾月盛而日新允觀規制之大全宜効纂言於極備懿惟六師偃伯氛消月朏之區四塞恢紘化浹天山之路規勝地則和屯遞建爭開額魯新疆撫名城則伯克分羅樂順筠冲舊俗荷頻年之休養雨潤日暄慶逺服之歸依雲從星拱惟帝徳之包涵廣博不藉招徠故天心之佑助靈長頻邀寵錫爰稽凖裔留額濟勒之荒墟為遡卯秋來阿玉竒之全部指盈億兆提擕皆内面之儔程閲暑寒經涉盡不毛之地儼三策凌之獻欵並錫圭符恰四衛拉之投懐均登衽席山莊賚晏伊綿符拱極之占藩院書名卓里著邁羣之號軫流離於始至遍給餼糧謀生聚於方來長資耕牧洵㑹歸之盛軌尤胞與之鴻模若夫河過重源疆連四鎮腴壤舊傳烏什變且彌康戰圖重上紫光乆而有耀溯庚辰之飲至五年正慶恬熈㑹乙酉之滋萌六事還勤宵旰駑材覂駕僨轅嚴斧鉞之鋒健將先登壓陣煥旌旗之色廼穴庭之淨掃旋都㑹之新開一隅既倍振聲靈兩部自長貽樂利興屯比耦年年墉櫛占豐職貢成圖處處川巖効媚鼓鴻爐於九府不盡開元景徳之貽剖藴璞於六城逈超瑪瑙琉璃之萃嚴鎻鑰則玉關西望髙牙並峙雙蜺固屏藩則繡甸中分列堞爭環百雉靖虎旅戈鋋之氣城頭畫角初開革烏孫水草之遺磧尾封疆競表郛郭旁連蒲海不限禆瀛村墟近枕沙陀都成緊望府州縣於焉肇建非同僑置伊西守牧令長此相維不是羈縻都䕶爰藉武成而文並耀斯當養備而教以興矗美富之宫墻同曕數仞布雍容之几席並肄三餘董以師儒逈超木筆旁行之舊遴其俊秀喜遘青氈坐擁之初陋髙昌之置學官粗識孝經論語嗤吐蕃之遣子弟空遊璧水橋門占鴻漸而願切升階歌鹿鳴而恩邀馳驛乍文明之大啟真荒徼所未逢由是博采前聞旁搜古蹟溯烏林之世裔緒不墜於脱歡稽青吉之流風派總沿夫噶木時移炎漢永和之石初完代隔李唐金滿之碑半泐梵竺之鐵章依舊得自沈沙折㦸之餘龍泉之瓷盌長留來從小雨扶犁之候愛翾飛於鷟鸑瑞應髙岡美移植於葡萄榮滋上苑獨樹傳由哈薩猶留廣蔭於槎耏精鏤致自痕都競識良工於喀嗎都因久道而物華倍顯並際昌期而聖藻頻邀加以闡謬訂訛發凡起例既譯音之務確亦考義之維精陽關非巴噶遜之遺共識嘉名難附于闐為鄂等答之舛羣知佛教多誣辨星躔於九服之餘悟分野難該井鬼探宿海於重源之㑹信導河必始崑崙敬秉訓於丹毫一字都懸繩臬勉殫能於汗簡千秋長備規程蔚然東觀鴻編偉矣西濛盛典臣等心欽九伐材愧三長當奏勲虎帳之初業琅函之有秩際錫福鴻圖之久宜柱筆之加詳新猷則遍効編摹並包絡夫蔥山洱海古籍則勤思鉤貫畧權輿於班史酈經前分卷以染芸毫時荷楓宸之鑒今彚函而呈玉案允増策府之華五朞偕方畧之編同登鉛槧六體嫓同文之志並煥縹緗頌居馭于執樞早逺軼二千餘年之聲教繪髙深於聚米不徒傳三十六國之規模從知啟㝢八紘遍日出入之區為疆索定卜鞏基億載貽海内外之澤以鴻滂矣臣等無任踴躍懽慕之至謹奉表恭進以聞本日奉㫖知道了著交武英殿刋刻并寫入四庫全書欽此凡例十六則一王師先定凖夷繼平回部五年之間西域全地悉歸版圖我皇上睿畧髙深神謨邃宻幾餘揮翰開示端倪地利兵機包羅融貫今編輯圖志恭稽御製詩文之統論西事全局者敬謹彚録卷首其因地紀事即物抒懐之篇分載各卷聖藻鴻章經緯天地遐陬僻壤並沐光華自古紀地之書所未有也一是編恭録天章為卷首四帙餘自圖考以下分門依類次第編纂得圖考三卷列表二卷晷度二卷疆域十二卷山四卷水五卷官制二卷兵防一卷屯政二卷貢賦一卷錢法一卷學校一卷封爵二卷風俗一卷音樂一卷服物二卷土産一卷藩屬三卷雜録二卷門凡二十卷凢四十有八至户口為休養之騐取附屯政臺站亦軍郵之藉並載兵防各以類從務歸體要一山川方位逺近形勢匪圖弗顯圖舉其形志詳其事舊例類然兹自疆域山水以暨藩屬凡繪總圖分圖得二十一附以厯代西域十二圖共得三十三圖各綴論説特為全書提綱一列表始自兩漢訖於元明遵一統志例也周秦以前有可考證者分見志中表不贅列漢唐諸國通名内地搜訂易於賅備五代以降聲教日淺史傳紀載源流不詳兹為彚採古書取足徵信者參互貫串畢登於帙間有無憑考索之處則慎以傳疑未敢强生附㑹一自嘉峪關以西安西州哈宻鎮西府乆隸版籍惟是西域蕩平之後改設州縣移駐提鎮經制攸殊且為新疆門户是編託始於此所以備西域之大全也一西域天文晷度古者言天家所弗詳史傳載有諸國相距里數亦未云的實即今星使往來由人跡起數非必直徑也惟測晷影定北極髙度距京師定偏西度斯為凖確兹編所載髙偏度皆命使遄往隨處測量髙下逺近畧無爽漏爰以都㑹為綱附推四境道路原野概從莭畧至分野之説空虚揣測依據為難故不贅及一疆域畧分四路凡十二卷出嘉峪關自東而西厯叙新設之安西州玉門敦煌二縣為一卷屬安西南路北自哈宻抵鎮西府為一卷叙凖噶爾部烏魯木齊東境新設之廸化州為一卷屬安西北路叙庫爾喀喇烏蘓塔爾巴噶台諸路為一卷伊犁東路為一卷伊犁西路為一卷屬天山北路叙回部之闢展屬為一巻哈喇沙爾庫車沙雅爾屬為一卷賽喇木拜阿克蘇屬為一卷烏什喀什噶爾屬為一卷葉爾羌屬為一卷和闐屬為一卷屬天山南路系巻以路巻有繁簡區地以卷地有分合要取疆域分明篇帙相稱用便覽觀一版泉涿鹿師以地稱亦地因功顯土爾畨以東久經服屬平定伊犁時壺漿載道未動戈鋋迨後逆酋負固敢抗顔行落距摧牙應時撲滅允當隨地紀載為簡冊光若夫考戰功之大備廟謨神武徹始徹終備載平定凖噶爾方畧兹不多及一西域髙山長流大者延折數千里各有脉絡未宜分裂以隸諸路别志山水二門俾得審求根脉考證源委流峙大觀於斯倍顯一志以述事務求前後備登首尾畢貫而取義攸屬不妨互有折衷西域於兩漢之代通絶不常李唐遥設州府不過空號羈縻自入皇朝版籍創建州縣肇興學校制度規為比隆中土而開屯田以足邊儲詳軍政以固牧圉諸部歸誠後始膺圭組之榮是以學校屯田兵防封爵諸門獨詳王制風俗音樂服物土産苐傳舊俗取備職方其官制貢賦錢法舊有設施而至治維新復經釐定者則首垂憲典而附存舊制於後斟酌義例雜而不越總以紀實為歸一凖部回部山川地名自昔流傳各有音義不為審定指歸輾轉相沿本真盡失兹悉詳加體認務從本義以取正音與西域同文志相為表裏至以漢字對音本無意義同音之字酌歸畫一或間用兩合三合法取兩三字合讀急讀成音總求切合本㫖庻免承訛之患一考驗古蹟備一方掌故志沿革者所有事也雖塞外無史書碑碣山川異稱城郭非故而於形勢音義間求之往往有合編中徧稽正史旁羅羣籍擇其尤雅凡可考據者引述辯證不厭其詳徵信存疑兼為區析並加按字别之所引原文有與本地本事未為毗切者量加節錄有其地兩涉者彼此互引若于史傳脱逸鉤索無從則姑置闕如以昭慎重一凡慕義來歸獻琛班朔之國境有毗連例得備載諸部山川晷度風俗物産之概胥歸卷内無庸分見各門其圖表體例與各卷文字判不相入仍歸本門以清章蔀一城池為官守之責廟宇亦風教之徵地理之書類多排纂準部向無城郭邇年次第建置至廟宇則天山南北遺跡僅存並登疆域一門不立專巻崇簡要也軼事零文統歸雜錄廣見聞以資考證也自設學造士後春秋選雋至教漸摩禮樂絃歌風同道一藝文人物佇俟續登一在昔志西域者文人務詭華詞釋氏尤渉荒渺揆諸事實多不足徵厯代正史所記已經史官裁擇稍可據依然爾時境猶割據地未身親襲故沿訛自所不免今中外一家星軺使節如履康莊如行内地臣等得之目擊訪之土人以及軍營之奏章地方大吏之入告靡不搜採故是編所錄的確周詳語歸質實一是書於乾隆二十一年丙子春原任大學士劉統勲初奉諭㫖纂輯後歸方畧館辦理于壬午冬初稿告成邇日新疆規度日詳隨事増輯進御仰荷睿裁欽定蔚為完書夫倚弓刀于褒鄂既集千古未集之勲授筆札于鄒枚宜傳千古不傳之烈即臣等承命編摩不勝撫卷而欣忭者也總目史部十一地理類三都