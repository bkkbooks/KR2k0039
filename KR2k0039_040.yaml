  text: 音樂準噶爾部樂器樂譜回部樂器樂譜樂伎附欽定皇輿西域圗志卷四十目録欽定四庫全書欽定皇輿西域圖志卷四十目録音樂準噶爾部樂器樂譜回部樂器樂譜樂伎附欽定皇輿西域圗志卷四十目録欽定四庫全書欽定皇輿西域圖志卷四十音樂準噶爾部樂器雅托噶即筝也通體以桐木為之長四尺七寸三分八釐五毫額廣七寸二分九釐尾廣六寸四分八釐前梁內際至額三寸六分四釐五毫後梁內際至尾七寸二分九釐前後梁之髙廣俱四分三釐七毫梁內絃長三尺六寸四分五釐前額中髙三寸七分八釐九毫中厚二寸九分八釐八毫足髙八分邊髙二寸六分二釐四毫邊厚一寸八分二釐二毫後尾中髙三寸五分七釐二毫中厚二寸五分五釐一毫足髙一寸零二釐六毫邊髙二寸六分九釐七毫邊厚一寸六分七釐六毫前梁內際邊髙二寸八分四釐三毫後梁內際邉髙四寸五分一釐九毫邊厚俱一寸六分七釐六毫與尾邊同額邊雲牙長四寸三分七釐四毫尾邊雲牙長倍之首尾兩端雲牙與濶等底二孔前孔四瓣徑二寸九分一釐六毫後孔上圓下平長三寸六分四釐五毫徑二寸一分八釐七毫下濶與前孔徑等前孔上周距首牙內際五寸一分零三毫後孔下周距尾牙內際一寸四分五釐八毫施絃十四馬亦十四或六絃皆以絲為之伊竒里呼爾即胡琴也以木為槽面冒以革槽徑三寸八分四釐厚二寸一分六釐柄亦以木為之通長二尺七寸八分四釐曲首長五寸五分六釐八毫柄端木本長二寸八分八釐穿直孔以施絃扣槽面正中設柱以承絃曲首下際安山口開孔通後槽以設絃軸槽長二寸零二釐濶得長十之一軸長三寸零三釐施絃二自山口至絃柱長二尺零三分五釐二毫以馬尾為之别以木為弓以馬尾為弓絃以弓絃軋雙絃以取聲圖布舒爾即二絃也以木為槽形方底有孔面長六寸八分二釐六毫濶五寸三分九釐三毫邊長七寸八分八釐五毫濶六寸四分八釐以木為柄自山口至槽邊內際長一尺七寸二分八釐上濶九分一釐下濶一寸零七釐八毫曲首長與槽面濶等後開槽以設絃軸槽長二寸零四釐濶三分軸長四寸零四釐絃自山口至覆手內際長二尺三寸零四釐通體用樟木槽面用桐木施絃二以羊腸為之繫於左右兩小軸以手冒撥指彈之取聲披帕呼爾即提琴也圓木為槽冒以蟒皮而空其下竹柄貫槽中柄末槽外覆之以木穿直孔以施絃扣柄上穿四直孔以設絃軸四絃共貫以小環束之於柄槽面正中設柱以承絃竹片為弓馬尾雙絃夾四絃間而軋之槽徑二寸三分長三寸二分四釐柄長二尺一寸一分七釐環距絃柱一尺一寸一分五釐第一軸距環四寸五分五釐第四軸距一一軸五寸三分九釐第四軸距柄端一寸二分三釐軸長四寸五分五釐竹弓長八寸六分四釐特木爾呼爾即口琴也以鐡為之一柄兩股中設一簧柄長三分二釐四毫股長二寸八方八釐股本相距三分六釐四毫股末相距七釐二毫簧長與股等簧末上曲七分二釐九毫簧端點以蠟珠橫銜其股於口以指鼓簧轉舌噓吸以成音綽爾形如內地之簫以竹為之通體長二尺三寸九分六釐凡四孔最下一孔距管端二尺一寸三分次上一孔距管端一尺九寸三分三釐次上一孔距管端一尺七寸二分最上一孔距管端一尺五寸二分三釐上口徑九分六釐四毫管末口徑六分三釐以舌側抵管之上口吹以成音鏗格爾格即鼓也以木為腔皮冒兩面面徑三尺以二小木杖裹氊擊之倉即鐃也或銅或鐡為之大小不一大者圓徑幾及三尺小者亦不下尺餘形同內地之鐃登舍形同內地之小鈸圓徑三寸餘轟和即鈴也以銅為之中施小舌或鐡或銅振以作聲制如鐸畢什庫爾即小銅角也或紅銅或黃銅為之本小末大管長一尺四寸一分四釐上口內徑三分零一毫外徑八分零一毫下口內徑六寸五分五釐一毫外徑三寸零一釐管口上安外管長三寸一分零五毫外管口上安蘆哨長三分五釐哨上口寬二分正面七孔後出一孔左側面一孔伊克布勒即大銅角也或紅銅或錫為之形如竹筒上下兩截本細末大通長三尺六寸七分二釐下截長一尺九寸四分四釐下口徑六寸四分八釐上口徑一寸四分四釐其出於下截上口之外者一尺七寸二分八釐上口徑四分三釐二毫上接小銅管長一寸四分四釐冬布勒以白螺殼為之於旋螺之末穿孔吹氣出聲中土謂之海螺按準部樂器與蒙古相若惟蒙古畨部合奏樂笳吹樂中有胡笳軋筝和畢斯舊作火不思今改正之屬今準部則無之耳雅托噶以下六器為其歡會宴飲所用以絲為主而竹附之鏗格爾格以下七器則喇嘛誦經應和所用久為內地梵剎之音蓋緣佛法本來西域是以樂器流傳沿及中土今審其形名往往而合也樂譜尺六工工工工五工工工工工工工工工工工工五六六六六六六六六六六六六工合六六六六六六六右一曲名圖爾本衛拉特有聲無辭用以試絃尺六工五六五工合四四合合尺六工五六五尺六工乙合四尺六工乙五五尺六工乙合四尺六工五六五工合四四合合尺六工五六五尺六工乙合四尺六工乙五五尺六工乙合四尺六工五六五工合四四合合尺六工五六五尺六工乙合四尺六工乙五五尺六工乙尺四尺六工五六五工合四四合合尺六工五六五尺六工乙合四尺六工乙五五尺六工乙尺四右一曲名噶爾達木特共四解歎美其人之辭五六尺工工六五五六五乙四合合六工工六五五五六尺工工六五五六五乙四合合六工工六五五右一曲名布圖遜雅布達爾頌禱之辭以此煞尾按工尺字譜宋樂志有之等而上之則楚辭大招篇所謂四上競氣極聲變只者即招魂篇所謂吳歈蔡謳奏大呂些大呂為宫其譜下四仲吕為角其譜上字四上競氣蓋宫角相應之謂是尺工四上在屈原時已有之即殊方外域稱名或異而寄諸絲竹者音無不同惟積音成調則參差長短之間厥有土風歎於比一兹準噶爾為元臣遺裔樂曲音節略近蒙古雖無工尺名號而審音定字固與工尺四上之九音應黃鐘十二律者未之有異凡曲謂之愛足慕得十有一凡調謂之愛雅斯得三十有二苐其文辭近陋難以稱述即音節流傳亦頗零落失次今略準圖爾本衛拉特以下三曲音節協以尺工諸字為一闋以著其槩準之於古殆即樂之一小成也别有沙津竒點克噶拉達瑪竒爾吉斯訥點庫濟爾噶勒呼哩莽拉圖們額奇諸曲率以雅托噶以下六器相和成調云北史西域傳詔有司以悅般國鼓舞之節施於樂府唐書回鶻傳堅昆國樂有笛鼓笙篳篥盤鈴戲有㺯駝師子馬伎繩伎樂苑回紇商調曲也按準部音樂考之於古史傳之紀載多疏惟回紇居白山之北悅般處烏孫故地戞黠斯未還西北之前為古堅昆國附近天山俱屬準部故土之音存之以資審證回部樂器哈爾扎克狀類胡琴以椰為槽面徑二寸五分六釐冒以馬首之革碧色槽底中開一孔徑六分八釐二毫有竒側開三小孔徑二分五釐六毫槽上木柄通長一尺八寸二分有奇圓徑七分二釐九毫柄上一段微巨長三寸四分一釐有奇圓徑一寸一分三釐有奇柄上段設二軸前面為山口上開圓孔徑四分有奇後面有空隙長一寸八分二釐有竒濶二分六釐九毫有竒槽下鐡柄長五寸一分二釐方二分四釐三毫其末圓頂著槽之處有兩環其絃以馬尾為之有二縷每縷約用馬尾八十餘莖上自山口穿於後繫於柄上端之二軸下則繫於槽末鐡柄之二鐶槽面施柱以承絃柱有小孔距山口一尺四寸五分八釐又馬尾絃下有鋼絲絃十下則繫於鐡柄自柱間小孔穿入上則繫於木柄左右各設五軸自柱間距軸左第一絃五寸七分六釐第二絃六寸八分二釐六毫第三絃七寸八分七釐有奇第四絃八寸八分五釐九毫有奇第五絃九寸七分六釐有奇右第一絃六寸零二釐六毫有奇第二絃六寸九分九釐八毫有奇第三絃七寸九分八釐七毫有竒第四絃九寸零一釐有奇第五絃一尺零一釐有奇另以圓木桿為弓長二尺一寸零六釐有奇桿本以皮條繫銅鐶長二寸八分八釐以馬尾八十餘莖為絃長一尺七寸七分有奇上繫於銅鐶下繫於桿末以弓絃軋馬尾絃應鋼絃以取聲喀爾奈狀類洋琴以木為胎空其中厚三寸七分一釐七毫九絲前長二尺五寸一分五釐後長九寸一分零二毫寬一尺六寸三分九釐四毫四絲左端直右端曲左端上面施木梁似琴之嶽山以繫鋼絃之本鋼絃之末施木軸似琴之枕入於右端側面孔內轉其軸以定絃之緩急木梁距上面髙六分九釐九毫八絲寬一寸二分九釐六毫九絲長與左端等施十八絃絃下柱形與右端曲形相應髙七分二釐九毫柱脊距右端五寸一分二釐第一單絃長二尺四寸三分有奇得合字第二雙絃長二尺四寸零一釐九毫二絲得四字第三雙絃長二尺三寸七分有奇得乙字第四雙絃長二尺三寸二分七釐有奇得上字第五雙絃長二尺二寸五分九釐九毫得尺字第六雙絃長二尺一寸八分四釐五毫得工字第七雙絃長二尺零八分有奇得凡字第八雙絃長一尺九寸七分二釐有竒得六字第九雙絃長一尺八寸四分八釐九毫得五字第十雙絃長一尺七寸三分七釐有奇復得乙字第十一雙絃長一尺六寸五分八釐八毫復得上字第十二雙絃長一尺五寸四分八釐有奇復得尺字第十三雙絃長一尺四寸三分三釐有奇復得工字第十四雙絃長一尺三寸有奇復得凡字第十五雙絃長一尺二寸二分一釐有奇復得六字第十六雙絃長一尺一寸二分八釐有奇復得五字第十七雙絃長一尺零四分九釐有奇復得乙字第十八雙絃長九寸八分二釐九毫有竒復得上字以手冒撥指彈之取聲巴拉滿狀類管以木為之本小末大飾以金木管通長九寸四分上口內徑四分外徑八分下口內徑六分外徑一寸三分木管上口安蘆哨長二寸七分三釐哨入木管五分九釐上口寬二分九釐正面七孔最下第一孔距上口七寸七分得凡字次上第二孔距上口六寸九分得合字次上第三孔距上口六寸五分五釐得四字次上第四孔距上口五寸四分得乙字次上第五孔距上口四寸五分一釐得上字次上第六孔距上口三寸七分五釐得尺字次上第七孔距上口二寸九分三釐得工字最上後出一孔距上口一寸六分八釐得凡字皆應笛聲喇巴卜狀類和畢斯木槽通柄絲絃五綱絃三上端曲向後以施絃軸槽形似半瓶長四寸八分六釐髙二寸九分一釐六毫柄槽通長二尺零七分七釐六毫五絲瓶形以上柄濶一寸一分三釐七毫有奇髙一寸三分三釐有奇柄上端濶七分零五毫有奇髙八分六釐四毫柄上曲長三寸三分二釐八毫曲柄之本濶一寸八分二釐有奇末濶七分五釐二毫有奇其厚與柄上端之濶等直柄之上作山口曲柄之中有空隙兩傍施五軸通五絲絃而繫於軸五絃之本繫於木槽下側靣五絃通長一尺九寸二分九釐有奇又綱絃二其本亦繫於槽下側靣其末則繫於直柄右側面之二軸一長一尺四寸九分有奇一長一尺四寸零八釐有奇一絃為合字二絃三絃皆為乙字四絃五絃皆為工字以手冒撥指彈之應鋼絃以取聲色塔爾狀類二絃木槽通柄共長三尺四寸二分五釐有奇槽形如匕面平下圓冒以革長八寸二分零八毫上濶九分二釐一毫六絲厚一寸一分三釐七毫有奇腹濶三寸三分三釐七毫有奇厚三寸一分五釐五毫有奇柄長二尺六寸零四釐九毫有奇面平背圓濶八分六釐四毫厚九分五釐有奇柄上漸濶至端濶一寸二分八釐兩側有八軸絲絃二大絃應合字小絃應上字雙鋼絃一單鋼絃六應絲絃以取聲