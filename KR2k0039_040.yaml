拖碧落不棧懸丹峻窮巔互槅庋拓勢么絃搄腔遲秋篳峭臣劉綸拍急臘鼓鼕居然謝梯筏詎爾忘淵氷臨崖送者返臣于敏中御製拔宅仙乎登發地上纍足凌空息撫膺竒趫忽百出邪許時一譍布武失逼仄振臂誇倰僜鞠效秦贅􅎽臣劉綸擔匪虞卿簦低腰宛舞女合掌俄枯僧迹習邯鄲學臣于敏中御製意會痀僂承履銅取滑細著屐寧慫競屏營無二慮搘拄惟兩肱絲曵蜓立顫角挂羚睡瞢竿頭詣成進臣劉綸繫表神來騰回旋轆轤軸盤辟浮屠層亭亭嘂閶闔臣于敏中御製軒軒棲觚稜瞥下儼跨馬虛躍似翻鷹安其危永吉動亦定乃凝叱陋九折坂抽嫺三釋掤佛跏妥帖結臣劉綸禹步蹣跚仍綳殊孩兒倒牽詫傀儡興爪攫鸚在架臣于敏中御製尾掉魚離罾目正徑無險心卑髙可乘木雞差足擬磨蟻猶難勝初虞引髮重轉喜絫卵增逵中或重繭臣劉綸棘端孰鋪㲪磬折筍虡系蓬轉颷車凌奄馳籋雲驥臣于敏中御製將徙培風鵬諷元徒傳藻賦張真究升蹁躚有餘暇彳亍鮮後懲情移禦寇善力靡偃師憎却行退宋鷁臣劉綸縮守黏曺蠅進止自栩栩視聼交蕄蕄拔河鬭謾騁臣于敏中御製罥索走妄譝旁觀駭汗致孤翹壯心憑教猱猱遜捷憐夔夔敢矜方外遊殆庶域中見何曽巧習履而泰臣劉綸道藝貞以恆眗哂石火熾機鄙扶風縆爻閭新志備臣于敏中御製幻人前事徴列睹俾愜衆論賞聊勸能行慶輯戎索熙春和氣蒸按回部樂伎有倒剌都盧承碗轉碟諸戲而繩伎尤工每當獻歲燈筵獲供清賞並邀睿藻賡吟殊方末藝有餘榮已考諸前代所傳如魏略載大秦國俗多奇幻口中出火自縛自解跳十二丸巧妙非常唐書西域傳載天竺獻胡旋之舞又睿宗時婆羅門引獻樂舞人倒行而以足舞極銛刀鋒倒置於地抵目就刀以歷臉中及其背上又伏伸其手兩人躡之旋身繞手百轉無已此見西域樂伎流傳由來已久凡今回部所獻固從其風俗之同者歟北史西域傳髙昌俗尚音樂唐書西域傳龜兹俗尚歌樂鄭樵通志七音序隋柱國沛公鄭譯議曰周武帝時有龜兹人曰蘇祗婆善胡琵琶聼其所奏一均之中間有七聲問之則曰父在西域號為知音世相傳習調有七種以其七調校之七聲冥若合符一曰婆陀力華言平聲即宫聲也二曰雞識華言長聲即南宫聲也三曰沙識華言質直聲即角聲也四曰沙侯加濫華言應聲即變徴聲也五曰沙臘華言應和聲也徴聲也六曰般贍華言五聲即羽聲也七曰俟利箑華言斛牛聲即變宫聲也就此七調又有五旦之名旦作七調以華譯之旦即均也郭茂倩樂府隋自開皇初置七部樂六曰龜兹伎唐太宗增髙昌其著令者十部六曰龜兹八曰疏勒九曰髙昌而總謂之宴樂後又分為立坐二部樂苑伊州商調曲西涼節度蓋嘉運所進也樂府雜録胡旋舞居一小團球子上舞縱橫騰擲而足終不離毬上其妙如此宋王延德髙昌行紀樂多琵琶箜篌國王拜受賜傍有持磬者擊以節拜遂張樂宴飲為優戲明日泛舟于池中池四面作鼓樂俗好音樂行者必抱樂器文獻通考樂考銅角髙昌之樂器也形如牛角長二尺西魏與高昌通始有高昌部之樂以備燕饗隋開皇中獻聖明樂曲唐太宗伐其國盡得其樂其器有竪箜篌琵琶五絃笙笛簫觱篥毛員鼓都曇鼓答臘鼓腰鼓羯鼓雞婁鼓銅鼓銅鈸具等十五種為一部工二十人舞人白襖錦袖赤皮鞾赤皮帶紅抹額龜兹隋有西國龜兹齊朝龜兹土龜兹等凡三部開皇中列於七部樂有彈筝竪箜篌琶琶五絃橫笛笙簫觱篥答臘鼓毛員鼓都曇鼓侯提鼓雞婁鼓腰鼓齊鼓簷鼓具皆一銅鈸二舞者四人設五方師子髙丈餘飾以五方色每師子有十二人畫衣執紅拂首加紅抹謂之師子郎樂工人皂絲布頭巾緋絲布袍錦袖緋布袴舞者四人紅抹額緋襖白袴帑烏皮鞾其曲有小天通考原本作小天查天竺有大朝天小朝天曲亦見通考此疑係小朝天之訛疏勒鹽焉疏勒其樂有竪箜篌琵琶五絃橫笛簫觱篥答臘鼓腰鼓提鼓雞婁鼓十種為一部工十二人隋唐以備燕樂工人皂絲布白頭巾袍錦褾白絲布袴舞人白襖錦袖赤皮鞾赤皮帶曲調有昔昔鹽一臺鹽之類于闐其俗以十二月一日肆筵設席拍手撥胡琴唱歌按回部音樂之于古自髙昌以下各有專條致為賅備郭茂倩樂府所載七部十部等樂府內有龜兹疏勒髙昌等部皆屬今之回部故全載於此可見回部舊精音律備太常之掌職是故也今者回部聲歌得隸樂官即準部器曲流傳亦土風足採並得備四夷之奏導八方之和鳯儀獸舞海宇同庥治莫盛於此矣欽定皇輿西域圖志卷四十
