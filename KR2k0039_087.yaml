front:
  text: 欽定四庫全書欽定皇輿西域圖志卷四十七
  hash: sha256:bdecb3bb2156058c1f1142a5d809828fe67715346459714688c9f47027487e65
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0039_WYG_087-1a}
body:
  text: 雜録臣等謹按歷代正史分門編纂外或綴以自序或附以語解至雜録之目則間見於後世郡國志乘大都錯舉遺聞軼事無可附麗者别成卷帙用𨽻全書之末所以廣搜羅便省覽也兹編西域圖志凡天文纒度之逺山川疆域之廣暨入版圖後建官行政良法鴻規旁及土風物産以至來王奉朔之區固已次第就裁偹登鉛槧因復近稽凖部源流當我朝底定更始之餘四衛拉特雖舊聞零落而受氏傳國之大凡世系宗支之分派猶有可考回部於兩和卓木伏辜後諸城望風輸欵溯自青吉斯汗以下暨派噶木巴爾諸族屬尤堪詳詢縷指至兩部字書母子孳生點畫配合為法逈殊標例發凡總不外十五字頭二十九字頭之推衍若簡牘之用原於唇齒凖噶爾為蒙古苖裔本不待舌人臚句而通而回部語言略分三種一譯再譯皆得近𨽻典屬仰惟大聖人昭同文之郅治會絶域之方言每於勤政幾餘隨時咨詢且復為辨其異同訂其訛舛洵乎知臨之無外已餘凡剩事零文為專門所不載或互見而未詳者咸勤搜討條系卷內往代史傳所垂事屬創聞亦堪資該洽之助並為酌存一二若荒誕傅會詞不雅馴則概置弗録仍别為五類曰世系曰字書曰語言曰故事曰附記庶於旁搜博採中寓雜而不越之義云志雜録第二十
  hash: sha256:80918268757a28e2553a0ecf4661488866fe8697fe0034430db5426065bfd37c
