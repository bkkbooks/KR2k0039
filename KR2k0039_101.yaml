body:
  text: 藩屬三拔達克山拔達克山在蔥嶺中東南自喀什噶爾葉爾羌西南行六百餘里至其境有城郭部落繁盛戶十萬有竒其酋曰素爾坦沙其國負山險扼蔥嶺之右頗擅形勢有河北流經博洛爾拔達克山兩部之間至葉什得拉克分流一流經北入圖斯庫爾一流道西南又北入於葉什勒庫勒舊對音伊西洱庫爾今改正淖爾其北鄙之城曰斡罕其地北極髙三十六度二十三分距京師偏西四十三度五十分在古當為烏秅國地也乾隆二十四年八月波羅泥都霍集占自葉什勒庫勒淖爾敗後奔拔達克山副將軍富德率師追之遣使往諭其汗素爾坦沙宣示波羅泥都霍集占負恩悖逆狀今擒獻是時二賊方竄入拔達克山沙木爾伯克所屬之錫克南村詭稱假道往墨克時沙木爾伯克適在素爾坦沙處賊得乘間逸去肆掠村落及沙木爾伯克與將軍遣使遇送致素爾坦沙素爾坦沙因遵檄縳波羅泥都而以兵圍霍集占於阿爾渾楚哈嶺賊退保齊那爾河素爾坦沙以其屬進戰賊不能支傷背及胯乳擒之囚之於柴札布柴札布者拔達克山繫囚處也素爾坦沙乃遣人詣軍門投欵報逆賊就擒副將軍富德察其忠順進使者撫諭素令獻俘進軍斡罕以待之是時痕都斯坦方以兵臨拔達克山謀劫霍集占兄弟而塔爾巴斯者拔達克山讎國也賊將通之攻拔達克山初素爾坦沙以二酋與已同派噶木巴爾派欲縳獻恐諸部不從難之富德曉以順逆利害之故即感悟曰我屬為大皇帝臣當同所惡且豈忍以兩凶故貽數萬生靈患耶乃殺波羅泥都霍集占波羅泥都尸身被盜遂專函霍集占首來獻率其部落十萬戶與博洛爾部三萬戶俱降二十五年遣陪臣額穆爾伯克等入覲貢八駿馬賜宴瀛臺並頒敕諭嘉奬時素爾坦沙與姪塔什瑪木特相攻塔什瑪木特聞敕使至即釋爭率屬內附二十六年素爾坦沙貢刀斧二十八年獻波羅泥都尸及其妻子並遣使來朝是年拔達克山侵博洛爾部葉爾羌駐臣諭還戶口牲畜尋素爾坦沙以博洛爾部之齊特喇爾為拔達克山舊逰牧地表乞給與下詔斥責素爾坦沙隨奉表請罪恭順有加御製驛章己卯中途驛章遞逺自軍營來啓篋急披視既慰又廑懷拔達山遵檄興兵阻逃回拔達克山汗曰素爾坦沙奉將軍富德等檄即親率兵遮截逆酋和卓木兄弟於阿爾渾楚哈嶺酋退伏嶺下齊那爾小河相持再戰素爾坦沙並調拔達克山屬沙木爾伯克帶兵星赴協勦阿爾渾楚哈其嶺髙崔嵬相持回少却守齊那爾隈厥路乃四通薩嘛罕布孩二回部名居布魯特安集延極西獲否未可知遁或投其儕備悉報將軍回字頭人差先是逆酋於伊西洱庫爾為我兵擊敗竄至拔達克山沙木爾伯克所轄錫克南村詭稱欲赴墨克地方禮拜時沙木爾適赴拔達克山汗所幼子在逰牧不知其詐也及沙木爾遇將軍遣使即為供馬送致素爾坦沙而自遣頭人賽特多羅特馳報賊情且齎回字表具言前因葉爾羌為凖噶爾所有我等亦為服屬今天朝悉定回城我等均為大皇帝臣僕矣詞甚恭順將軍正言斥此語皆阻推二𥪡數百衆如雉往投𦋡不以時即擒巧語將誰詒叶以將軍富德等軍營遣使未回而彼中所遣回目恐是潛來試探且賊敗竄時殘衆無幾又經拔達克山部內沙莾蘇爾阿里瑪伯克沙木爾伯克素爾坦沙汗各處俱云賊人被殺馬駝被獲何至遲延未擒又云素爾坦沙與賊相持之所路通薩嘛罕布孩各處或是預為他時縱賊地因書檄督責尅日傳送令即縳囚以獻勒兵在汝境為奉皇恩恢虞驚汝老幼再遲兵臨哉將軍等責遣回使時一靣復宣示恩意以爾等部曲褊小不忍遽行移兵若不即擒賊則罪在爾等應早自為計因對使揀派偵探兵付副都統伊柱等帶領啓行并將卡倫按隊外展以須繼進區畫頗中綮所惜少徘徊閲摺內部署索賊具協機宜惟我兵直抵拔達克山連界時未即窮追就獲以逺道亟攻故馬力不及事會殊堪惜耳馬力實不進亦弗深督責叶縳獻斯事畢飲至凱宴開設或更逸去數月復延􅵶迢迢萬里外機務親籌裁寧辭午夜勞所期七德諧御製副將軍富德奏報拔達克山汗素爾坦沙獻逆賊霍集占首級並以全部納欵稱臣信至詩以志事己卯冞入殲渠逃望風情知三窟已途窮嘉兹識早獻馘順笑彼悔遲跋扈雄和衆永看兩部定成功速在五年中西師之役始於乙亥春凖噶爾汗達瓦齊即於是秋就擒各部欵附嗣是辦理回部收城服衆距今逆酋授首統計蕆事未踰五年天恩如此昭優貺保泰彌殷慎敕躬御製瀛臺賜宴拔達克山來使即席得句庚辰歸俘獻馘識忠誠貢使隨來萬里行第一西方足嘉國無雙天下此都京俾觀禮樂三千盛待賞煙花午夜明重譯又須宣象寄近始略習回語可以不煩譯寄而拔達克山居極西語又異於葉爾羌故仍須回人譯彼語也筠沖語異逮濛瀛御製瀛臺宴拔達克山諸部回使詩以紀事庚辰逺使徠朝宴遣歸傾誠憐彼戀依依燈宵剛度韶春麗夜雨欣晴瑞旭輝乍可頒餳聨撒荔何妨卉服接絲衣從來曰信大蒙重安爾耕桑永受禨御製拔達克山八駿馬歌庚辰大宛駿馬斯已竒拔達山駿竒陪之方隅貢山南以西獻馘稱臣誠識時艮驥服皂納賮隨青驄送喜領羣蹄捷音早共紅旗馳右送喜驄堅昆底定我馬歸鶻其英鷙色其騏右堅昆鶻洱海即伊西洱淖爾一戰搴厥旗獲良翻以徠白羲右洱海驦有騋紫電名雅宜掃塵滅迹追無遺右紫電騋服逺在德不在威闞虎舊上方十駿之一已老兹其妃右服逺騮蝦蟆一跳丈六齊掉尾肅肅白玉題右玉題駿呈覽按隊過荷池祥霞輝映光配黎右祥霞驥逸足未騁望可知籋雲底藉鞭箠施右籋雲騢徒觀骨格皆英姿揣稱且命儒臣為天間調習付有司待余秋獮徐試騎譬霍集斯居京師回部郡王霍集斯以擒達瓦齊及隨征功賜第留京城父子俱膺封賞蓋以望族傑材不宜令歸回部具深意焉富貴之更教禮儀遊閭闔兮觀玉臺叶初非求馬興戎麾銷兵從此含生熙御製拔達克山汗素爾坦沙貢刀歌辛巳獻馘早已嘉攄誠薄來厚往遣使行感恩致貢器用呈佩刀一握偃月形兩馬先之白與青邉臣代進達帝京出鞘麗水輝如星昆吾割玉古所稱銛鋒鑄出浪人精寶鈿金錯太麗生皮室革帶堅且輕無所用也方銷兵付弆武庫徵來庭御製詠拔達克山汗素爾坦沙所進斧辛巳素爾坦沙自獻俘奉貢夙著悃忱後因遣侍衛等齎敕宣諭各部拔達克山復以使臣還朝疏進方物中有斧一白金鏤錯文蓋回製所重也詩以志事且鍥諸函齊斧方戡亂蠻書遂獻誠嘉忠頒厚賚貢物表𠂻情肅肅喻由義蛾蛾叶利貞斧刀蛾蛾利匠人之貞見太元經櫝藏無所用聊識武功成漢書西域傳烏秅國王治烏秅城去長安九千九百五十里東北至都護治所四千八百九十二里北與子合蒲犁西與難兜接山居田石間有白草纍石為室民接手飲其西則有縣度去陽闋五千八百八十八里去都護治所五千二百里縣度者石山也溪谷不通以繩索相引而度云魏書西域傳權於摩國故烏秅國也其王居烏秅城在悉居半西南去代一萬二千九百七十里阿鈎羌國在莎車西南去代一萬三千里西有縣度山其間四百里中往往有棧道下臨不測之淵人行以繩索相持而度因以名之唐書西域傳喝盤陀或曰漢陀曰渴館檀亦謂渴羅陀由疏勒西南入劒末谷不忍嶺六百里其國也距瓜州四千五百里直朱俱波西南縣度山北抵疏勒西獲密西北判汗國也治蔥嶺中都城負徒多河其王夲疏勒人世相承為之西南即頭痛山也蔥嶺環其國後魏太延中始通中國貞觀九年遣使者來朝開元中破平其國置蔥嶺守捉安西極邉戍也元史地理志西北地附録巴達哈傷今更正為拔達克山明史西域傳八答黑商應即元史之巴達哈傷均為拔達克山之訛在俺都淮東北城周十餘里民俗富饒按漢書皮山國西南至烏秅國千三百四十里皮山在于闐國西今自和闐城西行至拔達克山國都亦千三百餘里路適相當其國居蔥嶺南境四面皆山與班史山居田石間之説相合則今之拔達克山在漢為烏秅在魏為權於摩也又魏書載阿鈎羌國在莎車西南西有縣度山輿漢書烏秅國西有縣度之説合莎車今之葉爾羌在拔達克山東北亦與阿鈎羌國在莎車西南之説合叉權於摩國去代一萬二千九百七十里阿鉤羌國去代一萬三千里二國相距止三十里當屬毗聨之境疑漢時統為烏秅至魏乃分兩國東屬權於摩故去代較近西屬阿鈎羌故獨與縣度相接也唐書不載烏秅權於摩阿鈎羌諸國而有喝盤陀由疏勒西南六百里至其國今之喀什噶爾古疏勒地西南六百里至拔達克山道里相合城居山內河抱城東所謂治蔥嶺負徒多河者形勢可驗至元史舊載巴達哈傷明史舊載八答黑商均為拔達克山對音之訛今元史明史俱經更正夲音與喀什噶爾之訛為哈實哈爾塔什罕之訛為達失干無異證以道里方位亦往往而合可以類推矣博洛爾博洛爾在拔達克山東有城郭戶三萬有竒四面皆山西北面有河乾隆二十四年其酋沙瑚沙默特與拔達克山同時內附二十五年遣使沙伯克等來朝賜宴賚豫優渥並頒敕書二十八年貢劒及斧二十九年為拔達克山素爾坦沙所侵乞援于葉爾羌駐劄都統新柱諭素爾坦沙還俘罷兵沙瑚沙默特表謝并遣使來朝貢匕首宴賚如例三十四年貢雙玉欛匕首其地北極髙三十七度距京師偏西四十三度三十八分御製博洛爾部沙瑚沙默特伯克所進武器製匣藏之並紀是什癸未文列星行光溢濤切崑璆似斷秋毫于闐西去千餘里博洛爾在和闐西幾二千里和闐即古于闐也那數尋常玉欛刀宋開寶二年于闐貢玉欛刀右回劔齊斧言旋早洗兵更無拓逺袛持盈集鱗流仰寧當拒厚往惟嘉底貢誠右回斧御製博洛爾部沙瑚沙默特所獻匕首歌甲申風胡歐冶徒傳昔淬鋒斂鍔術誰核外域尚鬬防暴迫必佩利器求精飭博洛小部自守城近拔達山時被逼訴之守臣為和息拔達克山與博洛爾部接壤屢行搆釁圍城劫掠其部長沙瑚沙默特乞援于駐劄葉爾羌都統新柱遣使誡諭拔達克山恪遵約束還俘罷兵沙瑚沙默特進貢謝恩匕首尤其部中所最珍者感恩獻此表食德出匣月芽光奕奕斷蛟龍復剸犀革解紛懷逺斯堪式非同侈詡鄭遵得御製博洛爾部沙瑚沙默特伯克進玉欛雙匕首詩以紀事己丑戢干西極各安居表進佉盧弗改初雙器先之宜酌納五年貢亦不為疏是部隔和闐又二千餘里癸未年曽遣使進武器亦有詩球琳欛內鐵銜定氆氌室內銀鏤諸以短乘長休諭彼薄來厚往益懷豫按博洛爾部附近拔達克山應即古烏秅國地布哈爾布哈爾在拔達克山西乾隆二十五年回部底平遣使頒敕賚二十九年其部長阿布勒噶爾遣使諾羅斯伯克達雅爾伯克因拔達克山素爾坦沙以其屬內附其地北極髙三十八度四十二分距京師偏西五十七度三十二分當屬古難兜國地漢書西域傳難兜國王治去長安萬一千五百里東北至都護治所八百九十里西南至罽賔三百三十里按布哈爾部在拔達克山西境拔達克山為古烏秅國也説見前條漢書烏秅西與難兜接則今布哈爾當為古難兜國也愛烏罕愛烏罕在拔達克山布哈爾西南部落最大為古大月氏地乾隆二十七年其汗愛哈默特沙知西域底平聞風慕義遣使密爾漢等來朝貢刀及四駿馬賜宴賚豫優渥二十八年正月頒敕書嘉奬遣使歸國御製愛烏罕刀癸未西濛奉表馳使伻獻名駒二抒逺誠陪臣乘傳達帝京敬同諸部朝元正豐饗曲宴皆預令承筐幣帛厚賜行繄密爾漢密爾漢陪臣名感恱并貢刀可否咨公卿笑而許之聨彼情長跪百鍊雙手擎彎如碧水弓在檠雖弗適用器則精刀取輕直乃宜刺斫此刀彎如半弓知不適用上有白氣橫長庚不資磨瑩漫理呈匣庋武庫志偃兵玉關開後通崑瀛既非招致來亦迎殷殷豫意惟持盈御製愛烏罕四駿歌癸未天山左右多回部聲教古艱通譯鞮分疆劃界各領衆其名不可僂指稽愛烏罕實土著國遙在拔達山更西遣使進表非招致浡泥蠟紙金字題先以乘馬色不一嘉誠那責比物齊使者郵至早賜遣按程馬到憐穿蹄曰驄超洱菊花簇度西海忽蹀金隄右超洱驄昂藏之駵若玉用昭徠逺房星低右徠逺駵有騋有騋生月􅙡一形十影耳竹批右月􅙡騋凌崑之駿色正白不須鞭策行追霓右凌崑白髙逾七尺長八尺為龍一一皆駃騠于闐董氊四五尺見李伯時五馬圖伯時圖畫猶艷提别毛按品豫嘉號永志底貢無乖暌所幸在此懼在彼太保作訓吾將徯御製命金廷標橅李公麟五馬圖法畫愛烏罕四駿因疊前韻作歌癸未元祐頗亦訖聲教于闐董氊達狄提左騏驥院育良駟鳯頭錦膞名堪稽以此公麟留妙迹不脛乃入西清西徒觀傳神及畫骨詎珍金躞與玉題兹者致貢愛烏罕昻藏有過無不齊泰西繪具别傳法前歌曽命郎世寧為圖沒骨曽命寫裊蹄著色精細入毫末宛然四駿騰沙隄似則似矣遜古格盛事可使方前低廷標南人善南筆橅舊令貌鋭耳批驄駵騋駿各曲肖卓立意已起雲霓副以于思服夲色郎世寧所畫有馬而無人兹各寫執靮人一如伯時卷中法執靮按隊牽駃騠以郎世寧之似合李公麟格爰成絶藝稱全提匪説攸聞垂往訓萬類一理終無暌長歌慚匪工部健徒懷往作吟蘇徯向題李公麟五馬圖起句云杜陵題畫馬不一要貴取義非修辭又子美别蘇徯詩有贈爾秦人䇿莫鞭轅下駒之句漢書西域傳南道西踰蔥嶺則出大月氏大月氏國治監氏城去長安萬一千六百里不屬都護東至都護治所四千七百四十里南與罽賔接都媯水北為王庭後漢書西域傳初月氏為胸奴所滅遂遷于大夏分其國為五部翖侯後貴霜翖侯邱就攻滅四翖侯自立為貴霜王又滅濮達罽賔悉有其國邱就郤死子閻膏珍代為王復滅天竺置將一人監領之月氏自此之後最為富盛魏書西域傳嚈噠國大月氏種類也原出塞北自金山而南在于闐之西都馬許水南二百餘里去長安一萬一百里去瓜州六千五百里隋書西域傳挹怛國都烏滸水南二百餘里大月氏之種類也大業中遣使貢方物按愛烏罕為今蔥嶺西大國漢書南道西踰蔥嶺則出大月氏與今愛烏罕方位相符也愛烏罕東南接痕都斯坦部痕都斯坦為古罽賔國説見後條愛烏罕南與相接亦與漢書大月氏南接罽賔之説合惟其境壤相接是以貴霜王得滅罽賔而有之也罽賔南與北印度接五印度即五天竺國范史稱貴霜王于滅罽賔後并滅天竺亦其境地毗接之明證又班書稱大月氏都媯水北魏書稱其都馬許水隋書稱其都烏滸水烏滸與媯為音之近烏滸與馬許則字之訛也范史又稱天竺在月氏之東南天竺為今西藏亦適當愛烏罕東南境據此斷以愛烏罕為月氏故壤無疑痕都斯坦痕都斯坦在拔達克山西南愛烏罕東國工治玉以水磨成器最精為內地所弗逮舊於葉爾羌貿易乾隆二十五年頒敕書賜物令通市如故其地蓋北印度交界北極髙二十九度十五分距京師偏西四十五度五分當為古罽賔國地御製題痕都斯坦雙玉盤得十韻戍子蔥嶺接崑崙痕都天竺藩向稱溫都斯坦乃痕都斯坦之誤今考梵文改正以新疆道里方向證之其地當由回部過蔥嶺至拔達克山西南即其地蓋北印度交界説詳考訛篇中瓊枝産寶夥水磨省工煩聞彼處治玉以水磨不以沙石錯泰冒徒聞浴和闐此溯源匪求來不拒弗韞賈堪言盈尺區寧論去聲成雙珏實存中規仍瓣瓣合度更渾渾帶蒂芳葩簇通身翠葉翻荒唐説泝水卞和之事向曽有詩辨其誣約略比嬰垣謾詡連城貴端知五德尊孫卿有佳喻恭已慎臨軒御製詠痕都斯坦玉墨瓶筆室有序戊子製出回中珍儲席上抽璚管則擬毛錐戢戢珥時可比昭華貯隃糜則見墨海潭潭蘸處奚誇銀甕琢成附體文房信具二難收便聨函璧府疑兼雙珏蓋彼貴人所用供奉謄章其來萬里而遙微慚玩物為憶旁行左向緘祕笈者曽供削牘之書更同四角中央詠瓣香焉試續銘盤之句削木中書擬管城中土聚毫為筆外域削木供書猶存古製也橫行却向左而行梵書向右行外域書多同惟回書雖旁行而向左與漢書同宛看琢玉成筆室更介為瓶貯墨卿點染謄章供述事取攜湊便恰怡情非珍新樣兼精玖用識同文異獻荆御製詠痕都斯坦玉壺己丑繽紛水葉翻水磨製嬰垣細入毫髮理渾無斧鑿痕氷心欣可在仁色表斯溫典雅司空品買春且漫論御製詠痕都斯坦滿尺玉盤己丑考工未藉玉人為萬里從風貢自馳守伊犁將軍伊勒圖所進巧匠由來琢喀嗎回之古巧匠名金神會是守勳池規圓外復出瓜瓣尺滿中仍結􅉅蕤不寶華囂寶獻善王孫圉語廑吾思御製詠痕都斯坦玉碗己丑良璆出大蒙山石那須攻省力資水磨精鐫夲鬼工式成瓜列辨氣吐草垂虹曽未三朡伐平定回部師未至痕都斯坦貢原西旅同御製詠痕都斯坦荷葉杯庚寅痕都斯坦玉杯一圓橢作荷葉形跗有蒂曲柄環之旁出艾葉二達於杯脣卷其上可執瑩薄如紙惟彼中匠能之內地玉工謝弗及也四疊團荷葉雙牽長艾枝製非出華夏巧實勝般倕撫處不留手琢時那搆思旅獒垂法語三復略慙斯御製詠痕都斯坦玉盤庚寅崑嶠産瑶琳泰蒙每獻琛薄來雖厚往不寶恧攸針跗鄂承還疊英華燦且沈錦囊珍什襲可復憶雲岑御製題痕都斯坦玉杓庚寅掌非周玉府攻自泰西瀛絶勝舒州杓何須力士鐺璞原誤荆國蕊特艷昌城試問宜誰贈應調傅説羮御製詠痕都斯坦玉碗有序庚寅郵從西土蕊簇四面重臺碾出筠浮暈若兩旁抱珥貢效泰蒙包匭來隨都護歸軺用是摛吟以代紀實截肪出泰冒製碗自痕都形色雙合相磨礲了似無葉翻含蕾耳瓣發抱花趺通道恆來貢懷柔義廑吾御製題痕都斯坦白玉碗庚寅懿此嬰垣玉出惟羭次山色真勝霜雪器豈類叉鐶設貢岐周際應陳琬琰間車磲定何物八斗費言艱曹植有車磲碗賦御製題痕都斯坦白玉盤庚寅周尺將盈尺斯盤乃是盤幾曽掌玉府見説鬻都丸拔達克山迤西至痕都斯坦掌貨稅者皆為之都丸圓似月輪滿薄于楮葉單截肪置其裏辨質信應難御製詠痕都斯坦玉瓿庚寅荷柄曲擎一朵花旁生兩蕾致堪拿琢由西海如甊瓿製弗東周有虺蛇栗縝圓雕粲瑶蕊髮絲微起尚瓊華竒珍不脛還常至空谷白駒歎轉遐御製痕都斯坦白玉杯庚寅痕都潦玉出河濵水磨去聲磨平聲成製絶倫百辨細攢穩承足雙葩夾輔巧持脣瓊瑶自古來西域精緻而今勝玉人不以飲醪以啜茗戒哉惡旨久書紳杯圓而橢口四出趺攢菊英下圍敷葉十二左右長葉各一上出及杯脣稍外偃復有兩花下垂承以短葉可用執玉既瑩淨製薄如紙良材巧琢非中土玉工所能髣佛也御製題痕都斯坦菊花碗辛丑徑一圍三尺有餘水磨工異考工書耳垂翻出雙苞綴足底紛承碎瓣舒包貢却非來玉隴和闐所屬城名通商恆是走渠胥痕都斯坦猶在拔達克山西南彼處商人時持玉器來鬻葉爾羌菊花依舊重陽節合贈淵明五柳居御製詠痕都斯坦玉盂有序壬辰製出月邦貢來蔥嶺撫碧琳之溫潤搴芳艾之葳蕤腴琢連城閬圃宜承晞露光開四照善卷正艷秋陽惟置盂取義乎益安而銘器寓懷于非寶四出形如秋海裳葉翻雙耳執承漿瓊英那許薰池守垂草當生敖岸陽冷語譁囂漫致誚溫容沕穆自含光泰西製豈能知古喻水休論圓與方御製詠痕都斯坦玉碗有序壬辰璞韞崑山鏤傳印度卷芳莖而環耳攢花纈以承趺晶瑩一規允彼良工巧琢瑑縈五字嘉兹寶器恆來西崑率産玉良匠出痕都楮刻異三載水磨成百瑜製精畫難比器巨執如無不寶非求彼頻來却慙吾御製痕都斯坦玉瓜瓣瓢癸巳玉瓢一握如瓜瓣有蒂有葉還有花和闐有玉不能琢和闐雖有玉工而不能精琢精琢者皆出痕都斯坦彼處亦出玉蓋愈西愈近崑崙矣琢自痕都萬里遐崑崙之岡産美質喀嗎水磨攻錯加製為飲器可攜帶清泉舉酌勝烹茶異域都大尚武備以獵以戰隨操拿是蓋彼中貴者用非棗乃似安期瓜弗徵弗索聽貿易近利市至三倍奢徒置棐几佐文玩殊方聲教奚事誇却笑設贈許顔輩棄而弗顧當興嗟御製詠痕都斯坦玉燈檠癸巳逺域逮西瀛崇崑産翠瓊省工有水磨巧匠作燈檠那更稱銀燭雅宜燦玉瑛趺承盤一具柄置盞雙撑緻芴層翻葉昻藏獨挺莖寧誇髙七尺真足重連城善市由他致回人皆善賈痕都斯坦雖地當印度絶逺而懋遷每至葉爾羌故今恆得其玉器聞其攻玉純用水磨工省而製精尤內地所不及也頻來亦自驚似兹供繼照藉可贊離明御製詠痕都斯坦小玉合癸巳崑嶠産瓊琪良工精琢之爛然七寶聚斐若五花披漆製徒傳古金縷詎足竒南山藍玊合雅似李家詩御製詠痕都斯坦玊碗有序甲午劚出雲腴擎來雪碗磨是西濛之水挹殊北斗之漿圜規徑四寸而贏輕縠比五銖以薄截肪既美超魏札鏤氷況巧壓吳工無翼斯飛有懷朅詠良球本是出崑墟中去聲器成珍亦鮮上聲如巧製水磨貽喀嗎古時回巧匠名羞稱吳匠富專諸吳中玉匠多居專諸巷羊脂比色脂嫌膩楮葉方輕葉欠疏精玩弗求乃頻致每因擎用率慙豫御製題痕都斯坦玉飲器甲午西崑玉工巧無比水磨去聲磨平聲玉薄如紙製為飲器佐閜碗形異梓人載周禮半匡芰荷葉翻上一朵薝蔔花承底又如老蚌擘方諸映月分明欲生水撫不知痕視知痕何以措思何運指竒技直擬下增椎徐觀又復弗忍耳御製詠痕都斯坦玉瓜瓣飲器甲午天方瓜樣夥此器肖瓜形瓤訝留斯白皮寧藉彼青一花承妥貼五瓣列勻停貯水鄭門市擎漿裴驛亭種疑召家圃泣匪楚王庭綿瓞雖徵雅賔夷亦惕經御製詠痕都斯坦白玉杯六韻有序甲午瑩比截肪薄疑鏤翼質輕且美五銖機若仙成制巧而精十合規由神運磨水既泯兹圭角貯氷自徹彼中邉徠逺足珍詠懷非寶稷翼出竒質良工心運靈作杯成照世映斗見明星禮含文嘉曰玉石得宜則太白常明耳葉翻而拱身花勻且停磨礲泯楞角攢簇鎖瓏玲在手疑無物定睛知有形自應生穆瀣那可酌湘􅌬御製題痕都斯坦荷葉洗甲午色如截肪薄如紙西崑玉人巧無比那知士禮設東榮萬里流沙亦有此器同其製略弗同荷葉為形柄曲委讀阿里卜回書名讀其書者必始于此通漢書寓義依然是承水御製詠痕都斯坦古玉瓢乙未痕都玉器來已夥似兹舊物誠罕覩製既朴雅非華囂質亦渾然穆而古瓠可酌水斯象之細腰大腹如剖腑皮略為瓣疑就模瓠無瓣此器外皮有瓣上林以模夾葫蘆成器者乃有之或外國葫蘆夲有有瓣則不可知矣柄孔穿繩便攜取瓢飲由來古所稱而彼那知顔與許喀嗎匠名琢為眉哩汗名用戰獵佩之隨步武賁來中國兩無藉數典難尋周玉府宣和刻印非所云洞天清録宣和有玉瓢御寶建初脫粟儉堪祖漢章帝紀有恨不能瓢飲脫粟耳之語文房真稱去聲伴清吟偶用輒因懷杜甫杜甫詩瓢飲惟三徑御製題痕都斯坦緑玉盤乙未量材為器匪瓊英此玉盤品乃中平而製絶精巧蓋以掩其不逮也工緻訝難意想成喀嗎回語以匠人為喀嗎匠能逞彼巧專諸人或遜其精蘇城玉人多居專諸巷相金釘寶撫無迹簇葉攢花視有情每憶旅獒篇著訓摛吟還覺愧平生御製詠痕都斯坦玉盤初琢繼磨細花攢葉簇精目原覩其疊手乃撫之平表裏都圓潔色形若混成新疆嵗貢果三品恰宜盛回部嵗貢蘋果石榴木瓜三果每以盤貯陳設向曽與乾清宮西暖閣几上虎錞內所供之吉祥草同繪為嵗朝圖因以聫句御製題痕都斯坦瓜瓣瓢丙申脂白原非緑緣何形作瓜庭堅臉如削顔子巷曾拿蔓自青連葉背還黃綴花考工當致愧攻錯若為加御製題痕都斯坦玉碗丁酉年班伯克入朝覲伯克回部官名而職掌及名號各不同其曰阿竒木伯克總理一城事務若內地之都統伊什罕伯克協理事務若內地之副都統其品級則自三品至七品不等皆以城務大小為差又有噶咱納齊伯克管理地畝錢糧商伯克為其協理哈資伯克司刑名訥克布伯克司貿易匠役摩提色布伯克司念經事密圖巴哩伯克司買賣田産密拉布伯克司水利都管伯克司來使供給及文移等事巴濟格爾伯克司牲畜稅務巴克瑪塔爾伯克司果園什瑚兒伯克備差遣之事阿爾巴布伯克承催錢糧帕提沙布伯克管巡捕事明伯克管夲城夲村一切事務及雜項差務克拉克雅拉克伯克司外來貿易稅務哈資伯克司詞訟鄂爾親伯克司水利事默克塔布伯克司教幼童經卷塞依得爾伯克司街道巡察及園木事務哲百伯克司軍器官品大小及員數皆不同亦視各城之繁簡為率其職掌相沿以久官名悉仍其舊而選補則由駐辦大臣等核定奏聞兹敘其大略其詳則于西域輿圖志備載之包貢呈由典屬官崑嶠良材中去聲盂碗痕都巧製泯雕刓食芹負曝通誠逺厚往薄來折賞寬回部貢物所司例應折賞命倍其直豫之以示柔逺不貴異物賤用物慚仍民足致艱觀漢書西域傳罽賔國王治循鮮城去長安萬二千二百里不屬都護東北至都護治所六千四十里其民巧雕文刻鏤出珠璣珊瑚虎魄璧流離唐書西域傳西天竺與罽賔波斯接罽賔居蔥嶺南距京師萬二千里而贏貞觀中遣果毅何處羅拔等厚齎其國并撫慰天竺罽賔王遣人導護使者至天竺按五天竺國即五印度唐書稱罽賔居蔥嶺南與天竺接導引唐使者至天竺其國在印度交界可知伏讀御製詩注痕都斯坦為北印度交界揆其方位與罽賔為近是矣又漢書罽賔國民巧工雕刻出璧流離今痕都斯坦治玉精巧甲于西域其俗亦相似也巴勒提巴勒提在博洛爾南東接土伯特西接克什米爾又西接痕都斯坦南接哈普倫中有長河其地北極髙三十一度五十分距京師偏西四十五度二十八分分兩部落其酋默默斯帕爾烏蘇完分統之各八千餘衆舊在葉爾羌貿昜乾隆二十五年六月內附令通市如故按巴勒提部在痕都斯坦東痕都斯坦為古罽賔國巴勒提與之附近應屬罽賔國東境也欽定皇輿西域圖志卷四十六欽定四庫全書欽定皇輿西域圖志卷四十六
