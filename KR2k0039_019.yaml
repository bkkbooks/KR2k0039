body:
  text: 疆域十二天山南路六和闐屬額里齊托蘇拉固葉哈朗歸塔克皮什雅玉隴哈什哈喇哈什博羅齊皂窪勒博爾烏匝克吉爾布斯喀藏瑪枯雅爾烏哈什巴爾漠期伊克勒沁托海素勒坦雅伊拉克額克里雅爾喀提里什塔喀克瑪爾占鄂勒氐吉拉木雅伊氐巴什布克色木鄂托喇布克色木愛雅克布克色木伯德里克鄂托克伯什阿喇勒齊克齊鄂托克波斯湯托郭喇克齊爾拉塔克克勒底雅阿勒屯郭勒蘇格特巴爾呼都克阿氐爾干欽定皇輿西域圖志卷十九目録欽定四庫全書欽定皇輿西域圖志卷十九目録疆域十二天山南路六和闐屬額里齊托蘇拉固葉哈朗歸塔克皮什雅玉隴哈什哈喇哈什博羅齊皂窪勒博爾烏匝克吉爾布斯喀藏瑪枯雅爾烏哈什巴爾漠期伊克勒沁托海素勒坦雅伊拉克額克里雅爾喀提里什塔喀克瑪爾占鄂勒氐吉拉木雅伊氐巴什布克色木鄂托喇布克色木愛雅克布克色木伯德里克鄂托克伯什阿喇勒齊克齊鄂托克波斯湯托郭喇克齊爾拉塔克克勒底雅阿勒屯郭勒蘇格特巴爾呼都克阿氐爾干欽定皇輿西域圖志卷十九目録欽定四庫全書欽定皇輿西域圖志卷十九疆域十二天山南路六和闐屬東至克勒底雅郭勒入砂磧又東至阿氐爾干西至皂窪勒鄂斯騰接葉爾羌界南至南山北盡和闐達里雅接阿克蘇界額里齊額里齊舊對音為伊立齊距京師一萬二千一百五里和闐境內村莊櫛比最著者凡六城曰額里齊曰哈喇哈什曰玉隴哈什曰齊爾拉曰塔克曰克勒底雅咸屬和闐而額里齊當道衝為之首所屬有罕第雅爾齊莊諸城向受回酋和卓木約束乾隆二十年駐劄阿克蘇尚書舒赫德遣散秩大臣鄂對侍衛齊凌扎布噶布舒傳檄往撫時逆賊霍集占遣使在其地六城伯克聞天朝使至即擊遂逆黨迎我使臣入城奉檄欣喜傾心降服留鄂對等以鎮撫之其後賊以和闐僻逺大兵不能到率衆來攻鄂對等鼓勵降回悉力城守與賊相持三閲月會將軍兆惠富德等自葉爾羌旋兵阿克蘇途次聞信遣副都統巴圖濟爾哈爾瑚爾起等統兵千名赴援和闐方困於賊而大兵適至與鄂對等合我師偵知賊衆駐營哈喇哈什城外將往勦擊忽大霧彌漫人對面不相見遂乘霧急行既薄賊營賊始覺迎戰官兵奮勇衝突賊驚潰竄去追奔數十里和闐復定事在二十四年三月和闐回長漠咱帊爾霍集斯伯克子也初霍集斯伯克再赴將軍兆惠營投誠時遣其子漠咱帊爾入覲曲宴重華宫御製重華宫曲宴和闐回長漠咱帊爾己卯朝天兼值預朝正曲宴宜教沐寵榮爾父誠為識時務漠咱帊爾之父霍集斯伯克先以縛獻逹瓦齊得邀奬賚比大兵討回部復自烏什赴阿克蘇投將軍兆惠軍營隨征自效而遣其子入覲王臣詎有限禆瀛是日御前行走蒙古青海諸王公皆在座舊宫小會輕齊史新域來賓願武成入律東風方湊達春臺樂與物咸亨御製和闐賊遁詩以志事并序己卯和闐為回部扼要重地所屬六城曰伊立齊哈拉哈什玉隴哈什齊喇塔克克里雅而統名之曰和闐先是將軍兆惠遣侍衛齊凌扎布噶布舒及回長鄂對伯克等往招歸順繼大軍被圍小和卓木遣賊黨往攻和闐齊凌扎布噶布舒等分守伊立齊哈拉什玉隴哈什三城百計抵禦以待援師其餘三城力不能支復叛降賊兆惠等解圍之後即遣副都統巴圖濟爾噶爾瑚爾起等分兵馳救望見賊營時值大霧彌漫我師乘勢奮勇直前衝擊殱其渠魁阿布都海里克及和集雅斯二人鄂斯滿被創竄去餘賊悉遁和闐得以解圍其三城仍即撫定傳檄曾聞定六城狂且怒臂致加兵力單三堡重去聲反覆伊立齊哈拉哈什玉隴哈什被圍時齊喇塔克克里雅城內降回度守禦單弱不能自存隨復叛從賊計守十旬實勇誠産玉河邊遁敵騎採花沙上識王旌古稱羊侃斯為盛何吝嘉勤爵賞行御製翻譯名義集正訛歲辛卯為皇太后八旬大慶年欲敬書華嚴全部以祝無量夀算因取宫藏明宣德間金書經閲之則稱于闐國三藏沙門實義難陀譯于闐之名見漢書即今所正為和闐而自古及今不易之回部也回部本自有回經不信佛教不宜有名僧譯佛經之事命考翻譯名義集則所載略同心知其非而不能為之説也問之章嘉國師乃知實叉難陀本梵僧之髙行者以今同文韻統證之應為施嘎剎納納低而直書之則為施剎難低此實叉難陀所由訛而訛尚不至大相徑庭也施剎難低生于鄂德納答直書之則為鄂等答德納切漢字不可得當作吳人呼等音乃近之乃天竺之西印度也唐時此僧自天竺至中國譯經實見於梵經天竺畨經西藏及漢經髙僧傳此鄂等答所由訛為于闐而其訛乃不啻魯魚亥豖矣於是霍然去疑而憮然恨法雲宋僧作翻譯名義集者之不悉心考究誤後世為不淺也雖然彼以一漢僧不深解梵語畨語梵音畨音即漢文亦非通今博古之大手筆也而勤索二紀乃成是編則其用力之苦亦有可尚向作萬泉莊記所謂賴有失實者存而得以考是非辨差訛未嘗無小補者未足深怪也既正其訛乃命司事者一依同文韻統所定書其名地至全集之似此錯謬者想復不少當付章嘉國師一一更正夫鄂等答訛為于闐不過音韻之偶誤耳遂致疑天竺為回部並有疑回部亦有佛教者展轉耳食愈幻愈逺豈特失之毫釐而且謬以萬里吾更因之瞿然有戒於綸綍之悖矣漢書西域傳于闐國王治西城去長安九千六百七十里東北至都護治所三千九百四十七里南與婼羌接北與姑墨接西通皮山三百八十里後漢書西域傳于闐國居西城去長安所居五千三百里去洛陽萬一千七百里建武末莎車王賢強盛攻并于填徒其王俞林為驪歸王明帝永平中于填將休莫霸反莎車自立為于填王休莫霸死凡子廣德立後遂滅莎車從精絶西北至疏勒十三國皆服從而鄯善王亦始強盛自是南道自蔥嶺以東唯此二國為大順帝永建六年于填王放前遣侍子詣闕貢獻元嘉元年長史趙評在于填病癰死評子迎喪道經拘彌拘彌王成國與于填王建素有隙乃與評子云于填王令胡醫持毒藥著創中故致死耳評子信之還入塞以告敦煌太守馬達明年以王敬代為長史達令敬隱核其事敬先過拘彌成國復説云于填國人欲以我為王今可因此罪誅建于填必服矣敬貪立功名且受成國之説前到于填設供具請建而隂圖之或以敬謀告建建不信旦日建詣敬坐定建起行酒敬叱左右執之吏士並無殺建意時成國主簿秦牧隨敬在會持刀出曰大事已定何為復疑即時斬建于填侯將輸僰等遂會兵攻敬敬持建頭上樓宣告曰天子使我誅建耳于填侯將遂焚營舍燒殺吏士上樓斬敬輸僰自立為王國人殺之而立建子安國焉馬達聞之欲將諸郡兵出塞擊于填桓帝不聽徴達還而以宋亮代為敦煌太守亮到開募于填令自斬輸僰時輸僰死已經月乃斷其頭送敦煌而不言狀亮後知其詐竟不能出兵于填恃此遂驕魏略戎盧國扞彌國渠勒國皮冗國皆并屬于闐魏書西域傳于闐國在且末西北蔥嶺之北二百餘里東去鄯善千五百里南去女國二千里去朱俱波千里北去龜兹千四百里去代九千八百里其地方亘千里連山相次所都城方八九里部內有大城五小城數十城南五十里有贊摩寺即昔羅漢比邱盧旃為其王造覆盆浮圖之所石上有辟支佛跣處雙迹猶存于闐西五里有比摩寺云是老子化胡成佛之所真君中世祖詔髙涼王那擊土谷渾慕利延慕利延懼驅其部落渡流沙那進軍急追之慕利延遂西入于闐殺其王死者甚衆顯祖末蠕蠕冦于闐于闐患之遣使素目伽上表望救顯祖詔公卿議之公卿奏曰于闐去京師幾萬里蠕蠕之性惟習野掠不能攻城若為所拒當已旋矣雖欲遣師勢無所及於是停師不行先是朝廷遣使者韓羊皮使波斯波斯王遣使獻馴象及珍物經于闐于闐中於王秋仁輒留之假言慮有冦不達羊皮言狀顯祖怒又遣羊皮奉詔責讓之自後每使朝獻水經注釋法顯自烏帝西南行佛國記作烏夷路中無人民沙行艱難所徑之苦人理莫比在道一月五日得達于闐其國殷庶民篤信多大乘學威儀齊整器鉢無聲南城一十五里有利剎寺中有石鞾石上有足迹彼俗言是辟支佛迹法顯所不傳疑非佛迹也按和闐為于闐轉音乃西域回部而列史多稱其奉佛教由晉以來莫能訂其舛今自西陲耆定于闐𨽻我版圖如前史所載地有河源山多美玉者皆厯厯可尋而回俗相沿不奉佛法亦無所謂辟支舊迹者與厯代史書所載不符伏讀御製翻譯名義集正訛灼知和闐為自古及今不易之回部自有回經不信佛教而史所稱譯經奉佛之于闐則當為鄂等答乃天竺之西印度其地逈不相涉自酈道元水經注始稱釋法顯來至于闐其國多大乘學又寺中有石鞾佛迹魏收以下修史者多據以為于闐奉佛故實然辟支佛迹語為法顯佛國記所未載道元尚且疑之其不足據審矣而踵其説者不加深考遂至牽謬支離皆由未嘗親履其境又不習西土語音耳食相仍沿襲滋誤豈若今日聲教所通詳徴目覩之足以傳信哉兹恭録御製文以標定論而諸書所述于闐奉佛故事間録一二以見事不審真每多傅會存其説正以斥其妄耳隋書西域傳于闐國王姓王字卑示閉練山多美玉唐書西域傳于闐或曰瞿薩旦那示曰渙那曰屈丹北狄曰于遁諸胡曰豁旦距京師九千七百里瓜州贏四千里并有漢戎盧杆彌渠勒皮山故地西有沙磧王姓尉遲氏名屋密本臣突厥貞觀六年遣使者入獻後三年遣子入侍阿史那社爾之平龜兹也其王伏闍信大懼長史薛萬備謂社尓曰今破龜兹西域皆震恐願假輕騎羈于闐王獻京師社爾許之至于闐陳唐威靈勸入見天子伏闍信乃隨使者來會髙宗立授右衛大將軍子葉護玷為右驍衛將軍留數月遣之請以子弟宿衛上元初身率子弟酋領七十人來朝擊吐蕃有功帝以其地為毗沙都督府析十州地理志毗沙都督府本于闐國貞觀二十二年內附初置州五髙宗上元二年置府析州為十唐西域記瞿薩旦那國周四千餘里沙磧大半壤土隘狹王甚驍武五代史四裔附録于闐國地君世物俗見於唐五代亂世中國多故不能撫來四裔其常自通於中國者僅以名見其君世終始皆不可知而于闐尤逺去京師萬里外其國西南近蔥嶺與婆羅門為鄰國而相去猶三千餘里南接吐蕃西北至疏勒二千餘里晉天福三年于闐國王李聖天遣使者馬繼榮來貢晉遣供奉官張匡鄴假鴻臚卿彰武軍節度判官髙居誨為判官册聖天為大寶宋史作大食于闐國王是嵗冬十二月匡鄴等自靈州行二嵗至于闐至七年冬乃還聖天又遣都督劉再升來獻漢乾祐元年使者王知鐸來宋史外國傳于闐國去京師九千九百里西南抵蔥嶺東接吐蕃西北入疏勒二千餘里嘉祐八年以其國王為特進歸忠保順􅠫鱗黑韓王其王乞賜此號也于闐謂金翅烏為􅠫鱗黑韓蓋可汗之訛也明史西域傳于闐古國名自漢迄宋皆通中國永樂四年遣使來朝仁宗後貢使漸稀于闐自古為大國隋唐間侵并戎盧諸國其地益大南距蔥嶺二百餘里東北去嘉峪關六千三百里大略蔥嶺以南賽瑪爾堪舊作撒馬兒罕今改正最大以北于闐最大元末時其主暗弱鄰國交侵人民僅萬計悉避居山谷生理蕭條永樂中漸行賈諸蕃復致富庶按西域國名古今互易其不易者唯和闐之為古于闐猶存舊號史記後漢書作于置顔師古注闐字與填同音形别音同實為一字考許慎説文置從宀填從穴徐鍇注置支義切填待年切史記後漢書載于填俱應從穴從真刻本作置者非也唐書北狄曰于遁即闐字之轉音漢書于闐北接古墨西通皮山後漢書南道自蔥嶺以東鄯善于填二國為大是于闐固在南山之北蔥嶺之東南道所經之國證以今時形勢確無可疑魏書稱于闐在且末西北東去鄯善是已乃云在蔥嶺北者誤指南山為蔥嶺故也明史猶沿其説而實非是自今葉爾羌東境至克勒底雅城東西千有餘里當為古于闐全境魏書所謂其地方亘千里也南山峙其南瑪雜爾塔克繞其北連山相次形勢猶存其云都城方八九里部內有大城五是于闐所屬舊有五城及鎮城為六與今額里齊等六城之數適相符矣唐置毗沙都督府於此與焉耆龜兹疏勒號稱四鎮其地當吐蕃之衝是以假道勃律以取四鎮于闐實首受其敝云托蘇拉固葉托蘇拉固葉在額里齊城南哈朗歸塔克哈朗歸塔克在額里齊城南皮什雅皮什雅在額里齊城西南一百六十里有城垣不當孔道其南即玉隴哈什哈喇哈什兩郭勒發源處分流於城之東西三面距河各二十里許河以外連山環抱即漢書所謂南山玉石之所出也玉隴哈什玉隴哈什在額里齊城東南三十里玉隴哈什郭勒環抱之內民物繁庶無城垣而居六城之一所屬有薩木普拉莊寶義莊哈喇哈什哈喇哈什舊對音為哈拉哈什在額里齊城西北六十里居六城之一東傍哈喇哈什郭勒二里西距皂窪勒鄂斯騰二十里唐書地理志于闐西五十里有葦關按唐于闐鎮城應屬今之額里齊西五十里之葦關當在今哈喇哈什城東境博羅齊博羅齊在哈喇哈什西十里東南距額里齊城七十里乾隆二十四年三月和闐陷於賊將軍兆惠等遣將往援賊衆聞風西遁留其餘黨於博羅齊以窺我師副都統瑚爾起巴圖濟爾哈爾等擊敗之詳見額里齊條御製博羅齊行己卯博羅齊者鄰和闐賊回據險偵我軍先是圍解黑水困元戎遣救掄二臣去冬將軍兆惠兵逼葉爾羌恃勇徑渡葉爾羌河以衆寡不敵為賊所困乃築柵黑水之地相持纍月小河卓木乘間遣賊黨往圍和闐六城已失其三逮副將軍富德統兵應援與兆惠夾擊破賊圍解之後兆惠與諸將集議遣副都統瑚爾起及巴圖濟爾噶爾率偏師馳救和闐一為瑚爾起吉林舊族世受恩一巴圖濟爾噶爾乃厄魯特宰桑其勇誠超羣同心協力速赴援率軍數不能盈千途厯戈壁不毛之地負甲步進無俄延哈拉哈什已垂陷齊凌扎布馳來言夜急行至伊立齊時賊望風先逃奔集兵拯哈拉哈什賴天大霧彌漫漫乘霧直搗賊營後伺怠奮勇攻中堅斬將搴旗獲輜重孤城恢復餘俱安昔薛延陀禬神能致雪兾困李績終乃自敝焉此霧或亦敵鮓答西域習咒術者能禁制作使風雲雨雪霜霧名為鮓答翻為我用成功全易云天所助者順向猶未信今信然特盈知足感帝祐敢肆志詡能開邊皂窪勒皂窪勒在哈喇哈什郭勒迤西二十里東南距額里齊城一百二十里村落毗連居民稠密東濱皂窪勒鄂斯騰由是西行踰黃水溝交葉爾羌界博爾烏匝克博爾烏匝克在額里齊城西吉爾布斯喀藏吉爾布斯喀藏在額里齊城西瑪枯雅爾瑪枯雅爾在額里齊城北烏哈什烏哈什在額里齊城北巴爾漠期伊克巴爾漠期伊克在額里齊城北勒沁托海勒沁托海在玉隴哈什城北一百里東傍玉隴哈什郭勒西南距額里齊城一百六十里素勒坦雅伊拉克素勒坦雅伊拉克在勒沁托海北三十里東傍玉隴哈什郭勒西南距額里齊城一百九十里額克里雅爾額克里雅爾在素勒坦雅伊拉克北七十里東傍玉隴哈什郭勒西南距額里齊城二百六十里喀提里什喀提里什在額克里雅爾北七十里玉隴哈什郭勒經其東哈喇哈什郭勒經其西會於其北入和闐達里雅西南距額里齊城三百三十里塔喀克塔喀克在喀提里什北二十五里東傍和闐達里雅西南距額里齊城三百五十五里瑪爾占鄂勒氐瑪爾占鄂勒氐在塔喀克北六十五里東傍和闐達里雅西南距額里齊城四百二十里吉拉木雅伊氐吉拉木雅伊氐在瑪爾占鄂勒氐北二十里東傍和闐達里雅西南距額里齊城四百四十里巴什布克色木巴什布克色木在吉拉木雅伊氐北五十里東傍和闐達里雅西南距額里齊城四百九十里鄂托喇布克色木鄂托喇布克色木在巴什布克色木北四十里東傍和闐達里雅西南距額里齊城五百三十里愛雅克布克色木愛雅克布克色木在鄂托喇布克色木北六十里東傍和闐達里雅西南距額里齊城五百九十里伯德里克鄂托克伯德里克鄂托克在愛雅克布克色木北八十里東傍和闐達里雅西南距額里齊城六百七十里伯什阿喇勒伯什阿喇勒在伯德里克鄂托克北九十里東傍和闐達里雅西南距額里齊城七百六十里齊克齊鄂托克齊克齊鄂托克在伯什阿喇勒北六十里東傍和闐達里雅西南距額里齊城八百二十里波斯湯托郭喇克波斯湯托郭喇克在齊克齊鄂托克北一百二十里東傍和闐達里雅西南距額里齊城九百四十里又北行七十里至哈喇烏蘇交阿克蘇界自和闐城東北之勒沁托海至阿克蘇界將及千里由阿克蘇南行至和闐亦如之漢書西域傳姑墨國南至于闐馬行十五日唐書地理志自撥換南而東經崑岡渡赤河又西南經神山睢陽鹹泊又南經疏樹九百三十里至于闐鎮城按漢姑墨在今阿克蘇東所謂十五日至于闐者即今自波斯湯托郭喇克以南千餘里至和闐之路唐撥換城在今阿克蘇西循阿克蘇郭勒東南行渡喀什噶爾達里雅葉爾羌諤斯騰即自撥換南而東經崑岡渡赤河者也神山睢陽鹹泊及疏樹當在今波斯湯托郭喇克至勒沁托海南北千餘里之間齊爾拉齊爾拉舊對音為齊喇在玉隴哈什東二百里西距額里齊城二百三十里民物繁庶無城垣而居六城之一城西有河自塔克來西北流入於沙磧唐書地理志于闐東三百里有坎城鎮西域傳于闐東有嫓摩川按唐地理志所載坎城為于闐最近之城今齊爾拉在額里齊東二百三十里疑即此地西境之水應即西域傳之嫓摩川也塔克塔克在齊爾拉東南一百八十里西北距額里齊城四百十里民物繁庶無城垣而居六城之一城西有河發源南山中西北流入齊爾拉境唐書地理志于闐東蘭城守捉又西經移杜堡彭懷堡次城守捉三百里至于闐按唐地理志載于闐東境凡三城曰蘭城曰坎城曰次城坎城屬今齊爾拉蘭城屬今克勒底雅則次城應屬塔克也克勒底雅克勒底雅舊對音為克里雅在齊爾拉東二百里西距額里齊城四百三十里有城垣居六城之一東傍克勒底雅郭勒所屬有峩和爾伊里莊哈爾魯克莊唐書地理志于闐東六百里有蘭城鎮又故且末城西經悉利支井襖井勿遮水五百里至于闐東蘭城守捉按克勒底雅今為和闐最東境唐時蘭城亦屬于闐東界疑是其故址也和闐國東為古扜彌國地漢書西域傳扜彌國王治扜彌城去長安九千二百八十里東北至都護治所三千五百五十三里南與渠勒東北與龜兹西北與姑墨接西通于闐三百九十里今名寧彌後漢書西域傳拘彌國居寧彌城去長史所居栁中四千九百里去洛陽萬二千八百里順帝永建四年于填王放前殺拘彌王興自立其子為拘彌王而遣使者貢獻於漢敦煌太守徐由上表討之帝赦于填罪令歸拘彌國放前不肯陽嘉元年徐由遣疏勒王臣槃發二萬人擊于填破之斬首數百級放兵大掠更立興宗人成國為拘彌王而還靈帝熹平四年于填王安國攻拘彌大破之殺其王戊巳校尉西域長史各發兵輔立拘彌侍子定興為王時人衆裁有千口其國西接于填三百九十里魏略扜彌國并屬于闐唐書西域傳于闐東三百里有建德力河河之東有汗彌居建德力城亦曰拘彌城即寧彌故城按古扜彌國西與于闐境接後漢書于填并有扜彌之地則今自克勒底雅以東為古扜彌國地無疑又按前書扜彌東北接龜兹西北接姑墨龜兹為今庫車姑墨在今庫車阿克蘇之間而扜彌北與之接是其當時北界直抵今塔里木諤斯騰即水經注所云南河又東北徑扜彌國北者方位約略可見考扜彌始見於漢書又有寧彌之名後漢書則稱為拘彌魏略稱為扜彌唐書稱為汗彌謂即寧彌故城而自扜至汗音譯遞變然唐平髙昌都部曽至蔥嶺以南較之漢時之僅僅通使者稱名較為親切自當以汗彌為正雖顔師古曾有扜音烏之注彼苐就扜字音注不足據也以上屬和闐又東為和闐境外地阿勒屯郭勒阿勒屯郭勒地以水名在塔克東南二百七十里踰河流三至其境蘇格特蘇格特在阿勒屯郭勒東南一百里踰河流一至其境漢書西域傳渠勒國王治鞬都城去長安九千九百五十里東北至都護治所三千八百五十二里東與戎盧西與婼羌北與扜彌接按古扜彌在今克勒底雅西漢渠勒北與扜彌接是阿勒屯郭勒蘇格特皆在克勒底雅東南境疑皆屬漢之渠勒國地也巴爾呼都克巴爾呼都克在蘇格特東南二百里踰河流一至其境漢書西域傳戎盧國王治卑品城去長安八千三百里東北至都護治所二千八百五十八里東與小宛南與婼羌西與渠勒接辟南不當道按巴爾呼都克左右境山水兼抱應屬漢戎盧國地至所謂卑品城者則不可考矣阿氐爾干阿氐爾干在巴爾呼都克東北四百里踰沙磧至此一水雙流環帶其地西距和闐之克勒底雅郭勒約七百餘里地皆沙磧漢書西域傳精絶國王治精絶城去長安八千八百二十里北至都護治所二千七百二十三里南至戎盧國四日行地厄狹西通扜彌四百六十里唐西域記瞿薩旦那東境從此東行入大流沙聚散隨風人行無迹遂多迷路行四百里至都貨邏故國國久空曠城皆荒蕪按阿氐爾干在和闐東沙磧之外以道里方向考之應屬漢精絶國唐都貨邏國地由是而東南三百里為􅔈什達爾烏蘭達布遜塔克應屬古小宛地漢書西域傳小宛國王治扜零城去長安七千二百一十里西北至都護治所二千五百五十八里東與婼羌接辟南不當道按漢精絶國北至都護治所而小宛國西北至都護治所是小宛宜在精絶之東也又戎盧東與小宛接而辟南不當道則與小宛正同是小宛又宜在戎盧之東精絶之東南也今􅔈什達爾烏蘭達布遜塔克在阿氐爾千之東南巴爾呼都克之東以小宛故國當之為近似矣又自􅔈什達爾烏蘭達布遜諸塔克東北五百餘里抵安西州屬之敦煌縣界則正漢書所謂出陽關最近自婼羌始而小宛東與婼羌接者也自出和闐東界其偏東南之國為古渠勒戎盧小宛正東之國為古扜彌精絶且末樓蘭且末樓蘭諸考證略見前安西南路兹不復舉欽定皇輿西域圖志卷十九
