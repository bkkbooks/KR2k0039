body:
  text: 雜録二回部世系青吉斯汗族屬回部舊汗名青吉斯為第一世以上無考子察罕代瑪瑪竒為第二世察罕代瑪瑪竒子哈喇拜蘇畢喇克為第三世哈喇拜蘇畢喇克子達瓦齊為第四世達瓦齊子巴爾當為第五世巴爾當子巴圖爾博汗為第六世巴圖爾博汗子圖墨訥為第七世圖墨訥子阿沽斯為第八世阿沽斯子海都為第九世海都子薩木布瓦為第十世薩木布瓦子特木爾圖胡魯克為第十一世特木爾圖胡魯克子克則爾和卓為第十二世克則爾和卓子錫喇里為第十三世錫喇里子錫喇瑪哈木特為第十四世錫喇瑪哈木特子瑪木特為第十五世瑪木特子素勒坦玉努斯為第十六世素勒坦玉努斯子素勒坦阿瑪特為第十七世素勒坦阿瑪特子素勒坦賽葉特為第十八世素勒坦賽葉特子阿布都里錫特為第十九世阿布都里錫特子阿布都喇伊木為第二十世阿布都喇伊木子巴巴汙為第二十一世巴巴汗子阿克巴錫為第二十二世阿克巴錫子素勒坦阿哈木特伊斯懇德爾為第二十三世素勒坦阿哈木特子莽蘇爾哈色木為第二十四世莽蘇爾子阿布都勒拉為第二十五世按青吉斯與元世祖同名其支屬為回部舊汗之子孫故首列卷内第二十五世以後式微無考相傳舊居天山北詳見後故事條𣲖噶木巴爾族屬秉持回教之祖派噶木巴爾為第一世派噶木巴爾同祖兄阿布塔拉布子阿里為第二世阿里子伊瑪木阿三伊瑪木鄂賽音為第三世伊瑪木鄂賽音子阿里阿克伯爾阿里阿斯嘠爾伊瑪木再努勒阿畢丁為第四世伊瑪木再努勒阿畢丁子伊瑪木瑪木特巴克爾為第五世伊瑪木瑪木特巴克爾子伊瑪木扎丕爾薩氐克為第六世伊瑪木扎丕爾薩氐克子伊瑪木木色伊喀則木為第七世伊瑪木木色伊克則木子伊瑪木阿里伊木西里雜為第八世伊瑪木阿里伊木西里雜子賽葉特塔里布為第九世賽葉特塔里布子賽葉特阿布都勒拉為第十世賽葉特阿布都勒拉子賽葉特阿布雜勒為第十一世賽葉特阿布雜勒子阿布都勒拉為第十二世阿布都勒拉子賽葉特阿哈瑪特為第十三世賽葉特阿哈瑪特子賽葉特瑪木特為第十四世賽葉特瑪木特子賽葉特沙喀三為第十五世沙喀三子沙額色尹為第十六世沙額色尹子賽葉特扎拉里丁為第十七世賽葉特扎拉里丁子阿布都勒拉賽葉特克瑪里丁瑪哈木特為第十八世賽葉特克瑪里丁子賽葉特布爾哈尼丁為第十九世賽葉特布爾哈尼丁子米爾氐𤓰納為第二十世米爾氐𤓰納子阿布雜勒賽葉特瑪木特為第二十一世賽葉特瑪木特子賽葉特克瑪勒賽葉特布喇尼丁賽葉特阿哈瑪特為第二十二世賽葉特布喇尼丁子賽葉特扎拉里丁為第二十三世賽葉特扎拉里丁子瑪哈圖木阿雜木漠羅克瑪木特為第二十四世瑪哈圖木阿雜木子瑪木特額敏多斯和卓巴哈古敦阿布都哈里克瑪木特伊布喇伊木伊薩木瑪木特阿里阿拉勒顔瑪木特色德克阿三沙伊赫和卓阿布都勒拉為第二十五世瑪木特額敏子哈色木木薩墨敏瑪木特玉素布多斯和卓子木斯塔帕為第二十六世瑪木特玉素布子伊達雅圖勒拉和卓喀喇瑪特和卓堪和卓木斯塔帕子烏什和卓為第二十七世伊達雅圖勒拉和卓子雅雅和卓阿布都色墨特瑪哈氐和卓阿三和卓布喇尼敦喀喇瑪特和卓子阿布都哈里克墨敏愛三烏什和卓子素賚滿為第二十八世雅雅和卓子霍集占瑪罕木特墨敏子木薩沙和卓阿里和卓阿布都勒拉額色尹帕爾薩素賚滿子阿布都喇滿為第二十九世瑪罕木特子波羅尼都霍集占木薩子瑪木特瑪木特額敏阿里布阿里和卓子圖爾都阿布都勒拉子阿克博托額色尹子克新和卓阿布都喇滿子阿布都訥色爾為第三十世按瑪罕木特子波羅尼都霍集占即大和卓木小和卓木兩逆酋也其第二十五世之巴哈古敦阿布都哈里克瑪木特伊布喇伊木伊薩木瑪木特阿里阿拉勒顔瑪木特色德克阿三沙伊赫和卓阿布都勒拉共十二支析居布哈爾痕都斯坦諸處第二十六世之哈色木後遷布哈爾木薩爾後遷拜勒哈世次不備載郡王霍集斯族屬始祖莽蘇爾為第一世莽蘇爾子尼賛為第二世尼賛子和錫塔伊布為第三世和錫塔伊布子阿贊為第四世阿贊子阿喇斯木爾蘇布哈色木為第五世阿喇斯子阿喇都噶布阿布都喇滿霍集斯玉木爾哈色木子色里木額敏和錫特伊布為第六世阿布都噶布子阿布薩塔爾阿布都海里克阿布都噶普爾阿布都喇滿子阿布都喇伊木阿布納斯霍集斯子漠咱帕爾呼達巴爾氐托克托索丕哈達爾瑪瑪達里阿布都拉玉木爾子和代巴爾氐瑪瑪特阿里索丕為第七世輔國公霍什克伯克族屬始祖阿錫木為第一世阿錫木子霍什克伯克為第二世霍什克伯克子哈色木為第三世哈色木子瑪瑪特阿布都拉為第四世瑪瑪特阿布都拉子阿瓦斯為第五世阿瓦斯子霍什克伯克木巴喇克沙木喀喇巴沙阿里木沙為第六世霍什克伯克子阿雜木沙阿竒木沙阿達勒沙哈里沙木巴喇克沙子里木沙為第七世阿雜木沙子阿濟資為第八世按霍集斯霍什克伯克族屬以新附居京師故悉其世次較詳附載派噶木巴爾之後霍什克伯克與其髙祖同名蓋回俗不知避諱耳字書回部與準噶爾接壤而其書特異共二十九字頭音里普音别平聲輕呼音貼平聲音色平聲音之木音哈音哈喉音音爾音雜爾音勒彈舌音音則平聲露齒輕音音森音音薩忒音雜忒與通用音伊忒喀喉音音伊雜哈喉音音阿音音阿音喉音音披野音喀普喉音音喀普唇音音拉摸音摸音弩音窪音赫伊音拉摸愛里普音呀按二十九字頭中凡音二字三字四五字者皆合讀成音後倣此六外字頭音黙忒音模則音忒失都忒音欽音同而稍輕音同而稍輕按