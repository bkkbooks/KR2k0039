故回部紀年自派噶木巴爾始至今乾隆四十四年己亥嵗共一千一百九十三年矣青吉斯汗一支相傳舊居天山北塔爾巴噶台阿勒台鄂拉額米爾薩里等處後其地為準部所有青吉斯汗子孫式㣲今塔爾巴噶台諸處無復回部支裔矣派噶木巴爾四子曰阿布勒哈色木伊畢喇伊木塔伊布塔伊爾俱早夭以女妻同祖兄子阿里是傳回教蓋同姓為婚回俗不禁也回部役屬準噶爾時舊曾遷闢展人户於烏什因以闢展地名名烏什之地如哈喇和卓森尼木魯克察克托克三洋赫布干連木齊木雅木什之屬至今彼此相同示不忘本意也元時回部有汗曰眉哩特木爾世居伊楞之地在今布哈爾西其旁沙賴子城有良匠喀瑪爾居之明史西域傳天方古筠沖地一名天堂又曰黙伽天方於西域為大國男子削髮以布纒之婦女則編髮蓋頭不露其面相傳回回設教之祖曰瑪哈木特舊作馬哈麻今改正者首于此地行教死即葬焉墓頂常有光日夜不熄後人遵其教久而不衰墓後有一井水清而甘泛海者必汲以行遇颶風取水灑之即息黙德那回回祖國也地近天方相傳其初國王瑪哈木特舊作謨罕驀德今改正生而神靈盡臣服西域諸國按山南回部自派噶木巴爾流傳至今紀年可考與明史所載首先行教之瑪哈木特世次先後莫詳意派噶木巴爾自其祖國東來為今山南回部之祖而瑪哈木特行教於天方祖國又當在派噶木巴爾之前也眀史舊稱馬哈麻即謨罕驀德皆瑪哈木特之訛附記庫車山洞中有漢字石刻方徑尺許用迴文折旋皆釋典語當屬唐時遺蹟其縁起無考回地歴代教主墓前多樹碑石名塔哩克塔實大書深刻與内地無殊惟不事墨搨流傳故回地有碑而無帖回書有名陀犁克者如内地之史字書名阿里卜回經名庫魯安醫書名惕普竒塔普農書名哩薩拉占候之書名魯斯納黙餘書凡數百種其流傳内地者絶少準噶爾人稱回人為和通稱和卓者有道行之謂稱阿琿者師長之謂亦有以人名其地者如哈喇和卓博爾海阿勒玉素布達烏圖之屬有以部落名其地者如庫車屬之特集克是也回部流傳有開元景德錢彼時未能臣服其地當自中國攜往者乾隆二十一年於吐爾番掘地得宋龍泉窑瓷盤一侍衛哈青阿幣易以進有御製詩恭載疆域門闢展屬條下魏文帝詔南方龍眼荔枝寜比西國蒲萄石蜜石蜜之稱不見他書今回果有名竒石蜜食者疑即此種竒石蜜食四字急讀當成石蜜耳有御製竒石蜜食詩恭載土産門我師平回部時所過回地桑椹豐碩甘美勝常營中取佐軍食士卒采摘風戾兼資糗糒向時回中桑椹從未有茂美若此者至今傳御製阿克蘇桑椹熟詩恭載土産門後漢書西域傳莎車將君得在于闐暴虐百姓患之眀帝永平三年其大人都末出城見野豕欲射之豕乃言曰無射我我乃為汝殺君得都末因此即與兄弟共殺君得耿恭傳恭於城疏勒城中穿井十五丈不得水吏士渇乏恭仰歎曰聞昔貳師將軍拔佩刀刺山飛泉湧出今漢德神眀豈有窮哉乃向井再拜為吏士禱有頃水泉奔出魏書髙車傳匈奴單于生二女姿容甚美國人皆以為神單于曰吾有此女安可配人將以與天乃于國北無人之地築髙臺置二女其上曰請天自迎之乃有一老狼晝夜守臺嘷呼因穿臺下為空穴經時不去其小女下為狼妻而産子後遂滋繁成國故其人好引聲長歌又似狼嘷北史西域傳疏勒國遣使送釋迦牟尼佛袈裟一長二丈餘帝以審是佛衣應有靈異遂燒之以驗虛實置于猛火之上經日不然人手足皆六指産子非六指者即不育按山南回部之地即漢西域之三十六國史傳引徵事蹟已分見於疆域門兹復撮舉未偹者數條附載卷末如耿恭拜井靈著飛泉久為西域典故至豕言狼産事近不經六指賦形尤非恒理而疏勒遣送佛衣亦與今回教不合記載流傳尚竒鬥詭類難徵信聊存之以備審正云欽定皇輿西域圖志卷四十八欽定四庫全書欽定皇輿西域圖志卷四十八
