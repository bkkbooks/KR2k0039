body:
  text: 山二天山正幹天山天山一名祁連一名雪山一名白山又名折羅漫山其山逺自葱嶺分支自喀什噶爾之北迤東而行經烏什阿克蘇庫車哈喇沙爾闢展之北又東行入鎮西府界至塔勒納沁而止皆曰天山東西綿亘三千餘里層峯叠嶂隨地異名蓋以百數其最著者自葱嶺分支東六百里為喀克沙勒鄂拉又東六百里為薩瓦布齊鄂拉又東三百里為木素爾鄂拉木素爾之為言雪也即古所謂雪山者也又東四百里為汗騰格里鄂拉騰格里之為言天也即古所謂天山者也又東五百里為納喇特達巴又東北三百里為額布圖達巴又東三百里為哈屯博克達鄂拉又東南五百里為阿拉癸鄂拉又北二百里為博克達鄂拉又東六百里入鎮西府境詳見卷二十山南大河横亘分支絶少山北自額布圖達巴分支西北行至庫隴奎格登諸鄂拉自鎮西府境分支東北行又折而西北至阿勒坦鄂拉即古金山皆自天山分脉有龍象回顧之勢於北天山全體形勢益増雄壯山海經三危山西三百五十里曰天山漢書西域傳西域南北有大山東西六千餘里自車師前王庭隨北山波河西行至疏勒為北道通典自張掖而西至於庭州相去三千五百六十里而山皆周徧唐書薛仁貴傳詔副鄭仁泰為鐵勒道行軍總管時九姓衆十餘萬令驍騎數十來挑戰仁貴發三矢輒殺三人於是虜氣懾皆降軍中歌曰將軍三箭定天山壯士長歌入漢闗九姓遂衰鐵勒有思結多覽葛等部先保天山及仁泰至懼而降地理志折羅漫山亦曰天山宋史外國傳髙昌西距西天歩路渉雪山䓗嶺皆數千里回鶻本國東至黄河西至雪山按天山東西三千餘里實止一山而漫嶺殊形稱名互異即西域傳所謂北山也通典自張掖至庭州者僅指廸化州迤東之山而言廸化州治即烏魯木齊固即唐庭州地也舊一統志稱天山一名白山自哈密東北境綿亘而西經闢展境又西入凖噶爾界殆三千餘里又西南與蔥嶺接其間土名不一當時西境半屬夷疆故第舉天山全局之通稱其自闢展以西或未及周知悉考今尺山寸石均入皇輿東西三千餘里不難按地周稽而南居回部北宅準夷保界荒􅑍形勢居最今舉大凡於此至其峯嶺之隨地異名者仍自鎮西府西出逐條分載焉額得墨克達巴額得墨克達巴在托來達巴西七百餘里闢展北為博克達迤東之支山察罕烏蘓納里特布拉克發源於其北麓山海經天山西二百九十里曰泑山西行百里至於翼望之山郭璞注翼望或作土翠山按山海經載天山注云即漢貳師擊右賢王處當指今哈密及鎮西府境内北山而言由是西行四百里内泑山翼望山以今道里計之應在今鎮西府以西額得墨克達巴以東天山正幹之内也博克達鄂拉博克達鄂拉在額得墨克達巴西天山最髙峯也東南距闢展二百里髙八里山脉自烏魯木齊東南之托克喇鄂拉折而東北行一百六十里髙峯突起為廸化州境東北一大屏障托克三郭勒發源南麓多倫庫里葉圖諸布拉克發源北麓乾隆二十年討凖噶爾二十二年追討阿睦爾撒納大兵道出其麓二十五年西域平軍旅凱旋咸祭告自是秩於祀典每嵗春日致祭告祭博克達鄂拉文朕恭承鴻業撫馭寰區康乂柔懐中外一視凖噶爾部落向逺王化簒弑相仍因而内亂達瓦齊又復殘虐其屬分崩離析人不聊生雖在殊荒均之赤子朕何忍不為拯救坐視阽危爰整王師分道並進今西路大兵道出神境惟神建標西域聳峙萬山形勢削成光靈燀赫尚其默相翼我明威期迅奏乎膚功永敉寧夫逺服䖍申昭告用布馨香惟神鑒焉乾隆二十年月日朕纘承祖緒中外一家撫順討逆式昭柔逺之模布徳宣威丕振詰戎之畧兹以西陲小醜負恩作叛煽惑邊疆實自外於生成斷難寛夫𠞰戮爰命定邊將軍喀爾喀扎薩克和碩親王成滚扎布整師鞠旅盡掃餘氛大軍道出神境惟神建標西域聳峙萬山形勢削成光靈燀赫尚其明昭翊應黙佑膚功期計日以執俘聿彰武績用寧邊而敷化誕擴鴻圖敬薦馨香惟神鑒格乾隆二十二年月日朕繼序丕基輯寧函夏遐方效順諸部歸心乃逆回霍集占波羅泥都者自我師定有伊犂㧞諸囚繫既負孤恩之惡尤干黨逆之誅朕命將移兵奉辭伐罪頻摧衆醜六師皆破竹而前屢克堅城萬里如建瓴而下逖聼者嚮風納降者恐後遂械貳負之尸獻防風之骨弟兄駢首申國憲於藁街逺近傾心撫皇輿於絶漠纘兩朝而蕆事未五載而告功仰頼洪庥實資黙贊曩者大軍燮伐宣威曽告山靈今兹重譯歸懐將禮用酬神貺右享還齊於嶽瀆西陲永奠於遐荒薦我馨香尚其歆格乾隆二十五年月日嵗祭博克達鄂拉文惟神作鎮西陲効靈中土出雲降雨隂陽肹蠁之功切漢憑霄龍虎縈回之勢邁祁連而聳秀嘉名並王㑹圖中指懸圃以建標顯位在大荒經外式昭有赫永奠無疆朕繼序重熈敉寧六合日月照臨之地盡入版圖乾坤覆載之區悉歸亭育萬類登諸仁夀百神攝以懐柔惟兹烏魯木齊實當勝地巴爾哈達舊接神臯山靈之保障斯存境内之屏藩攸寄幅員計里不殊左右户庭屯牧如雲遥接東西候尉是宜登之祀典載在禮官爰卜日於春初俾定期以時享升香瘞玉適均列嶽之班宣氣調神常峙塞垣之域式扶鼇紀丕鞏鴻圗用薦苾芬惟祈歆格魏書高昌傳北七十里有貪汗山夏有積雪此山北鐵勒界也隋書鐵勒傳大業元年突厥處羅可汗擊鐵勒諸部遂叛拒處羅立俟利發俟斤契弊謌楞為易勿真莫何可汗居貪汙山莫何勇毅絶倫伊吾髙昌焉耆諸國悉附之唐書突厥傳咄陸入冦伊州安西都䕶郭孝恪敗之咄陸以處月處密兵圍天山而不克回鶻傳西突厥處羅可汗之殺鐵勒諸酋也其下徃徃相率叛去推契苾哥楞為可汗據貪汗山按博克達鄂拉在鎮西府西闢展北鎮西府古伊州闢展古髙昌則博克達鄂拉當即髙昌北七十里之貪汗山咄陸可汗自伊州敗還而圍天山宜在此地也北史魏書唐書俱作貪汗山惟隋書作貪汙疑傳冩之訛托克喇鄂拉托克喇鄂拉在博克達鄂拉西南一百六十里廸化州東南五十里山脈自哲爾格斯鄂拉東行至此停蓄折而北即今廸化州東障也按漢書西域傳載蒲類國治天山西疏榆谷天山大形勢東西綿亘而曰在天山西者自今哲爾格斯鄂拉折而北由托克喇鄂拉至博克達鄂拉二百里間南北綿亘蒲類國固當倚其西麓則所謂疏榆谷者應在今托克喇鄂拉左右山谷之間其於方位為適相合也阿拉癸鄂拉阿拉癸鄂拉在托克喇鄂拉西南二十里廸化州南入東谷口西行一百三十里山深林密人馬登陟崖坎六十餘里徑轉險窄駝馬難行又七十里仍在谷内倚山一角有土城城内鑿山如梯狀為展闢西至裕勒都斯闗隘哲爾格斯鄂拉哲爾格斯鄂拉在阿拉癸鄂拉西北三十里迪化州南古爾班哲爾格郭勒出其西山脈自孟克圗達巴東北行四十里為烏可克達巴又東行三十里至此烏可克達巴烏可克達巴在哲爾格斯鄂拉西三十里為迪化州西南屛阿勒塔齊郭勒發源北麓唐書突厥傳賀魯冦廷州詔左武衛大將軍梁建方等擊之處月朱邪孤注者引兵附賊據牢山建方等攻之衆潰追行五百里斬孤注上首九千級虜其帥六十永徽四年即處月置金滿州按唐北庭都䕶府本廷州地理志作庭州以賀魯等部落置統縣四金滿輪臺後庭西海即以賀魯為瑤池都督處于廷州後賀魯犯西廷二州駱宏義請寛處月處蜜諸部専誅賀魯而處月朱邪孤注遂附賀魯據牢山及梁建方攻克後罷瑤池都督即處月部置金滿州隸北庭與廷州屬縣名同知其境地毗接今迪化州為唐北廷所屬之後庭金滿縣則當時處月附賀魯而據牢山應屬今迪化州南境之山托克喇阿拉癸哲爾格斯烏可克諸鄂拉達巴蓋必居一於此也孟克圖達巴孟克圖達巴在烏可克達巴西南四十里昌吉縣治南昌吉羅克倫兩郭勒發源北麓山脈自西北三百里之哈屯博克達鄂拉東行二百三十餘里逾登努勒台境折而東南五十餘里又東行約百餘里至此岡巒特峻哈屯博克達鄂拉哈屯博克達鄂拉在孟克圗達巴西北三百里綏來縣南哈布齊垓北哈齊克瑪納斯兩郭勒發源北麓多木達都哈布齊垓郭勒出其南山脈自額林哈畢爾噶鄂拉東南行六十里為古爾班多博克鄂拉又東四十里至此其高不及迪化州東境之博克達鄂拉而勢亦聳峻天山次高峰也唐書突厥傳咄陸以處月處蜜兵圍天山而不克郭孝恪抜處月俟斤之城抵遏索山降處蜜部而還按唐處月部為金滿州在北廷今為迪化州以東博克達鄂拉以北之地處蜜部居處月西在今瑪納斯郭拉左右當哈屯博克達鄂拉之北咄陸以處月處蜜兵進圍天山者迪化州東境之博克達鄂拉也孝恪追北之㑹先拔處月城後抵遏索山是遏索山必在處月之西為今之哈屯博克達鄂拉而處蜜居山之北兵至其境故降也古爾班多博克鄂拉古爾班多博克鄂拉在哈屯博克達鄂拉西四十里瑪納斯南哈布齊垓北烏蘭烏蘇發源北麓額林哈畢爾噶鄂拉額林哈畢爾噶鄂拉舊音額林哈畢爾罕在古爾班多博克鄂拉西北六十里和爾郭斯安濟哈雅兩郭勒發源北麓巴倫哈布齊垓郭勒出其南山脈自額布圖達巴東行二百二十里踰安濟哈雅至此乾隆二十二年討阿睦爾撒納遣官祭告二十四年西域平秩於祀典每嵗春秋致祭告祭額林哈畢爾噶鄂拉文朕寅紹丕基輯寧函夏荷百靈之效順美報必伸當萬里之奏功明禋咸秩惟神遐荒逈峙靈應夙昭髙埒天山逺通月􅙡屬當逆賊阿睦爾撒納負恩狡叛竄迹僑棲收拾殘黎誘招諸部復鴟張而起事旋蠶食以逞謀游牧至斯披猖寖甚鄰近皆濳為烏合逆酋漸欲肆螳當已而王旅驟加賊軍輒駭四山草木盡助聲威諸嶺風雲俱増叱咤奔鹿遂不遑擇䕃窮魚乃自絶遊魂雖追躡逋逃又閲時而竣事而摧拉枯朽實從此以振威信乎奉天討以出師明神咸祐茲者蕆武功而底績秩祀宜申用昭右序之文遣祠官而致享永作西陲之鎮鞏邊圉以敉寧乾隆二十二年月日嵗祭額林哈畢爾噶鄂拉文惟神保障遐方奠基西土層巒内拱在漠南綏靖之前協氣遥迎當閫外奮揚之日逐飛亷於塞外八公之草木皆兵示象鼎於寰中九牧之神姦悉化輯寧有地報享宜頒朕底定荒陬乂安絶域懐柔所及龍堆盡列於版圖撫馭攸加月窟咸通於聲教叛酋潰竄頭屢觸於不周勝旅先登尸遂陳夫貳負凡膚功之迅奏實靈效之克彰用奉明禋永垂嘉典峙金方而作鎮著神功於華嶽以西表翠障以為屏秩祀典於流沙之外尚其出雲降雨逺敷惠澤於邊疆惟茲酌醴牽牲敬念普存於帝力神其來格鑒此苾芬按是山在博克達鄂拉西八百里和屯博克達鄂拉西一百里博克達鄂拉尊如人首額林哈畢爾噶譯言硬助居元首之左右天山最高峰為博克達則左右山皆可謂之額林哈畢爾噶今其方言猶以此為博克達左右山之通稱兹據告祭所在定為哈屯博克達西百里之山而推其名義如此庫舎圖達巴庫舎圖達巴在額林哈畢爾噶鄂拉西南五十里巴倫哈布齊垓郭勒經其東麓山脈自額林哈畢爾噶鄂拉分支南行五十里至此又南少西五十里為們都招達巴又南少西一百里為鄂蘭逹巴又南少西五十里為額勒伯克鄂拉皆傍東裕勒都斯郭勒之東而繞於其南為天山正幹之分支們都招達巴們都招達巴在庫舎圖達巴西南五十里東裕勒都斯郭勒東嶺勢袤延南北相屬盡裕勒都斯東境鄂蘭達巴鄂蘭達巴在們都招達巴西南一百里東裕勒都斯郭勒南自們都招達巴南行五十里過東裕勒都斯郭勒發源處折而西五十里至其地額勒伯克鄂拉額勒伯克鄂拉在鄂蘭達巴西南五十里東裕勒都斯郭勒南自鄂蘭達巴西又南踰山口為裕勒都斯東西兩郭勒合流東注海都郭勒處烏爾圖布拉克出其南額布圖達巴額布圖達巴在額林哈畢爾噶鄂拉西三百里東裕勒都斯郭勒北額布圖郭勒發源北麓扎噶蘓台格納特烏里雅蘇台諸布拉克出其南山脈自伊犁南境之汗騰格里鄂拉東行五百里為納喇特達巴又東北六十里為烏得音郭勒達巴又東北五十里至此東西横亘其東南一支由額林哈畢爾噶鄂拉東行為廸化州南境之山其西北一支由哈喇古顔鄂拉西北行為伊犁北山額布圖達巴其分脈處也烏得音郭勒達巴烏得音郭勒達巴在額布圖達巴西南五十里東裕勒都斯郭勒西空格斯郭勒發源西麓山脈自納喇特達巴東行六十里折而北至此東谷口通裕勒都斯西谷口通空格斯東西谷口相距五十里納喇特達巴納喇特達巴在烏得音郭勒達巴南六十里空格斯南山脈自汗騰格里鄂拉由特克斯郭勒南折而北又南經西裕勒都斯郭勒北蜿蜒東走五百里至此又折而北汗騰格里鄂拉汗騰格里鄂拉在納喇特達巴西五百里特克斯郭勒發源北麓東北距伊犁一百五十里南距庫車三百里山脈自西南四百里之木素爾鄂拉東行分二支其北一支由圖斯庫勒東南折而東北至特克斯郭勒源南其南一支自拜賽喇木庫車之北折而北行逾西裕勒都斯郭勒發源處折而西與北一支合汗騰格里當其交㑹處山勢尊嚴羣巒環拱為天山之主峯唐書西突厥傳初曷薩那朝隋被留不遣乃共立達頭號射匱可汗建廷龜兹北之三彌山玉門以西諸國多役屬與東突厥亢按龜茲為今庫車迤北諸山汗騰格里為大應即唐時三彌山射匱可汗當建廷山北也額什克巴什鄂拉額什克巴什鄂拉在汗騰格里鄂拉南二百里山形寛廣産硫黄哈喇庫勒發源東南麓赫色勒郭勒東一源出西南麓又東一源出南麓是山為庫車北屏距庫車城百里山脈自木素爾鄂拉分支東南行百餘里為阿勒坦呼蘓鄂拉至此北與汗騰格里鄂拉合又東行一支接庫克納克達巴詳見天山南路魏書西域傳龜茲國西北大山中有如膏者流出成川行數里入地如䬾餬甚臭服之髪齒已落者能令更生病人服之皆愈隋西域傳白山一名阿羯山常有火及烟即是出碙砂之處唐書西域傳伊邏羅城北倚阿羯田山亦曰白山常有火按今庫車古龜兹地伊邏羅城唐龜茲國王居之則今庫車城北之額什克巴什鄂拉應即唐書龜茲國北之阿羯田山隋西域傳所稱阿羯山也史稱阿羯田山出碙砂今額什克巴什鄂拉産硫黄考本草石硫黄一名黄碙砂而字書無碙字疑碙砂即􅔈砂若魏書所云膏流如川能令齒髪更生愈病者今不可考矣又考宋王延徳髙昌行記載北廷北山中亦出碙砂有烟火則隋所謂阿羯山者又疑與今之廸化州為近阿勒坦呼蘇鄂拉阿勒坦呼蘇鄂拉在額什克巴什鄂拉西一百餘里赫色勒郭勒西一源出其南麓山脈自木素爾鄂拉東南行百餘里至此為賽喇木之北屏木素爾鄂拉木素爾鄂拉舊音穆薩爾在汗騰格里鄂拉西南四百里圖斯庫勒南拜城北哈喇烏蘇哈布薩朗郭勒發源東南麓木素爾郭勒兩源皆出其南麓綽爾噶布拉克都楚特郭勒阿察哈喇郭勒出其西山脈自西三百里之薩瓦布齊鄂拉東行至此峯巒峻抜氷雪嵯峩艱於行旅自鄂拉北東北行通伊犁乾隆二十五年秩於祀典毎嵗春秋致祭嵗祭木素爾鄂拉文惟神徳符艮止位在兊維秀甲羣峯拔地倚天之勢靈鍾絶徼出雲降雨之功匹蔥嶺以稱尊洵回中之巨鎮臨于闐而作障允塞外之隩區朕紹服丕基敉寧方夏渠搜即叙遂犁頡利之庭蒲海載清逺致防風之骨踰二萬里而獻㨗不四五年而成功維兹木素爾之山實隣阿克蘓之域曩者六師奏凱式彰黙佑之庥今兹百部屯田聿顯懐柔之應是用登之祀典載在秩宗練吉日以薦馨遣重臣而展告屐縣肇舉巍乎列嶽鎮之班肸蠁丕昭巋然作塞垣之固介以繁祉休有烈光陳此苾芬庶其歆格按古天山統名雪山即今西陲諸部氣候早寒自鎮西府以西髙巖積雪所在多有而阿克蘇城東北木素爾鄂拉勢尤聳崒飛花攢玉倍於他嶺是以雪山雖天山之通稱而兹嶺専有其名也薩瓦布齊鄂拉薩瓦布齊鄂拉在木素爾鄂拉西南三百里圖斯庫勒南阿克蘓北庫克墨爾根郭勒發源南麓山脈自喀克沙勒鄂拉東北行二百三十里為伯得里克鄂拉又東北二百四十里為卓哈達巴又東二百里至此岡嶺層㳫綿亘東北境凡七百里唐書西域傳漢姑墨國西三百里度石磧至凌山蔥嶺北原也水東流冬夏山谷積雪按唐書西域傳稱自龜兹贏六百里有䟦禄迦一曰亟墨即漢姑墨國又三百里至凌山是凌山在龜茲西九百里也今薩瓦布齊鄂拉在庫車西北七百里似所謂凌山尚在其西然考唐書又云凌山西北五百里至素葉水城在今圖斯庫勒西則唐之凌山又當在今圖斯庫勒之南與薩瓦布齊鄂拉之方位適合更以東西七百餘里中大局考之東為木素爾郭勒西為托什干達里雅皆出北山麓而東流自木素爾鄂拉以西嶺多雪難行皆與唐書所謂水東流春夏積雪者相合是唐之凌山即不定為薩瓦布齊鄂拉亦必在薩瓦布齊迤西一帶自庫車西行數百里之間也卓哈達巴卓哈達巴在薩瓦布齊鄂拉西南二百里阿克蘇之西北特木爾烏蘓郭勒出其東唐書地理志温肅州西北三十里至粟樓烽又四十里度拔達嶺按今阿克蘓為古温肅卓哈達巴在其西北應即温肅州西北粟樓烽㧞達嶺之舊地伯得里克鄂拉伯得里克鄂拉在卓哈達巴西南二百四十里烏成庫什達巴烏成庫什達巴在伯得里克鄂拉西一百里烏什之西托什干達里雅出其東喀克沙勒鄂拉喀克沙勒鄂拉在伯得里克鄂拉西南二百三十里自額圖克達巴東北行至此踰山而北通布魯特境山南為喀什噶爾南北相距各三百餘里額圖克達巴額圖克達巴在喀克沙勒鄂拉西南三百里踰山而北通布魯特境山南為喀什噶爾山脈自蔥嶺分支由烏魯阿喇特達巴東北行三百里至此哈喇鄂拉哈喇鄂拉在額圖克達巴西北為其支山博羅和什郭勒木什諤斯騰特們郭勒發源南麓按蔥嶺分支自額圖克達巴東行為木素爾鄂拉又東為汗騰格里鄂拉又為博克達鄂拉又東入鎮西府境極於塔勒納沁鄂拉東西三千餘里為天山正幹其南北諸山皆從此分支故别叙於天山南北路諸山之首欽定皇輿西域圖志卷二十一欽定四庫全書欽定皇輿西域圖志卷二十一
