  text: 疆域六天山北路三伊犂西路和爾郭斯哈討摩垓圖哲克得雅木勒克察臣哈喇哈喇塔勒達蘭呼都克托博隴庫克車勒圖古里克庫爾圖古爾班阿里瑪圖塔拉噶爾圖爾根古爾班察畢達爾古爾班沙濟垓塔拉錫克沙圖庫爾墨圖古爾班呼蘇台古爾班薩薩春濟庫納薩爾烏蘭哈勒噶濟爾噶朗圖爾根阿察古爾班哲爾格斯阿爾沙圖特布克野特庫斯招哈古爾班伊勒噶齊巴勒滚塔瑪噶托薩爾通阿克賽烘郭爾鄂籠科什噶爾裕勒阿里克什巴爾圖和碩吹薩勒竒圖沙木什格格圖布拉納阿什圖達布蘇圖阿爾察克圖伊蘭巴什庫努克薩爾索郭魯克哈喇巴勒圖古爾班哈納圖阿什布里和爾衮英噶爾伯得里克額得墨克塔拉斯烏勒木木納爾薩爾巴噶什欽定皇輿西域圖志卷十三目録欽定四庫全書欽定皇輿西域圖志卷十三目録疆域六天山北路三伊犂西路和爾郭斯哈討摩垓圖哲克得雅木勒克察臣哈喇哈喇塔勒達蘭呼都克托博隴庫克車勒圖古里克庫爾圖古爾班阿里瑪圖塔拉噶爾圖爾根古爾班察畢達爾古爾班沙濟垓塔拉錫克沙圖庫爾墨圖古爾班呼蘇台古爾班薩薩春濟庫納薩爾烏蘭哈勒噶濟爾噶朗圖爾根阿察古爾班哲爾格斯阿爾沙圖特布克野特庫斯招哈古爾班伊勒噶齊巴勒滚塔瑪噶托薩爾通阿克賽烘郭爾鄂籠科什噶爾裕勒阿里克什巴爾圖和碩吹薩勒竒圖沙木什格格圖布拉納阿什圖達布蘇圖阿爾察克圖伊蘭巴什庫努克薩爾索郭魯克哈喇巴勒圖古爾班哈納圖阿什布里和爾衮英噶爾伯得里克額得墨克塔拉斯烏勒木木納爾薩爾巴噶什欽定皇輿西域圖志卷十三目録欽定四庫全書欽定皇輿西域圖志卷十三疆域六天山北路三伊犂西路自伊犂西北行北至巴勒喀什淖爾西至吹塔拉斯俱連沙磧通藩屬右哈薩克界東北接藩屬左哈薩克界東接伊犂東路界南至天山逾山接天山南路阿克蘇烏什界和爾郭斯和爾郭斯在伊犂西一百三十里有屯田自和爾郭斯西北行六十里為竒齊克又西行六十里為奎屯又南行六十里為惠畨又自奎屯西北行六十里為博羅呼濟爾又自奎屯西行九十里至烘和爾鄂籠皆在伊犂郭勒北境層山枕疊地當險要並設卡倫於此又西為庫隴奎鄂拉哈討哈討在伊犂郭勒北岸庫隴奎鄂拉南五十里摩垓圖摩垓圃在哈討東北一百里庫克烏蘇哈喇塔勒兩河之間哲克得哲克得在摩垓圖東北八十里踰河至其地雅木勒克雅木勒克在哲克得西北六十里察臣哈拉察臣哈拉在雅木勒克西北五十里兩河之間北傍巴勒喀什淖爾哈喇塔勒哈喇塔勒在巴勒喀什淖爾南格登鄂拉北達蘭呼都克達蘭呼都克在哈喇塔勒西二十里巴勒喀什淖爾南格登鄂拉北五十里托博隴托博隴在巴勒喀什淖爾南舊為準噶爾額爾克騰部拓克游牧處庫克車勒庫克車勒在巴勒喀什淖爾南阿勒垣額墨爾鄂拉北圖古里克圖古里克在庫克車勒南一百里伊犂郭勒北唐書突厥傳咄陸可汗弟同娥設立為沙鉢羅咥利失可汗後西部自立欲谷設為一毗咄陸可汗乃因伊列河約諸部河以西授令於咄陸其東咥利失主之自是西突厥又分二國矣按唐時沙鉢羅咥利失可汗分國為十部居碎葉東西是咥利失初轄之境甚廣至西部復立乙毗咄陸可汗之後乃因伊列河為界咥利失僅主河東之地今自哈討至圗古里克属伊犂郭勒東北境是在唐時伊列河東者宜為西突厥既分二國之後咥利失所轄之西境也庫爾圖庫爾圖在伊犂郭勒南二十里踰一支河至其地舊為準噶爾布庫斯鄂拓克游牧處古爾班阿里瑪圖古爾班阿里瑪圖在伊犂郭勒南庫爾圖東二十里踰兩支河至其地舊屬準噶爾庫本諾雅特部鄂齊爾烏巴什之昻吉塔拉噶爾塔拉噶爾在伊犂郭勒南阿里瑪圗東四十里踰一支河至其地地有三泉圗爾根圗爾根在伊犂郭勒南岸塔拉噶爾東二十里踰一支河至其地舊為凖噶爾多果魯特鄂拓克㳺牧處古爾班察畢達爾古爾班察畢達爾在伊犂郭勒南岸圖爾根東三十里古爾班沙濟垓古爾班沙濟垓郭勒南岸古爾察畢達班察畢達爾東三十里地有三泉塔拉錫克塔拉錫克在伊犂郭勒南二百里踰阿克固雅斯郭勒塔拉錫克郭勒至其地沙圖沙圖在塔拉錫克南六十里踰河至其地西為烏蘭烏蘇東為鄂台郭勒庫爾墨圖庫爾墨圖在沙圖西三十里古爾班呼蘇台古爾班呼蘇台在庫爾墨圖西三十里古爾班薩里古爾班薩里在古爾班呼蘇台西三十里唐書突厥傳沙鉢羅咥利失可汗分其國為十部部以一人統之人授一箭號十設亦曰十箭為左右左五咄禄部置五大啜居碎葉東右五弩失畢部詳見後額得墨克條又賀魯已滅突騎施阿利施部為絜山都督府按唐時碎葉川為今之圖斯庫勒詳見水突厥咥利失可汗置五大咄所謂五咄陸部居碎葉東者當在今圖斯庫勒之東跨伊犂郭勒左右也五咄陸部中突騎施索葛莫賀部為嗢鹿州都督府突騎施阿利施部為絜山都督府嗢鹿州都督府在今伊犂説見前卷其絜山都督府必與嗢鹿毗連者今自哈討至古爾班薩里凡屬伊犂郭勒下流左右環抱水草豐饒之境其為絜山都督府地可知又考突厥傳其後西部别立乙毗咄陸可汗因伊列河約諸部河西受令於咄陸在今則自伊犂郭勒西至圖斯庫勒吹塔拉斯諸地皆乙毗咄陸可汗所轄而附近伊犂西南岸自奎屯庫爾圖至古爾班薩里一帶應屬乙毗咄陸可汗所轄之東境也又按突騎施烏質勒以碎葉川為大牙伊麗水為小牙兩牙之間皆其故壤其在于今則自伊犂郭勒至圖斯庫勒又當為烏質勒地以上自伊犂西北行至巴勒喀什淖爾之路春濟春濟在伊犂西南三百里又西南六十里為塔木哈又西南行一百里為特木爾里克又南行三十里至格根又南行四十里為呼圖克拜又南行二十里為鄂爾和珠爾又南行四十里為哈爾竒拉山谷聮延並設卡倫是為伊犂西南境又南踰山接回部賽喇木界庫納薩爾庫納薩爾在伊犂西南二百里特克斯郭勒發源處烏蘭哈勒噶烏蘭哈勒噶在庫納薩爾西二百里西北距圖斯庫勒一百里濟爾噶朗濟爾噶朗在烏蘭哈勒噶東南十里踰一小嶺至其地西北距圖斯庫勒一百餘里圖爾根阿察圖爾根阿察在濟爾噶朗西南二十里踰一支河至其地西北距圖斯庫勒一百里古爾班哲爾格斯古爾班哲爾格斯在圖爾根阿察西北五十里西北距圖斯庫勒五十里地有三泉出南山咸滙入於圖斯庫勒又自此西行至烘郭爾鄂籠凡圖斯庫勒南岸地總名特木爾圖其南境為天山正幹之木素爾鄂拉薩瓦布齊鄂拉阿爾沙圖阿爾沙圖在圖斯庫勒東南岸相傳其地有温泉特布克特布克在圖斯庫勒東岸支河之間野特庫斯野特庫斯在阿爾沙圖西三十里東為哈喇郭勒西為大小烏蘭烏蘇招哈招哈在圖斯庫勒南岸野特庫斯西四十里踰大小烏蘭烏蘇至其地古爾班伊勒噶齊古爾班伊勒噶齊在圖斯庫勒南岸招哈西三十里巴勒滚巴勒滚在圖斯庫勒南岸古爾班伊勒噶齊西二十里塔瑪噶塔瑪噶在巴勒滚西二十里托薩爾托薩爾在圖斯庫勒南岸塔瑪噶西十五里踰一支河至其地通通在圖斯庫勒南岸托薩爾西十五里踰一支河至其地阿克賽阿克賽在圖斯庫勒南岸通西二十里踰一支河至其地烘郭爾鄂籠烘郭爾鄂籠在圖斯庫勒南岸阿克賽西二十里踰一支河至其地又西為烏布什布拉克又西為鄂拉郭勒自阿爾沙圖至此東西四百里之間水草豐饒地宜游牧舊為準噶爾和碩特部沙克都爾曼濟之昻吉科什噶爾科什噶爾在圖斯庫勒西岸裕勒阿里克裕勒阿里克在圖斯庫勒西岸什巴爾圖和碩什巴爾圖和碩在圖斯庫勒東岸南北兩支河之間又西五十里為哈喇諾海又西三十里為沙圖又西五十里為庫爾墨圗又西四十里為推圖墨克又西三十里為察伊巴哈圗又西三十里為和岳爾察罕烏蘇又西四十里為古爾班薩里又西四十里為古爾班克敏皆圖斯庫勒北岸地水草之利遜於南岸唐書王方翼傳方翼築碎葉城面三門紆環多趣以詭出入五旬畢西域胡縱觀莫測其方畧地理志北庭都䕶府注渡伊麗河一名帝帝河至碎葉界又西行千里至碎葉城又碎葉川口八十里至裴羅將軍城又西二十里至碎葉城北有碎葉水突厥傳定方追賀魯至碎葉水盡奪其衆突騎施烏質勒屯碎葉西北稍攻得碎葉即徙其牙居之謂碎葉川大牙弓月城其城東隣北突厥西諸胡東直西庭州盡并斛瑟羅地其子嗢鹿州都督娑葛後與弟遮弩分治其部遮弩叛歸默啜默啜擊娑葛禽之并殺遮弩突騎施别種車鼻施啜蘇禄者裒拾餘衆復雄西域開元五年始來朝授右武衛大將軍突騎施都督蘇禄子吐火仙骨啜為可汗居碎葉城磧西節度使盖嘉運率石王史王共擊蘇禄子破之碎葉城吐火仙棄旗走禽之西域傳䟦禄迦西北五百里至素葉水城比國胡商雜居細葉川西有碎葉城按唐碎葉水為今之圖斯庫勒詳見水所謂碎葉城當在今圖斯庫勒南水豐草饒之地當時賀魯西遁跳渡伊麗水是以定方追之至於碎葉而奪其衆也突騎施屯碎葉西北當在今圖斯庫勒西北境所謂攻得碎葉而徙其牙居之者應即碎葉水南之碎葉城然考烏質勒傳攻得碎葉之後以碎葉水為大牙伊麗水為小牙疑當時烏質勒舊屯伊麗水西西攻得碎葉而徙為大牙因以舊屯為小牙則舊屯當在碎葉東北西字係東字之訛也裴羅將軍者回紇骨力裴羅初與葛邏禄稱左右葉䕶後襲破拔悉密自稱骨咄禄毗伽闕可汗又攻殺突厥白眉可汗遣上功拜左驍衞員外大將軍當時必曽建城於碎葉川口故稱裴羅將軍城又二十里至碎葉城是兩城東西相距不逺咸在水南所謂西行千里至碎葉城者自伊麗河至城及千里也地理志云碎葉城北有碎葉水又云城在川西者縁碎葉川支流四出西北通吹郭勒吹郭勒經流千里其甫出圖斯郭勒二三百里間亦得名碎葉水也唐䟦禄迦即漢姑墨在今賽喇木拜諸城之西當圖斯庫勒東南境西北至圖斯庫勒之南山徑紆迴約五百餘里亦與唐書西域傳跋禄迦西五百里至素葉水城之説合至王方翼築碎葉應即素葉水城唐書地理志載入焉耆都督府下者因當時方翼為安西都䕶焉耆都督府亦𨽻安西故誤及之耳吹吹在吹郭勒南岸自圖斯庫勒西北二百里之薩勒竒圖又西北行五百餘里統曰吹其地水草豐饒最宜游牧其東北境為伊爾該圖鄂拉又北踰山即左哈薩克界薩勒竒圖薩勒竒圖在吹郭勒南岸支河之間東南距圖斯庫勒二百里沙木什沙木什在吹郭勒南岸薩勒竒圖西二十里踰一支河至其地格格圖布拉納格格圖布拉納在吹郭勒南岸沙木什西三十里兩水之間踰兩支河至其地阿什圖阿什圖在吹郭勒南岸格格圖布拉納北支河之間近傍吹郭勒東為烏蘭烏蘇達布蘇圖達布蘇圖在吹郭勒南岸阿什圖西南三十里支河之間阿爾察克圖阿爾察克圖在吹郭勒南岸達布蘇圖西三十里支河之間伊蘭巴什伊蘭巴什在吹郭勒南岸阿爾察克圖西南五十里踰一支河至其地庫努克薩爾庫努克薩爾在吹郭勒南岸阿爾察克圖西四十里支河之間索郭魯克索郭魯克在大郭勒南岸庫克薩爾西三十里支河之間其西境支河名察罕烏蘇哈喇巴勒圖哈喇巴勒圖在吹郭勒南岸索郭魯克西三十里支河之間踰烏蘭烏蘇至其地古爾班哈納圖古爾班哈納圖在吹郭勒南岸哈喇巴勒圖西三十里阿什布里阿什布里在吹郭勒南岸古爾班哈納圖西南五十里兩支河之間又西南有河名墨爾根郭勒和爾衮和