有碎葉水突厥傳定方追賀魯至碎葉水盡奪其衆突騎施烏質勒屯碎葉西北稍攻得碎葉即徙其牙居之謂碎葉川大牙弓月城其城東隣北突厥西諸胡東直西庭州盡并斛瑟羅地其子嗢鹿州都督娑葛後與弟遮弩分治其部遮弩叛歸默啜默啜擊娑葛禽之并殺遮弩突騎施别種車鼻施啜蘇禄者裒拾餘衆復雄西域開元五年始來朝授右武衛大將軍突騎施都督蘇禄子吐火仙骨啜為可汗居碎葉城磧西節度使盖嘉運率石王史王共擊蘇禄子破之碎葉城吐火仙棄旗走禽之西域傳䟦禄迦西北五百里至素葉水城比國胡商雜居細葉川西有碎葉城按唐碎葉水為今之圖斯庫勒詳見水所謂碎葉城當在今圖斯庫勒南水豐草饒之地當時賀魯西遁跳渡伊麗水是以定方追之至於碎葉而奪其衆也突騎施屯碎葉西北當在今圖斯庫勒西北境所謂攻得碎葉而徙其牙居之者應即碎葉水南之碎葉城然考烏質勒傳攻得碎葉之後以碎葉水為大牙伊麗水為小牙疑當時烏質勒舊屯伊麗水西西攻得碎葉而徙為大牙因以舊屯為小牙則舊屯當在碎葉東北西字係東字之訛也裴羅將軍者回紇骨力裴羅初與葛邏禄稱左右葉䕶後襲破拔悉密自稱骨咄禄毗伽闕可汗又攻殺突厥白眉可汗遣上功拜左驍衞員外大將軍當時必曽建城於碎葉川口故稱裴羅將軍城又二十里至碎葉城是兩城東西相距不逺咸在水南所謂西行千里至碎葉城者自伊麗河至城及千里也地理志云碎葉城北有碎葉水又云城在川西者縁碎葉川支流四出西北通吹郭勒吹郭勒經流千里其甫出圖斯郭勒二三百里間亦得名碎葉水也唐䟦禄迦即漢姑墨在今賽喇木拜諸城之西當圖斯庫勒東南境西北至圖斯庫勒之南山徑紆迴約五百餘里亦與唐書西域傳跋禄迦西五百里至素葉水城之説合至王方翼築碎葉應即素葉水城唐書地理志載入焉耆都督府下者因當時方翼為安西都䕶焉耆都督府亦𨽻安西故誤及之耳吹吹在吹郭勒南岸自圖斯庫勒西北二百里之薩勒竒圖又西北行五百餘里統曰吹其地水草豐饒最宜游牧其東北境為伊爾該圖鄂拉又北踰山即左哈薩克界薩勒竒圖薩勒竒圖在吹郭勒南岸支河之間東南距圖斯庫勒二百里沙木什沙木什在吹郭勒南岸薩勒竒圖西二十里踰一支河至其地格格圖布拉納格格圖布拉納在吹郭勒南岸沙木什西三十里兩水之間踰兩支河至其地阿什圖阿什圖在吹郭勒南岸格格圖布拉納北支河之間近傍吹郭勒東為烏蘭烏蘇達布蘇圖達布蘇圖在吹郭勒南岸阿什圖西南三十里支河之間阿爾察克圖阿爾察克圖在吹郭勒南岸達布蘇圖西三十里支河之間伊蘭巴什伊蘭巴什在吹郭勒南岸阿爾察克圖西南五十里踰一支河至其地庫努克薩爾庫努克薩爾在吹郭勒南岸阿爾察克圖西四十里支河之間索郭魯克索郭魯克在大郭勒南岸庫克薩爾西三十里支河之間其西境支河名察罕烏蘇哈喇巴勒圖哈喇巴勒圖在吹郭勒南岸索郭魯克西三十里支河之間踰烏蘭烏蘇至其地古爾班哈納圖古爾班哈納圖在吹郭勒南岸哈喇巴勒圖西三十里阿什布里阿什布里在吹郭勒南岸古爾班哈納圖西南五十里兩支河之間又西南有河名墨爾根郭勒和爾衮和爾衮在吹郭勒下流南岸東傍支河西連沙磧自薩勒竒圖至此東西五百里南北三百里舊為準噶爾訥黙庫濟爾噶爾巴圖爾烏巴什和通額默根之昻吉唐書西域傳細葉川長千里有異姓突厥兵數萬耕者皆環甲相掠為奴婢按細葉川長千里應即碎葉水之西北出者在今則為吹郭勒自圖斯庫勒西北出經流千餘里入於和什庫勒者也吹郭勒之南水草豐饒當為異姓突厥居處英噶爾英噶爾在圖斯庫勒西南二百餘里踰山而至伯得里克伯得里克在英噶爾西南一百里自英噶爾至此又西行三百里四圍皆山中渟大澤名森格爾淖爾宅幽勢敞東西五百里南北三百里頗占形勝其南百里跨山至托什干達里雅通回部之烏什城唐書西域傳石東南千餘里有㧊扞者山四環之地膏腴多馬羊西千里距堵利瑟那東臨素葉水水出䓤嶺北原西北流入大磧望大山尋遺胔知所指五百餘里即康也按唐石國地為漢大宛北鄙當在今塔拉斯郭勒之西英噶爾伯得里克在其東南相距可千里又東北與圖斯庫勒鄰接圖斯庫勒即古素葉水其地山形合沓按之史傳所紀大畧可見則英噶爾西五百里之地為㧊捍故壤當不誣也額得墨克額得墨克在圖斯庫勒西四百里南臨額得墨克達巴烏可克達巴即塔拉斯郭勒上流發源處唐書西域傳五努失畢部居碎葉西努失畢部有五俟斤曰阿悉結闕俟斤哥舒闕俟斤㧞塞幹暾沙鉢俟斤阿悉結泥孰俟斤哥舒處半俟斤西域傳素葉城西四百里至千泉地贏二百里南雪山三垂平陸多泉池因名之突厥可汗嵗避暑其中羣鹿飾鈴鐶可狎也按今圖斯庫勒為碎葉川即素葉水額得墨克居其西應屬唐時五弩失畢部地突厥傳所謂五俟斤居碎葉西者也又自圖斯庫勒至塔拉斯郭勒約四百里與唐書素葉城西四百里至千泉之説合額得墨克一帶即塔拉斯郭勒上游支流所彚處南倚額得墨克達巴烏可克達正所謂突厥可汗避暑處南雪山而多泉池者塔拉斯塔拉斯即塔拉斯郭勒下流左右濵河之地舊為準噶爾都爾伯特部游牧處伯什阿哈什之昻吉西境有巴噶布魯勒鄂拉伊克布魯勒鄂拉有阿爾沙郭勒阿克庫勒淖爾必庫勒淖爾唐書突厥傳統葉䕶可汗勇而有謀戰輙勝因并鐵勒下波斯罽賔控弦數十萬徙庭石國北之千泉遂霸西域諸國按唐之千泉經流廣遠今塔拉斯郭勒上流自額得墨克下流西北行千餘里在唐總曰千泉石國為大宛北鄙地更偏西今突厥傳云石國北之千泉是統葉䕶可汗建庭之處應在塔拉斯郭勒下游之西故云在石國北也又唐書載有怛邏斯城與塔拉斯音相近方位亦符説詳後條烏勒木木納爾烏勒木木納爾在塔拉斯郭勒上游西百里東距圖斯庫勒五百里又西北百里為特木爾哈巴哈納唐書西域傳千泉西贏百里至咀邏私城亦比國商胡雜居有小城三百本華人為突厥所掠羣保此尚華語又細葉川西屬怛邏斯城石常分兵鎮之突厥傳蘇禄子吐火仙骨啜為可汗居碎葉城引黒姓可汗尒㣲特勒保怛邏斯城磧西節度使盖嘉運和撫突騎施拔汗那西方諸國率石王莫賀咄吐屯史王斯謹提擊吐火仙禽之䟽勒鎮守使夫䝉靈詧挾鋭兵與拔汗那王掩怛邏斯城斬黒姓可汗與其弟撥斯入曵建城回鶻傳至徳後葛邏禄寖盛與回紇争彊徙十姓可汗故地盡有碎葉怛邏斯諸城按唐書西域傳稱咀邏私城在千泉西百里又稱細葉川西属怛邏斯城怛邏斯即今塔拉斯邏與拉音之轉咀與怛字之訛也唐時千泉在素葉城西四百里怛邏斯城當在素葉城西五百里惟是兩城相距不逺是以吐火仙與黒姓可汗倚為聲援而葛邏禄盡有碎葉怛邏斯城亦連類及之也城郭遺址雖無可考然按其方隅証以道里圖斯庫勒為碎葉水塔拉斯郭勒為千泉碎葉城既近碎葉水則怛邏斯城當近千泉其地宜在今塔拉斯郭勒西境烏勒木木納爾特墨爾哈巴哈納等處也曵建城無可考應亦與怛邏斯城相逺薩爾巴噶什薩爾巴噶什在烏勒禾木納爾西南四百里西至有哈喇布拉達巴又西北踰哈喇布拉郭勒有小澤曰明布拉克南踰山嶺入布魯特界唐書西域傳咀邏私即怛邏斯城西南贏二百里至白水城原隰膏腴南五十里有笯赤建國又二百里至石國按怛邏斯城既在特墨爾哈巴哈納烏勒木木納爾一帶則薩爾巴噶什正當其西南境二百里外白水故城當在於此笯赤建國於他史無考然為南五十里之國而其地復廣當踰山而南矣又按唐書突厥傳蘇定方追賀魯至碎葉水賀魯咥運至石國蘇咄城城主伊湼達干迎之拘送石國又西域傳稱石為漢大宛北鄙東北距西突厥圓千餘里在千泉之南故康居小王窳匿城地是石國故疆當在塔拉斯郭勒下游之南烏勒木木納爾薩爾巴噶什西境由是西北入右部哈薩克界南踰山入安集延諸部界則所謂故康居窳匿城地居大宛北鄙者皆可以次而考詳見第四十四四十五卷藩屬以上自伊犂西行至吹塔拉斯之路欽定皇輿西域圖志卷十三
