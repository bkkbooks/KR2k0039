body:
  text: 風俗準噶爾部事佛厄魯特俗尚黃教凡決疑定計必咨於喇嘛而後行自台吉宰桑以下或頂禮膜拜焉得其一撫摩一接手者以為大福後噶爾丹䇿凌建佛寺於伊犁河濵在河北者曰固爾扎廟在河南者曰海努克廟髙剎摩霄金幡耀日棟甍宏敞象設莊嚴聚集喇嘛居此二寺暮鼓朝螺梵唄清越令五鄂拓克輪值供養喇嘛中之坐牀者名西勒圖即掌教都綱也禮佛之儀衆喇嘛偏袒脫禈露肩及臀以是為致敬云人生六七嵗即令識喇嘛字誦喇嘛經病則先延喇嘛諷經然後延額摩竒服藥其醫書名曰額默音蘇都爾若大台吉有事集喇嘛誦經則十六鄂拓克二十一昻吉及回部頭目俱輸貨物以為禮御製伊犁喇嘛行蒙古之教宿尚黃宗喀巴以來三百餘年其流長昔顧實汗以此雄據衛藏攝羣部然亦不過假名敬佛要乃所以收衆方強吞弱噬互攘竊無不垂涎達賴喇嘛貌為恭敬其實心弗良䇿妄阿拉布坦創據伊犁有弗遑然已計入西藏肆披猖逮噶爾丹䇿凌遂興黃教名曰安衆生叶亦效西域建都綱都綱者西藏衆喇嘛聚而誦經之室也白氊為室布為墻後遂範金作瓦覆棟梁金仙相好備嚴莊六時梵唄聲無央塔本集賽供餱糧噶爾丹䇿凌於伊犁河濵創構佛寺北曰固爾札南曰海努克聚集喇嘛令其五鄂拓克輪值供養之蒙古語謂五為塔本輪值為集賽西勒圖者凡四牀喇嘛坐牀者為西勒圖亦蒙古語膜拜台吉諸宰桑其善在此其弊即為殃喇嘛達爾濟及達瓦齊相繼篡立無不藉諸喇嘛之力以肆強逆賊阿睦爾撒納亦結若輩為黨以煽亂其窮竄也旋劫奪喇嘛馬駝用致逺去揚喇嘛散去乃同嗎哈沁蒙古謂肉為嗎哈厄魯特中貧無賴覔肉食自活者為嗎哈沁安知五戒六度如佛所云皮肉骨髓盡捨以救人飢荒是誠楞嚴所謂外道貌佛弟子為譸張勿謂佛不慈汝俾汝遭喪亡側身西望爰作伊犁喇嘛行漢書西域傳昔丐奴破大月氏大月氏西君大夏而塞王南君罽賓塞種分散往往為數國師古曰即所謂釋種者也亦語有輕重耳烏孫本塞地也塞王南越縣度大月氏居其地後烏孫昆莫擊破大月氏大月氏徙西臣大夏而烏孫昆莫居之故烏孫民有塞種大月氏種云北史突厥傳西突厥以五月中旬集他人水拜祭天神敬鬼神信巫唐書回鶻傳堅昆國祠神惟主水草祭無時呼巫為甘按顔師古注漢書以塞種為釋種則烏孫故壤民奉佛教由來久矣然北史稱西突厥唐書稱黠戛斯皆祠天神又與今回部事天之俗相近若今之宗喀巴黃教殆即漢時塞種之流𣲖而衍盛於山北者歟畜牧準噶爾全境不乏泉甘土肥種宜五榖之處然不尚田作惟以畜牧為業擇豐草緑縟處所駐牙而遊牧焉各有分地問富強者數牲畜多寡以對飢食其肉渴飲其酪寒衣其皮馳驅資其用無一事不取給於牲畜儲糧峙粻之計所弗屑也欲粒食則因糧於回部回部當穀麥收穫時苦其鈔掠嵗納什之三四以為常準噶爾因是不惟賦稅之且役屬之然嵗賦之糧僅充酋豪饘粥而已達官貴人夏日食酪漿酸乳麥飯冬日食牛羊肉榖飯貧人但飲乳茶亦足度日畜牧之外以熬茶西藏為要務性喜射獵第持弓彀矢罕有巧力勝者喜放雕鶻恆擇高處就下放之其居處夏擇平原冬居暖谷無恆所漢書西域傳烏孫不田作種樹隨畜逐水草與丐奴同俗後漢書西域傳蒲類國廬帳而居逐水草頗知田作移支國隨畜逐水草不知田作北史高車傳其遷徙隨水草突厥傳西突厥居無恆處多在烏孫故地其俗隨逐水草以畜牧射獵為事食肉飲酪移徙無常而各有地分鐵勒傳厥居無恆所隨水草流移近西邊者頗為藝植唐書突厥傳隨水草射獵居處無常回鶻傳逐水草轉徙善騎射喜盜鈔五代史四裔傳回鶻以橐駝耕而種按準部之於牲畜如蠶桑五穀厥有恆業史傳稱其逐水草者所以孶生牲畜裕衣食之源耒耨之利宜所弗講矣第考諸前史則知田作工樹藝橐駝耕種之風猶有可考即今南近天山水泉饒裕足資屯種之處所在多有特無駝耕之事而往者準俗胥為石田惟是仰榖山南自安惰窳豈古今之地利或殊抑人事為之也相見凡衆台吉及圖什墨爾以下見大台吉跪而敬抱台吉之膝台吉以兩手撫跪者之肩其加禮者則以兩手抱其肩各台吉所屬之人見其主亦如之宰桑以下見宰桑以右手兩指著眉間抑搔之以致敬愛俯而叩首立而相抱卑幼見尊長亦如之尊長見卑幼相抱後嗅卑幼之靣或撫摩其肩以示慈愛平等相見各相抱以為禮居恆所習熟者相見各曲躬而已文獻通考回紇相見可汗去帽被髮以為禮政刑凡政事以圖什墨爾主之宰桑經理後以告圖什墨爾定議乃上告台吉施行其刑法輕罪以皮鞭鞭腰長枷荷頸梏手逾時而釋之殺人者情重則先斷手足而後斬首輕者去手足耳鼻以示懲盜馬者罰九牛或九羊九馬給事主無牲畜則給盜者之妻與事主以償之如是者免刑無妻者鞭腰本身給事主為奴從軍失伍及逃回者禠衣服冠以紙帽妻穿短布衣逰行徇衆數日後盛以革囊以錐錐之鮮不死者幸不死沒為奴妻及家産俱入官北史蠕蠕傳軍法退懦者以石擊首殺之或臨時捶撻突厥傳其刑法反叛殺人及姦人之婦盜馬絆者皆死淫者割勢而腰斬之姦人女者重責財物即以其女妻之鬪傷人者隨輕重輸物傷目者償以女無女則輸婦財折肢體者輸馬盜馬及雜物者各十餘倍徴之唐書回鶻傳堅昆國法最嚴臨陳撓奉使不稱妄議國事若盜者皆斷首子為盜以首著父頸非死不脫按準部盜竊則倍罰所直及其妻與突厥傳所載刑制略相合準部本突厥舊墟故餘風未逺也若堅昆國俗為盜斷首以子首著父頸非死不脫者事屬不經今準部亦無此法嵗時俗每嵗分為四節最重者年嵗將除預宰牲畜至元旦誦喇嘛經不殺生下見其上卑見其尊幼見其長叩首抱膝搯眉如初相見儀四月八日造乳酒以祭天五月望及十月二十五日俱禮佛誦經不殺生此四大節也外若春日則女子有踏鞠之戲秋月則酋長有馬射之棚長夏則親朋有馬湩之會三冬則孩童有潑水之樂大抵皆有取於逆暑迎寒之意積年置閏亦同中國但不拘月分屆當運之年宰桑等請於大台吉隨意中所欲置閏於某月遇小建之月亦不定無三十日隨台吉之意而中去一日焉故自寅至丑每月皆可閏也自朔至晦每日皆可虛也無二十四氣星家書名珠露海北史突厥傳突厥不知年厯惟以草青為記男子好樗蒲女子踏鞠飲馬醅取醉歌呼相對唐書回鶻傳堅昆國謂嵗首為茂師哀以三哀為一時以十二物紀年如嵗在寅則曰虎年嫁娶凡嫁娶富家以牛羊馬酒為禮多者百計少者十計先期送至女家成婚之日壻先至女門女家誦喇嘛經壻至女出共持一羊胛骨拜天地日月壻請女父母尊長等見畢壻及女交結其髮女家為開蒙古包以成婚明日壻先歸别擇日以娶婦新婦乘馬至壻家壻家亦誦喇嘛經女氏親戚皆送惟父不送送女親屬各加贈牛羊馬酒及衣服首飾蒙古包之屬或多或寡視其力之厚薄與情之踈密焉間有以女奴為媵者女至見壻父母尊長行叩頭禮其見翁之伯叔兄與姊夫俱以氊為障不相見靣至於終身餘俱見靣貧者不過以一羊為禮徑自娶婦壻不先至女家也北史髙車傳婚姻用牛馬納聘以為榮結言既定男黨營車闌馬令女黨恣取上馬祖乘出闌馬主立闌外振手驚馬不墜者即取之墜則更取數滿乃止俗無穀不作酒迎婦之日男女相將持馬酪熟肉節解主人延賔亦無行位穹廬前叢坐飲宴終日復留其宿明日將婦歸既而夫黨還入其家馬羣極取良馬父母兄弟雖惜終無言者頗諱取寡婦而優憐之突厥傳男女盛飾會於葬所男有恱愛於女者歸即遣人聘問其父母多不違也父兄伯叔死子弟及姪等妻其後母世叔母嫂唯尊者不得下淫鐵勒傳丈夫婚畢便就妻家待産乳男女然後歸舍唐書回鶻傳堅昆國女子已嫁黥其項婚嫁納羊馬以聘富者或百千計按漢元封中遣江都王建女細君為烏孫昆莫右夫人後昆莫年老使其孫岑陬尚公主蓋其上蒸成俗與北史突厥傳所載相合今準部為烏孫突厥故墟其俗新婦見翁之伯叔兄姊夫至於終身不靣亦可謂有别矣豈風俗與時移易古今之際汚隆之間有未宜一視者歟喪祭準噶爾之俗不立喪制人殁後其子孫親屬丐延喇嘛檢珠露海書有應用五行葬法者則以五行之法葬如應金葬則置諸山應木葬則懸諸樹應火葬則焚諸火應水葬則沈諸河應土葬則埋諸地如不應五行葬者則撤蒙古包棄其尸於道傍自亡日起誦經四十九日其家不殺生其子不剃頭有剪髮以為孝者至葬之日亦如之夫死其妻翦髮去耳鐶去外挂四十九日不服綵每遇忌辰則陳設果品乳湩之屬以祭之不用牲每遇草青思其祖父亦一酬奠焉北史髙車傳其死亡葬送掘地作坎坐尸於中張臂引弓佩刀挾矟無異於生而露坎不掩時有震死及疫癘則為之祈福若安全無他則為報賽突厥傳死者停尸於帳子孫及親屬男女各殺羊馬陳於帳前祭之繞帳走馬七匝詣帳門以刀𠢐面且哭血淚俱流如是者七度乃止擇日取亡者所乘馬及經服用之物并尸俱焚之收其餘灰待時而葬春夏死者候草木黃落秋冬死者候花茂然後坎而瘞之葬日親屬設祭及走馬𠢐面如初死之儀表為塋立石屋中圗畫死者形儀及其生時所戰陳狀常殺一人則立一石有至千百者又以祭之羊馬頭盡懸之於標上是日也男女咸盛服飾會於葬所每嵗率諸貴人祭其先窟西域傳石國以王父母燒餘之骨金甕盛置牀上巡繞而行散以花香雜果王率臣下設祭焉隋書西域傳鐵勒死者埋殯之唐書回鶻傳堅昆國喪不𠢐靣三環尸哭乃火之收其骨嵗而乃墓然後哭泣有節按突厥回鶻焚尸之俗為今準部五行葬法之一鐵勒於突厥錯處而埋殯之法又不同於火葬則亦未盡五行葬法之全也𠢐靣之習今回部亦無行之者他如韋節使西蕃記康居國人死取尸投令狗食則俗不可訓所當屏而弗録者已回部拜天回人尊敬造化之主以拜天為禮每城設禮拜寺始生教主曰𣲖噶木巴爾每日對之誦回經五次初次寅時二次未時三次申時四次酉時五次戌時拜畢則宣讚其義略曰至尊至大起無初了無盡無極無象無比無倫無形無影大造化天地主兒凡有職之人與夫誠心守教法者莫不如是每七日赴禮拜寺誦經一次務集四人合誦不論貴賤貧富皆然回人通經典者曰阿渾為人誦經以禳災迎福每遇大年小年詳見嵗時條阿渾誦阿伊特瑪納斯經為衆祈佑衆人醵贈衣帽一襲遇青草當生時有牲畜之家每十羊出一牽三十牛出一頭送阿渾為敬天禮阿渾代衆誦經祈佑牲畜蕃滋倘有贏餘牛羊即以之濟給貧乏不自私也一嵗之中富貴者有大事則大餽阿渾自千金值物至數千金不等於𣲖噶木巴爾前誦哈提密爾蘇爾經一次謂之大布施餘物亦以濟給貧乏其好善敬天之人隨時致禮阿渾凂其誦經𣲖噶木巴爾來世先立祠堂奉香火名曰瑪咱爾每年兩次衆人赴瑪咱爾禮拜誦經張燈於樹通宵不寐瑪咱爾有香火田畝以供祭祀之需又回國前有得道者如哈帕體和卓布楚爾哈爾和卓輩共有七人每月四次衆人餽送阿渾向七和卓像禮拜誦經貧富貴賤皆然逺行則致禮物於阿渾令其誦經保佑疾病其所禱請亦如之回部西有默克默德納為回回祖國回人凡終身必親往禮拜一次以答鴻庥辦裝褁糧往還期以三年惟富者能酬其願貧無力者不能也亦有附香火之資於富室以偕往者北史西域傳髙昌國俗事天神焉耆俗事天神賖彌國不信佛法専事諸神唐書西域傳于闐喜事祅神疏勒俗事祅神明史西域傳額爾巴拉舊作亦力把里今改正不祭祖宗亦不祭鬼神惟重拜天之禮按廣韻祅呼煙切音訮説文關中謂天曰祅則史所謂祅神即天神今諸回部每日五拜天蓋即其遺教也明史西域傳又載天堂為回回設教之祖有瑪哈瑪者於此地行教後人尊之久而不衰國有禮拜寺月初生臣民咸拜號呼稱揚以為禮默德納其教以事天為主而無像設每日西向虔拜每嵗齊戒一月沐浴更衣居易常處隋開皇中始傳其教入中國今考所謂默德納國在蔥嶺西萬有餘里回部民人多有赴彼禮拜者天堂亦宜近之則回部事天之習所從來逺矣至若史書所載釋法顯記于闐民篤信佛多大乘學威儀齊整器鉢無聲北史西域傳髙昌兼信佛法焉耆咸依釋教齋戒行道于闐俗重佛法寺塔僧尼甚衆唐書西域傳龜兹疏勒國貴浮屠法宋王延德髙昌行紀髙昌佛寺五十餘區有摩尼寺波斯僧各奉其法與今回教逈殊仰蒙聖明考定昭示指歸知回部舊無佛法而列史沿訛率多傅會失實爰因回部拜天之教而推論之如此田畜山南諸回部有城郭宫室故居處有恆有溝塍隴畝故田作有時男識耕耘女知紡織漢書言自且末以東皆種五穀由今觀之不異於古所云也耕織之外多善商賈故西域賈人自西土以及傍近諸國無不至回俗以豕性昏形穢忌不食喜從髙處放雕鶻其人謂之鶻師赤云漢書西域傳西域諸國大率土著有城郭田畜與丐奴烏孫異俗蒲犁國寄田莎車依耐國少穀寄田疏勒莎車輪臺以東捷枝渠犁皆故國地廣饒水草田美種五穀與中國同時熟其旁國少錐刀貴黃金采繒可以易穀食後漢書西域傳東且彌國廬帳居逐水草頗田作晉書西戎傳龜兹人以田種畜牧為業北史西域傳髙昌國中羊馬牧在隱僻處以避冦非貴人不知其處明史西域傳于闐國桑麻黍禾宛然中土相見自阿竒木以下等官見汗之禮凡大年小年令節及逺方使回見時屈一足如著地狀以雙手捧汗膝問安好汗以一手撫其背而慰勞之尋常相見止略屈足下不抱膝上不撫背也伊沙噶以下至明伯克見阿竒木嵗時相見亦如阿竒木以下見汗儀尋常相見鞠躬而已如於馬上相遇伊沙噶鞠躬不下馬行相抱禮商伯克以下下馬行抱膝禮嵗時子孫見祖父行屈足抱膝禮凡卑幼見尊長亦如之平時相見止鞠躬婦見舅姑雖嵗時亦止鞠躬也尊長見卑幼以手摩之以鼻嗅之平等相見各行抱膝禮每日阿竒木以下見汗二次伊沙噶以下至明伯克見阿竒木一次有計議之事不在此限凡阿竒木伊沙噶新除必致禮於其汗如古贄見儀數以九其物則逺方珍異之屬也商伯克以下新除見汗亦如之有則致珍異之物無則馬牛鷹犬器甲之屬職漸卑不求備也各城伯克新除見汗亦如之自阿竒木以下行軍得勝以數軍實必以上品者先進於汗自逺方使回有珍異之物必以獻於汗遇嵗時則各獻其時物每大小年各村莊伯克炮羔炊黍為禮以致於阿竒木及伊沙噶子弟逺歸見父兄壻逺歸見婦翁及大小年必炮羔炊黍以為禮也平等之人願請見者以餺餺為禮數亦以九為率一九二九至三九禮最豐矣晉書西戎傳焉耆倨慢無尊卑之禮文獻通考于闐貌恭敬相見皆跪凡得問遺書戴於首乃發之按回俗凡下之於上卑幼之於尊長有事相見必執贄以為禮雖在荒陬而意猶近古至史書所載焉耆于闐同屬今之回部而倨慢恭謹説各不侔史册流傳難於符合姑存之以備參考政刑回部諸城大事則阿竒木遣一人伊沙噶遣一人共理之其小事則各有主者每嵗汗設大宴會三次牲牽果品之屬鄂克他克竒掌之阿竒木設宴兩次各村莊明伯克供之以大饗僚屬回人有小罪或禠其衣墨塗其靣逰行以徇次重者繫之又重者枷之最重至鞭腰而止阿竒木以下犯小罪奪其職當苦役或𣲖課耕或𣲖監畜牧或責令入山取銅鉛三年五年而復之竊物者必斷手視其直十倍輸之無則械其足鎖於市上以示衆役其妻以輸直再犯者刑之如前掘地為牢幽之一月乃出之鬪毆者視其被傷之情形而坐之傷人目者抉其目傷人手足者亦斷其手足犯姦者依回經科斷則殺之寬則罰令當苦役終其身不復有證則坐之無則釋之殺人者抵有證者據證佐之言以定讞無證則鞫之鞫之之法或仰臥犯者於地以水灌之或攢縛其手足懸諸髙處或縛於柱令足不著地而以繩勒其腹不服則鞭其腰繼則刖其足甚則囚之於地牢期嵗而出之給苦主為奴吐實則定讞設木架於市懸於上以示衆至三日鮮有不死者逋逃外附之人緝獲時施罪亦如之甚則梟之證佐有誣證人罪者即以其罪罪之有職者奪其職禠其衣鞭其腰以墨塗其靣令倒騎驢逰行示衆以辱之北史西域傳于闐刑法殺人者死餘罪各隨輕重懲罰之髙昌大事決之於王小事則世子及二公隨斷狀決風俗政令與華夏略同焉耆綱紀法令同華夏龜茲刑法殺人者死劫賊則斷其臂并刖一足唐書西域傳渴槃陀其法殺人剽劫者死餘得贖按北史稱龜兹劫賊斷其臂與今回部竊物斷手足之制相符嘗推而論之北史載女國斷手刖足唐書載吐蕃小罪必抉目劓刖悉立刑有劓刖波斯刑有髠鉗刖劓小罪耐皆近於古者肉刑之法漢文所謂痛而不德者也至後漢書稱烏萇人訟服之以藥曲者發狂直者無恙唐書稱波斯以鐡灼其瘡白為直黑為曲外域立法離理存異不可究詰而北史嚈噠偷盜無多少皆腰斬唐書越底延法不殺人明史達爾瑪舊作答兒密今改正刑止箠朴則輕重失倫視今回部之法則今猶近是也若唐書西域傳稱吐蕃掘地深數丈內囚於中二三嵗乃出者應即今之回部納囚地牢之法吐蕃地近回部南是以其法相符耳嵗時回俗以教主初生之年為元年閲一嵗則加一年云可傳之無窮雖汗新正亦不改元也刻年數於汗之印上以為識每三百六十日為一年不增減故每四年而餘二十一日四十年而餘七月四百八十年而餘七年矣滿三百六十日為一年謂之大年大年第一日如中國之元旦伯克戎裝齎教主所賜纛鼓樂擁護率所屬赴禮拜寺行禮衆回人咸隨以行禮禮畢交相叩賀不殺生先期三十日必把齋俱日出閉齋星見開齋不茹葷惟産婦不把齋兒大則補之其大年前十五日相傳教主是日下降監察人間善惡先一夜舉家晝夜誦經不寢達旦懸葫蘆於樹盛油其中點以為燈油盡燈落遂踏破之以是為破除一切殃咎云元旦後七十日為小年殺羊以祭天伯克行禮相慶賀如大年例此兩年者相傳以為𣲖噶木巴爾所留遺流傳久逺守其教而不變也小年後再滿三十日相傳為教主外孫難日禮拜寺阿布塔爾服墨色衣赴各家乞齋誦經各家量其力而布施之唐書西域傳焉耆俗尚娛遨二月朏出野祀墓四月望日遊林七月七日祀生祖十月望日王始出逰至嵗盡乃止龜茲嵗朔鬬羊馬槖它七日觀勝負以卜嵗盈耗云宋王延德髙昌行紀用開元七年厯以三月九日為寒食餘二社冬至亦然以銀或鍮石為筒貯水激以射或以水交撥為戲謂之壓陽氣去病居民春月多羣聚遨樂遊者馬上持弓矢射諸物謂之禳災文獻通考于闐以六月為嵗首按明史西域傳載哈里無干支朔望每七日為一轉周而復始嵗以二月十二月為把齋月晝不飲食至夜乃食周月始茹葷哈里去中國道里莫詳顧所稱無干支把齋之説與今之回部習俗相近則其地當亦在天山南路一帶也嫁娶回俗將議婚壻家邀媒氏造女家以連襟為辭不敢質言議婚女家邀集宗族尊親會議意允可媒氏以告於壻家壻家乃烹一羊盛之以桌藉之以紬覆之以被媒氏將之以送於女家為定婚之禮女家受之答以紬布是日也女家定議擇於何日成婚應送牛羊之屬若干紬布之屬若干以告於媒氏媒氏受詞還告壻家屆期壻及父母親戚齎所送禮物如約鼓樂迎導以至於女家女家是日肆筵設席邀阿渾伯克及親戚以觀禮親長一人出迎壻家禮物母氏遍閲焉遂以幣物分給壻與女餘以酬親戚親戚亦各持禮物以贈所分給壻女之幣物三日內咸裁剪製服無踰期者是三日也壻宿於女家而不入內壻之父母朝往而暮歸至第三日女家延阿渾誦經壻及壻家之親戚咸設誓於教主前言女無大故無敢凌虐誓畢壻之父母親戚先歸壻留以俟女女家坐女於氊毯四人扶舁出門豫備駿馬雕鞍於門外女戚抱以上馬施幛靣以行鼓樂前導贈物隨之女先行壻後隨女家之母及女親咸送女及壻以至壻家越宿歸又越三日壻家設筵延女父母為燕會兩家親屬無不與者女始至壻家先拜竈神澆油於竈神之門然後入房以示主饋之意舅姑不即拜也或半嵗或經年壻之卑幼入房去新婦障靣始出拜舅姑行叩頭禮北史西域傳焉耆婚姻略同華夏龜兹婚姻與焉耆略同按晉史載吐谷渾婚姻富家厚出聘財唐書載都播婚姻富者納馬今回部嫁娶多尚財禮與吐谷渾都播雖其地不屬而習俗相同為附志於此喪祭回俗夫死其妻散髮去簪鐶父母死其子婦不散髮不去簪鐶劈踊號泣無常時每哭必繞尸無服制但去紅緑諸色服黑布而已卑幼死尊長如常服死之日浴尸以水入尸口云滌腸胃始可見教主裹之以白布殯之以無底棺其棺之底蓋可脫去也覆之以綢及緞停柩於室三日延阿渾誦爾爾必經而後葬葬之日親屬咸送至墓所匐匐哭泣以臨焉臨穴抽棺底墜尸土中因瘞之留棺以送後死者棺上所覆綢縀分致送葬者以為小帽葬後復延阿渾誦經禮拜把齋三十日或布施錢文布帛粥食之屬於貧民以結緣其富室則赴默克國禮拜以報本葬後三日到墓一祭七日再祭期年三祭期年之後每遇大年小年則祭掃於祖墓懸燈冡樹上每月四次為祖父誦經設小祭北史西域傳焉耆死亡者皆焚而後葬其服制滿七日則除之按今回部無服制與北史載焉耆服制七日之説不合紀載傳訛存備參考推之晉書載吐谷渾喪服葬訖而除隋書波斯人死持服一月唐書載女國居喪三年不易服不櫛沐雖久暫不同而總非無服者比然考吐谷渾居今回部之南女國居其西南波斯更踰蔥嶺而西較今回部疆域差逺而不廢服制若吐蕃傳所稱居父母喪斷髮黛靣墨衣既葬而吉者吐蕃地近今之回部故其為俗亦未之或異也欽定皇輿西域圖志卷三十九欽定四庫全書欽定皇輿西域圖志卷三十九
