body:
  text: 列表一安西州屬表按安西州舊五衛地一統志已表之矣兹更詳加審正厯代沿革庶㡬端委可尋其安西北路及天山南北路諸表内紀載的實可憑者據史書之餘有旁徴曲引而得之者史傳無考姑置缺如者亦各著其説于萹按晉書於西域僅紀焉耆龜兹大宛康居大秦諸國與今哈宻鎮西府廸化州及天山北路諸境無渉故諸表俱缺元史西北地附録諸名與哈密鎮西府地無可附麗故兩表亦缺鎮西府屬表按晉元兩代缺紀説並見前其並缺五代者史載髙居誨記沙州西之胡盧磧為仲雲所居地在天山之南與府境無渉也廸化州屬表按是表於晉無考説見前哈宻鎮西府篇魏書有蠕蠕無突厥且云蠕蠕冦于闐是蠕蠕西境固奄有天山北路者而突厥臣于蠕蠕於魏世猶微故不特紀也周書有突厥無蠕蠕則蠕蠕已為突厥所滅而有其地矣又北魏時蠕蠕髙車傳俱云蠕蠕主社崘與髙車戰于伊吾北山蒲類海髙車主彌俄突西走三百餘里又云社崙侵髙車深入其地遂并諸部是髙車東境後更入于蠕蠕可知以今形勢考之則伊吾北山當在哈宻鎮西府北又西走三百餘里當在博克逹鄂拉之隂故以博克達鄂拉東為蠕蠕境西為髙車境至周則統為突厥也五代史四裔外録稱突厥至唐之末為諸裔所侵五代之際最微又來不數故其君長不能紀今因從略元史地理志稱回鶻五城唐號北庭置都䕶府又西北行四五千里至阿爾穆爾舊音阿力麻里今約以天山北路廸化州属及庫爾喀喇烏蘇路為回鶻五城以西北境之伊犁一帶為阿爾穆爾庶得其槩云庫爾喀喇烏蘇路表按後漢書載車師後王國又載移支國居蒲類地俱見前表更西則無國可紀故是表從略宋史外國傳所載回鶻多在山南其居山北者唯髙昌國北庭在今廸化州界與本路亦缺明史衛拉特在韃靼西土爾番北衛拉特舊作瓦剌為對音之訛即今天山北路凖噶爾部之四衛拉特無疑矣塔爾巴噶台路表按是表缺晉五代宋説見前塔爾巴噶台路即廸化州正北境也廸化州於元為回鶻五城則属塔爾巴噶台路者當與回鶻五城相近伊犁東路表按晉書焉耆國北與烏孫接焉耆為今之哈喇沙爾裕勒都斯登努勒台一帶在其北據此斷為晉烏孫地五代及宋史書所載略於山北故闕伊犁西路表按晉五代宋皆缺説見前表天山以北明屬衛拉特惟伊犁西北路地更偏西史無明文亦缺欽定皇輿西域圖志卷四欽定四庫全書欽定皇輿西域圖志卷四
