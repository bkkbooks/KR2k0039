front:
  text: 欽定四庫全書欽定皇輿西域圖志卷三十二
  hash: sha256:794f89cacb6ac3f940b50b75b1bbefa4f1438cff2d6f86795207494f5c5a830b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0039_WYG_052-1a}
body:
  text: 屯政臣等謹按籌邊之䇿將使兵食兼足舍屯政無由第時異勢殊泥古者或乖實用則隨宜立制之道尚焉漢鼂錯建議募民徙塞下已兆屯田之法至宣帝遣故將吏屯田張掖而屯政日開自時厥後若擊先零討李憲取伊吾復三郡凡有軍興必修屯政然而師行則舉師旋則廢議者徒備一時權宜而未得經久承行之利魏晉以降間或行之內地亦旋興旋罷立制鮮籌盡善我皇上耆定西陲關門以西蔥嶺以東版章式廓於滌瑕蕩穢之餘圖生養安全之計聖天子仁宏亭育智燭遐荒為之授田里謀保聚殫宥密於巖廊咨警之間而人人自得於流沙萬里之外固非舊隸版籍之哈密鎮西府屬所能限矣爰於準部自今迪化州至伊犂回部自闢展至哈喇沙爾擇其地之近泉源傍河濆者翦萊垡土以布物宜且劑其嵗收之數自給官兵廩糈外儲贏餘以資增墾先後屯種大著成效由是山北推之晶河庫爾喀喇烏蘇塔爾巴噶台諸境山南推之烏什阿克蘇諸城調派武職以專其成特置重臣以董其事良法美意曠古罕聞竊謂西域屯政之善實有所以超漢軼唐者如充國虞詡之䇿重華李絳之謀意在籌軍實謹邊防耳今則各部臣民願編郡縣銷戈戟鑄農器以搜獮之剩卒為耕垡之上農餉不空糜地無遺利康阜鴻休垂諸無極况昔之屯田或給耒耜或假耕牛非仰給於官即抑配於民經費甚巨今則且耕且駐無俟招集流亡在兵在民不必官支農具史書俵牛括牛之弊種種俱絶不惟腹地不資轉運而給餉之羡陳陳相因減費更廣無他漢唐之屯政專為養兵而未能兵民並濟漢唐之屯政專為供戰而未能戰守兼宜乃者程功簡而收利溥沙磧之區絶無棄地瀉鹵之土盡變膏腴甚至移郊寄棘之徒從事耕耘並以贖愆糊口荒裔悉成樂土自昔服疇力穡之化有被及無外如今日者哉爰舉新疆屯田經制現在處所按地詳載而嵗入之額户口之籍皆附之志屯政第十
