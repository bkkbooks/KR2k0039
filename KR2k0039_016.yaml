body:
  text: 疆域九天山南路三賽喇木屬兼轄拜賽喇木赫色勒布干濟爾噶朗他爾阿里克托克三布隆哈喇都伯堪齊塔木明哲克得雅哈阿里克拉布帕爾拜雅哈阿里克都爾伯勒津沙哈爾色勒克恰特吹罝阿特巴什推格博尼奎裕巴克蘇爾滚托木碩克雅爾圖喇伊宻什喀資干鄂爾塔克齊阿斯騰海里瑪塔克齊玉斯屯海里瑪英額亮格爾伯里葉克齊什喇勒台葉伊勒干庫什塔木阿克蘇屬阿克蘇雅哈阿里克哈喇裕勒衮扎木赫色勒哈爾噶額宻什帕爾滿雅爾巴什齊托克喇克亮格爾雅爾賽喇木伊勒噶齊額格爾齊喀勒喀勒科布魯克庫木巴什伯什阿里克和卓巴斯喀克呼木什阿里克哈喇塔勒烏朱瑪托來英額阿里克賽阿里克哈喇木克齊薩克薩克托布坎得布特爾鄂喇齊阿喇勒愛呼爾超達爾韋特特爾察克喇克吐爾伯特拜林阿克雅爾伯列克里克納喇竒恰特哲爾格哲克得欽定皇輿西域圗志卷十六目録欽定四庫全書欽定皇輿西域圖志卷十六目録疆域九天山南路三賽喇木屬兼轄拜賽喇木赫色勒布干濟爾噶朗他爾阿里克托克三布隆哈喇都伯堪齊塔木明哲克得雅哈阿里克拉布帕爾拜雅哈阿里克都爾伯勒津沙哈爾色勒克恰特吹罝阿特巴什推格博尼奎裕巴克蘇爾滚托木碩克雅爾圖喇伊宻什喀資干鄂爾塔克齊阿斯騰海里瑪塔克齊玉斯屯海里瑪英額亮格爾伯里葉克齊什喇勒台葉伊勒干庫什塔木阿克蘇屬阿克蘇雅哈阿里克哈喇裕勒衮扎木赫色勒哈爾噶額宻什帕爾滿雅爾巴什齊托克喇克亮格爾雅爾賽喇木伊勒噶齊額格爾齊喀勒喀勒科布魯克庫木巴什伯什阿里克和卓巴斯喀克呼木什阿里克哈喇塔勒烏朱瑪托來英額阿里克賽阿里克哈喇木克齊薩克薩克托布坎得布特爾鄂喇齊阿喇勒愛呼爾超達爾韋特特爾察克喇克吐爾伯特拜林阿克雅爾伯列克里克納喇竒恰特哲爾格哲克得欽定皇輿西域圗志卷十六目録欽定四庫全書欽定皇輿西域圖志卷十六疆域九天山南路三賽喇木屬兼轄拜賽喇木東至赫色勒郭勒接庫車界西至哈喇烏蘇南至木素爾郭勒踰河接沙雅爾西南境外地界北至天山踰山接天山北伊犁西路界拜東至哈喇烏蘇南至木素爾郭勒踰河接沙雅爾西南境界西至什喇勒台接阿克蘇界北至天山踰山接天山北伊犁西路界賽喇木賽喇木舊對音為賽里木在赫色勒郭勒西四十里東北距庫車城二百十里城周一里九分高一丈南北二門距京師一萬二百九十里乾隆二十三年大兵圍庫車其伯克阿𤓰斯等傾心向化遂以城降所屬村莊凡十有一唐書地理志安西西出柘厥闗渡白馬河百八十里西入俱毗羅磧經苦井百二十里至俱毗羅城按賽喇木於漢為龜兹國地唐時龜兹國伊邏盧城應在今阿巴特托和鼐之間而庫車乃其西境說見前卷則地理志所謂白馬河者應即庫車城東之額什克巴什郭勒西百八十里為俱毗羅磧又西百二十里至俱毗羅城應屬今賽喇木城自白馬河至此二百餘里今賽喇木在庫車西南二百十里道里方位適相當也赫色勒赫色勒在赫色勒郭勒西五里南距木素爾郭勒五里西距賽喇木城二十五里布干布干在哈喇烏蘇支河西五里東踰支河二道至賽喇木城十五里濟爾噶朗濟爾噶朗在布干西南五里南距哈喇烏蘇支河五里東踰支河二道至賽喇木城二十五里他爾阿里克他爾阿里克在濟爾噶朗西南四里南傍哈喇烏蘇支河東踰支河二道至賽喇木城三十里托克三托克三凡四荘在他爾阿里克西十里東距哈喇烏蘇支河五里東踰支河三道至賽喇木城四十里布隆布隆在托克三北十二里東傍哈喇烏蘓支河五里東踰支河三道至賽喇木城五十里哈喇都伯哈喇都伯在布隆東北十五里南傍哈喇鳥蘇支河五里東南距賽喇木城二十里堪齊塔木堪齊塔木凡二莊在哈喇都伯西北二十里南距哈喇烏蘇支河十里東南距賽喇木城四十里明哲克得明哲克得凡二莊在堪齊塔木東二十五里東南距賽喇木城十五里雅哈阿里克雅哈阿里克凡五莊在明哲克得東五里東南距賽喇木城十里拉布帕爾拉布帕爾凡二莊在雅哈阿里克東北五里南距賽喇木城十五里以上屬賽喇木拜拜在賽喇木西九十里距京師一萬三百八十里地饒水草城踞山岡周一里三分髙一丈東西二門城西有小哈布薩朗郭勒又西為哈布薩朗郭勒東有特里舒克郭勒所屬村莊凡二十有二唐書地理志俱毗羅城又六十里至阿悉言城按今賽喇木城與古俱毗羅城道里方位相合則此拜城在賽喇木西應屬唐時阿悉言城也又按明史西域傳所載奉貢通名小部止稱地靣有名擺音者疑即此也雅哈阿里克雅哈阿里克舊訛為噶哈里在小哈布薩朗郭勒下流北岸西北距拜城十五里都爾伯勒津都爾伯勒津凡二莊在雅哈阿里克東五里木素爾郭勒北岸西北距拜城二十里沙哈爾沙哈爾凡三莊東距拜城二里以上三處在小哈布薩朗郭勒特里舒克郭勒両河之間色勒克恰特色勒克恰特在特里舒克郭勒東八里西距拜城十五里吹罝吹罝在色勒克恰特東南五里西距拜城二十里阿特巴什阿特巴什在吹罝東五里西距拜城二十五里推格博尼推格博尼在阿特巴什西十里西距拜城三十五里東傍哈喇烏蘓郭勒南傍木素爾郭勒奎裕巴克奎裕巴克在阿特巴什南五里西距拜城三十里南臨木素爾郭勒蘓爾滚蘇爾滚在色勒克恰特北五里西南距拜城二十里托木碩克托木碩克凡二莊在蘇爾滚東北五里西南距拜城二十五里雅爾圖喇雅爾圖喇在托木碩克東五里西南距拜城三十里伊宻什伊密什在雅爾圗喇東北十里西南距拜城四十里喀資干喀資干凡二莊在蘇爾滚北十里西南距拜城三十里鄂爾塔克齊鄂爾塔克齊在喀資干西五里西南距拜城三十里阿斯騰海里瑪阿斯騰海里瑪在鄂爾塔克齊西五里西南距拜城三十五里塔克齊塔克齊其地依山在阿斯騰海里瑪西十里南距拜城二十五里玉斯屯海里瑪玉斯屯海里瑪在塔克齊西五里南距拜城二十里英額亮格爾英額亮格爾在雅爾圖喇北五里東北距拜城三十五里伯里葉克齊伯里葉克齊在喀資干北十里西南距拜城四十里什喇勒台什喇勒台在拜城西三十里踰哈布薩朗郭勒二十里至其地葉伊勒干葉伊勒干在什喇勒台西五十里東距拜城八十里庫什塔木庫什塔木在葉伊勒干西十里有小城以上屬拜阿克蘇屬東至庫什塔木接拜界西至哲爾格哲克得通烏什界北至卓哈達巴通天山北伊犁西路界南至喀什噶爾達雅里阿克蘇阿克蘇在拜城西四百里距京師一萬七百九十里城東地勢甚高前行界深溝自下而上繞出城南垣墉陡峻北踞崇岡四城連峙毎城周里許皆南向外以一大城垣環之所踞高厓二十餘丈三城皆小而固洵形勝地也城内偏東界以長河源發北崖南流出於城外中西兩厓之間有河二道南流人資其利先是逆回霍集占歸舊部以其黨為阿克蘇城伯克各城亦如之乾隆二十三年大兵克庫車阿克蘇囬衆聞風向化乃逐霍集占所置伯克以城降所屬村莊凡三十有六御製阿克蘇城囬衆投降詩以紀事戊寅回衆築城居取之原屬易庫車其東户防守所特備徒以將無能乆困致自棄先是已兩勝方逆回赴援庫車官兵一殱之於托和鼐再殱之於鄂根河逆黨斃者五六千人賊勢大蹙唾手可就擒獲兵威亦云熾雜種况夙怯失城更恇悸是宜鼓衆前先聲圖成事而何待益兵稍進復停轡逆回已失庫車雅爾哈善不即乗機進勦籍口需兆恵兵至將前忽却屢失事㑹割榖資兵糧前途榖滿地不過藉口食遂其遷延計夷考回所據大城原有四曰葉爾竒木哈什哈爾暨阿克蘇烏什其餘率小類阿克蘇今歸實斷其左臂故縁彼城中伯克乃新置霍集占心腹霍集占既歸舊部各城皆置其心腹以為脅制比聞大兵将至阿克蘇回衆即恊力與逆酋拒戰逐其所置伯克獻城請降强從非衆意今聞被創敗倒戈更相拒叶戕害其用人獻城降遣使此又宜速赴河上逍遥寘阿克蘇既以城降正可督兵前進諸城可傳檄而定雅爾哈善乃以禾稼在地欲為坐食株守之計豈前途獻地相踵轉慮貲糧不給耶是謂棄天佑作孽乃由是易帥明憲章時命将軍兆恵星馳往代其軍将雅爾哈善觧京治罪靖逺佈恩恵殱渠赦脅從敷化逮闇昧劬哉勉運籌顒若冀明賜漢書西域傳温宿國王治温宿城去長安八千三百五十里東至都䕶治所二千三百八十里西至尉頭三百里北至烏孫赤谷六百一十里東通姑墨二百七十里魏略西戎傳温宿國屬龜兹魏書西域𫝊温宿國居温宿城在姑墨西北役屬龜兹唐書地理志河西内屬諸胡一名温府州又大石城一曰于祝曰温肅州按漢温宿國在姑墨西二百七十里今阿克蘇東距雅哈阿里克二百八十五里道里相合則今阿克蘇城疑即温宿故城也又漢書姑墨東至都䕶治所一千二十一里温宿特在其西二百七十里耳乃云東至都䕶治所二千三百八十里二千字盖一千字傳寫之訛也再以水道論之今喀什噶爾葉爾羌兩河自西而來至阿克蘇南阿克蘇郭勒南流注之與水經注所引釋氏西域傳河水暨於温宿之南左合支水上承北河之說合則阿克蘇之為漢温宿殆無可疑北魏時其國猶存而役屬龜兹周隋以下不著於史而隋書稱龜兹西去疏勒疏勒東去龜兹皆一千五百里可知温宿小國北魏以後為龜兹所并尉頭為疏勒所并是以龜兹疏勒兩國接壌至唐復稱温肅州亦名温府州唐之温肅即漢之温宿也而所謂大石城者當屬温肅州治即今之阿克蘇城在漢魏則為温宿城也魏之姑墨亦即漢之姑墨史書互異耳雅哈阿里克雅哈阿里克地濵木素爾郭勒南岸在葉伊勒干西南五十里由是南行二百里至塔里木諤斯騰以方位道里計之古姑墨國當在此間漢書西域傳姑墨國王治南城去長安八千一百五十里東至都䕶治所一千二十一里南至于闐馬行十五日北與烏孫接東通龜兹六百七十里王莽時姑墨國王殺溫宿王并其國魏書西域傳姑黙國居南城在龜兹西去代一萬五百里役屬龜兹唐書西域傳阿史那社爾破龜兹沙州刺史蘇海政行軍長史薛萬備以精騎窮躡六百里王計窮保撥換城社爾圍之閱月執王及羯獵顛自龜兹贏六百里踰小沙磧有㧞禄迦小國也一名亟墨即漢姑墨國横六百里縱三百里突厥傳突騎施隂幸邊隙圍撥換大石城将取四鎮㑹嘉恵拜安西副大都䕶即發三姓葛邏禄兵共擊之地理志阿悉言城又六十里至撥換城一曰威戎城曰姑墨州南臨思渾河又河西内屬諸胡一曰和墨州唐西域記䟦禄迦國大都城周五六里按三國志引魏略姑墨國屬龜兹魏書載姑墨役屬龜兹是姑墨當北魏時猶存至唐始改為䟦禄迦耳其東距龜兹里数漢書云六百七十唐書云贏六百大畧相等則䟦禄迦信即姑墨也龜兹即今庫車說見前卷賽喇木拜諸城雖在庫車之西而里数太近姑墨國當尚在其西再以唐書西域傳刺史蘇海政西追龜兹王於六百里外之撥換城地理志撥換城即姑墨州之說証之正與漢書龜兹西六百七十里至姑墨唐書踰龜兹贏六百里即亟墨之説合然則䟦禄迦國即漢姑墨國亦即姑墨州附屬龜兹為撥換城者應在今雅哈阿里克左右而自赫色勒郭勒以西塔里木諤斯騰以北阿克蘇以東皆姑墨地也唐書龜兹至䟦禄迦踰沙磧今庫車西沙爾達朗之沙磧足以當之又謂䟦禄迦西三百里度石磧至凌山為葱嶺北原水東流今雅哈阿里克北為木素爾鄂拉迤西為薩瓦布齊鄂拉相距正三伯