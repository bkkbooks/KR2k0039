里克二百八十五里道里相合則今阿克蘇城疑即温宿故城也又漢書姑墨東至都䕶治所一千二十一里温宿特在其西二百七十里耳乃云東至都䕶治所二千三百八十里二千字盖一千字傳寫之訛也再以水道論之今喀什噶爾葉爾羌兩河自西而來至阿克蘇南阿克蘇郭勒南流注之與水經注所引釋氏西域傳河水暨於温宿之南左合支水上承北河之說合則阿克蘇之為漢温宿殆無可疑北魏時其國猶存而役屬龜兹周隋以下不著於史而隋書稱龜兹西去疏勒疏勒東去龜兹皆一千五百里可知温宿小國北魏以後為龜兹所并尉頭為疏勒所并是以龜兹疏勒兩國接壌至唐復稱温肅州亦名温府州唐之温肅即漢之温宿也而所謂大石城者當屬温肅州治即今之阿克蘇城在漢魏則為温宿城也魏之姑墨亦即漢之姑墨史書互異耳雅哈阿里克雅哈阿里克地濵木素爾郭勒南岸在葉伊勒干西南五十里由是南行二百里至塔里木諤斯騰以方位道里計之古姑墨國當在此間漢書西域傳姑墨國王治南城去長安八千一百五十里東至都䕶治所一千二十一里南至于闐馬行十五日北與烏孫接東通龜兹六百七十里王莽時姑墨國王殺溫宿王并其國魏書西域傳姑黙國居南城在龜兹西去代一萬五百里役屬龜兹唐書西域傳阿史那社爾破龜兹沙州刺史蘇海政行軍長史薛萬備以精騎窮躡六百里王計窮保撥換城社爾圍之閱月執王及羯獵顛自龜兹贏六百里踰小沙磧有㧞禄迦小國也一名亟墨即漢姑墨國横六百里縱三百里突厥傳突騎施隂幸邊隙圍撥換大石城将取四鎮㑹嘉恵拜安西副大都䕶即發三姓葛邏禄兵共擊之地理志阿悉言城又六十里至撥換城一曰威戎城曰姑墨州南臨思渾河又河西内屬諸胡一曰和墨州唐西域記䟦禄迦國大都城周五六里按三國志引魏略姑墨國屬龜兹魏書載姑墨役屬龜兹是姑墨當北魏時猶存至唐始改為䟦禄迦耳其東距龜兹里数漢書云六百七十唐書云贏六百大畧相等則䟦禄迦信即姑墨也龜兹即今庫車說見前卷賽喇木拜諸城雖在庫車之西而里数太近姑墨國當尚在其西再以唐書西域傳刺史蘇海政西追龜兹王於六百里外之撥換城地理志撥換城即姑墨州之說証之正與漢書龜兹西六百七十里至姑墨唐書踰龜兹贏六百里即亟墨之説合然則䟦禄迦國即漢姑墨國亦即姑墨州附屬龜兹為撥換城者應在今雅哈阿里克左右而自赫色勒郭勒以西塔里木諤斯騰以北阿克蘇以東皆姑墨地也唐書龜兹至䟦禄迦踰沙磧今庫車西沙爾達朗之沙磧足以當之又謂䟦禄迦西三百里度石磧至凌山為葱嶺北原水東流今雅哈阿里克北為木素爾鄂拉迤西為薩瓦布齊鄂拉相距正三伯里許庫克墨爾根郭勒源出焉倘所謂凌山者歟庫克墨爾根郭勒東南流入阿克蘇郭勒葱嶺諸水西來㑹之謂為葱嶺北原固宜而圖格哈納達巴哈喇裕勒衮塔克皆當雅哈阿里克西去孔道即其所度之石磧也塔里木諤斯騰當其南境所謂南臨思渾河也至從此南行循和闐郭勒經千里外至和闐六城從此北行踰山入伊犁西境是即漢書所謂南至于闐馬行十五日北與烏孫接者証以形勢當益釋然矣哈喇裕勒衮哈喇裕勒衮在拜屬之雅哈阿里克西一百二十里西距阿克蘇城一百八十里自此東行一百里名察爾齊克為阿克蘇東界扎木扎木在哈喇裕勒衮西南八十里西距阿克蘇城一百里自此北行一百里為阿爾巴特赫色勒赫色勒在阿克蘇城東九十里阿克蘇郭勒北二十里東有泉東南流源出北山麓哈爾噶額密什哈爾噶額密什在阿克蘇城北二十里北距木素爾鄂拉六十里帕爾滿帕爾滿在赫色勒西四十里在阿克蘇郭勒北二十里西北有河發源山麓東南流至莊北分兩河東西環之西距阿克蘇城五十里雅爾巴什雅爾巴什在帕爾滿東十里阿克蘇郭勒北二十里西距阿克蘇城六十里齊托克喇克齊托克喇克在赫色勒東南五十里阿克蘇郭勒北二十里西北距阿克蘇城百四十里亮格爾亮格爾在赫色勒東北九十里地居山谷間西南距阿克蘇城一百六十里又北八十里為圖巴拉克又北八十里為玉斯屯託海又北七十里為塔木哈他什又北一百二十里為噶克察哈爾海接山北伊犁西路界雅爾賽喇木雅爾賽喇木在亮格爾南八十里地居山谷間西北距阿克蘇城一百六十里伊勒噶齊伊勒噶齊在亮格爾西二十里地居山谷間西南距阿克蘇城六十里額格爾齊額格爾齊在阿克蘇郭勒北十里北距阿克蘇城十里喀勒喀勒喀勒喀勒在額格爾齊東南六十里阿克蘇郭勒南五里西北距阿克蘇城七十里科布魯克科布魯克在喀勒喀勒西南三十里托什干達里雅北十里西北距阿克蘇城八十里庫木巴什庫木巴什在科布魯克東五里托什干達里雅北十五里西北距阿克蘇城九十里伯什阿里克伯什阿里克在庫木巴什東五里托什干達里雅北二十里西北距阿克蘇城一百十里和卓巴斯喀克和卓巴斯喀克在伯什阿里克東十里阿克蘇郭勒南十里西北距阿克蘇城一百二十里呼木什阿里克呼木什阿里克在和卓巴斯喀克西南十里托什干達里雅北十二里西北距阿克蘇城一百五十里哈喇塔勒哈喇塔勒在呼木什阿里克東南二十里托什干逹里雅北五里西北距阿克蘓城二百里烏朱瑪烏朱瑪在哈喇塔勒西二十里托什干逹里雅西南五里西北距阿克蘇城一百八十里托來托來在烏朱瑪西五十里托什干逹里雅南五里西北距阿克蘇城一百六十里英額阿里克英額阿里克在烏朱瑪西北三十里托什干逹里雅西南十里西北距阿克蘓城一百五十里又南百里為都齊特賽阿里克賽阿里克在英額阿里克西四十里托什干逹里雅南五里西北距阿克