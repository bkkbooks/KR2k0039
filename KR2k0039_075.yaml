  text: 水二天山北路一阿勒塔齊郭勒阿勒塔齊郭勒源出迪化州城西南烏可克達巴北麓東北流至迪化州城南分二支夾城各北流一百里入於地西南有三泉東北流並入於郭勒阿爾呼特布拉克阿爾呼特布拉克在阿勒塔齊郭勒東北流三十里入阿勒塔齊郭勒多倫布拉克多倫布拉克在阿勒塔齊郭勒東一百四十里源出博克達鄂拉北麓北流四十五里至阜康縣城南左右皆有泉同發源博克達山麓北流入於地庫里葉圖布拉克庫里葉圖布拉克在多倫布拉克東四十里源出博克達鄂拉北麓北流四十里入於地察罕烏蘇察罕烏蘓在庫里葉圖布拉克東四十里源出額得墨克達巴北麓北流三十五里入於地納里特布拉克納里特布拉克在察罕烏蘓東二十里源出額得墨克達巴北麓北流三十里入於地阿察郭勒阿察郭勒在納里特布拉克東三十里有三源出天山北麓北流五十里滙為一河餘波入於沙磧鄂倫淖爾鄂倫淖爾在阿察郭勒東一百二十里都爾伯勒津城西十里源出天山北麓北流經得勒呼蘓台行一百里瀦為淖爾圓徑三十里鏗格爾布拉克鏗格爾布拉克在鄂倫淖爾上流東三十里源出天山北麓東又一泉合而北流六十里至都爾伯勒津城南必栁布拉克必栁布拉克在鏗格爾布拉克東二十五里都爾伯勒津城南源出天山北麓東又一泉名濟布庫北行十里入必栁布拉克多博綽克布拉克多博綽克布拉克在必栁布拉克東三十里源出天山北麓凡三道相距各二十里濟爾瑪台布拉克濟爾瑪台布拉克在多博綽克布拉克東三十里源出天山北麓西北流凡三道相距各二十里西為奇台布拉克又西為格根布拉克烏里雅蘇台布拉克烏里雅蘓台布拉克在濟爾瑪台布拉克東四十里源出天山北麓西北流九十里入於地西二十里有泉在木壘北阿克塔斯布拉克阿克塔斯布拉克在烏里雅蘇台布拉克東三十里源出天山北麓凡三道相距各二十餘里烏蘭烏蘇烏蘭烏蘇在阿克塔斯布拉克東二十里源出天山北麓東北流四十里至和濟格爾入於沙磧按此為山北準夷舊疆東盡處又東為烏爾圖哈畢爾噶托來諸布拉克入鎮西府境鄂倫淖爾鄂倫淖爾亦曰達布蘇淖爾在阿勒塔齊郭勒南三十里南距迪化州城四十里周十里許其東别有小池唐書地理志後庭縣本蒲類有鹹泉鎮按迪化州即烏魯木齊古蒲類地詳見疆域唐志稱其有鹹泉疑即今所謂鄂倫淖爾者近是昌吉郭勒昌吉郭勒在迪化州西昌吉縣南源出孟克圖達巴北麓有四源合而北流二百餘里經兩屯之間踰孔道北又東北行入於地羅克倫郭勒羅克倫郭勒在昌吉郭勒西十五里其源出孟可克達巴北麓有兩源北流二百餘里又西為格特爾格羅克倫郭勒北流折而西入於呼圖克拜郭勒呼圖克拜郭勒呼圖克拜郭勒在羅克倫郭勒西一百里地當孔道有五源出天山北麓北流二百里東㑹格特爾格羅克倫郭勒西北流入於額彬格遜淖爾圖古里克郭勒圖古里克郭勒在呼圖克拜郭勒西九十里源出巴顔哈瑪爾鄂拉北麓北流百里踰孔道入於地哈齊克郭勒哈齊克郭勒在圖古里克郭勒西九十里呼圖克拜郭勒西一百四十里有三源出哈屯博克達鄂拉東北麓東北流一百二十里踰孔道入於地瑪納斯郭勒瑪納斯郭勒在哈齊克郭勒西一百里綏來縣治西境有五源分出哈屯博克達鄂拉北麓合而北流七十里循綏來縣治之西折而北三十里㑹烏蘭烏蘇又北流一百里入額彬格遜淖爾宋王延德髙昌行紀北廷川長廣數千里鷹鷂鵰鶻之所生多美草不生花汎舟於池中四面作鼓樂按今天山以北迪化州左右境於古胥屬北廷山泉隨處濬發其經流之逺者若呼圖克拜瑪納斯諸郭勒之滙入於額彬格遜淖爾若庫爾濟爾噶朗諸郭勒之滙入於布勒哈齊淖爾其較著也延徳記稱其川長廣数千里或未免形容失實然以方位求之則北廷川流之蹟於此可得其槩也由是而西長如伊犁郭勒吹郭勒塔拉斯郭勒廣如圖斯庫勒巴勒喀什淖爾其去北廷太逺有非延徳所及記者矣額彬格遜淖爾額彬格遜淖爾在博羅哈瑪爾鄂拉竒喇圖魯鄂拉北二百里南㑹呼圖克拜郭勒瑪納斯郭勒烏蘭烏蘓諸水咸瀦於是周可五十餘里乃布勒哈齊淖爾東一巨澤也乾隆三十一年秩於祀典毎嵗春秋致祭嵗祭額彬格遜淖爾文惟神德滋邊土潤被遐陬接葱領以環流繞天山而表勝澄光不動淵渟受衆壑之歸湛影惟清派合溥流泉之利灌平原而布惠早看沃澤興屯通逺磧以効靈益慶恬波利涉宜崇禋祀用荅神庥按唐書蘓定方追擊處木昆部於曵咥河西由是乘勝西行至雙河渡伊犁水乃禽賀魯伊麗水為今伊犁河則由是以東至布勒哈齊淖爾宜為雙河又東至額彬格遜淖爾宜為曵咥河也烏蘭烏蘓烏蘭烏蘇在瑪納斯郭勒西六十里源出古爾班多博克鄂拉北麓東北流一百里入瑪納斯郭勒滙流入於額彬格遜淖爾和爾郭斯郭勒和爾郭斯郭勒舊音和落霍澌在烏蘭烏蘓西五十里源出額林哈畢爾噶鄂拉北麓凡數處合而北流五十里至孔道北復分三支入於地安濟哈雅郭勒安濟哈雅郭勒在和爾郭斯郭勒西北三十里源出額林哈畢爾噶鄂拉凡三源東北流一百二十里踰孔道北瀦為小澤以上屬安西北路廸化州後屬天山北路庫爾郭勒庫爾郭勒在奎屯安濟哈雅西四十里源出天山北麓北行迤東㑹阿爾沙圖布拉克又北行至布勒哈齊北折而西行南㑹濟爾噶朗郭勒又西行四十里南㑹額布圖郭勒合而西流為坤都侖布爾哈齊郭勒西南流七十里入於布勒哈齊淖爾濟爾噶朗郭勒濟爾噶朗郭勒在庫爾郭勒西七十里源出天山北麓北流二百里㑹庫爾郭勒西流入布勒哈齊淖爾額布圖郭勒額布圖郭勒在濟爾噶朗郭勒