front:
  text: 欽定四庫全書欽定皇輿西域圖志卷三十一
  hash: sha256:501ec7a13d6c9d75d02cd5f043b3406e50a146aa56e7e1595874a6a08de89a5f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0039_WYG_041-1a, image: WYG0500/WYG0500-0819a.png}
body:
  text: 兵防臣等謹按西域為古西戎土風剛徑民多桀黠樂戰鬬顧其前代兵制所垂書缺有間孟堅為西域傳頗稱賅備然所得而紀者或勝兵數十人或勝兵數百人大略即人即兵選丁壯以供擊刺而已欲進核其卒伍之定數調遣之常期督察之成式糗糧之實用罕得而詳焉準噶爾四部及諸回部曠處荒陲考其山川形勢崇岡壘嶂險足以守長河廣澤深足以塹指顧二萬餘里中掃蕩廓清歸我皇化包戈偃伯以來非建制服屬無以善其後然地大物博惟是戍代往來之孔亟即善後者又將何以為繼我皇上聖謨廣運集大勳於五載之中即為䇿永定於億萬斯年之後於是防守則取諸滿洲暨蒙古索倫諸部屯種則兼用緑營咸有額設以資捍衛而又為之隨宜定制因地分營或更番以均勞逸或永駐以安室家凡皆以西域治西域而經費不取支於中土且利興事集合計邊防兵辨郵傳之需準以屯儲嵗入十盈四五焉猗歟駿烈豐庸卓鑠曩古非賴我皇上宵旰疇咨撫八荒如庭户何以使宏綱細目周備不遺若此又豈前代二師廣武惟是一軍一旅一亭一障之戔戔者乎兹於脫甲之餘備著纘戎之略俾天下後世仰盛朝所以敉絶徼而固丕基者具由方略精詳宏綏逺之謨措施有本非僅修武備而繕軍儲已也志兵防第九
  hash: sha256:d6715950563e6d485268f91de01459108a7f58f58ccc122300e618fbcf54548f
