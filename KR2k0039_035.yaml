body:
  text: 山三天山北路拜塔克哈喇莽奈鄂拉古爾畢達巴庫爾圖達巴阿勒坦鄂拉烏可克達巴阿拉克鄂拉博克達烏魯罕鄂拉薩爾巴噶什達巴古爾班竒喇鄂拉阿爾察克鄂拉阿斯哈圖達巴朱爾庫朱鄂拉塔爾巴噶台鄂拉巴爾巴什鄂拉通古斯巴什鄂拉雅瑪里克鄂拉阿顔台和洛鄂拉巴顔哈瑪爾鄂拉博羅哈瑪爾鄂拉竒喇圖魯鄂拉阿爾噶里圗鄂拉哈喇古顔鄂拉博羅布爾噶蘓鄂拉阿布喇勒鄂拉塔勒竒鄂拉博羅和洛鄂拉烘郭爾鄂博薩勒巴圗烏蘭布喇逹巴罕哈爾察海鄂拉庫克托木達巴阿勒坦特布什鄂拉巴爾魯克鄂拉鄂爾和楚克鄂拉薩里鄂拉色伯蘓台鄂拉呼察斯阿爾噶里圗鄂拉察罕布古圗鄂拉庫隴奎鄂拉格登鄂拉阿勒坦額墨勒鄂拉莎達巴他巴爾遜達巴察察圗逹巴圗賚愛古爾鄂拉布喀鄂拉墨爾根西里鄂拉阿奎鄂拉阿斯哈達巴伊爾該圗鄂拉渾都頼鄂拉庫古里克鄂拉烏可克達巴額得墨克達巴庫穆什鄂拉哈喇布拉克達巴呼巴海鄂拉巴噶布魯勒鄂拉伊克布魯勒鄂拉欽定皇輿西域圗志卷二十二目録欽定四庫全書欽定皇輿西域圖志卷二十二目録山三天山北路拜塔克哈喇莽奈鄂拉古爾畢達巴庫爾圖達巴阿勒坦鄂拉烏可克達巴阿拉克鄂拉博克達烏魯罕鄂拉薩爾巴噶什達巴古爾班竒喇鄂拉阿爾察克鄂拉阿斯哈圖達巴朱爾庫朱鄂拉塔爾巴噶台鄂拉巴爾巴什鄂拉通古斯巴什鄂拉雅瑪里克鄂拉阿顔台和洛鄂拉巴顔哈瑪爾鄂拉博羅哈瑪爾鄂拉竒喇圖魯鄂拉阿爾噶里圗鄂拉哈喇古顔鄂拉博羅布爾噶蘓鄂拉阿布喇勒鄂拉塔勒竒鄂拉博羅和洛鄂拉烘郭爾鄂博薩勒巴圗烏蘭布喇逹巴罕哈爾察海鄂拉庫克托木達巴阿勒坦特布什鄂拉巴爾魯克鄂拉鄂爾和楚克鄂拉薩里鄂拉色伯蘓台鄂拉呼察斯阿爾噶里圗鄂拉察罕布古圗鄂拉庫隴奎鄂拉格登鄂拉阿勒坦額墨勒鄂拉莎達巴他巴爾遜達巴察察圗逹巴圗賚愛古爾鄂拉布喀鄂拉墨爾根西里鄂拉阿奎鄂拉阿斯哈達巴伊爾該圗鄂拉渾都頼鄂拉庫古里克鄂拉烏可克達巴額得墨克達巴庫穆什鄂拉哈喇布拉克達巴呼巴海鄂拉巴噶布魯勒鄂拉伊克布魯勒鄂拉欽定皇輿西域圗志卷二十二目録
