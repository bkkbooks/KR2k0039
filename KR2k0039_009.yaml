body:
  text: 疆域三安西北路二迪化州屬迪化州治頭道灣庄五道灣庄九道灣庄卡子灣庄古木地窩舖土墩子三個泉庄倉房溝庄大西溝䀋池墩昌吉縣治羅克倫蘆草溝呼圖克拜綏來縣治陽巴勒噶遜圖古里克巴克呼蘓烏蘭烏蘇和爾郭斯博羅特克圖魯庫安濟哈雅阜康縣治賽因塔喇庫里葉圖納里特濟木薩得勒呼蘇台欽定皇輿西域圖志卷十目録欽定四庫全書欽定皇輿西域圖志卷十目録疆域三安西北路二迪化州屬迪化州治頭道灣庄五道灣庄九道灣庄卡子灣庄古木地窩舖土墩子三個泉庄倉房溝庄大西溝䀋池墩昌吉縣治羅克倫蘆草溝呼圖克拜綏來縣治陽巴勒噶遜圖古里克巴克呼蘓烏蘭烏蘇和爾郭斯博羅特克圖魯庫安濟哈雅阜康縣治賽因塔喇庫里葉圖納里特濟木薩得勒呼蘇台欽定皇輿西域圖志卷十目録
