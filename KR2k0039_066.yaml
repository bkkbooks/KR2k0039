front:
  text: 欽定四庫全書欽定皇輿西域圖志卷二十九
  hash: sha256:6d4581e2dbd0b4e776345248b5bc94d73d77db4b29c810a609260fe2e5b9de00
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0039_WYG_066-1a}
body:
  text: 官制臣等謹按服外荒墟民稀事簡伊古蕃王部長遴簡才傑以資分理每於中土弗賓弗臣各自為其風氣故考官聨於遐徼周秦以前靡得而聞漢武通西域班傳紀載較詳如烏孫則有將相監吏等官其餘諸國則自輔國侯都尉以下而龜兹官屬尤衆北史載髙昌官制儼若中朝吐谷渾則有王公僕射尚書郎中將軍之號回紇則有內外將相都督將軍司馬之稱雖倣中國位號以名其官而要皆服畔不常未必胥隸臣僕若彼中名目如葉護特勒俟利發吐毛發屈律啜閻洪達之屬聲教曠隔音譯沿訛尤難審證準噶爾居烏孫突厥故壤遊牧分地即為職守回部於漢為三十六國地各有城郭每城之中咸設官司體制攸殊名號亦别仰惟聖天子豐庸懋建全域來歸撫其地治其人開置伊始凡新疆諸境制之以將軍督提守之以監司丞倅將佐辨員既已挈夫領要而滋培既久郡縣斯設命官授秩大小相維規制尤稱賅備至準夷舊官名如圖什墨爾扎爾扈齊宰桑諸職當芟夷藴崇之餘無可復倣應與更新回部二酋授首後諸城伯克望風內附爰仍舊號如阿竒木沙噶納齊以下釐以中朝之品級而授職如故因俗宜民法良意美仍統一於重臣以督領其事由是一階一秩無不自幸為王人而非直前世請封置吏與戊巳骨都僅存虛號者所可比倫萬一矣品秩既區掌司咸載旁徴故實各以類從將來稽典屬之班聫訪西陲之職守均於是編可詳訂焉志官制第八
  hash: sha256:7be7bb1b308863d87a0bb8eaa9993336bc6350349a8eee12e68e8514056341ed
