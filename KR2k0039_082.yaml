front:
  text: 欽定四庫全書欽定皇輿西域圖志卷四十一
  hash: sha256:532ca7264e5cb4a09fe428421524806f13297b7510de3e080bdaa13465b66eef
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0039_WYG_082-1a}
body:
  text: 服物臣等謹按古聖王垂衣裳以治天下制器尚象以前民用觀繫辭所載作網罟以下十三事不惟制民生飲食衣服居處之宜使之咸遂其欲而且行旅有其資捍患有其備飬生送死有其具所以衛人生而周人用者薄海以內罔有弗暨而外域殊方則規制未之或及勢限之也且夫創物固知者所為而述非工巧不能精且良魯縞齊紈鄭刀宋斤國能所擅弗可遷也故有此之所急彼或不適於用彼之所有此或不具其材者五方之民猶且衣服異宜器械異制况在荒陬遐裔乎載稽周禮考工記典絲典枲厥有定制攻金攻木爰垂良法今西域稟金行之性氣候沍寒人之擅長在乎攻金與皮其婦功不尚絲枲而尚織罽毯有城郭者頗務攻木之工而弗精造車近和闐者間擅磨礲之技若夫書繪陶旊諸事兼之或鮮兹者疆索逺閎羣生咸遂舉其人之日用飲食胥被聖天子範圍曲成之澤自今伊始冠帶文物制作精良固當駸駸乎日盛矣顧前此朴遫之風尚存未宜略而弗考爰采其服飾器用之倫各仍本號用中土備物所有擬議而審定之至於古物流傳傳若玉盤玉圭銅𠷑嚕篘之屬舊號彼中珍異當掃穴開屯之後均得驛致明廷詳求端委偕兑和而列序荷宸翰以增輝藉仰我皇上日新永保不貴異物之至意非僅如曩代獲休屠金人漫侈逺略者所可比倫萬一也因並著於編志服物第十七
  hash: sha256:88295abe3eba078d62f1fefb221c1effaa2c62ce4303edaa32ff1eec896b72b2
