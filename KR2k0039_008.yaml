body:
  text: 疆域二安西北路一哈密屬東至塔勒納沁接喀爾喀界西至哈喇都伯通天山南路闢展屬界西南至半池泉星星峽博羅圖阿璊接安西南路安西州界南至沙磧北至天山接鎮西府界哈密哈密在安西州城西北八百七十里距京師七千一百八十里城二其舊城周四里東北二門康熙五十六年建城東有水西南流新城雍正五年建周里許東西北三門為官兵駐防之所東闌干水西賽巴什湖夾流十餘里滙於新城之南曰南湖二城皆北倚大山三面平曠所居回民以耕牧射獵為生田疇沃衍園林蕃廡氣候溫暖泉甘土肥山泉競發巨細不一伏流或數十里或百里許出地引渠溉田城外東西兩關地當孔道商民輻輳號稱殷庶其地於漢屬胸奴號伊吾盧後漢時始內附為伊吾魏入蠕蠕隋置伊吾郡旋屬突厥唐置西伊州改伊州五代時號胡盧磧宋入回鶻元為威武王分鎮之所明設哈密衛後入土爾番本朝康熙三十五年回酋額貝都勒拉遣貢駝馬及刀三十六年額貝都勒拉遣子郭帕伯克擒噶勒丹子色布騰巴勒珠爾來獻其地始內屬後漢書西域傳永平十六年明帝命將帥北征胸奴取伊吾盧地遂通西域章帝二年胸奴遣兵守伊吾地和帝永元元年大將軍竇憲破胸奴二年憲遣副校尉閻槃掩擊伊吾破之安帝元初六年遣行長史索班將千餘人屯伊吾以招撫之於是車師前王及鄯善王來降自敦煌西出玉門陽關涉鄯善北通伊吾千餘里伊吾地宜五穀桑麻蒲萄漢常與胸奴爭車師伊吾以制西域魏書髙昌傳太和五年髙昌立馬儒為王二十一年表求內徙髙祖納之遣韓安保赴之割伊吾五百里以儒居之蠕蠕傳其西則焉耆之地東則朝鮮之地北則渡沙漠南則臨大磧其常所會庭則敦煌張掖之北小國皆苦其冦抄羈摩附之隋書薛世雄傳世雄為玉門道行軍大將與突厥啓民可汗連兵擊伊吾師次玉門啓民可汗不至世雄孤軍渡磧伊吾初謂隋軍不能至皆不設備及聞世雄兵已渡磧大懼請降世雄遂於漢舊伊吾城東築城號新伊吾留銀青光祿大夫王威以甲卒千餘人戍之而還西突厥傳東拒都斤西越金山龜兹鐵勒伊吾悉附之元和志古伊州貞觀四年內附於其地置伊州州境東西一千一十五里南北四百九十里西南至西州七百三十里東南取莫賀磧路至瓜州九百里正南微東至沙州七百里領縣三伊吾納職柔逺唐書地理志伊州伊吾郡本西伊州貞觀六年更名伊吾貞觀四年置并置柔逺縣神功元年省入焉在大磧外南去玉門關八百里五代史髙居誨記沙州西曰仲雲其牙帳居胡盧磧云仲雲者小月支之遺種也吾盧磧漢明帝時征胸奴屯田於吾盧蓋其地也地無水而常寒多雪每天暖雪消乃得水匡鄴等西行入仲雲界至大屯城宋史髙昌傳王延德使髙昌歷伊州州將陳氏其先自唐開元二年領州凡數十世唐時詔敕尚在次歷益都次歷納職城在大患鬼魅磧之東南望玉門關甚近明史哈密傳洪武中太祖定輝和爾舊作畏兀兒今改正地漸逼哈密昂克特穆爾舊作安克帖木兒今改正遣使朝貢永樂二年封忠順王四年立哈密衛八年封托里特穆爾舊作兔力帖木兒今改正為忠義王宣德元年命布達錫里舊作卜答失里今改正嗣忠順王自是二王並貢其地北衛拉特舊作瓦剌今改正西土爾畨舊作吐魯畨今改正東沙州罕東赤金諸衛衛拉特酋額森舊作也先今改正兵圍哈密取王母北還天順四年王卒母弩溫答失里主國事七年北酋寄寄肅蘭舊作亂加思蘭今改正破其城王母走苦峪朝廷不能援成化二年擢巴圖穆爾舊作把塔木兒今改正為右都督攝國事八年子哈森舊作罕慎今改正嗣職土爾畨襲破其城十年命罕慎權主國事築苦峪城移哈密衛於其地十八年罕慎襲破哈密還居故土𢎞治元年封忠順王土爾畨阿哈麻舊作阿黑麻今改正誘殺之據其地二年都指揮阿穆呼朗舊作阿木郎今改正襲破之五年立善巴舊作陜巴今改正為忠順王六年阿哈麻襲哈密執善巴禽阿穆呼朗支解之七年廷臣請令都督昂克波賴舊作奄克孛剌今改正總理哈密且修苦峪城凡畨人散處甘涼者令悉還其地後諸畨以朝廷閉關絶貢不得入咸怨阿哈麻乃歸善巴仍其舊封自是哈密復安十八年封善巴子巴雅濟舊作拜牙即今改正為忠順王正德八年叛入土爾畨莽肅爾舊作滿肅兒今改正遣和卓塔濟丁舊作火者他只丁今改正據哈密十二年莽肅爾移居之分兵據沙州入寇後復入貢而王迄不還自是置哈密不問後為沙巴達舊作失拜煙答今改正子彌爾瑪哈穆舊作迷兒馬黑麻今改正所有服屬土爾畨猶比嵗一貢迄隆慶萬厯間不絶然非忠順王苗裔矣按徼外山川部落名號代殊依類推求務詳厥始伏讀御製哈薩克使臣至令隨圍獵詩跋云史稱大宛東則扞冞于闐扞冞音韻與今之哈密為近或又以為哈密為古伊吾引歷代開田屯兵建設州縣為據然焉知非漢占伊吾之地屯田設戍而扞冞乃西遷近于闐而居乎又安知非中國浸微而扞冞仍來其故處乎臣等紬繹聖訓考證史書前漢書載陽關西一千六百里至鄯善又西七百二十里至且末又西二千里至精絶又西四百六十里至扞冞又西三百九十里至于闐是前漢時之扞冞固在陽關以西四千七百里外其時尚未取伊吾盧地也惟是伊吾與哈密音不相類意扞冞國人嘗居此因轉扞冞為哈密如和闐之為古于闐理或然也其扞冞國遷徙之迹雖不可考要之哈密為扞冞轉音則較然不誣嘗推而論之漢車師前部髙昌壁今闢展地在哈密西八百里後漢書稱伊吾北通車師前部二千二百里方隅道里似不相合然考明帝取伊吾盧地遂通西域于闐諸國知漢時伊吾東西境甚廣今自闢展南踰大磧更南行當玉門陽關之西與漢鄯善國地南北相直班志謂涉鄯善北通伊吾自伊吾北通車師者其南北亦相直知當日鄯善北車師南尚屬伊吾西境隋薛世雄渡大磧而築城留戍其境亦在髙昌南也若魏髙祖欲以伊吾五百里地封髙昌王去髙昌四百里迎韓安保而安保不至還伊吾所謂五百里伊吾地在髙昌東南四百里外可知今自哈密西行至闢展適在四百里外而自哈密西南行至博羅圖阿璊敦煌縣交界四百餘里至星星峽蘆岡泉與安西州本境交界五百餘里應即當時欲封髙昌王地蓋今哈密止兼有唐時伊州屬之伊吾柔逺兩縣地而所謂納職縣者應在今安西州西境外地與漢時伊吾盧故地無涉蘇木哈喇垓蘇木哈喇垓亦名頭堡東距哈密城六十里其東南境村莊凡五泉二十五處魏書帝紀太和十二年蠕蠕伊吾戍主髙羔子以城內附唐書西域傳伊吾城者漢宜禾都尉所治商胡雜居隋末內屬置伊吾郡天下亂復臣突厥貞觀四年城酋來朝頡利滅舉七城降列其地為西伊州明史哈密傳成化十八年哈密右都督哈森夜襲哈密城破之雅蘭舊作牙蘭今改正遁走乘勢連復八城遂還居故土按唐書載伊吾七城明史載哈密八城今哈密西境凡五堡得五城其東境亦多回民聚處七城八城之舊大槩可見至建置之始在漢築有伊吾城魏髙羔子以城內附隋薛世雄於漢伊吾城東築城號新伊吾與今新舊諸城方位異同則未宜強附耳阿斯塔納阿斯塔納亦名二堡在蘇木哈喇垓西二十里東距哈密城八十里境有村莊凡三泉二十三處托郭棲托郭棲亦名三堡在阿斯塔納西北四十里東距哈密城一百二十里境有村莊凡五泉十三處最著者白楊溝栁樹泉二水南流數里乃合拉布楚喀拉布楚喀亦名五堡在托郭棲西南二十里東距哈密城一百四十里境有村莊凡十三泉九處小河一道哈喇都伯哈喇都伯亦名四堡在拉布楚喀西二十里東距哈密城一百六十里境有村莊凡二十三泉八處迤北二十里有大泉流水成渠賽巴什達里雅互見水賽巴什達里雅在哈密城東北二十里地以湖名其東北境為牛毛湖兩湖左右皆有屯田見屯政門格子煙墩格子煙墩在哈密城東南二百十五里自城東南行七十里為西黃蘆岡又東行七十五里為西長流水又東南行七十里至此按元和志柔逺縣西北至伊州二百四十里古人計地自某縣至某縣皆據地中以起數不指邊境而言則所謂二百四十里者由柔逺縣城至伊州州城之數也今格子煙墩北至哈密城二百十五里以古今丈尺計之則柔逺故城當在於是星星峽互見山星星峽地以峽名在格子煙墩東南二百八十里西北距哈密城四百九十里自格子煙墩東南行一百五十里為苦水又東南行八十里為沙泉子又東南行五十里至此為哈密東南境接安西州界雍正十三年征準噶爾出師於此修塗轉餉有民人楊可祿修路碣記北魏蠕蠕傳其常所會庭則敦煌張掖之北元和志柔逺縣西北至伊州二百四十里縣東有柔逺故鎮因以為名楊可祿修路碣記皇威震疊底定西酋整厥虎旅駐於伊州啓拓疆宇騰聲遐陬轆轤飛挽駕馬服牛地靈取順荒磧泉流惟山磊砢輪蹄是憂聿來善民攘剔平修王道坦蕩振古長留按北魏蠕蠕邊界西抵焉耆南臨大磧而常所會庭在敦煌之北當焉耆大磧東南境今自星星峽半池泉博羅圖阿璊迤西北分道以達於哈密皆其地也今之哈密唐為伊吾縣在伊州郭下柔逺縣在伊州東南今自星星峽至哈密屬東南境當在唐柔逺縣地多都摩垓多都摩垓在哈密城東二百十里東西皆有泉源出天山北麓夾流過多都摩垓北合流百餘里瀦為大澤德都摩垓德都摩垓在多都摩垓東北七十里西南距哈密城二百八十里東西皆有泉即塔勒納沁河之北流也為哈密東北境自德都摩垓西北行一百二十里至圖古里克接鎮西府界又自哈密城北八十里至黑帳房又北二十里為長山子又北二十里為南山口是為哈密北境接鎮西府松樹塘界塔勒納沁塔勒納沁在哈密城東北二百二十里土城一有屯田見屯政門半池泉半池泉地以泉名在塔勒納沁東南二百五十里自塔勒納沁東南行五十里為沙泉子又東南五十里為瑣瑣阿卜又東南一百五十里至此為哈密東南境接安西州界按自半池泉至塔勒納沁屬哈密東南境以元和志柔逺縣西北至伊州二百四十里之文考之蓋亦柔逺縣地栁樹泉栁樹泉地以水名在哈密城南六十里踰河而至其東南六十里為哈什泉又一百三十里為酤水又八十里為大泉一帶山泉饒裕博羅圖阿璊博羅圖阿璊在哈密東南四百里經栁樹泉哈什泉酤水大泉至此為哈密東南境接安西州屬敦煌縣北界按古伊州所屬伊吾柔逺二縣伊吾居柔逺之西今自安西州北至哈密之道偏東屬柔逺縣故地則自敦煌縣北之青墩峽出博羅圖阿璊由栁樹泉至哈密之道偏西應屬伊吾縣故地也又按舊一統志載自安西鎮抵哈密分二道一由安西鎮為東道一由沙州為西道後因安西鎮為往來總滙始專行東道即今由得勝墩經格子煙墩至哈密之路乾隆二十七年移設安西府於敦煌專行沙州之西道三十二年仍改由東道云以上屬哈密察罕和羅海察罕和羅海在哈喇都伯城西七十里哈密西境外南臨大磧內勒滚內勒滚在察罕和羅海西七十里地多碎石有水草南臨大磧阿薩爾圖阿薩爾圖在內勒滚西六十里南有澤名沙拉淖爾又南臨大磧伊里克庫木伊里克庫木在阿薩爾圖西六十里地無水草南臨大磧察克瑪克塔什察克瑪克塔什在伊里克庫木西六十里地無水草南臨大磧額什墨額什墨在察克瑪克塔什西五十里南臨大磧又西一百五十里至洪入闢展界自伊里克庫木以西皆沙磧至此則沙磧之內微有水草云按自察罕和羅海至此南境皆臨大磧今考唐書吐蕃傳吐蕃