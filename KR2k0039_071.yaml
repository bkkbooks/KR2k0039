front:
  text: 欽定四庫全書欽定皇輿西域圖志卷二十四
  hash: sha256:8beef81dcd55399a69f288afd97214b8275454f5f14812ecb63aa38bdee42840
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0039_WYG_071-1a}
body:
  text: 水臣等謹按大地之勢西北髙而東南下東南號稱澤國若蒙汜荒墟斥漠千里宜不足于水者以今審論殊不謂然蓋內地之水東流就下而西域之水則東西並流者也內地之水隄防宣泄兼賴人功而西域之水則髙下浮沈専憑地勢者也內地之水深淺有定而西域之水則時因氷雪消融成渠冬夏盈虧者也內地之水土地堅韌伏流鮮少而西域之水則滲入沙磧或伏或現發之無常時出之無常候者也是故語其大則洪濤駭浪周圍數百里經流數千里而漭漾悠湙之勢成語其細則纖波斷流縷分數十道泛溢數十區而瀠洄泮渙之形著是不惟資以利用抑且劃為地險襟帶絶徼古而然矣我聖朝德威逺被蒲海風清爰據星軺所經尋波别𣲖知昔人所謂蔥嶺以東水皆東流蔥嶺以西水皆西流者大率緣山而發就下而趨瀉為長河瀦為巨浸而審其經絡要皆各有所歸耳竊惟漢桑欽作水經承二百四十四家之紀載其書汗漫未易殫詳然其首著黃河出䓤嶺于闐分南北河經疏勒莎車諸國而東者證以今時形勢則較然符合為之疏通貫注備悉指歸復參以他書之説庶幾經緯非誣而源流可證由是判張騫不根之論擴都實拘墟之詞紀之以藪浸而國辨居行疏之以渠塘而人兼耕牧即我國家清晏之隆所以暨訖於無外者不由兹可見哉志水第七
  hash: sha256:0179a63084a5c1602fd5c5f84412511ab40d6cc14ad5f563084e6caeb2f06f87
