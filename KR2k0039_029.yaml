front:
  text: 欽定四庫全書欽定皇輿西域圖志卷五
  hash: sha256:94f9c14a8b7031fccfbaedad1d04c95e42ce6ebbe96a81f8f102e9575d7195a6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0039_WYG_029-1a, image: WYG0500/WYG0500-0616a.png}
body:
  text: 列表二闢展表按闢展屬漢為車師六國三國時猶仍舊名晉書不載車師髙昌等國然考北史髙昌傳云其地有漢時髙昌壘晉以其地為髙昌郡張軌里光沮渠蒙遜據河西皆置太守以統之是髙昌之名實始於晉也五代時山南諸部悉陷吐蕃其分併之迹無可考故諸表俱缺魯克察克元史舊名魯古塵哈喇和卓元史舊名合喇火者明史舊名火州亦名哈喇火州皆對音之訛今並改正哈喇沙爾表按元史載巴什伯里置新站三十道里必廣明史稱其南接于闐北連衛拉特西抵賽瑪爾堪東抵哈喇和卓據此則自闢展以西于闐以東皆當為巴什伯里地故自哈喇沙爾以下諸表元明兩代略同若葉爾羌在和闐西境自與巴什伯里無涉庫車表賽喇木表按龜兹於古為大國疆域廣逺庫車沙雅爾賽喇木拜皆屬龜兹國故地而其東境則晉魏周隋尚涉哈喇沙爾西界故庫車賽喇木兩表略同阿克蘇表按後漢書疏勒國東北經尉頭溫宿姑墨龜兹至焉耆而未為溫宿立傳前漢書云王莾時姑墨國王殺溫宿王并其國疑溫宿於後漢時尚為姑墨所并至三國而其國復立也又溫宿姑墨尉頭疏勒莎車于闐諸國不著於晉書即所載焉耆龜兹二國亦無兼并他國之文周書自焉耆龜兹于闐三圖以外紀載未偹故自阿克蘇以西晉周二代多缺烏什表喀什噶爾表按元史地理志西北地附録中名號錯出莎車于闐故地難以確指令並從略喀什噶爾元史作合失合兒明史作哈實哈兒今並從本音更正葉爾羌表按自皮什南至皮雅勒阿勒瑪漢為皮山國地北魏後并屬于闐與今之和闐西境接界考古俱屬于闐國地然為葉爾羌東南境故晰係表內和闐表按西域前代諸國分併更置稱名不常惟和闐為古于闐則自漢迄明無異尤堪徴信元史雖缺紀載然明于永樂間入貢則其國存於元代可知矣左右哈薩克部表按外藩諸部史傳紀載多有未偹僅就史書中有據者書之而别詳其説於傳其無據者略東西布魯特部表安集延瑪爾噶朗霍罕那木干諸部表塔什罕部表拔達克山博洛爾布哈爾諸部表愛烏罕痕都斯坦巴勒提諸部表欽定皇輿西域圖志卷五欽定四庫全書欽定皇輿西域圖志卷五
