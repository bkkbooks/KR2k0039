body:
  text: 封爵一都爾伯特屬按四衛拉特次序舊首綽羅斯次都爾伯特和碩特土爾扈特因土爾扈特他徙附以輝特兹叙封爵以都爾伯特歸誠最先忠謹自保爰為首敘次及綽羅斯和碩特輝特平定西域後十年土爾扈特來歸故敘於後於是新舊四衛拉特始全至都爾伯特台吉䇿凌首先内附特封汗號為聞風歸來諸部倡至今承襲罔替其綽羅斯部之噶爾藏多爾濟和碩特部之沙克都爾曼濟輝特部之巴雅爾雖同時封汗而潛因擕貳自即誅夷汗號並除若土爾扈特部之渥巴錫則嘉其逺域歸順且係舊汗阿玉竒之後俾襲汗號而錫以新名用昭優異為按屬分編詳注各條下以備考其親王郡王貝勒貝子公諸爵以次遞敘父子兄弟承襲者各隨條接叙為例云乾隆十八年冬凖噶爾都爾伯特部台吉䇿凌等率衆内附十九年五月覲於熱河詔封爵宴賚有差均授為扎薩克俾還安㳺牧移其部於阿爾台今改對音阿勒坦山北凡都爾伯特部先後受封及襲封者偹登如左䇿凌初封和碩親王加雙俸晉封特古斯古魯克汗卒子索諾木古木布襲封䇿凌烏巴什初封多羅郡王晉封和碩親王伯什阿噶什封和碩親王納黙庫初封多羅郡王晉封和碩親王䇿凌孟克初封多羅貝勒晉封多羅郡王卒子巴雅勒當襲封卒弟伯斯和勒襲封色布騰封多羅貝勒加郡王品級卒子巴桑襲封多羅貝勒巴圖博羅特封多羅貝勒剛多爾濟封多羅貝勒喇嘛扎布封多羅貝勒根敦封固山貝子洛壘原端封固山貝子額爾得尼封固山貝子班珠爾封固山貝子卒嗣子竒達襲封布圖克森封固山貝子孟克特木爾封固山貝子瑪什巴圖初封輔國公晉封固山貝子烏巴什封固山貝子達木巴都噶爾封固山貝子巴圖孟克封輔國公剛封輔國公布顔特古斯封輔國公卒子塞楞襲封孟克博羅特封輔國公按諸藩列爵舊制和碩親王多羅郡王多羅貝勒固山貝子鎮國公輔國公凡六等有賜稱為汗者視王爵加優志特恩也兹凖噶爾新附封爵無鎮國公自親王以下及優封汗號如舊制綽羅斯以下諸屬同綽羅斯屬乾隆二十年三月凖噶爾綽羅斯部台吉噶爾藏多爾濟等率屬内附九月覲於熱河詔封爵宴賚有差均授為扎薩克十一月達瓦齊俘至宥罪加恩備藩京邸澤及世嗣為臚叙於左噶爾藏多爾濟封綽羅斯汗為扎那噶爾布所殺達瓦齊封和碩親王卒長子羅布扎降襲多羅郡王以罪除次子富塔喜降襲多羅貝勒諾爾布林沁封多羅郡王扎那噶爾布封多羅貝勒以叛誅碩爾錐音初授騎都尉世職晉封輔國公以罪除哈薩克錫喇初授騎都尉世職晉封輔國公以罪除布庫察罕封輔國公以叛誅尼瑪初授騎都尉世職封輔國公以叛誅薩拉爾封一等公晉號超勇以罪除後復封超勇伯卒子玉魯斯襲封以罪除瑪木特封三等公晉號信勇按外蕃錫封舊無伯爵薩拉爾以軍功承矌典在五十功臣列繪像紫光閣並荷睿裁製贊邀榮尤至云和碩特屬乾隆十九年七月凖噶爾和碩特部台吉班珠爾等率屬内附十一月覬於熱河詔封爵宴賚有差均授為扎薩克二十年九月台吉沙克都爾曼濟等入覲亦封爵有差三十六年台吉公格巴延楚克等隨土爾扈特部來歸並䝉恩錫為彚著於編沙克都爾曼濟封和碩特汗以罪誅班珠爾初封多羅郡王晉封和碩親王圖們封多羅貝勒以罪誅諾爾布敦多布封多羅貝勒卒子博爾和津襲以罪除公格封多羅貝勒卒子德勒克渥巴錫襲封納噶札初封輔國公晉封固山貝子卒弟達克巴降襲輔國公卒弟巴爾濟襲封巴延楚克封固山貝子色布騰封輔國公諾爾布封輔國公卒子達瓦藏布襲封諾爾布敦多克封輔國公達瓦封輔國公卒弟巴雅拉呼襲封按沙克都爾曼濟於投誠受封汗號後命為盟長居全部於巴爾庫勒其子圖們亦率屬由裕勒都斯來歸並加封賚沐恩深至自應恭順倍加以兾永邀渥澤廼際凖夷餘孽擾亂之餘漸彰窺伺驕蹇之狀在事臣工仰承睿照先事防閑因形迹之可疑折萌芽於未發應機立斷並就誅夷雨露雷霆隨物以付眎大造之因材而篤夫豈有異理歟輝特屬乾隆十九年七月凖噶爾輝特部台吉阿睦爾薩納等率衆内附十一月覬於熱河詔封爵宴賚有差均授為扎薩克二十年九月巴雅爾等入覲亦封賚有差阿睦爾撒納封和碩親王加雙俸䕶衛倍添子封世子尋以叛除伏冥誅巴雅爾封輝特汗以叛誅齊木庫爾初封多羅貝勒晉封多羅郡王卒子䇿卜登多爾濟襲封以罪除扎木參封多羅貝勒普爾普初封固山貝子晉封多羅貝勒以罪除德濟特封固山貝子以罪除克什克封固山貝子以罪除和通額墨根封輔國公卒子瑪瑪襲封根敦扎布封輔國公古木扎布封輔國公巴桑封輔國公以罪除布魯爾封輔國公按四衛拉特台吉於乾隆甲戌乙亥間先後歸誠我皇上渥典普加原無異視始意分封四汗固將㮣予矜全乃阿睦爾撒納覬為總台吉不果負恩背叛無復人心而綽羅斯和碩特輝特諸台吉大都狙詐反覆自即淪夷惟都爾伯特屬堅心内面始終一節以忠謹獨存由是爵遍於朝賞延以世實與大造同此帡幪而中外初無岐視也若逹瓦齊未抗顔行以降王備藩邸第而識時早歸之薩拉爾則嘉其從征戮力俾功存旂鼎貌炳丹青聖主栽培矜宥之權衡有超出尋常萬萬者而諸人得仰沐恩榮垂芳盛世是又千載一時之厚幸也夫土爾扈特屬凖噶爾土爾扈特部為舊四衛拉特之一其汗和鄂爾勒克當巴圖魯渾台吉時與三衛拉特不和率其子書庫爾岱青西北去居俄羅斯之額濟勒地其曾孫阿玉竒留居故地後書庫爾岱青自西藏還以阿玉竒去時策妄阿拉布坦復逐其子散扎布歸額濟勒其地南限哈薩克東阻俄羅斯乆慕國家聲教不得通及阿玉竒子敦魯布喇什為汗時於乾隆十九年遣使假道俄羅斯二十一年達中國朝京師賜宴並令赴西藏熬茶三十六年其汗渥巴錫率屬内附覲於木蘭隨圍觀獵復隨至山莊詔封爵錫賚有差如都爾伯特諸部例云渥巴錫封土爾扈特卓里克圖汗卒子䇿凌納木札爾襲封䇿伯克多爾濟封和碩親王舍楞封多羅郡王巴木巴爾封多羅郡王卒子䇿楞德勒克襲封謨們圖封多羅貝勒旺丹封固山貝子竒布坦封固山貝子額墨根渥巴錫封固山貝子卒子公坦襲封沙拉扣肯封固山貝子拜濟呼封輔國公按土爾扈特渥巴錫等以其部衆三萬餘户行經萬有餘里不藉招徠欵關内附我皇上錫爵分封給廩餼資耕牧綏遐柔逺無隱弗周由是四衛拉特均𨽻臣僕垂無外之鴻業洵非人力所及幾者矣同時受貝勒貝子封者和碩特台吉公格巴延楚克析係前和碩特屬條以清部居兹不複載御製至避暑山莊日都爾伯特台吉䇿凌等接見甲戌路左傾城候屬車來歸憐逺自員渠識時稱傑惟嘉爾敷德賔遐何有予錫爵都教加衮服賜飱還擬賦嘉魚一家中外歡言暢底事周官藉象胥御製流杯亭小宴都爾伯特親王䇿凌等甲戌宛轉清流繞石渠羽觴小宴欵康居呼前手賜笑言接喜可身循禮法初荒略從來事抔飲傾誠那解餙虛譽褭蹏錦段頒中禁滿載歸教艷拂廬御製宴都爾伯特親王䇿凌郡王䇿凌烏巴什等於萬樹園詩以紀事甲戌萬樹參天煥曙霞穹廬酒醴樂柔遐薰風五月偏含爽湛露三廵共拜嘉天與人歸寕可拒茅分爵錫自應加徵招應律歡情洽試聽編鐘設虡牙渠搜何必鎮天驕來賀傾誠不憚遥外廐馬為中廐獻新賔人併舊賔邀時四十九旗扎薩克并青海諸部王公台吉畢集行在皆令入宴鐻鍝自可隨方俗冠服同教式本朝䇿凌等入覲後即賚以冠服俱從本朝之制避暑匪今廑惠逺千秋家法仰仁堯御製凖噶爾輝特部台吉阿睦爾撒納歸誠信至詩以識事甲戌惠逮條枝宴賚陪駐避暑山莊賜宴都爾伯特台吉䇿凌等封以王公等爵命返㳺牧烏孫又報挈羣來敢云德化俾苗格信是天恩致宇恢重賞崇封吾豈靳推心置腹彼何猜山莊計日應重到將以冬月復臨熱河晉見施恩深意當年萬載培御製至避暑山莊日輝特台吉阿睦爾撒納等接見甲戌冬節山莊此重去聲尋衝寒為慰逺藩心開疆擴土非吾志機輳人歸藉帝臨朕自登極以來初無用兵意邇年準夷内亂簒奪相仍都爾伯特輝特和碩特諸台吉率衆來歸先後接踵既當為降人籌乆長計且實有可乘之機皆藉上蒼黙眷云迎蹕翹瞻猶卉服詰朝寵錫易華簮薰風五月員渠宴壁上詩箋一再吟御製錫封輝特親王阿睦爾撒納等謝恩朝見詩以紀事甲戌初秋欵塞柏冬權山舘來迎表寸丹阿睦爾撒納以七月至即請入覲朕因其未出痘命俟東廵廻蹕至熱河謁見中國懷柔寧過厚逺人禮數且從寛乍瞻大典身猶踧得厠親藩意倍歡阿睦爾撒納同來歸附渠長二十餘人各錫郡王貝勒公封爵均命為扎薩克與内扎薩克諸藩等寵示諸侯王上位漢家終是畏呼韓御製賜宴輝特親王阿睦爾撒納等詩以紀事甲戌黄屋髙張宴析支懷音内面後先隨敷文底事稱干羽施惠何難與解推疆埸都欣效奔走命阿睦爾撒納赴北路軍營以來年出師意甚踴躍衣冠已覺習威儀來歸諸台吉皆賜冠服入宴時拜跪如禮晚來燈景還教預恰值冰輪正滿時是日仲冬之望御製即事甲戌松塢雲莊徃復還新藩三接恰餘閒歸心底限窮邊外繼踵頻來数月閒今年兩至熱河五月中歸誠之都爾伯特台吉策凌等迎謁加恩宴賚錫爵有差比輝特台吉阿睦爾撒納繼至復以冬至後駐山莊受朝錫賚如初頃烏良海宰桑禡木特等降附則因其已出痘即于京師見之便擬皇風浹西海果然積雪㸔南山南山積雪為三十六景之一舊作有留觀直待到深冬之句蜃牕萬景供吟凭冰磴寒林懶試攀御製凖噶爾台吉噶爾藏多爾濟歸化信至詩以紀事乙亥呼偈披忱寵賜新夙沙交臂又來賓命師底用張三伐西北兩路所用薩拉爾阿睦爾撒納皆率先降附之凖噶爾部衆將軍班第永常董率之而已本欲以餘力舉之故禡牙命將諸典禮皆未舉行安逺惟因恤兆人先是檄諭諸部因達瓦齊簒奪肆虐荼毒諸部出師本意惟以伐罪寧人逺近聞風傾附耕者不變咸慶來蘇正喜㨗音來禁苑還期鞠旅共賢臣水西流處均東面天佑欽承倍敬寅御製駐蹕興安綽羅斯台吉噶爾藏多爾濟等來謁詩以紀事乙亥定逺非榮一矢加仰流鱗集不辭遐烏孫歸去新䝉號觻得頻來共拜嘉開宴旋當賚黼黻俟至熱河合新舊諸䝉古王台吉普加宴賚賜新至者冠服是日先賜鞍馬扈圍先此賜駰騢朝家獵狩應教預漫擬長楊事大誇御製命噶爾藏多爾濟諸台吉隨圍即事得句乙亥懷惠無勞詠匪茹櫜鞬左右聽相於底須嶻㠔㭬為弋自有新安周作阹子弟三善枉矢後先四部讋穿鐻厄魯特四姓又謂之衛拉特四部山莊指日旋清蹕凱宴還賡零露湑御製宴噶爾藏多爾濟等即席得句乙亥風清日朗好秋時嘉會新藩式燕儀衆建一如扎薩克悉臣今逮綽羅斯四衛拉特綽羅斯氏為彼中正派向未内附兹始封噶爾藏多爾濟為綽羅斯汗其餘王公及扎薩克以次分封一如喀爾喀及内四十九旗之制露瀼畢令霑三爵䝉占善飲酒而厄魯特為尤甚是日汗王及諸台吉皆手賜三爵月上仍教閲九枝是夕陳烟火賜觀詎我懷柔能致逺神堯威惠萬年垂御製都爾伯特台吉伯什阿噶什來覲封為親王詩以紀事丙子來歸就弟兄前年來歸之策凌策凌烏巴什皆其同族弟兄嚮化慕簮纓不作逆天黨伯什阿噶什曽于軍營告逆賊阿睦爾撒納反謀叛逆招之不赴惟殷捧日誠用茲嘉乃績便與錫殊榮式戒蜩螗沸永遵帶礪盟御製萬樹園宴都爾伯特親王伯什阿噶什及土爾扈特使臣吹札卜即席得句丙子碧霄晴旭曉光澄穹幕髙張翠毾㲪禮法不拘從所習友羣何礙集相仍捧盈常切予心懼奠逺惟欽祖德頻萬樹清暉懸聖日未曽可識昔猶曾御製萬樹園賜都爾伯特親王伯什阿噶什及土爾扈特來使觀燈丙子鱗集來王有後先堅昆馳使又踪連衢尊錫宴前朝洽寳炬裝燈午夜姸銀燕火蛾紛樹下驚麞駭鹿避崖巔侈觀詎為誇遐屬曶爽光明示别權御製宴土爾扈特使臣丙子烏孫别種限羅义土爾扈特亦凖噶爾厄魯特也舊為四衛拉特之一曰綽羅斯曰都爾伯特曰和碩特曰土爾扈特策妄阿拉布坦時與土爾扈特搆釁土爾扈特全部西北去乃名輝特為一衛拉特故今土爾扈特南則限於哈薩克東則限於俄羅斯欲至中國必假道於俄羅斯俄羅斯又名羅义云假道﨑嶇歳月賖戌年自彼部起程今始至天闕不辭欽獻賮雪山何礙許熬茶䝉古以詣西藏熬茶為要務故並許之覆幬誰可殊圓蓋中外由來本一家彼以誠輸此誠惠無心蜀望更勤遐御製伊犁將軍奏土爾扈特汗渥巴錫率全部歸順詩以誌事有序辛夘伊犁將軍伊勒圖等奏土爾扈特汗渥巴錫及其台吉策伯克多爾濟並舍楞等率其部衆三萬餘户來歸先期遣使至伊犁具書通欵自言為阿玉竒汗正系向居俄羅斯地乆願為大皇帝臣僕而無機可乘乃於去冬謀棄舊逰牧挈屬内附因自彼逸出行程萬千有餘里閲半年餘始抵卡倫乞准令入覲以伸積誠渥巴錫等亦先後來至伊犁察其詞意懇切郵函以聞先是安泰奏偵知土爾扈特部内附信即遣額駙色布騰巴爾珠爾徃迎之今即諭其偕渥巴錫等至山莊朝謁而舒赫德亦先所命由烏什馳徃莅其事者因令代伊勒圖為將軍駐伊犁安輯新附之衆給以餼贍振其乏也授之牧地資其生也其汗及台吉宰桑至者將錫宴賚封爵秩而其部衆則量地分編以居聯其情亦渙其勢也蓋土爾扈特自入俄羅斯逺阻聲教越今幾六七十年乾隆丙子秋其汗敦嚕布喇什雖曾使人入貢苐宴而遣之兹乃不藉招致全部内屬誠有不期然而然者且凖噶爾自底定以來築城安屯無異中國郡縣今土爾扈特復𨽻我藩屬於是四衛拉特之衆盡撫而有之可謂盛矣然余履泰持盈之念彌以是為兢兢而系之以詩紀實也其詳分注各句下此則毋庸覼縷矣土爾扈特部昔汗阿玉竒今來渥巴錫渥巴錫為土爾扈特汗阿玉竒之孫敦魯布喇什汗子也明背俄羅斯向化非招致頒恩應博施舍楞逃復返平定伊犁時舍楞曽計害我副都統唐喀禄逃匿俄羅斯彼時即向索取而俄羅斯以土爾扈特舊係彼屬竟不送還今舍楞既棄彼來歸俄羅斯即向我求索亦有辭折之然莫若先以此意令典屬傳檄示知尤見中國光明正大彼亦合無詞衛拉昔相忌携孥徃海濵凖噶爾舊凡四部曰綽羅斯曰都爾伯特曰和碩特曰土爾扈特為四衛拉特策妄阿拉布坦時與土爾扈特搆釁其汗阿玉竒統全部西北去乃以輝特為一衛拉特而土爾扈特部遂居俄羅斯地終焉懷故土遂爾棄殊倫俄羅斯素不奉佛土爾扈特在彼俗尚不同知伊犂黄教振興因思還歸故土且聞從前投誠之都爾伯特部在此得膺封爵樂業安居遂棄其現居之額濟勒㳺牧率屬内附弗受將為盗初聞土爾扈特来歸之信議者或以舍楞前此負罪逃去不宜與衆同受其降余以彼既棄俄羅斯而來若拒而弗納彼退無所歸必為盗抄掠非所以寜我邊圉且恐舍楞不來同行之衆或疑畏不敢前殊非善全之計若俟其既至執而罪之尤非所以昭威信示懷柔也彼既悔罪輸誠則宥其已徃益足彰我寛仁而衛拉全部莫非王臣亦從來未有之事又何必過為顧慮乎俾安皆我民從今䝉古類無一不王臣御製土爾扈特汗渥巴錫等至伊綿峪朝謁詩以紀事辛夘通使曾經丙子年土爾扈特汗敦嚕布喇什曾于乾隆丙子秋遣使入貢今其子渥巴錫率全部歸順更為不期而至者茲徠統部不期然名編典屬非招致禮肄鴻臚合惠宣類已全歸衆䝉古峪徵嘉兆信伊綿是地舊名布祜圖昂阿乙亥秋噶爾藏多爾濟來朝於此丁丑戊寅哈薩克布魯特歸化其使臣並於此朝謁因名斯峪曰伊綿今土爾扈特全部歸順又適瞻覲于此伊綿者漢語會歸之意也無心蜀望猶初志丙子宴土爾扈特使臣詩有無心蜀望更勤遐之句蓋彼時土爾扈特猶逺阻俄羅斯雖有向化之心無由徑達朕並未嘗稍存奢望即今渥巴錫等棄俄羅斯舉屬内附亦非有藉招致而徠且凖噶爾四衛拉特從此無不𨽻我臣僕尤始念所不及耳天與欽承益鞏䖍御製萬樹園賜宴土爾扈特汗渥巴錫等即景成什辛夘汗仍其舊號新綏餘各優封五等施渥巴錫乃其舊汗敦魯布喇什之子本應襲汗者兹予封號曰卓里克圖汗其策伯克多爾濟封為親王舍楞班巴爾封為郡王餘則貝勒貝子各四公二封爵有差契苾詎徒四百帳招搖那藉九夷旗寧餬珍饍飽以德馬湩蟻醪醉不辭于古為稀今厚幸天恩祖烈奉惟寅御製土爾扈特全部歸順記始逆命而終徠服謂之歸降弗加征而自臣服謂之歸順若今之土爾扈特携全部捨異域投誠嚮化跋涉萬里而来是歸順非歸降也西域既定興屯種於伊犂薄賦稅於回部若哈薩克若布魯特俾為外圉而羈縻之若安集延若㧞達克山益稱逺徼而概置之知足不辱知止不殆朕意亦如是而已矣豈其盡天所覆至於海隅必欲悉主悉臣為我僕屬哉而兹土爾扈特之歸順則實天與人歸有不期然而然者故不可以不記土爾扈特者凖噶爾四衛拉特之一其詳已見於凖噶爾全部紀畧之文溯厥始率亦荒畧弗可考後因其汗阿玉竒與策妄不睦竄歸俄羅斯俄羅斯居之額濟勒之地康熈年間我皇祖聖祖仁皇帝嘗欲悉其領要令侍讀圖麗琛等假道俄羅斯以徃而俄羅斯故為紆繞其程凡行三年又數月始反命今之汗握巴錫者即阿玉竒之曾孫也以俄羅斯征調師旅不息近且徵其子入質而俄羅斯又屬别教非黄教故與合族台吉密謀挈全部投中國興黄教之地以息肩焉自去歳十一月啓行由額濟勒厯哈薩克繞巴勒哈什諾爾戈壁於今歲六月杪始至伊犁之沙拉伯勒界凡八閲月厯萬有餘里先是朕聞有土爾扈特来歸之信慮伊犁將軍伊勒圖一人不能經理得宜時舒赫德以參贊居烏什辦回部事因命就近前徃而畏事者乃以新來中有舍楞其人曾以計誘害我副都統唐喀禄唐喀禄於戊寅四月偕厄魯特散秩大臣和碩齊率兵追捕逸賊至布古什河源射舍楞弟勞章札布什而擒之既而舍楞至稱欲投誠請釋其弟唐喀禄雖許而疑其詐欲先擒舍楞和碩齊云擒之無益不若招之使降越日舍楞詭稱欲入覲且携衆至唐嗐禄益疑之和碩齊復言彼畏我兵威不敢動移曷親莅撫諭之唐喀禄信其言從數人徃既至和碩齊勸各解鞍去櫜鞬俄頃變作唐喀禄遂遇害和碩齊即降賊尋擒獲㐲誅舍楞乃竄入俄羅斯境因以竄投俄羅斯者恐其有詭計議論沸起古云受降如受敵朕亦不能不為之少惑而畧為備焉然熟計舍楞一人豈能聳動渥巴錫等全部且俄羅亦大國也彼既背棄而來又擾我大國邊界進退無據彼將焉徃是則歸順之事十之九詭計之伏十之一耳既而果然而舒赫德至伊犁一切安汎設偵籌儲密備之事無不悉妥故新投之人一至如歸且掄其應入覲者由驛而來朕即命隨圍觀獵且於山莊宴賚如都爾伯特策凌等之例焉夫此山莊乃我皇祖所建以柔逺人之地而宴賚策凌等之後遂以平定西域兹不數年間又於無意中不因招致而有土爾扈特全部歸順之事自斯凡屬䝉古之族無不為我大清國之臣神御咫尺有不以操先劵閲後成惬志而愉快者乎予小子所以仰答祖恩益凛天寵惴惴焉孜孜焉惟恐意或滿而力或弛念兹在兹遑敢自詡為誠所感與德所致哉或又以為不宜受俄羅斯叛臣虞起邊釁蓋舍楞即我之叛臣歸俄羅斯者何嘗不一再索取而俄羅斯訖未與我也今既來歸即以此語折俄羅斯彼亦將無辭以對且數萬乏食之人既至近界敺之使去彼不劫掠畜牧將何以生雖有堅壁清野之説不知伊犁甫新築城而諸色人皆賴耕牧為活是壁亦不易堅而野亦不可清也夫明知人以嚮化而來而我以畏事而止且反致冦甚無謂也其衆涉逺歴乆力甚疲矣視其之死而惜費弗救仁人君子所弗忍為况體天御世之大君乎發帑出畜力為優恤則已命司事之臣土爾扈特部衆長塗疲頻凍餒幾不能自存因命舒赫德等分撥善地安置仍購運牛羊糧石以資飬贍置辦衣裘廬帳俾得禦寒並為籌其乆遠資生之計令皆全活安居咸獲得所兹不贅記記事之縁起如右御製土爾扈特部紀畧事不再三精覈率據耳食以為實君子弗為也言不求於至是已覺其失䕶已短而莫之改易君子弗為也必知斯二者然後可以秉史筆以記千載之公是公非余之為土爾扈特部之紀畧亦亹是而已土爾扈特之初來也葢嘗詠之詩載之記皆以為始自阿玉竒汗溯而上之荒畧弗可考此亦述向之所聞者而書之而不知其更有所祖非始自阿玉竒兹以其麇至乃得一一詳徴其實為之重記何必隠約弗明以諱吾前言之未精覈哉阿玉竒之父曰棚楚克其祖曰書庫爾岱青其曾祖曰和鄂爾勒克其髙祖曰卓立甘鄂爾勒克其髙祖之父則曰貝果鄂爾勒克自貝果鄂爾勒克溯而上之實逺不可徴其入俄羅斯也則自阿玉竒之曽祖和鄂爾勒克于䇿妄之祖巴圗魯渾台吉時其時四衞拉特各自為汗無所統屬又不相和睦和鄂爾勒克因率其子書庫爾岱青等至俄羅斯之額濟勒地其時阿玉竒尚在襁褓因留巴圗魯渾台吉處後書庫爾岱青往西藏而回遂向渾台吉索阿玉竒歸俄羅斯巴圗魯渾台吉為阿玉竒之外祖以時代計之適相當而阿玉竒汗時其子散扎布台吉率所屬一萬五千餘户往投䇿妄䇿妄盡留其屬而逐散札布歸額濟勒則向記所云阿玉竒與策妄不睦亦未為大誤也自貝果鄂爾勒克至和鄂爾勒克皆單傳和鄂爾勒克有子六人一即書庫爾岱青餘三無子其二皆有子孫式㣲無足傳書庫爾岱青子四二絶嗣其一曰那木策楞四傳而至巴木巴爾今封郡王其一即棚楚克四傳而至渥巴錫今封汗棚楚克之子阿玉竒有子八人其六皆無子嗣其一曰衮扎卜有子嗣今之封親王策伯克多爾濟者其曾孫也衮扎卜乃渥巴錫之祖沙克都爾扎卜之親弟故其子孫為渥巴錫近族與沙克都爾扎卜子孫皆隨渥巴錫而來其户口之數已見前記兹惟記其始祖所自出並証前之失精覈而未實者至其重黄教置鄂拓克宰桑之類率同凖噶爾但具體而㣲蓋凖噶爾之紀畧紀其全部之盛衰而兹土爾扈特之紀畧則紀其世系之詳悉云爾按西師之役五載蕆功始於都爾伯特部三策凌之投誠而輝特和碩特綽羅斯諸部次第内附復得乆經他徙之土爾扈特部希風仰流心傾踵接于是山北遐陬無尺土一民不歸皇化臣等恭讀御製宴土爾扈特使臣與都爾伯特等先後投誠封賚諸什及歸順記紀畧誌篇敬仰聖謨廣大睿㫖淵冲本無意于并包自羣歸夫幬載而又軫其未經出痘祗令肆覲山莊凡宴賚恩榮與内扎薩克中外一眎至封爵自汗王以下如御製所云汗號新綏優封五等者曠典隆儀皇哉煒矣非甚盛德孰能當此而無憾者歟前漢書匈奴傳右賢王犂汗王入日勒屋蘭畨和張掖太守屬國都尉發兵擊大破之屬國千長義渠王騎士射殺犂汗王賜黃金二百斤馬二百匹因封為犂汗王日逐王素與握衍朐鞮單于有隙即率其衆數萬騎歸漢漢封日逐王為歸德侯呼韓邪單于左大將烏厲屈與父呼遫累烏厲温敦南降漢封烏厲屈為新城侯烏厲温敦為義陽侯呼韓邪單于欵五原塞朝天子于甘泉宫漢寵以殊禮位在諸侯王上贊謁稱臣而不名初左伊秩訾為呼韓邪畫計歸漢竟以安定其後或讒伊秩訾自伐其功常鞍鞅呼韓邪疑之左伊秩訾懼誅將其衆千餘人降漢漢以為關内侯食邑三百户令佩其王印綬王莽之簒位也建國元年多齎金帛重遺單于諭曉以受命代漢狀因易單于故印故印文曰匈奴單于璽更曰新匈奴單于章西域都䕶但欽上書言匈奴南將軍右伊秩訾將人衆冦擊諸國莽於是大分匈奴為十五單于招誘呼韓邪單于諸子欲以次拜之使譯出塞誘呼右犂汗王咸咸子登助三人至則脅拜咸為孝單于拜助為順單于傳送助登長安咸既受莽孝單于之號馳出塞歸庭具以見脅状白單于單于更以為於粟置支侯匈奴賤官也後助病死莽以登代助為順單于是時匈奴数為邊冦捕得虜生口驗問皆曰孝單于咸子角數為冦兩將以聞四年莽會諸蠻夷斬咸子登于長安市天鳳二年歸前所斬侍子登及諸貴人從者喪多遺單于金珍因諭説改其號號匈奴曰恭奴單于曰善于賜印綬封骨都侯當為後安公當子男奢為後安侯單于貪莽金幣故曲聽之然冦盗如故當至長安莽拜為須卜單于更始二年漢遣中郎將歸德侯颯大司馬䕶軍陳遵使匈奴授單于漢舊制璽綬王侯以下印綬西域傳初楚主侍者馮嫽號馮夫人為烏孫右大將妻右大將與烏就屠相愛都䕶鄭吉使馮夫人説烏就屠以漢兵方出必見㓕不如降烏就屠曰願得小號宣帝詔詣長羅侯赤谷城立元貴靡為大昆彌烏就屠為小昆彌皆賜印綬烏就屠死子拊離代立為弟日貳所殺漢遣使者立拊離子安日為小昆彌後安日為降民所殺漢立其弟末振將代時大昆彌雌栗靡小昆彌末振將刺殺雌栗靡漢欲以兵討之而未能遣中郎將段會宗立雌栗靡季父公主孫伊秩靡為大昆彌至元始中卑爰㚄殺烏日領以自效漢封為歸義侯後漢書西域傳和帝永元八年戊己校尉索頵欲廢後部王涿鞮立破虜侯細致涿鞮反擊尉卑車師前王名明年漢遣將兵長史王林討涿鞮涿鞮北入匈奴漢軍追擊斬之立涿鞮弟農竒為王順帝永建元年勇長史班勇率後王農竒子加特奴及八猾等發精兵擊呼衍王破之勇於是上立加特奴為後王八猾為後部親漢侯永興元年車師後部王阿羅多走北匈奴中敦煌太守宋亮上立後部故王軍就質子卑君為後部王後阿羅多還戊校尉閻詳許復為王乃詣詳降於是收奪所賜卑君印綬更立阿羅多為王南匈奴傳永元七年封蘇㧞廆為率衆王又賜金帛唐書突厥傳貞觀四年頡利走保鐡山請内屬靖時李靖為節度使討頡利襲擊之盡獲其衆頡利得千里馬獨奔沙鉢羅行軍副總管張寳相禽之至京師館于太僕八年頡利死贈歸義王諡曰荒突利請入朝突利至禮見良厚輟膳以賜之拜右衛大將軍封北平郡王食户七百及為都督太宗敇曰而祖啓民破亡隋則復之棄德不報而父始畢反為隋敵爾今窮來歸我所以不立爾為可汗鑒前敗也我欲中國安爾宗族不亡故授爾都督長為我北藩突利頓首聽命後入朝死子賀邏鶻嗣帝幸九成宫突利弟結社率謀反禽斬之赦賀邏鶻投嶺外乃立阿史那思摩為乙彌泥孰俟利苾可汗賜氏李樹牙河北悉徙突厥適故地思摩頡利族人也武德初數以使者來封和順郡王太宗授右武侯大將軍化州都督統頡利故部居河南徙懷化郡王又詔左屯衛將軍阿史那忠為左賢王左武衛將軍阿史那泥孰為右賢王相之雲中者義成公主所居也頡利㓕李靖徙突厥羸破數百帳居之以阿史德為之長衆稍盛即建言願以諸王為可汗遙統之帝曰今可汗古單于也乃改雲中為單于大都䕶府以殷王旭輪為單于都䕶黙啜自立為可汗契丹李盡忠等反黙啜請擊賊自效詔可授左衞大将軍歸國公册拜遷善可汗乃引兵擊契丹㑹盡忠死襲松漠部落后美其功册黙啜為特進頡跌利施大單于立功報國可汗髙麗莫離支髙文簡與􅎤跌都督思太吐谷渾大酋慕容道奴郁射施大酋鶻屈頡斤苾悉頡力髙麗大酋髙拱毅合萬餘帳相踵欵邊詔納之河南引拜文簡左衛大將軍遼西郡王思太特進右衛大将軍兼􅎤跌都督樓煩郡公道奴左武衛将軍兼雲中郡公鶻屈頡斤左驍衛將軍兼刺史隂山郡公苾悉頡力左武衛將軍兼刺史雁門郡公拱毅左領軍衛將軍兼刺史平城郡公苾伽骨咄禄可汗使右金吾衛將軍李質持册為登利可汗西葉䕶阿布思及葛臘哆降以葛臘哆為懷恩王毗伽可汗妻骨咄禄婆匐可敦率衆自歸封可敦為賔國夫人西突厥傳江都亂曷薩那從宇文化及至黎陽遁歸長安髙祖降榻與共坐封歸義王闕可汗即歸義王弟有馬三千武德元年内屬賜號吐烏過㧞闕可汗伽那設既立遣使詣闕不敢當可汗號帝詔鴻臚少卿劉善因持册號吞阿婁㧞利邲咄陸可汗弩失畢大酋迎伽那設之子畢賀咄葉䕶立之是為乙毗沙鉢羅葉䕶可汗太宗詔左領軍將軍張大師持節冊命賜鼓纛賀魯已㓕裂其地為州縣以處諸部以阿史那彌射為興昔亡可汗兼驃騎大將軍崑陵都䕶領五咄陸部阿史那步真為繼徃絶可汗兼驃騎大將軍濛池都䕶領五弩失畢部以光禄卿盧承慶持册命之阿史那彌射貞觀中遣使者持節立為奚利邲咄陸可汗從帝征髙麗有功封平壤伯遷右武衛大將軍及平賀魯乃與步真皆為可汗其後二部人日離散遂擢彌射子元慶為左玉鈐衛將軍步真子歩利設斛瑟羅為右玉鈐衛將軍盡襲父領及可汗號元慶累拜鎮國大將軍行左威衛大將軍武后擅命率諸蕃長請賜睿宗氏曰武更號斛瑟羅為竭忠事主可汗聖厯二年以斛瑟羅為左衛大將軍兼平西軍大總管内遷死長安擢子懷道為右武衛將軍長安中以阿史那為右驍衛大將軍襲興昔亡可汗安撫招慰十姓大使北庭大都䕶四年以懷道為十姓可汗兼濛池都䕶未㡬擢獻元慶子磧西節度使突騎施吐火仙之敗始以懷道子昕為十姓可汗開府儀同三司濛池都䕶冊其妻梁國夫人李為交河公主突騎施烏質勒西突厥别部也聖歴二年遣子遮弩來朝神龍中封懷德郡王是歳烏質勒死其子嗢鹿州都督婆葛為左驍衛大將軍襲封爵突厥别種車鼻施啜蘇禄者開元五年始來朝授右武衛大將軍突騎施都督節拜蘇禄左羽林大將軍順國公進號忠順可汗於是大首領莫賀達干都摩支二部方盛攻蘇禄殺之立蘇禄子吐火仙骨啜為可汗磧西節度使蓋嘉運率石王史王共擊破之吐火仙棄旗走禽之㧞汗那諸國皆降處木昆匐延闕律啜等諸部皆上書謝明年擢闕律啜為右驍衛大將軍冊石王為順義王加拜史王為特進嘉運俘吐火仙骨啜天子赦以為左金吾衛員外大將軍修義王回鶻傳回鶻酋胡禄俟利發吐迷度遣使者獻欵于是鐡勒十一部皆來乃拜吐迷度為懷化大將軍瀚海都督然私自號可汗兄子烏紇夜刼殺之擢其子婆閏左驍衛大將軍襲父所領骨咄禄毗伽闕可汗天子以為奉義王拜骨咄禄毗伽關懷仁可汗裴羅骨咄禄毗伽闕可汗名又攻殺突厥白眉可汗拜左驍衛員外大將軍裴羅死子磨延啜立號葛勒可汗肅宗即位助討安禄山詔進司空爵忠義王乾元元年冊磨延啜為英武威逺毗伽可汗次子移地健立號侔羽可汗代宗即位助天子討賊進收東都河北悉平冊可汗曰頡咄登里骨啜蜜施合俱録英義建功毗伽可汗可敦曰婆墨光親麗華毗伽可敦又以左殺為雄朔王右殺寜朔王胡禄都督金河王㧞覽將軍靜漠公十都督皆國公可汗欲悉師向塞宰相頓莫賀擊殺之自立為合骨咄禄毗伽可汗建中元年莭冊頓莫賀為武義成功可汗咸安公主下嫁册書拜可汗為汩咄禄長夀夭親毗伽可汗公主為智慧端正長夀孝順可敦貞元五年可汗死子多邏斯立冊拜愛登里邏汩沒密施俱録毗伽忠貞可汗為少可敦葉公主毒死可汗之弟乃自立其大臣率國人共殺簒者以可汗幼子阿啜嗣詔册阿啜為奉誠可汗十一年可汗死無子國人立其相骨咄禄為可汗以使者來詔册拜愛滕里邏羽録沒密施合胡禄毗伽懷信可汗永貞元年可汗死詔冊所嗣為滕里野合俱録毗伽可汗無幾可汗死册拜愛登里羅汩密施合毗伽保義可汗可汗死使者臨册所嗣為登囉羽録沒密施句主毗伽崇德可汗以太和公主下降册拜為仁孝端麗明智上夀可敦可汗死其弟曷薩特勒立遣使者册為愛登里囉汨沒密施合毗伽昭禮可汗太和六年為其下所殺從子胡特勒立明年册為愛登里囉汩沒密施合句録毗伽彰信可汗嗢沒斯率三部及特勒大酋二千騎詣振武降詔拜嗢沒斯為右金吾衛大將軍爵懷化郡王以天德為歸義軍即拜歸義軍使阿歴支寧邊郡公習勿啜昌化郡公烏羅思寜朔郡公並為冠軍大將軍左威衛大將軍愛邪勿寧塞郡公為右領軍大將軍皆賜李氏又宣宗務綏柔荒逺遣使者抵靈州省其酋長回鶻因遣人隨使者來京師帝即册拜嗢禄登里囉汨沒密施合俱録毗伽懷建可汗乙失鉢孫曰夷男諸姓多歸之者共推為主夷男不敢當明年太宗册拜為真珠毗伽可汗葛禄之在金山北廷者自立葉䕶歳來朝乆之葉䕶頓毗伽縛突厥叛酋阿布思進封金山郡王按史傳魯魚之訛本夥重以譯音茫昧審證尤難如此傳載可汗號登里之與滕里羅之與囉邏羽之與汩汩之與骨宻之與密俱録之與句録胡禄即一名而參錯紛岐若此要之字殊義一且流刋乆逺姑仍原文録以備考沙陀傳龍朔初以處月酋沙陀金山從武衛將軍薛仁貴討鐡勒授墨離軍討擊使長安二年進為金滿州都督累封張掖郡公金山死子輔國嗣開元二年封其母鼠尼施為鄯國夫人輔國累爵永夀郡王死子骨咄支嗣從肅宗平安禄山拜特進驍衛上將軍死盡忠嗣累遷金吾衛大將軍酒泉縣公貞元中附吐蕃乆之與朱邪執宜謀欵靈州塞盡忠弟葛勒阿波率殘部七百叩振武降授左武衛大將軍兼陰山府都督執宜朝長安授特進金吾衛將軍執宜死子赤心嗣賜氏李名國昌預鄭王屬籍子克用討黄巢収京師功第一進中書門下平章事隴西郡公尋位檢校太傅隴西郡王大順初削克用官爵屬籍克用奉表自陳乃復拜檢校太師守中書令隴西郡王討王行瑜行瑜死慶州傳首京師帝悉論幕府官屬及諸子功封爵之克用賜號忠貞平難功臣進封晉王按凖部四衛拉特地于漢屬匈奴右方及烏孫國車師後王國于唐為突厥西突厥沙陀地兹考漢詔封單于類順彼國臣民之請唐時山北受封諸突厥或移内地或助討賊而畫疆分土之舊自若實未能𨽻版籍而臣僕之不過遥錫封號以相羈縻而已國家版章式廓單于可汗之庭咸歸内地於外域輸誠伊始優錫榮封感動殊俗傾心内面接踵相繼狡詐者自即誅夷忠謹者永承恩眷至休飬十數年仁風普掞不阻幽遐乆羈異域之部挈全族以來歸萬里閨闥應同桴鼓為遞稽典屬之姓氏推驗存亡興替之由愈知盛世懷柔逈非徃代遣行人持使節虛應册封故事者可比而於䝉古諸部不遺一類並入鈞陶尤亘古未有之盛軌矣欽定皇輿西域圖志卷三十七欽定四庫全書欽定皇輿西域圖志卷三十七
