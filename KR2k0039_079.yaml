body:
  text: 水四天山南路一塔呼庫勒塔呼庫勒在塔呼南庫克托羅海北五里周廻十餘里納呼庫勒納呼庫勒在納呼北當四山中周廻十餘里齊克塔木郭勒齊克塔木郭勒在齊克塔木城東源出南山中東北流三十里入於沙磧闢展郭勒闢展郭勒在闢展城西源發楚輝城南山麓東北流二十里經闢展城西出孔道北十里入於沙磧魯克察克郭勒魯克察克郭勒源發金嶺南麓西南行過色爾啟布城又西行至魯克察克城南其北流傍嶺分兩流經流連木齊木左右色爾啓布連木齊木魯克察克諸城咸資灌漑洋赫郭勒洋赫郭勒在洋赫城北魯克察克城西源出金嶺南麓北流十餘里入於地土爾畨郭勒土爾畨郭勒源發吐爾畨西金嶺南流經土爾畨城西南行數里入於地北流踰布拉里克西折而東行至森尼木西又折而南行入玉門口分兩流其東流經哈喇和卓城東為哈喇和卓郭勒西流經阿思塔克城西各十數里入於地招哈郭勒招哈郭勒亦名交河在土魯畨西十里出招哈和屯北金嶺中南流分兩支環城左右而南注至城南折而西南流二十里入於沙磧漢書西域傳河水分流繞城下故號交河按西域山川名號古今互易徵引典籍率以道里方位為定而於音韻轉移間得之者如伊列之轉為伊犂于闐之轉為和闐亦都足審證至若招哈郭勒之亦名交河則今昔相沿尚存漢唐稱謂之舊尤所僅見也哈喇和卓郭勒哈喇和卓郭勒在哈喇和卓城東二十里源出金嶺西流入扵地濟木薩郭勒濟木薩郭勒源二道出天山南麓合而南流五里入於沙磧托克三郭勒托克三郭勒源出博克達鄂拉南麓有三源合而南流名鄂蘭布拉克過都魯達巴又一水出伊拉里克東西南来經流托克三城南入托克三郭勒托克三布干伊拉里克諸城咸資灌溉伊拉里克布拉克伊拉里克布拉克在伊拉里克城東二十里源出金嶺西南流入托克三郭勒博羅圖郭勒博羅圖郭勒源出博羅圖塔克北谷口折而西流經阿拉癸鄂拉南西行一百三十里出阿拉癸鄂拉西谷口蒼翠迎眸清流繞足致為佳勝塔什海郭勒塔什海郭勒在博羅圖塔克西南一百八十里源出察罕通格西北二十里其一流迤東行一百里當額爾坤達巴之南一流南行繞出山峽經烏沙克塔勒東楚輝郭勒楚輝郭勒源出楚輝塔克南麓南行經楚輝城西十里入於地竒爾歸圗郭勒竒爾歸圗郭勒在塔喀爾齊西十里源出楚輝塔克南麓偏西南流一百里入博斯騰淖爾唐書地理志自西州西南行渡淡河至焉耆鎮城按焉耆鎮城當屬今之哈喇沙爾城淡河居其東北則正今之竒爾歸圗郭勒也特伯勒古布拉克特伯勒古布拉克在特伯勒古西十里當孔道北周五里許無支流哈喇烏蘇哈喇烏蘇在特伯勒古西四十五里當孔道北周三里許無支流按回地山水名彼此相同者山如烏可克逹巴水如哈喇烏蘓之類皆名同地異因為隨地分見餘倣此博斯騰淖爾博斯騰淖爾在哈喇沙爾城南四里東西袤三百餘里廣半之周七百餘里亦名待雅海子北岸受竒爾歸圗郭勒海都郭勒兩水而海都郭勒為大漢書西域傳焉耆國近海水多魚後漢書班超傳超討焉耆去城二十里止營大澤中魏書西域傳焉耆國南去海十餘里有魚鹽蒲葦之饒周書同唐書西域傳焉耆所都海水繚其外孝格倍道絶水夜傳堞遲曙譟而登鼓角轟哄唐兵縱國人優敗斬千餘級按一統志稱焉耆國在今土爾畨西無疑然土爾畨西至蔥嶺並無大澤可當海之名者又謂四面大山海水曲入四山之内其地更無可考以今求之則博斯騰淖爾當土爾畨西南羅布淖爾又當博斯騰淖爾之南班超傳所謂大澤魏書所謂南去海十餘里者即班史所謂近海應指博斯騰淖爾而言若後漢書所謂海水曲入四山之内者應屬今之羅布淖爾在四面大山之外與博斯騰淖爾相距約二百里形勢適合方位道里亦灼然不誣盖自宋以後中國無人使至其地殊方隔境考索為難宜一統志誤以為並無大澤而以無可考概之也海都郭勒海都郭勒在哈喇沙爾城西十里源出天山中合三哈布齊垓郭勒東西裕勒都斯郭勒旁挾衆水東南流出海都塔克口名海都郭勒迂曲而南二百五十里許始抵哈喇沙爾城北環其西南稍折而東滙入博斯騰淖爾河面東春廣不過一里夏秋漲發輒至三四里奔騰淜湃中流更汛急河底淤沙聚散深淺靡常哈喇沙爾屯田悉藉此水其下流入博斯騰淖爾復釃而西南流者仍名海都郭勒經哈勒噶阿滿南西過庫隴勒轉而東南流入於羅布淖爾後漢書班超傳超討焉耆有葦橋之險國王廣絶橋不欲令漢軍入國超從他道厲渡水經注敦薨之水出焉耆之北二源俱道西源東流分為二水左水西南流出焉耆之西經流焉耆之野屈而東南流注於敦薨之渚右水東南流又分為二左右焉耆之國城居四水之中在河水之洲南㑹兩水同注敦薨之浦東源東南流分為二水澗瀾雙引洪湍濬發俱東南流逕出焉耆之東道於危須城西又東南流注於敦薨之藪川流所積潭水斯漲溢流為海按漢書班超討焉耆時居龜兹發八國兵到尉犂界是從焉耆國西南境入所謂葦橋之險當屬今海都郭勒也至海都郭勒上流其自西北來者曰裕勒都斯郭勒自東北来者曰哈布齊垓郭勒合而東南流出海都塔克口正當焉耆北境即水經注所謂敦薨之水出焉耆北二源俱道者也海都郭勒經哈喇沙爾城西與竒爾歸圖郭勒雙流交㑹所謂出焉耆之西經流焉耆之野左右焉耆之國逕出焉耆之東者形勢猶存至海都郭勒下流與竒爾歸圖郭勒同注博斯騰淖爾盖即所謂南㑹兩水同注敦薨之浦東南流注於敦薨之藪者潭水溢而為海當指博斯騰淖爾而言亦與史漢諸書焉耆近海之説相合羅布淖爾羅布淖爾在博斯騰淖爾正南二百里東南距噶斯淖爾二百里即古蒲昌海一名泑澤又名鹽澤又名輔日海又名牢蘭又名臨海又名捕魚兒海海都郭勒水西北滙入其西來滙入諸水經流廣逺統分五大支一為庫車左右額什克巴什赫色勒木素爾諸郭勒合流為額爾勾郭勒一為阿克郭勒一為喀什噶爾郭勒一為葉爾羌郭勒一為和闐郭勒合流為塔里木郭勒東入厄爾勾郭勒北㑹海都郭勒入於羅布淖爾􅞹淪湍急周迴五百里旁有小洲數十西域之水莫此為大由是東南潜行地中上成斥鹵南出於積石復為中國河源山海經不周之山東望泑澤河水所潜也其源渾渾泡泡郭璞注河南出崑崙潜行地下至蔥嶺出于闐國復分流岐出合而東流注泑澤已復潜行南出於積石山而為中國河也泑澤即蒲澤一名蒲昌海廣三四百里其水停冬夏不増減去玉門闗三百餘里即河之重源所謂潜行也又敦薨之水西流注於泑澤出于崑崙之東北隅實為河源史記大宛傳于窴之西則水皆西流注西海其東水東流注鹽澤鹽澤潜行地下其南則河源出焉而樓蘭姑師邑有城郭臨鹽澤鹽澤去長安可五千里匈奴右方居鹽澤以東漢書西城傳于闐河與葱嶺河合東注蒲昌海一名鹽澤去玉門闗陽闗三百餘里地理志敦煌郡正西闗外有蒲昌海水經注河水東注於泑澤即經所謂蒲昌海也水積鄯善之東北龍城之西南龍城故姜賴之虚胡之大國也蒲海溢盪覆其國城基尚存地廣千里皆為鹽而堅剛也行人所逕畜産皆布氊卧之掘發其下有大鹽方如巨枕以次相累為少禽多鬼怪西接鄯善東連三沙為海之北隘矣故蒲昌亦有鹽澤之稱也廣袤三百里其水澄渟冬夏不減其中洄湍雷轉為𨼆淪之脈當澴流之上飛禽奮翮於霄中者無不墜於淵波矣即河水之所潜而出於積石也裴矩西域記鹽澤在西州髙昌縣東東南去𤓰州一千三百壁並沙磧之地括地志蒲昌海一名輔曰海亦名牢蘭亦名臨海在沙州西北明史西域傳洪武中藍玉征沙漠至捕魚兒海獲賽瑪爾堪舊作撒馬皃罕今改正商人數百太祖遣官送之還肅州新志羅布淖爾在火州之南由土爾畨往南約五百餘里有大澤一區方圓數百里塔里木河自西南來額爾勾河自正西來海都河自西北來咸㑹於此自沙州之哈喇淖爾正西小徑亦可達計程不及一月按河水自蒲昌海潜行地下至積石復出為中國河源其説見於山海經史記漢書水經注諸書先儒傳習都無異説自唐杜佑作通典不取其説宋歐陽忞謂其荒遠不經元潘昻霄河源志亦以史稱河有兩源一出于闐一出蔥嶺為誕妄於是河水潜行之説不復取信於後人不知河水襟帶天地間其源流分合有未可以一説拘者臣等恭讀聖祖訓諭黄河之源出西寧邊外庫爾坤山之東衆泉渙散不可勝數望之燦如列星䝉古謂之敖敦他拉西畨謂之梭羅木中華謂之星宿海是為河源又云梵書四大水出於阿耨達山下有阿耨達池以今考之意即岡底斯是唐古特稱岡底斯者猶云衆山水之根與釋典之言相合誠可謂昭若發矇矣謹考岡底斯在葱嶺西南西蔵之西山勢連延委折東北接葱嶺東南屬庫爾坤地當天下之脊而山皆一脉所分則所謂河源者或隨山東南下而發於庫爾坤或隨山東北走而發於葱嶺于闐其發於庫爾坤者東行至積石山其發于蔥嶺于闐者亦東行至蒲昌海潜行地下而㑹於積石山同流入中國為河源此其較然可見者漢桑欽水經云崑崙墟在西北河水出其東北陬屈従其東南流入渤海又出海外南至積石山下有石門河水冒以西南流此指河源之發於庫爾坤者言也又云河水又南入葱嶺山又云其一源出于闐國南山北流與䓤嶺河合東注蒲昌海此指河源之發於蔥嶺于闐者言也所謂河有重源者在水經已有眀文矣至其潜行而出於積石所謂東望泑澤河水所潜敦薨之水西流注於泑澤出于崑崙之東北隅實為河源者山海經復明著其説安得於其出崑崙者則信之於其出蔥嶺于闐者則疑之乎宋元以来以地荒遠未經詳考著述之家立言多悖於古人方今聖代坤輿無外凡古所謂崑崙葱嶺于闐河源自出之處皆近𨽻版籍得以往来詳審現在形勢其經流分合有與山經水注史漢諸書一一脗合者乃知古人之不可厚非而杜佑歐陽忞潘昻霄之說徒以其所及見者執此一隅槩彼全局有如東面而不見西墻者矣車爾楚郭勒車爾楚郭勒在海都郭勒西北天山南麓西南流三十里入於沙磧額什墨郭勒額什墨郭勒在車爾楚郭勒西南一百里水流濁源出北山南麓西南流一百八十里入於沙磧策特爾郭勒䇿特爾郭勒在額什墨郭勒西六十里源出天山北麓恩楚魯克郭勒恩楚魯克郭勒在䇿特爾郭勒西八十里水非一道繞英噶薩爾舊音英阿雜爾今改正左右流皆淺小伊蘭布拉克伊蘭布拉克在英噶薩爾西南八十里源出北山之哈喇庫勒達巴南流横截孔道又南流一百里入於沙磧唐書地理志榆林守捉城又五十里至龍泉守捉按唐榆林守捉在今英噶薩爾詳見卷十五疆域則西五十里之龍泉守捉當在伊蘭布拉克之東所謂龍泉疑即今伊蘭布拉克也第納爾郭勒第納爾郭勒在伊蘭布拉克西一百里玉古爾城西源岀哈喇庫勒達巴西小流灣環支派非一南流一百二十里入於沙磧塔什阿里克郭勒塔什阿里克郭勒源出北山南麓第納爾郭勒西六十里阿巴特西南流一百三十里入於巴巴淖爾唐書地理志西夷僻守捉又六十里至赤岸守捉按今塔什阿里克郭勒東之阿巴特為西夷僻守捉詳見卷十五疆域則西六十里之赤岸守捉當在塔什阿里克郭勒西也云赤岸者知為瀕河之地巴巴淖爾巴巴淖爾三澤相通中曰巴巴東曰達巴噶爾徳淖爾西曰赫色勒庫爾淖爾在阿巴特南一百里東西一百五十里南北廣狹不一不當孔道塔什阿里克郭勒自北