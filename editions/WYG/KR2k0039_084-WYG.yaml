body:
  text: 服物一準噶爾部被服之具哈爾邦氊即冠也與内地煖㡌畧同其頂髙其邉平以白氊為裏外飾以皮貧者無皮飾氊或染紫緑色無冬夏之别但以毛質厚薄為差上綴纓名扎拉止及其㡌之半婦人冠與男子同辮髪雙垂約髪用紅帛在辮之腰帛間綴以好珠瑟瑟之屬望若繁星拉布錫克即袍也台吉用錦縀為之上飾以繡宰桑則絲繡絲紵氆氌為之賤者多用緑色及雜色禦冬則以駝毛為絮名庫綳亦有止衣羊皮者右袵䄂平不鑲四圍皆連紉台吉宰桑之婦衣用錦繡兩䄂兩肩及交襟續絍鑲以金花或以刺繡民人婦女襟䄂衣袵俱用染色皮鑲之固都遜即鞾也以牛皮為之台吉多用紅香牛皮中嵌鹿皮刺以文繡宰桑亦用紅牛皮不嵌鹿皮不刺繡民人穿皮履或黒或黄無敢用紅者婦人鞾履與男子同布色即帶也以絲為之端垂流蘇其長委地或以全幅帛為之端長尺餘哈卜塔噶即荷包也縀布為之制與内地㣲異結穗精羙綏克即環也金銀為之以墜耳飾以珠男婦皆用之北史髙車傳婦人以皮裹羊骸戴之首上縈屈髪鬢而綴之有似軒冕西域傳西突厥居烏孫故地身衣裘褐悦般國剪髮齊肩以䬾餬塗之昱然光澤唐書回鶻傳回鶻汗妻可敦服綘通裾大襦冠金冠前後税堅昆國服貴貂豽阿熱冬㡌貂夏㡌金釦鋭頂而卷末諸下皆㡌白氊喜佩刀礪賤者衣皮不㡌女衣毳毼錦罽綾文獻通考回紇國可汗相見去㡌複髪以為禮婦人總髪為髻髙五六寸以紅絲絹囊之既嫁則加氊㡌按準部服飾史傳所紀殊畧以今証古大致相同乾隆十九年封都爾伯特台吉䇿凌等爵首賜冠服迄蕩平而後革心向化之侣被服均同内地於是笑氊裘之喬野慚卉服之惷愚苟非幸際休嘉孰能得此殊榮異數乎坐卧之具繅和什勒以木為之長六七尺濶三尺許髙尺餘有四足制如内地之床其左右及後三面咸有邉䦨或加雕刻惟大台吉坐之宰桑以下不僣坐故稱台吉襲位為坐床云西勒圖制同繅和什勒掌教喇嘛坐之錫爾徳克以羊毛織成其形長方或舖於床或舖於地施坐褥於上即内地氊毯也都爾布錦亦以羊毛織成其形正方大者二尺小者尺餘加於錫爾徳克之上制如内地坐褥徳爾即枕也其形長方内著棉絮之屬外䝉以布或縀首與足皆有之首枕稍髙足枕稍卑琨濟勒即被也以縀及布為之中著棉絮殊厚徳必斯克爾即卧褥也以氊為裏或一層或兩層冐以縀綢及布之屬用以卧被有絮而褥無絮不産木棉以駝毛代之庫什格其形如幔施於座前面分兩幅而中開之或以布或以氊随時寒燠以張之其貴官則有兼用縀者流蘇銀鉤之屬綴於其上博克綽以皮為包用盛衣服格爾即䝉古包也稱房屋亦云唐書回鶻傳堅昆國阿熱駐牙青山周柵代垣聮氊為帳號宻的支它首領居小帳北史突厥傳西突厥其俗穹廬氊帳牙帳東開盖敬日之所出也按今準噶爾部方位之名以東為南以南為西西為北北為東彼處户皆東向即内地之南向北史謂西突厥牙帳東開即南向之謂今準噶爾所居戸皆東向猶存西突厥之遺意也飲食之具阿雅噶屈桞木及樺木為之大小不等制同桮棬塔巴克形同内地之盤盛食及羮以紅銅為之亦有用木者深淺大小不等其貴重之盤則以玉為之御製玉盤謡戊寅玉盤博徑得二尺圍六尺有去聲五寸益虚中盛水受一石素質不雕其色碧旁逹孚尹瓊華澤葆光撫不留手跡羣玉之精出崑崙吉日甲子天子賔於西王母瑶池津行觴介紹簠簋罇爾時所御器今存作鎮西極永好完未入震旦三千年問今何來不脛偶準噶爾亡淪世守阿睦撒納兹竊取王師冞入靖孽醜於将獲之聮猭走棄其重器為我有元英大吕陳座右咄哉玉盤徒華滋不可食兮不可衣連城價詎如窮竒俘彼禍除可罷師前歌後舞樂雍熈瓌玩吾将安用之擬付鄛人一例椎御製玉盤謡疊舊作韻有序壬午西濛穴掃元戎重器同遷北漠屯開督䕶遺珍載獻在徳致詎誇夫俘玉而功成宜切於銘盤一圍因以重之兩羙兹其合矣爾乃闐河粹毓準部材程昔焉青鉢偕登世作蹛林之寳昨者金屠不守時投甌脱之墟當夫琛賮來庭兑和列序璆琅匪乏奚煩徴典瑞於骨都輪廣依然亦未著鐫文於阿渾祗以五朞殊績㨗應轉圜百部永清歡回覆盎此則逹瓦齊故物已虛槃㪟行酒弗辱乎降王阿睦爾撒納齊貲空盗大弓襲蹏䆒歸於太府是用摛二篇而述事鑄謝鼎詞閲三載以繫時欹箴座侑云爾與昔獲盤符寸尺隻復成雙補闕益忽分忽合無情石猶覺愉焉色潤碧却似延津龍躍澤是宜有詩紀其跡出師昔嵗畧崑崙五載功成咸來賔天方黙克西瀛津或貢鏁甲或玉罇付之有司武庫存精金華服綵帛完薄來厚徃已數年物固有幸竒聮偶伊犂扼要輪番守儲胥詎藉邉内取哈薩布露胥地醜敢萌覬覦市易走墾耕忽見此盤有驛致同舊列左右絶域秋登萬寳滋既足食矣還足衣喜固在彼斯非竒敢因志滿不戢師天庥敬奉戒恬熙福謙保泰永志之向欲速矣思増椎前篇以得盤時逋逆尚未就殛故有擬付鄛人一例椎之句御製玉盤聮句有序壬午懐任協紀齊頒九譯之春娵訾迎韶早展重華之宴試覓新題於甲觀寧沿舊例乎辛盤則有西部輸珍尚方典器青筠浮面一雙承露交擎碧蓞為趺三五矅􅂕滿暈始也軍諮驛遞未碎斗而楚帳烏飛繼焉屯長犂翻存竊鈎而魯庭盗走失守見可敦並棄龍沙鼂采猶韜得時思咱馬同陳魚海土花不蝕矧乃泥都椀進朝端餵肉無煩和卓篘來徼外分醪足樂維鴻庥告永清之㑹正神物昭終合之期既偕地出圜鐘元氣兼通乎異域還應霄呈疊璧貞符適叶於前年當兹什襲初披六廵載詠禁中頗牧胥目屬以爭誇臺上鄂褒亦手捫而暗認繄爾韻催銅鉢程功庻慶其得全顧予銘切金甌記實蘄箴夫持滿御製令曰青宫集近臣聮吟例許列文茵玉盤先後來殊域石鼎推敲繼綺晨隔嵗紫光圖凱㑹韶年蒼縡答精禋東升旭影霞初絢臣傅恒西繞山容黛半皴綵勝吉占迎曙燦花幡芳信颺風頻鶯遷桞放梭初擲臣來保魚樂氷開尾有莘節應棣通蠲榖旦律調泰蔟協初旬菜挑七種羅肴核臣劉統勲裘粲三英集組紳坐列共球昭拓土班添氊罽賀填闉辟邪逺掃天堂穴臣兆惠御製延喜遥開月竁垠猶憶逐犇阿睦爾因縁收器額琳秦番語謂寳為額琳秦一之為甚寧思二天且無違而况人果見獻琛來攘攘誰容遊釡走踆踆衛拉四部全歸吏臣梁詩正厄魯千羣總𨽻民遂有白環踰弱水同時青鉢共香塵寳装鞞琫芙蓉鍔臣陳惠華繅藉圭璋翡翠綸􅸍嚕篘文鐫詰屈堅昆椀璞剖嶙㟒汗溝流赭毛頒馬臣劉綸陽冶鎔黄趾鑄麟九府圜型工肉好三河方折採奫淪包符自效圖書藪臣舒赫徳御製瓌異奚誇冠帶倫欲墾伊犂興稼穡誰埋大窖出璘珣䕶呵信是資丁甲博識何須問癸辛若木葩旉分韞匱望舒暈滿儷浮筠昔年苜蓿充沙漠臣于敏中此日琉璃對柍桭瓊笥駢函重珏輯瑶階聮晉六符陳圍三渾約涵規數臣錢汝誠倍兩横當布指循累譯走偕車轣轆他山攻借石磨磷那誇琬琰呈和璞臣介福詎數㻬琈出帝囷頒瑞記曽探大酉搜源跡直溯西申窺同象緯聮璣璧臣何國宗御製薦旅梯航配鰈鷷劔契豐城語豈誕珠還合浦事誠神乾坤竒偶成交泰雷雨經綸濟險屯寳玉彤弓疇許盗元音大吕不終湮性原特逹馳包匭臣觀保質秉堅剛協化鈞幾試崑炎光獨葆潛通虹氣蟄還伸連城價詎千金重臣王際華照廡芒驚五色匀輻湊璵璠徴合軌種滋蒲榖騐同畇捧來有澤能盈手臣錢維城選得無瑕可澡身容炙具先超鼎耳斟膏用或並杯唇雙飛入襲輝相照臣張泰開御製二妙同臺意自親侍從今時昔上将追陪宻席逺嘉賔是日御前䝉古王公亦在座武成乆矣人心豫賮獻駢如地寳臻響應鑮鐘尊典樂製侔獵鼓掌成均夜光互燭聮形影臣王㑹汾鼂采交輝象介僎何俟得璜偏海澨本來投石自天濵躍淵似擊蕤賔鐵臣金甡啟礦如探安息銀煜煜鴻儀剛比徳斑斑龍輔恰為鄰紋凝水碧㾗微吐臣陳兆崙廉劚山元體最純細較廣袤齊尺寸遥覘氣象炳星辰中涵温潤疑丹甑臣倪承寛御製外逹菁華異緑瑉象協地天涵太極圓呈日月麗雙輪巧諧訝似能飛鏡逺届欣同不脛珍定識洪鑪竒締造無勞哲匠費陶甄衆形雕刻天工錯臣邉繼祖圓盖帡幪睿藻彬授簡載賡敶黼座盍􅆪依永上楓宸嘉祥喜叶南山祝臣盧文弨燕飲歡􅆽北斗醇魯寳承匜歌酌賚荆璆琢敦舞章斌鏤雲列架頳虬卧臣謝墉散采流蘇紫鳳馴惠浹長筵銘瑞甕樂張廣殿捋和錞蓼芽入饌纔逄榖臣汪永錫御製椒蕊粘屏始建寅三品果盛回部味九華鐙映上元春敢誇禹貢傳西被惟對湯盤凛日新御製碧玉盤謡癸未碧玉之盤徑逾尺質本規圓色光澤準夷重器守世則貯以馬湩可盈石穹廬玉醴斯陳席準俗四月馬湩新得時置筵酬神詐馬為慶謂之玉醴斯䝉古亦然但不如其盛耳以招百福繁生息仁義不施攻守易矯䖍奪攘紛兵革休屠金人且弗惜玉盤自合棄荒棘磕破邉角秦璽阸伊犂墾田耕者獲驛使致京飛不翼取裁改為葵花式穆然完好綈几側湯之盤銘日新徳用識顛末苕華勒特卜什以木為之形如長方盤大小不等用以盛肉即肉槽也阿爾呼特縫皮為袋中盛牲乳束其口乆而成酒味微酢謂之桐酒庫努克以皮為桶大小不等上有皮繫用盛乳酪之屬庫庫爾以皮為之其形如壺髙二三尺不等以盛乳酒而斟酌之其㵼酒處斜出如鳥喙長可四五寸海蘇即釡也旁有四耳小者兩耳以紅銅及鐵為之初稱為脱歡後避脱歡太師名改今稱圖拉噶即行竈也以鐵條為圏下施三足髙低不等置之於地上加鍋使不欹什納噶即匕也以銅及鐵為之有柄用以挹飲食酒漿之屬其柄曲直長短無定式柄及頭亦有純用木者北史西域傳悦般國日三澡潄然後飲食宋史外國傳唐回鶻之地大蟲太子族器用金銀馬乳釀酒飲之亦醉按準俗止知用椀而不知用箸椀以木為而無瓷器凡盛飲食之具非銅鐵即木與皮為之别有札卜札雅椀係西藏物草根結成間傳準地不常有也北史云大宛不鑄鐵器得漢黄白金輒以為器宋史亦稱回鶻地器用金銀今準噶爾為回鶻故壤地近大宛非銅即鐵未聞以黄白金為之者豈當時金銀多而後世金銀少耶日用之具烏珠克削竹為片長四寸許上濶二分漸下漸鋭至末而鋭甚如刀之口取墨於髪帚以作字必爾以髪為之長四寸許縱束如帚状其末半寸餘不束浸墨瀋令恒濕欲書則以烏珠克蘸其墨焉察遜草名搗爛可成紙因呼紙亦謂之察遜質厚而麤壓之砑之可供書寫必爾海拉察克以木為之其形長方中有木楞界之左盛烏珠克右盛必爾如内地之匣也塔瑪噶即印也台吉之印其形圓範金為之宰桑以下之印其形方或以銀或以銅鐵錫各視其職而差等焉御製海努銅印詩有序庚辰武定功成農政宜舉念伊犂委之荒蕪久或别部竊踞非良圖也因命副都統阿桂伊柱等率兵徃理屯政兹伊柱循行至海努克地見大招梵帙叢委以次檢輯獲虎紐銅章一方文曰管轄厄魯特後旗札薩克印旁識雍正四年十月鑄成即日驛封來上盖向年曽頒給喀爾喀之厄魯特扎薩克毛海者彼叛徃準噶爾攜以獻噶爾丹䇿凌因命篋衍内廷並系是詩以誌其事厄魯和通厄魯特謂回人為和通以次平徐籌考牧及屯耕葉竒即葉爾竒木四字急呼之實兩字也已慶春膏溥回地素艱雨澤昨阿里衮等奏三月二十一二等日葉爾竒木諸城耕作方興甘霖大沛回人皆詫為希有海努曽無兵燹驚收拾金經皈浄業分明銅印返神京天驕猖獗今何有蠲忿因之益凛盈御製鐵章記鐵章一錯以金方得寸有十分寸之五博得十分寸之二柄以木方如之博得十分寸之五稍豊其上刻若井藻又橢以窮刻若華表柱之首其長二寸通章之博髙二寸有十分寸之七藻上穿好綬約之綬之窮為蕃錦囊覆垂章上不可離藏以髹盝其文曰厄爾徳尼卓里克圖洪台吉之章華語所謂寳權大慶王也盖自䇿妄阿拉布坦時乞自逹頼喇嘛用梵書刻印錫予以為準噶爾傳世之器今年夏既平準夷遂獲此章驛致典屬予既訝鐻鍝君長亦有世守法物也而又憫逹瓦齊不得辭毁櫝之愆若夫戒盈知懼固不在區區抑埴之物矣作鐵章記準即内地之鍼純鋼不銹海齊即内地之剪刀其頭甚長而交股則短烏塔蘇即線也或以棉花或以馬尾鬃用蠶絲者絶少鄂里即畚也用以盛土托斯和爾即舟也刳獨木為之大小不等用以濟渡一舟左右兩篙亦以木為之其名曰海巴特爾根即車也其輪用大輻板四交股作十字形輪之髙低大小随車之制間有用四輪者大都用以任載輪轅多以槐木為之北史髙車傳人乗髙輪車車輪髙大輻數至多唐書回鶻傳回紇可敦乗曲輿青山之東有劔水偶艇以渡按髙車人多乗車而制極髙大推之他國知引重致逺之具所在有之矣葢除沙磧而外有水即可運舟平地即可牽車但制度樸略不逮中土且以畜耕為業者率便於騎舟車苐以佐其不足當非所尚耳攻戰之具伊勒都即刀也形如内地惟於刀欛之間以鐵兩方横抵之代䕶手濟逹即鎗也長者約一丈二三尺短者亦不下一丈頭用純鋼鐡為之長六七寸許兩柄以馬鬃繞之又以駝毛為毬繫於柄之中間柄稍近末穿一孔繫以革條以便負之而趨努穆即弓也形同内地而稍小以山羊皮代樺皮為餙以馬尾鬃為之弦蘇穆即箭也形同内地而稍短箭桿之木亦名蘇穆質堅細而勁實碩羅即劔也長者三尺餘短者二尺餘劔鞘以皮為之鐔端有銅環御製蕃劔行丙子蕃劔一泓波溢塘鈲從文起飛寒芒其來伊犂萬里外限以大幹天各方語言不通振古異誰歐冶為去聲為魚腸昔策妄阿拉布坦草創絶域誇雄强大小策凌敦多卜皆其羽翼兄弟行大者善計善將將小者勇萬夫莫當矢石雨下自弗著亦不驚避状若常禡木特及撒拉爾自謂弗及言之詳此劔乃彼所佩用不離身持短入長强者死絶弱者亂曽不厯世羣䘮亡煢煢孤息挈部落歸命貢此呈天閶暴得暴失何足紀􅂓紀向化武庫藏聊紀向化武庫藏吾猶慮其為龍飛去水中央都呼拉哈即胄也形同内地或施鐵皮於胄前以障面僅露兩目呼雅克即鎻子甲間有用綿為甲者其名曰鄂勒博克御製蕃甲行丙子權輿甲胄作軒轅銅頭鐵額人驚看函人慎術精五屬合甲夀至三百年然惟犀兕察革空上聲眡裏眡朕要取堅後世乃有鎖子甲鐵環金練蛇鱗翻我聞其名未覩物偃武日久工失傳底定伊犂盡肉􅃝台吉宰桑來後先取其重器藏武庫鐵章蕃甲驛致駢上年平伊犂得鐵章一葢其台吉世所傳用詳見記中當時噶爾丹䇿凌恃逺抗大數入聲擾邉其人狡譎習攻戰頗能憐下人稱賢備器致用懾隣服哈薩克無能為患叶以武得之守詎可逆天内潰宗弗延廿一昂吉皆入化昂吉者䝉古語部分也準噶爾所屬或一鄂拓克為一昂吉或合數鄂拓克為一昂吉凡二十一是皆噶爾丹䇿凌分内者今均内屬其衆台吉下之鄂拓克則各令其汗王扎薩克等掌之一如四十九旗之制四圖什墨為我臣叶其噶爾丹䇿凌於諸宰桑中擇四人為圖什墨圖什墨者大臣之稱也又其次為六札爾扈齊佐圖什墨理事者也今仍其舊授四圖什墨為内大臣扎爾扈齊為散秩大臣管理二十一部分之事組鎧虎皮包弗用或異得四白鹿旋包即礮也以鐵為腔中施硝黄鉛弹之屬或高二三尺圓徑三寸駕於駝背施放或髙二三尺圓徑五六寸木架上施放或長四尺餘制如内地鳥鎗手中施放管包之人名曰包沁瑪呢即旗也以布為幅雜色俱有長幾一丈寛如其長十之八書喇嘛經咒於其幅遇風展動與諷誦等宰桑以下建之圖克瑪呢即大纛旗也長丈餘寛亦如之旗幅用緑色縀書喇嘛經咒於其上台吉建之北史突厥傳兵器有角弓鳴鏑甲矟刀楯旗纛之上施金狼頭徴發兵馬刻木為數并一金鏃箭蠟封印之以為信契蠕蠕傳始立軍法千人為軍軍置将一人百人為幢幢置帥一人社崘學中國立法置戰陣卒成邊害唐書回鶻𫝊黠戞斯古堅昆國也其戰有弓矢旗幟其騎士析木為盾蔽股足又以圓盾傅肩可捍矢刃按古蠕蠕立軍法突厥備兵器而西部沙陀尤稱雄勁今準部亦以堅甲利兵相讎殺為西北部桀黠之尤考其戰具制度略備旗纛皆書梵語且若奉菩薩教者實則弱肉強食亡不旋踵善戰善陣果足恃乎哉成物之具竒魯斡形同内地之鋸其著手處或用木或用鐵蘇克形同内地之斧亦有兩俱削成芒口者額嚕木形同内地之鑽其䋲用馬鬃三股為之䋲之名曰塔納烏呼必形同内地之彎刀又有捲頭作鉤者哈魯爾形同内地之推刨大者用兩手小者用一手其四周平底亦或以銅為之按準部成物之具略同回部即準之内地亦不復大殊而史傳所載獨缺焉不備者殆即班孟堅所謂畧與漢同有異乃紀者耶兹編參酌詳要形名兼審凡有裨於用者悉登且以補歴代史書未備云欽定皇輿西域圖志卷四十一欽定四庫全書欽定皇輿西域圖志卷四十一服物一準噶爾部被服之具哈爾邦氊即冠也與内地煖㡌畧同其頂髙其邉平以白氊為裏外飾以皮貧者無皮飾氊或染紫緑色無冬夏之别但以毛質厚薄為差上綴纓名扎拉止及其㡌之半婦人冠與男子同辮髪雙垂約髪用紅帛在辮之腰帛間綴以好珠瑟瑟之屬望若繁星拉布錫克即袍也台吉用錦縀為之上飾以繡宰桑則絲繡絲紵氆氌為之賤者多用緑色及雜色禦冬則以駝毛為絮名庫綳亦有止衣羊皮者右袵䄂平不鑲四圍皆連紉台吉宰桑之婦衣用錦繡兩䄂兩肩及交襟續絍鑲以金花或以刺繡民人婦女襟䄂衣袵俱用染色皮鑲之固都遜即鞾也以牛皮為之台吉多用紅香牛皮中嵌鹿皮刺以文繡宰桑亦用紅牛皮不嵌鹿皮不刺繡民人穿皮履或黒或黄無敢用紅者婦人鞾履與男子同布色即帶也以絲為之端垂流蘇其長委地或以全幅帛為之端長尺餘哈卜塔噶即荷包也縀布為之制與内地㣲異結穗精羙綏克即環也金銀為之以墜耳飾以珠男婦皆用之北史髙車傳婦人以皮裹羊骸戴之首上縈屈髪鬢而綴之有似軒冕西域傳西突厥居烏孫故地身衣裘褐悦般國剪髮齊肩以䬾餬塗之昱然光澤唐書回鶻傳回鶻汗妻可敦服綘通裾大襦冠金冠前後税堅昆國服貴貂豽阿熱冬㡌貂夏㡌金釦鋭頂而卷末諸下皆㡌白氊喜佩刀礪賤者衣皮不㡌女衣毳毼錦罽綾文獻通考回紇國可汗相見去㡌複髪以為禮婦人總髪為髻髙五六寸以紅絲絹囊之既嫁則加氊㡌按準部服飾史傳所紀殊畧以今証古大致相同乾隆十九年封都爾伯特台吉䇿凌等爵首賜冠服迄蕩平而後革心向化之侣被服均同内地於是笑氊裘之喬野慚卉服之惷愚苟非幸際休嘉孰能得此殊榮異數乎坐卧之具繅和什勒以木為之長六七尺濶三尺許髙尺餘有四足制如内地之床其左右及後三面咸有邉䦨或加雕刻惟大台吉坐之宰桑以下不僣坐故稱台吉襲位為坐床云西勒圖制同繅和什勒掌教喇嘛坐之錫爾徳克以羊毛織成其形長方或舖於床或舖於地施坐褥於上即内地氊毯也都爾布錦亦以羊毛織成其形正方大者二尺小者尺餘加於錫爾徳克之上制如内地坐褥徳爾即枕也其形長方内著棉絮之屬外䝉以布或縀首與足皆有之首枕稍髙足枕稍卑琨濟勒即被也以縀及布為之中著棉絮殊厚徳必斯克爾即卧褥也以氊為裏或一層或兩層冐以縀綢及布之屬用以卧被有絮而褥無絮不産木棉以駝毛代之庫什格其形如幔施於座前面分兩幅而中開之或以布或以氊随時寒燠以張之其貴官則有兼用縀者流蘇銀鉤之屬綴於其上博克綽以皮為包用盛衣服格爾即䝉古包也稱房屋亦云唐書回鶻傳堅昆國阿熱駐牙青山周柵代垣聮氊為帳號宻的支它首領居小帳北史突厥傳西突厥其俗穹廬氊帳牙帳東開盖敬日之所出也按今準噶爾部方位之名以東為南以南為西西為北北為東彼處户皆東向即内地之南向北史謂西突厥牙帳東開即南向之謂今準噶爾所居戸皆東向猶存西突厥之遺意也飲食之具阿雅噶屈桞木及樺木為之大小不等制同桮棬塔巴克形同内地之盤盛食及羮以紅銅為之亦有用木者深淺大小不等其貴重之盤則以玉為之御製玉盤謡戊寅玉盤博徑得二尺圍六尺有去聲五寸益虚中盛水受一石素質不雕其色碧旁逹孚尹瓊華澤葆光撫不留手跡羣玉之精出崑崙吉日甲子天子賔於西王母瑶池津行觴介紹簠簋罇爾時所御器今存作鎮西極永好完未入震旦三千年問今何來不脛偶準噶爾亡淪世守阿睦撒納兹竊取王師冞入靖孽醜於将獲之聮猭走棄其重器為我有元英大吕陳座右咄哉玉盤徒華滋不可食兮不可衣連城價詎如窮竒俘彼禍除可罷師前歌後舞樂雍熈瓌玩吾将安用之擬付鄛人一例椎御製玉盤謡疊舊作韻有序壬午西濛穴掃元戎重器同遷北漠屯開督䕶遺珍載獻在徳致詎誇夫俘玉而功成宜切於銘盤一圍因以重之兩羙兹其合矣爾乃闐河粹毓準部材程昔焉青鉢偕登世作蹛林之寳昨者金屠不守時投甌脱之墟當夫琛賮來庭兑和列序璆琅匪乏奚煩徴典瑞於骨都輪廣依然亦未著鐫文於阿渾祗以五朞殊績㨗應轉圜百部永清歡回覆盎此則逹瓦齊故物已虛槃㪟行酒弗辱乎降王阿睦爾撒納齊貲空盗大弓襲蹏䆒歸於太府是用摛二篇而述事鑄謝鼎詞閲三載以繫時欹箴座侑云爾與昔獲盤符寸尺隻復成雙補闕益忽分忽合無情石猶覺愉焉色潤碧却似延津龍躍澤是宜有詩紀其跡出師昔嵗畧崑崙五載功成咸來賔天方黙克西瀛津或貢鏁甲或玉罇付之有司武庫存精金華服綵帛完薄來厚徃已數年物固有幸竒聮偶伊犂扼要輪番守儲胥詎藉邉内取哈薩布露胥地醜敢萌覬覦市易走墾耕忽見此盤有驛致同舊列左右絶域秋登萬寳滋既足食矣還足衣喜固在彼斯非竒敢因志滿不戢師天庥敬奉戒恬熙福謙保泰永志之向欲速矣思増椎前篇以得盤時逋逆尚未就殛故有擬付鄛人一例椎之句御製玉盤聮句有序壬午懐任協紀齊頒九譯之春娵訾迎韶早展重華之宴試覓新題於甲觀寧沿舊例乎辛盤則有西部輸珍尚方典器青筠浮面一雙承露交擎碧蓞為趺三五矅􅂕滿暈始也軍諮驛遞未碎斗而楚帳烏飛繼焉屯長犂翻存竊鈎而魯庭盗走失守見可敦並棄龍沙鼂采猶韜得時思咱馬同陳魚海土花不蝕矧乃泥都椀進朝端餵肉無煩和卓篘來徼外分醪足樂維鴻庥告永清之㑹正神物昭終合之期既偕地出圜鐘元氣兼通乎異域還應霄呈疊璧貞符適叶於前年當兹什襲初披六廵載詠禁中頗牧胥目屬以爭誇臺上鄂褒亦手捫而暗認繄爾韻催銅鉢程功庻慶其得全顧予銘切金甌記實蘄箴夫持滿御製令曰青宫集近臣聮吟例許列文茵玉盤先後來殊域石鼎推敲繼綺晨隔嵗紫光圖凱㑹韶年蒼縡答精禋東升旭影霞初絢臣傅恒西繞山容黛半皴綵勝吉占迎曙燦花幡芳信颺風頻鶯遷桞放梭初擲臣來保魚樂氷開尾有莘節應棣通蠲榖旦律調泰蔟協初旬菜挑七種羅肴核臣劉統勲裘粲三英集組紳坐列共球昭拓土班添氊罽賀填闉辟邪逺掃天堂穴臣兆惠御製延喜遥開月竁垠猶憶逐犇阿睦爾因縁收器額琳秦番語謂寳為額琳秦一之為甚寧思二天且無違而况人果見獻琛來攘攘誰容遊釡走踆踆衛拉四部全歸吏臣梁詩正厄魯千羣總𨽻民遂有白環踰弱水同時青鉢共香塵寳装鞞琫芙蓉鍔臣陳惠華繅藉圭璋翡翠綸􅸍嚕篘文鐫詰屈堅昆椀璞剖嶙㟒汗溝流赭毛頒馬臣劉綸陽冶鎔黄趾鑄麟九府圜型工肉好三河方折採奫淪包符自效圖書藪臣舒赫徳御製瓌異奚誇冠帶倫欲墾伊犂興稼穡誰埋大窖出璘珣䕶呵信是資丁甲博識何須問癸辛若木葩旉分韞匱望舒暈滿儷浮筠昔年苜蓿充沙漠臣于敏中此日琉璃對柍桭瓊笥駢函重珏輯瑶階聮晉六符陳圍三渾約涵規數臣錢汝誠倍兩横當布指循累譯走偕車轣轆他山攻借石磨磷那誇琬琰呈和璞臣介福詎數㻬琈出帝囷頒瑞記曽探大酉搜源跡直溯西申窺同象緯聮璣璧臣何國宗御製薦旅梯航配鰈鷷劔契豐城語豈誕珠還合浦事誠神乾坤竒偶成交泰雷雨經綸濟險屯寳玉彤弓疇許盗元音大吕不終湮性原特逹馳包匭臣觀保質秉堅剛協化鈞幾試崑炎光獨葆潛通虹氣蟄還伸連城價詎千金重臣王際華照廡芒驚五色匀輻湊璵璠徴合軌種滋蒲榖騐同畇捧來有澤能盈手臣錢維城選得無瑕可澡身容炙具先超鼎耳斟膏用或並杯唇雙飛入襲輝相照臣張泰開御製二妙同臺意自親侍從今時昔上将追陪宻席逺嘉賔是日御前䝉古王公亦在座武成乆矣人心豫賮獻駢如地寳臻響應鑮鐘尊典樂製侔獵鼓掌成均夜光互燭聮形影臣王㑹汾鼂采交輝象介僎何俟得璜偏海澨本來投石自天濵躍淵似擊蕤賔鐵臣金甡啟礦如探安息銀煜煜鴻儀剛比徳斑斑龍輔恰為鄰紋凝水碧㾗微吐臣陳兆崙廉劚山元體最純細較廣袤齊尺寸遥覘氣象炳星辰中涵温潤疑丹甑臣倪承寛御製外逹菁華異緑瑉象協地天涵太極圓呈日月麗雙輪巧諧訝似能飛鏡逺届欣同不脛珍定識洪鑪竒締造無勞哲匠費陶甄衆形雕刻天工錯臣邉繼祖圓盖帡幪睿藻彬授簡載賡敶黼座盍􅆪依永上楓宸嘉祥喜叶南山祝臣盧文弨燕飲歡􅆽北斗醇魯寳承匜歌酌賚荆璆琢敦舞章斌鏤雲列架頳虬卧臣謝墉散采流蘇紫鳳馴惠浹長筵銘瑞甕樂張廣殿捋和錞蓼芽入饌纔逄榖臣汪永錫御製椒蕊粘屏始建寅三品果盛回部味九華鐙映上元春敢誇禹貢傳西被惟對湯盤凛日新御製碧玉盤謡癸未碧玉之盤徑逾尺質本規圓色光澤準夷重器守世則貯以馬湩可盈石穹廬玉醴斯陳席準俗四月馬湩新得時置筵酬神詐馬為慶謂之玉醴斯䝉古亦然但不如其盛耳以招百福繁生息仁義不施攻守易矯䖍奪攘紛兵革休屠金人且弗惜玉盤自合棄荒棘磕破邉角秦璽阸伊犂墾田耕者獲驛使致京飛不翼取裁改為葵花式穆然完好綈几側湯之盤銘日新徳用識顛末苕華勒特卜什以木為之形如長方盤大小不等用以盛肉即肉槽也阿爾呼特縫皮為袋中盛牲乳束其口乆而成酒味微酢謂之桐酒庫努克以皮為桶大小不等上有皮繫用盛乳酪之屬庫庫爾以皮為之其形如壺髙二三尺不等以盛乳酒而斟酌之其㵼酒處斜出如鳥喙長可四五寸海蘇即釡也旁有四耳小者兩耳以紅銅及鐵為之初稱為脱歡後避脱歡太師名改今稱圖拉噶即行竈也以鐵條為圏下施三足髙低不等置之於地上加鍋使不欹什納噶即匕也以銅及鐵為之有柄用以挹飲食酒漿之屬其柄曲直長短無定式柄及頭亦有純用木者北史西域傳悦般國日三澡潄然後飲食宋史外國傳唐回鶻之地大蟲太子族器用金銀馬乳釀酒飲之亦醉按準俗止知用椀而不知用箸椀以木為而無瓷器凡盛飲食之具非銅鐵即木與皮為之别有札卜札雅椀係西藏物草根結成間傳準地不常有也北史云大宛不鑄鐵器得漢黄白金輒以為器宋史亦稱回鶻地器用金銀今準噶爾為回鶻故壤地近大宛非銅即鐵未聞以黄白金為之者豈當時金銀多而後世金銀少耶日用之具烏珠克削竹為片長四寸許上濶二分漸下漸鋭至末而鋭甚如刀之口取墨於髪帚以作字必爾以髪為之長四寸許縱束如帚状其末半寸餘不束浸墨瀋令恒濕欲書則以烏珠克蘸其墨焉察遜草名搗爛可成紙因呼紙亦謂之察遜質厚而麤壓之砑之可供書寫必爾海拉察克以木為之其形長方中有木楞界之左盛烏珠克右盛必爾如内地之匣也塔瑪噶即印也台吉之印其形圓範金為之宰桑以下之印其形方或以銀或以銅鐵錫各視其職而差等焉御製海努銅印詩有序庚辰武定功成農政宜舉念伊犂委之荒蕪久或别部竊踞非良圖也因命副都統阿桂伊柱等率兵徃理屯政兹伊柱循行至海努克地見大招梵帙叢委以次檢輯獲虎紐銅章一方文曰管轄厄魯特後旗札薩克印旁識雍正四年十月鑄成即日驛封來上盖向年曽頒給喀爾喀之厄魯特扎薩克毛海者彼叛徃準噶爾攜以獻噶爾丹䇿凌因命篋衍内廷並系是詩以誌其事厄魯和通厄魯特謂回人為和通以次平徐籌考牧及屯耕葉竒即葉爾竒木四字急呼之實兩字也已慶春膏溥回地素艱雨澤昨阿里衮等奏三月二十一二等日葉爾竒木諸城耕作方興甘霖大沛回人皆詫為希有海努曽無兵燹驚收拾金經皈浄業分明銅印返神京天驕猖獗今何有蠲忿因之益凛盈御製鐵章記鐵章一錯以金方得寸有十分寸之五博得十分寸之二柄以木方如之博得十分寸之五稍豊其上刻若井藻又橢以窮刻若華表柱之首其長二寸通章之博髙二寸有十分寸之七藻上穿好綬約之綬之窮為蕃錦囊覆垂章上不可離藏以髹盝其文曰厄爾徳尼卓里克圖洪台吉之章華語所謂寳權大慶王也盖自䇿妄阿拉布坦時乞自逹頼喇嘛用梵書刻印錫予以為準噶爾傳世之器今年夏既平準夷遂獲此章驛致典屬予既訝鐻鍝君長亦有世守法物也而又憫逹瓦齊不得辭毁櫝之愆若夫戒盈知懼固不在區區抑埴之物矣作鐵章記準即内地之鍼純鋼不銹海齊即内地之剪刀其頭甚長而交股則短烏塔蘇即線也或以棉花或以馬尾鬃用蠶絲者絶少鄂里即畚也用以盛土托斯和爾即舟也刳獨木為之大小不等用以濟渡一舟左右兩篙亦以木為之其名曰海巴特爾根即車也其輪用大輻板四交股作十字形輪之髙低大小随車之制間有用四輪者大都用以任載輪轅多以槐木為之北史髙車傳人乗髙輪車車輪髙大輻數至多唐書回鶻傳回紇可敦乗曲輿青山之東有劔水偶艇以渡按髙車人多乗車而制極髙大推之他國知引重致逺之具所在有之矣葢除沙磧而外有水即可運舟平地即可牽車但制度樸略不逮中土且以畜耕為業者率便於騎舟車苐以佐其不足當非所尚耳攻戰之具伊勒都即刀也形如内地惟於刀欛之間以鐵兩方横抵之代䕶手濟逹即鎗也長者約一丈二三尺短者亦不下一丈頭用純鋼鐡為之長六七寸許兩柄以馬鬃繞之又以駝毛為毬繫於柄之中間柄稍近末穿一孔繫以革條以便負之而趨努穆即弓也形同内地而稍小以山羊皮代樺皮為餙以馬尾鬃為之弦蘇穆即箭也形同内地而稍短箭桿之木亦名蘇穆質堅細而勁實碩羅即劔也長者三尺餘短者二尺餘劔鞘以皮為之鐔端有銅環御製蕃劔行丙子蕃劔一泓波溢塘鈲從文起飛寒芒其來伊犂萬里外限以大幹天各方語言不通振古異誰歐冶為去聲為魚腸昔策妄阿拉布坦草創絶域誇雄强大小策凌敦多卜皆其羽翼兄弟行大者善計善將將小者勇萬夫莫當矢石雨下自弗著亦不驚避状若常禡木特及撒拉爾自謂弗及言之詳此劔乃彼所佩用不離身持短入長强者死絶弱者亂曽不厯世羣䘮亡煢煢孤息挈部落歸命貢此呈天閶暴得暴失何足紀􅂓紀向化武庫藏聊紀向化武庫藏吾猶慮其為龍飛去水中央都呼拉哈即胄也形同内地或施鐵皮於胄前以障面僅露兩目呼雅克即鎻子甲間有用綿為甲者其名曰鄂勒博克御製蕃甲行丙子權輿甲胄作軒轅銅頭鐵額人驚看函人慎術精五屬合甲夀至三百年然惟犀兕察革空上聲眡裏眡朕要取堅後世乃有鎖子甲鐵環金練蛇鱗翻我聞其名未覩物偃武日久工失傳底定伊犂盡肉􅃝台吉宰桑來後先取其重器藏武庫鐵章蕃甲驛致駢上年平伊犂得鐵章一葢其台吉世所傳用詳見記中當時噶爾丹䇿凌恃逺抗大數入聲擾邉其人狡譎習攻戰頗能憐下人稱賢備器致用懾隣服哈薩克無能為患叶以武得之守詎可逆天内潰宗弗延廿一昂吉皆入化昂吉者䝉古語部分也準噶爾所屬或一鄂拓克為一昂吉或合數鄂拓克為一昂吉凡二十一是皆噶爾丹䇿凌分内者今均内屬其衆台吉下之鄂拓克則各令其汗王扎薩克等掌之一如四十九旗之制四圖什墨為我臣叶其噶爾丹䇿凌於諸宰桑中擇四人為圖什墨圖什墨者大臣之稱也又其次為六札爾扈齊佐圖什墨理事者也今仍其舊授四圖什墨為内大臣扎爾扈齊為散秩大臣管理二十一部分之事組鎧虎皮包弗用或異得四白鹿旋包即礮也以鐵為腔中施硝黄鉛弹之屬或高二三尺圓徑三寸駕於駝背施放或髙二三尺圓徑五六寸木架上施放或長四尺餘制如内地鳥鎗手中施放管包之人名曰包沁瑪呢即旗也以布為幅雜色俱有長幾一丈寛如其長十之八書喇嘛經咒於其幅遇風展動與諷誦等宰桑以下建之圖克瑪呢即大纛旗也長丈餘寛亦如之旗幅用緑色縀書喇嘛經咒於其上台吉建之北史突厥傳兵器有角弓鳴鏑甲矟刀楯旗纛之上施金狼頭徴發兵馬刻木為數并一金鏃箭蠟封印之以為信契蠕蠕傳始立軍法千人為軍軍置将一人百人為幢幢置帥一人社崘學中國立法置戰陣卒成邊害唐書回鶻𫝊黠戞斯古堅昆國也其戰有弓矢旗幟其騎士析木為盾蔽股足又以圓盾傅肩可捍矢刃按古蠕蠕立軍法突厥備兵器而西部沙陀尤稱雄勁今準部亦以堅甲利兵相讎殺為西北部桀黠之尤考其戰具制度略備旗纛皆書梵語且若奉菩薩教者實則弱肉強食亡不旋踵善戰善陣果足恃乎哉成物之具竒魯斡形同内地之鋸其著手處或用木或用鐵蘇克形同内地之斧亦有兩俱削成芒口者額嚕木形同内地之鑽其䋲用馬鬃三股為之䋲之名曰塔納烏呼必形同内地之彎刀又有捲頭作鉤者哈魯爾形同内地之推刨大者用兩手小者用一手其四周平底亦或以銅為之按準部成物之具略同回部即準之内地亦不復大殊而史傳所載獨缺焉不備者殆即班孟堅所謂畧與漢同有異乃紀者耶兹編參酌詳要形名兼審凡有裨於用者悉登且以補歴代史書未備云欽定皇輿西域圖志卷四十一
