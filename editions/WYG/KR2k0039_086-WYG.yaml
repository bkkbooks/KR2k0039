body:
  text: 服物二回部被服之具特勒帕克即暖㡌也頂髙五寸以氊罽為之邉寛前後獨鋭各五寸飾以海龍水獺貴者用貂㡌頂紅色織花繡紋均不綴纓婦人㡌頂尖圓中腰稍細形若葫蘆之半辮髪雙垂名薩持巴額束以紅帛上下兩匝不用珠綴喀勒帕克即秋㡌也制同特勒帕克以小呢猩猩氊倭縀為之又有小㡌無邊頂㣲鋭質以布或用氊凡冠暖㡌秋㡌則以此為裏焉又或以布帛纒頭名薩帕持其末半垂於後托恩急讀曰吞即袍也制畧同於内地領無釦䄂平不鑲四圍連紉貴者用錦繡冬用貂餘服縀罽綢褐不等冬用羊毛又一種旁無袵當胸釦五行行必以二常時服之若見尊長則以托恩為重普塔即帯也又名庫爾全幅綢綾或布為之其末下垂斜壓小刀於左烏圖克即鞾也香牛皮為之或紅或黒制同内地頭稍尖上嵌花繡㡳亦皮為之克闢實即鞋也形與鞾同其旁稍仄亦皮為之伊實坦即褲也布為之克特齊即荷包也縀布為之形長内盛刀石鍼線等物尼木察内袍也制同衫以綢布為之袵旁存一小孔謂之延楚克以藏克特派伊帕克即韈也制同内地阿勒喀即女人耳環也以銀及銅為之貴者用金上綴珠寳雅克里克即手帕也以全幅布為之闢察克即小刀也刄短柄長盛以皮鞘飾以銀柄繫長縧佩於帯間晉書西戎傳焉耆其俗丈夫翦髪婦人衣襦著大袴龜兹男女皆翦髮垂項北史西域傳于闐國王練錦㡌金鼠冠妻戴金花冠其王髪不令人見俗言若見王髪其嵗必儉云髙昌國服飾丈夫從胡法婦人裙襦頭上作髻焉耆丈夫翦髪以為首飾養蠶不以為絲惟充綿纊龜兹王頭繫綵帯垂之於後疏勒王戴金師子冠鉢和國服氊裘唐書西域傳髙昌俗辮髻垂後龜兹俗斷髪齊項惟君不翦髪王以錦冐頂錦袍寳帯宋史外國傳龜兹王衣黄衣寳冠以花蕊布博易馬端臨文獻通考于闐國初無蠶桑丐鄰國不肯出其王即求婚許之將迎乃告曰國無帛可持蠶自為衣女聞置蠶㡌絮中闗守不敢騐自是始有蠶女刻石約無殺蠶蛾飛盡得治繭王延徳髙昌行紀出白㲲繡文花蕊布婦人戴油㡌謂之蘓幕遮五代髙居誨使于闐記于闐王衣冠如中國居處常衣紫衣明史西域傳巴什伯里舊對音别失八里今改正衣服與衞牲舊對音瓦剌今改正同按回部諸城古者各自為國其服亦各不同今則大畧相似史載于闐形貌衣冠俱如中國由今觀之仍與回俗無别也聖朝禮制從宜於回部伯克錫之頂帯居恒服飾則仍其舊以一王章以便民俗所由酌損益以協信從之準者法莫善於此至與準部較然不同者如耕種之具準部所無餘則形式大同小異而稱名絶殊其有以回人襲用準部服物者如徳必斯克爾都爾伯勒津之類并其名襲之亦為分載諸條以偹審証云坐卧之具吉里雅木毯也以羊毛和棉線織成施於炕長濶視炕之度或施於地長者盈丈短亦六七尺濶者七八尺狹亦四五尺復加花氊於上惟上等回人用之餘惟白氊為單而已竒吉斯以白氊為之施於吉里雅木四圍或以被墻塔克納瑪特以花氊為之其形長方設於吉里雅木之上以待賔客博哩雅席也織草成之以施於地中等回人用之帕拉斯席單也羊毛織成施於席上單之四圍赤施竒吉斯中設塔克納瑪特以待賔客徳必斯克爾長褥也以縀布毯等物為之中實以棉絮之屬施於花氊上以襯坐褥次等惟用氊回俗舊無此附準噶爾後始襲用之都爾伯勒津方坐褥也以紬縀及氊為之亦附準噶爾後始有厄魯特呼四方之物曰都爾伯勒津因效其語以名褥其次等者惟用氊圖沙克卧褥也以綢或縀為表以布為裏納絮於中長六尺寛二尺餘富者至三四重其中等回人則表裏皆布沙徳爾沙布卧褥之單也以布為之加於褥上隨時可浣洗塔竒雅枕也以金絲縀或紬為之長二尺餘納絮於中以兩枕疊而用之其中等回人則以布為之約爾托勘被也或縀或綢以為表裏長六尺寛三尺餘寒則納絮暑則去絮其中等回人或表裏皆布或以綢為表布為裏莫伊納約爾托勘皮被也上等回人以綢縀為表羊皮為裏中等回人以布為表羊皮為裏嚴冬用之庫實格帳幔也縫整幅為之或赤或青開其中間卧則用以蔽風惟上等回人用之餘則否博克札瑪被囊也花布為靣素布為裏繫以絲縧或䋲以安被褥枕帳諸物不論上等中等俱有兩愽克札瑪資勒察花毯也或施於博克札瑪之上以辟塵或障於墻屋四遭之下自墻腰起及地而止髙不過四五尺貴者用之塔爾摩資勒察亦花毯以羊毛織成其質粗平等人用之崇繖都克大木櫃也其形長方上有抽蓋大者四五尺其次亦不下二三尺以弆衣服及㡌面刻花木禽獸為飾貴者用之男女各一竒齊克繖都克小木匣也其形長方上有抽蓋大者尺餘小亦盈尺男女各二男以藏帯刀諸物女以藏首飾諸物其平等回人則男女各一喀爾特床也以木為之中横直木為楞約五六行下有四足左右兩足間各施横木上施塔克納瑪特然後再加褥焉額格斯察爾帕雅桌也以木為之足中間及下跗四靣皆施横木中以繫物下以承足庫爾斯葉横木兩楞中施皮毯之属四足互交制如今之馬櫈其足可施可去以便提挈北史髙昌傳有白塩其形如玉髙昌人取以為枕西域傳龜兹王金師子床按回部器用或仍本俗或襲準噶爾之舊厥制較備即坐卧之具已見其概矣其分等判然不相踰越均有足記者飲食之具酬察克刳木為椀其大小不等以油塗之以漆髹之盛茶及飯其酋長及貴人或以玉為之御製玉椀詩丙子玉椀來回部輸誠貢闔閶召公懐不寳韓子戒無當異致白毛鹿引恬赬尾魴回部葉爾羌喀什噶爾初役屬於準噶爾為所拘縶因我大軍戡定伊犁始釋之令歸所部其長伯克和卓遣使求内屬此其所貢也勞徠非力并天眷奉昭彰御製詠玉茶椀戊寅于闐何必購奩環通貢薄來每厚還保定不期致逺域琢磨亦復藉他山示禎碧落星辰表延喜明廷樽爼間漉雪浮香真恰當思推觧渴福區寰御製玉椀詩己夘曽未于闐遣使求堅昆玉椀自來投詎云有翼千斤獻那肯無端大白浮賢問乃明君子徳工言㡬誤楚人璆嵗時宴饗斟香茗延喜明廷奕葉庥喀喇桑屈木為之其形如桶以盛牛羊乳察喇小木桶也以盛酸乳烈干大盤也紅銅為之其形正圓圍七八尺髙七八寸不等以盛牛馬羊肉托古斯密斯塔巴克用紅銅為圓盤徑尺許深三四寸不等其數用九以盛各項飲食之物塔赫錫用紅銅為小圓盤圓徑約二寸以内高寸許以盛果品其數亦用九色爾里克塔巴克油漆木盤也形同密斯嗒巴克無常數和恩以木為盤而有足高約二寸圓經約六七寸以盛餅餌之屬庫喇以紅銅為之其形如罐而有蓋旁施兩耳以盛飯麺乳食等物數以四鄂喇札木以紅銅為之其形如缸髙七寸餘口徑三寸餘以盛肉汁數以四喀淑克小木杓也挹飯麵以實於酬察克其柄稍彎而刻其末以飾觀楚黙楚大木杓也挹牛羊等肉食以實於烈干挹肉汁以實於鄂喇札木塔克塔以薄板為之其形長方如案施於毯上額格斯察爾帕雅以治事塔克塔以飲食達斯圖爾干其形長方如塔克塔之式以綢縀等為表以布為裏亦有以布為表者施於塔克塔之上為上客進饌必設之隆吉浄手巾也白布為之兩端織以紅緑色線文采繽紛長四五尺寛尺餘將食之頃洗浄手面以此拭之阿布塔巴洗手靣器以銅為之有長口有蓋有提形同内地之茶壺將洗則以壺水澆手用之竒拉布察以銅為之形圓如盆口小腹大口徑二寸餘腹徑三寸餘傾壺水以洗盥時以是噐受注殘水滿而棄之楚雲楚衮以鐵為之形如阿布塔巴而特大以注熱湯於阿布塔巴而用之柴珠實小銅壷也髙七八寸許口僅寸許有長口有柄有蓋用以烹茶密斯噶藏以紅銅為之其形如鍋口徑四尺可煮全牛之肉旁有六耳崇楚雲噶藏大鐵鍋也口徑約二尺可供一二十人食旁有兩耳竒齊克噶藏形如小鍋紅銅與鐵相和為之以木為蓋上繫以繩旁有兩耳用以熬湯及烹茶努爾古赤圓木杖也作餅時用之騰訥以木為槽形盛水以和麵蘇富喇羊毛毯也施於地上以受麵阿勒噶克屈柔木為邊麤布為底其形正圓如内地之篩用以除麤取細綽里編細栁木為之其形如圓筐用以漉米御製詠唐時回銅器有序己夘山荘舊藏古銅器一似豆而短足初以為三代青緑耳廹視之形不饕餮銘不乙丁金銀錯其文則似回字令吐魯番哈密回子等識之惟識噶愛兩字其餘皆不辨蓋彼經文亦有今古之異人不能盡曉也嘗考回鶻唐時始通中國史稱其先匈奴匈奴與今之䝉古相類則回回並非䝉古且殊教也元史始有回回國之名或稱其為大食國種大食在西域此稍近之明邱濬以為陳隋間始入中國在在有之在在有之者亦云其繁滋漢土者耳其的派固不離西域也今平定葉爾羌喀什噶爾此實開闢以來不異之回地回人若布魯特若哈薩克皆其蔓延繁滋或雜䝉古種者有之若唐史回鶻傳所稱善騎射喜盜鈔者實近厄魯特之習而非回人所能徒以回鶻音近回回因屬之纒頭之類耳究之耳食舌傳魚魯千里将以餘暇博考此姑俟之所喜者適獲此器於平定回城之時殱厥渠魁繫以白練兆在斯乎兆在斯乎故從而為之辭不是辛尊與啓匜考時應入李唐時纒頭回鶻人斯用餵肉葡萄宫所遺噶讀作平聲愛旁行粗可識氷斯古豈咸知遷其重器兹先兆佇待俘來罷逺師御製詠回銅㗶嚕篘器疊去嵗避暑山莊詠唐時回銅器韻有序庚辰㗶嚕篘之制正圓而豐下上横鋬可左右紐髙五寸有十分寸之五口圍尺有八寸腹圍二尺四寸有十分寸之八中實六升許銅笵而金銀錯其文皆旁行回字不可辨識西師凱還将軍等與所俘武器並獻命阿渾通經典者其名曰哈爾披野特者詳譯之具云元時回部有汗曰眉哩特木爾世居伊楞地名今在布哈爾之西嘗得沙頼子城名在伊楞左近良匠喀嗎爾所造用貯漿齊鏤文悉祝嘏之辭葉爾羌喀什噶爾世不乏一二見者其縁起載陀犁克史名云云夫天堂墨克之區遼邈荒忽歴代史牒所志支離牽合罔所折衷今荷天祖垂庥師武臣克襄成績昄章其地氓隸其人乃至昔曰舊物留遺皆得入中國而詳其原委亮非獲休屠金人與蒲捎苜蓿輒齗齗動色哆詞之為也爰以長言系之俾昭示來許不敢矜方物之逺益無忘綏輯之艱云爾重器真遷㗶嚕匜舊作有遷其重器兹先兆之語平回並馘獻來時曽供菽水數升受亦閲春秋四百遺其史所記造此器時當在中國大元時嵗月不可細考約計距今已四百餘年矣喀嗎匠鏤眉哩用陀犁史載阿渾知詎珍三品精鋟錯保定方籌撫衆師御製回玉圭謡辛巳崑崙西極玉所都穆滿靈器傳西胡楚曰珵珩魯璠璵其偶然耳古論諸乃今通道蔥嶺途嵗為恒供寧十區是圭實彼之寳符馹來什襲呈天衢阿渾通回經字者譯出其文攄駢蕃吉語歌九如福祚昌熾享齡遐叶豫順兆姓鞏皇圖宜子孫佩意不殊韞櫝爰識咸賔謨保奭用訓猶忸吾王延徳髙昌行紀善冶金銀銅鐵為器皿及攻玉按回部食器如烈干密斯塔巴克之屬銅鐵為質者居多固即延徳所稱冶金銀銅鐵為器皿者近是也至於彼中珍玩或以良金粹玉為質尋常歐冶琢磨之匠罕能為之如銅㗶嚕篘器載諸陀犁克史者阿渾能詳其典故回玉圭雖縁起莫考要皆其先世珍異可知考㗶嚕篘畧近盤匜用貯漿齊則亦當時飲食之器若圭璋之制於回部無聞或中國流傳及彼倣而為之或其形偶相合耳回俗舊尊經典凡諸旗纛悉書梵語以祈靈庇兹㗶嚕篘及玉圭並勒旁行回字為祝嘏詞與唐時回銅器相同皆倣中國勒銘彛鼎之意不惟數其器物兼可考其文字此如明史所載賽嗎爾堪舊對音撒馬兒罕今改正部之照世杯光明洞徹世不乏一二見者爰登服物以為博古之助云日用之器摩伊喀里雅木束毛以為筆或束人髪為之其管或以木或以竹喀里雅木竹筆也形如準噶爾之烏珠克都幹特以銅為盞用綿漬墨置於其中供醮筆之用色雅以鍋底烟煤合油麵為之即回部之墨也喀阿斯即紙也以桑枝嫩條搗爛為之色㣲帯碧其光潔者略似髙麗紙喀里雅木當藏筆之匣其形長方上有抽蓋有木者有竹者喀里雅木達喇實形如鬀髪之刀其柄或以銅或以木或以竹樞紐甚緊用以裁紙摩和爾印也汗之印其形正圎徑二寸餘色用紅伯克之印圓而有蒂徑一寸餘色用黒伯克中惟阿竒木伊什罕有之餘俱無印文首鐫年分次鐫其父名最下鐫本人名伯克印亦如之汗新立伯克新授則别鑄其印焉哲都斡勒塔赫塔即界方也以紅銅及鐵為之用以鎮紙短者數寸長者尺餘又以鐵為方鎮名之曰繖達勒凱齊剪刀也頭銳而厚且長兩股如燕尾其形畧鈎而已又有一種其尾可伸屈之則成剪刀形伸之則兩尾相並如雙筯然克斯噶齊鐵夾也用以夾物并用以箝其有鈎者謂之罕布爾巴斯安大鐵錘也其小者謂之布爾喀阿塔什扣以鐵為之首形如雙剪其末鋭用通淤塞長者二三尺短者二三寸克瑪刳獨木為舟亦有攢小木而成者立四柱可䝉氊毯之屬無風雨則撤之有則張之阿喇巴即車也其輪甚髙其箱甚深駕以牛馬亦有駕鹿以行者唐書西域傳于闐以木為筆以玉為印攻戰之具克凌齊刀也其質純銅其形彎至頭則愈昂柄用大魚骨及硬木為之刀鞘用魚皮飾以象牙玳瑁之屬柄端有銅環以繫革縧色里葉瑪亦刀也克􅇒齊之口鋭色里葉瑪則口差厚其形畧帯長方柄甚長有大力者則用鐵柄鼐咱長鎗也其柄丈許以木為之其鐵刃七八寸柄刃之間綴以銅環截牛皮濶寸許以裏其柄一柄之長束皮九道阿伊帕勒圖月斧也鑄鐵為幹其頭鋭利如鎗近鋭頭六七寸為斧面下如半勝之形口甚鋭上半形帯長方背有二十餘鉏鋙如鋸之狀蓋一物而可三用也罕札爾即劒也有兩􅆃以魚骨飾柄御製回劒行庚辰逆酋小和卓木霍集占所佩副將軍富徳大勝之於伊西洱所獲也凱還奏進詩以識之袄襓展室青萍寒一條秋漢溢波瀾蛟龍水斷犀兕剸吳鈎薛燭古所傳泰階九宇胥晏安歐冶之法誰則閑絶域尚武求精堅銛鋒三尺不可刓弱肉强食必佩旃況彼窮竒肯離焉伊西大勝回纛搴二酋倉皇駾走前獲兹鋭器羣訝觀訊醜踉蹌具致言劔藏霍集占身邉惟命是顧乃忍捐異封獻馘師凱旋彤庭奏進出匣看光芒誠覺星辰連弢弆武庫識嵗年保定諸部籌久全繅特甲也制如鎻子甲有棉者謂之鄂勒帕克有鏡者謂之庫雅克其䕶心鏡謂之察喇伊納以白鐡為之巴勒達木齊甲外之鐵帯也都裕勒噶胄也内有㡌前覆至額後被至頸左右垂至兩耳謂之圖卜貝爾庫沙拉布爾皮褲之名也臨陣時外披甲内著皮褲衣服下袵俱結束於其内令身輕轉㨗有力雅弓也以柘木為質馬鬃為弦力甚勁鄂克箭也以木為桿鑌鐵為鏃鏃頭有三面刃有兩面刃桿有羽者射逺用毛者射近薩克達克即櫜鍵也以獸皮為之口用紐或以帯阿里雅木小纛旗也長五尺餘寛三尺餘白布為幅上旁行書囘字各伯克皆有之幅上即著各伯克之名以為識焉圖克大纛旗也長七八尺濶幾相等以雜色布為幅幅上綴以金片鐫刻教主及派噶木巴爾名字金片下以紅鬃為纓如垂旒然御製回纛行戊寅小和卓木其號霍集占其名領兵來援圍城嚴先是其兵來赴救托和鼐地名已二千殱逃生回者匍匐告昧死尚敢潛窺覘城中知有賊接應借一出突施戈錟緑旗圍城腹背敵屹立不動戰方酣是時實頼愛隆阿副都統領隊大臣率千騎至皆竒男吉林滿兵及索倫兵横衝截入亂回陣斬將獲醜如囊探狂回難當復大敗東籠案角相藉􅍴敺至鄂根河之側溺水避者如眠蠶賊約五千三千死千餘戰士威風添霍集占乃抱頭竄搴其大纛銅旗尖咳首五色書旗幅不觧其義言詀詀驛致既喜復致惜設執逆醜除兇憸徂維求定靖遐壤止戈和衆吾方忺御製後回纛行疊前作韻庚辰樹丸火米符祥占喀喇烏蘇之役將士方堅壁趣援時於固守處得窖米贍軍樹上檢鉛九濟用並獲神助孤軍接應遂觧嚴整師救和闐玉隴帕首蟻雜胥劉殱將以三路進埽穴僑如叔仲先潛覘狼狽挈拏預遁去二城降不勞矛錟競作鐃吹迓主帥從今食飽眠亦酣選卒前遮復後襲義無返顧均雄男線天磧地冞入阻欲得虎子虎穴探明瑞邀之庫魯克以少勝衆折袄欃富徳追及伊西洱用强驅弱如掃蠶鹿埵流湯賊屢敗獲銃搴纛軍威添遁入異域卒獻馘飛來報㨗紅旗尖凱旋攜以貢武庫阿渾譯出其文詀纛上旁行書令以托特字譯之回中稱通暁經典者曰阿渾亦知福善禍淫道胡乃偕徳興狂憸敵氣致力衆惟惜事成志遂吾敢忺漢書西域傳出陽闗自近者始曰婼羌山有鐵自作兵兵有弓矛服刀劍甲難兠有銀銅鐵作兵器與諸國同後漢書西域傳焉耆能作弓矢北史西域傳髙昌兵器有弓箭刀楯甲矟焉耆兵有弓刀甲矟按唐書載吐蕃能飛梯鵞車以攻城文獻通考稱天竺亦有飛梯地道木牛流馬之法今囘部戰具未有此種則以吐蕃天竺居囘部之南故其制不同於三十六國而今之囘部服屬準部則尋常擊刺之能亦有難於並論者豈非南柔北勁實地氣使然歟耕種之具布古爾斯犁之總名也頭以鐵為之曰題實長短參差如指形犁之梁曰克實勤以木為之約長一丈端有鐵環可以穿鈎牛背之横木曰布雲圖嚕克其長亦如克實勤可駕兩牛横木中間繫以長繩曰阿爾噶木濟引屬於鈎繫於犁梁之環乃驅兩牛負犁以行牛膊之上左右設兩板謂之杭烏克以木為之長各一尺五寸用施牛背横木於其上庫爾扎克犁耙也其鐵頭向内形似鏟柄稍斜以棗木為之播種之後用以覆土恰特滿形似鐵鐝其頭甚圓以棗木為直柄用以垡土開溝並引溝水以灌田蘇堪盛糞之筐編栁為之糞之名曰克赫以牛馬者為良糞田可倍收鄂爾噶克形如曲刀純鋼為之頭柄皆鐵用以刈稻麦之屬阿伊哩以木為义五齒或四齒三齒以匀榖麦承曝令乾阿斯喀克以木為鈎短者五尺長有八九尺者用以出糓鄂特恰爾瑪屈栁木為邊以牛皮為檔結細草為底或用籐為底用以簸榖摩密埸上立木也植木於地繫牲於木用踹榖麦以代碌碡按回部諸城頗知田作非凖噶爾専事畜牧逐水草為業者比故有農具以資耕穫若地利人工之所出勸課之方則不逮中土甚矣成物之具赫實喀里畢以木為方模入泥於中用成土坯綽布噶資木尺也以量長短長五尺者其形三稜長二尺五寸者面平而背圓庫喇結草為長繩築墻時用以直贊畢勒運土架也二木為邊中編栁條四角繫繩以運泥土索輝水桶也盛水以化泥土騰訥木盤也用以盛泥塔巴爾曽以鐵為之首為斧形築土使堅其末如刀以塗泥傅之凡成牆者必以此喇安達或以鐵為或以木為其形長方築牆成後用以平之甘齊石灰也牆成後堊之阿爾喇鋸也大小不等手持處亦以鐵為大者鋸木小者鋸骨角之屬裕舒竒即鑽也形同内地其鑽弓謂之喀瑪勒察綽鄂特形如大鏟刀口濶而薄向上漸厚漸狹用以削木小者謂之恰爾竒尃用以成細巧之物蘭達大推刨也兩手用之其小者别名綽卜薩一手用之帕勒圖短斧也棗木為柄喀實喀爾特剜刀也其頭甚鋭額恰克鐵剉刀也剉物處齒如宻釘質厚而鋩銳伊斯喀那鏹刀也其形如鑿用以鍥物圖魯木大皮囊也一應治屋之器皆可弢於其中晉書西戎傳龜兹國王宫壯麗煥若神居宋王延徳髙昌行紀居人皆穿地為穴以處屋室覆以白堊按回部有城郭宫室異於凖部之穹廬氊帳以居者一切木石諸工亦皆藉器以善其事故成物之具視凖部加詳第考史書所載西域宫室之制率多侈麗莊嚴以今審究殊不謂然即由回部西踰蔥嶺如墨克黙徳那諸部為回回祖國多有回民赴彼禮拜者傳其棟宇之槩亦與今山南諸部風俗相近可知史家不務紀實以夸誕失真蓋不一而足也欽定皇輿西域圖志卷四十二欽定四庫全書欽定皇輿西域圖志卷四十二服物二回部被服之具特勒帕克即暖㡌也頂髙五寸以氊罽為之邉寛前後獨鋭各五寸飾以海龍水獺貴者用貂㡌頂紅色織花繡紋均不綴纓婦人㡌頂尖圓中腰稍細形若葫蘆之半辮髪雙垂名薩持巴額束以紅帛上下兩匝不用珠綴喀勒帕克即秋㡌也制同特勒帕克以小呢猩猩氊倭縀為之又有小㡌無邊頂㣲鋭質以布或用氊凡冠暖㡌秋㡌則以此為裏焉又或以布帛纒頭名薩帕持其末半垂於後托恩急讀曰吞即袍也制畧同於内地領無釦䄂平不鑲四圍連紉貴者用錦繡冬用貂餘服縀罽綢褐不等冬用羊毛又一種旁無袵當胸釦五行行必以二常時服之若見尊長則以托恩為重普塔即帯也又名庫爾全幅綢綾或布為之其末下垂斜壓小刀於左烏圖克即鞾也香牛皮為之或紅或黒制同内地頭稍尖上嵌花繡㡳亦皮為之克闢實即鞋也形與鞾同其旁稍仄亦皮為之伊實坦即褲也布為之克特齊即荷包也縀布為之形長内盛刀石鍼線等物尼木察内袍也制同衫以綢布為之袵旁存一小孔謂之延楚克以藏克特派伊帕克即韈也制同内地阿勒喀即女人耳環也以銀及銅為之貴者用金上綴珠寳雅克里克即手帕也以全幅布為之闢察克即小刀也刄短柄長盛以皮鞘飾以銀柄繫長縧佩於帯間晉書西戎傳焉耆其俗丈夫翦髪婦人衣襦著大袴龜兹男女皆翦髮垂項北史西域傳于闐國王練錦㡌金鼠冠妻戴金花冠其王髪不令人見俗言若見王髪其嵗必儉云髙昌國服飾丈夫從胡法婦人裙襦頭上作髻焉耆丈夫翦髪以為首飾養蠶不以為絲惟充綿纊龜兹王頭繫綵帯垂之於後疏勒王戴金師子冠鉢和國服氊裘唐書西域傳髙昌俗辮髻垂後龜兹俗斷髪齊項惟君不翦髪王以錦冐頂錦袍寳帯宋史外國傳龜兹王衣黄衣寳冠以花蕊布博易馬端臨文獻通考于闐國初無蠶桑丐鄰國不肯出其王即求婚許之將迎乃告曰國無帛可持蠶自為衣女聞置蠶㡌絮中闗守不敢騐自是始有蠶女刻石約無殺蠶蛾飛盡得治繭王延徳髙昌行紀出白㲲繡文花蕊布婦人戴油㡌謂之蘓幕遮五代髙居誨使于闐記于闐王衣冠如中國居處常衣紫衣明史西域傳巴什伯里舊對音别失八里今改正衣服與衞牲舊對音瓦剌今改正同按回部諸城古者各自為國其服亦各不同今則大畧相似史載于闐形貌衣冠俱如中國由今觀之仍與回俗無别也聖朝禮制從宜於回部伯克錫之頂帯居恒服飾則仍其舊以一王章以便民俗所由酌損益以協信從之準者法莫善於此至與準部較然不同者如耕種之具準部所無餘則形式大同小異而稱名絶殊其有以回人襲用準部服物者如徳必斯克爾都爾伯勒津之類并其名襲之亦為分載諸條以偹審証云坐卧之具吉里雅木毯也以羊毛和棉線織成施於炕長濶視炕之度或施於地長者盈丈短亦六七尺濶者七八尺狹亦四五尺復加花氊於上惟上等回人用之餘惟白氊為單而已竒吉斯以白氊為之施於吉里雅木四圍或以被墻塔克納瑪特以花氊為之其形長方設於吉里雅木之上以待賔客博哩雅席也織草成之以施於地中等回人用之帕拉斯席單也羊毛織成施於席上單之四圍赤施竒吉斯中設塔克納瑪特以待賔客徳必斯克爾長褥也以縀布毯等物為之中實以棉絮之屬施於花氊上以襯坐褥次等惟用氊回俗舊無此附準噶爾後始襲用之都爾伯勒津方坐褥也以紬縀及氊為之亦附準噶爾後始有厄魯特呼四方之物曰都爾伯勒津因效其語以名褥其次等者惟用氊圖沙克卧褥也以綢或縀為表以布為裏納絮於中長六尺寛二尺餘富者至三四重其中等回人則表裏皆布沙徳爾沙布卧褥之單也以布為之加於褥上隨時可浣洗塔竒雅枕也以金絲縀或紬為之長二尺餘納絮於中以兩枕疊而用之其中等回人則以布為之約爾托勘被也或縀或綢以為表裏長六尺寛三尺餘寒則納絮暑則去絮其中等回人或表裏皆布或以綢為表布為裏莫伊納約爾托勘皮被也上等回人以綢縀為表羊皮為裏中等回人以布為表羊皮為裏嚴冬用之庫實格帳幔也縫整幅為之或赤或青開其中間卧則用以蔽風惟上等回人用之餘則否博克札瑪被囊也花布為靣素布為裏繫以絲縧或䋲以安被褥枕帳諸物不論上等中等俱有兩愽克札瑪資勒察花毯也或施於博克札瑪之上以辟塵或障於墻屋四遭之下自墻腰起及地而止髙不過四五尺貴者用之塔爾摩資勒察亦花毯以羊毛織成其質粗平等人用之崇繖都克大木櫃也其形長方上有抽蓋大者四五尺其次亦不下二三尺以弆衣服及㡌面刻花木禽獸為飾貴者用之男女各一竒齊克繖都克小木匣也其形長方上有抽蓋大者尺餘小亦盈尺男女各二男以藏帯刀諸物女以藏首飾諸物其平等回人則男女各一喀爾特床也以木為之中横直木為楞約五六行下有四足左右兩足間各施横木上施塔克納瑪特然後再加褥焉額格斯察爾帕雅桌也以木為之足中間及下跗四靣皆施横木中以繫物下以承足庫爾斯葉横木兩楞中施皮毯之属四足互交制如今之馬櫈其足可施可去以便提挈北史髙昌傳有白塩其形如玉髙昌人取以為枕西域傳龜兹王金師子床按回部器用或仍本俗或襲準噶爾之舊厥制較備即坐卧之具已見其概矣其分等判然不相踰越均有足記者飲食之具酬察克刳木為椀其大小不等以油塗之以漆髹之盛茶及飯其酋長及貴人或以玉為之御製玉椀詩丙子玉椀來回部輸誠貢闔閶召公懐不寳韓子戒無當異致白毛鹿引恬赬尾魴回部葉爾羌喀什噶爾初役屬於準噶爾為所拘縶因我大軍戡定伊犁始釋之令歸所部其長伯克和卓遣使求内屬此其所貢也勞徠非力并天眷奉昭彰御製詠玉茶椀戊寅于闐何必購奩環通貢薄來每厚還保定不期致逺域琢磨亦復藉他山示禎碧落星辰表延喜明廷樽爼間漉雪浮香真恰當思推觧渴福區寰御製玉椀詩己夘曽未于闐遣使求堅昆玉椀自來投詎云有翼千斤獻那肯無端大白浮賢問乃明君子徳工言㡬誤楚人璆嵗時宴饗斟香茗延喜明廷奕葉庥喀喇桑屈木為之其形如桶以盛牛羊乳察喇小木桶也以盛酸乳烈干大盤也紅銅為之其形正圓圍七八尺髙七八寸不等以盛牛馬羊肉托古斯密斯塔巴克用紅銅為圓盤徑尺許深三四寸不等其數用九以盛各項飲食之物塔赫錫用紅銅為小圓盤圓徑約二寸以内高寸許以盛果品其數亦用九色爾里克塔巴克油漆木盤也形同密斯嗒巴克無常數和恩以木為盤而有足高約二寸圓經約六七寸以盛餅餌之屬庫喇以紅銅為之其形如罐而有蓋旁施兩耳以盛飯麺乳食等物數以四鄂喇札木以紅銅為之其形如缸髙七寸餘口徑三寸餘以盛肉汁數以四喀淑克小木杓也挹飯麵以實於酬察克其柄稍彎而刻其末以飾觀楚黙楚大木杓也挹牛羊等肉食以實於烈干挹肉汁以實於鄂喇札木塔克塔以薄板為之其形長方如案施於毯上額格斯察爾帕雅以治事塔克塔以飲食達斯圖爾干其形長方如塔克塔之式以綢縀等為表以布為裏亦有以布為表者施於塔克塔之上為上客進饌必設之隆吉浄手巾也白布為之兩端織以紅緑色線文采繽紛長四五尺寛尺餘將食之頃洗浄手面以此拭之阿布塔巴洗手靣器以銅為之有長口有蓋有提形同内地之茶壺將洗則以壺水澆手用之竒拉布察以銅為之形圓如盆口小腹大口徑二寸餘腹徑三寸餘傾壺水以洗盥時以是噐受注殘水滿而棄之楚雲楚衮以鐵為之形如阿布塔巴而特大以注熱湯於阿布塔巴而用之柴珠實小銅壷也髙七八寸許口僅寸許有長口有柄有蓋用以烹茶密斯噶藏以紅銅為之其形如鍋口徑四尺可煮全牛之肉旁有六耳崇楚雲噶藏大鐵鍋也口徑約二尺可供一二十人食旁有兩耳竒齊克噶藏形如小鍋紅銅與鐵相和為之以木為蓋上繫以繩旁有兩耳用以熬湯及烹茶努爾古赤圓木杖也作餅時用之騰訥以木為槽形盛水以和麵蘇富喇羊毛毯也施於地上以受麵阿勒噶克屈柔木為邊麤布為底其形正圓如内地之篩用以除麤取細綽里編細栁木為之其形如圓筐用以漉米御製詠唐時回銅器有序己夘山荘舊藏古銅器一似豆而短足初以為三代青緑耳廹視之形不饕餮銘不乙丁金銀錯其文則似回字令吐魯番哈密回子等識之惟識噶愛兩字其餘皆不辨蓋彼經文亦有今古之異人不能盡曉也嘗考回鶻唐時始通中國史稱其先匈奴匈奴與今之䝉古相類則回回並非䝉古且殊教也元史始有回回國之名或稱其為大食國種大食在西域此稍近之明邱濬以為陳隋間始入中國在在有之在在有之者亦云其繁滋漢土者耳其的派固不離西域也今平定葉爾羌喀什噶爾此實開闢以來不異之回地回人若布魯特若哈薩克皆其蔓延繁滋或雜䝉古種者有之若唐史回鶻傳所稱善騎射喜盜鈔者實近厄魯特之習而非回人所能徒以回鶻音近回回因屬之纒頭之類耳究之耳食舌傳魚魯千里将以餘暇博考此姑俟之所喜者適獲此器於平定回城之時殱厥渠魁繫以白練兆在斯乎兆在斯乎故從而為之辭不是辛尊與啓匜考時應入李唐時纒頭回鶻人斯用餵肉葡萄宫所遺噶讀作平聲愛旁行粗可識氷斯古豈咸知遷其重器兹先兆佇待俘來罷逺師御製詠回銅㗶嚕篘器疊去嵗避暑山莊詠唐時回銅器韻有序庚辰㗶嚕篘之制正圓而豐下上横鋬可左右紐髙五寸有十分寸之五口圍尺有八寸腹圍二尺四寸有十分寸之八中實六升許銅笵而金銀錯其文皆旁行回字不可辨識西師凱還将軍等與所俘武器並獻命阿渾通經典者其名曰哈爾披野特者詳譯之具云元時回部有汗曰眉哩特木爾世居伊楞地名今在布哈爾之西嘗得沙頼子城名在伊楞左近良匠喀嗎爾所造用貯漿齊鏤文悉祝嘏之辭葉爾羌喀什噶爾世不乏一二見者其縁起載陀犁克史名云云夫天堂墨克之區遼邈荒忽歴代史牒所志支離牽合罔所折衷今荷天祖垂庥師武臣克襄成績昄章其地氓隸其人乃至昔曰舊物留遺皆得入中國而詳其原委亮非獲休屠金人與蒲捎苜蓿輒齗齗動色哆詞之為也爰以長言系之俾昭示來許不敢矜方物之逺益無忘綏輯之艱云爾重器真遷㗶嚕匜舊作有遷其重器兹先兆之語平回並馘獻來時曽供菽水數升受亦閲春秋四百遺其史所記造此器時當在中國大元時嵗月不可細考約計距今已四百餘年矣喀嗎匠鏤眉哩用陀犁史載阿渾知詎珍三品精鋟錯保定方籌撫衆師御製回玉圭謡辛巳崑崙西極玉所都穆滿靈器傳西胡楚曰珵珩魯璠璵其偶然耳古論諸乃今通道蔥嶺途嵗為恒供寧十區是圭實彼之寳符馹來什襲呈天衢阿渾通回經字者譯出其文攄駢蕃吉語歌九如福祚昌熾享齡遐叶豫順兆姓鞏皇圖宜子孫佩意不殊韞櫝爰識咸賔謨保奭用訓猶忸吾王延徳髙昌行紀善冶金銀銅鐵為器皿及攻玉按回部食器如烈干密斯塔巴克之屬銅鐵為質者居多固即延徳所稱冶金銀銅鐵為器皿者近是也至於彼中珍玩或以良金粹玉為質尋常歐冶琢磨之匠罕能為之如銅㗶嚕篘器載諸陀犁克史者阿渾能詳其典故回玉圭雖縁起莫考要皆其先世珍異可知考㗶嚕篘畧近盤匜用貯漿齊則亦當時飲食之器若圭璋之制於回部無聞或中國流傳及彼倣而為之或其形偶相合耳回俗舊尊經典凡諸旗纛悉書梵語以祈靈庇兹㗶嚕篘及玉圭並勒旁行回字為祝嘏詞與唐時回銅器相同皆倣中國勒銘彛鼎之意不惟數其器物兼可考其文字此如明史所載賽嗎爾堪舊對音撒馬兒罕今改正部之照世杯光明洞徹世不乏一二見者爰登服物以為博古之助云日用之器摩伊喀里雅木束毛以為筆或束人髪為之其管或以木或以竹喀里雅木竹筆也形如準噶爾之烏珠克都幹特以銅為盞用綿漬墨置於其中供醮筆之用色雅以鍋底烟煤合油麵為之即回部之墨也喀阿斯即紙也以桑枝嫩條搗爛為之色㣲帯碧其光潔者略似髙麗紙喀里雅木當藏筆之匣其形長方上有抽蓋有木者有竹者喀里雅木達喇實形如鬀髪之刀其柄或以銅或以木或以竹樞紐甚緊用以裁紙摩和爾印也汗之印其形正圎徑二寸餘色用紅伯克之印圓而有蒂徑一寸餘色用黒伯克中惟阿竒木伊什罕有之餘俱無印文首鐫年分次鐫其父名最下鐫本人名伯克印亦如之汗新立伯克新授則别鑄其印焉哲都斡勒塔赫塔即界方也以紅銅及鐵為之用以鎮紙短者數寸長者尺餘又以鐵為方鎮名之曰繖達勒凱齊剪刀也頭銳而厚且長兩股如燕尾其形畧鈎而已又有一種其尾可伸屈之則成剪刀形伸之則兩尾相並如雙筯然克斯噶齊鐵夾也用以夾物并用以箝其有鈎者謂之罕布爾巴斯安大鐵錘也其小者謂之布爾喀阿塔什扣以鐵為之首形如雙剪其末鋭用通淤塞長者二三尺短者二三寸克瑪刳獨木為舟亦有攢小木而成者立四柱可䝉氊毯之屬無風雨則撤之有則張之阿喇巴即車也其輪甚髙其箱甚深駕以牛馬亦有駕鹿以行者唐書西域傳于闐以木為筆以玉為印攻戰之具克凌齊刀也其質純銅其形彎至頭則愈昂柄用大魚骨及硬木為之刀鞘用魚皮飾以象牙玳瑁之屬柄端有銅環以繫革縧色里葉瑪亦刀也克􅇒齊之口鋭色里葉瑪則口差厚其形畧帯長方柄甚長有大力者則用鐵柄鼐咱長鎗也其柄丈許以木為之其鐵刃七八寸柄刃之間綴以銅環截牛皮濶寸許以裏其柄一柄之長束皮九道阿伊帕勒圖月斧也鑄鐵為幹其頭鋭利如鎗近鋭頭六七寸為斧面下如半勝之形口甚鋭上半形帯長方背有二十餘鉏鋙如鋸之狀蓋一物而可三用也罕札爾即劒也有兩􅆃以魚骨飾柄御製回劒行庚辰逆酋小和卓木霍集占所佩副將軍富徳大勝之於伊西洱所獲也凱還奏進詩以識之袄襓展室青萍寒一條秋漢溢波瀾蛟龍水斷犀兕剸吳鈎薛燭古所傳泰階九宇胥晏安歐冶之法誰則閑絶域尚武求精堅銛鋒三尺不可刓弱肉强食必佩旃況彼窮竒肯離焉伊西大勝回纛搴二酋倉皇駾走前獲兹鋭器羣訝觀訊醜踉蹌具致言劔藏霍集占身邉惟命是顧乃忍捐異封獻馘師凱旋彤庭奏進出匣看光芒誠覺星辰連弢弆武庫識嵗年保定諸部籌久全繅特甲也制如鎻子甲有棉者謂之鄂勒帕克有鏡者謂之庫雅克其䕶心鏡謂之察喇伊納以白鐡為之巴勒達木齊甲外之鐵帯也都裕勒噶胄也内有㡌前覆至額後被至頸左右垂至兩耳謂之圖卜貝爾庫沙拉布爾皮褲之名也臨陣時外披甲内著皮褲衣服下袵俱結束於其内令身輕轉㨗有力雅弓也以柘木為質馬鬃為弦力甚勁鄂克箭也以木為桿鑌鐵為鏃鏃頭有三面刃有兩面刃桿有羽者射逺用毛者射近薩克達克即櫜鍵也以獸皮為之口用紐或以帯阿里雅木小纛旗也長五尺餘寛三尺餘白布為幅上旁行書囘字各伯克皆有之幅上即著各伯克之名以為識焉圖克大纛旗也長七八尺濶幾相等以雜色布為幅幅上綴以金片鐫刻教主及派噶木巴爾名字金片下以紅鬃為纓如垂旒然御製回纛行戊寅小和卓木其號霍集占其名領兵來援圍城嚴先是其兵來赴救托和鼐地名已二千殱逃生回者匍匐告昧死尚敢潛窺覘城中知有賊接應借一出突施戈錟緑旗圍城腹背敵屹立不動戰方酣是時實頼愛隆阿副都統領隊大臣率千騎至皆竒男吉林滿兵及索倫兵横衝截入亂回陣斬將獲醜如囊探狂回難當復大敗東籠案角相藉􅍴敺至鄂根河之側溺水避者如眠蠶賊約五千三千死千餘戰士威風添霍集占乃抱頭竄搴其大纛銅旗尖咳首五色書旗幅不觧其義言詀詀驛致既喜復致惜設執逆醜除兇憸徂維求定靖遐壤止戈和衆吾方忺御製後回纛行疊前作韻庚辰樹丸火米符祥占喀喇烏蘇之役將士方堅壁趣援時於固守處得窖米贍軍樹上檢鉛九濟用並獲神助孤軍接應遂觧嚴整師救和闐玉隴帕首蟻雜胥劉殱將以三路進埽穴僑如叔仲先潛覘狼狽挈拏預遁去二城降不勞矛錟競作鐃吹迓主帥從今食飽眠亦酣選卒前遮復後襲義無返顧均雄男線天磧地冞入阻欲得虎子虎穴探明瑞邀之庫魯克以少勝衆折袄欃富徳追及伊西洱用强驅弱如掃蠶鹿埵流湯賊屢敗獲銃搴纛軍威添遁入異域卒獻馘飛來報㨗紅旗尖凱旋攜以貢武庫阿渾譯出其文詀纛上旁行書令以托特字譯之回中稱通暁經典者曰阿渾亦知福善禍淫道胡乃偕徳興狂憸敵氣致力衆惟惜事成志遂吾敢忺漢書西域傳出陽闗自近者始曰婼羌山有鐵自作兵兵有弓矛服刀劍甲難兠有銀銅鐵作兵器與諸國同後漢書西域傳焉耆能作弓矢北史西域傳髙昌兵器有弓箭刀楯甲矟焉耆兵有弓刀甲矟按唐書載吐蕃能飛梯鵞車以攻城文獻通考稱天竺亦有飛梯地道木牛流馬之法今囘部戰具未有此種則以吐蕃天竺居囘部之南故其制不同於三十六國而今之囘部服屬準部則尋常擊刺之能亦有難於並論者豈非南柔北勁實地氣使然歟耕種之具布古爾斯犁之總名也頭以鐵為之曰題實長短參差如指形犁之梁曰克實勤以木為之約長一丈端有鐵環可以穿鈎牛背之横木曰布雲圖嚕克其長亦如克實勤可駕兩牛横木中間繫以長繩曰阿爾噶木濟引屬於鈎繫於犁梁之環乃驅兩牛負犁以行牛膊之上左右設兩板謂之杭烏克以木為之長各一尺五寸用施牛背横木於其上庫爾扎克犁耙也其鐵頭向内形似鏟柄稍斜以棗木為之播種之後用以覆土恰特滿形似鐵鐝其頭甚圓以棗木為直柄用以垡土開溝並引溝水以灌田蘇堪盛糞之筐編栁為之糞之名曰克赫以牛馬者為良糞田可倍收鄂爾噶克形如曲刀純鋼為之頭柄皆鐵用以刈稻麦之屬阿伊哩以木為义五齒或四齒三齒以匀榖麦承曝令乾阿斯喀克以木為鈎短者五尺長有八九尺者用以出糓鄂特恰爾瑪屈栁木為邊以牛皮為檔結細草為底或用籐為底用以簸榖摩密埸上立木也植木於地繫牲於木用踹榖麦以代碌碡按回部諸城頗知田作非凖噶爾専事畜牧逐水草為業者比故有農具以資耕穫若地利人工之所出勸課之方則不逮中土甚矣成物之具赫實喀里畢以木為方模入泥於中用成土坯綽布噶資木尺也以量長短長五尺者其形三稜長二尺五寸者面平而背圓庫喇結草為長繩築墻時用以直贊畢勒運土架也二木為邊中編栁條四角繫繩以運泥土索輝水桶也盛水以化泥土騰訥木盤也用以盛泥塔巴爾曽以鐵為之首為斧形築土使堅其末如刀以塗泥傅之凡成牆者必以此喇安達或以鐵為或以木為其形長方築牆成後用以平之甘齊石灰也牆成後堊之阿爾喇鋸也大小不等手持處亦以鐵為大者鋸木小者鋸骨角之屬裕舒竒即鑽也形同内地其鑽弓謂之喀瑪勒察綽鄂特形如大鏟刀口濶而薄向上漸厚漸狹用以削木小者謂之恰爾竒尃用以成細巧之物蘭達大推刨也兩手用之其小者别名綽卜薩一手用之帕勒圖短斧也棗木為柄喀實喀爾特剜刀也其頭甚鋭額恰克鐵剉刀也剉物處齒如宻釘質厚而鋩銳伊斯喀那鏹刀也其形如鑿用以鍥物圖魯木大皮囊也一應治屋之器皆可弢於其中晉書西戎傳龜兹國王宫壯麗煥若神居宋王延徳髙昌行紀居人皆穿地為穴以處屋室覆以白堊按回部有城郭宫室異於凖部之穹廬氊帳以居者一切木石諸工亦皆藉器以善其事故成物之具視凖部加詳第考史書所載西域宫室之制率多侈麗莊嚴以今審究殊不謂然即由回部西踰蔥嶺如墨克黙徳那諸部為回回祖國多有回民赴彼禮拜者傳其棟宇之槩亦與今山南諸部風俗相近可知史家不務紀實以夸誕失真蓋不一而足也欽定皇輿西域圖志卷四十二
