body:
  text: 水三天山北路二空格斯郭勒空格斯郭勒源出空格斯東額通古里達巴西麓其水西北流三百餘里至都爾伯勒津西南㑹特克斯郭勒又西流三十里東北㑹哈什郭勒入伊犂郭勒乾隆二十八年秩於祀典每嵗春秋致祭嵗祭空格斯郭勒文惟神洪源逺布遐澤旁敷潤西域之神臯灌輸攸賴隸北庭之都䕶耕牧稱繁巨嶺東來束岡巒之蜿蜒大河西折作襟帶于伊犂環沙漠以揚流効地靈而布德含滋有慶命典聿昭朕撫恤羣藩削平諸部百靈効順張雷動之六師庶彚咸昌興雲屯之千耦惟兹巨川之利濟實為神爽所式憑在昔飲馬長流澄波既慶即今洗兵䝉氾渥澤均沾特詔祠官載隆望祀屆春秋而将享丕昭漸被之庥練時日以潔蠲克集懐柔之福承兹永秩式此居歆哈什郭勒哈什郭勒在空格斯郭勒北源出哈什東一百二十里哈喇古顔鄂拉南麓其水西南流二百四十里至都爾伯勒津西㑹空格斯郭勒特克斯郭勒西入伊犂郭勒乾隆二十八年秩於祀典每嵗春秋致祭嵗祭哈什郭勒文惟神澤沛金方靈昭坎德滙特克斯而共注衆派同歸經固爾札以分流平原獨沃淵澄方折記玉水之瀠洄績著安瀾静銀波之浩淼効靈不爽錫典宜隆朕撫定遐陬敉寧荒服塞烟隴月駐細桞以開營雪浪風濤挾飛艎而競渡惟念斯河之天險益欽今日之波恬粤稽嗢鹿名州益増式廓爰布沈貍令典用妥神明康我邊陲永秩春秋之祀綏爾藩部共歌清晏之庥肅此苾芬尚其昭格特克斯郭勒特克斯郭勒在伊犂西南一百五十里源出汗騰格里鄂拉北麓東流三百餘里北㑹空格斯郭勒又西流四十餘里至都爾伯勒津哈什郭勒東北入之㑹入伊犂郭勒河自發源處東行南北山泉支流咸㑹其在南山近西者曰沙拉揚子布拉克又東曰古爾班哈巴哈布拉克又東曰哈爾兖布拉克又東曰古爾班木素爾布拉克又東曰察罕烏蘇又東曰阿古野斯布拉克又東曰古爾班莫力台布拉克又東曰特里克布拉克又東曰庫克烏蘇布拉克又東曰和爾代布拉克又東曰古爾班濟爾班郎布拉克其在北山近西者曰阿爾班布拉克又東曰哈爾噶郎圖布拉克又東曰色勒圖布拉克塔勒奇郭勒塔勒奇郭勒在塔勒奇鄂拉南谷口外天山下西南流一百二十里入伊犂郭勒伊犂郭勒伊犂郭勒東西經伊犂境内四百餘里東㑹空格斯郭勒西南㑹特克斯郭勒東北㑹哈什郭勒合而西流為伊犂郭勒南北支流不一其北流為固爾扎郭勒又西為古爾班察漢烏蘇又西為阿里瑪圖郭勒又西為策集郭勒其南流為呼那海博拉郭勒又西為古爾班哈爾奇拉郭勒合而西流四百餘里折而西北流又四百餘里南㑹支河北行二百里東入巴勒喀什淖爾乾隆二十五年西域平遣官告祭每嵗春秋致祀告祭伊犂郭勒文朕受命承家化綏億域懐神秩禮馨格一心爰從乙亥之春王師申討始達伊犂之境時雨效靈凖人既即叙以敉寧回部更偕來而式廓波恬兩岸屢憑舟騎之通派合千山早受版章之隸惟神嘉貺翊我大勲萬里而遙久繪圖以攬勝五年而近常掞藻以抒忱特崇賫帛之文肇舉祭川之典瑞升雲物自今加澤邊氓功溉土田以嵗長歆國祀浩浩崑墟之北比於凟尊洋洋蒲海之東昭兹坎德醴牲用潔遣告維䖍乾隆二十五年月日嵗祭伊犂郭勒文惟神洪源逺濬沛澤旁敷作襟帶於兑方朝宗有本協盈虚於坎德用涉咸昭境過渠搜遐控流沙而外地連越匿舊傳伊列之名環絶域以含滋亘平原而布潤効靈不爽錫典宜優朕撫馭寰輿敉寧荒徼定凖噶爾之全部刳木遙通俘厄魯特之名王恬波共慶惟兹巨川之利濟實當大漠之隩區聲教所宣懐柔悉協在昔六師飛渡既彰孚佑之庥於今千耦興屯益溥灌輸之利爰隆秩祀特詔祠官頒制帛以孔䖍練吉辰而肇舉春秋将事萬里宏漸被之規牲醴薦馨諸藩享澄清之福尚希昭格來饗苾芬唐書突厥傳因伊列河約諸部河以西受令於咄陸其東咥利失主之自是西突厥又分二國矣又顯慶初蘇定方為伊麗道行軍大總管討賀魯定方破其牙賀魯跳渡伊麗水按天山以北諸水以圖斯庫勒巴勒喀什淖爾為大伊犂為巴勒喀什上流經流千里川墟交滙唐名伊列亦名伊麗當為一河又地理志北庭都䕶府注過思渾川蟄失密城渡伊麗河一名帝帝河至碎葉界則今之伊犂郭勒在唐又名帝帝河也察罕烏蘇察罕烏蘇在塔勒奇郭勒西凡三河亦名古爾班察罕烏蘇南流入伊犂郭勒又西為阿里瑪圖布拉克乾隆二十八年秩於祀典每嵗春秋致祭嵗祭察罕烏蘇文惟神敷澤遐方分流絶徼波心澄澈鋪一片之白銀天色空明映千層之素練沃壤則波羅塔拉遙待灌輸逺峯則哈喇古顔若為環抱泝源有自利涉攸資朕統馭八紘昭宣七德設候流沙以外載拓堯封洗兵瀚海之西逺恢周索神効靈以徯應天助順而成功惟兹察罕之川近在伊犂之域當王師之度塞相予宏勲洎都䕶之屯田溥兹美利土膏滋液應坎德以濟生民水氣和甘徧兌方而宣渥惠爰稽故典載肅常禋奠玉幣以孔䖍練春秋而致告吉蠲将事列四凟之崇班肸蠁丕昭錫千秋之繁祉庶希鑒格永祚塞垣阿里瑪圖郭勒阿里瑪圖郭勒在伊犂郭勒北固爾扎郭勒西濵河有果木南流入伊犂郭勒乾隆二十八年秩於祀典每嵗春秋致祭嵗祭阿里瑪圖郭勒文惟神德洽盈虚功資灌溉屬塔勒奇之左幹帶水分流環海弩克之西偏平沙交錯涵濡嘉植千林呈離實之英􅂞抱長川萬井沐滋培之益地靈克効祀事孔将朕既纉武功用敷文命東風受吏聿彰柔逺之謨溟海來王共叶安瀾之慶緬神功之布潤蔚物産之含滋秋實春華平衍溥自然之利濟川作楫利涉占攸往之宜特詔祠官祗申嵗祀錫鴻儀於望秩肅薦馨香答靈貺於元㝠永光爼豆春秋勿替昭鑒在兹策集郭勒策集郭勒在伊犂郭勒北東北距博羅和洛鄂拉五十里南流入伊犂郭勒乾隆二十八年秩於祀典每嵗春秋致祭嵗祭策集郭勒文惟神導源西極流派北庭抱巖谷以奔趨莫禦激湍之勢溉土田而沃衍聿宏潤物之功細浪翻銀脈絡遙連乎察罕長虹飲練尾閭下注乎伊犂禹跡未通靈境軼大荒經外堯封新拓嘉名補王㑹圖中朕撫育寰宇敉寧邊徼武功丕振全收葱嶺之河屯政肇修逺引蒲昌之海惟名川之用涉宜昭報之有加承坤德以流甘位兌維而布潤往嵗六軍飲馬式彰呵䕶之靈今兹重驛欵闗胥受懐柔之化爰崇明祀特敕所司陳璋邸以升馨潔彛尊而致告澄波淼淼永環都䕶之城流水泱泱遙繞祁連之嶂益甄靈貺尚鑒精誠薩瑪勒郭勒薩瑪勒郭勒在伊犂郭勒北東北距博羅和洛鄂拉二百里南流東為額蘇克郭勒西為奎屯郭勒伊犂郭勒北岸土田均資溉沃乾隆二十八年秩於祀典每嵗春秋致祭嵗祭薩瑪勒郭勒文惟神靈源夙著渥澤常濡居額蘇克之上游衍伊犂河之别派遙岑北拱萬疊雲連大水南環千條練瀉亘神臯而利濟滋絶域以含膏奠彼迴瀾昭兹秩祀朕誕敷文德式廓輿圖輯部落於荒陬功惟作潤軫羣黎之日用期以飲和惟坎功之用涉咸昭斯戊校之開屯有藉遣専官以致享典肅春秋酬靈貺而告䖍吉服卒甲奎屯上下益恢聲教之隆策集東西共受明禋之賜神其昭鑒薦此椒馨奎屯郭勒奎屯郭勒在伊犂郭勒北策集郭勒西南流入伊犂郭勒乾隆二十八年秩於祀典每嵗春秋致祭歳祭奎屯郭勒文惟神衍𣲖天山導源月􅒸湛然無滓性殊湯谷之温注焉不盈徳比寒泉之食波成文而曲折下注伊犂水如鏡以澄明近隣䇿集功惟潤下勢欲朝宗洵神應之聿昭宜吉蠲之罔替朕并包九㝢戡定二庭路逾弱水之西壬鈐逺授地盡河源之外戊校新屯乃咨都䕶之臣肇舉名川之祀穿渠引水灌溉之利攸資刳木浮槎濟涉之功尤逺自古版章未闢不登裴矩之圖於今中外為家合補酈元之注清醪載酌制帛爰陳康我塞垣永作渠搜之襟帶昭兹功德長歆嗣嵗之馨香式薦苾芬庶希鑒格塔里雅圖布拉克塔里雅圖布拉克在伊犂郭勒南岸布喀鄂拉南二十里周迴十餘里又東南五十里為哈畢爾罕布拉克又西南五十里為哈喇布拉克唐書突厥傳乙毗沙鉢羅葉䕶可汗建廷雖合水北謂之南廷東薄伊列河按唐伊列河為今伊犂郭勒雖合水東薄伊列則在今伊犂郭勒西可知第考河西如阿斯哈郭勒塔拉錫克郭勒俱北流入伊犂郭勒者水北殊無立國之地惟塔拉圖哈畢爾罕哈喇諸布拉克當伊犂郭勒西南境宜屬雖合舊蹟則所謂東薄伊列河者亦於方位適符耳阿斯哈郭勒阿斯哈郭勒在伊犂郭勒西源出阿斯哈達巴東流一百五十里㑹入伊犂郭勒塔拉錫克郭勒塔拉錫克郭勒在阿斯哈郭勒南六十里源出墨爾根西里鄂拉東流一百六十里㑹入伊犂郭勒古爾班賽里郭勒古爾班賽里郭勒在塔拉錫克郭勒西南六十里其東為古爾班胡蘇圖郭勒又東為古爾穆圖郭勒又東為烏蘭烏蘇又東為沙達圖布拉克又東為鄂台郭勒又東為那林郭勒諸水皆發源南山北流三十里滙而成河又東流折而北又西㑹塔拉錫克郭勒阿斯哈郭勒北入於伊犂郭勒圖爾根布拉克圖爾根布拉克在伊犂郭勒下流南源出阿斯哈達巴北麓東北流一百三十里入伊犂郭勒其東南五十里為古爾班察布達爾布拉克源出阿斯哈達巴東麓三泉相距各二十里東北流三十里不通伊犂郭勒又東南為古爾班沙濟垓布拉克三泉相距各二十里東北流十餘里不通伊犂郭勤塔拉噶爾郭勒塔拉噶爾郭勒在圖爾根布拉克西北二十里伊犂郭勒下流南東北流八十里入伊犂郭勒西二十里為古爾班阿里瑪圖布拉克凡三道源出阿圭鄂拉北麓東北流不通伊犂郭勒額什圖郭勒額什圖郭勒在塔拉噶爾郭勒西十五里東北流八十里入伊犂郭勒下流庫爾圖郭勒庫爾圖郭勒在額什圖郭勒東南二十里東北流百里入伊犂郭勒下流奎屯郭勒奎屯郭勒在庫爾圖郭勒西二十五里源出伊爾該圖鄂拉東北行二百里入伊犂郭勒下流庫克烏蘇郭勒庫克烏蘇郭勒源出庫隴奎舊音庫隴癸鄂拉北麓北流三百餘里東㑹哈喇塔勒郭勒察林郭勒入於巴勒咯什淖爾哈喇塔勒郭勒哈喇塔勒郭勒在察罕布呼圖鄂拉東北西北流三十里入察林郭勒察林郭勒察林郭勒源出汗哈爾察海鄂拉西麓西北流百里南㑹哈喇塔勒郭勒又西北流八十里入庫克烏蘇郭勒滙入巴勒喀什淖爾哲克得郭勒哲克得郭勒在察林郭勒北三十里西北流百餘里入巴勒喀什淖爾必齊干郭勒必齊干郭勒在哲克得郭勒北五十里北流入巴克伯勒齊爾郭勒巴克伯勒齊爾郭勒巴克伯勒齊爾郭勒在必齊干郭勒東北西北流百五十里南㑹必齊干郭勒西入於巴勒喀什淖爾巴勒喀什淖爾巴勒喀什淖爾周迴八百餘里伊犁全河經流千里屈折至此百川萬𣲖於焉歸宿葢準噶爾西北境最大澤也左右支河水淺可渡處有五曰額蘇斯徳曰喀拉塔拉曰輝邁拉圖曰温托爾格曰塔爾輝塔統名多渾多渾者䝉古語渡口之謂唐書王方翼傳十姓阿史那車簿啜叛圍弓月城方翼引軍戰伊麗河敗之斬首千級俄而三姓咽麫兵十萬踵至方翼次熱海按天山北路之水其周圍廣逺可以海名者惟圖斯庫勒與巴勒喀什淖爾而伊犂郭勒即為巴勒喀什淖爾上游境尤相屬王方翼因戰伊麗河而次熱海似於今之巴勒喀什淖爾為近况圖斯庫勒於唐為碎葉水考諸史傳方位適符則巴勒喀什淖爾之為熱海更相合矣巴倫裕勒都斯郭勒巴倫裕勒都斯郭勒源出裕勒都斯西南五百里額什克巴什鄂拉西麓其水東流一百二十里南㑹特爾黙哈達布拉克又東七十里南㑹布蘭布拉克又東一百二