body:
  text: 疆域十一天山南路五葉爾羌屬葉爾羌察特西林巴爾楚克呼拉瑪伯什恰特拜林宻什雅爾塔噶爾齊阿布普爾汗阿里克庫勒塔里木鄂湍楚魯克雅哈阿里克坡斯恰木舒帖呼木什恰特伯什阿里克托古斯恰特鄂爾多諤斯騰阿喇勒喀瑪喇克哈喇古哲什喇巴特齊和什阿喇布色勒克郭勒伊竒蘇寧阿喇斯裕勒阿里克庫克雅爾塔克布伊英額齊盤沙圖哈爾噶里克貝拉楚魯克皮什南固璊木齊章固雅薩納珠衮得里克都窪皮雅勒阿勒瑪阿克阿里克塞爾勒克喀爾楚欽定皇輿西域圖志卷十八目録欽定四庫全書欽定皇輿西域圖志卷十八目録疆域十一天山南路五葉爾羌屬葉爾羌察特西林巴爾楚克呼拉瑪伯什恰特拜林宻什雅爾塔噶爾齊阿布普爾汗阿里克庫勒塔里木鄂湍楚魯克雅哈阿里克坡斯恰木舒帖呼木什恰特伯什阿里克托古斯恰特鄂爾多諤斯騰阿喇勒喀瑪喇克哈喇古哲什喇巴特齊和什阿喇布色勒克郭勒伊竒蘇寧阿喇斯裕勒阿里克庫克雅爾塔克布伊英額齊盤沙圖哈爾噶里克貝拉楚魯克皮什南固璊木齊章固雅薩納珠衮得里克都窪皮雅勒阿勒瑪阿克阿里克塞爾勒克喀爾楚欽定皇輿西域圖志卷十八目録欽定四庫全書欽定皇輿西域圖志卷十八疆域十一天山南路五葉爾羌屬東至察特西林接阿克蘇界西至喀爾楚入蔥嶺通藩屬㧞達克山界東南至皮雅勒阿勒瑪接和闐界西北至喀什噶爾達里雅接喀什噶爾界葉爾羌葉爾羌舊對音葉爾竒木或名葉爾欽皆音之轉也東南由阿克蘇八百里西道由喀什噶爾五百里至其地距京師一萬二千三百八十五里城周十餘里有六門土岡環其東南城踞岡上規模宏敞甲於回部城中街巷屈曲錯雜無有條理民居以土垣屏蔽穴垣為户髙者三尺傴僂出入屋宇毗連處咸有水坑導城南哈喇烏蘇之水達於城北是資飯用逺近所屬村城甚多其最著者得二十有七康熈二十一年其地回酋阿布都里什特為準噶爾所執至三十五年準噶爾為大兵所破阿布都里什特偕妻子來朝賜冠服銀幣遣官䕶送至哈密俾歸國後為準噶爾所阻不獲内附乾隆二十三年八月霍集斯伯克以烏什降告於將軍兆恵曰霍集占自庫車遁而西非往喀什噶爾即葉爾羌矣若大兵進攻喀什噶爾則布魯特安集延賊之仇也必不往將南奔葉爾羌東南聮和闐以為援西南通㧞達克山痕都斯坦哈喇圖伯特以為窟進退有所據勢難拔不若徑趨葉爾羌招徕和闐要截拔達克山諸路一舉而克擒賊必矣喀什噶爾不足定也兆恵從其計擁馬兵四千步兵六千保葉爾羌其兄波羅泥都亦自喀什噶爾以馬兵三千步兵二千往㑹賊乗我師未至盡驅城外村莊居民入城田禾盡刈不及刈者焚之近城多為大坎城東北兼築髙臺以資守禦十月我師將抵葉爾羌兆恵等勒兵二千分中軍左右翼兆恵率侍衞鄂實福齡安及閒散侍衞等為中軍叅贊明瑞等率巴圖魯兵二百為中軍前隊總兵髙天喜領鎗礟隨中軍纛為後隊左翼副都統鄂木布等領後隊副都統愛隆阿等領後隊右翼副都統由屯等領前隊總管端濟布等領後隊巴圖魯喀拉璊綽爾圖厄魯散秩大臣達什䇿凌率挑誘兵最先進各部回兵在中軍兩翼間行部勒既定初六日陳於城東前限於坎馬不能進於是左翼兵自東向西進攻右翼兵覔路向東進挑誘兵直前衝突時臺上坎下空房破屋中伏賊放鎗拒戰我師奪臺殺賊賊敗走我師尾之注矢如雨賊紛紛墜馬有頃城東西兩門内各四五百騎出陣而立逡巡不敢前俄出數十騎來致師鄂木布明瑞等十人率勁旅賈勇入摧鋒䧟陣城内益出賊兵與我兵三戰賊皆辟易北門又出賊騎三四百來夾攻為由屯截殺不得逞自夘迄申賊乃敗入城閉門守是役也我軍甫集殲賊甚衆將士用命凡新附之厄魯特回部伯克等多怨霍集占之煽黨背徳咸感激奮勇軍聲大振我師得偵者言賊牲畜及沙拉斯家屬俱在城南之英額齊盤山議移兵往掠分賊勢十三日兆恵先遣愛隆阿等分兵八百扼喀什噶爾來援要道乃徒營從城東轉攻城南師濟哈喇烏蘇甫四百騎橋斷賊兵乗機發馬步繼進兆恵率明瑞等分列三隊縱横衝突所當者破殺賊千人再敗之已復分左右翼來殊死戰我軍自庫車逺至馬力弗能支更阻於淖引軍渡哈喇烏蘇達城東大營賊衆四集合圍我軍接戰五晝夜士氣奮厲軍中贏糧足資三月守於是掘濠築壘以待援師互詳卷二十八哈喇烏蘇條二十四年正月㑹富徳等統新調兵自阿克蘇來援阿里衮適解馬千疋馳至遂振旅以還阿克蘇詳後呼拉瑪條波羅泥都霍集占度大兵再至必成擒乃虜其民人牲畜棄城踰山遁於是葉爾羌之舊伯克回民等以全城降先是都統伯納木扎爾副都統三泰奉命往代兆恵富徳為將軍叅贊至葉爾羌兆恵等方在圍愛隆阿據河駐後納木扎爾三泰過其營猝陷賊俱遇害勅於葉爾羌南建雙義祠祀之御製平定回部勒銘葉爾羌碑文粤稽回始肇自天方又名默克一曰天堂大食見元回鶻見唐是皆彷彿所傳弗詳惟我皇清撫有華夏血氣之倫均歸陶冶準夷昔强㝠頑弗上恃厥險逺實梗化者䝟貐其衆豺狼其羣以回為羊役以耕耘利其善賈三倍市欣拘二酋長處伊犁濵四大回城輸租獻賦騰格是供衞拉是懼繭絲奚堪溝壑已遽有面内心其何能訴準夷既平羣回見天謂自今始飽食晏眠遣厥酋歸撫爾土田生死肉骨詎疑變遷詎疑變遷徳竟怨報助我叛疆戕我星軺叶是用興師聲罪致討叶乃敢抗顔蜩螗讙譟既侮厥外宜安厥内而何狂狙心焉昏憒殺人為戲奪妻為穢大失衆心無不怨背三道並發四甄齊攻酋知弗支自擄一空廿日之前駾走無踪爾雖知踪我追應窮滔滔洸洸連戰皆克旦夕茍延遂入異域異域畏懐舉旗助力腐䑕莫逋遂來獻馘二酋既殲諸回永靖叶設官定賦去其苛政昔之諸回曉戰夜偵今恬以嬉各保性命昔之諸回為準夷臣今語隣封曰天王民曰天王民誰汝苦辛藝爾黍稷孳爾子孫在昔己巳爰平金川兹定回部亦己夘年嵗符理紀瑞疊祥駢持盈保泰惟懋慎㫋御製我軍詩戊寅我軍取烏什酋長欵復獻阿竒木霍集斯伯克阿竒木伯克者回語大頭目霍集斯其名也元戎乗良機率衆直前進其奈隆冬時枯草經蹂躪以此馬不肥奚堪供斫陣況臨彼巢穴螳臂孤注奮借一誘我軍萬騎逞軀趂我師纔千餘鼓勇無退寸橋圯渡四百忠義人争勸殺賊至千餘矢盡接短刃涉淖退保營相持城下頓十月六日我師直薄葉爾羌城賊縁邊畫溝立隊自固我師以少擊衆所向披靡三戰殱獲甚夥賊擁竄入城不出將軍兆恵以賊游牧在城南英峩竒盤山計乗虚襲賊輜重制賊十三日取道城東渡河未及半而橋圮我師過河者纔四百騎遇賊馬步萬餘張左右翼來戰而地皆沮洳人馬不能如志且戰且踰河退保大營雖遇挫衂而人知効命殺賊千餘我四百人中纔傷一百時營中餘二月餘糧髙壘深濠以待集師協𠞰壯士遴七人星馳兩致信將軍遣索倫侍衞五十保等兩次賈勇突出遇賊衆遮道者戮之賫奏達阿克蘇城時叅賛大臣舒赫徳駐守因令五十保馳驛迎趨援師且直抵京城面奏軍營情事俟師齊即率以赴援舒赫徳留守諸回静以鎮羽檄催後師繼進期颷迅畢齊阿克蘇赴援雪深恨夷考兵興來曽無遭挫韌此畨客主殊不幸致事僨兆恵稱輕敵請罪誠不吝此非退縮比誰逆料利鈍終能寡勝衆允由効忠藎奚忍更加罪褒嘉章服晉諸臣諸軍士行賞以功論命兆恵由伯爵晉封武毅謀勇一等公加賜寶石帽頂四團龍補服餘大臣弁兵等封賞優叙有差晝夜促後軍直前金鼓振欲藉士敵愾今夏特命派索倫察哈爾健鋭營及陜甘緑旗兵繼進已過闢展而將軍富徳叅賛大臣舒赫徳等聞此信各羽檄催進其領軍大臣侍衞等無不切齒逆回寢皮食肉人人同恨計十二月中可至葉爾羌仰冀天助順捷音共春來平回鴻績建御製圍解八韻己夘圍解萬里逺懐紓午夜頻客冬將軍兆恵等薄賊城堅壁固守三閲月趣調援師時縈宵旰至是始得正月十四日官兵剿賊解嚴兩軍㑹合之信將軍誠善守天意本先仁少挫終能勝知難在審因勞哉惟衆士予曰有良臣更議擣虛策相籌應變神逆回大和卓木已遁回喀什噶爾危城勢同孤注惟慮小和卓木乗陳潛突豫籌於各路偵備以防鋌險兔營終詎脱蠖屈乃求伸時軍中方議乗勝進取因念士卒久勞且兵饟在道正宜少休養鋭勅於附近城中駐營以需繼進重賞斯寧吝明征要必申舞干雖美事何以謝軍人回酋反噬稔惡傷我官兵非脅從比恇怯無識之徒或議解圍却賊可以罷兵匪直無以伸國威且何由渫士怒耶御製固濟爾巴圖魯璊綽爾圖盡節詩己夘璊綽爾圖者索倫侍衛員曽以血戰功因賜號旌賢璊綽爾圖於乾隆二十一年冬隨大兵進剿阿穆爾撒納與哈薩克力戰有功特賜是號固濟爾何謂敢勇能摧堅亦云其勇耳大節乃炳然兆恵定回城喀什噶爾驛章一一宣云有瑪穆特被回擄去年其人厄魯特隨軍厮役焉將軍遣偵騎彼亦隨往旃時將軍遣散秩大臣達什䇿凌及璊綽爾圖莫寧察岱屯等率兵百人前行捉生口瑪穆特莫寧察厮養也忽被賊回遮衆敵寡實難矢盡守空屋奮突揮以拳莫寧察戰沒岱屯命亦捐璊綽爾圖在傷重飲劍艱猝被生縛去至霍集占前卓立唾賊罵裂眥髮衝冠巴圖魯侍衛豈懼爾狂㹪天兵今少至數萬繼進連以千敵爾萬汝滅踵不旋霍集占乃怒持刀向頸剸其達什䇿凌同時遭繫牽霍集占忿詈爾厄魯特人叶唇齒應相依何受中國官鐵鉤鉤四肢其死最可憐皆是所親見飾語敢取愆徒以無足數旦夕命苟延渠逃定回城乃復得見天兆恵聞此語既悦繼涕漣悦以我有人涕以已所遣叶據實歴詳陳痛淚不忍看心與帥臣同恩加寧惜駢璊綽爾圖等前已有㫖勅部照陣亡例賜卹今悉其死事英烈狀復命察其子嗣優加恩卹為齒睢陽張為舌常山顔古有今豈無詩録其人傳御製雙義詩有序己夘副將軍富徳至葉爾羌既定回城痛去嵗將士之没於王事暴骨沙塲為之築墳表墓因以奏聞葢隨將軍兆恵力守者固已無恙而旁出捉生及在途值賊者猝致捐軀實出逆料時則納木扎爾三泰適以奉差而往遇賊而殉此雙義之詩所由作也夫雙忠戡亂於無形雙烈表節於有北今之雙義亦復炳然此皆我八旗世臣與國同休戚者在諸人含笑九泉已知世録之必被而朕捫心午夜奚啻手足之如傷用兵既非得已盡節豈所樂聞且即此役而言非生擒二酋何以雪我三軍之恨哉然既建大業寧免㣲疵即走卒厮養頗切同仇則知我國家豢養旗人萬年鞏固之基而非周秦漢唐一興兵而天下驛騷怨聲載道者比此又朕所深慶幸者夫雙忠昔集事雙烈能㤀身二事皆見前集兹作雙義詩其故得細陳曰納木扎爾曽贊北路軍奮勇剪逆賊封伯酬其勲納木扎爾先以都綂叅賛北路軍務曽擒喀爾喀叛逆青衮雜卜論功加封伯爵副都統三泰英氣頗超人均御前侍衛素悉厥忠純兆恵富徳輩從戎久効勤欲代俾將母將軍兆恵富徳母俱年髙比嵗領軍討賊故特簡二臣往代之二臣被選掄去嵗黒水役事見前固守遣索倫致信愛隆阿權退催後援可支百日間速進莫逡巡將軍兆恵等猝被賊遮時愛隆阿拒河駐後将軍兆恵自圍中遣索倫二人間道傳語大兵未集可速回阿克蘇俟後軍一齊進援將軍及叅贊輕進徒俱焚當待師並來何慮狂狙狺時授納木扎爾為靖逆將軍三泰為叅賛大臣之信兆恵已知之故亦令暫廻以俟後軍爾時二臣者馳驛徃軍門過愛隆阿營却近黒水濱所遣人未遇礟聲前忽聞知賊與我戰聞戰恥退奔徒攜百餘騎赴義命同捐叶凶信驛遞來痛淚傷心魂使早知拒守退俟熊羆羣同進可樹功何致均沉淪即先至一日合兆恵軍屯亦可旋今嵗奚煩以身殉叶不前復不後此實若有神富徳自和闐重至黒水津葉爾竒木降諸事粗處分痛念我將士沙場化為燐黄頭雖不備掩骼權為墳猿鶴昔屬幻邱隴今可循因以此事奏西望揮淚頻豐碑旌墓門千秋西海垠捐軀固臣節在爾非所論在予則何忍此恨終當伸夷考六人蹟事異心同均與國休戚共寧止曰藎臣史筆多訛傳永言傳其真御製副將軍富徳奏報小和卓木霍集占亦望風先逃葉爾羌回衆投誠擬平定回部凱歌十首己夘伊犂平定擬功成孰謂狂回乃背盟師直從來荷天佑詎予本意好佳兵偏師䕶衞入回城逆酋大小和卓木為準噶爾拘禁日久我師既定伊犂乃出諸繫中遣兵送大和卓木歸舊部時葉爾羌喀什噶爾城中伯克不容大和卓木進城賴我師之力攻克其城大和卓木乃能復統其衆反靣樓蘭太寡情是用再勤將與卒亦惟誅彼弟和兄庫車去嵗事逡巡不戰不追兔脱身初雅爾哈善方領重兵圍庫車城而小和卓木旋入旋出竟付諸不問自以坐得空城即可報命老師縱賊至今實貽養癰之害設使就擒早偃武至今猶恨僨轅人阿蘇即阿克蘇也克字從上阿急呼之原成二字烏什遞投降直進原期速定駹去冬將軍兆恵率師徑薄葉爾羌城雖以再定伊犂投降布魯特周行萬餘里道逺馬乏猝爾被遮然其時適當諸回城望風獻欵因乗勢直前速期綏靖非輕進也萬里周行强努末將軍猶是氣如杠二千餘人守三月逆回數萬不能攻援軍催進前師出命副將軍富徳等統兵往援轉戰五晝夜我師全軍㧞壘而還以少當衆且固守淹時而整暇如故洵有神助云實賴鴻禧益惕衷整軍三路進攻齊早慮同逃不暇齎將軍兆恵富徳議兵分往定兩城朕以二酋勢蹙或棄其人畜輜重而遁屢命将軍等熟籌詳計以偏師遮其要路周防潛竄哈什哈爾平聲纔納欵葉爾竒木又來徯自古火州傳不雨纒頭驚訝雨隨軍驛致佳音感乾貺土爾番闢展及葉爾羌喀什噶爾一帶素少雨澤今大兵所過甘􅉈應時回衆絡繹来降者無不詑為神異降夷日日出千羣可知化外有同心簞食壺漿獻致欽将軍等奏降人争持糗糧羊酒歡迓營門具見悃忱便爾先逃更何往前途遮獲定成擒時兆恵富徳方撫定兩城之衆尅日進軍而叅賛公明瑞等一面往躡賊踪期必俘獲窮回歸化即吾民安集勞徠命藎臣兩城回衆本為逆渠所脅非自甘抗拒者今既不肯從亡且迎降恐後因諭将軍等加意拊循以示無外檢校漢唐西域傳可能到此事傳真安集延將㧞達山軍知偵知二酋先期通好㧞達山伯克將欲往投又以賊黨願赴安集延持議未决然于彼于此皆屬回地可以尺組繫也豈能自外八鴻間行看往遺去聲來俘獻兵氣漸銷唱凱還漢書西域傳從鄯善傍南山北波後漢書作陂注循河曰陂河西行至沙車為南道莎車國王治莎車城去長安九千九百五十里東北至都䕶治所四千七百四十六里西至疏勒五百六十里西南至蒲犂七百四十里宣帝時烏孫公主小子萬年莎車王愛之莎車王無子死死時萬年在漢莎車國人計欲自託於漢又欲得烏孫心即上書請萬年為莎車王漢許之遣使者奚充國送萬年萬年初立暴惡國人不悦莎車王弟呼屠徵殺萬年并殺漢使者自立約諸侯背漢㑹衛侯馮奉世送大宛客即以便宜發諸國兵擊殺之更立他昆弟子為莎車王是嵗元康元年也後漢書西域傳莎車國西經蒲犂無雷至大月氏東去洛陽萬九百五十里匈奴因王莽之亂畧有西域惟莎車王延最强不肯附强常勅諸子當世奉漢家不可負也延死子康立建武五年立康為漢莎車建功懐徳王西域大都尉五十五國皆屬焉康死弟賢立十四年賢與鄯善王安並遣使詣闕貢獻於是西域始通蔥嶺以東諸國皆屬賢十七年賜賢西域都䕶印綬更賜賢以漢大將軍印綬賢由是始恨而猶詐稱大都䕶移書諸國諸國悉服屬焉號賢為單于數攻諸國二十二年冬攻殺龜茲王遂兼其國媯塞王自以國逺殺賢使者賢擊滅之後于窴王廣徳攻莎車執賢虜賢妻子而并其國匈奴聞廣徳滅莎車復遣兵將賢質子不居徵立為沙車王廣徳又攻殺之更立其弟齊黎為莎車王章帝元和三年時長史班超發諸國兵擊莎車大破之由是降漢莎車東北至疏勒班超傳超發于窴諸國兵二萬五千人擊莎車而龜茲王遣左將軍發温宿姑墨尉頭舍五萬人救之超召將校及于窴王議曰今兵少不敵計莫若各散去于窴從是而東長史亦於此西歸可須夜鼓聲而發陰緩所得生口龜兹王聞之大喜自以萬騎於西界遮超温宿王將八千騎於東界徼于窴超知二虜已出宻召諸部勒兵鷄鳴馳赴莎車營胡大驚亂奔走追斬五千餘級莎車遂降自是威震西域魏書西域傳渠沙國居故沙車城在子合西北去代一萬二千九百八十里唐書西域傳疏勒東南五百里濟徒多水踰大沙嶺有斫句迦種或曰沮渠地千里東踰嶺八百里即于闐也元史世祖本紀至元十一年正月立于闐葉爾羌舊作鴉兒看今改正兩城水驛十三年正月詔安慰葉爾羌等城按莎車在漢為大國東接于闐北連疏勒今和闐為于闐方位道里不爽采玉河流證據猶在而喀什噶爾諸城為疏勒西境按諸史傳與南有黄河西帶葱嶺之説合亦無可疑者今葉爾羌在喀什噶爾東南和闐西北應為莎車故壤而又饒地利擅形勢儼然西域一大都㑹是即後漢時莎車王賢所恃以憑陵與國者以疏勒莎車兩國全勢論之莎車在疏勒南范史稱莎車東北至疏勒而前書則云西至疏勒五百六十里者疏勒東西之境最廣各就邊界而言故不同也後漢班超頓兵疏勒發于闐諸國兵擊莎車超謂於此西歸者自今葉爾羌至喀什噶爾當西北行而龜兹王於西界遮超應即今自葉爾羌城西赴英噶薩爾一路而前書稱自鄯善西行至莎車為南道則莎車自屬南道極西附近葱嶺之國今葉爾羌城西直接葱嶺以是知為莎車也降自北魏號渠莎國介於兩大漸就微弱周隋以來不著於史當為于闐所并唐書疏勒東南五百里有斫句迦種一曰沮渠疑即北魏渠莎之舊又按唐書地理志毗沙都督府為四鎮之一註曰本于闐國是則莎車轉為渠莎渠莎又轉為毗沙而莎車故墟久為于闐所并故直以毗沙名四鎮也今和闐葉爾羌均隸天朝以古證今數典必從其朔則和闐為于闐葉爾羌為莎車方位較然未宜假借也至元世祖於鴉兒看城置水驛與于闐城並叙應即葉爾羌對音之訛耳察特西林察特西林在葉爾羌東北境喀什噶爾達里雅流經其南西南距葉爾羌城八百里巴爾楚克巴爾楚克在察特西林西南一百里喀叶噶爾達里雅流經其南西南距葉爾羌城七百五十里自葉爾羌東行七十里為愛吉特呼又東九十里為賴里特又東一百二十里為邁納特又東九十里為阿朗格爾又東六十里為阿克薩克瑪拉爾又東八十里為畢薩克又東七十里為賽爾古努斯又東七十里為哲克得里克托海又東一百里踰喀什噶爾達里雅至此又東八十里為庫克轍爾又東七十里為汗阿里克又東六十里為烏圖斯克璊又東五十里為伊拉都接阿克蘇界又自巴爾楚克西行通喀什噶爾樹木叢茂小山如屏逆酋霍集占自庫車亡命道經其間有牲畜之民驅脅以西餘遭戮殆盡逆酋伏誅後始遷回民居此按巴爾楚克在喀什噶爾達里雅北水經謂北河自疏勒逕流南河之北東南流逕疏勒城下南去莎車五百六十里此指今喀什噶爾達里雅逕巴爾楚克之南而東注者言也北史稱疏勒國南有黄河又云有大城十二小城數十今巴爾楚克城正當喀什噶爾達里雅北岸當即在小城數十之内葢今喀什噶爾達里雅之北東自巴爾楚克西至喀什噶爾皆古之疏勒地當時城郭隨在而有亦事之常無足疑者呼拉瑪呼拉瑪舊對音為呼爾璊在巴爾楚克西南百三十里踰喀什噶爾達里雅至其地乾隆二十三年十月將軍兆恵追逆酋霍集占於葉爾羌城下懸師深入賊衆蝟集先是夏六月皇上軫念從征軍士在行間久欲以更番休養調撥兵馬次第抵阿克蘇及是阿克蘇叅贊大臣舒赫徳即統新調兵三千五百赴援馳至巴爾楚克副將軍富徳以兵三百來㑹簡卒蒐乗汰存疲弱率鋭師遄行以新撥馬未至士多步行者二十四年正月六日次呼拉瑪霍集占擁賊五千餘騎迎戰我馬兵纔六百富徳等令努三愛隆阿分領叅賛大臣福禄等各按部伍督放中軍火器步行之索倫察喀爾善射兵分列兩翼自己至申與賊鏖戰十餘次賊敗走提督豆斌率中軍鎗礟奮進奪取賊人負固處誤中賊礟遂遇害富徳努三率左翼兵獲霍集占所居帳及鎗礟旗纛諸物舒赫徳愛隆阿以右翼兵擊敗餘賊追奔逐北十五里許翌日黎眀整兵進行砂礫中賊又率衆踞髙阜逆我師富徳等督兵突擊竟日夜初八日賊輕我馬少四面迎截官兵屹不動我師在砂礫地兩晝夜不得水拾氷塊以咽是夜陣而行將移駐有水處未十里賊隨後挑戰我兵亦隨機擊殺至天曉及葉爾羌諤斯騰渡口富徳等整兵守渡賊不能奪轉戰復一日夜是夜擇營中堪乘馬得五六十盡給壯士選精鋭步兵二百從之往襲賊營未至適叅贊大臣阿里衮遵㫖督解馬千匹星馳來㑹阿里衮與鄂博什分兵兩翼讙呼馳突賊衆驚敗越日與富徳等合軍威大振而敗去之賊復在外吹螺招集餘黨於是努三鄂博什等自右翼馳出乗勢襲擊阿里衮愛隆阿自左翼夾攻富徳以中軍合戰殺賊千餘及大伯克數十獲器械馬匹無算波羅泥都脅間中鳥鎗傷創甚賊舁之入城潛回喀什噶爾方是時師行千里地無水草猝然遇賊步騎勢殊五日四夜酣戰不息仰賴聖謨神逺先事綢繆呼吸之間雲集響應我師既盛賊乃敗逃富徳等遂鼓行而前抵葉爾羌與兆恵夾攻破賊御製我師詩己夘我師萬里外馬力實難繼況深入賊巢主客勢誠異以此被所圍固守鼓衆氣豈忍罪輕進惟奬勤王事上年十月十三日之役將軍兆恵直薄葉爾羌城僅以四百餘人衝剿賊衆二萬餘又道逺馬乏猝有挫衂然深溝髙壘悉力持守賊不敢犯其果鋭沉毅有大過人者若輒以倖試為訾議將徒快懦夫首䑕之論何以勵将集事是以屢詔褒勉而趨諸軍刻日赴援再三督援師速進以接濟亦不待督責敵愾人同勵叅賛尚書舒赫徳於阿克蘇城先簡駐城鋭卒並督諸路兵先至者星馳往營而將軍伯富徳等所統滿洲索倫察哈爾及緑旗營兵取道雲集叅賛公阿里衮以次解馬濟師一時軍聲士氣為之益振屈指數上聲居諸兵應臨彼地爭勝在俯仰所闗信非細中夜不安寢亟盻佳音至忽傳驛致章秉燭披衣視叶鏖戰五日夜斬將搴旗幟副將軍富徳叅贊及軍士叶同心成巨功殲賊數千騎富徳報至稱本年正月初六日統兵行至呼爾璊地方遇賊騎五千麾衆夾擊轉戰五日四夜㑹叅賛阿里衮督解馬匹亦至分翼斫陣賊衆創潰戮賊千餘人餘悉負傷敗竄而逆酋大和卓木脇中鎗傷賊衆舁之入城且潛回喀什噶爾矣已近將軍營通信卒遣四時将軍兆恵營中聞鎗礟聲和援兵已至乃厲兵邀戰將賊營焚燬數處且陣戮千餘人生擒五十餘人獲器械無算並遣索倫回兵各二人自軍門持牘相聞富徳因附以入奏頑回百計攻官軍一意備以此歴三月無恙皆寧謐叶是先舒赫徳得兆恵檄取援兵劄云營中有餘糧可支二三月為堅壁計自後回酋或用雲梯或用決水皆為我兵先覺應手破之而營中繕備益嚴故困守雖踰時而人皆有固志至是馳報自將軍下逮介士並整暇如故云相啇夾擊