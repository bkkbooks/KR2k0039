八十里莎車為今葉爾羌皮什南當葉爾羌東南三百十里是其地已入皮山國界而所謂皮山城者尚在其東也固璊固璊在皮什南之東七十里踰河至其地西距葉爾羌城三百八十里木濟木濟在固璊東南八十里東距葉什勒庫勒五里西距葉爾羌城四百六十里章固雅章固雅在固璊南四十里東傍葉什勒庫勒當孔道南西距葉爾羌城三百九十里薩納珠薩納珠在章固雅南二十里西距葉爾羌城四百里有城垣由此西南行可達根都斯坦城西北面臨葉什勒庫勒唐書地理志于闐西三百九十里有吉良鎮唐西域記瞿薩旦那國王城西行三百餘里至勃伽夷城按今和闐額里齊城即唐時于闐國都唐書西域傳稱于闐即瞿薩旦那國今自和闐額里齊城西行至薩納珠三百九十里疑屬當時吉良鎮地即西域記所稱勃逆夷城亦於是在也又按唐書地理志由于闐葦闗西經勃野西北渡繫館河六百二十里至郅支璊城一曰磧南州又西北經苦井黄渠三百二十里至雙渠故羯飯館又西北經半城百六十里至演渡州又北八十里至疏勒鎮以今道里計之勃野地無可考要在哈喇哈什以西無疑自和闐西行玉隴哈拉兩郭勒外以葉什勒為大應即所謂繫館河也由葦闗西六百餘里為郅支滿城應即今葉爾羌城由此西北入疏勒鎮即今由葉爾羌西北入喀什噶爾之路衮得里克衮得里克在木濟東南四十里踰葉什勒庫勒至其地西距葉爾羌城四百八十里都窪都窪在衮得里克東南六十里有城垣西距葉爾羌城五百里漢書西域傳皮山國王治皮山城去長安萬五十里東北至都䕶治所四千二百九十二里西南至烏秅國千三百四十里南與天篤接北至姑墨千四百五十里西南當罽賔烏弋山離道西北通莎車三百八十里魏書西域傳蒲山國故皮山谷也居皮城其國西南三里有凍凌山後役屬于闐唐書西域傳于闐并有漢皮山國故地地理志于闐西南三百八十里有皮山城按漢書載于闐國西通皮山三百八十里與唐書地理志于闐西南至皮山城里數相合今自和闐額里齊城西南至都窪三百五十餘里莎車今葉爾羌東南行至都窪亦三百餘里是皮山故城當與此相近也又與都窪城毗連者左有皮雅勒阿勒瑪右有皮什南皆與皮山字音相近疑當時悉屬皮山國地至其東西邊界不可考矣皮雅勒阿勒瑪皮雅勒阿勒瑪在木濟東南二百里踰葉什勒庫勒至其地西距葉爾羌城六百六十里東境有黄水溝唐書西域傳于闐或曰瞿薩旦那西有沙磧䑕大如蝟色類金出入羣䑕為從唐西域記瞿薩旦那國王城西百五六十里大沙磧正路中有堆阜並䑕壤墳也此沙磧中䑕大如蝟其毛則金銀異色按今自額里齊西行至皮雅勒阿勒瑪東境若以今哈喇哈什為王城由此西行百五十里應在皮雅勒阿勒瑪西境也阿克阿里克阿克阿里克在木濟東北二百里西南距葉爾羌城六百餘里東傍葉什勒庫勒不當孔道自阿克阿里克踰葉什勒庫勒自皮雅勒阿勒瑪踰黄水溝東境俱交河闐界以上屬葉爾羌又西為葉爾羌境外地塞爾勒克塞爾勒克在蔥嶺中由齊齊克里克達巴西南行八十里至其地有小城葉爾羌諤斯騰北源經流其左喀爾楚喀爾楚在蔥嶺中由塞爾勒克西南行一百五十里至其地有小城葉爾羌諤斯騰南源經流其陽東距葉爾羌城五百餘里東北至喀什噶爾亦如之自塞爾勒克以西在葉爾羌西境外于漢當為蒲犂國地漢書西域傳蒲犂國王治蒲犂谷去長安九千五百五十里東北至都䕶治所五千三百九十六里東至莎車五百四十里北至疏勒五百五十里南與西夜子合接西至無雷五百四十里寄田莎車種俗與子合同後漢書西域傳徳若國東去長史居三千五百三十里去洛陽一萬二千一百五十里與子合相接魏畧西戎傳中道西行滿犁國億若國皆拜屬疏勒魏書西域𫝊渴槃陀國在蔥嶺東朱駒波魏書又作朱居西河經其國東北流有髙山夏積霜雪附於嚈噠唐書西域傳喝盤陀或曰漢陀曰喝館檀亦謂渴羅陀由疏勒西南入劍末谷不忍嶺六百里其國也距𤓰州四千五百里直朱俱波西南距懸度山北抵疏勒西䕶密西北判汗國也治蔥嶺中都城負徒多河其王本疏勒人世相承為之西南即頭痛山也按漢蒲犂國東至莎車北至疏勒之文與今自喀什噶爾葉爾羌西南至塞爾勒克喀爾楚道里相合則塞爾勒克喀爾楚一帶當為蒲犂故壤也後漢無蒲犂而有徳若且云東與子合接今塞爾勒克與裕勒阿里克庫克雅爾相接知徳若即蒲犂地矣魏畧滿犂億若二國並載而滿之與蒲億之與徳應屬傳冩之訛北魏渴槃陁在朱駒波西以今裕勒阿里克為悉居半國推之則此宜屬元魏渴槃陁地唐書所謂由疏勒西南入劍末谷六百里即其國者也唐書西域傳又稱朱俱波并有漢之蒲犂西距喝槃陀疑元魏渴槃陀國之東鄙至唐為朱俱波之西鄙是漢之蒲犂於魏屬渴槃陀者於唐又屬朱俱波也由此西北行通哈喇庫勒阿喇楚勒葉什勒庫勒淖爾西南行通拔達克山咸在蔥嶺環帶之間詳見卷十七及四十六又按蔥嶺周圍千有餘里山環水帶境幽勢阻宅國非一在漢則東為蒲犂西為無雷難兠無雷北為涓毒其大較也傳於西夜國曰西與蒲犂接於蒲犂則曰南與西夜子合接互文觀之西夜當在蒲犂東南也於無雷國曰南至蒲犂於蒲犂則曰西至無雷互文觀之無雷當在蒲犂西北也無雷北與捐毒接捐毒西上蔥嶺為休循則難兠北與休循接可知難兠在無雷之西故東北去都䕶治所較遠而傳有西至無雷之文當屬東字傳寫之訛也惟是婼羌最近陽闗去長安僅六千三百里户四百五十小國耳而傳於去長安萬有餘里之難兠復曰南與婼羌接殊不可解後漢徳若國傳云自于窴經皮山至西夜子合徳若焉是徳若固居西夜子合西者宜附近蔥嶺魏書有朱居又作朱駒波渴槃陁諸國而蒲犂無雷難兠不著於録其即朱居等國之地無疑唐書朱俱波國疑即魏書朱居國於傳稱其即漢子合并有西夜蒲犂依耐徳若諸國則闢地最廣應兼有元魏時渴槃陁之地叅互考之是唐之朱俱波於漢兼有西夜子合蒲犂依耐徳若五國地於魏兼有悉居半朱居渴槃陁三國地而唐之喝槃陁始則兼有漢時無雷難兠蒲犂之地後蒲犂故地為朱俱波所并止兼有漢時無雷難兠之地於魏為渴槃陁西境及鉢和波知賖彌諸國在朱駒波西者也魏書渴槃陁尚在蔥嶺東故必兼鉢和波知賖彌諸國方足盡漢時蒲犂無雷難兠之地惟是諸部犬牙相錯其邊界頗難追考即分併之由史傳亦有未詳要此數國在今葉爾羌喀什噶爾以西蔥嶺環帶之内無可疑者又按魏書載有伽倍折薛莫孫鉗敦弗敵沙閻浮謁五國為大夏五翖侯地伽倍國在莎車之西去代一萬三千里而史於渠莎國則云故莎車城去代一萬二千九百八十里以伽倍國較之僅逺二十里自是西行至閻浮謁國去代一萬三千七百六十里亦止在莎車西七百里外今自葉爾羌西行七百里尚在蔥嶺環帶之中而史稱五國皆居山谷則於蔥嶺中立國亦無可疑特其與悉居半朱居諸國辨方分界之處無可考耳又載有者至拔國在疏勒西去代一萬一千六百二十里迷密國在者至拔西去代一萬二千六百里地與疏勒為近亦當附近蔥嶺至大月氐於元魏時别自為國去代一萬四千五百里自當在蔥嶺之外矣欽定皇輿西域圖志卷十八欽定四庫全書欽定皇輿西域圖志卷十八疆域十一天山南路五葉爾羌屬東至察特西林接阿克蘇界西至喀爾楚入蔥嶺通藩屬㧞達克山界東南至皮雅勒阿勒瑪接和闐界西北至喀什噶爾達里雅接喀什噶爾界葉爾羌葉爾羌舊對音葉爾竒木或名葉爾欽皆音之轉也東南由阿克蘇八百里西道由喀什噶爾五百里至其地距京師一萬二千三百八十五里城周十餘里有六門土岡環其東南城踞岡上規模宏敞甲於回部城中街巷屈曲錯雜無有條理民居以土垣屏蔽穴垣為户髙者三尺傴僂出入屋宇毗連處咸有水坑導城南哈喇烏蘇之水達於城北是資飯用逺近所屬村城甚多其最著者得二十有七康熈二十一年其地回酋阿布都里什特為準噶爾所執至三十五年準噶爾為大兵所破阿布都里什特偕妻子來朝賜冠服銀幣遣官䕶送至哈密俾歸國後為準噶爾所阻不獲内附乾隆二十三年八月霍集斯伯克以烏什降告於將軍兆恵曰霍集占自庫車遁而西非往喀什噶爾即葉爾羌矣若大兵進攻喀什噶爾則布魯特安集延賊之仇也必不往將南奔葉爾羌東南聮和闐以為援西南通㧞達克山痕都斯坦哈喇圖伯特以為窟進退有所據勢難拔不若徑趨葉爾羌招徕和闐要截拔達克山諸路一舉而克擒賊必矣喀什噶爾不足定也兆恵從其計擁馬兵四千步兵六千保葉爾羌其兄波羅泥都亦自喀什噶爾以馬兵三千步兵二千往㑹賊乗我師未至盡驅城外村莊居民入城田禾盡刈不及刈者焚之近城多為大坎城東北兼築髙臺以資守禦十月我師將抵葉爾羌兆恵等勒兵二千分中軍左右翼兆恵率侍衞鄂實福齡安及閒散侍衞等為中軍叅贊明瑞等率巴圖魯兵二百為中軍前隊總兵髙天喜領鎗礟隨中軍纛為後隊左翼副都統鄂木布等領後隊副都統愛隆阿等領後隊右翼副都統由屯等領前隊總管端濟布等領後隊巴圖魯喀拉璊綽爾圖厄魯散秩大臣達什䇿凌率挑誘兵最先進各部回兵在中軍兩翼間行部勒既定初六日陳於城東前限於坎馬不能進於是左翼兵自東向西進攻右翼兵覔路向東進挑誘兵直前衝突時臺上坎下空房破屋中伏賊放鎗拒戰我師奪臺殺賊賊敗走我師尾之注矢如雨賊紛紛墜馬有頃城東西兩門内各四五百騎出陣而立逡巡不敢前俄出數十騎來致師鄂木布明瑞等十人率勁旅賈勇入摧鋒䧟陣城内益出賊兵與我兵三戰賊皆辟易北門又出賊騎三四百來夾攻為由屯截殺不得逞自夘迄申賊乃敗入城閉門守是役也我軍甫集殲賊甚衆將士用命凡新附之厄魯特回部伯克等多怨霍集占之煽黨背徳咸感激奮勇軍聲大振我師得偵者言賊牲畜及沙拉斯家屬俱在城南之英額齊盤山議移兵往掠分賊勢十三日兆恵先遣愛隆阿等分兵八百扼喀什噶爾來援要道乃徒營從城東轉攻城南師濟哈喇烏蘇甫四百騎橋斷賊兵乗機發馬步繼進兆恵率明瑞等分列三隊縱横衝突所當者破殺賊千人再敗之已復分左右翼來殊死戰我軍自庫車逺至馬力弗能支更阻於淖引軍渡哈喇烏蘇達城東大營賊衆四集合圍我軍接戰五晝夜士氣奮厲軍中贏糧足資三月守於是掘濠築壘以待援師互詳卷二十八哈喇烏蘇條二十四年正月㑹富徳等統新調兵自阿克蘇來援阿里衮適解馬千疋馳至遂振旅以還阿克蘇詳後呼拉瑪條波羅泥都霍集占度大兵再至必成擒乃虜其民人牲畜棄城踰山遁於是葉爾羌之舊伯克回民等以全城降先是都統伯納木扎爾副都統三泰奉命往代兆恵富徳為將軍叅贊至葉爾羌兆恵等方在圍愛隆阿據河駐後納木扎爾三泰過其營猝陷賊俱遇害勅於葉爾羌南建雙義祠祀之御製平定回部勒銘葉爾羌碑文粤稽回始肇自天方又名默克一曰天堂大食見元回鶻見唐是皆彷彿所傳弗詳惟我皇清撫有華夏血氣之倫均歸陶冶準夷昔强㝠頑弗上恃厥險逺實梗化者䝟貐其衆豺狼其羣以回為羊役以耕耘利其善賈三倍市欣拘二酋長處伊犁濵四大回城輸租獻賦騰格是供衞拉是懼繭絲奚堪溝壑已遽有面内心其何能訴準夷既平羣回見天謂自今始飽食晏眠遣厥酋歸撫爾土田生死肉骨詎疑變遷詎疑變遷徳竟怨報助我叛疆戕我星軺叶是用興師聲罪致討叶乃敢抗顔蜩螗讙譟既侮厥外宜安厥内而何狂狙心焉昏憒殺人為戲奪妻為穢大失衆心無不怨背三道並發四甄齊攻酋知弗支自擄一空廿日之前駾走無踪爾雖知踪我追應窮滔滔洸洸連戰皆克旦夕茍延遂入異域異域畏懐舉旗助力腐䑕莫逋遂來獻馘二酋既殲諸回永靖叶設官定賦去其苛政昔之諸回曉戰夜偵今恬以嬉各保性命昔之諸回為準夷臣今語隣封曰天王民曰天王民誰汝苦辛藝爾黍稷孳爾子孫在昔己巳爰平金川兹定回部亦己夘年嵗符理紀瑞疊祥駢持盈保泰惟懋慎㫋御製我軍詩戊寅我軍取烏什酋長欵復獻阿竒木霍集斯伯克阿竒木伯克者回語大頭目霍集斯其名也元戎乗良機率衆直前進其奈隆冬時枯草經蹂躪以此馬不肥奚堪供斫陣況臨彼巢穴螳臂孤注奮借一誘我軍萬騎逞軀趂我師纔千餘鼓勇無退寸橋圯渡四百忠義人争勸殺賊至千餘矢盡接短刃涉淖退保營相持城下頓十月六日我師直薄葉爾羌城賊縁邊畫溝立隊自固我師以少擊衆所向披靡三戰殱獲甚夥賊擁竄入城不出將軍兆恵以賊游牧在城南英峩竒盤山計乗虚襲賊輜重制賊十三日取道城東渡河未及半而橋圮我師過河者纔四百騎遇賊馬步萬餘張左右翼來戰而地皆沮洳人馬不能如志且戰且踰河退保大營雖遇挫衂而人知効命殺賊千餘我四百人中纔傷一百時營中餘二月餘糧髙壘深濠以待集師協𠞰壯士遴七人星馳兩致信將軍遣索倫侍衞五十保等兩次賈勇突出遇賊衆遮道者戮之賫奏達阿克蘇城時叅賛大臣舒赫徳駐守因令五十保馳驛迎趨援師且直抵京城面奏軍營情事俟師齊即率以赴援舒赫徳留守諸回静以鎮羽檄催後師繼進期颷迅畢齊阿克蘇赴援雪深恨夷考兵興來曽無遭挫韌此畨客主殊不幸致事僨兆恵稱輕敵請罪誠不吝此非退縮比誰逆料利鈍終能寡勝衆允由効忠藎奚忍更加罪褒嘉章服晉諸臣諸軍士行賞以功論命兆恵由伯爵晉封武毅謀勇一等公加賜寶石帽頂四團龍補服餘大臣弁兵等封賞優叙有差晝夜促後軍直前金鼓振欲藉士敵愾今夏特命派索倫察哈爾健鋭營及陜甘緑旗兵繼進已過闢展而將軍富徳叅賛大臣舒赫徳等聞此信各羽檄催進其領軍大臣侍衞等無不切齒逆回寢皮食肉人人同恨計十二月中可至葉爾羌仰冀天助順捷音共春來平回鴻績建御製圍解八韻己夘圍解萬里逺懐紓午夜頻客冬將軍兆恵等薄賊城堅壁固守三閲月趣調援師時縈宵旰至是始得正月十四日官兵剿賊解嚴兩軍㑹合之信將軍誠善守天意本先仁少挫終能勝知難在審因勞哉惟衆士予曰有良臣更議擣虛策相籌應變神逆回大和卓木已遁回喀什噶爾危城勢同孤注惟慮小和卓木乗陳潛突豫籌於各路偵備以防鋌險兔營終詎脱蠖屈乃求伸時軍中方議乗勝進取因念士卒久勞且兵饟在道正宜少休養鋭勅於附近城中駐營以需繼進重賞斯寧吝明征要必申舞干雖美事何以謝軍人回酋反噬稔惡傷我官兵非脅從比恇怯無識之徒或議解圍却賊可以罷兵匪直無以伸國威且何由渫士怒耶御製固濟爾巴圖魯璊綽爾圖盡節詩己夘璊綽爾圖者索倫侍衛員曽以血戰功因賜號旌賢璊綽爾圖於乾隆二十一年冬隨大兵進剿阿穆爾撒納與哈薩克力戰有功特賜是號固濟爾何謂敢勇能摧堅亦云其勇耳大節乃炳然兆恵定回城喀什噶爾驛章一一宣云有瑪穆特被回擄去年其人厄魯特隨軍厮役焉將軍遣偵騎彼亦隨往旃時將軍遣散秩大臣達什䇿凌及璊綽爾圖莫寧察岱屯等率兵百人前行捉生口瑪穆特莫寧察厮養也忽被賊回遮衆敵寡實難矢盡守空屋奮突揮以拳莫寧察戰沒岱屯命亦捐璊綽爾圖在傷重飲劍艱猝被生縛去至霍集占前卓立唾賊罵裂眥髮衝冠巴圖魯侍衛豈懼爾狂㹪天兵今少至數萬繼進連以千敵爾萬汝滅踵不旋霍集占乃怒持刀向頸剸其達什䇿凌同時遭繫牽霍集占忿詈爾厄魯特人叶唇齒應相依何受中國官鐵鉤鉤四肢其死最可憐皆是所親見飾語敢取愆徒以無足數旦夕命苟延渠逃定回城乃復得見天兆恵聞此語既悦繼涕漣悦以我有人涕以已所遣叶據實歴詳陳痛淚不忍看心與帥臣同恩加寧惜駢璊綽爾圖等前已有㫖勅部照陣亡例賜卹今悉其死事英烈狀復命察其子嗣優加恩卹為齒睢陽張為舌常山顔古有今豈無詩録其人傳御製雙義詩有序己夘副將軍富徳至葉爾羌既定回城痛去嵗將士之没於王事暴骨沙塲為之築墳表墓因以奏聞葢隨將軍兆恵力守者固已無恙而旁出捉生及在途值賊者猝致捐軀實出逆料時則納木扎爾三泰適以奉差而往遇賊而殉此雙義之詩所由作也夫雙忠戡亂於無形雙烈表節於有北今之雙義亦復炳然此皆我八旗世臣與國同休戚者在諸人含笑九泉已知世録之必被而朕捫心午夜奚啻手足之如傷用兵既非得已盡節豈所樂聞且即此役而言非生擒二酋何以雪我三軍之恨哉然既建大業寧免㣲疵即走卒厮養頗切同仇則知我國家豢養旗人萬年鞏固之基而非周秦漢唐一興兵而天下驛騷怨聲載道者比此又朕所深慶幸者夫雙忠昔集事雙烈能㤀身二事皆見前集兹作雙義詩其故得細陳曰納木扎爾曽贊北路軍奮勇剪逆賊封伯酬其勲納木扎爾先以都綂叅賛北路軍務曽擒喀爾喀叛逆青衮雜卜論功加封伯爵副都統三泰英氣頗超人均御前侍衛素悉厥忠純兆恵富徳輩從戎久効勤欲代俾將母將軍兆恵富徳母俱年髙比嵗領軍討賊故特簡二臣往代之二臣被選掄去嵗黒水役事見前固守遣索倫致信愛隆阿權退催後援可支百日間速進莫逡巡將軍兆恵等猝被賊遮時愛隆阿拒河駐後将軍兆恵自圍中遣索倫二人間道傳語大兵未集可速回阿克蘇俟後軍一齊進援將軍及叅贊輕進徒俱焚當待師並來何慮狂狙狺時授納木扎爾為靖逆將軍三泰為叅賛大臣之信兆恵已知之故亦令暫廻以俟後軍爾時二臣者馳驛徃軍門過愛隆阿營却近黒水濱所遣人未遇礟聲前忽聞知賊與我戰聞戰恥退奔徒攜百餘騎赴義命同捐叶凶信驛遞來痛淚傷心魂使早知拒守退俟熊羆羣同進可樹功何致均沉淪即先至一日合兆恵軍屯亦可旋今嵗奚煩以身殉叶不前復不後此實若有神富徳自和闐重至黒水津葉爾竒木降諸事粗處分痛念我將士沙場化為燐黄頭雖不備掩骼權為墳猿鶴昔屬幻邱隴今可循因以此事奏西望揮淚頻豐碑旌墓門千秋西海垠捐軀固臣節在爾非所論在予則何忍此恨終當伸夷考六人蹟事異心同均與國休戚共寧止曰藎臣史筆多訛傳永言傳其真御製副將軍富徳奏報小和卓木霍集占亦望風先逃葉爾羌回衆投誠擬平定回部凱歌十首己夘伊犂平定擬功成孰謂狂回乃背盟師直從來荷天佑詎予本意好佳兵偏師䕶衞入回城逆酋大小和卓木為準噶爾拘禁日久我師既定伊犂乃出諸繫中遣兵送大和卓木歸舊部時葉爾羌喀什噶爾城中伯克不容大和卓木進城賴我師之力攻克其城大和卓木乃能復統其衆反靣樓蘭太寡情是用再勤將與卒亦惟誅彼弟和兄庫車去嵗事逡巡不戰不追兔脱身初雅爾哈善方領重兵圍庫車城而小和卓木旋入旋出竟付諸不問自以坐得空城即可報命老師縱賊至今實貽養癰之害設使就擒早偃武至今猶恨僨轅人阿蘇即阿克蘇也克字從上阿急呼之原成二字烏什遞投降直進原期速定駹去冬將軍兆恵率師徑薄葉爾羌城雖以再定伊犂投降布魯特周行萬餘里道逺馬乏猝爾被遮然其時適當諸回城望風獻欵因乗勢直前速期綏靖非輕進也萬里周行强努末將軍猶是氣如杠二千餘人守三月逆回數萬不能攻援軍催進前師出命副將軍富徳等統兵往援轉戰五晝夜我師全軍㧞壘而還以少當衆且固守淹時而整暇如故洵有神助云實賴鴻禧益惕衷整軍三路進攻齊早慮同逃不暇齎將軍兆恵富徳議兵分往定兩城朕以二酋勢蹙或棄其人畜輜重而遁屢命将軍等熟籌詳計以偏師遮其要路周防潛竄哈什哈爾平聲纔納欵葉爾竒木又來徯自古火州傳不雨纒頭驚訝雨隨軍驛致佳音感乾貺土爾番闢展及葉爾羌喀什噶爾一帶素少雨澤今大兵所過甘􅉈應時回衆絡繹来降者無不詑為神異降夷日日出千羣可知化外有同心簞食壺漿獻致欽将軍等奏降人争持糗糧羊酒歡迓營門具見悃忱便爾先逃更何往前途遮獲定成擒時兆恵富徳方撫定兩城之衆尅日進軍而叅賛公明瑞等一面往躡賊踪期必俘獲窮回歸化即吾民安集勞徠命藎臣兩城回衆本為逆渠所脅非自甘抗拒者今既不肯從亡且迎降恐後因諭将軍等加意拊循以示無外檢校漢唐西域傳可能到此事傳真安集延將㧞達山軍知偵知二酋先期通好㧞達山伯克將欲往投又以賊黨願赴安集延持議未决然于彼于此皆屬回地可以尺組繫也豈能自外八鴻間行看往遺去聲來俘獻兵氣漸銷唱凱還漢書西域傳從鄯善傍南山北波後漢書作陂注循河曰陂河西行至沙車為南道莎車國王治莎車城去長安九千九百五十里東北至都䕶治所四千七百四十六里西至疏勒五百六十里西南至蒲犂七百四十里宣帝時烏孫公主小子萬年莎車王愛之莎車王無子死死時萬年在漢莎車國人計欲自託於漢又欲得烏孫心即上書請萬年為莎車王漢許之遣使者奚充國送萬年萬年初立暴惡國人不悦莎車王弟呼屠徵殺萬年并殺漢使者自立約諸侯背漢㑹衛侯馮奉世送大宛客即以便宜發諸國兵擊殺之更立他昆弟子為莎車王是嵗元康元年也後漢書西域傳莎車國西經蒲犂無雷至大月氏東去洛陽萬九百五十里匈奴因王莽之亂畧有西域惟莎車王延最强不肯附强常勅諸子當世奉漢家不可負也延死子康立建武五年立康為漢莎車建功懐徳王西域大都尉五十五國皆屬焉康死弟賢立十四年賢與鄯善王安並遣使詣闕貢獻於是西域始通蔥嶺以東諸國皆屬賢十七年賜賢西域都䕶印綬更賜賢以漢大將軍印綬賢由是始恨而猶詐稱大都䕶移書諸國諸國悉服屬焉號賢為單于數攻諸國二十二年冬攻殺龜茲王遂兼其國媯塞王自以國逺殺賢使者賢擊滅之後于窴王廣徳攻莎車執賢虜賢妻子而并其國匈奴聞廣徳滅莎車復遣兵將賢質子不居徵立為沙車王廣徳又攻殺之更立其弟齊黎為莎車王章帝元和三年時長史班超發諸國兵擊莎車大破之由是降漢莎車東北至疏勒班超傳超發于窴諸國兵二萬五千人擊莎車而龜茲王遣左將軍發温宿姑墨尉頭舍五萬人救之超召將校及于窴王議曰今兵少不敵計莫若各散去于窴從是而東長史亦於此西歸可須夜鼓聲而發陰緩所得生口龜兹王聞之大喜自以萬騎於西界遮超温宿王將八千騎於東界徼于窴超知二虜已出宻召諸部勒兵鷄鳴馳赴莎車營胡大驚亂奔走追斬五千餘級莎車遂降自是威震西域魏書西域傳渠沙國居故沙車城在子合西北去代一萬二千九百八十里唐書西域傳疏勒東南五百里濟徒多水踰大沙嶺有斫句迦種或曰沮渠地千里東踰嶺八百里即于闐也元史世祖本紀至元十一年正月立于闐葉爾羌舊作鴉兒看今改正兩城水驛十三年正月詔安慰葉爾羌等城按莎車在漢為大國東接于闐北連疏勒今和闐為于闐方位道里不爽采玉河流證據猶在而喀什噶爾諸城為疏勒西境按諸史傳與南有黄河西帶葱嶺之説合亦無可疑者今葉爾羌在喀什噶爾東南和闐西北應為莎車故壤而又饒地利擅形勢儼然西域一大都㑹是即後漢時莎車王賢所恃以憑陵與國者以疏勒莎車兩國全勢論之莎車在疏勒南范史稱莎車東北至疏勒而前書則云西至疏勒五百六十里者疏勒東西之境最廣各就邊界而言故不同也後漢班超頓兵疏勒發于闐諸國兵擊莎車超謂於此西歸者自今葉爾羌至喀什噶爾當西北行而龜兹王於西界遮超應即今自葉爾羌城西赴英噶薩爾一路而前書稱自鄯善西行至莎車為南道則莎車自屬南道極西附近葱嶺之國今葉爾羌城西直接葱嶺以是知為莎車也降自北魏號渠莎國介於兩大漸就微弱周隋以來不著於史當為于闐所并唐書疏勒東南五百里有斫句迦種一曰沮渠疑即北魏渠莎之舊又按唐書地理志毗沙都督府為四鎮之一註曰本于闐國是則莎車轉為渠莎渠莎又轉為毗沙而莎車故墟久為于闐所并故直以毗沙名四鎮也今和闐葉爾羌均隸天朝以古證今數典必從其朔則和闐為于闐葉爾羌為莎車方位較然未宜假借也至元世祖於鴉兒看城置水驛與于闐城並叙應即葉爾羌對音之訛耳察特西林察特西林在葉爾羌東北境喀什噶爾達里雅流經其南西南距葉爾羌城八百里巴爾楚克巴爾楚克在察特西林西南一百里喀叶噶爾達里雅流經其南西南距葉爾羌城七百五十里自葉爾羌東行七十里為愛吉特呼又東九十里為賴里特又東一百二十里為邁納特又東九十里為阿朗格爾又東六十里為阿克薩克瑪拉爾又東八十里為畢薩克又東七十里為賽爾古努斯又東七十里為哲克得里克托海又東一百里踰喀什噶爾達里雅至此又東八十里為庫克轍爾又東七十里為汗阿里克又東六十里為烏圖斯克璊又東五十里為伊拉都接阿克蘇界又自巴爾楚克西行通喀什噶爾樹木叢茂小山如屏逆酋霍集占自庫車亡命道經其間有牲畜之民驅脅以西餘遭戮殆盡逆酋伏誅後始遷回民居此按巴爾楚克在喀什噶爾達里雅北水經謂北河自疏勒逕流南河之北東南流逕疏勒城下南去莎車五百六十里此指今喀什噶爾達里雅逕巴爾楚克之南而東注者言也北史稱疏勒國南有黄河又云有大城十二小城數十今巴爾楚克城正當喀什噶爾達里雅北岸當即在小城數十之内葢今喀什噶爾達里雅之北東自巴爾楚克西至喀什噶爾皆古之疏勒地當時城郭隨在而有亦事之常無足疑者呼拉瑪呼拉瑪舊對音為呼爾璊在巴爾楚克西南百三十里踰喀什噶爾達里雅至其地乾隆二十三年十月將軍兆恵追逆酋霍集占於葉爾羌城下懸師深入賊衆蝟集先是夏六月皇上軫念從征軍士在行間久欲以更番休養調撥兵馬次第抵阿克蘇及是阿克蘇叅贊大臣舒赫徳即統新調兵三千五百赴援馳至巴爾楚克副將軍富徳以兵三百來㑹簡卒蒐乗汰存疲弱率鋭師遄行以新撥馬未至士多步行者二十四年正月六日次呼拉瑪霍集占擁賊五千餘騎迎戰我馬兵纔六百富徳等令努三愛隆阿分領叅賛大臣福禄等各按部伍督放中軍火器步行之索倫察喀爾善射兵分列兩翼自己至申與賊鏖戰十餘次賊敗走提督豆斌率中軍鎗礟奮進奪取賊人負固處誤中賊礟遂遇害富徳努三率左翼兵獲霍集占所居帳及鎗礟旗纛諸物舒赫徳愛隆阿以右翼兵擊敗餘賊追奔逐北十五里許翌日黎眀整兵進行砂礫中賊又率衆踞髙阜逆我師富徳等督兵突擊竟日夜初八日賊輕我馬少四面迎截官兵屹不動我師在砂礫地兩晝夜不得水拾氷塊以咽是夜陣而行將移駐有水處未十里賊隨後挑戰我兵亦隨機擊殺至天曉及葉爾羌諤斯騰渡口富徳等整兵守渡賊不能奪轉戰復一日夜是夜擇營中堪乘馬得五六十盡給壯士選精鋭步兵二百從之往襲賊營未至適叅贊大臣阿里衮遵㫖督解馬千匹星馳來㑹阿里衮與鄂博什分兵兩翼讙呼馳突賊衆驚敗越日與富徳等合軍威大振而敗去之賊復在外吹螺招集餘黨於是努三鄂博什等自右翼馳出乗勢襲擊阿里衮愛隆阿自左翼夾攻富徳以中軍合戰殺賊千餘及大伯克數十獲器械馬匹無算波羅泥都脅間中鳥鎗傷創甚賊舁之入城潛回喀什噶爾方是時師行千里地無水草猝然遇賊步騎勢殊五日四夜酣戰不息仰賴聖謨神逺先事綢繆呼吸之間雲集響應我師既盛賊乃敗逃富徳等遂鼓行而前抵葉爾羌與兆恵夾攻破賊御製我師詩己夘我師萬里外馬力實難繼況深入賊巢主客勢誠異以此被所圍固守鼓衆氣豈忍罪輕進惟奬勤王事上年十月十三日之役將軍兆恵直薄葉爾羌城僅以四百餘人衝剿賊衆二萬餘又道逺馬乏猝有挫衂然深溝髙壘悉力持守賊不敢犯其果鋭沉毅有大過人者若輒以倖試為訾議將徒快懦夫首䑕之論何以勵将集事是以屢詔褒勉而趨諸軍刻日赴援再三督援師速進以接濟亦不待督責敵愾人同勵叅賛尚書舒赫徳於阿克蘇城先簡駐城鋭卒並督諸路兵先至者星馳往營而將軍伯富徳等所統滿洲索倫察哈爾及緑旗營兵取道雲集叅賛公阿里衮以次解馬濟師一時軍聲士氣為之益振屈指數上聲居諸兵應臨彼地爭勝在俯仰所闗信非細中夜不安寢亟盻佳音至忽傳驛致章秉燭披衣視叶鏖戰五日夜斬將搴旗幟副將軍富徳叅贊及軍士叶同心成巨功殲賊數千騎富徳報至稱本年正月初六日統兵行至呼爾璊地方遇賊騎五千麾衆夾擊轉戰五日四夜㑹叅賛阿里衮督解馬匹亦至分翼斫陣賊衆創潰戮賊千餘人餘悉負傷敗竄而逆酋大和卓木脇中鎗傷賊衆舁之入城且潛回喀什噶爾矣已近將軍營通信卒遣四時将軍兆恵營中聞鎗礟聲和援兵已至乃厲兵邀戰將賊營焚燬數處且陣戮千餘人生擒五十餘人獲器械無算並遣索倫回兵各二人自軍門持牘相聞富徳因附以入奏頑回百計攻官軍一意備以此歴三月無恙皆寧謐叶是先舒赫徳得兆恵檄取援兵劄云營中有餘糧可支二三月為堅壁計自後回酋或用雲梯或用決水皆為我兵先覺應手破之而營中繕備益嚴故困守雖踰時而人皆有固志至是馳報自將軍下逮介士並整暇如故云相啇夾擊䇿一舉期功遂四月寤寐縈今朝始慶慰殷心念衆勞額手感天賜佇持捷音馳國朝威遠被御製墨爾根巴圖魯瑪瑺斫陣歌己卯乙亥以來有事戎賴我衆力成膚功重賞之下多勇士捨身圖報羣輸忠舒布圖鎧實巨擘三巴圖魯繼厥踪見丙子集中後乃不可屈指數就中瑪瑺尤稱雄經卅餘戰皆首出搴旗斬將誰争鋒鐵騎憑陵諸鄂拓準夷部落名肅清伊犂揚英風今春我軍急進援富徳率師如羆熊瑪瑺命領塗路首䝉古語先鋒探信者呼爾璊處賊迎攻堂堂之陣賊辟易瑺乃獨進躡冦窮金鞭連䇿大宛馬繡蝥不用用雕弓一箭正中賊要害再箭倉卒乃落空三箭終殪賊墜馬忽忘深入賊隊中蜂屯蟻雜齊擁簇瑺之馬斃倒沙蓬捨馬步戰短兵接叱咤凌厲氣如虹我軍隨進瑺乃出檢傷十處中去聲其躬以帛裹傷明復戰義膽自有神帡幪花門降胡咋舌歎如此超勇聞何從將軍一一據實奏不竒其勇憐其忠設非立志忠且壯安能効命功名崇馳驛令歸不可再嫖姚賜第今堪同席前備陳隕涕聴厚賚覺未酬勲庸仍歸禁旅領宿衞命為䕶軍統領若無曩勣撝謙沖古來歸奏未央殿却聞天子不召見御製惜陣亡提督豆斌詩庚辰去嵗正月初九日副將軍富徳自阿克蘇率諸師兼程進援將軍兆恵遇賊要戰于呼爾瑪時豆斌領緑旗兵列鎗礟對敵不期中賊銃捐軀詩以惜之老將行間名乆標雍正元年間西陲用兵豆斌即以禆將特著功伐後屢膺節鎮勇畧夙優援師深入從去聲嫖姚鋪敦縱已占三㨗矍鑠不期喪一朝杜牧悲曽譏㸃筆孟明壯詎肯廻橈最憐來歙臨終際强起猶虞衆志摇豆斌中創時猶力疾拊循諸將士奮勇殺賊伯什恰特伯什恰特在葉爾羌城東五十里拜林拜林在伯什恰特東北五十里西距葉爾羌城一百里宻什雅爾宻什雅爾在葉爾羌北十五里塔噶爾齊塔噶爾齊在密什雅爾東十八里南距葉爾羌城二十里阿布普爾阿布普爾在塔噶爾齊東二十里西南距葉爾羌城三十里汗阿里克汗阿里克在密什雅爾北踰河至其地南距葉爾羌城四十里庫勒塔里木庫勒塔里木在汗阿里克東北二百六十里南距葉爾羌城三百里鄂湍楚魯克鄂湍楚魯克舊對音通古思魯克在葉爾羌城南四十里踰哈喇烏蘇至其地雅哈阿里克雅哈阿里克在葉爾羌諤斯騰北岸五里北距葉爾羌城四十里坡斯恰木坡斯恰木在雅哈阿里克南三十里踰河至其地北距葉爾羌城七十里舒帖舒帖在鄂湍楚魯克南一百六十里踰河至其地北距葉爾羌城二百里呼木什哈特呼木什哈特南距葉爾羌支河五里北距葉爾羌城二百里伯什阿里克伯什阿里克在呼木什哈特東南一百里踰葉爾羌支河至其地北距葉爾羌城三百里托古斯恰特托古斯恰特在伯什阿里克東一百里北距葉爾羌城三百五十里鄂爾多諤斯騰鄂爾多諤斯騰地以水名在葉爾羌城西二十里阿喇勒阿喇勒在鄂爾多諤斯騰西南二十里東距葉爾羌城二十里喀瑪喇克喀瑪喇克在阿喇勒西南二十里踰哈喇烏蘇至其地東距葉爾羌城二十里哈喇古哲什哈喇古哲什有小城當哈喇烏蘇雙流交㑹之地東距葉爾羌城二百里喇巴特齊喇巴特齊在喀瑪喇克西五十里東距葉爾羌城七十里和什阿喇布和什阿喇布在哈喇古哲什城西南二十里有小城東距葉爾羌城二百里色勒克郭勒色勒克郭勒地以水名在和什阿喇布西五百里東距葉爾羌城七百里伊竒蘇寧阿喇斯伊竒蘇寧阿喇斯有小城在和什阿喇布城東南一百里東北距葉爾羌城一百里裕勒阿里克裕勒阿里克在波斯恰木南七十里有小城東北距葉爾羌城三百里由是西南為漢西夜國地漢書西域傳西夜國王號子合王治呼犍谷去長安萬二百五十里東北到都䕶治所五千四十六里東與皮山西南與烏秅北與莎車西與蒲犂接西夜與胡異種類羌氐行國後漢書西域傳西夜國一名漂沙漢書中誤云西夜子合是一國今各自有王魏書西域傳悉居半國故西夜國也一名子合其王號子治呼犍在于闐西去代萬二千九百七十里太延初遣使來獻自後貢使不絶唐書西域傳朱俱波一名朱俱槃漢子合國地直于闐西千里葱嶺北三百里西距喝盤陀北九百里屬疏勒南三千里女國也按漢西夜國北與莎車接莎車即今葉爾羌則西夜故國當在葉爾羌南境裕勒阿里克西南也所治以國名應附蔥嶺而居者至北魏時為悉居半唐為朱俱波也惟魏書於悉居半外别有朱居國亦在于闐之西而山居疑此兩國至唐而并又兼有蒲犂伊耐徳若諸國之地疆域殊廣非復漢時西夜附庸大國者比矣庫克雅爾庫克雅爾在裕勒阿里克城西五里東北距葉爾羌城三百里按後漢時西夜子合各自為王裕勒阿里克為西夜國則庫克雅爾當為後漢子合國也在唐亦屬朱俱波地塔克布伊塔克布伊在庫克雅爾西北二百里有小城東北距葉爾羌城三百里魏書西域傳朱居國在于闐西其人山居按魏朱居國亦屬唐朱俱波國地魏書稱其人山居今塔克布伊傍山為城且與裕勒阿里克庫克雅爾相連應屬朱居國舊地英額齊盤英額齊盤舊對音為英峩竒盤在塔克布伊西南一百里依山為左東北距葉爾羌城四百里沙圖沙圖在呼木什恰特東南二十五里踰葉爾羌支河至其地西距葉爾羌城二百二十里哈爾噶里克哈爾噶里克在伯什阿里克東南踰提斯衮諤斯騰又東南十里至其地北距葉爾羌城二百二十里貝拉貝拉在哈爾噶里克東南六十里踰庫森諤斯騰至其地北距葉爾羌城二百二十里哈爾噶里克以東地皆砂磧至貝拉始有水草楚魯克楚魯克在哈爾噶里克東南七十里西北距葉爾羌城二百九十里皮什南皮什南在楚魯克東三十里有河出南山下北流百餘里饒水草西北距葉爾羌城三百十里按漢書皮山國西北通莎車三百八十里莎車為今葉爾羌皮什南當葉爾羌東南三百十里是其地已入皮山國界而所謂皮山城者尚在其東也固璊固璊在皮什南之東七十里踰河至其地西距葉爾羌城三百八十里木濟木濟在固璊東南八十里東距葉什勒庫勒五里西距葉爾羌城四百六十里章固雅章固雅在固璊南四十里東傍葉什勒庫勒當孔道南西距葉爾羌城三百九十里薩納珠薩納珠在章固雅南二十里西距葉爾羌城四百里有城垣由此西南行可達根都斯坦城西北面臨葉什勒庫勒唐書地理志于闐西三百九十里有吉良鎮唐西域記瞿薩旦那國王城西行三百餘里至勃伽夷城按今和闐額里齊城即唐時于闐國都唐書西域傳稱于闐即瞿薩旦那國今自和闐額里齊城西行至薩納珠三百九十里疑屬當時吉良鎮地即西域記所稱勃逆夷城亦於是在也又按唐書地理志由于闐葦闗西經勃野西北渡繫館河六百二十里至郅支璊城一曰磧南州又西北經苦井黄渠三百二十里至雙渠故羯飯館又西北經半城百六十里至演渡州又北八十里至疏勒鎮以今道里計之勃野地無可考要在哈喇哈什以西無疑自和闐西行玉隴哈拉兩郭勒外以葉什勒為大應即所謂繫館河也由葦闗西六百餘里為郅支滿城應即今葉爾羌城由此西北入疏勒鎮即今由葉爾羌西北入喀什噶爾之路衮得里克衮得里克在木濟東南四十里踰葉什勒庫勒至其地西距葉爾羌城四百八十里都窪都窪在衮得里克東南六十里有城垣西距葉爾羌城五百里漢書西域傳皮山國王治皮山城去長安萬五十里東北至都䕶治所四千二百九十二里西南至烏秅國千三百四十里南與天篤接北至姑墨千四百五十里西南當罽賔烏弋山離道西北通莎車三百八十里魏書西域傳蒲山國故皮山谷也居皮城其國西南三里有凍凌山後役屬于闐唐書西域傳于闐并有漢皮山國故地地理志于闐西南三百八十里有皮山城按漢書載于闐國西通皮山三百八十里與唐書地理志于闐西南至皮山城里數相合今自和闐額里齊城西南至都窪三百五十餘里莎車今葉爾羌東南行至都窪亦三百餘里是皮山故城當與此相近也又與都窪城毗連者左有皮雅勒阿勒瑪右有皮什南皆與皮山字音相近疑當時悉屬皮山國地至其東西邊界不可考矣皮雅勒阿勒瑪皮雅勒阿勒瑪在木濟東南二百里踰葉什勒庫勒至其地西距葉爾羌城六百六十里東境有黄水溝唐書西域傳于闐或曰瞿薩旦那西有沙磧䑕大如蝟色類金出入羣䑕為從唐西域記瞿薩旦那國王城西百五六十里大沙磧正路中有堆阜並䑕壤墳也此沙磧中䑕大如蝟其毛則金銀異色按今自額里齊西行至皮雅勒阿勒瑪東境若以今哈喇哈什為王城由此西行百五十里應在皮雅勒阿勒瑪西境也阿克阿里克阿克阿里克在木濟東北二百里西南距葉爾羌城六百餘里東傍葉什勒庫勒不當孔道自阿克阿里克踰葉什勒庫勒自皮雅勒阿勒瑪踰黄水溝東境俱交河闐界以上屬葉爾羌又西為葉爾羌境外地塞爾勒克塞爾勒克在蔥嶺中由齊齊克里克達巴西南行八十里至其地有小城葉爾羌諤斯騰北源經流其左喀爾楚喀爾楚在蔥嶺中由塞爾勒克西南行一百五十里至其地有小城葉爾羌諤斯騰南源經流其陽東距葉爾羌城五百餘里東北至喀什噶爾亦如之自塞爾勒克以西在葉爾羌西境外于漢當為蒲犂國地漢書西域傳蒲犂國王治蒲犂谷去長安九千五百五十里東北至都䕶治所五千三百九十六里東至莎車五百四十里北至疏勒五百五十里南與西夜子合接西至無雷五百四十里寄田莎車種俗與子合同後漢書西域傳徳若國東去長史居三千五百三十里去洛陽一萬二千一百五十里與子合相接魏畧西戎傳中道西行滿犁國億若國皆拜屬疏勒魏書西域𫝊渴槃陀國在蔥嶺東朱駒波魏書又作朱居西河經其國東北流有髙山夏積霜雪附於嚈噠唐書西域傳喝盤陀或曰漢陀曰喝館檀亦謂渴羅陀由疏勒西南入劍末谷不忍嶺六百里其國也距𤓰州四千五百里直朱俱波西南距懸度山北抵疏勒西䕶密西北判汗國也治蔥嶺中都城負徒多河其王本疏勒人世相承為之西南即頭痛山也按漢蒲犂國東至莎車北至疏勒之文與今自喀什噶爾葉爾羌西南至塞爾勒克喀爾楚道里相合則塞爾勒克喀爾楚一帶當為蒲犂故壤也後漢無蒲犂而有徳若且云東與子合接今塞爾勒克與裕勒阿里克庫克雅爾相接知徳若即蒲犂地矣魏畧滿犂億若二國並載而滿之與蒲億之與徳應屬傳冩之訛北魏渴槃陁在朱駒波西以今裕勒阿里克為悉居半國推之則此宜屬元魏渴槃陁地唐書所謂由疏勒西南入劍末谷六百里即其國者也唐書西域傳又稱朱俱波并有漢之蒲犂西距喝槃陀疑元魏渴槃陀國之東鄙至唐為朱俱波之西鄙是漢之蒲犂於魏屬渴槃陀者於唐又屬朱俱波也由此西北行通哈喇庫勒阿喇楚勒葉什勒庫勒淖爾西南行通拔達克山咸在蔥嶺環帶之間詳見卷十七及四十六又按蔥嶺周圍千有餘里山環水帶境幽勢阻宅國非一在漢則東為蒲犂西為無雷難兠無雷北為涓毒其大較也傳於西夜國曰西與蒲犂接於蒲犂則曰南與西夜子合接互文觀之西夜當在蒲犂東南也於無雷國曰南至蒲犂於蒲犂則曰西至無雷互文觀之無雷當在蒲犂西北也無雷北與捐毒接捐毒西上蔥嶺為休循則難兠北與休循接可知難兠在無雷之西故東北去都䕶治所較遠而傳有西至無雷之文當屬東字傳寫之訛也惟是婼羌最近陽闗去長安僅六千三百里户四百五十小國耳而傳於去長安萬有餘里之難兠復曰南與婼羌接殊不可解後漢徳若國傳云自于窴經皮山至西夜子合徳若焉是徳若固居西夜子合西者宜附近蔥嶺魏書有朱居又作朱駒波渴槃陁諸國而蒲犂無雷難兠不著於録其即朱居等國之地無疑唐書朱俱波國疑即魏書朱居國於傳稱其即漢子合并有西夜蒲犂依耐徳若諸國則闢地最廣應兼有元魏時渴槃陁之地叅互考之是唐之朱俱波於漢兼有西夜子合蒲犂依耐徳若五國地於魏兼有悉居半朱居渴槃陁三國地而唐之喝槃陁始則兼有漢時無雷難兠蒲犂之地後蒲犂故地為朱俱波所并止兼有漢時無雷難兠之地於魏為渴槃陁西境及鉢和波知賖彌諸國在朱駒波西者也魏書渴槃陁尚在蔥嶺東故必兼鉢和波知賖彌諸國方足盡漢時蒲犂無雷難兠之地惟是諸部犬牙相錯其邊界頗難追考即分併之由史傳亦有未詳要此數國在今葉爾羌喀什噶爾以西蔥嶺環帶之内無可疑者又按魏書載有伽倍折薛莫孫鉗敦弗敵沙閻浮謁五國為大夏五翖侯地伽倍國在莎車之西去代一萬三千里而史於渠莎國則云故莎車城去代一萬二千九百八十里以伽倍國較之僅逺二十里自是西行至閻浮謁國去代一萬三千七百六十里亦止在莎車西七百里外今自葉爾羌西行七百里尚在蔥嶺環帶之中而史稱五國皆居山谷則於蔥嶺中立國亦無可疑特其與悉居半朱居諸國辨方分界之處無可考耳又載有者至拔國在疏勒西去代一萬一千六百二十里迷密國在者至拔西去代一萬二千六百里地與疏勒為近亦當附近蔥嶺至大月氐於元魏時别自為國去代一萬四千五百里自當在蔥嶺之外矣欽定皇輿西域圖志卷十八
