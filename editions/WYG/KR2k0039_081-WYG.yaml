body:
  text: 水五天山南路二塔里木郭勒塔里木郭勒在阿克蘇東南三百里西域大川源出葱嶺者二喀什噶爾達里雅葉爾羌諤斯騰皆東流出南山者一和闐達里雅北流出北山者一阿克蘇郭勒南流咸㑹於此合而東流六百餘里統名塔里木郭勒又東入額爾勾郭勒又東入羅布淖爾按水經載南河東北逕扜彌國北又北河東逕姑墨國南姑墨故地在拜之西阿克蘇之東塔里木郭勒經其南踰河入砂磧地屬于闐東境為古扜彌國地正當塔里木郭勒之北是水經所謂東逕姑墨國南扜彌國北者應指塔里木郭勒而言也又按塔里木郭勒西承喀什噶爾葉爾羌于闐諸河自為古河源合流東注之始水經注所載與今形勢頗合自杜佑作通典以水經為非據而後人因之駁辨紛如轉滋岐悮茲為摭録佑説而詳訂之如左杜佑通典水經所云河岀崑崙山者宜出於禹本記山海經所云南入葱嶺及出于闐南山者出於漢書西域傳而酈道元都不詳正所注河之發源亦引禹記山經釋法明遊天竺記釋氏西域記所註南入葱嶺一源出于闐山合流入蒲昌海雖約漢書亦不尋究又水經云出海外南至積石山下有石門然後南流入葱嶺據此則積石山當在葱嶺之北又云入塞過敦煌酒泉張掖郡南並今郡地也夫山水地形固有定體自葱嶺于闐之東至敦煌酒泉張掖之間華人來往非少從後漢至大唐圖籍相承註記不絶大磧距數千里未有桑田碧海之變陵遷谷移之談此處豈有河流纂集者不詳斯甚又按禹導河積石者堯時洪水下人昬墊禹所開決本救人患積石之西砂鹵之地河流小地勢復高不為人患此以施功發跡自積石山而東則今西平郡龍支縣界山是也固無禹理水之功自葱嶺之北其本紀荒唐撰經者取為準的班固云言九州者尚書近之矣誠為愜當其漢書西域傳云河水一源出葱嶺一源出于闐合流東注蒲昌海皆以潛流地下南出積石為中國河云比禹記山經猶較附近終是紕繆按此宜惟憑張騫使大夏見兩道水從葱嶺于闐合流入蒲昌海其于闐出美玉所以騫傳遂云窮河源也按古圖書名河所出曰崑崙山疑所謂古圖書即禹本記以于闐山出玉乃謂之崑崙即所出便云是河也窮究諸説悉皆謬誤孟堅又以禹貢云導河自積石遂疑潛流從此方出且漢時諸羌種衆雖多不相統一未為强國漢家或未嘗遣使詣西南羌中或未知自有河也寧有今吐蕃中河從西南數千里向東北流見與積石山下河相連聘使涉歴無不言之吐蕃自云崑崙山在國中西南則河之所出也又按尚書云織皮崑崙析支渠搜西戎即叙又後漢書云羌在漢金城郡之西南濵於賜支續漢書曰河闗西可千餘里有典羌謂之賜支盖析支也然則析支在積石之西是河之上流眀矣崑崙在土蕃中當亦非謬而不謂河之本源乃引葱嶺于闐之河謂從蒲昌伏流數千里至積石方出斯又班生之所未詳也佑以水經僻書代人多不知覩或有好事者於諸書中見有引處謂其審正此􅊋未之精也按葱嶺河源之説疑之者始於杜佑而宋歐陽忞元潘昻霄因之皆縁西域未𨽻版圖是以無從審正今葱嶺于闐咸𨽻版籍兩河合流之蹟較若列眉有可與山經水注諸書相發眀者考水經稱河水出海外南至積石山下有石門河水冒以西南流此指河源之發於積石山者下云河水又南入葱嶺山此指河源之發於蔥嶺于闐者一出海外而南行一入蔥嶺而東注上下文義各别而佑引經文則云南至積石山下有石門然後南流入蔥嶺强加然後二字使語氣混淆而因申其説以為積石山不當在蔥嶺之北不知水經原文固未嘗云積石山在蔥嶺北也漢書西域傳稱西域三十六國南北有大山中央有河今自蔥嶺以東和闐葉爾羌喀什噶爾阿克蘇赫色勒諸河羣流東下數千里按諸水經一一脗合而佑則以為自葱嶺于闐至敦煌酒泉張掖惟是大磧數千里並無河流其為紕繆更自顯著史記載漢使窮河源河源出于闐其山多玉石天子案古圖書名河所出山曰崑崙者史記夲意直云當時漢天子强名于闐山為崑崙未嘗以此為真崑崙也積石葱嶺于闐皆河所自出謂之河源者言崑崙之源於此乎發現耳水經既云河出崑崙墟南至積石山下又云河水南入葱嶺山又一源岀葱嶺于闐河與之合者見此二水同源崑崙而並行不悖又曷嘗専主葱嶺于闐之河而謂積石以上非河源所在耶佑於水經原文未暇詳審亦未睹西域水道全局執其偏端漫以古人為不足述至宋元以来襲謬承訛亦惟佑説為之先導有不足深論者矣哲克得布拉克哲克得布拉克在齋都伯西南四十里源出北山南麓哈喇布拉克哈喇布拉克在哲克得布拉克西南四十里源出北山南麓博羅和碩郭勒博羅和碩郭勒在玉斯屯阿喇圖什西南二十里源出西北山中東南流過阿喇圖什而止不通大河木什諤斯騰木什諤斯騰在喀什噶爾城北源出赫色勒郭勒北山中東南流過喀什噶爾城北㑹赫色勒郭勒入雅璊雅爾諤斯騰特們郭勒特們郭勒在木什諤斯騰北源出北山東西二源合而東南流入木什諤斯騰赫色勒郭勒赫色勒郭勒在喀什噶爾城南十五里源出北山麓東南流㑹特爾墨楚克郭勒入雅璊雅爾諤斯騰特爾墨楚克郭勒特爾墨楚克郭勒在赫色勒郭勒南五里西北山下同源異流在北為赫色勒南即此河東南流二百里而復合同入雅璊雅爾諤斯騰雅璊雅爾諤斯騰雅璊雅爾諤斯騰在特爾墨楚克郭勒南二十里源發蔥嶺出山東流經塔什巴里克城南名此河又東北流經喀什噶爾城南赫色勒特爾墨楚克二水合流北來㑹之名喀什噶爾達里雅喀什噶爾達里雅喀什噶爾達里雅在喀什噶爾城南五十里即雅璊雅爾之下流西北㑹赫色勒特爾墨楚克兩河之水又東行五百里逕巴爾楚克城南又東行六百里北㑹阿克蘇郭勒南㑹葉爾羌諤斯騰和闐郭勒入塔里木郭勒察罕烏蘇察罕烏蘇在英噶薩爾城南五里源出西山東流百餘里過英噶薩爾而止不通大河哈喇庫勒哈喇庫勒即雅璊雅爾諤斯騰上流在烏魯阿喇特達巴西北有兩源出北山中合流南行至此渟瀦成澤周圍百餘里又東出為雅璊雅爾諤斯騰葉爾羌諤斯騰葉爾羌諤斯騰在葉爾羌城北五十里源出西南葱嶺中屈曲出山東北流分為二道過葉爾羌城南名哈喇烏蘇又東行復合為一南㑹聴雜阿布諤斯騰東北行六百餘里入塔里木額爾勾郭勒東注羅布淖爾漢書西域傳河有兩原一出葱嶺山水經北河又東逕莎車國南按葉爾羌為古莎車國地葉爾羌郭勒經流城南應即水經所謂北河逕莎車國南者且莎車於後漢時雄長西域兼龜茲滅媯塞其國之北境闢地既廣則河流固當在國之南境矣其源出於西北葱嶺即漢書所謂河源一出葱嶺者証諸形勢灼然不誣至其下流歸墟之處東流千里詳見塔里木郭勒額爾勾郭勒羅布淖爾諸條下聴雜阿布諤斯騰聴雜阿布諤斯騰在葉爾羌城東南五十里源出庫克雅爾塔克北流出山經沙圖伯什阿里克托古斯恰特北㑹哈喇烏蘇入葉爾羌諤斯騰哈喇烏蘇哈喇烏蘇舊音喀喇烏蘇源出葉爾羌城西蔥嶺中東流逕城東乾隆二十三年十月將軍兆恵攻圍葉爾羌城未下從城東率師渡哈喇烏蘇進兵城南兵過河纔四百餘賊擁衆四五千騎迎戰持鳥鎗長鎗在前步行之賊分持棍棒𤓰斧在後彌望無數兆恵等以兵分三隊將軍居中副都統由屯居右鄂木布居左三隊齊進直衝賊陣將領親冒矢石為士卒先呼聲震天賊騎兵敗走分兵前後迎戰兆恵等奮勇衝擊賊騎敗已又分兵從兩旁來犯我師馬力絀不能馳驟總兵髙天喜副都統三格侍衛鄂實特通額死之因復踰哈喇烏蘇而東固守大營築堡堅壘鼓厲士氣上下一心賊時於堡外濬濠築臺決水灌營掘隧潜進百計掩襲我師隨機應禦三閲月無稍懈者復於營中掘得糧窖拾取鎗砲鉛丸日久士無饑色兵器彌利賊驚以為神㑹阿里衮奉㫖解馬千匹馳至富徳等亦統新調兵自阿克蘇南下大敗賊於呼拉瑪舊音呼爾璊兆恵等聞營北鎗礟聲遂駕雲梯選兵分兩翼直衝賊人負固處焚燒賊臺殺賊千有餘人富徳等亦分中軍兩翼自外殺賊三百餘人兩軍乃合還阿克蘇御製黒水行己夘喀喇烏蘓者唐言黒水同去年我軍薄回穴强弩之末難稱雄築壘黒水待圍解詎人力也天帡幪眀瑞馳驛踰月到毅勇承恩公明瑞領孝賢皇后姪也命以副都統兵行間為前鋒召回京問以被圍情狀自葉爾羌抵京路萬五千里疾馳踰月而至面詢其故悚予衷蜂蟻張甄數無萬三千餘人守從容窖米濟軍軍氣壯奚肯麥麴山鞠藭引水灌我我豫備逆回導渠淹我營壘將軍兆恵等豫開溝引之入河且轉資其用反資衆飲用益豐銃不中去聲人中營樹何至析骸薪材充著木銃鐵獲萬億賊據髙施銃鉛丸坌集營樹上我軍斫木為薪木中得鉛丸萬億即取以擊賊斃賊無算翻以擊賊賊計窮先是營内所穿井圍將解乃眢其中聞言為之悵諸臣實鞠躬隨復為之感天眷深信崇敬讀皇祖實録語所載曽聞我太宗時眀四總兵來戰正值大霧彌雺雺敵施火礟樹皆燬都統艾塔往視攻回奏敵礟止傷樹我兵曽無傷矢弓匪今伊昔䝉帝佑覲揚前烈勵予沖詎人力也天帡幪大清寰海欽皇風御製惜陣亡總兵髙天喜詩有序庚辰喀喇烏蘓之役我師渡河猝被賊遮時總兵髙天喜奉將軍令董率修橋在後聞將軍陷陣中乃捨橋衝入賊陣以致陣亡推恩優䘏如例凱還備悉其事詩以惜之始由小校出從征優擢竒雄至總兵留後修橋恥苟活復前入陣遂捐生緑旗中祗一人實絶域外傳千載名裹血結纓寧讓古詩非奨勇奬忠誠提斯衮諤斯騰提斯衮諤斯騰在葉爾羌諤斯騰東十里横當孔道不通大河庫森諤斯騰庫森諤斯騰在提斯衮南五里河身深廣不通大河和闐達里雅和闐達里雅源出皮什雅南五十里南山中北流將近皮什雅城南分為二道夾城而過城東曰玉隴哈什郭勒城西曰哈喇哈什郭勒俱北流四百里至喀提里什兩河交㑹是為和闐達里雅又北流五百里西㑹葉爾羌諤斯騰折而東流千有餘里入羅布淖爾又和闐達里雅北流盡處别有支河通葉爾羌亦名哈喇烏蘇史記大宛傳鹽澤潜行地下其南則河源出焉多玉石又云漢使窮河源河源出于窴其山多玉石采來天子案古圖書名河所出曰崑崙云漢書西域傳河有兩原一出于闐在南山下其河北流與葱嶺河合東注蒲昌海水經注南源導于闐南山俗謂之仇摩置自置北流逕于闐國西又西北流注於河即經所謂北注葱嶺河也按漢書稱從鄯善傍南山北波河西行至莎車為南道所謂河者當指和闐達里雅而言水經注所謂仇摩置者也魏書于闐國有樹枝水一名計式水即黄河也應亦指和闐達里雅而言玉隴哈什郭勒玉隴哈什郭勒為和闐達里雅上流出皮什雅南五十里南山中與哈喇哈什郭勒分道經皮什雅城東北流六十里至玉隴哈什城南又分為二夾城流六十里復合為一北至喀提里什東哈喇哈什郭勒自西南来㑹之入和闐達里雅其經流玉隴哈什城東處長三里出白玉魏書西域傳于闐城東三十里有苜拔河唐西域記王城東南百餘里有大河西北流國人利之以用溉田其後斷流王深怪異羅漢曰是龍所為耳宜速祠求當復昔利祠祭河龍忽有一女凌波而至求選大臣以為配偶大臣入河履水不溺濟乎中流麾鞭畫水水為中開白馬浮出負一􅗊檀大鼓懸城東南若有冦至鼓聲先震河水遂流至今利用嵗月浸逺龍鼓久無舊懸之處今仍有鼓池側伽藍荒圮無僧按今玉隴哈什郭勒在額里齊城東南境上北入河闐達里雅中分兩流行六十里而復合其西流為魏書所載樹枝水則東流應屬苜拔河也又唐西域記稱王城東南有大河應指今玉隴哈什北通和闐之河苐今額里齊城東境距河甚近則所謂東南百里者當指發源之處而言今負郭土田悉資引灌溉田之利記志非爽惟和闐不奉佛敎仰䝉聖訓精詳鏡示萬古羅漢伽藍均難徴信而龍女求配尤近於誣象敎所編聊資聞見而已哈喇哈什郭勒哈喇哈什郭勒亦和闐達里雅上流與玉隴哈什郭勒同源異流經皮什雅南西北流六十里至哈喇哈什城南亦分為二夾城而流城東之河距城二里東北流至喀提里仆入于和闐達里雅哈喇哈什城東有河三處並長三十里出青玉魏書西域傳于闐國城東二十里有大水北流號樹枝水即黄河也一名計式水城西五十五里亦有大水名達利水與樹枝水㑹俱北流晉髙居誨使于闐記河源所出至于闐分為三東曰白玉河西曰緑玉河又西曰烏玉河三河皆有玉而色異毎嵗秋水涸國王撈玉於河然後國人得撈玉按樹枝水即今玉隴哈什郭勒達利水即今哈喇哈什郭勒水流分合及兩水東西相距以古騐今若合符節又水有主輔此水自以樹枝為主而達利㑹之宋史載于闐玉河全用居誨語而云其國貢使云然眀史因之於采玉則用唐書月光盛處得玉之文盖史家未嘗身歴其境承用舊籍自不能有所正定也今考玉隴哈什河在東出白玉哈拉哈什河在西出緑玉是白玉緑玉兩河信而有徵所謂烏玉河者以地位求之應即今皂窪勒諤斯騰然未嘗出玉又回語謂黒為哈喇則哈喇哈什又應屬古之烏玉河也土人或言玊夲生南山中山水漲發隨流入河豈能取有常處玉有定色然顔延之詩璇源載圓折玉水記方流凡玉固有生於水者何疑於于闐之玉乎其水四時有玉當秋水涸取之為易唐書視月光得玉亦未必然皁窪勒諤斯騰皁窪勒諤斯騰在哈喇哈什西即哈喇哈什河分流北行百餘里而止不通他水克勒底雅郭勒克勒底雅郭勒在克勒底雅東十里南北經流二百餘里通葉什勒庫勒葉什勒庫勒葉什勒庫勒在南山中周圍十餘里克勒底雅郭勒南流入之唐西域記嫓摩川東入沙磧行二百餘里至尼壤城周三四里在大澤中澤地熱濕難以履涉蘆草荒茂無復途疆惟趣城路僅得通行故往來者莫不由此城焉唐書西域傳于闐東三百里有建徳力河按嫓摩川為齊爾拉城西境之河則由是東行二百里為尼壤城當即今克勒底雅城所謂大澤應即葉什勒庫勒克勒底雅郭勒應即西域傳之建徳力河其東即古拘彌國地烏蘭庫勒烏蘭庫勒在和闐西境葱嶺中周圍五十餘里不通他河布隆庫勒布隆庫勒在阿喇楚勒舊音阿爾楚爾今改正西百餘里周圍五十里水自拔達克山界内北流至此滙成巨澤居山谷間按唐書西域傳喝盤陀都城負徒多河喝盤陀為今塞爾勒克喀爾楚迤西諸境地則所謂徒多河者應屬布隆庫勒上流左行分出之河故得依山負險而立國於此也葉什勒庫勒淖爾葉什勒庫勒淖爾舊音伊西洱庫爾淖爾在布隆庫勒西四十里水勢深廣萬山環繞北通安集延西限蔥嶺南抵拔達克山副將軍富徳窮追逆回波羅泥都霍集占至此奔拔達克山遣使索俘二酋旋授首淖爾之上勒碑紀功以示萬世云御製平定回部勒銘伊西洱庫爾淖爾碑文機有視若失而反得智者之所懃而愚者之所惑也事有初若勞而終逸壯者之所劭而懦者之所怯也若夫定全回殲二酋戰無不克攻無不取皆二將軍及諸叅賛以及行間衆將士之力也然予亦有所深慰於其間者則以五年劼劬宵旰運籌狎至實未敢偷安於頃刻也幸我武保定庶因答乾貺慰先志且以免浮議之指斥也伊西洱庫爾淖爾者我副將軍富徳等窮追二酋至㧞達克山之界獲其降者萬人二酋僅以身免而遣使索俘遂得獻馘振旅以成茂勣也其地倚山臨水單騎可容而我突將無前四甄並發如入無人之域也賊衆首尾不能相顧堅我回纛以招之降者鋪崖以來霍集占持刅止之或且反戈倒㦸也是以二酋見事不成㧞身逺跳駾突而喙息也先是蹙之於霍斯庫魯克襲之於阿爾楚爾無不以少勝衆批亢擣堅桓桓之士真如驅虎豹而逐貍纒頭碩鼻者流皆惃惃踉踉見即辟易也是以先聲異域駭其跳盪遮逆助順用攫重輜而獻兇級也我兵未深入拔達克山境者則以討逆之師不蹂無罪之地姑遣使焉彼或曉逆順亦將擒獻是以將帥之臣審機度時我武少輯也卒蕆事而告成功則亦未為計之失也回部始末已見於勒銘葉爾竒木之碑辭不復綴也特紀耆定之在茲是以誌嵗月而刻石也唐書吐蕃傳吐蕃并西洱河諸蠻盡臣羊同党項諸羌其地東與松茂嶲接南極婆羅門西取四鎮北抵突厥幅員餘萬里漢魏諸戎所無也按西洱河疑即今葉什勒庫勒淖爾舊音為伊西洱庫爾者其地曽入吐蕃以大勢論之吐蕃西取四鎮而疏勒西盡葱嶺則自焉耆以西割據廣逺亦當以葱嶺為其邊陲也欽定皇輿西域圖志卷二十八欽定四庫全書欽定皇輿西域圖志巻二十八水五天山南路二塔里木郭勒塔里木郭勒在阿克蘇東南三百里西域大川源出葱嶺者二喀什噶爾達里雅葉爾羌諤斯騰皆東流出南山者一和闐達里雅北流出北山者一阿克蘇郭勒南流咸㑹於此合而東流六百餘里統名塔里木郭勒又東入額爾勾郭勒又東入羅布淖爾按水經載南河東北逕扜彌國北又北河東逕姑墨國南姑墨故地在拜之西阿克蘇之東塔里木郭勒經其南踰河入砂磧地屬于闐東境為古扜彌國地正當塔里木郭勒之北是水經所謂東逕姑墨國南扜彌國北者應指塔里木郭勒而言也又按塔里木郭勒西承喀什噶爾葉爾羌于闐諸河自為古河源合流東注之始水經注所載與今形勢頗合自杜佑作通典以水經為非據而後人因之駁辨紛如轉滋岐悮茲為摭録佑説而詳訂之如左杜佑通典水經所云河岀崑崙山者宜出於禹本記山海經所云南入葱嶺及出于闐南山者出於漢書西域傳而酈道元都不詳正所注河之發源亦引禹記山經釋法明遊天竺記釋氏西域記所註南入葱嶺一源出于闐山合流入蒲昌海雖約漢書亦不尋究又水經云出海外南至積石山下有石門然後南流入葱嶺據此則積石山當在葱嶺之北又云入塞過敦煌酒泉張掖郡南並今郡地也夫山水地形固有定體自葱嶺于闐之東至敦煌酒泉張掖之間華人來往非少從後漢至大唐圖籍相承註記不絶大磧距數千里未有桑田碧海之變陵遷谷移之談此處豈有河流纂集者不詳斯甚又按禹導河積石者堯時洪水下人昬墊禹所開決本救人患積石之西砂鹵之地河流小地勢復高不為人患此以施功發跡自積石山而東則今西平郡龍支縣界山是也固無禹理水之功自葱嶺之北其本紀荒唐撰經者取為準的班固云言九州者尚書近之矣誠為愜當其漢書西域傳云河水一源出葱嶺一源出于闐合流東注蒲昌海皆以潛流地下南出積石為中國河云比禹記山經猶較附近終是紕繆按此宜惟憑張騫使大夏見兩道水從葱嶺于闐合流入蒲昌海其于闐出美玉所以騫傳遂云窮河源也按古圖書名河所出曰崑崙山疑所謂古圖書即禹本記以于闐山出玉乃謂之崑崙即所出便云是河也窮究諸説悉皆謬誤孟堅又以禹貢云導河自積石遂疑潛流從此方出且漢時諸羌種衆雖多不相統一未為强國漢家或未嘗遣使詣西南羌中或未知自有河也寧有今吐蕃中河從西南數千里向東北流見與積石山下河相連聘使涉歴無不言之吐蕃自云崑崙山在國中西南則河之所出也又按尚書云織皮崑崙析支渠搜西戎即叙又後漢書云羌在漢金城郡之西南濵於賜支續漢書曰河闗西可千餘里有典羌謂之賜支盖析支也然則析支在積石之西是河之上流眀矣崑崙在土蕃中當亦非謬而不謂河之本源乃引葱嶺于闐之河謂從蒲昌伏流數千里至積石方出斯又班生之所未詳也佑以水經僻書代人多不知覩或有好事者於諸書中見有引處謂其審正此􅊋未之精也按葱嶺河源之説疑之者始於杜佑而宋歐陽忞元潘昻霄因之皆縁西域未𨽻版圖是以無從審正今葱嶺于闐咸𨽻版籍兩河合流之蹟較若列眉有可與山經水注諸書相發眀者考水經稱河水出海外南至積石山下有石門河水冒以西南流此指河源之發於積石山者下云河水又南入葱嶺山此指河源之發於蔥嶺于闐者一出海外而南行一入蔥嶺而東注上下文義各别而佑引經文則云南至積石山下有石門然後南流入蔥嶺强加然後二字使語氣混淆而因申其説以為積石山不當在蔥嶺之北不知水經原文固未嘗云積石山在蔥嶺北也漢書西域傳稱西域三十六國南北有大山中央有河今自蔥嶺以東和闐葉爾羌喀什噶爾阿克蘇赫色勒諸河羣流東下數千里按諸水經一一脗合而佑則以為自葱嶺于闐至敦煌酒泉張掖惟是大磧數千里並無河流其為紕繆更自顯著史記載漢使窮河源河源出于闐其山多玉石天子案古圖書名河所出山曰崑崙者史記夲意直云當時漢天子强名于闐山為崑崙未嘗以此為真崑崙也積石葱嶺于闐皆河所自出謂之河源者言崑崙之源於此乎發現耳水經既云河出崑崙墟南至積石山下又云河水南入葱嶺山又一源岀葱嶺于闐河與之合者見此二水同源崑崙而並行不悖又曷嘗専主葱嶺于闐之河而謂積石以上非河源所在耶佑於水經原文未暇詳審亦未睹西域水道全局執其偏端漫以古人為不足述至宋元以来襲謬承訛亦惟佑説為之先導有不足深論者矣哲克得布拉克哲克得布拉克在齋都伯西南四十里源出北山南麓哈喇布拉克哈喇布拉克在哲克得布拉克西南四十里源出北山南麓博羅和碩郭勒博羅和碩郭勒在玉斯屯阿喇圖什西南二十里源出西北山中東南流過阿喇圖什而止不通大河木什諤斯騰木什諤斯騰在喀什噶爾城北源出赫色勒郭勒北山中東南流過喀什噶爾城北㑹赫色勒郭勒入雅璊雅爾諤斯騰特們郭勒特們郭勒在木什諤斯騰北源出北山東西二源合而東南流入木什諤斯騰赫色勒郭勒赫色勒郭勒在喀什噶爾城南十五里源出北山麓東南流㑹特爾墨楚克郭勒入雅璊雅爾諤斯騰特爾墨楚克郭勒特爾墨楚克郭勒在赫色勒郭勒南五里西北山下同源異流在北為赫色勒南即此河東南流二百里而復合同入雅璊雅爾諤斯騰雅璊雅爾諤斯騰雅璊雅爾諤斯騰在特爾墨楚克郭勒南二十里源發蔥嶺出山東流經塔什巴里克城南名此河又東北流經喀什噶爾城南赫色勒特爾墨楚克二水合流北來㑹之名喀什噶爾達里雅喀什噶爾達里雅喀什噶爾達里雅在喀什噶爾城南五十里即雅璊雅爾之下流西北㑹赫色勒特爾墨楚克兩河之水又東行五百里逕巴爾楚克城南又東行六百里北㑹阿克蘇郭勒南㑹葉爾羌諤斯騰和闐郭勒入塔里木郭勒察罕烏蘇察罕烏蘇在英噶薩爾城南五里源出西山東流百餘里過英噶薩爾而止不通大河哈喇庫勒哈喇庫勒即雅璊雅爾諤斯騰上流在烏魯阿喇特達巴西北有兩源出北山中合流南行至此渟瀦成澤周圍百餘里又東出為雅璊雅爾諤斯騰葉爾羌諤斯騰葉爾羌諤斯騰在葉爾羌城北五十里源出西南葱嶺中屈曲出山東北流分為二道過葉爾羌城南名哈喇烏蘇又東行復合為一南㑹聴雜阿布諤斯騰東北行六百餘里入塔里木額爾勾郭勒東注羅布淖爾漢書西域傳河有兩原一出葱嶺山水經北河又東逕莎車國南按葉爾羌為古莎車國地葉爾羌郭勒經流城南應即水經所謂北河逕莎車國南者且莎車於後漢時雄長西域兼龜茲滅媯塞其國之北境闢地既廣則河流固當在國之南境矣其源出於西北葱嶺即漢書所謂河源一出葱嶺者証諸形勢灼然不誣至其下流歸墟之處東流千里詳見塔里木郭勒額爾勾郭勒羅布淖爾諸條下聴雜阿布諤斯騰聴雜阿布諤斯騰在葉爾羌城東南五十里源出庫克雅爾塔克北流出山經沙圖伯什阿里克托古斯恰特北㑹哈喇烏蘇入葉爾羌諤斯騰哈喇烏蘇哈喇烏蘇舊音喀喇烏蘇源出葉爾羌城西蔥嶺中東流逕城東乾隆二十三年十月將軍兆恵攻圍葉爾羌城未下從城東率師渡哈喇烏蘇進兵城南兵過河纔四百餘賊擁衆四五千騎迎戰持鳥鎗長鎗在前步行之賊分持棍棒𤓰斧在後彌望無數兆恵等以兵分三隊將軍居中副都統由屯居右鄂木布居左三隊齊進直衝賊陣將領親冒矢石為士卒先呼聲震天賊騎兵敗走分兵前後迎戰兆恵等奮勇衝擊賊騎敗已又分兵從兩旁來犯我師馬力絀不能馳驟總兵髙天喜副都統三格侍衛鄂實特通額死之因復踰哈喇烏蘇而東固守大營築堡堅壘鼓厲士氣上下一心賊時於堡外濬濠築臺決水灌營掘隧潜進百計掩襲我師隨機應禦三閲月無稍懈者復於營中掘得糧窖拾取鎗砲鉛丸日久士無饑色兵器彌利賊驚以為神㑹阿里衮奉㫖解馬千匹馳至富徳等亦統新調兵自阿克蘇南下大敗賊於呼拉瑪舊音呼爾璊兆恵等聞營北鎗礟聲遂駕雲梯選兵分兩翼直衝賊人負固處焚燒賊臺殺賊千有餘人富徳等亦分中軍兩翼自外殺賊三百餘人兩軍乃合還阿克蘇御製黒水行己夘喀喇烏蘓者唐言黒水同去年我軍薄回穴强弩之末難稱雄築壘黒水待圍解詎人力也天帡幪眀瑞馳驛踰月到毅勇承恩公明瑞領孝賢皇后姪也命以副都統兵行間為前鋒召回京問以被圍情狀自葉爾羌抵京路萬五千里疾馳踰月而至面詢其故悚予衷蜂蟻張甄數無萬三千餘人守從容窖米濟軍軍氣壯奚肯麥麴山鞠藭引水灌我我豫備逆回導渠淹我營壘將軍兆恵等豫開溝引之入河且轉資其用反資衆飲用益豐銃不中去聲人中營樹何至析骸薪材充著木銃鐵獲萬億賊據髙施銃鉛丸坌集營樹上我軍斫木為薪木中得鉛丸萬億即取以擊賊斃賊無算翻以擊賊賊計窮先是營内所穿井圍將解乃眢其中聞言為之悵諸臣實鞠躬隨復為之感天眷深信崇敬讀皇祖實録語所載曽聞我太宗時眀四總兵來戰正值大霧彌雺雺敵施火礟樹皆燬都統艾塔往視攻回奏敵礟止傷樹我兵曽無傷矢弓匪今伊昔䝉帝佑覲揚前烈勵予沖詎人力也天帡幪大清寰海欽皇風御製惜陣亡總兵髙天喜詩有序庚辰喀喇烏蘓之役我師渡河猝被賊遮時總兵髙天喜奉將軍令董率修橋在後聞將軍陷陣中乃捨橋衝入賊陣以致陣亡推恩優䘏如例凱還備悉其事詩以惜之始由小校出從征優擢竒雄至總兵留後修橋恥苟活復前入陣遂捐生緑旗中祗一人實絶域外傳千載名裹血結纓寧讓古詩非奨勇奬忠誠提斯衮諤斯騰提斯衮諤斯騰在葉爾羌諤斯騰東十里横當孔道不通大河庫森諤斯騰庫森諤斯騰在提斯衮南五里河身深廣不通大河和闐達里雅和闐達里雅源出皮什雅南五十里南山中北流將近皮什雅城南分為二道夾城而過城東曰玉隴哈什郭勒城西曰哈喇哈什郭勒俱北流四百里至喀提里什兩河交㑹是為和闐達里雅又北流五百里西㑹葉爾羌諤斯騰折而東流千有餘里入羅布淖爾又和闐達里雅北流盡處别有支河通葉爾羌亦名哈喇烏蘇史記大宛傳鹽澤潜行地下其南則河源出焉多玉石又云漢使窮河源河源出于窴其山多玉石采來天子案古圖書名河所出曰崑崙云漢書西域傳河有兩原一出于闐在南山下其河北流與葱嶺河合東注蒲昌海水經注南源導于闐南山俗謂之仇摩置自置北流逕于闐國西又西北流注於河即經所謂北注葱嶺河也按漢書稱從鄯善傍南山北波河西行至莎車為南道所謂河者當指和闐達里雅而言水經注所謂仇摩置者也魏書于闐國有樹枝水一名計式水即黄河也應亦指和闐達里雅而言玉隴哈什郭勒玉隴哈什郭勒為和闐達里雅上流出皮什雅南五十里南山中與哈喇哈什郭勒分道經皮什雅城東北流六十里至玉隴哈什城南又分為二夾城流六十里復合為一北至喀提里什東哈喇哈什郭勒自西南来㑹之入和闐達里雅其經流玉隴哈什城東處長三里出白玉魏書西域傳于闐城東三十里有苜拔河唐西域記王城東南百餘里有大河西北流國人利之以用溉田其後斷流王深怪異羅漢曰是龍所為耳宜速祠求當復昔利祠祭河龍忽有一女凌波而至求選大臣以為配偶大臣入河履水不溺濟乎中流麾鞭畫水水為中開白馬浮出負一􅗊檀大鼓懸城東南若有冦至鼓聲先震河水遂流至今利用嵗月浸逺龍鼓久無舊懸之處今仍有鼓池側伽藍荒圮無僧按今玉隴哈什郭勒在額里齊城東南境上北入河闐達里雅中分兩流行六十里而復合其西流為魏書所載樹枝水則東流應屬苜拔河也又唐西域記稱王城東南有大河應指今玉隴哈什北通和闐之河苐今額里齊城東境距河甚近則所謂東南百里者當指發源之處而言今負郭土田悉資引灌溉田之利記志非爽惟和闐不奉佛敎仰䝉聖訓精詳鏡示萬古羅漢伽藍均難徴信而龍女求配尤近於誣象敎所編聊資聞見而已哈喇哈什郭勒哈喇哈什郭勒亦和闐達里雅上流與玉隴哈什郭勒同源異流經皮什雅南西北流六十里至哈喇哈什城南亦分為二夾城而流城東之河距城二里東北流至喀提里仆入于和闐達里雅哈喇哈什城東有河三處並長三十里出青玉魏書西域傳于闐國城東二十里有大水北流號樹枝水即黄河也一名計式水城西五十五里亦有大水名達利水與樹枝水㑹俱北流晉髙居誨使于闐記河源所出至于闐分為三東曰白玉河西曰緑玉河又西曰烏玉河三河皆有玉而色異毎嵗秋水涸國王撈玉於河然後國人得撈玉按樹枝水即今玉隴哈什郭勒達利水即今哈喇哈什郭勒水流分合及兩水東西相距以古騐今若合符節又水有主輔此水自以樹枝為主而達利㑹之宋史載于闐玉河全用居誨語而云其國貢使云然眀史因之於采玉則用唐書月光盛處得玉之文盖史家未嘗身歴其境承用舊籍自不能有所正定也今考玉隴哈什河在東出白玉哈拉哈什河在西出緑玉是白玉緑玉兩河信而有徵所謂烏玉河者以地位求之應即今皂窪勒諤斯騰然未嘗出玉又回語謂黒為哈喇則哈喇哈什又應屬古之烏玉河也土人或言玊夲生南山中山水漲發隨流入河豈能取有常處玉有定色然顔延之詩璇源載圓折玉水記方流凡玉固有生於水者何疑於于闐之玉乎其水四時有玉當秋水涸取之為易唐書視月光得玉亦未必然皁窪勒諤斯騰皁窪勒諤斯騰在哈喇哈什西即哈喇哈什河分流北行百餘里而止不通他水克勒底雅郭勒克勒底雅郭勒在克勒底雅東十里南北經流二百餘里通葉什勒庫勒葉什勒庫勒葉什勒庫勒在南山中周圍十餘里克勒底雅郭勒南流入之唐西域記嫓摩川東入沙磧行二百餘里至尼壤城周三四里在大澤中澤地熱濕難以履涉蘆草荒茂無復途疆惟趣城路僅得通行故往來者莫不由此城焉唐書西域傳于闐東三百里有建徳力河按嫓摩川為齊爾拉城西境之河則由是東行二百里為尼壤城當即今克勒底雅城所謂大澤應即葉什勒庫勒克勒底雅郭勒應即西域傳之建徳力河其東即古拘彌國地烏蘭庫勒烏蘭庫勒在和闐西境葱嶺中周圍五十餘里不通他河布隆庫勒布隆庫勒在阿喇楚勒舊音阿爾楚爾今改正西百餘里周圍五十里水自拔達克山界内北流至此滙成巨澤居山谷間按唐書西域傳喝盤陀都城負徒多河喝盤陀為今塞爾勒克喀爾楚迤西諸境地則所謂徒多河者應屬布隆庫勒上流左行分出之河故得依山負險而立國於此也葉什勒庫勒淖爾葉什勒庫勒淖爾舊音伊西洱庫爾淖爾在布隆庫勒西四十里水勢深廣萬山環繞北通安集延西限蔥嶺南抵拔達克山副將軍富徳窮追逆回波羅泥都霍集占至此奔拔達克山遣使索俘二酋旋授首淖爾之上勒碑紀功以示萬世云御製平定回部勒銘伊西洱庫爾淖爾碑文機有視若失而反得智者之所懃而愚者之所惑也事有初若勞而終逸壯者之所劭而懦者之所怯也若夫定全回殲二酋戰無不克攻無不取皆二將軍及諸叅賛以及行間衆將士之力也然予亦有所深慰於其間者則以五年劼劬宵旰運籌狎至實未敢偷安於頃刻也幸我武保定庶因答乾貺慰先志且以免浮議之指斥也伊西洱庫爾淖爾者我副將軍富徳等窮追二酋至㧞達克山之界獲其降者萬人二酋僅以身免而遣使索俘遂得獻馘振旅以成茂勣也其地倚山臨水單騎可容而我突將無前四甄並發如入無人之域也賊衆首尾不能相顧堅我回纛以招之降者鋪崖以來霍集占持刅止之或且反戈倒㦸也是以二酋見事不成㧞身逺跳駾突而喙息也先是蹙之於霍斯庫魯克襲之於阿爾楚爾無不以少勝衆批亢擣堅桓桓之士真如驅虎豹而逐貍纒頭碩鼻者流皆惃惃踉踉見即辟易也是以先聲異域駭其跳盪遮逆助順用攫重輜而獻兇級也我兵未深入拔達克山境者則以討逆之師不蹂無罪之地姑遣使焉彼或曉逆順亦將擒獻是以將帥之臣審機度時我武少輯也卒蕆事而告成功則亦未為計之失也回部始末已見於勒銘葉爾竒木之碑辭不復綴也特紀耆定之在茲是以誌嵗月而刻石也唐書吐蕃傳吐蕃并西洱河諸蠻盡臣羊同党項諸羌其地東與松茂嶲接南極婆羅門西取四鎮北抵突厥幅員餘萬里漢魏諸戎所無也按西洱河疑即今葉什勒庫勒淖爾舊音為伊西洱庫爾者其地曽入吐蕃以大勢論之吐蕃西取四鎮而疏勒西盡葱嶺則自焉耆以西割據廣逺亦當以葱嶺為其邊陲也欽定皇輿西域圖志卷二十八
