body:
  text: 封爵二哈密屬康熙三十五年囘部伯克額貝都勒拉内附居哈密三十六年以擒準噶爾噶勒丹子色布騰巴勒珠爾功授一等扎薩克編旗分視各䝉古額貝都勒拉卒子郭帕嗣郭帕卒子額敏嗣雍正五年封鎮國公為受爵之始嗣後世効忠欵襲爵罔替為類叙於左額敏初封鎮國公晉封固山貝子玉素富額敏子襲封鎮國公累封固山貝子多羅貝勒多羅郡王伊斯阿克玉素富子降襲多羅貝勒加郡王品級按額敏之父額貝多勒拉以擒獻準夷得邀封錫由是奕世受封玉素富於西師之役從征山南囘部駐守烏什辦事勤奮乾隆二十五年入覲恩賚有加二十六年諭與土爾番郡王額敏和卓更番前赴新疆囘部駐防不惟世爵增榮即倚任亦綦重已土爾番屬土爾番屬囘酋額敏和卓於雍正初年避準噶爾侵掠遷魯克察克十二年内移瓜州在今安西府敦煌縣境乾隆十九年從征準噶爾抵伊犂二十年從征回部得㫖錫公爵為受封之始二十四年還居魯克察克子並以勞績封公逾於世及恒例云額敏和卓初封鎮國公累封固山貝子多羅貝勒多羅郡王蘇賚滿額敏和卓子封輔國公木薩額敏和卓次子封輔國公按額敏和卓為囘部舊人從征西域移駐新疆與哈宻郡王玉素富更番休息皇上嘉其勞勩錫爵酬勲有子克家恩施並逮且以功臣圖形紫光閣御製像賛華衮增榮迥非尋常内面之侣所能企及矣烏什諸城屬乾隆二十年六月王師抵伊犂逹瓦齊竄走定北將軍班第等檄山南諸囘部助擒烏什城阿竒木伯克霍集斯奉檄計擒達瓦齊而伯克鄂對亦于伊犂平後順時歸附授散秩大臣從征囘部䝉恩錫爵霍什克伯克等先後封賚有差為類敘于左霍集斯初授貝子品級尋封固山貝子累封多羅貝勒多羅郡王鄂對初授公品級尋封固山貝子加貝勒品級霍什克伯克封輔國公額色尹封輔國公噶岱黙特封輔國公阿什黙特封輔國公漠洎帕爾霍集斯子封輔國公以罪除莽噶里克封輔國公以叛除按霍集斯伯克以囘部望族於擒獻達瓦齊後為小和卓木所懾遷延觀釁及我師進討烏什霍集斯復携衆獻城降偕鄂對隨營効力自黒水之役堅壁厲志阿爾楚克伊什勒淖爾諸戰屢著勲能用是圖形紫光仰荷丹毫品藻不可謂非識時之傑我皇上以推置之天懐寓保全之至計且令備藩京邸弗假事權隠荷聖主之生成者匪淺鮮已又考囘教相傳始于墨克墨徳那諸國今天山南路派噶木巴爾屬為其的傳繼青吉斯汗屬以君其國者派噶木巴爾四子俱夭以女妻阿里而傳其教諸回部屬焉至波羅泥都霍集占為第三十世準噶爾自策妄阿喇布坦時征服回部執其酋長拘于阿巴噶斯哈丹部并移所屬回民若干户至彼為之耕種我師平定伊犂時其酋長波羅泥都霍集占獻欵輸誠將軍班第等出諸囚繫之中縱還故土俾撫収山南諸回部並遣副都統阿敏道往㑹盟而兩酋狡黠背叛計害阿敏道因移師往討追竄至㧞達克山而斃設令兩酋堅心内面且當與霍集斯等並承渥澤而乃狼心不靖卒就芟夷即負恩者之自外栽培彌徴効順者之能歸帡覆亦惟人所自為而已霍集斯始祖為莽蘓爾至霍集斯為第六世霍什克伯克始祖為阿錫木至霍什克伯克亦第六世均與派噶木巴爾異族云漢書西域傳鄯善國本名樓蘭元鳳四年遣平樂監傳介子往刺其王乃立尉屠耆為王更名其國為鄯善罽賔王烏頭勞死子代立遣使奉獻漢使闗都尉文忠送其使王欲害忠忠覺之廼與容屈王子隂末赴共合謀攻罽賔殺其王立隂末赴為罽賔王授印綬莎車國王無子死時萬年在漢萬年為烏孫公主小子莎車國人計欲自託于漢又欲得烏孫心即上書請萬年為莎車王漢許之遣使者奚充國送萬年萬年初立暴惡莎車王弟呼屠徴殺萬年并殺漢使者自立為王㑹衛侯馮奉世使送大宛客即以便宜發諸國兵擊殺之更立佗昆弟子為莎車王是嵗元康元年也後漢書西域傳順帝永建四年于窴王放前殺拘彌王興自立其子為拘彌王而遣使者貢獻于漢陽嘉元年徐由敦煌太守遣疏勒王臣槃擊于窴破之更立興宗人成國為拘彌王而還建武五年河西大將軍竇融承制立康莎車國王為漢莎車建功懐徳王九年康死謚宣成王弟賢代立十七年遣使奉獻請都䕶帝乃因其使賜賢西域都䕶印綬敦煌太守裴遵上言不可假以事權又令諸國失望詔書収還都䕶印綬更賜賢以漢大將軍印綬賢由是始恨而猶詐稱大都䕶移書諸國諸國服屬焉號賢為單于明帝永平十六年龜兹王建攻殺疏勒王成自以龜兹左侯兜題為疏勒王冬漢遣軍司馬班超刼縛兜題而立成之兄子忠為疏勒王忠後反畔超擊斬之永元六年都䕶班超發諸國兵討焉耆危湏尉黎山國遂斬焉耆尉黎二王首傳送京師懸蠻夷邸超乃立焉耆左侯元孟為王尉黎危湏山國皆更立其王魏書髙昌傳延昌中以嘉髙昌王麴嘉為持節平西将軍𤓰州刺史泰臨縣開國伯私署王如故嘉死子堅立普泰初堅遣使朝貢除平西將軍𤓰州刺史泰臨縣伯如故又加衛將軍至永熙中特除儀同三司進為郡公西域傳鄯善國王真逹降詣京師世祖厚待之拜交趾公韓牧為假節征西將軍領䕶西戎校尉鄯善王以鎮之蠕蠕傳肅宗時封阿那瓌朔方郡公蠕蠕王賜以衣冕加之軺葢禄從儀衛同于戚藩髙車傳伊匐王名復國遣使奉表于是詔遣使者谷楷等拜為鎮西將軍西海郡開國公髙車王唐書西域傳髙昌降俘智盛君臣獻觀徳殿行飲至禮酺三日智盛拜左武衛將軍金城郡公弟智湛右武衛中郎將天山郡公子昭好學歴司膳卿弟崇裕有武藝永徽中為右武衛翊府中郎將封交河郡王吐谷渾降國人立順順為王長子舊質于隋為金紫光禄大夫為王稱臣内附詔封西平郡王號趉胡吕烏甘豆可汗為下所殺立其子燕王諾曷鉢詔封河源郡王號烏地也抜勒豆可汗與吐蕃相攻諾曷鉢不支走凉州吐蕃遂有其地諾曷鉢請内徙乾封初更封青海國王諾曷鉢死子忠立忠死子宣超立聖厯三年拜左豹韜員外大將軍襲故可汗號宣超死子曦皓立皓死子兆立貞元十四年以朔方節度副使左金吾衛大將軍慕容復為長樂都督青海國王襲可汗號復死停襲焉耆國突騎支不朝貢安西都䕶郭孝恪討之執突騎支更以栗婆準攝國事屈利啜以兵救焉耆囚栗婆準更使吐屯攝王帝曰焉耆我所下爾乃王之耶吐屯懼不敢王焉耆立栗婆準而從兄薛婆阿那支自為王執栗婆準獻龜兹殺之阿史那社尒討龜兹阿那支抗王師為社尒所擒斬以狥立突騎支弟婆伽利為王婆伽利死國人請還前王突騎支髙宗許之龜兹佐焉耆社尒圍之數月執王立王弟葉䕶王其國帝始徙安西都䕶于其都復封訶黎布失畢為龜兹王王死更立子素稽為王疏勒儀鳯時吐蕃破其國開元十六年始遣大理正喬夢松攝鴻臚少卿冊其君安定為疏勒王于闐擊吐蕃有功以其地為毗沙都督府析十州授伏闍雄都督死武后立其子璥璥死復立尉遲伏師戰為王死伏闍逹嗣并冊其妻執失為妃死尉遲珪嗣妻馬為妃珪死子勝立至徳初以兵赴難因請留宿衛乾元三年以其弟左監門衛率葉䕶曜為太僕員外卿同四鎮節度副使權知本國事五代史四夷附録囬鶻當五代之際有居甘州西州者而甘州回鶻數至唐莊宗時王仁美遣使來貢自稱權知可汗莊宗即冊仁美為英義可汗天成二年權知國事王仁裕遣李阿山等來明宗冊仁裕為順化可汗晉髙祖時又冊為奉化可汗晉天福三年于闐國王李聖天遣使來貢冊聖天為大寳于闐國王宋史外國傳嘉祐八年于闐遣使獻方物以其國王為特進歸忠保順􅠫鱗黒韓王咸平四年回鶻可汗王禄勝遣使曹萬通來貢特授萬通左神武軍大將軍天聖元年甘州夜落隔通順遣使來貢六月詔甘州囘鶻外甥可汗王特封歸宗保順可汗王興國五年贈元忠沙州帥曹元忠時已卒子延禄遣人來貢燉煌郡王授延禄本軍節度咸平四年封延禄為譙郡王明史西域傳哈宻昻克特穆爾舊作安克帖木兒今改正來朝貢請封乃封為忠順王死以兄子托克托舊作脫脫今改正為王卒封托克托從弟托里特穆爾舊作力帖木兒今改正為忠義王賜印誥玉帶卒命故王托克托子布逹錫里舊作卜答失里今改正嗣忠順王布逹錫里年幼命托歡特穆爾舊作脫歡帖木兒今改正嗣忠義王同理國事正統二年托歡持穆爾卒封其子托克托特穆爾舊作脫脫塔木兒今改正為忠義王未幾卒已而忠順王亦卒封其子徳斡逹實里舊作倒瓦答失里今改正為忠順王天順元年徳斡逹實里卒弟布拉噶舊作卜列革今改正遣使告哀即封為忠順王四年王卒國人請立巴圖穆爾舊作把塔木兒今改正以王母不肯無王者八年乃擢巴圖穆爾為右都督攝行國王事賜之誥印成化八年巴圖穆爾子哈森舊作罕慎今改正以父卒請嗣職帝許之而不命其主國事十年乃命哈森權主國事𢎞治元年從其國人請封哈森為忠順王土爾番阿哈麻舊作阿黒麻今改正誘而殺之五年立善巴舊作陜巴今改正為忠順王賜誥印冠服六年阿哈麻執善巴十一年善巴仍舊封還哈宻十八年冬善巴卒其子巴雅濟舊作拜牙即今改正自稱素爾坦舊作速檀今改正命封為忠順王按回部居天山南為漢三十六國唐四鎮地其時雖間受中朝冊封佩印綬而地不歸於版索户不上於司農國既叛服不常王亦廢立無定五代以降聲教漸淪山北回鶻散處山南偶或冊名可汗而衰弱已甚逺者惟于闐通使虚錫封號他無聞焉明代經營遺迹止在哈密中間倉猝多故至無王者八年更安能長駕逺馭訖萬里之遙列五等之位乎稽昔回部酋長惟青吉斯名汗餘則㮣稱和卓若王公諸爵亦均未著於和通嗣世之餘兹以聖化之遐敷致天方之來格舊藩新附並列冠裳而且炳勲烈於丹青荷品題於藻翰豈非千古一時為往牒所罕能儷美者哉附準部回部諸爵官屬禄制汗親王官屬頭等䕶衛職衘花翎長史一員頭等花翎䕶衛六員二等藍翎䕶衛六員三等藍翎䕶衛八員四五品頂帶典儀二員郡王官屬頭等䕶衛職銜花翎長史一員頭等花翎䕶衛六員二等藍翎䕶衛四員三等藍翎䕶衛五員四五品頂帶典儀二員貝勒官屬二等䕶衛職銜藍翎長史一員二等藍翎䕶衛二員三等藍翎䕶衛四員五六品頂帶典儀二員貝子官屬三等藍翎䕶衛六員五六品頂帶典儀二員公官屬三等藍翎䕶衛六員七八品頂帶典儀二員汗歳俸銀二千五百兩幣四十親王歳俸銀二千兩幣二十五郡王歳俸銀一千二百兩幣十五貝勒歳俸銀八百兩幣十三貝子歳俸銀五百兩幣十鎮國公歳俸銀三百兩幣九輔國公歳俸銀二百兩幣七按凡給雙親王俸者官屬倍增世子歳俸銀一千五百兩幣二十餘如扎薩克頭等台吉歳俸銀一百兩幣四官屬不具不在列爵之數云欽定皇輿西域圖志卷三十八欽定四庫全書欽定皇輿西域圖志卷三十八封爵二哈密屬康熙三十五年囘部伯克額貝都勒拉内附居哈密三十六年以擒準噶爾噶勒丹子色布騰巴勒珠爾功授一等扎薩克編旗分視各䝉古額貝都勒拉卒子郭帕嗣郭帕卒子額敏嗣雍正五年封鎮國公為受爵之始嗣後世効忠欵襲爵罔替為類叙於左額敏初封鎮國公晉封固山貝子玉素富額敏子襲封鎮國公累封固山貝子多羅貝勒多羅郡王伊斯阿克玉素富子降襲多羅貝勒加郡王品級按額敏之父額貝多勒拉以擒獻準夷得邀封錫由是奕世受封玉素富於西師之役從征山南囘部駐守烏什辦事勤奮乾隆二十五年入覲恩賚有加二十六年諭與土爾番郡王額敏和卓更番前赴新疆囘部駐防不惟世爵增榮即倚任亦綦重已土爾番屬土爾番屬囘酋額敏和卓於雍正初年避準噶爾侵掠遷魯克察克十二年内移瓜州在今安西府敦煌縣境乾隆十九年從征準噶爾抵伊犂二十年從征回部得㫖錫公爵為受封之始二十四年還居魯克察克子並以勞績封公逾於世及恒例云額敏和卓初封鎮國公累封固山貝子多羅貝勒多羅郡王蘇賚滿額敏和卓子封輔國公木薩額敏和卓次子封輔國公按額敏和卓為囘部舊人從征西域移駐新疆與哈宻郡王玉素富更番休息皇上嘉其勞勩錫爵酬勲有子克家恩施並逮且以功臣圖形紫光閣御製像賛華衮增榮迥非尋常内面之侣所能企及矣烏什諸城屬乾隆二十年六月王師抵伊犂逹瓦齊竄走定北將軍班第等檄山南諸囘部助擒烏什城阿竒木伯克霍集斯奉檄計擒達瓦齊而伯克鄂對亦于伊犂平後順時歸附授散秩大臣從征囘部䝉恩錫爵霍什克伯克等先後封賚有差為類敘于左霍集斯初授貝子品級尋封固山貝子累封多羅貝勒多羅郡王鄂對初授公品級尋封固山貝子加貝勒品級霍什克伯克封輔國公額色尹封輔國公噶岱黙特封輔國公阿什黙特封輔國公漠洎帕爾霍集斯子封輔國公以罪除莽噶里克封輔國公以叛除按霍集斯伯克以囘部望族於擒獻達瓦齊後為小和卓木所懾遷延觀釁及我師進討烏什霍集斯復携衆獻城降偕鄂對隨營効力自黒水之役堅壁厲志阿爾楚克伊什勒淖爾諸戰屢著勲能用是圖形紫光仰荷丹毫品藻不可謂非識時之傑我皇上以推置之天懐寓保全之至計且令備藩京邸弗假事權隠荷聖主之生成者匪淺鮮已又考囘教相傳始于墨克墨徳那諸國今天山南路派噶木巴爾屬為其的傳繼青吉斯汗屬以君其國者派噶木巴爾四子俱夭以女妻阿里而傳其教諸回部屬焉至波羅泥都霍集占為第三十世準噶爾自策妄阿喇布坦時征服回部執其酋長拘于阿巴噶斯哈丹部并移所屬回民若干户至彼為之耕種我師平定伊犂時其酋長波羅泥都霍集占獻欵輸誠將軍班第等出諸囚繫之中縱還故土俾撫収山南諸回部並遣副都統阿敏道往㑹盟而兩酋狡黠背叛計害阿敏道因移師往討追竄至㧞達克山而斃設令兩酋堅心内面且當與霍集斯等並承渥澤而乃狼心不靖卒就芟夷即負恩者之自外栽培彌徴効順者之能歸帡覆亦惟人所自為而已霍集斯始祖為莽蘓爾至霍集斯為第六世霍什克伯克始祖為阿錫木至霍什克伯克亦第六世均與派噶木巴爾異族云漢書西域傳鄯善國本名樓蘭元鳳四年遣平樂監傳介子往刺其王乃立尉屠耆為王更名其國為鄯善罽賔王烏頭勞死子代立遣使奉獻漢使闗都尉文忠送其使王欲害忠忠覺之廼與容屈王子隂末赴共合謀攻罽賔殺其王立隂末赴為罽賔王授印綬莎車國王無子死時萬年在漢萬年為烏孫公主小子莎車國人計欲自託于漢又欲得烏孫心即上書請萬年為莎車王漢許之遣使者奚充國送萬年萬年初立暴惡莎車王弟呼屠徴殺萬年并殺漢使者自立為王㑹衛侯馮奉世使送大宛客即以便宜發諸國兵擊殺之更立佗昆弟子為莎車王是嵗元康元年也後漢書西域傳順帝永建四年于窴王放前殺拘彌王興自立其子為拘彌王而遣使者貢獻于漢陽嘉元年徐由敦煌太守遣疏勒王臣槃擊于窴破之更立興宗人成國為拘彌王而還建武五年河西大將軍竇融承制立康莎車國王為漢莎車建功懐徳王九年康死謚宣成王弟賢代立十七年遣使奉獻請都䕶帝乃因其使賜賢西域都䕶印綬敦煌太守裴遵上言不可假以事權又令諸國失望詔書収還都䕶印綬更賜賢以漢大將軍印綬賢由是始恨而猶詐稱大都䕶移書諸國諸國服屬焉號賢為單于明帝永平十六年龜兹王建攻殺疏勒王成自以龜兹左侯兜題為疏勒王冬漢遣軍司馬班超刼縛兜題而立成之兄子忠為疏勒王忠後反畔超擊斬之永元六年都䕶班超發諸國兵討焉耆危湏尉黎山國遂斬焉耆尉黎二王首傳送京師懸蠻夷邸超乃立焉耆左侯元孟為王尉黎危湏山國皆更立其王魏書髙昌傳延昌中以嘉髙昌王麴嘉為持節平西将軍𤓰州刺史泰臨縣開國伯私署王如故嘉死子堅立普泰初堅遣使朝貢除平西將軍𤓰州刺史泰臨縣伯如故又加衛將軍至永熙中特除儀同三司進為郡公西域傳鄯善國王真逹降詣京師世祖厚待之拜交趾公韓牧為假節征西將軍領䕶西戎校尉鄯善王以鎮之蠕蠕傳肅宗時封阿那瓌朔方郡公蠕蠕王賜以衣冕加之軺葢禄從儀衛同于戚藩髙車傳伊匐王名復國遣使奉表于是詔遣使者谷楷等拜為鎮西將軍西海郡開國公髙車王唐書西域傳髙昌降俘智盛君臣獻觀徳殿行飲至禮酺三日智盛拜左武衛將軍金城郡公弟智湛右武衛中郎將天山郡公子昭好學歴司膳卿弟崇裕有武藝永徽中為右武衛翊府中郎將封交河郡王吐谷渾降國人立順順為王長子舊質于隋為金紫光禄大夫為王稱臣内附詔封西平郡王號趉胡吕烏甘豆可汗為下所殺立其子燕王諾曷鉢詔封河源郡王號烏地也抜勒豆可汗與吐蕃相攻諾曷鉢不支走凉州吐蕃遂有其地諾曷鉢請内徙乾封初更封青海國王諾曷鉢死子忠立忠死子宣超立聖厯三年拜左豹韜員外大將軍襲故可汗號宣超死子曦皓立皓死子兆立貞元十四年以朔方節度副使左金吾衛大將軍慕容復為長樂都督青海國王襲可汗號復死停襲焉耆國突騎支不朝貢安西都䕶郭孝恪討之執突騎支更以栗婆準攝國事屈利啜以兵救焉耆囚栗婆準更使吐屯攝王帝曰焉耆我所下爾乃王之耶吐屯懼不敢王焉耆立栗婆準而從兄薛婆阿那支自為王執栗婆準獻龜兹殺之阿史那社尒討龜兹阿那支抗王師為社尒所擒斬以狥立突騎支弟婆伽利為王婆伽利死國人請還前王突騎支髙宗許之龜兹佐焉耆社尒圍之數月執王立王弟葉䕶王其國帝始徙安西都䕶于其都復封訶黎布失畢為龜兹王王死更立子素稽為王疏勒儀鳯時吐蕃破其國開元十六年始遣大理正喬夢松攝鴻臚少卿冊其君安定為疏勒王于闐擊吐蕃有功以其地為毗沙都督府析十州授伏闍雄都督死武后立其子璥璥死復立尉遲伏師戰為王死伏闍逹嗣并冊其妻執失為妃死尉遲珪嗣妻馬為妃珪死子勝立至徳初以兵赴難因請留宿衛乾元三年以其弟左監門衛率葉䕶曜為太僕員外卿同四鎮節度副使權知本國事五代史四夷附録囬鶻當五代之際有居甘州西州者而甘州回鶻數至唐莊宗時王仁美遣使來貢自稱權知可汗莊宗即冊仁美為英義可汗天成二年權知國事王仁裕遣李阿山等來明宗冊仁裕為順化可汗晉髙祖時又冊為奉化可汗晉天福三年于闐國王李聖天遣使來貢冊聖天為大寳于闐國王宋史外國傳嘉祐八年于闐遣使獻方物以其國王為特進歸忠保順􅠫鱗黒韓王咸平四年回鶻可汗王禄勝遣使曹萬通來貢特授萬通左神武軍大將軍天聖元年甘州夜落隔通順遣使來貢六月詔甘州囘鶻外甥可汗王特封歸宗保順可汗王興國五年贈元忠沙州帥曹元忠時已卒子延禄遣人來貢燉煌郡王授延禄本軍節度咸平四年封延禄為譙郡王明史西域傳哈宻昻克特穆爾舊作安克帖木兒今改正來朝貢請封乃封為忠順王死以兄子托克托舊作脫脫今改正為王卒封托克托從弟托里特穆爾舊作力帖木兒今改正為忠義王賜印誥玉帶卒命故王托克托子布逹錫里舊作卜答失里今改正嗣忠順王布逹錫里年幼命托歡特穆爾舊作脫歡帖木兒今改正嗣忠義王同理國事正統二年托歡持穆爾卒封其子托克托特穆爾舊作脫脫塔木兒今改正為忠義王未幾卒已而忠順王亦卒封其子徳斡逹實里舊作倒瓦答失里今改正為忠順王天順元年徳斡逹實里卒弟布拉噶舊作卜列革今改正遣使告哀即封為忠順王四年王卒國人請立巴圖穆爾舊作把塔木兒今改正以王母不肯無王者八年乃擢巴圖穆爾為右都督攝行國王事賜之誥印成化八年巴圖穆爾子哈森舊作罕慎今改正以父卒請嗣職帝許之而不命其主國事十年乃命哈森權主國事𢎞治元年從其國人請封哈森為忠順王土爾番阿哈麻舊作阿黒麻今改正誘而殺之五年立善巴舊作陜巴今改正為忠順王賜誥印冠服六年阿哈麻執善巴十一年善巴仍舊封還哈宻十八年冬善巴卒其子巴雅濟舊作拜牙即今改正自稱素爾坦舊作速檀今改正命封為忠順王按回部居天山南為漢三十六國唐四鎮地其時雖間受中朝冊封佩印綬而地不歸於版索户不上於司農國既叛服不常王亦廢立無定五代以降聲教漸淪山北回鶻散處山南偶或冊名可汗而衰弱已甚逺者惟于闐通使虚錫封號他無聞焉明代經營遺迹止在哈密中間倉猝多故至無王者八年更安能長駕逺馭訖萬里之遙列五等之位乎稽昔回部酋長惟青吉斯名汗餘則㮣稱和卓若王公諸爵亦均未著於和通嗣世之餘兹以聖化之遐敷致天方之來格舊藩新附並列冠裳而且炳勲烈於丹青荷品題於藻翰豈非千古一時為往牒所罕能儷美者哉附準部回部諸爵官屬禄制汗親王官屬頭等䕶衛職衘花翎長史一員頭等花翎䕶衛六員二等藍翎䕶衛六員三等藍翎䕶衛八員四五品頂帶典儀二員郡王官屬頭等䕶衛職銜花翎長史一員頭等花翎䕶衛六員二等藍翎䕶衛四員三等藍翎䕶衛五員四五品頂帶典儀二員貝勒官屬二等䕶衛職銜藍翎長史一員二等藍翎䕶衛二員三等藍翎䕶衛四員五六品頂帶典儀二員貝子官屬三等藍翎䕶衛六員五六品頂帶典儀二員公官屬三等藍翎䕶衛六員七八品頂帶典儀二員汗歳俸銀二千五百兩幣四十親王歳俸銀二千兩幣二十五郡王歳俸銀一千二百兩幣十五貝勒歳俸銀八百兩幣十三貝子歳俸銀五百兩幣十鎮國公歳俸銀三百兩幣九輔國公歳俸銀二百兩幣七按凡給雙親王俸者官屬倍增世子歳俸銀一千五百兩幣二十餘如扎薩克頭等台吉歳俸銀一百兩幣四官屬不具不在列爵之數云欽定皇輿西域圖志卷三十八
