body:
  text: 水二天山北路一阿勒塔齊郭勒阿爾呼特布拉克多倫布拉克庫里葉圖布拉克察罕烏蘇納里特布拉克阿察郭勒鄂倫淖爾鏗格爾布拉克必桞布拉克多博綽克布拉克濟爾瑪台布拉克烏里雅蘇台布拉克阿克塔斯布拉克烏蘭烏蘓鄂倫淖爾昌吉郭勒羅克倫郭勒呼圖克拜郭勒圖古里克郭勒哈齊克郭勒瑪納斯郭勒額彬格遜淖爾烏蘭烏蘓和爾郭斯郭勒安濟哈雅郭勒庫爾郭勒濟爾噶朗郭勒額布圖郭勒布勒哈齊淖爾裕勒雅爾郭勒晶郭勒庫色木蘇克郭勒鄂拓克賽里郭勒博羅塔拉郭勒察罕賽喇木淖爾阿拉克圖古勒淖爾烏里雅蘇台布拉克布爾噶蘇台布拉克烏爾圖布拉克青吉勒郭勒赫色勒巴什淖爾布拉干郭勒烏英齊郭勒博東齊郭勒額爾齊斯郭勒哈喇圖郭勒哈喇額爾齊斯郭勒竒喇郭勒哈爾巴郭勒博喇濟郭勒尼斯庫郭勒納林郭勒巴爾噶淖爾烘和圖淖爾哈桞圖郭勒北額爾齊斯河郭勒阿拉克淖爾昌吉斯台郭勒柴羅爾郭勒哈爾巴噶郭勒特穆爾圖郭勒烏得郭勒空格爾郭勒愛呼斯淖爾烏里雅蘇台郭勒額敏郭勒古爾格淖爾布隆郭勒阿爾瑪圖巴爾楚克郭勒察奇爾郭勒烏蘭呼濟爾布拉克呼濟爾烏蘓綽諾布拉克達木郭勒烘郭爾布拉克烏爾圖布拉克哈畢爾噶布拉克托來布拉克納木郭勒穆呼勒岱布拉克達爾達木圖布拉克蘓海圖布拉克摩多圖布古圖布拉克尼楚滚布古圖布拉克鄂倫布拉克伊奇爾布拉克布爾噶蘇台布拉克察拉垓布拉克綽爾布拉克欽定皇輿西域圖志卷二十五目録欽定四庫全書欽定皇輿西域圖志巻二十五目録水二天山北路一阿勒塔齊郭勒阿爾呼特布拉克多倫布拉克庫里葉圖布拉克察罕烏蘇納里特布拉克阿察郭勒鄂倫淖爾鏗格爾布拉克必桞布拉克多博綽克布拉克濟爾瑪台布拉克烏里雅蘇台布拉克阿克塔斯布拉克烏蘭烏蘓鄂倫淖爾昌吉郭勒羅克倫郭勒呼圖克拜郭勒圖古里克郭勒哈齊克郭勒瑪納斯郭勒額彬格遜淖爾烏蘭烏蘓和爾郭斯郭勒安濟哈雅郭勒庫爾郭勒濟爾噶朗郭勒額布圖郭勒布勒哈齊淖爾裕勒雅爾郭勒晶郭勒庫色木蘇克郭勒鄂拓克賽里郭勒博羅塔拉郭勒察罕賽喇木淖爾阿拉克圖古勒淖爾烏里雅蘇台布拉克布爾噶蘇台布拉克烏爾圖布拉克青吉勒郭勒赫色勒巴什淖爾布拉干郭勒烏英齊郭勒博東齊郭勒額爾齊斯郭勒哈喇圖郭勒哈喇額爾齊斯郭勒竒喇郭勒哈爾巴郭勒博喇濟郭勒尼斯庫郭勒納林郭勒巴爾噶淖爾烘和圖淖爾哈桞圖郭勒北額爾齊斯河郭勒阿拉克淖爾昌吉斯台郭勒柴羅爾郭勒哈爾巴噶郭勒特穆爾圖郭勒烏得郭勒空格爾郭勒愛呼斯淖爾烏里雅蘇台郭勒額敏郭勒古爾格淖爾布隆郭勒阿爾瑪圖巴爾楚克郭勒察奇爾郭勒烏蘭呼濟爾布拉克呼濟爾烏蘓綽諾布拉克達木郭勒烘郭爾布拉克烏爾圖布拉克哈畢爾噶布拉克托來布拉克納木郭勒穆呼勒岱布拉克達爾達木圖布拉克蘓海圖布拉克摩多圖布古圖布拉克尼楚滚布古圖布拉克鄂倫布拉克伊奇爾布拉克布爾噶蘇台布拉克察拉垓布拉克綽爾布拉克欽定皇輿西域圖志卷二十五目録
