body:
  text: 圖考二西域山脉圖西域水道圖藩屬左右哈薩克部圖東西布魯特部圖霍罕安集延瑪爾噶朗那木干塔什罕諸部圖拔達克山博洛爾布哈爾諸部圖愛烏罕痕都斯坦巴勒提諸部圖欽定皇輿西域圖志卷二目録西域山脉圖説大地羣山之脉自西而東其在中土唐浮屠一行嘗論河山兩戒謂北戒自三危積石負終南地脉之隂東及太華逾河並雷首底柱王屋太行北抵常山之右乃東循塞垣至濊貊朝鮮南戒自岷山嶓冡負地脉之陽東及太華連商山熊耳外方桐栢自上洛南逾江漢携武當荆山至於衡陽乃東循嶺徼達東甌閩中是也其在西域自西南而東北按其統宗起脉之處在西藏極西鄙之岡底斯山直陕西西寧西南五千五百九十餘里地勢由西南徼外以漸而髙至此為極本朝康熙五十六年遣使測量以此處為天下之􅆃衆山之脉皆發於是其分幹有四向西北者為僧喀巴布岡里木遜諸山繞阿里而北蜿蜒起伏以趨西域是謂䓤嶺䓤嶺為西域西南境自䓤嶺而東分為兩大幹漢書謂之南北山其南山由今葉爾羌西之杭阿喇特達巴分支經葉爾羌和闐南境屬回部舊疆由是綿亘而東岡嶺連屬經安西州南又東至陜西肅甘凉三州南又東南達於苦水堡其東南一支南包青海又南為庫爾坤隨河水曲折而東入陜西岷州界純渭水之南而東為武功太白太乙諸山又東北達於太華是即一行所謂北戒但當日不知從西域之南山一脉分承故直以三危為北戒之首也其北山由蔥嶺分趨東北循烏什阿克蘇庫車之北至於伊犁乃折而東經廸化州之南闢展之北直走鎮西府哈宻東至於㙮勒納沁鄂拉總名天山其間土名隨地而異盖以百數最著者曰木素爾鄂拉曰汗騰格里鄂拉曰博克達鄂拉在古則曰白山曰雪山曰靈山唐時又稱折羅漫山是在北戒之北東西綿亘西域境内一行所未及推論者自塔勒納沁鄂拉折而西北為天山分幹逺逾沙磧是謂漠北之阿勒坦鄂拉即古金山又為漠北諸山之祖當西域之東北境山分四支延袤二千餘里北一支入俄羅斯國東一支又東北一支又東南一支並入喀爾喀境不詳載其自阿勒坦鄂拉西麓分支者為阿拉克鄂拉博克達烏魯罕鄂拉又一支為竒喇鄂拉阿爾察克鄂拉西抵額爾齊斯郭勒東㟁而止其别自天山分支西北行者一支控伊犁之北為博羅布爾噶蘇鄂拉㙮勒竒鄂拉博羅和洛鄂拉又折而東北行經千有餘里至塔爾巴噶台鄂拉朱爾庫朱鄂拉東抵額爾齊斯郭勒西岸又一支自伊犁郭勒北西北行至庫隴奎鄂拉格登鄂拉又一支自伊犁郭勒西北分支西行經圖斯庫勒北又一支經圖斯庫勒南西北行至吹郭勒南又一支亦西北行經㙮拉斯郭勒南皆屬凖部舊疆為天山北麓分支尤一行所未及推論者也故推䆒西域山脉斷以西藏之岡底斯為来龍以中土之北戒諸山漠北之阿勒坦諸山為南北兩大山之支幹經絡方隅井然明辨今志西域其山岡土石並詳山志各巻而先為偹論其全勢之首尾繪諸尺幅俾世之談堪輿者有所考往代中外未通凴臆懸揣端緒淆誤漢武以南山為崑崙一行據三危為經首郭璞有云名實相亂莫矯其失盖自昔言之我國家徳咸廣被西藏青海漠北䝉古諸部落凡在西域左右者納土献圖久為臣僕今西域蕩平殊方内附爰得綜􅄃天下名山之全局原其所自始而究其所終極一岡一阜咸在階闥顯坤輿自然之條理正千古積習之沿訛猗歟盛哉西域水道圖說凡水發源多從山出山體所麗地勢必髙因下而趋四方無擇以中國言之西北多山地最髙江河大凟溯源其間順流循軌勢同建瓴東南地卑衆流是滙自上下下理非竒詭黒水南弱水西因地成勢亦猶是矣謂水東西流為性本如是非灼然之論也西域南北西三面大山環繞内外山麓百泉競發分流合流各有歸宿山内之水莫大於羅布淖爾山北之水其大者在東為赫色勒巴什淖爾其北為烘和圖淖爾次西為額彬格遜淖爾又西為布勒哈齊淖爾又西北為巴爾噶淖爾又西南為圖斯庫勒又西北為和什庫勒為㙮拉斯郭勒是皆大澤廣者周數百里小亦數十里宏深渟瀦羣水所歸畨中往往目之為海羅布淖爾在山内中央稍偏北所受水有六曰喀什噶爾達里雅曰葉爾羌諤斯騰曰和闐達里雅曰阿克蘇郭勒曰木素爾郭勒曰海都郭勒喀什噶爾逹里雅發于正西山内之哈喇庫勒迤北兩水合流南注自哈喇庫勒東行五百里許出山又名雅璊雅爾諤斯騰又東㑹支河合流而東千餘里會於河克蘇郭勒葉爾羌諤斯騰源於西南山内三水合流紆折而出山分二道東北流踰葉爾羌城復合為一又南㑹支河東北行千餘里㑹阿克蘇郭勒和闐達里雅發於南山同源異流東為玉隴哈什郭勒西為哈喇哈什郭勒並北流夾額里齊城行二百五十里許又合流數百里北注於阿克蘇郭勒阿克蘇郭勒源出北山二水合而東流為托什干逹里雅經烏什之北迤南至阿克蘇城南於是呼木阿里克郭勒注之過阿克蘇又分為二並南入於喀什噶爾三水交㑹䖏統四水合流為一名㙮里木郭勒東行六百餘里有木素爾郭勒者發於北山西南流又折而東其北哈布薩朗郭勒来㑹之又東過拜其北哈喇烏蘇㑹之又東過賽喇木其北赫色勒郭勒㑹之乃折而東南流為烏恰特達里雅過沙雅爾城北其北額什克巴什郭勒㑹之乃南入於㙮里木郭勒合流而東為額爾勾郭勒行六百餘里有海都郭勒亦發於北山承山北裕勒都斯東西河水併而南流經哈喇沙爾城西南入博斯騰淖爾又釃而西過哈勒噶阿璊之南踰庫隴勒復屈曲而南入額爾勾郭勒共趋於羅布淖爾故山内之水羅布淖爾為大其次則迤北之博斯騰淖爾所受海都郭勒上承裕勒都斯諸水先㑹於是盈科而達於羅布淖爾又次則正東敦煌縣西北之哈喇淖爾源出南山東垂之蘇賴河昌馬河黨河分道北流復㑹而西流入焉又次則額爾勾郭勒之北一澤三名中曰巴巴東曰達巴噶爾徳西曰赫色勒庫勒所受秪北山之㙮什阿里克勒郭羅布淖爾南其水之大者曰噶斯淖爾南山諸水咸入焉又西為葉什勒庫勒和闐克勒底雅一河所滙也又西為葉什勒庫勒淖爾其源在南山經薩納珠之西東北流注之所受亦祗一水凡皆無如羅布淖爾之大云其北山之北曰赫色勒巴什淖爾者在哈喇莽奈鄂拉一百里其東布拉干郭勒青吉勒郭勒西流合注之曰烘和圖淖爾者直赫色勒巴什淖爾北可三百里許其東南額爾齊斯郭勒及左右支水西北流合注之曰額彬格遜淖爾者直陽巴勒噶遜北百餘里其源在天山北麓呼圖克拜郭勒瑪那斯郭勒等四水併二道北入焉曰布勒哈齊淖爾者直噶順北源亦出天山北麓東有庫爾郭勒濟爾噶朗郭勒額布圖郭勒三水北行合流復西行注之南有晶郭勒東北流注之西有鄂拓克賽里郭勒北㑹數水又南㑹庫色木蘇克郭勒東流合注之曰巴爾噶淖爾者在伊犁西北五百里許伊犁諸山出泉以十數彚而東流又折而西其東空格斯郭勒入焉又西過伊犁之南轉而西北流是為伊犁郭勒其北境則有察罕烏蘇阿里瑪圖郭勒䇿集部勒薩瑪勒郭勒奎屯郭勒之水暨南境諸河並入焉又折而東北以入於巴爾噶淖爾曰圖斯庫勒者在阿克蘇踰山而北伊犁踰山而西南形圓若鏡四周支水三十餘道並入焉分流西北行者為吹郭勒南㑹支河以十數入沙磧瀦為和什庫勒和什庫勒者吹郭勒西北流會入處也㙮拉斯郭勒者額得墨克諸郭勒西北流㑹入處也由是而西為那林郭勒入安集延諸部西流入於達里岡阿諤謨又西有騰格斯諤謨博大容蓄盖所謂西海者也其餘山泉濬發細流小澤隨處而有難以悉紀紀西域之水之大者如此為之討源竟委総覽全局依山而出就下而趋四方分流豈有擇於東西哉而土脉崇厚不虞泛溢瀕水之區資其灌溉種藝滋豐今者廣闢耕屯沃野萬里詳求水利沾被益多班固之言曰于闐之西水皆西流注西海其東水東流注鹽澤雖語焉不詳而大槩頗得固又稱鹽澤潜行地下南出於積石為中國河水經因之推溯河源論者疑為荒𣺌今萬國朝宗極陬履勘河水伏流說非無據後儒送難秪益荒誣酈道元謂六合之内其苞逺矣自不登兩龍於雲轍騁八駿於龜途等軒轅之訪百靈方大禹之集會計儒墨之説孰能使辨在當日固宜有是言矣左右哈薩克部圖説哈薩克處西域之西北境其地遼曠綿邈鮮城郭宮室畜牧為葉冦鈔為資倐忽往来不常厥處揆其形勢左部羣山四抱山泉濬發迴環合㳫頗占形勝右部西踰沙磧長河亘帶視左部為尤荒逺以今證古左部當屬康居之舊壤右部已渉大宛之北境聲敎素隔中朝我國家武烈布昭風聲逖聴自昔阻絶之境胥顒顒焉頫首内面豈惟遣侍子倚都䕶之戔戔者歟哈薩克有三玉兹曰鄂圖爾玉兹屬左部曰烏拉克玉兹竒齊克玉兹屬右部有别部偏西與竒齊克玉兹偕来者曰烏爾根齊部東西布魯特部圖説東西布魯特附天山葱嶺而居言語服餙與山南諸部異逐水草事遊牧舊介凖噶爾哈薩克之間視其興衰以為叛服不常所屬也東西部境地鄰接由喀什噶爾北行經鄂什踰山則正其錯壤處那林河源出焉嗣是東西經流五百里盡布魯特北界而止北與安集延諸部接在古則烏孫昆莫西走月氐之地漢書稱大月氏西君大夏塞王南君罽賔塞種往往分散為數國是在當時為塞種今則回部别種云霍罕安集延瑪爾噶朗那木干㙮什罕諸部圖説漢自北道西踰蔥嶺出大宛今霍罕諸部當蔥嶺西北麓北與右部哈薩克接應屬漢大宛地史記稱大宛屬邑大小七十餘城今自霍罕左右諸部北抵右哈薩克境内城堡星羅與㳺牧逐水草者殊異固即大宛土著舊俗也考諸部方位安集延最東其西為瑪爾噶朗為霍罕北為那木干又西為㙮什罕貳師遺蹟宜在於此顧當時天馬蒲萄貴所難得艷稱史乘兹則中外一家貢琛獻賮非極慕義歸仁之至者歟㧞達克山博洛爾布哈爾諸部圖説蔥嶺之中岡巒迴互其間部落錯處史傳稱為山居田石間累石為室民接手飲者往往而是㧞達克山部居蔥嶺中最東境博洛爾近鄰東鄙於漢當統為烏秅國布哈爾介其西于漢當為難兠國唐于蔥嶺置守捉為極邉戍宜在此間元史西北地附録舊載有巴達哈傷明史舊載八答黑商為拔達克山對音之訛兹俱更正即可證其為故墟也由其地東北行近葉爾羌顧考其習俗語言又不能無異盖為回部别種之近西者山南回部習圖爾竒語拔達克山諸部别習帕爾西語必重譯而後能通益以徴聖朝聲教之逺矣愛烏罕痕都斯坦巴勒提諸部圖説由拔達克山西南行有部曰愛烏罕東南為痕都斯坦部俱蔥嶺外大國又東為巴勒提漢時南道西踰蔥嶺出大月氏大月氏南與罽賔接與今愛烏罕痕都斯坦諸部方位適合境内崇山四圍長河襟帶濵河城堡碁布星列自㧞達克山内附後飫聞聖天子威徳先後傾心内面無藉尺書寸刄之勞而琛玉偕来頓顙受命惟恐後時非向化之誠而能然歟痕都斯坦東境直西藏之西愛烏罕西境濵海為西域極西徼云欽定皇輿西域圖志卷二
