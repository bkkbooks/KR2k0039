front:
  text: 欽定四庫全書欽定皇輿西域圖志巻六
  hash: sha256:8b274e2291bb15be7f0be68ce5947d6dbd0b48e37c623386de24dc60d0d418a6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0039_WYG_020-1a, image: WYG0500/WYG0500-0530c.png}
body:
  text: 晷度臣等謹按古地理之書類載天文分野誠以周天三百六十度應大地七萬二千里憑地測天數緣理顯非如占驗禨祥恍忽侔揣者可比也人居地面有南北則北極出地有髙下而晝夜之長短因以不同是為南北里差人居地面有東西則見時刻有早晚偏東一度見時應遲四分偏西一度見時應早四分是為東西里差測量之法在先定京師北極之髙四十度以定緯次定京師西距中線四十二度以定經由是推之自北極髙四十度至四十七度為西域緯度自京師偏西二十度至四十二度為西域經度其晝夜刻分午正日景即無難按次而攷國家戡定西陲特命推歩之臣先俊乗傳測量凖道里之逺近憑彝器以審求俯察仰觀弗踰銖黍既加詳於都㑹之區亦不遺於邉境所届此固信而可徵者矣若分野之法始於周禮以星分辨九州之地而不及九州以外其在四裔外藩即以附近分野之星牽連統屬如鶉首為秦分春秋時未有武威張掖酒泉敦煌之地也漢置為郡不過附於鶉首之次今西域拓地二萬餘里欲以秦屬井鬼之説統之則井鬼之次晰之至於無可晰非通論也伏讀御製毛晃禹貢指南詩注闡論雍州兩星之難槩伊犂葉爾羌諸境睿裁超卓曠若發䝉因灼然於古来分野之説之不可可信既數有所窮亦理原難據未敢因仍傅㑹致滋岐誤爰舉極度晷景髙卑贏縮之數著於篇志晷度第四
  hash: sha256:e8dfedd7847e5c90c8c7f6e64098afa0a79ffc61747d79f3ea4c395ded613a2c
