當哈喇沙爾西南境冬春河身廣及一里夏秋漲發輒三四里引渠灌溉屯墾地畝其地為古焉耆漢書稱其國近海水多魚北史亦言焉耆土田良沃榖有稻菽粟麥去海千餘里有魚鹽蒲葦之饒今自哈喇沙爾至漢輪臺渠犂屯田處約四百餘里在庫車以東所謂廣饒水草有溉田五千頃以上者也更以水經注考之輪臺最西即所謂龜兹東川水東南流逕於輪臺之東者也連城稍東即所謂敦薨水西南流連城别注裂以為田者也渠犂更東即所謂敦薨水又屈而南逕渠犂國西又東南流逕渠犁城漢武帝屯渠犂即此處也其實地皆毗連相去不過幾百里在今哈喇沙爾之西南庫車之東南依往跡以尋其塍隴當必有良疇美土蕪穢於沙磧中者盡人力以收地利顧可不講歟烏什屯田八千畝乾隆三十一年置二萬畝三十二年裁一千畝三十三年裁四千畝三十四年裁三千畝三十五年裁二千畝三十六年裁二千畝如今額管屯副將都司守備千總把總各員由陜西甘肅省調𣲖無定額屯兵四百名乾隆三十一年設一千名三十二年裁五十名三十三年裁二百名三十四年裁一百五十名三十五年裁一百名三十六年裁一百名如今額土宜小麥大麥豌豆糜收穫乾隆三十一年收穫八分六釐三十二年收穫九分八釐三十三年收穫九分九釐三十四年收穫九分二釐三十五年收穫九分五釐三十六年收穫九分九釐三十七年收穫九分四釐三十八年收穫九分三釐三十九年收穫九分四釐四十年收穫九分三釐四十一年收穫九分四釐四十二年收穫九分五釐按乾隆三十二年阿克蘇稻田移於烏什試種收穫九分二釐旋因地寒水冷不宜稻榖即於三十三年仍移阿克蘇阿克蘇稻田一百五十畝乾隆二十七年置如今額管屯遊擊把總即駐防武職不另𣲖屯兵十五名乾隆二十七年設收穫乾隆二十七年收穫二十二分二十八年收穫二十三分二十九年收穫二十八分三十年收穫二十七分九釐三十一年收穫二十二分三釐三十二年移烏什見前條三十三年收穫三十分三十四年收穫三十五分一釐三十五年收穫三十五分三十六年收穫三十分二釐三十七年收穫三十四分三釐三十八年收穫三十三分九釐三十九年收穫三十五分二釐四十年收穫三十一分八釐四十一年收穫三十七分二釐按阿克蘇稻田於乾隆二十六年經辦事大臣以地當孔道供支往還星使及内附藩臣有酌宜筵宴處需用稻米請於葉爾羌運籽試種自二十七年為始每歲收穫盈餘運交烏什糧員配給官俸數取足用而止與他處講求地利博資民用者不同也抑臣等竊見武功告成之後即從事設戍開屯用以綏逺固圉長治而久安䇿莫善於此恭讀御製回部貢金詩序拳拳於井牧之方駐守屯種取足供支既不擾内地之一絲一粟役中土之一丁一夫蠲彼横徴登諸祍席以視前代骨都戊己僕僕轉餉坐耗物力者固不可同年語矣而又為之立賞罰之條嚴勸課之則使荷戈擐甲之夫轉而縁南畝者罔不爭先踴躍思盡地力即一屯政而我皇上之知周道濟坐照萬里之外者葢如此户口附前者準夷底定掃穴犂庭逆者勦之順者撫之袤延萬里疆宇廓清爰為屯兵駐守招集回部及甘州民户分地而居而於烏魯木齊昌吉羅克倫伊犁諸處計畝耕作葢屯墾之丁男即西域之户籍也回部雖村城絡繹碁布星羅幾於烟火相望然闢展左右其居民先經避患空城内徙全部歸誠後於闢展哈喇和卓托克三哈喇沙爾諸處亦如準噶爾部之移民開屯漸歸殷庶從此天山南北一體涵濡休養生息日以繁滋計口宜什倍於此而目前固未為定額也爰附屯政以徴大略至安西州哈密鎮西府人民雖舊隸户籍亦均備載自嘉峪闗外始為兹編類例云安西州二千四十一户二萬六千八百二十一名口敦煌縣屬安西州二千四百五户二萬九千五百二十名口玉門縣屬安西州一千四百九十八户一萬四千一百四十四名口哈密回民一千九百五十户一萬二千一百六十三名口按哈密人民由内地來此貿易無土著不偹載鎮西府舊為巴爾庫勒宜禾縣屬鎮西府六百九十七户二千五百九十六名口奇臺縣屬鎮西府一千九百九十四户六千八百二十四名口迪化直隸州舊為烏魯木齊三千四百九十六户一萬六千六百三十一名口昌吉縣屬迪化州四千三百三十二户一萬九千七百三十四名口綏來縣屬迪化州二千二百五十二户七千六百二十四名口阜康縣屬迪化州四千三百五十户一萬八千四百五名口伊犂舊住額魯特三千五百十六户一萬一千七百三十七名口乾隆四十二年全移赴塔爾巴噶台居住土爾扈特一百零四户四百四十七名口乾隆四十二年全移塔爾巴噶台居住土爾扈特屬下二十九鄂拓克舊户八百三十八户三千五百七十三名口乾隆四十二年全移塔爾巴噶台居住土爾扈特屬下喇嘛一千零八十户四千八百五十三名口土爾扈特屬豢養種地之額魯特六千五百十四名口回户六千四百零六户二萬三百五十六名口民户七十一户二百零九名口遣犯為民二百四十四名口按駐防滿洲䝉古錫伯索倫察哈爾諸兵雖攜眷居住未可與彼中户同論不備登博羅塔拉土爾扈特屬豢養種地額魯特八百二十七名口裕勒都斯游牧土爾扈特屬額魯特一萬一千二百十九名口和博克薩里游牧土爾扈特屬額魯特二千八百六十三名口古爾班濟爾噶朗游牧土爾扈特屬額魯特二千八百六十三名口古爾班晶庫色木什克游牧土爾扈特屬額魯特一千三百五十九名口哈布齊垓游牧和碩特屬額魯特三千一百十五名口塔爾巴噶台額魯特户三千五百十六户一萬一千七百三十七名口乾隆四十二年自伊犂移住土爾扈特一百零四户四百四十七名口乾隆四十二年自伊犂移住土爾扈特屬下二十九鄂拓克舊户八百三十八户三千五百七十三名口乾隆四十二年自伊犂移住按庫爾喀喇烏蘇除安設屯防官兵外止有行商無土著民户不備登漢書西域傳烏孫國户十二萬口六十三萬烏貪訾離國户四十一口二百三十一單桓國户二十七口百九十四蒲類國户三百二十五口二千三十二蒲類後國户百口千七十車師後王國户五百九十五口四千七百七十四車師都尉國户四十口三百三十三車師後城長國户一百五十四口九百六十後漢書西域傳蒲類國户八百餘口二千餘移支國居蒲類地户七百餘口三千餘車師後王居務塗谷領户四千餘口萬五千餘戊校尉閻詳更立阿羅多為王將卑君還敦煌以後部人三百帳别屬役之食其税帳者猶中國之户數也北史西域傳悦般國住龜兹北衆可二十餘萬唐書突厥傳有執舍地處木昆婆鼻三種者舉所部數千帳與賀魯皆内屬突騎施烏質勒西突厥别部也自賀魯破滅二部可汗皆先入侍烏質勒能撫下諸胡順附帳落寖盛突厥施别種車鼻施啜蘇禄者裒拾餘衆至二十萬於是復雄西域及其破滅有特厖勒居焉耆城餘部保金莎領衆至二十萬沙陀傳貞元中沙陀部七千帳附吐蕃元和三年悉衆三萬落欵靈州塞回鶻傳那頡啜收赤心衆七千帳東走振武大同貞觀二年西突厥乙失鉢孫曰夷男率部帳七萬附頡利可汗地理志北庭大都䕶府户二千二百二十六口九千九百六十四按準噶爾為漢烏孫全境悦般居龜兹國北應在伊犂河環抱之間擁衆稱雄户口甲於他國尋以準噶爾作孽之故强食弱衆凌寡幾於地廣人稀伏讀御製後勒銘伊犂碑文憫彼淪亡期於休息瘝痌保抱反覆勤拳由是佃田宅宅起凋瘵而康阜之生養繁息蒸蒸日盛可握笇而知漢之蒲類前後國唐之北庭地擅膏腴為今廸化州屬一帶屯種之區是以境非遼逺而户口則視小國為加多至於車師後國都尉國後城長國烏貪訾離國單桓國雖與車師前國相屬而地居山北在烏魯木齊東境博克達山之隂是亦今之準噶爾部地為類見於此以備考闢展回民二千九百三十七户一萬三百七十三名口按闢展諸城内地行商各户非土著不備登哈喇沙爾回民一千一百三十户五千三百九十名口庫車回民一千一百十二户四千二百六十名口沙雅爾回民六百七十三户一千八百九十八名口賽喇木回民五百户一千六百二十七名口拜回民五百六十三户一千七百三十五名口阿克蘇回民七千五百六户二萬四千六百七名口烏什回民八百二十二户三千一百五十八名口喀什噶爾回民一萬四千五十六户六萬六千四百十三名口葉爾羌回民一萬五千五百七十四户六萬五千四百九十五名口和闐回民一萬三千六百四十二户四萬四千六百三名口漢書西域傳鄯善國户千五百七十口萬四千一百且末國戸二百三十口千六百一十小宛國戸百五十口千五百精絶國户四百八十口三千三百六十戎盧國户二百四十口千六百一十扞彌國户三千三百四十口二萬四千渠勒國戸三百一十口二千一百七十于闐國戸三千三百口萬九千三百皮山國户五百口三千五百西夜國户三百五十口四千蒲犂國户六百五十口五千依耐國户一百二十五口六百七十無雷國户千口七千難兠國戸五千口三萬一千莎車國戸二千三百三十九口萬六千三百七十三疏勒國戸千五百一十口八千六百四十七尉頭國户三百口二千三百姑墨國户三千五百口二萬四千五百温宿國戸二千二百口八千四百龜兹國戸六千九百七十口八萬一千三百一十七烏壘户百一十口千二百渠犁城戸百三十口千四百八十尉犁國戸一千二百口九千六百危須國户七百口四十九百焉耆國户四千口三萬二千一百卑陸國户二百二十七口千三百八十七卑陸後國户四百六十二口千一百三十七郁立師國戸百九十口千四百四十五西且彌國戸三百三十二口千九百二十六東且彌國戸一百九十一口千九百四十八刼國户九十九口五百狐胡國户五十五口二百六十四山國户四百五十口五千車師前國户七百口六千五十後漢書西域傳于窴國領户三萬二千口八萬三千西夜國户二千五百口萬餘子合國領户三百五十口四千徳若國領户百餘口六百七十疏勒國領户二萬一千焉耆國户萬五千口五萬二千東且彌國户三千餘口五千車師前王居交河城領户千五百餘口四千餘唐書西域傳貞觀十四年侯君集伐髙昌分兵略㝎凡三州五縣二十二城户八千口三萬地理志西州交河郡户萬九千一十六口四萬九千四百七十六按回部人民城郭宮室其與山北畜牧冦鈔往来遷徙無常者為俗較殊自逆酋竄獲以後所部名城投戈獻欵版齒滋豐較之漢唐史傳所紀直倍蓰過之而樂利之庥臻乎富庻由是而恩從風翔徳與澤沛户籍日見其繁昌仁義彌深其漸被以古不覊縻之地而為聖朝向化之區何其盛哉欽定皇輿西域圖志卷三十三
