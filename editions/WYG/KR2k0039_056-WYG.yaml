  text: 欽定四庫全書欽定皇輿西域圖志卷三十三
  hash: sha256:3a7d84145eeea4ce3d52d44ca85c42dca24546fbef8b9b55cccd0d2943c6b35b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0039_WYG_056-1a}
body:
  text: 屯政二按山南回部舊地自闢展以西武功耆定後於乾隆二十二年始事耕屯經駐防闢展大臣定長等進麥萬穗宸翰親裁以著綏豐之盛嗣是年和人樂以回民之夙習農務較準俗惟資畜牧者尤宜且稱而伊古車師輪臺渠犁之遺蹟亦縁是可考証云闢展屯田一萬三千六百三十三畝乾隆二十四年置一萬七百五畝二十五年增二千九百二十八畝管屯都司守備千總把總各員由陜西甘肅省調𣲖無定額屯兵八百名乾隆二十四年設土宜麥青稞豌豆粟榖收穫乾隆二十四年收穫六分五釐二十五年收穫十五分九釐哈喇和卓屯田六千畝乾隆二十四年置四千五百畝二十五年增一千五百畝管屯遊擊及千總把總各員由陜西甘肅省調𣲖無定額屯兵三百名乾隆二十四年設土宜小麥青稞粟榖收穫乾隆二十四年收穫五分五釐二十五年收穫九分二釐托克三屯田一萬四千二百五十三畝乾隆二十四年置一萬一千八十二畝二十五年增三千一百七十一畝管屯叅將守備千總把總各員由陜西甘肅省調𣲖無定額屯兵一千名乾隆二十四年設土宜小麥豌豆粟榖收穫乾隆二十四年收穫四分一釐二十五年收穫七分五釐按闢展南臨沙山北距大山一百里秋冬山間積雪入夏消融流注南麓滲於沙土離闢展城五六里許復出地上是為泉源泉眼星羅碁錯約十數處去城里許滙合成渠名闢展郭勒屈曲而南地勢就平渠流散漫凡近渠之地咸引水灌溉其髙阜則水所不到専資雨澤也哈喇和卓水源出北山下經由沙磧漫衍而南出金嶺口滙為大渠入哈喇和卓郭勒分道諸堡田畝資其灌溉托克三水凡二道一發源於東面大山之麓湍泉漫流沙磧間經一百五十餘里滙入河流一發原於烏魯木齊之東山積雪所融流注南行離城二十里許與泉水合為托克三郭勒藉溉田畝於乾隆二十二年試墾地六千五百五十畝二十三年璔墾地一萬一千一百五十畝二十四年設兵開屯如制嗣於乾隆二十六七兩年經辦事大臣次第奏請給與土爾番回民為世業歲納額租詳貢賦門御製駐防闢展屯田大臣定長等奏進所穫麥萬穗詩以紀事載戢西瀛已定功戌耕伊始慶綏豐夏收萬穗先來進秋熟千屯預報芃實栗惟堪嘗以彘既安那更役如熊開疆逾逺心隨逺總為祈年宵旰中按闢展在漢屬狐胡國地與車師隣接前代設屯與否史無明文今以地位考之狐胡與漢車師柳中地接當漢屯田車師後漢屯田柳中時必兼舉之矣或謂東漢時歸義建威二十七所屯田在伊吾之西伊吾為今哈密如其説則當與闢展相近今詳考之歸義諸屯當在漢西海廢郡居延故城元為額齊訥舊作亦集乃今改正路至元間額齊訥總管忽魯多言所部有田可以耕作乞以新軍三百人鑿哈濟渠於額齊訥地并以傍近民西僧餘户助其力從之計屯田九十餘頃即漢歸義屯等處也明屬陜西行都司今在甘州之北哈密之東而云在伊吾西者非也漢書西域傳昭帝時匈奴使四千騎田車師宣帝遣五將將兵擊匈奴車師田者驚去地節二年漢遣侍郎鄭吉校尉司馬憙將免刑罪人田渠犂積榖吉奏事至甘泉有詔還田渠犂及車師益積榖以安西國於是吉始使吏卒三百人别田車師單于大臣皆曰車師地肥美漢得之多田積榖必害人國不可不爭也果遣騎來擊田者吉迺與校尉盡將渠犁田士千五百人往田上書言願益田卒公卿議以為道逺煩費可且罷車師田者其後置戊巳校尉屯田居車師故地後漢書耿恭傳謁者闗寵為戍己校尉屯前王柳中西域傳延光二年以班勇長史將弛刑士五百人西屯柳中按哈喇和卓托克三今屬闢展在漢為車師前王地其屯田積榖與匈奴爭逐之蹟有可考者漢書稱其地肥美可以多田而積榖後漢班勇西屯柳中即今魯克察克在昔為車師國地東境也又今闢展屬境於北魏為髙昌北史言髙昌厥土良沃榖麥一歲再熟由今核之似與昔殊葢縁沙磧之壤以雪為水源肥饒磽瘠視水勢之盈涸靡有定則也又按宋王延德髙昌行紀云其地産五榖惟無蕎麥有水出金嶺導之周繞國城以溉田園作水磑今授回民為世業以耕以藝古法具在多田積榖惟勤則不匱耳哈喇沙爾屯田七千四百四十畝乾隆二十三年置四千一百四十五畝二十四年增五千五百三十五畝二十五年增三十二畝二十六年裁一千九百八十八畝二十七年裁二千五百十畝二十八年增一千十一畝二十九年増八百十畝三十二年增一千五畝三十五年裁一千畝三十八年增四百畝如今額管屯叅將遊擊都司守備千總把總各員於陜西甘肅省調𣲖無定額屯兵三百六十二名乾隆二十三年設二百七名二十四年增二百七十七名二十五年增一名二十六年裁一百四十四名二十七年増五十六名二十八年裁五十四名二十九年增九名三十二年増四十名三十五年裁五十名三十八年増二十名如今額土宜粟榖小麥青稞收穫乾隆二十三年收穫六分四釐二十四年收穫十五分二釐二十五年收穫九分八釐二十六年收穫十一分二十七年收穫三分六釐二十八年收穫八分五釐二十九年收穫六分二釐三十年收穫九分六釐三十一年收穫八分七釐三十二年收穫九分八釐三十三年收穫八分四釐三十四年收穫八分三釐三十五年收穫六分七釐三十六年收穫四分五釐三十七年收穫五分六釐三十八年收穫七分三十九年收穫七分二釐四十年收穫六分九釐四十一年收穫七分四十二年收穫六分七釐漢書西域傳自敦煌西至鹽澤往往起亭而輪臺渠犁皆有田卒數百人置使者校尉領䕶以給使外國者征和中搜粟都尉桑𢎞羊與丞相御史奏言故輪臺以東㨗枝渠犂皆故國地廣饒水草有溉田五千頃以上處温和田美可益通溝渠種五榖與中國同時熟可遣屯田卒詣故輪臺以東置校尉三人分䕶各舉圖地形通利溝渠務使以時益種五榖田一歲有積榖募民壯健有累敢徙者詣田所就畜積為本業益墾溉田昭帝用桑𢎞羊前議田輪臺輪臺與渠犂地皆相連也按哈喇沙爾北至天山一百四十餘里南至海都郭勒四里海都郭勒源發北山下紆曲南行二百五十里當哈喇沙爾西南境冬春河身廣及一里夏秋漲發輒三四里引渠灌溉屯墾地畝其地為古焉耆漢書稱其國近海水多魚北史亦言焉耆土田良沃榖有稻菽粟麥去海千餘里有魚鹽蒲葦之饒今自哈喇沙爾至漢輪臺渠犂屯田處約四百餘里在庫車以東所謂廣饒水草有溉田五千頃以上者也更以水經注考之輪臺最西即所謂龜兹東川水東南流逕於輪臺之東者也連城稍東即所謂敦薨水西南流連城别注裂以為田者也渠犂更東即所謂敦薨水又屈而南逕渠犂國西又東南流逕渠犁城漢武帝屯渠犂即此處也其實地皆毗連相去不過幾百里在今哈喇沙爾之西南庫車之東南依往跡以尋其塍隴當必有良疇美土蕪穢於沙磧中者盡人力以收地利顧可不講歟烏什屯田八千畝乾隆三十一年置二萬畝三十二年裁一千畝三十三年裁四千畝三十四年裁三千畝三十五年裁二千畝三十六年裁二千畝如今額管屯副將都司守備千總把總各員由陜西甘肅省調𣲖無定額屯兵四百名乾隆三十一年設一千名三十二年裁五十名三十三年裁二百名三十四年裁一百五十名三十五年裁一百名三十六年裁一百名如今額土宜小麥大麥豌豆糜收穫乾隆三十一年收穫八分六釐三十二年收穫九分八釐三十三年收穫九分九釐三十四年收穫九分二釐三十五年收穫九分五釐三十六年收穫九分九釐三十七年收穫九分四釐三十八年收穫九分三釐三十九年收穫九分四釐四十年收穫九分三釐四十一年收穫九分四釐四十二年收穫九分五釐按乾隆三十二年阿克蘇稻田移於烏什試種收穫九分二釐旋因地寒水冷不宜稻榖即於三十三年仍移阿克蘇阿克蘇稻田一百五十畝乾隆二十七年置如今額管屯遊擊把總即駐防武職不另𣲖屯兵十五名乾隆二十七年設收穫乾隆二十七年收穫二十二分二十八年收穫二十三分二十九年收穫二十八分三十年收穫二十七分九釐三十一年收穫二十二分三釐三十二年移烏什見前條三十三年收穫三十分三十四年收穫三十五分一釐三十五年收穫三十五分三十六年收穫三十分二釐三十七年收穫三十四分三釐三十八年收穫三十三分九釐三十九年收穫三十五分二釐四十年收穫三十一分八釐四十一年收穫三十七分二釐按阿克蘇稻田於乾隆二十六年經辦事大臣以地當孔道供支往還星使及内附藩臣有酌宜筵宴處需用稻米請於葉爾羌運籽試種自二十七年為始每歲收穫盈餘運交烏什糧員配給官俸數取足用而止與他處講求地利博資民用者不同也抑臣等竊見武功告成之後即從事設戍開屯用以綏逺固圉長治而久安䇿莫善於此恭讀御製回部貢金詩序拳拳於井牧之方駐守屯種取足供支既不擾内地之一絲一粟役中土之一丁一夫蠲彼横徴登諸祍席以視前代骨都戊己僕僕轉餉坐耗物力者固不可同年語矣而又為之立賞罰之條嚴勸課之則使荷戈擐甲之夫轉而縁南畝者罔不爭先踴躍思盡地力即一屯政而我皇上之知周道濟坐照萬里之外者葢如此户口附前者準夷底定掃穴犂庭逆者勦之順者撫之袤延萬里疆宇廓清爰為屯兵駐守招集回部及甘州民户分地而居而於烏魯木齊昌吉羅克倫伊犁諸處計畝耕作葢屯墾之丁男即西域之户籍也回部雖村城絡繹碁布星羅幾於烟火相望然闢展左右其居民先經避患空城内徙全部歸誠後於闢展哈喇和卓托克三哈喇沙爾諸處亦如準噶爾部之移民開屯漸歸殷庶從此天山南北一體涵濡休養生息日以繁滋計口宜什倍於此而目前固未為定額也爰附屯政以徴大略至安西州哈密鎮西府人民雖舊隸户籍亦均備載自嘉峪闗外始為兹編類例云安西州二千四十一户二萬六千八百二十一名口敦煌縣屬安西州二千四百五户二萬九千五百二十名口玉門縣屬安西州一千四百九十八户一萬四千一百四十四名口哈密回民一千九百五十户一萬二千一百六十三名口按哈密人民由内地來此貿易無土著不偹載鎮西府舊為巴爾庫勒宜禾縣屬鎮西府六百九十七户二千五百九十六名口奇臺縣屬鎮西府一千九百九十四户六千八百二十四名口迪化直隸州舊為烏魯木齊三千四百九十六户一萬六千六百三十一名口昌吉縣屬迪化州四千三百三十二户一萬九千七百三十四名口綏來縣屬迪化州二千二百五十二户七千六百二十四名口阜康縣屬迪化州四千三百五十户一萬八千四百五名口伊犂舊住額魯特三千五百十六户一萬一千七百三十七名口乾隆四十二年全移赴塔爾巴噶台居住土爾扈特一百零四户四百四十七名口乾隆四十二年全移塔爾巴噶台居住土爾扈特屬下二十九鄂拓克舊户八百三十八户三千五百七十三名口乾隆四十二年全移塔爾巴噶台居住土爾扈特屬下喇嘛一千零八十户四千八百五十三名口土爾扈特屬豢養種地之額魯特六千五百十四名口回户六千四百零六户二萬三百五十六名口民户七十一户二百零九名口遣犯為民二百四十四名口按駐防滿洲䝉古錫伯索倫察哈爾諸兵雖攜眷居住未可與彼中户同論不備登博羅塔拉土爾扈特屬豢養種地額魯特八百二十七名口裕勒都斯游牧土爾扈特屬額魯特一萬一千二百十九名口和博克薩里游牧土爾扈特屬額魯特二千八百六十三名口古爾班濟爾噶