body:
  text: 疆域五天山北路二伊犂東路伊犂海努克固勒札巴顔台烏哈爾里克塔勒竒沙布爾托海博羅塔拉幹珠罕阿里瑪圖烏爾圖古爾畢博羅布爾噶蘇都爾伯勒津空格斯哈什納拉特裕勒都斯哈布齊垓登努勒台欽定皇輿西域圖志卷十二目録欽定四庫全書欽定皇輿西域圖志卷十二目録疆域五天山北路二伊犂東路伊犂海努克固勒札巴顔台烏哈爾里克塔勒竒沙布爾托海博羅塔拉幹珠罕阿里瑪圖烏爾圖古爾畢博羅布爾噶蘇都爾伯勒津空格斯哈什納拉特裕勒都斯哈布齊垓登努勒台欽定皇輿西域圖志卷十二目録欽定四庫全書欽定皇輿西域圖志卷十二疆域五天山北路二伊犂東路自伊犂東南行至登努勒台南踰天山接天山南路哈喇沙爾界東過博羅圖塔克接天山南路闢展界東北接庫爾喀喇烏蘇屬之晶河界西北接哈薩克界西接伊犂西路界伊犂伊犂在天山之陰為凖噶爾沃壤距京師一萬八百二十里天山自西南來者汗騰格里鄂拉納喇特達巴屏其南東過空格斯河源為烏得音達巴額布圖達巴折北而西為北路之哈喇古顔鄂拉環其東東北過哈什河源折而西為博羅布爾噶蘇達巴塔勒竒達巴博羅和洛鄂拉障其北三面皆負祁連而空格斯郭勒自東南來西北流哈什郭勒自東北來西南流特克斯郭勒自西南來東北流至其境東百里許㑹為伊犁郭勒西流成巨川西北入巴勒喀什淖爾山川形勢甲於諸部氣候和暖人民殷庻物産饒裕西陲一大都㑹也其俗皆逐水草無城郭惟所屬回人因其舊俗築城以居乾隆二十年二月大兵進討凖噶爾二十四鄂拓克二十一昂吉五集賽争先迎降兵不血刃五月抵伊犁厥酋逹瓦齊率萬餘人渡河追及之斫其營以數騎遁回人阿奇木霍集斯伯克擒之以獻伊犁平六月阿睦爾撒納叛其黨阿巴噶斯等附為逆定北將軍班第及㕘賛大臣鄂容安死之將軍策楞以兵追至塔勒奇逹巴阿睦爾撒納奔哈薩克初凖部台吉呢嗎哈薩克沙喇以内附故授職從征二十年十一月與内附之巴雅爾莾噶里克等搆亂將軍和起死之定邉將運兆惠時方駐伊犁聞亂東援巴爾庫勒中途屢殱賊衆二十二年以富徳副兆惠軍分南北路進討時阿睦爾撒納自哈薩克歸與富徳軍遇復奔哈薩克富徳追之哈薩克降阿睦爾撒納奔俄羅斯餘黨以次擒賊伊犂復定二十九年於伊犂河北建惠逺城周九里三分門四東曰景仁西曰説澤南曰宣闓北曰來安三十年建惠寧城周六里三分門四東曰昌彚西曰兆豐南曰遵軌北曰承樞御製西師底定伊犂㨗音至詩以述事乙亥乗時命將定條枝天佑人歸㨗報馳無戰有征安絶域壺漿簞食迎去聲王師據副將軍阿睦爾撒納等奏稱大兵至伊犂部衆持羊酒迎犒者絡繹載道婦孺歡呼如出水火自出師以來無血刃遺鏃之勞敉邊掃穴實古所未有兩朝締構敢云繼百世寧綏有所思好雨優霑土宇拓敬心那為慰心移御製哀伊犂丙子我哀伊犂之人乆迍邅去歳底定將謂自此永息肩而胡么麽宻計復煽亂伊犂之人亦相附和為叛奸後旋知悔過欲擒賊渠贖罪誠可憐乃以衆志不齊相觀望逆賊鋌而走險攻中堅十餘鄂拓逡巡各退遯反致刼擄父不保子夫不保妻遭流連加以争相奪攘為矯䖍强者食弱壯者食㓜互暴殘馬牛羊食以盡野無黄獨室無秈疾疫出痘亾者白沙捐伊犂河流為之赤竟有血人於牙以兾旦夕延王師重入匍匐歸者軍門環伊犂之人汝莫歎孰令汝二三其志自作孽患棼棼冺冺忘大義民無二日汝獨有二天於古有云既來之則安之余亦焉能屏棄旃為之禁盜刼為之朂耕田逆賊既除自今以後汝得高枕眠休養生息延數年或得元氣復以全如此而已寧須竭内地力萬里惠窮邊御製花門行丙子花門雜種其類䌓玉闗迤西西海連或居城郭或㳺牧牧滋畜獵城者田其性均能殖貨産剛勇善戰則鮮焉部落雖殊形貌似晢面緑瞳赤髪鬈大宛即今哈薩克布魯特近古于闐其他不堪偻指數要視强弱為歸叛叶凖噶爾昔全盛日役使若輩如奴佃令棄故居來伊犂課其引水種稻秈服勞供賦不敢怠詎知隠恨已有年逆渠去歳竊據險回人助之藉少安台吉宰桑心不一逡巡各退遭顛患叶而何逆渠復狠忌謂回人衆其力全不早圖之將受害機事不宻回人先遂攻逆渠渠敗衂回人還向故土遷折屋伐樹示不返伊犂荒凉吁可憐地積白骨草木赤腥風吹野遊狐獾一宄搆害貽萬億降殃㑹見昭昭懸漢書西域傳烏孫國大昆彌治赤谷城東至都䕶治所千七百二十一里西至康居蕃内地五千里東與匈奴西北與康居西與大宛南與城郭諸國相接本塞地也烏孫昆莫擊破大月氐大月氐徙西臣大夏而烏孫昆莫居之武帝即位令張騫往昆莫中子大禄大禄兄太子有子曰岑陬太子死大禄攻岑陬昆莫與岑陬萬餘騎令别居昆莫亦自有萬餘騎國分為三大總羈屬昆莫得尚漢公公主為昆弟昭帝時車師與匈奴共侵烏孫宣帝初匈奴復撃烏孫遣校尉常惠使持節䕶烏孫兵後元貴靡為大昆彌烏就屠為小昆彌漢復遣長羅侯惠將三校屯赤谷分别其人民地界大昆彌戸六萬餘小昆彌戸四萬餘然衆心皆附小昆彌烏就屠死子拊離代立為弟日貳所殺子安日為小昆彌日貳亡阻康居漢徙己校屯姑墨欲候便討焉後安日為降民所殺弟末振將代立末振將弟卑爰疐共謀殺大昆彌北附康居謀欲藉兵兼并兩昆彌哀帝元壽二年大昆彌伊秩靡與單于並入朝漢以為榮至元始中兩昆彌皆弱魏畧西戎傳車師後部轉西北則烏孫本國無増損也魏書西域傳烏孫國在龜兹西北其國數為蠕蠕所侵西徙葱嶺山中蠕蠕傳始有部衆自號柔然後其部分為二緼紇提附衛辰討之蠕蠕移部西遁既而社崘執匹侯䟦子收餘衆亡依高車斛律部侵高車深入其地遂并諸部西北有匈奴餘種盡為社崘所并其西則焉耆之地熙平中西征高車大破之禽其王彌俄突殺之盡并叛者髙車傳髙車初號為狄厯北方以為勅勒諸夏以為高車丁零其種有狄氏表紇氏斛律氏解批氏䕶骨氏異竒斤氏高車之族又有十二姓一曰泣伏利氏二曰吐盧氏三曰乙旃氏四曰大連氏五曰窟賀氏六曰逺簿干氏七曰阿崘氏八曰莫允氏九曰俟分氏十曰副伏羅氏十一曰乞袁氏十二曰右叔沛氏先是副伏羅部為蠕蠕所役屬太和十一年豆崘犯塞阿伏至羅等率所部西叛肅宗初彌俄突與蠕蠕主醜奴戰敗禽殺之部衆悉入厭達經數年彌俄突弟伊匐復國大破蠕蠕後與戰敗歸其弟越居為蠕蠕所破子比適又為蠕蠕破越居子去賔自蠕蠕來奔封高車王既而病死隋書突厥傳突厥阿史那以五百家奔茹茹有阿賢設者率部落出於穴中世臣茹茹當後魏之末有伊利可汗撃鐵勒敗之襲茹茹破之弟逸可汗又破茹茹弟木扞可汗撃茹茹滅之西破挹怛西突厥傳處羅可汗居無恒處然多在烏孫故地復立二小可汗分統所部一居龜兹北其地名應婆唐書突厥傳突厥國于後魏大統時滅後其地盡入回紇始其族分國于西者曰西突厥其先訥都陸之孫吐務號大葉䕶長子曰土門伊利可汗次子曰室㸃宻亦曰瑟帝米子曰達頭可汗亦曰步迦可汗始與東突厥分烏孫故地有之西雷翥海南䟽勒北瀚海回鶻傳回鶻俗多乗高輪車元魏時亦號高車部或曰勅勒訛為鐵勒其部落曰袁紇薛延陀契苾羽都播骨利幹多覧葛僕骨㧞野古同羅渾思結斛薛奚結阿跌白霫凡十有五種皆散處磧北袁紇者亦曰烏䕶曰烏紇至隋曰韋紇臣於突厥太宗幸靈州鐵勒十一部皆來武后時突厥默啜方彊取鐵勒故地後稍不循梗絶安西諸國朝貢道後骨咄禄毗伽闕可汗南居突厥故地悉有九姓地九姓者曰藥羅葛曰崛羅勿曰貊歌息訖曰阿勿嘀曰葛薩曰斛嗢素曰藥勿葛曰奚邪勿與僕骨渾㧞野古同羅思結契苾六種相等夷後破有㧞悉宻葛邏禄總十一姓號十一部落元史地理志諸王海都行營於阿爾穆爾舊作阿力麻里今改正等處葢其分地也自高昌五城西北行四五千里至阿爾穆爾至元五年海都叛世祖追至阿爾穆爾則逺遁二千餘里令勿追以皇子北平王統諸軍於阿爾穆爾以鎮之明史外國傳衛拉特舊作瓦剌今改正䝉古部落也在韃靼西又巴什伯里舊作别失八里今改正南接于闐北連衛拉特按漢烏孫居天山北與匈奴接壤南臨城郭諸國即今凖噶爾部也至元魏時為高車隋為鐵勒唐為回鶻回鶻自唐末散處山南即今回部至蠕蠕突厥並屬胡種與高車鐵勒回鶻異族魏書西域傳稱烏孫國在龜兹西北是烏孫於元魏時己西遷龜兹以東為匈奴餘部高車所據蠕蠕主社崘亡依髙車旋破其部復西侵烏孫拓地至龜兹西北此蠕蠕盛時與今凖噶爾全境相倣突厥世臣蠕蠕至元魏末木扞可汗又撃蠕蠕滅之隋書蠕蠕作茹茹傳寫之異也後分東西突厥割據烏孫故地是今之凖噶爾盡有西突厥地東境則猶屬東突厥天寳初東突厥地入回紇五代迄宋聲教不及元代幅員西北最廣應屬諸王行營統軍之地明時衛拉特當韃靼西巴什伯里北南與于闐相直與今凖部方位適合明史舊稱瓦刺即衛拉特譯音之訛又較然可信今按其全境凡厯朝史傳所載方位事實可考而知者已分見各條而伊犂舊屬凖噶爾庭為䟽其全境沿革大畧系此以偹考其古蹟之専屬伊犂者仍如各條之例詳著於後魏書西域傳龜兹國漢時舊國也北去突厥牙帳六百餘里疏勒國東北至突厥牙帳千餘里唐書突厥傳突騎施烏質勒西突厥别部也以伊麗水為小牙其地東隣北突厥直西廷州烏質勒死其子嗢鹿州都督娑葛為左驍衛大將軍襲封爵地理志嗢鹿州都督府以突騎施索葛莫賀部置按唐書載突厥射匱可汗建庭龜兹北之三彌山龜兹即今庫車三彌山即今庫車北境之汗騰格里鄂拉華言天山南去庫車三百餘里以魏書龜兹國北去突厥牙帳六百餘里之文證之是突厥牙帳當在三彌山北也今汗騰格里鄂拉北二百里即伊犂境南去庫車六百餘里與魏書龜兹北去突厥牙帳六百餘里之説合則伊犂為射匱可汗庭無疑自賀魯破滅地為突騎施所有以碎葉川為大牙伊麗水為小牙碎葉川即今圖斯庫勒伊麗水即今伊犂郭勒是伊犂又為突騎施烏質勒小牙也烏質勒子為嗢鹿都督則其地入唐為嗢鹿州都督府可知又按魏書西域傳載悦般國住龜兹北地方數千里衆可二十萬與蠕蠕相仇讎數相征討真君九年遣使朝貢據此則悦般國在龜兹國北今伊犂在庫車北又當為悦般國地疑突厥未滅蠕蠕之前伊犂為悦般國地後其國為蠕蠕所滅是以并滅烏孫斥地至龜兹西北而蠕蠕復為突厥所滅射匱乃建庭於此耳海努克海努克在伊犂郭勒南二十五里舊有佛廟噶勒丹策凌建與固勒札廟俱為喇嘛坐床之地乾隆二十七年建小堡一於其地固勒札固勒札舊對音為固爾札在伊犂郭勒北二十里舊有佛廟噶勒丹策凌建兩廟喇嘛坐牀者四令五鄂拓克輪值供養之阿睦爾撒納叛諸喇嘛附和為逆旋為阿睦爾撒納所掠乃各散去廟燬於火乾隆二十七年築寧逺城周四里二分門四東曰景旭西曰環瀛南曰嘉㑹北曰歸極城東岡上建立平定凖噶爾勒銘伊犂碑後勒銘伊犂碑各一恭勒御製文四體字書於其上御製固爾札廟火用唐韓愈陸渾山火和皇甫湜韻並效其體丙子拓土今踰吐谷渾奚論邏逤將河源何來狂童欲竊吞再整戎車安輊軒亂之不戢終自燔師壓波羅塔拉原義所動彼亦履坤諸鄂拓兵無際垠狡計近窺喇嘛垣盜駝馬逃藉桑門人思見日汝蔽暾名佛弟子心狙猨如魚背龍竊友黿鵰不搏鶚乃搏鵾以致逰魂逺跳奔衣黄空沗人中尊固爾札本菴羅園天人供養莊嚴繁朝螺暮鼓法音喧仲氏吹箎伯氏塤刹竿高標金字旛胡僧碧眼脱其禈露兩肩肘及兩臀羊鹿牛徒示三轅天龍軍遲屬櫜鞬修羅乾闥挾雙轓掃其穢跡風以㠾火輪轉法羞脤膰炎官祝融朱雲屯烈颷出穴口如盆鑠金爛石焦窪罇四大誰解無生言那伽此言龍也不為吐水翻有其成之毁必反賔頭盧瞋目雙暖如彼落葉還歸根净業何有於烏孫創興黄教駢肩跟假藉敬佛示惠恩亦欲貽法其曽元二世滅裂不可援狼貪虎攫難盡論汝狡避禍來謁閽膝前靣陳涕漬痕憐汝賚汝安汝魂解衣推食奚汝寃野心偝徳義何存固應天殛絶爾飱洛那即古大宛今哈薩克也各方非世婚去歳刼撂遭爾昆阿睦爾撒納之兄巴特禡策凌及其黨額林沁相繼奔哈薩克以圖棲托其後皆肆搶奪迯竄而歸三窟未必容爾罇小大怨汝奚騰騫六月申酉利復怨銷兵魚海靖鯨鯤璆琳琅玕貢崑崘四西勒圖何瞀昏固爾札廟内喇嘛分四牀謂之西勒圖葢彼之掌教者云助逆不當遭刼焚朅和韓韻足解煩泰山北斗一仰捫御製平定凖噶爾勒銘伊犂碑文惟天盡所覆俾我皇清罔不在宥惟清奉昊天撫薄海兆庶悉主悉臣叶太祖太宗世祖肇基宅中皇耆其武聖祖世宗覲光揚烈克臻郅隆逮予渺躬思日孜孜期四海同風咨汝凖噶爾叶亦䝉古同類何自外擕數世梗化簒奪相仍碩仇其下惟達瓦齊甚毒於醒衆心疷疷如苗斯蟊如虺斯螫衆口嗷嗷視爾嗷止予焦勞止期救不崇朝止視爾疷止予噫嘻止亟出汝塗泥止迺命新附爾為先鋒熟悉其路迺命勁旅擕數月糧毋或掠擄師行時雨王旅嘽嘽亦無潦阻左旋右抽王旅渾渾既暇以休烏魯木齊及五集寨度之折折台吉宰桑迎降恐後奚事斧吭波羅塔拉闥爾竒嶺險如闗闔倒戈反攻達瓦齊走旦夕途窮回部遮獲彼鼠斯喙地入無隙露布飛至受俘午門爰貸其罪自今以始四部我臣伊犂我宇叶曰綽羅斯及都爾伯特和碩特輝特封四可汗衆建王公逰牧各安宰桑公臣屬我旗籍誰汝苦辛爾恭爾長爾孳爾㓜徐以教養爾駝爾牛爾羊爾馬畜牧優㳺分疆各守毋相侵凌以干大咎齊禦外域曰布魯特越哈薩克醉飲飽食敬興黄教福自天錫伊犂平叶矣勒貞珉叶矣於斯萬年矣御製平定凖噶爾後勒銘伊犂碑文天之所培者人雖傾之不可殛也天之所覆者人雖栽之不可殖也嗟汝凖噶爾何狙詐相延以世而為賊也强食弱衆凌寡血人於牙而蔑知悛易也云興黄教敬佛菩薩其心乃如夜叉羅刹之以人為食也故罪深惡極自作之孽難逭活也先是分封四部衆建宰桑四圖什墨廿一昂吉葢欲繼絶舉廢以休以息也而何煽亂不已焦爛為期終於淪亾胥盡伊犂延袤萬里寂如無人之域也是非我佳兵不戢以殺為徳也有弗得已耳西師之什實紀其詳悉也以其反覆無常遅益乆而害益深則其叛亂之速未嘗非因禍而致福也是葢天佑我皇清究非人力也伊犂既歸版章乆安善後之圖要焉己定者詎宜復失也然屯種萬里之外又未可謂計之得也其潜移默運惟上蒼鍳之予惟奉時相機今日之下亦不敢料以逆也是平定凖噶爾後勒銘伊犂之碑所由作也巴顔台巴顔台在伊犂郭勒北惠寧城東南有屯田烏哈爾里克烏哈爾里克在伊犂郭勒北乾隆二十七年建綏定城周四里一分門四東曰仁熙西曰義集南曰利渠北曰寧漠城北為蘆草溝喇嘛寺溝俱有屯田塔勒竒塔勒竒在伊犂北一百二十里建小城一周三分有屯田城西北為獨山子清水河城北為大西溝大東溝小東溝城西為察罕烏蘇均有屯田凡屯田俱見屯政門沙布爾托海沙布爾托海在伊犂西南一百四十里又西南行八十里為托里山谷聫延並設卡倫又西行入伊犂西路界博羅塔拉博羅塔拉在伊犂東北三百里塔勒竒鄂拉拱其南博羅和洛鄂拉罕哈爾察海鄂拉環其西阿勒坦特布什鄂拉屏其北博羅塔拉郭勒自西北來東南流鄂托克賽里郭勒自西南來東北流至博羅塔拉而合又分流遶其南北又合而東流入布勒哈齊淖爾水甘土肥形勢殊勝乾隆二十年五月將軍班第率師討凖噶爾至此有庫圖齊納爾鄂拓克宰桑莎撒賚者以其屬七百餘戸赴軍前降博羅塔拉河源㳺牧之􅌠桑和通額墨根等亦内附平伊犂後阿睦爾撒納兾為四衛拉特總台吉不得擁衆竊據於此前凖噶爾舊宰桑禡木特者為邊臣所執素以勇聞釋之且授職屢敗撒納後來歸且陳撒納狡詐不可信狀二十年五月隨將軍班第駐伊犂猝遇變為叛黨哈丹所獲縳見撒納不為屈且罵其負義撒納慚憤縊殺之十一月撒納將以其黨阿巴噶斯哈丹往刼綽羅斯嗣諾爾布林沁伊犂衆台吉宰桑等不從計擒撒納來獻適薩拉爾公丹拜在伊犂衆台吉等因之以兵二道進擒撒納一出博羅布爾噶蘇鄂拉口一出塔拉竒鄂拉口十一月㑹衆鄂托兵於托和木圖撒納禦之衆鄂拓兵敗回人和卓木夾撃撒納奔次於烘郭爾鄂博二十一年正月將軍策楞等進討阿睦爾撒納北走哈薩克博羅塔拉遂入版圖御製禡木特詩丙子厄魯禡木特其舊宰桑領領衆扎哈沁扎哈沁者守邊界之人也所職守邊疆昔奉其主命侵掠我駝羊事在雍正八年西鄙衆軍士羣知勇異常前歳三策凌都爾伯特策凌䇿凌烏巴什䇿凌孟克彼中謂之三策凌嚮化入相望禡木特親追闌進我卡塘弗及乃退出未敢肆猖狂維時予有命邊臣爾何恇時駐烏里雅蘇台防邊者為副都統達青阿即以此事得罪今降為侍衛詳見後隘界等無人不擒汝罪當邊臣聞乃懼誘致奏九閶予謂不明討計誘失斟量命釋禡木特薄責勵戎行阿睦爾撒納彼中乆披猖禡木特與戰屢勝兵威揚撒納大窮蹙始决親來降侵尋彼大亂我師壓境强禡木特亦歸優脊加冠裳進兵命與議造膝陳言良撒納今雖順其心乃豺狼不可命彼往往必為厲殃予云不逆詐遣彼亦何妨使其顯彼叛正罪往斧吭亡何定伊犂亡何逆蹟彰譎賊謀夙定煽亂為鴟張禡木特力寡勁敵歸途搪禡木特與將軍班第等同駐伊犂尋以養疴他適無兵衛比聞變將脱歸為叛黨哈丹遮獲猶手刄三賊力盡馬亦僵被擒見撒納不屈氣更昂逆賊責之云衛拉天各方汝何心向内同類而相戕禡木特唾之理義人之綱舊主嗣早絶謂噶爾丹凌策匪我獨契忘大君惟討逆信義昭煌煌擒我復捨之既歸恩遇滂於恒尚應報起死可弗償嚮内非獨我汝先沭寵光一死我弗懼駢誅汝立亾逆賊慚無言絞縊厥命傷伊犂重底定逰魂走踉蹌脅從以次擒生致明憲章問以禡木特畢知顛末詳烈士何處無未可分域鄉録實櫽括詞千載流聲芳唐書突厥傳賀魯已滅以攝舍提暾部為雙河都督府地理志雙河都督府𨽻北庭都䕶府攝舎提暾部置按攝舍提暾部為當時咄陸五啜之一五咄陸部居碎葉東攝舍提暾部在雙河上後為都督府亦以雙河名據突厥傳及蘇定方本傳西逐賀魯至雙河二百里抵其牙賀魯西跳伊麗水伊麗水即今伊犂郭勒是當時賀魯牙在今伊犂其東二百里之雙河即鄂拓克賽里庫色木蘇克諸河之滙入布勒哈齊淖爾者也考其方位今博羅搭拉為雙河都督府舊境無疑幹珠罕幹珠罕在博羅搭拉西南察罕賽喇木淖爾北自塔勒竒東北行九十里至其地又西行踰博羅塔拉郭勒六十里為碩波圖又西北行二百餘里為庫克托木又自幹珠罕東行一百八十里為莎達巴又東行五十里為達蘭沁又東行六十里為哈布齊垓俱在博羅塔拉郭勒北境列山如屏谿谷深邃並設卡倫於此阿里瑪圖阿里瑪圖在伊犂郭勒北察罕烏蘇之西南距伊犂一百里阿里瑪圖郭勒經流其地烏爾圖古爾畢烏爾圖古爾畢在阿里瑪圖東北九十里南距哈什郭勒北距庫色木蘇克郭勒西南距伊犂一百四十里博羅布爾噶蘇博羅布爾噶蘇在烏爾圖古爾畢東北六十里即博羅布爾噶蘇鄂拉西谷口外地舊為輝特台吉唐古忒㳺牧之地乾隆二十年五月大兵抵伊犂率所屬一千戸内附地為伊犂東境門戸自博羅布爾噶蘇北行稍折而西當庫色木蘇克郭勒發源處並設卡倫自博羅布爾噶蘇東北踰山接晶河界都爾伯勒津都爾伯勒津在伊犂東一百二十里空格斯郭勒自東南來哈什郭勒自東北來特克斯郭勒自西南來交㑹於此空格斯空格斯在都爾伯勒津東南三百二十里地勢寛平氣候温煖饒水草宜耕牧為伊犂東南最近要地其全境形勝則納喇特達巴峙其南烏得音達巴繞其東阿布喇勒鄂拉障其北三面峰巒環抱而空格斯郭勒復襟帶其間南㑹特克斯郭勒北㑹哈什郭勒羣赴伊犂以為歸宿山朝水束為西域形勢之冠舊為凖噶爾烏魯特霍爾博斯鄂拓克㳺牧之所唐書突厥傳西突厥由焉耆西北七日行得南庭地理志突騎施部置都督府𨽻北庭都䕶府按今由哈喇沙爾西北至空格斯六百里即突厥傳所謂由焉耆西北七日行得南庭者則今之空格斯當為西突厥南庭其地附近伊犂又當與哈什均為突騎施部之東境也哈什哈什在空格斯北為伊犂東最近要地與空格斯相唇齒形勢殊勝乾隆二十年五月將軍班第尚書鄂容安駐防伊犂阿睦爾撒納叛從賊宰桑克什木巴桑等應之八月以五千兵進犯班第等督兵迎勦至哈什力戰陷堅賊兵圍之數重班第鄂容安度不免以將軍印授其屬富錫爾間道賫還乃手殺數賊而死其屬額納伸巴寧阿亦自殺既而甦巴桑監之數月乗間歸富錫爾道遇賊將刼其印㡬被害乃沈印於河力戰免二十四年西域平哈什入版圖三十二年建雙烈祠祀定北將軍班第議政大臣鄂容安御賜匾曰漠陲競烈御製雙烈詩丙子雙烈者例雙忠詩而作也昔駐藏都統傅清左都御史拉布敦誅叛臣朱爾墨特納木札爾以人少力㣲二臣死事然究能鋤元兇而安絶域故臨奠建祠並有雙忠之詩以揚其勲去歳命定北將軍班第議政大臣鄂容安駐伊犂時二臣既奏阿睦爾撒納有反志朕命便宜從事庶㡬消患未然乃二臣觀望疑慮以致兎脱而賊黨反得結連赴約襲我軍營二臣力不能敵捐驅沙塲猶之死王事也一以勇决建績一以徘徊僨事然而臨難致命奮不顧身有足哀者今大兵既靖伊犂逆賊窮蹙逃竄不日獻俘二臣靈轝至京之日朕亦親臨醊奠並成是什雙烈云者葢不如雙忠之盡善矣昔有傅介子手斬樓蘭頭通權建殊績芳名播千秋况乎統三軍既悉彼逆酋一武夫之力何事仍夷猶逡巡大軍撤偏師五百留彼梟有宻約入覲中逗遛八月廿五日三處共一謀阿睦爾撒納來阿爾台陬將合其部衆挈妻孥以逃叶是則預有㫖其妻孥盡收厥阿巴噶斯斷我軍書郵克什木巴桑伊犂逞刼偷兩路如期發猖狂肆呌呶叶蜂屯更蟻雜不可爬與梳叶二臣知不敵全軍將内投而彼截歸路加以聚蚍蜉巴桑諜致詞權假為我逑徐當備馬駞送之返皇州二臣怒唾罵天朝無此媮效死視如歸背義生肯求奮旅更前進氣髪衝兠鍪終知事不濟畢命願屬鏤叶問罪重整師豈辭雪載途叶出阿睦爾撒納叛後向謂事難成者皆以為不所料伊犂卒不能平朕料叛賊陰險多詐其得在此其失亦在此伊犂之衆不􅂈一時附和終不能人盡從彼若少延緩則叛賊又將别生變詐反失事機因正永常恇怯退師之罸急趨西路軍帥刻期進勦旋於今春直達伊犂逆賊失據奔竄旋復定伊犂脅從寛厥尤一二助惡者謂阿巴噶斯克什木之流繋虜皆䖍劉渠魁竄異域王師奮遐搜亦聞哈薩克縛獻深同讎命求二臣骨靈輿返首邱臨奠例雙忠惜哉淚湧流初若聽我言寧有今日不忠於國有濟烈惟己不渝叶究非貪生比使我悲心悠朱門歌舞輩青史文章儔我豈為彼哉長歌旌乃休御製三巴圖魯歌丙子巴圖魯者勇冠軍昔我旗人頗恒有近世以來殊不聞葢因太平日已乆歳寒松栢見後凋當春何以殊榆栁邇者西鄙屬用軍折衝咸欲効奔走舒布圖鎧已超羣三巴圖魯亦﨣﨣其一額納伸去歳伊犂從將軍將軍使彼詢事因單騎逕入衆賊羣左支右詘箭斃數人知事不濟㧞刀自刎期報君其一巴寧阿讀作麻韻倉卒亂時將軍前後䕶衛相蔽遮發無不中中無不死殺人如麻將軍遣之出巴寧阿曰朝廷命官偷生安往耶力敵視將軍盡節然後伏劍義烈真堪嘉二人既死還復甦宰桑巴桑得之壯其志養之數月我師再入方得歸軍牙其一曰富錫爾將軍命之擕印以出歸帝里其奈賊人擁蜂更屯蟻料不能出將印沉之水力戰更創命垂盡伊犂喇嘛救之得不死故賜額納伸曰卓里克圖巴圖魯卓里克圖者即義卓爾永不渝賜巴寧阿曰昆都爾巴圖魯昆都爾者力敵萬人暇有餘賜富錫爾曰哈布台巴圖魯哈布台者穿楊貫石技不殊迴思去歳迅功成亾矢遺鏃夫何曽不期小醜逆志萌未能除蔓我二卿乃致沙塲雙捐生亦我坐謀遥未精嘉我旗人多忠誠舊風未逺垂儀型愉以為戚留定評乃至西海揚芳聲納拉特納拉特在哈什南即納拉特達巴北麓地又東北五十里為烏努固特境當險隘伊犂東南境卡倫設此裕勒都斯裕勒都斯舊對音為朱爾都斯在空格斯東南二百里踰山而至東西六百里南北二百里巴倫裕勒都斯郭勒東流凖裕勒都斯郭勒西南流合而東流經其地四面皆山地饒水草宜畜牧伊犂東南屏嶂也舊為凖噶爾克里野特鄂拓克㳺牧之所其東境為庫本諾雅特部係達什達瓦之昂吉東境有地曰阿勒坦烏遜西境有地名哈爾噶朗圖唐書突厥傳賀魯已滅以鼠尼施處半部為鷹娑都督府地理志鷹娑都督府以鼠尼施處半部置𨽻北庭都䕶府回鶻傳契苾亦曰契苾羽在焉耆西北鷹娑川多覧葛之南其酋哥楞自號易勿真莫賀可汗弟莫賀咄特勒皆有勇子何力尚紐率其部來歸時貞觀六年也詔處之甘凉間以其地為榆溪州按唐以處半部為鷹娑都督府而契苾在鷹娑川上應屬連壤今哈喇沙爾為古焉耆裕勒都斯哈喇沙爾西北境宜為契苾故地也裕勒都斯郭勒即鷹娑川唐時謂之榆溪貞觀六年契苾内屬以其地為榆溪州則東西裕勒都斯又當為榆溪州地哈布齊垓哈布齊垓在裕勒都斯東一百八十里三哈布齊垓郭勒經流其地中為多木達都哈布齊垓左為凖哈布齊垓右為巴倫哈布齊垓相距各三十里許登努勒台登努勒台在哈布齊垓東天山南麓地饒水草隋書鐡勒傳鐵勒之先匈奴之苗裔也自西海之東依據山谷往往不絶伊吾以西焉耆之北傍白山則有契弊薄落職乙咥蘇婆那曷烏讙紇骨也咥於尼讙等按鐵勒部於隋唐間北界突厥南連四鎮在天山一帯山谷之間此隋書所云在伊吾西焉耆北者専指契弊諸部而言今之登努勒台居焉耆北境傍近白山是其地也據唐書契苾在焉耆西北疑隋時契弊正居焉耆之北至唐稍西遷近鷹沙川苾弊音同字之訛也又按自此東南行入阿拉癸西谷口又東行三百里出東谷口接闢展界欽定皇輿西域圖志卷十二欽定四庫全書欽定皇輿西域圖志卷十二疆域五天山北路二伊犂東路自伊犂東南行至登努勒台南踰天山接天山南路哈喇沙爾界東過博羅圖塔克接天山南路闢展界東北接庫爾喀喇烏蘇屬之晶河界西北接哈薩克界西接伊犂西路界伊犂伊犂在天山之陰為凖噶爾沃壤距京師一萬八百二十里天山自西南來者汗騰格里鄂拉納喇特達巴屏其南東過空格斯河源為烏得音達巴額布圖達巴折北而西為北路之哈喇古顔鄂拉環其東東北過哈什河源折而西為博羅布爾噶蘇達巴塔勒竒達巴博羅和洛鄂拉障其北三面皆負祁連而空格斯郭勒自東南來西北流哈什郭勒自東北來西南流特克斯郭勒自西南來東北流至其境東百里許㑹為伊犁郭勒西流成巨川西北入巴勒喀什淖爾山川形勢甲於諸部氣候和暖人民殷庻物産饒裕西陲一大都㑹也其俗皆逐水草無城郭惟所屬回人因其舊俗築城以居乾隆二十年二月大兵進討凖噶爾二十四鄂拓克二十一昂吉五集賽争先迎降兵不血刃五月抵伊犁厥酋逹瓦齊率萬餘人渡河追及之斫其營以數騎遁回人阿奇木霍集斯伯克擒之以獻伊犁平六月阿睦爾撒納叛其黨阿巴噶斯等附為逆定北將軍班第及㕘賛大臣鄂容安死之將軍策楞以兵追至塔勒奇逹巴阿睦爾撒納奔哈薩克初凖部台吉呢嗎哈薩克沙喇以内附故授職從征二十年十一月與内附之巴雅爾莾噶里克等搆亂將軍和起死之定邉將運兆惠時方駐伊犁聞亂東援巴爾庫勒中途屢殱賊衆二十二年以富徳副兆惠軍分南北路進討時阿睦爾撒納自哈薩克歸與富徳軍遇復奔哈薩克富徳追之哈薩克降阿睦爾撒納奔俄羅斯餘黨以次擒賊伊犂復定二十九年於伊犂河北建惠逺城周九里三分門四東曰景仁西曰説澤南曰宣闓北曰來安三十年建惠寧城周六里三分門四東曰昌彚西曰兆豐南曰遵軌北曰承樞御製西師底定伊犂㨗音至詩以述事乙亥乗時命將定條枝天佑人歸㨗報馳無戰有征安絶域壺漿簞食迎去聲王師據副將軍阿睦爾撒納等奏稱大兵至伊犂部衆持羊酒迎犒者絡繹載道婦孺歡呼如出水火自出師以來無血刃遺鏃之勞敉邊掃穴實古所未有兩朝締構敢云繼百世寧綏有所思好雨優霑土宇拓敬心那為慰心移御製哀伊犂丙子我哀伊犂之人乆迍邅去歳底定將謂自此永息肩而胡么麽宻計復煽亂伊犂之人亦相附和為叛奸後旋知悔過欲擒賊渠贖罪誠可憐乃以衆志不齊相觀望逆賊鋌而走險攻中堅十餘鄂拓逡巡各退遯反致刼擄父不保子夫不保妻遭流連加以争相奪攘為矯䖍强者食弱壯者食㓜互暴殘馬牛羊食以盡野無黄獨室無秈疾疫出痘亾者白沙捐伊犂河流為之赤竟有血人於牙以兾旦夕延王師重入匍匐歸者軍門環伊犂之人汝莫歎孰令汝二三其志自作孽患棼棼冺冺忘大義民無二日汝獨有二天於古有云既來之則安之余亦焉能屏棄旃為之禁盜刼為之朂耕田逆賊既除自今以後汝得高枕眠休養生息延數年或得元氣復以全如此而已寧須竭内地力萬里惠窮邊御製花門行丙子花門雜種其類䌓玉闗迤西西海連或居城郭或㳺牧牧滋畜獵城者田其性均能殖貨産剛勇善戰則鮮焉部落雖殊形貌似晢面緑瞳赤髪鬈大宛即今哈薩克布魯特近古于闐其他不堪偻指數要視强弱為歸叛叶凖噶爾昔全盛日役使若輩如奴佃令棄故居來伊犂課其引水種稻秈服勞供賦不敢怠詎知隠恨已有年逆渠去歳竊據險回人助之藉少安台吉宰桑心不一逡巡各退遭顛患叶而何逆渠復狠忌謂回人衆其力全不早圖之將受害機事不宻回人先遂攻逆渠渠敗衂回人還向故土遷折屋伐樹示不返伊犂荒凉吁可憐地積白骨草木赤腥風吹野遊狐獾一宄搆害貽萬億降殃㑹見昭昭懸漢書西域傳烏孫國大昆彌治赤谷城東至都䕶治所千七百二十一里西至康居蕃内地五千里東與匈奴西北與康居西與大宛南與城郭諸國相接本塞地也烏孫昆莫擊破大月氐大月氐徙西臣大夏而烏孫昆莫居之武帝即位令張騫往昆莫中子大禄大禄兄太子有子曰岑陬太子死大禄攻岑陬昆莫與岑陬萬餘騎令别居昆莫亦自有萬餘騎國分為三大總羈屬昆莫得尚漢公公主為昆弟昭帝時車師與匈奴共侵烏孫宣帝初匈奴復撃烏孫遣校尉常惠使持節䕶烏孫兵後元貴靡為大昆彌烏就屠為小昆彌漢復遣長羅侯惠將三校屯赤谷分别其人民地界大昆彌戸六萬餘小昆彌戸四萬餘然衆心皆附小昆彌烏就屠死子拊離代立為弟日貳所殺子安日為小昆彌日貳亡阻康居漢徙己校屯姑墨欲候便討焉後安日為降民所殺弟末振將代立末振將弟卑爰疐共謀殺大昆彌北附康居謀欲藉兵兼并兩昆彌哀帝元壽二年大昆彌伊秩靡與單于並入朝漢以為榮至元始中兩昆彌皆弱魏畧西戎傳車師後部轉西北則烏孫本國無増損也魏書西域傳烏孫國在龜兹西北其國數為蠕蠕所侵西徙葱嶺山中蠕蠕傳始有部衆自號柔然後其部分為二緼紇提附衛辰討之蠕蠕移部西遁既而社崘執匹侯䟦子收餘衆亡依高車斛律部侵高車深入其地遂并諸部西北有匈奴餘種盡為社崘所并其西則焉耆之地熙平中西征高車大破之禽其王彌俄突殺之盡并叛者髙車傳髙車初號為狄厯北方以為勅勒諸夏以為高車丁零其種有狄氏表紇氏斛律氏解批氏䕶骨氏異竒斤氏高車之族又有十二姓一曰泣伏利氏二曰吐盧氏三曰乙旃氏四曰大連氏五曰窟賀氏六曰逺簿干氏七曰阿崘氏八曰莫允氏九曰俟分氏十曰副伏羅氏十一曰乞袁氏十二曰右叔沛氏先是副伏羅部為蠕蠕所役屬太和十一年豆崘犯塞阿伏至羅等率所部西叛肅宗初彌俄突與蠕蠕主醜奴戰敗禽殺之部衆悉入厭達經數年彌俄突弟伊匐復國大破蠕蠕後與戰敗歸其弟越居為蠕蠕所破子比適又為蠕蠕破越居子去賔自蠕蠕來奔封高車王既而病死隋書突厥傳突厥阿史那以五百家奔茹茹有阿賢設者率部落出於穴中世臣茹茹當後魏之末有伊利可汗撃鐵勒敗之襲茹茹破之弟逸可汗又破茹茹弟木扞可汗撃茹茹滅之西破挹怛西突厥傳處羅可汗居無恒處然多在烏孫故地復立二小可汗分統所部一居龜兹北其地名應婆唐書突厥傳突厥國于後魏大統時滅後其地盡入回紇始其族分國于西者曰西突厥其先訥都陸之孫吐務號大葉䕶長子曰土門伊利可汗次子曰室㸃宻亦曰瑟帝米子曰達頭可汗亦曰步迦可汗始與東突厥分烏孫故地有之西雷翥海南䟽勒北瀚海回鶻傳回鶻俗多乗高輪車元魏時亦號高車部或曰勅勒訛為鐵勒其部落曰袁紇薛延陀契苾羽都播骨利幹多覧葛僕骨㧞野古同羅渾思結斛薛奚結阿跌白霫凡十有五種皆散處磧北袁紇者亦曰烏䕶曰烏紇至隋曰韋紇臣於突厥太宗幸靈州鐵勒十一部皆來武后時突厥默啜方彊取鐵勒故地後稍不循梗絶安西諸國朝貢道後骨咄禄毗伽闕可汗南居突厥故地悉有九姓地九姓者曰藥羅葛曰崛羅勿曰貊歌息訖曰阿勿嘀曰葛薩曰斛嗢素曰藥勿葛曰奚邪勿與僕骨渾㧞野古同羅思結契苾六種相等夷後破有㧞悉宻葛邏禄總十一姓號十一部落元史地理志諸王海都行營於阿爾穆爾舊作阿力麻里今改正等處葢其分地也自高昌五城西北行四五千里至阿爾穆爾至元五年海都叛世祖追至阿爾穆爾則逺遁二千餘里令勿追以皇子北平王統諸軍於阿爾穆爾以鎮之明史外國傳衛拉特舊作瓦剌今改正䝉古部落也在韃靼西又巴什伯里舊作别失八里今改正南接于闐北連衛拉特按漢烏孫居天山北與匈奴接壤南臨城郭諸國即今凖噶爾部也至元魏時為高車隋為鐵勒唐為回鶻回鶻自唐末散處山南即今回部至蠕蠕突厥並屬胡種與高車鐵勒回鶻異族魏書西域傳稱烏孫國在龜兹西北是烏孫於元魏時己西遷龜兹以東為匈奴餘部高車所據蠕蠕主社崘亡依髙車旋破其部復西侵烏孫拓地至龜兹西北此蠕蠕盛時與今凖噶爾全境相倣突厥世臣蠕蠕至元魏末木扞可汗又撃蠕蠕滅之隋書蠕蠕作茹茹傳寫之異也後分東西突厥割據烏孫故地是今之凖噶爾盡有西突厥地東境則猶屬東突厥天寳初東突厥地入回紇五代迄宋聲教不及元代幅員西北最廣應屬諸王行營統軍之地明時衛拉特當韃靼西巴什伯里北南與于闐相直與今凖部方位適合明史舊稱瓦刺即衛拉特譯音之訛又較然可信今按其全境凡厯朝史傳所載方位事實可考而知者已分見各條而伊犂舊屬凖噶爾庭為䟽其全境沿革大畧系此以偹考其古蹟之専屬伊犂者仍如各條之例詳著於後魏書西域傳龜兹國漢時舊國也北去突厥牙帳六百餘里疏勒國東北至突厥牙帳千餘里唐書突厥傳突騎施烏質勒西突厥别部也以伊麗水為小牙其地東隣北突厥直西廷州烏質勒死其子嗢鹿州都督娑葛為左驍衛大將軍襲封爵地理志嗢鹿州都督府以突騎施索葛莫賀部置按唐書載突厥射匱可汗建庭龜兹北之三彌山龜兹即今庫車三彌山即今庫車北境之汗騰格里鄂拉華言天山南去庫車三百餘里以魏書龜兹國北去突厥牙帳六百餘里之文證之是突厥牙帳當在三彌山北也今汗騰格里鄂拉北二百里即伊犂境南去庫車六百餘里與魏書龜兹北去突厥牙帳六百餘里之説合則伊犂為射匱可汗庭無疑自賀魯破滅地為突騎施所有以碎葉川為大牙伊麗水為小牙碎葉川即今圖斯庫勒伊麗水即今伊犂郭勒是伊犂又為突騎施烏質勒小牙也烏質勒子為嗢鹿都督則其地入唐為嗢鹿州都督府可知又按魏書西域傳載悦般國住龜兹北地方數千里衆可二十萬與蠕蠕相仇讎數相征討真君九年遣使朝貢據此則悦般國在龜兹國北今伊犂在庫車北又當為悦般國地疑突厥未滅蠕蠕之前伊犂為悦般國地後其國為蠕蠕所滅是以并滅烏孫斥地至龜兹西北而蠕蠕復為突厥所滅射匱乃建庭於此耳海努克海努克在伊犂郭勒南二十五里舊有佛廟噶勒丹策凌建與固勒札廟俱為喇嘛坐床之地乾隆二十七年建小堡一於其地固勒札固勒札舊對音為固爾札在伊犂郭勒北二十里舊有佛廟噶勒丹策凌建兩廟喇嘛坐牀者四令五鄂拓克輪值供養之阿睦爾撒納叛諸喇嘛附和為逆旋為阿睦爾撒納所掠乃各散去廟燬於火乾隆二十七年築寧逺城周四里二分門四東曰景旭西曰環瀛南曰嘉㑹北曰歸極城東岡上建立平定凖噶爾勒銘伊犂碑後勒銘伊犂碑各一恭勒御製文四體字書於其上御製固爾札廟火用唐韓愈陸渾山火和皇甫湜韻並效其體丙子拓土今踰吐谷渾奚論邏逤將河源何來狂童欲竊吞再整戎車安輊軒亂之不戢終自燔師壓波羅塔拉原義所動彼亦履坤諸鄂拓兵無際垠狡計近窺喇嘛垣盜駝馬逃藉桑門人思見日汝蔽暾名佛弟子心狙猨如魚背龍竊友黿鵰不搏鶚乃搏鵾以致逰魂逺跳奔衣黄空沗人中尊固爾札本菴羅園天人供養莊嚴繁朝螺暮鼓法音喧仲氏吹箎伯氏塤刹竿高標金字旛胡僧碧眼脱其禈露兩肩肘及兩臀羊鹿牛徒示三轅天龍軍遲屬櫜鞬修羅乾闥挾雙轓掃其穢跡風以㠾火輪轉法羞脤膰炎官祝融朱雲屯烈颷出穴口如盆鑠金爛石焦窪罇四大誰解無生言那伽此言龍也不為吐水翻有其成之毁必反賔頭盧瞋目雙暖如彼落葉還歸根净業何有於烏孫創興黄教駢肩跟假藉敬佛示惠恩亦欲貽法其曽元二世滅裂不可援狼貪虎攫難盡論汝狡避禍來謁閽膝前靣陳涕漬痕憐汝賚汝安汝魂解衣推食奚汝寃野心偝徳義何存固應天殛絶爾飱洛那即古大宛今哈薩克也各方非世婚去歳刼撂遭爾昆阿睦爾撒納之兄巴特禡策凌及其黨額林沁相繼奔哈薩克以圖棲托其後皆肆搶奪迯竄而歸三窟未必容爾罇小大怨汝奚騰騫六月申酉利復怨銷兵魚海靖鯨鯤璆琳琅玕貢崑崘四西勒圖何瞀昏固爾札廟内喇嘛分四牀謂之西勒圖葢彼之掌教者云助逆不當遭刼焚朅和韓韻足解煩泰山北斗一仰捫御製平定凖噶爾勒銘伊犂碑文惟天盡所覆俾我皇清罔不在宥惟清奉昊天撫薄海兆庶悉主悉臣叶太祖太宗世祖肇基宅中皇耆其武聖祖世宗覲光揚烈克臻郅隆逮予渺躬思日孜孜期四海同風咨汝凖噶爾叶亦䝉古同類何自外擕數世梗化簒奪相仍碩仇其下惟達瓦齊甚毒於醒衆心疷疷如苗斯蟊如虺斯螫衆口嗷嗷視爾嗷止予焦勞止期救不崇朝止視爾疷止予噫嘻止亟出汝塗泥止迺命新附爾為先鋒熟悉其路迺命勁旅擕數月糧毋或掠擄師行時雨王旅嘽嘽亦無潦阻左旋右抽王旅渾渾既暇以休烏魯木齊及五集寨度之折折台吉宰桑迎降恐後奚事斧吭波羅塔拉闥爾竒嶺險如闗闔倒戈反攻達瓦齊走旦夕途窮回部遮獲彼鼠斯喙地入無隙露布飛至受俘午門爰貸其罪自今以始四部我臣伊犂我宇叶曰綽羅斯及都爾伯特和碩特輝特封四可汗衆建王公逰牧各安宰桑公臣屬我旗籍誰汝苦辛爾恭爾長爾孳爾㓜徐以教養爾駝爾牛爾羊爾馬畜牧優㳺分疆各守毋相侵凌以干大咎齊禦外域曰布魯特越哈薩克醉飲飽食敬興黄教福自天錫伊犂平叶矣勒貞珉叶矣於斯萬年矣御製平定凖噶爾後勒銘伊犂碑文天之所培者人雖傾之不可殛也天之所覆者人雖栽之不可殖也嗟汝凖噶爾何狙詐相延以世而為賊也强食弱衆凌寡血人於牙而蔑知悛易也云興黄教敬佛菩薩其心乃如夜叉羅刹之以人為食也故罪深惡極自作之孽難逭活也先是分封四部衆建宰桑四圖什墨廿一昂吉葢欲繼絶舉廢以休以息也而何煽亂不已焦爛為期終於淪亾胥盡伊犂延袤萬里寂如無人之域也是非我佳兵不戢以殺為徳也有弗得已耳西師之什實紀其詳悉也以其反覆無常遅益乆而害益深則其叛亂之速未嘗非因禍而致福也是葢天佑我皇清究非人力也伊犂既歸版章乆安善後之圖要焉己定者詎宜復失也然屯種萬里之外又未可謂計之得也其潜移默運惟上蒼鍳之予惟奉時相機今日之下亦不敢料以逆也是平定凖噶爾後勒銘伊犂之碑所由作也巴顔台巴顔台在伊犂郭勒北惠寧城東南有屯田烏哈爾里克烏哈爾里克在伊犂郭勒北乾隆二十七年建綏定城周四里一分門四東曰仁熙西曰義集南曰利渠北曰寧漠城北為蘆草溝喇嘛寺溝俱有屯田塔勒竒塔勒竒在伊犂北一百二十里建小城一周三分有屯田城西北為獨山子清水河城北為大西溝大東溝小東溝城西為察罕烏蘇均有屯田凡屯田俱見屯政門沙布爾托海沙布爾托海在伊犂西南一百四十里又西南行八十里為托里山谷聫延並設卡倫又西行入伊犂西路界博羅塔拉博羅塔拉在伊犂東北三百里塔勒竒鄂拉拱其南博羅和洛鄂拉罕哈爾察海鄂拉環其西阿勒坦特布什鄂拉屏其北博羅塔拉郭勒自西北來東南流鄂托克賽里郭勒自西南來東北流至博羅塔拉而合又分流遶其南北又合而東流入布勒哈齊淖爾水甘土肥形勢殊勝乾隆二十年五月將軍班第率師討凖噶爾至此有庫圖齊納爾鄂拓克宰桑莎撒賚者以其屬七百餘戸赴軍前降博羅塔拉河源㳺牧之􅌠桑和通額墨根等亦内附平伊犂後阿睦爾撒納兾為四衛拉特總台吉不得擁衆竊據於此前凖噶爾舊宰桑禡木特者為邊臣所執素以勇聞釋之且授職屢敗撒納後來歸且陳撒納狡詐不可信狀二十年五月隨將軍班第駐伊犂猝遇變為叛黨哈丹所獲縳見撒納不為屈且罵其負義撒納慚憤縊殺之十一月撒納將以其黨阿巴噶斯哈丹往刼綽羅斯嗣諾爾布林沁伊犂衆台吉宰桑等不從計擒撒納來獻適薩拉爾公丹拜在伊犂衆台吉等因之以兵二道進擒撒納一出博羅布爾噶蘇鄂拉口一出塔拉竒鄂拉口十一月㑹衆鄂托兵於托和木圖撒納禦之衆鄂拓兵敗回人和卓木夾撃撒納奔次於烘郭爾鄂博二十一年正月將軍策楞等進討阿睦爾撒納北走哈薩克博羅塔拉遂入版圖御製禡木特詩丙子厄魯禡木特其舊宰桑領領衆扎哈沁扎哈沁者守邊界之人也所職守邊疆昔奉其主命侵掠我駝羊事在雍正八年西鄙衆軍士羣知勇異常前歳三策凌都爾伯特策凌䇿凌烏巴什䇿凌孟克彼中謂之三策凌嚮化入相望禡木特親追闌進我卡塘弗及乃退出未敢肆猖狂維時予有命邊臣爾何恇時駐烏里雅蘇台防邊者為副都統達青阿即以此事得罪今降為侍衛詳見後隘界等無人不擒汝罪當邊臣聞乃懼誘致奏九閶予謂不明討計誘失斟量命釋禡木特薄責勵戎行阿睦爾撒納彼中乆披猖禡木特與戰屢勝兵威揚撒納大窮蹙始决親來降侵尋彼大亂我師壓境强禡木特亦歸優脊加冠裳進兵命與議造膝陳言良撒納今雖順其心乃豺狼不可命彼往往必為厲殃予云不逆詐遣彼亦何妨使其顯彼叛正罪往斧吭亡何定伊犂亡何逆蹟彰譎賊謀夙定煽亂為鴟張禡木特力寡勁敵歸途搪禡木特與將軍班第等同駐伊犂尋以養疴他適無兵衛比聞變將脱歸為叛黨哈丹遮獲猶手刄三賊力盡馬亦僵被擒見撒納不屈氣更昂逆賊責之云衛拉天各方汝何心向内同類而相戕禡木特唾之理義人之綱舊主嗣早絶謂噶爾丹凌策匪我獨契忘大君惟討逆信義昭煌煌擒我復捨之既歸恩遇滂於恒尚應報起死可弗償嚮内非獨我汝先沭寵光一死我弗懼駢誅汝立亾逆賊慚無言絞縊厥命傷伊犂重底定逰魂走踉蹌脅從以次擒生致明憲章問以禡木特畢知顛末詳烈士何處無未可分域鄉録實櫽括詞千載流聲芳唐書突厥傳賀魯已滅以攝舍提暾部為雙河都督府地理志雙河都督府𨽻北庭都䕶府攝舎提暾部置按攝舍提暾部為當時咄陸五啜之一五咄陸部居碎葉東攝舍提暾部在雙河上後為都督府亦以雙河名據突厥傳及蘇定方本傳西逐賀魯至雙河二百里抵其牙賀魯西跳伊麗水伊麗水即今伊犂郭勒是當時賀魯牙在今伊犂其東二百里之雙河即鄂拓克賽里庫色木蘇克諸河之滙入布勒哈齊淖爾者也考其方位今博羅搭拉為雙河都督府舊境無疑幹珠罕幹珠罕在博羅搭拉西南察罕賽喇木淖爾北自塔勒竒東北行九十里至其地又西行踰博羅塔拉郭勒六十里為碩波圖又西北行二百餘里為庫克托木又自幹珠罕東行一百八十里為莎達巴又東行五十里為達蘭沁又東行六十里為哈布齊垓俱在博羅塔拉郭勒北境列山如屏谿谷深邃並設卡倫於此阿里瑪圖阿里瑪圖在伊犂郭勒北察罕烏蘇之西南距伊犂一百里阿里瑪圖郭勒經流其地烏爾圖古爾畢烏爾圖古爾畢在阿里瑪圖東北九十里南距哈什郭勒北距庫色木蘇克郭勒西南距伊犂一百四十里博羅布爾噶蘇博羅布爾噶蘇在烏爾圖古爾畢東北六十里即博羅布爾噶蘇鄂拉西谷口外地舊為輝特台吉唐古忒㳺牧之地乾隆二十年五月大兵抵伊犂率所屬一千戸内附地為伊犂東境門戸自博羅布爾噶蘇北行稍折而西當庫色木蘇克郭勒發源處並設卡倫自博羅布爾噶蘇東北踰山接晶河界都爾伯勒津都爾伯勒津在伊犂東一百二十里空格斯郭勒自東南來哈什郭勒自東北來特克斯郭勒自西南來交㑹於此空格斯空格斯在都爾伯勒津東南三百二十里地勢寛平氣候温煖饒水草宜耕牧為伊犂東南最近要地其全境形勝則納喇特達巴峙其南烏得音達巴繞其東阿布喇勒鄂拉障其北三面峰巒環抱而空格斯郭勒復襟帶其間南㑹特克斯郭勒北㑹哈什郭勒羣赴伊犂以為歸宿山朝水束為西域形勢之冠舊為凖噶爾烏魯特霍爾博斯鄂拓克㳺牧之所唐書突厥傳西突厥由焉耆西北七日行得南庭地理志突騎施部置都督府𨽻北庭都䕶府按今由哈喇沙爾西北至空格斯六百里即突厥傳所謂由焉耆西北七日行得南庭者則今之空格斯當為西突厥南庭其地附近伊犂又當與哈什均為突騎施部之東境也哈什哈什在空格斯北為伊犂東最近要地與空格斯相唇齒形勢殊勝乾隆二十年五月將軍班第尚書鄂容安駐防伊犂阿睦爾撒納叛從賊宰桑克什木巴桑等應之八月以五千兵進犯班第等督兵迎勦至哈什力戰陷堅賊兵圍之數重班第鄂容安度不免以將軍印授其屬富錫爾間道賫還乃手殺數賊而死其屬額納伸巴寧阿亦自殺既而甦巴桑監之數月乗間歸富錫爾道遇賊將刼其印㡬被害乃沈印於河力戰免二十四年西域平哈什入版圖三十二年建雙烈祠祀定北將軍班第議政大臣鄂容安御賜匾曰漠陲競烈御製雙烈詩丙子雙烈者例雙忠詩而作也昔駐藏都統傅清左都御史拉布敦誅叛臣朱爾墨特納木札爾以人少力㣲二臣死事然究能鋤元兇而安絶域故臨奠建祠並有雙忠之詩以揚其勲去歳命定北將軍班第議政大臣鄂容安駐伊犂時二臣既奏阿睦爾撒納有反志朕命便宜從事庶㡬消患未然乃二臣觀望疑慮以致兎脱而賊黨反得結連赴約襲我軍營二臣力不能敵捐驅沙塲猶之死王事也一以勇决建績一以徘徊僨事然而臨難致命奮不顧身有足哀者今大兵既靖伊犂逆賊窮蹙逃竄不日獻俘二臣靈轝至京之日朕亦親臨醊奠並成是什雙烈云者葢不如雙忠之盡善矣昔有傅介子手斬樓蘭頭通權建殊績芳名播千秋况乎統三軍既悉彼逆酋一武夫之力何事仍夷猶逡巡大軍撤偏師五百留彼梟有宻約入覲中逗遛八月廿五日三處共一謀阿睦爾撒納來阿爾台陬將合其部衆挈妻孥以逃叶是則預有㫖其妻孥盡收厥阿巴噶斯斷我軍書郵克什木巴桑伊犂逞刼偷兩路如期發猖狂肆呌呶叶蜂屯更蟻雜不可爬與梳叶二臣知不敵全軍將内投而彼截歸路加以聚蚍蜉巴桑諜致詞權假為我逑徐當備馬駞送之返皇州二臣怒唾罵天朝無此媮效死視如歸背義生肯求奮旅更前進氣髪衝兠鍪終知事不濟畢命願屬鏤叶問罪重整師豈辭雪載途叶出阿睦爾撒納叛後向謂事難成者皆以為不所料伊犂卒不能平朕料叛賊陰險多詐其得在此其失亦在此伊犂之衆不􅂈一時附和終不能人盡從彼若少延緩則叛賊又將别生變詐反失事機因正永常恇怯退師之罸急趨西路軍帥刻期進勦旋於今春直達伊犂逆賊失據奔竄旋復定伊犂脅從寛厥尤一二助惡者謂阿巴噶斯克什木之流繋虜皆䖍劉渠魁竄異域王師奮遐搜亦聞哈薩克縛獻深同讎命求二臣骨靈輿返首邱臨奠例雙忠惜哉淚湧流初若聽我言寧有今日不忠於國有濟烈惟己不渝叶究非貪生比使我悲心悠朱門歌舞輩青史文章儔我豈為彼哉長歌旌乃休御製三巴圖魯歌丙子巴圖魯者勇冠軍昔我旗人頗恒有近世以來殊不聞葢因太平日已乆歳寒松栢見後凋當春何以殊榆栁邇者西鄙屬用軍折衝咸欲効奔走舒布圖鎧已超羣三巴圖魯亦﨣﨣其一額納伸去歳伊犂從將軍將軍使彼詢事因單騎逕入衆賊羣左支右詘箭斃數人知事不濟㧞刀自刎期報君其一巴寧阿讀作麻韻倉卒亂時將軍前後䕶衛相蔽遮發無不中中無不死殺人如麻將軍遣之出巴寧阿曰朝廷命官偷生安往耶力敵視將軍盡節然後伏劍義烈真堪嘉二人既死還復甦宰桑巴桑得之壯其志養之數月我師再入方得歸軍牙其一曰富錫爾將軍命之擕印以出歸帝里其奈賊人擁蜂更屯蟻料不能出將印沉之水力戰更創命垂盡伊犂喇嘛救之得不死故賜額納伸曰卓里克圖巴圖魯卓里克圖者即義卓爾永不渝賜巴寧阿曰昆都爾巴圖魯昆都爾者力敵萬人暇有餘賜富錫爾曰哈布台巴圖魯哈布台者穿楊貫石技不殊迴思去歳迅功成亾矢遺鏃夫何曽不期小醜逆志萌未能除蔓我二卿乃致沙塲雙捐生亦我坐謀遥未精嘉我旗人多忠誠舊風未逺垂儀型愉以為戚留定評乃至西海揚芳聲納拉特納拉特在哈什南即納拉特達巴北麓地又東北五十里為烏努固特境當險隘伊犂東南境卡倫設此裕勒都斯裕勒都斯舊對音為朱爾都斯在空格斯東南二百里踰山而至東西六百里南北二百里巴倫裕勒都斯郭勒東流凖裕勒都斯郭勒西南流合而東流經其地四面皆山地饒水草宜畜牧伊犂東南屏嶂也舊為凖噶爾克里野特鄂拓克㳺牧之所其東境為庫本諾雅特部係達什達瓦之昂吉東境有地曰阿勒坦烏遜西境有地名哈爾噶朗圖唐書突厥傳賀魯已滅以鼠尼施處半部為鷹娑都督府地理志鷹娑都督府以鼠尼施處半部置𨽻北庭都䕶府回鶻傳契苾亦曰契苾羽在焉耆西北鷹娑川多覧葛之南其酋哥楞自號易勿真莫賀可汗弟莫賀咄特勒皆有勇子何力尚紐率其部來歸時貞觀六年也詔處之甘凉間以其地為榆溪州按唐以處半部為鷹娑都督府而契苾在鷹娑川上應屬連壤今哈喇沙爾為古焉耆裕勒都斯哈喇沙爾西北境宜為契苾故地也裕勒都斯郭勒即鷹娑川唐時謂之榆溪貞觀六年契苾内屬以其地為榆溪州則東西裕勒都斯又當為榆溪州地哈布齊垓哈布齊垓在裕勒都斯東一百八十里三哈布齊垓郭勒經流其地中為多木達都哈布齊垓左為凖哈布齊垓右為巴倫哈布齊垓相距各三十里許登努勒台登努勒台在哈布齊垓東天山南麓地饒水草隋書鐡勒傳鐵勒之先匈奴之苗裔也自西海之東依據山谷往往不絶伊吾以西焉耆之北傍白山則有契弊薄落職乙咥蘇婆那曷烏讙紇骨也咥於尼讙等按鐵勒部於隋唐間北界突厥南連四鎮在天山一帯山谷之間此隋書所云在伊吾西焉耆北者専指契弊諸部而言今之登努勒台居焉耆北境傍近白山是其地也據唐書契苾在焉耆西北疑隋時契弊正居焉耆之北至唐稍西遷近鷹沙川苾弊音同字之訛也又按自此東南行入阿拉癸西谷口又東行三百里出東谷口接闢展界欽定皇輿西域圖志卷十二
