body:
  text: 水四天山南路一塔呼庫勒納呼庫勒齊克塔木郭勒闢展郭勒魯克察克郭勒洋赫郭勒土爾番郭勒招哈郭勒哈喇和卓郭勒濟木薩郭勒托克三郭勒伊拉里克布拉克博羅圖郭勒塔什海郭勒楚輝郭勒竒爾歸圖郭勒特伯勒克布拉克哈喇烏蘇博斯騰淖爾海都郭勒羅布淖爾車爾楚郭勒額什墨郭勒䇿特爾郭勒恩楚魯克郭勒伊蘭布拉克第納爾郭勒塔什阿里克郭勒巴巴淖爾竒里什郭勒哈喇庫勒額什克巴什郭勒赫色勒郭勒烏恰特達里雅額爾勾郭勒哈喇烏蘇哈布薩朗郭勒木素爾郭勒綽爾噶布拉克阿察哈喇郭勒庫克墨爾根郭勒特木爾烏蘇郭勒呼木阿里克郭勒托什干達里雅阿克蘇郭勒敖爾他克齊諤斯騰欽定皇輿西域圖志巻二十七目録欽定四庫全書欽定皇輿西域圖志巻二十七目録水四天山南路一塔呼庫勒納呼庫勒齊克塔木郭勒闢展郭勒魯克察克郭勒洋赫郭勒土爾番郭勒招哈郭勒哈喇和卓郭勒濟木薩郭勒托克三郭勒伊拉里克布拉克博羅圖郭勒塔什海郭勒楚輝郭勒竒爾歸圖郭勒特伯勒克布拉克哈喇烏蘇博斯騰淖爾海都郭勒羅布淖爾車爾楚郭勒額什墨郭勒䇿特爾郭勒恩楚魯克郭勒伊蘭布拉克第納爾郭勒塔什阿里克郭勒巴巴淖爾竒里什郭勒哈喇庫勒額什克巴什郭勒赫色勒郭勒烏恰特達里雅額爾勾郭勒哈喇烏蘇哈布薩朗郭勒木素爾郭勒綽爾噶布拉克阿察哈喇郭勒庫克墨爾根郭勒特木爾烏蘇郭勒呼木阿里克郭勒托什干達里雅阿克蘇郭勒敖爾他克齊諤斯騰欽定皇輿西域圖志巻二十七目録
