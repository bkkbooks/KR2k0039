body:
  text: 藩屬一左部哈薩克左部哈薩克東南與準噶爾接西與右部接北與俄羅斯接其常所㑹廷曰葉什勒傍葉什勒河東去塔爾巴噶台南去伊犁皆千里東南去鎮西府四千五百餘里其部曰鄂圖爾玉兹無城郭逐水草事游牧冬夏别居無常處地廣人稠甲於他部境西北隅有獨樹一株其上五枝盤拏䕃廣可容二百騎名鄂呼引噶克义莫朶為西域神物風俗物産大畧與準噶爾等文字同言語稍異其君曰汗其汗族而為首領者名蘇爾統相傳其地為古大宛今詳考之葢古康居國也其汗阿布賚初乘達瓦齊亂數侵擾準噶爾乾隆二十年二月準噶爾平詔遣使徃諭阿布賚言於使臣侍衛順徳訥達永阿曰向聞大皇帝臨御中土以山川之故貢譯未通今天威逺播掃伊犁興黄教俾與準夷俱生生實無疆之福敢以誠心歸於徳化九月順徳訥等以其使博洛布拜等歸伊犁阿睦爾撒納適以伊犁叛明年走哈薩克阿布賚納之詔遣將軍達爾黨阿由西路哈達哈由北路先後以大軍進阿睦爾撒納之走哈薩克也有奈曼鄂拓克納拉巴圖者邀刼之不獲勦其衆阿睦爾撒納以三騎走附阿布賚其屬欲擒獻阿布賚不可乃遣和集博爾根以兵從阿睦爾撒納走努拉自率千騎西行㑹於蒿哈薩拉克鄂拉下以待我師七月將軍達爾黨阿兵至於雅爾拉與和集博爾根前隊二千餘兵遇賊設伏佯敗我師登於山俯其隂則伏在焉蜂屯蟻聚隨以號火乃堅壁壘繕營伍賊不敢出越宿遣烏爾登以輕騎致師分阿里衮鄂實哈寧阿明瑞為左右翼將軍達爾黨阿副將軍扎拉豐阿執纛以中軍進齊努渾瑪瑺特通額額爾登分部從之賊倉猝不及顧潰於山麓斬首五百七十餘級餘敗去我兵乘勝進努拉擒楚魯克是時和集博爾根方與阿睦爾撒納引二千騎西行我軍逼之列而陣出入鏖戰良乆獲其纛及礟賊乃亂斬三百四十餘級阿睦爾撒納易纛褫衣冠而遁初順徳訥歸自哈薩克以阿布賚恭順狀聞復遣賫勑徃諭七月至博爾喀爾綽濶為哈薩克兵所阻不得達至將軍哈達哈營乃遣扎薩克三都布等擊敗阿布賚兵於蒿哈薩拉克鄂拉下斬首百餘級奪其馬匹輜重無算阿布賚遁師從之復斬首百餘級獲馬二百鎗械百餘獲昭華什由是三戰皆捷師至於伊什勒於是達爾黨阿哈達哈兩軍合魯楚克昭華什既獲而見將軍極陳阿布賚之欲内附也將軍縱之俾往諭曰大皇帝命將討叛爾從賊則死若能擒以來臣僕無二於是阿布賚亦稔知為阿睦爾撒納所賣將擒賊以求臣於我其謀泄阿睦爾撒納乃竊哈薩克馬十餘騎逃歸準噶爾二十二年將軍兆惠㕘贊大臣富徳等復將兵西征阿睦爾撒納再走哈薩克六月阿布賚以兵三萬助擒阿睦爾撒納遣其弟阿布勒比斯為前隊與我兵遇奉將軍馬一參贊馬一陳情請罪願受約束於是兆惠等復遣使徃諭阿布賚乃遣亨集噶爾等奉良馬四表請内附其文曰自臣祖額什木汗揚吉爾汗以來從未得通中國聲教今秪奉大皇帝諭㫖加恩邊末部落臣暨臣屬靡不懽忭感慕皇仁臣阿布賚願率哈薩克全部歸於鴻化永為中國臣僕聞於朝詔受之秋阿布賚使臣至避暑山莊朝謁賜宴萬樹園觀燈火阿布賚既臣於我遂以其兵助擒賊與順徳納遇於途而言曰我哈薩克以阿睦爾撒納之故獲罪天朝仰荷大皇帝鴻慈不棄覆載為臣為僕願悉力擒賊庶贖前罪毋有二心阿睦爾撒納敢外帡幪是不祥人也是有天道其何能活乃以托忒烏珠克字印文導我師巡行諸部是月阿布賚將以計擒阿睦爾撒納於阿爾察圖不獲奔俄羅斯執其從賊額布濟齊巴罕來獻二十一年努拉之役和集博爾根以殘兵遁至是聞阿布賚降乃與喀拉巴拉特者親率其屬三萬户欵於軍門曰外臣不識文字謹以身指降將軍兆惠為啟帳命東向坐將軍南向坐列筵食之牲體哈薩克俗必持咒破戒始食於是乃言為大皇帝臣豈敢稱禁因共飽餤畢引觀花馬射懸鎻子甲射之徹其裏益大駭服約助擒賊叩首去左部咸服二十三年五月哈薩克拜濟格特部落之拜布拉克巴圖魯等獲布庫查罕六月哈薩克哈爾津等獲厄魯特和碩齊皆獻於軍械送京師二十四年阿布賚復遣其兄子俄羅斯蘇爾統及其頭目伯克訥等來朝賜宴皇上較射於御園得與觀焉二十五年復遣使來朝宴賚令觀圍賜勅諭俾約束所部毋越境游牧二十六年正月賜勅諭寛所屬巴魯克巴圖爾侵掠烏梁海罪六月伴送使臣入覲回程定𣲖乾清門侍衛禁哈薩克于烏里雅蘇台市易二十七年二月哈薩克阿布勒瑪木比特等遣使來朝值聖駕南巡覲於揚州行在賜冠服所屬哈喇圖魯什送歸額魯特人口賞賚有加參贊大臣阿桂收取越界游牧之哈薩克等諭寛其罪而還之五月弛烏里雅蘇台市易之禁仍禁私市七月阿布賚遣使來朝命隨觀木蘭圍賜冠服以陪臣烏黙爾為乾清門侍衛令暫歸挈眷移居伊犁二十九年三月阿布勒瑪木比特遣使來朝賜冠服三十四年正月阿布勒比斯遣子卓爾齊來朝三月阿布賚遣子斡里蘇爾統來朝三十八年正月哈薩克波羅特繼其父阿布勒瑪木比特為汗遣使來朝阿布賚子卓爾齊亦來朝四十一年正月阿布賚遣使來朝俱宴賚如例哈薩克建廷葉什勒居客斯騰城其地北極髙四十六度二十分至四十八度距京師偏西三十二度至三十七度當準噶爾北全境東西千里南北六百里四山環繞山脈亦自西而東其南境之山曰喀拉巴克喀爾海鄂拉又東為喀爾克圖哈薩拉克鄂拉又東為扎拉圖哈薩拉克鄂拉又東為勒克楞鄂拉踰山而南入準噶爾境齋爾界又東為鄂綽沁吉斯鄂拉又東為阿爾津沙拉什保台鄂拉又東北為阿爾輝西里入準噶爾境額米爾界自喀拉巴克喀爾海鄂拉西北行折而東為厄勒伊們鄂拉葉什勒河源出焉又北為尼雅克圖鄂拉又東為尼滿哈濟蘭鄂拉又東北為喀爾瑪竒爾哈鄂拉又東為阿克竒位鄂拉又東為巴顔鄂拉又東為蒿哈薩拉克鄂拉即將軍哈達哈敗阿布賚處又東南為阿巴拉爾鄂拉又東至塔爾巴噶台而止羣山内外源泉經絡其最著者為綽多爾圖郭勒出喀拉巴克喀爾海鄂拉東為克巴什博爾濟爾郭勒又東為哈薩拉克布拉克又東為博爾喀得克布拉克又東為額特倫布拉克又東北為什納噶布拉克沮洳渙散燦若列星又東為奎蘇布拉克又東為阿爾齊圖布拉克又東為青吉斯布拉克又北為阿林布拉克又東為阿濟蘇布拉克又東為烏爾圖布拉克又東為色爾格郭勒又東為罕拉海圖布拉克又東北為三察爾郭勒又東為楚庫魯克郭勒又東南踰山入塔爾巴噶台界其在右哈薩克西北境者為葉什勒郭勒沿河西北行二百里為哈薩克春吉索波藍地苦寒其汗盛夏常居此自是以西地益曠渺左部境内岡阜層㳫折而西北行二千里為依底克鄂拉當塔拉斯郭勒東南境入右部御製哈薩克稱臣内屬遣使進貢詩以紀事有序丁丑哈薩克即大宛也從古不通中國雖漢武勞師動衆僅得其馬猶且動色頌功斯何稱焉去嵗我師因追叛冦阿睦爾撒納直入其境哈薩克撤帳驅畜遁去數千里朕以絶域駐師非計也命撤師哈薩克悔其為阿睦爾撒納所賣謀擒之以獻而奸賊復自哈薩克逃迴準噶爾乘噶爾藏多爾濟巴雅爾等之亂鴟張嘯聚今春我師重入伊犁問罪則噶爾藏多爾濟已被其姪扎納噶爾卜所害而扎納噶爾卜又為阿睦爾撒納所襲僅以身免我參贊大臣富徳率師窮追阿睦爾撒納巴雅爾適與哈薩克師遇哈薩克不敢犯我師顔其汗阿布賚随遣使稱臣入覲今巴雅爾已獲阿睦爾撒納亦不日成擒即或竄入哈薩克而哈薩克亦約縛之以獻喜銷兵之有日爰㸃翰以成辭冞入伊犁靖陸梁鯨鮞懲逆武維揚已看頡利成生虜又報洛那歸職方致馬本非如武帝閉闗未得學蕭王更欣願縛渠魁獻載戢干戈日月光御製哈薩克使臣至令隨圍獵並成是什丁丑伊古從來化外蠲間闗馳使逺朝天不知中土嵗月日乃隔長安萬二千塞野便教預獵喜山莊旋與錫恩駢即今行國多天馬附㑹誰窮太史編哈薩克在漢為西域地史漢所記匈奴在北西南夷在西南西域諸國在西為最遼逺相傳哈薩克為古大宛然史記言大宛為城郭之國則正今之葉爾羌喀什噶爾及吐魯番一帶回部非哈薩克也哈薩克雖亦回教而實行國與布魯特同俗又所稱大宛産苜蓿蒲陶今哈薩克亦絶無徒以産馬與大宛相似然西北諸部何處不産馬耶盖漢時大宛烏孫康居奄蔡月氏扞冞于闐諸國統為西域而大宛部落强盛附庸者多哈薩克在彼時當是其部中之一國耳史稱大宛東北則烏孫而吐魯番之東北即厄魯特諸部烏孫者䝉古語謂水也厄魯特逐水草而居史所謂隨畜與匈奴同俗者也且今哈薩克在厄魯特之北是又不同矣史稱大宛東則扞冞于闐扞冞音韻與今之哈密為近史記之扞冞漢書作扜彌又或作拘彌而史記所載為最先漢書之扜彌或因字畫偶誤相沿不改展轉訛謬至云拘彌則益失之逺矣且于寘于闐音聲迥異二者之間必有一誤子寘絶無可考于闐産玉歴代相傳今回部之和闐水多美玉當為于闐故地也亦知大宛非定哈薩克明矣或又以哈密為古伊吾引歴代開田屯兵建設州郡為據然焉知非漢占伊吾之地屯田設戍而扞冞乃西遷近于闐而居乎又安知非中國浸㣲而扞冞仍來其故處乎在昔夷漢言語絶不相通所傳不免悠謬今文武將吏往來西域與行内地無異則史所謂大宛烏孫康居奄蔡月氏扞冞于闐諸國與今之厄魯特哈薩克布魯特葉爾羌喀什噶爾其同異大小皆可以次而徐考且歴代傳記西域諸國所云勝兵數百者其實不過如今之準噶爾卄一昻吉之一回部賽里木阿克蘇等小城有一酋長即可稱一國之類耳設以今所定準噶爾哈薩克及回部相較則史所稱西域三十六國者不啻九牛一毛矣必執史漢為據則司馬遷班固並未身歴其地即至其地而語言不通文字不曉其傳訛有必然者故注其大畧如右御製寄題哈薩克獨樹有序丁丑哈薩克西北隅有獨樹一株其上五株盤拏隂廣可蔽二百騎哈薩克謂之鄂哷引噶克义莫朶鄂哷者河名噶克义莫朶者獨樹之謂本土爾扈特所稱名也樹生河源乆聞其語今問之來使信然夫宇宙之大何竒不有然非實據見聞者奚足稱焉昔既為長白瑞樹歌今復悉此物必有對其理信然獨惜其逺處天末異域伊古及今文人學士且不聞其名安能傳其實㸃筆紀事盖不如漆園寓物謬悠而已獨樹鬱輪囷物惟乆故神哈薩克過其下者必膜拜供獻而不敢稱其名盖如䝉古之鄂博矣鄂博見舊作詩卷中隂周二百騎嵗閲八千春建木誰曽見竒蹤我所詢依稀北谷子䭀飯此修真道書登真隠訣云䭀飯方受西梁真人時在大宛北谷御製萬樹園宴哈薩克使臣詩以紀事丁丑萬樹丹青艷霽霜秋陽送暖似春陽多須深目遵典屬鄂畚槎耏二處皆哈薩克地名歸職方耀武未煩貳師李窮源底藉鑿空張近安逺服休稱慶益勵吾心敬不遑御製九月十五日賜哈薩克使臣觀燈火丁丑九瀛一合貴山朝火樹依前綘蠟燒可識仙莊原月宇只疑鹽澤接星橋霜林葉落還裝葉霞嶠標藏重去聲建標惠逺行時詎尋樂漫稱預節賞元宵御製哈薩克汗阿布賚之姪俄羅斯蘇爾統及其陪臣來朝詩以紀事己夘貢徴曽弗責包茅厚往頻來不藉教命彼近親亦台吉獻其方物乃蒲捎皇輿豈必論疆界廣運何妨示與胞偶值咸賔殷保㤗乾元切體九三爻御製填倉日命哈薩克人觀燈火己夘委羽來經五月程上元盛典值都城得教餅節觀燈火為示懐柔洽衆情陪臣數已較前多更見親支遣洛那俄羅斯蘇爾統為阿布賚汗之姪在其台吉中分最親因専遣朝覲邀賞漫須惜繁費來人多則賞物多外夷見小習氣皆然古來服逺幾經麽化城蜃閣無邊幻翠火明燈依舊新亦有花翎曽至者解稱兩度沐恩人陪臣内有伯克訥者前年入覲得邀寵章之錫今再至即戴所賜花翎意殊自喜示榮侣伴虹光百道燭層霄信有龍門婪尾燒漫誚重儓増頓置上元屈指纔去聲旬朝御製御園賜宴哈薩克蘇爾統俄羅斯等即席得句己夘北紘向化至烝烝懐逺應施慶賜仍親族况來蘇爾統哈薩克汗族而為首領者則稱蘇爾統盖如準噶爾台吉之類闗河遥别客斯騰哈薩克阿卜爾嘛蜜特所居城名也玉花尚積嵰山雪火樹剛收太乙燈典盛漢家歌天馬持盈惟益厲兢兢勤逺寧同道出駹畏懐幸致望風降傳觴何必稱瑶水命舞還教出帝江眩耀口騰明吐火倒投跟絓戯緣橦奉時行慶非誇富錫命惟三協萬邦御製射八韻有序己夘紫籞韶昌九品正資宣對黄間春永四侯爰肄幾閒當御耦之催班更宛人之入侍既掄才而授位三五聫行喜弓燥而手柔疊雙呼雋前者蕃王負弩曽陪靈囿三驅今焉屬國奉琛復覩和門九節念兹觀徳為國朝所素嫺雖值率賔敢家法之稍懈非誇獨擅畧示大端園門曰出入賢良正大光明殿前正門名皇考御額也理事恒兹引對敭多士惟殷斯籲俊逺夷兼值彼來王綠籖器使掄庶位騂角親彎試廣場志正體平力奚主執專藝熟中去聲還常是日發二十矢中十八末一矢正中五層之中的示之所尚傾心服命以同為到手忙時命哈薩克能射者均得預列及彀弓注矢動不成節盖外夷或有習弓矢者然較之滿洲索倫相去不啻逕庭矣詎止朝儀浹宴樂要令平聲廟畧讋張皇外夷惟知重武宴㑹百戯彼雖樂觀終不若示以射獵彼乃誠心悦服不敢輕視中國故朕每於此亟亟焉恬文嬉武夙為戒祖制天庥敢不蘉珥筆儒臣從紀盛自予家法奉無疆御製宴哈薩克陪臣作庚辰哈薩陪臣候起居優恩錫宴示榮諸徐聞壺漏遲金狄不藉瓊筵命象胥塞限寒門帝京到風來暑節曉凉舒時和武定遐方順惟勵謙冲凜執虚御製哈薩克使至俾觀圍庚辰阿布賚汗哈薩克汗名候起居蘇爾平聲統阿布賚姪其名都勒特赫勒蘇爾統盖其貴族之稱如䝉古之台吉云至謁鑾輿兼程而進堪嘉彼前聞阿布賚遣使入覲念其道逺恐不能急馳傳諭緩程而行於十月初旬至熱河而蘇爾統以九月初三自烏里雅蘇台起程月之十八已抵波羅河屯據云途中驛騎餼糧並荷天朝優恤不知跋涉之勞急欲瞻覲天顔以申誠悃厚惠以加寧靳予北界控弦重習獵漢家連網笑周阹圍期二日應教展廿一日駐蹕海喇蘇台止餘一圍因哈薩克使至特命展加二日俾得扈從預觀射得肥麅便賜諸御製哈薩克陪臣到因擕觀廣陵風景壬午哈薩朝正貢馬頻路遥遲到值南巡因教馳驛來江國便挈行春閲綺闉昔嵗觀光稱使者辛未準噶爾使臣曽命至蘇州賜諭爾時準夷尚未𠞰滅哈薩克原屬準夷不通中國也今番優賚實陪臣廣陵鄂畚哈薩克地名何南北總我心懐保赤人御製賜賚哈薩克陪臣並擕遊御園詩以紀事甲申北戒遥踰萬里程陪臣乆乃達都京正月據報哈薩克使臣至邊因命留火戯待之兹以路逺雖命馳驛速行猶至三月始到遂不復賜觀煙火祗按例賜食頒賞遣還鐙宵早過九華照御苑方當百卉榮獻馬無過聊表愫同舟真是大聮情慣來可罷恩筵欵以彼嵗有來使且未值燈節遂弗賜宴厚往仍教例賚行御製上元前二日錫宴外藩即席得句己丑仰流鱗集賀元正錫宴欣逢雪後晴大幕穹窿慶雲擁西山迤邐玉屏横鐻鍝君長舊臣列都爾伯特今亦有出痘者來京賀正與舊藩無異㲥毦衣冠侍子伻哈薩克阿布勒比斯汗遣其子卓爾齊來京特命入宴正是逺來近悦候却教南顧繾遐情緬匪弗靖待之一嵗彼無投誠之信此無赦罪之理將籌大舉用繫逺懐御製哈薩克汗阿布賚遣其子斡里蘇爾統來請安於御園賜宴因成是什己丑未徴侍子入朝參却以輸誠叠遣男右部哈薩克阿布勒比斯遣子卓爾齊於新正入覲令隨朝正外藩宴賚今左部阿布賚之子亦至特命一例錫宴用均柔逺恩禮不督因之深感慕無私應與徧包含笙鏞並奏春光暢金帛優頒愷澤覃忽憶朱波方梗化一為愜意一為慙清晨細雨灑霏㣲開宴穹廬朗旭暉張大幕于西園凡宴外域每用之以順其俗尚也已是澤霑惟霽好敢誇天與及人歸戴恩永矢無他嚮式禮還嘉弗少違章服榮頒剛稱體被教異部耀光輝御製上元前一日宴哈薩克波羅特汗陪臣阿克台里克及卓爾齊即席成什癸巳波羅讀作上聲特兹馳使伻繼汗請命覲都京波羅特以繼其父阿布勒瑪木比特為汗遣陪臣阿克台里克入覲念其汗本受中朝封爵而請命有愛戴之忱且以十一月抄自伊犁馳驛行走便捷上元前即抵京殊屬恭順因優加宴賚底須更平聲置示威重便可允行奬恪誠卓爾齊别部阿布勒比斯王之子向曾來京尤習國禮理藩院引賀新正厚恩豐醼頒嘉節柔逺旁通萬里情御製幸西苑接見朝正外藩年班回部哈薩克來使及西川土司頭人等之初次覲謁者即事得句丙申步輦西華西苑巡匪逰圖覲逺徠臣夾衢左右分迎接露冕笑言普拊循回部更畨乆依例庫車三品阿竒木伯克阿克伯克等十三人朝覲如年例内旗扎薩乆稱賔内札薩克四十九旗之䝉古王公台吉等輪嵗朝正舊稱䝉古賔客以示優異土爾讀作平音扈入朝如雁土爾扈特及杜爾伯特新附之王公台吉等亦每年輪畨入覲哈薩克流仰集鱗哈薩克汗阿布賚遣使鄂托爾齊等朝貢適至來享來王來賀節土司土舍土頭人兩金川平定以後其餘各土司羣籲瞻仰因許其照回部例輪班朝賀今初次來京之土司明正宣慰司甲爾㕘徳沁等八人及綽斯甲布土舍綽爾甲爾㕘等三人土守備加頭等侍衛木塔爾等十一人徳爾格特頭目索特納木拉布坦等七人即命成都將軍明亮統率以行兹于西苑門外隨衆夾道叩謁隨傳㫖詢慰並加賞品級項帶及冠服有差撫兹武偃文修世益切盈持㤗保寅臣等謹按哈薩克地産良馬故相傳為即古大宛及恭讀御製哈薩克使臣至令隨圍獵詩跋辨析精詳哈薩克之非即大宛曠若發䝉矣臣等紬繹聖論研核史書按厥方隅証以風俗定其地為漢之康居唐之黠戛斯備録史書而申以論説如左史記大宛列傳康居在大宛西北可二千里行國控弦者八九萬人與大宛鄰國國小南羈事月氏東羈事匈奴漢書西域傳康居國王冬治樂越匿地到卑闐城去長安萬二千三百里不屬都䕶至越匿地馬行七日至王夏所居蕃内九千一百四里東至都䕶治所五千五百五十里東羈事匈奴宣帝時匈奴五單于並争漢擁立呼韓邪單于而郅支單于怨望殺漢使者西阻康居至成帝時康居遣子侍漢貢獻然自以絶逺獨驕嫚不肯與諸國相望漢為其新通重致逺人終羈縻而未絶烏孫小昆彌末振將弟卑爰疐共謀殺大昆彌將衆八萬餘口北附康居謀欲藉兵兼并兩昆彌魏畧西戎傳北烏伊國在康居北堅昆國在康居西北丁令國在康居北此上三國堅昆中央南去車師六國五千里唐書回鶻𫝊黠戛斯古堅昆國也郅支單于破堅昆於時東距單于廷七千里南車師五千里郅支留都之故後世得其地者訛為結骨稍號紇骨亦曰紇扢斯云直回紇西北三千里東至木馬突厥三部落曰都播彌列哥餓支堅昆之人得以役屬之堅昆本彊國也地與突厥等東至骨利斡南吐蕃西南葛邏禄始隸薛延陀未始與中國通貞觀二十二年聞鐡勒等已入臣即遣使者獻方物其酋長俟利發失鉢屈阿棧身入朝帝以其地為堅昆府隸燕然都䕶髙宗世再來朝景龍中獻方物元宗世四朝獻乾元中為回紇所破自是不能通中國後狄語訛為黠戛斯盖回紇謂之若曰黄赤面云又訛為戛戛斯按漢書西域傳烏孫東與匈奴西北與康居西與大宛南與城郭諸國相接西北與康居接西面北面皆與康居接故不别言北與某接也今之回部為天山以南城郭諸國今之準噶爾在天山北南與回部接為漢烏孫而左部哈薩克在準噶爾北迤邐西行至右部哈薩克與塔什罕接連延二千餘里偏西北行則為後哈薩克是哈薩克全境當準噶爾西北兩面此正漢書所云烏孫西北與康居接者其在於今當兼左右哈薩克而言也又史記漢書俱云康居東羈事匈奴又漢書云匈奴殺漢使者西阻康居又云烏孫北附康居是康居東為匈奴南為烏孫明矣今天山東北實漢匈奴舊壤其西則哈薩克居北準噶爾居南此漢書所謂康居東事匈奴匈奴西阻康居烏孫北附康居者也康居國王冬治樂越匿地夏居蕃内顔師古曰王每冬寒夏暑則别居不一處今哈薩克汗阿布賚夏則居葉什勒等處冬則居哈薩克固斯古爾班察爾等處所謂冬夏别居者其俗亦正相類晉魏以降康居國乃西遷其地屬今右部哈薩克與左部無涉至唐書載黠戛斯地當伊吾之西焉耆北白山之旁似與哈薩克方位不合然考唐書原文所謂伊吾西白山旁者乃推原古堅昆故地當屬今準噶爾境若就郅支單于西破堅昆之後遷都西北則東距單于廷七千里南車師五千里魏畧與唐書所載略同在今準噶爾部北其為哈薩克壤無疑且考伊犁東北即古葛邏禄部而哈薩克又在葛邏禄東北亦正與唐書黠戛斯西南葛邏禄之語相合也右部哈薩克右部哈薩克東去左部二千里北至俄羅斯界西南至塔什罕其部曰烏拉克玉兹汗曰阿比里斯其巴圖爾有三曰吐里拜曰輝格爾徳曰薩薩克拜阿比里斯駐塔什罕城不事事受成而已惟吐里拜實専其政其俗大畧與左部等其地在古康居國西境初阿布賚告於順徳納曰我哈薩克之有三玉兹如準噶爾之有四衛拉特也鄂圖爾玉兹則我為政矣他如竒齊克玉兹烏拉克玉兹族兄為之當與偕來作中土臣乃使其弟阿布勒比斯徃而參贊大臣富徳方以兵索逆賊哈薩克錫拉至右部遣䝉固爾岱赫善等徃撫次軍於莽格特城外是時吐里拜等方與塔什罕回人吐爾占戰不下平之乃下詳見次卷塔什罕條於是吐里拜等感徳畏威指軍門納欵奉馬進表以降其文曰伏念臣者乆思内附逺處邊末與左部阿布賚各長一方為準噶爾阻絶末由自通近聞左部輸服被恩優渥恭惟天使惠來祗領宸訓得均𨽻臣僕誠懽誠忭謹遣臣子弟入覲瞻仰天顔如天覆育之聖人在上臣願竭衰駑奮勉自効永無二心倍於左部表聞乃受正朔列外藩焉二十三年吐里拜遣其子卓蘭及輝格爾徳之弟博索爾滿朝京師賜宴盤山静寄山莊並隨至南苑與觀大閲及燈火恩賚甚渥今測其地北極髙四十三度至四十五度距京師偏西四十五度四十八分東與左部接東南與伊犁西北境接南與布魯特及安集延那木干諸部接西踰塔什罕西六百餘里北至依底克鄂拉名北哈薩克西南為格根郭勒又西南為納穆爾郭勒又南為雅哈爾斯郭勒又西南為錫爾郭勒又西為薩哈斯郭勒又北為塔拉斯郭勒格根郭勒東近塔拉斯郭勒者為哈拉庫爾為達布孫淖爾薩哈斯錫爾兩河之間岡巒綿亘為穆呼札爾鄂拉為哈拉綽克多達巴為莽阿錫魯達巴為柯格納斯達巴嶺北大澤名騰吉斯地周迴數百里盖小海也海之東南崖有部名沙爾又東北薩哈斯郭勒南有達拉什城噶拉楚克城錫爾郭勒西北有波拉克城其東有那斡喀特城又南有蒿達克城由蒿達克西踰錫爾郭勒為塔什罕其城寄居右哈薩克部内而别自為部不相統也御製右部哈薩克歸化遣使朝貢詩以紀事有序戊寅右部哈薩克其汗曰阿比里斯與塔什罕城回人等接壤雜居地廣人稠不下左部阿布賚所屬向為厄魯特間阻未通聲教今年秋參贊大臣都統富徳追捕準夷餘孽哈薩克錫拉兵至其地㑹塔什罕與右部哈薩克搆釁互擊因遣侍衛䝉固爾岱等宣諭威徳哈薩克叩首輸誠即日遣使朝貢而回目莫爾多薩木什和卓亦悔悟息争並令頭目同時入覲念兵非得已而所至如歸披閲郵函輙臚其緣起如此偏師西海剿逋逃取便恩宣雜種曹豈謂解紛更釋難時右部與回人方背水决勝䝉固爾岱等單騎入兩陣間指揮宣檄即解甲聴命匪徴目宿與萄萄情欣左部榮同被其疏畧云右部素與左部阿布賚同為雄長今得均𨽻臣僕自効請倍左部語尤愷摯徳慚去聲兩階㑹偶遭厚徃薄來九經式持盈保㤗一心操御製將之盤山駐蹕湯泉行宫作有序戊寅右部哈薩克歸化侍衛挈其首領將至故徃田盤令彼覲謁欲因携以行圍並至南苑大閲示我國家耿光大烈非為一已之豫遊實繫萬年之式度問安啟蹕卓午駐旌聊詠七言用誌初頓耆定伊犁車甲弢嶠山左右惠同叨扈行俾識朝家制大閲兼陳士氣豪垂拱待叅詎非逸覲揚永朂敢辭勞問安啟蹕初程近興引烟宫一染毫御製右部哈薩克及塔什罕城回人布魯特部首領胥來覲謁恰至山莊曲宴示恩㸃筆成什戊寅罷争歸化信堪嘉見前詩舉踵延頸平聲豈計遐左部哈薩克距京師萬里而贏至右部所居迤西去左部尤逺據云乆懐歸化之心以被準噶爾所隔今始遂本願塔什罕布魯時皆其毗連逺部也向日心殷身忘倦侍衛携之乗傳而來日行三百里厯兩月之乆方到皆不言勞且歡忻踴躍稱真從日入處得到日出處也敷天無外總為家詎期蔥嶺殊言侣也厠田盤曲宴加南苑紆臨俾扈駕視前來者肯教差先是哈薩克布魯特來朝俱令扈從木蘭行圍今時當仲冬大閲因於盤山覲謁之次道便携赴南苑俾得預觀講武以均恩禮輸誠乗傳走陪臣萬里餘程日六旬賜食山莊禮粗習隨圍海子惠重申獻芹乃解歸俘黨賚幣何妨不受人阿睦爾撒納之姪伊什扎布先為我兵所俘旋脱奔哈薩克又轉售於塔什罕城皆未知其為逆酋族屬也侍衛䝉固爾岱到彼識之告以其故遂縳來以獻與入覲人同至念其年幼無知且非逆酋嫡子孫比因嘉回人執送畏懐懇誠特賜以幣並勅釋還之自是開門胥識義應教漏網共懐仁御製南苑行圍雜詠戊寅盤谷迴鑾攜貴山栢冬苑景益蕭閒先來大獮均曽預上年左部哈薩克及今秋布魯特赴覲木蘭皆得随獵今右部哈薩克等繼至携赴南苑閲武錫宴乗便行圍亦令其隨列預觀小狩應教視此間草枯廣甸馬蹄輕疊中非誇技擅精驚喜從他逺方訝歡呼騐我衆人情疎蕪澹靄接寒林勒馬凝思亦偶吟二十年前習獵我原無爾許創垂心御製賜哈薩克布魯特等宴即席得句戊寅烏孫掃凈玉門開受號争先肯後哉獻馬不須金馬去右宛今效左宛來踵前露布相伯仲布魯特東西二部均於今秋覲謁而回兹西部最逺者與哈薩克同至罷戰康居總厠陪塔什罕城回人先與哈薩克相争今修好同來入覲誰道蒲萄經嵗乆三巡早各醉芳醅御製南苑賜哈薩克布魯特塔什罕回人等觀煙火燈詞戊寅欵闗定笮復存卭慶典頻煩舉仲冬為耀光明逮疏狄先陳曼衍引魚龍燈火城南六十春康熙二三十年間元宵盖曽在南苑陳煙火後以建暢春園率於彼度節不復在此觀燈者六十餘年矣重觀因賚逺來人村民遥近扶攜至不禁金吾例可循百道流虹貝闕朝光明彷彿上元宵田蠶事例雖云早已盼霏空六出飄後先接踵共來尊難學蕭王閉玉門爆響連珠成捷報便期早晚定堅昆時我師方圍葉爾羌城日夜望捷音之至風定時暄夜正長上弦魄影已騰光時十一月初五日周家建子原正月想是嫦娥也為去聲忙鱗集應教一視同避寒燈火夜深烘髙張黄幕三巡罷訝似清凉萬樹中山莊三十六景内無暑清凉後即萬樹園邇來觀燈火宴逺蕃之處翠火明燈玉樹攢化城蜃閣絳雲端元宵預借休相擬惠逺寧為好樂觀萬幕髙竿揭野燈半輪真是一條氷肩輿宴罷還行館惕夕因心畏益増御製大宛馬歌己夘今之哈薩昔大宛哈薩克雖三字急呼薩克則為一音盖本兩字漢字析而為三嶠山神種古所傳烏孫中閡阻聲教向為準噶爾所隔不通中國攘為已有曽貢閑準噶爾台吉噶爾丹䇿凌時屢貢哈薩克馬曽有詩不仁之守再世斬伊犁萬里拓幅員哈薩布魯布魯特字從上亦急呼成二字胥向化無他為賮致敬䖍騕褭汗血實方物左右部長及可汗遣其首領逺來獻却之失望厚賚還駩騢騮騅類實夥匍匐牽跪陳墀前為龍為徠各夭矯雄姿逸態英且間流珠歕玉誰則見奔霄追電有必然徃者貳師求善種徒勞數萬惡少年致一二耳猶艷詡奚稱歸徳開逺門闢疆勤逺非本意人歸天與寧可捐人歸天與寧可捐作歌自警示後昆漢書西域傳康居有小五王一曰蘇䪥王治蘇䪥城二曰附墨王治附墨城三曰窳匿王治窳匿城四曰罽王治罽城五曰奥鞬王治奥鞬城凡五王屬康居晉書西域傳康居國在大宛西北可二千里與粟弋伊列鄰接其王居蘇薤城風俗及人貌衣服畧同大宛地和暖饒桐栁蒲陶多牛羊出好馬㤗始中其王那鼻遣使上封事并獻善馬魏書西域傳者舌國在破洛那西北去代一萬五千四百五十里太延三年遣使朝貢自是不絶唐書西域傳石或曰柘支曰柘折曰赭時漢大宛北鄙也東北距西突厥西北波臘南二百里所抵俱戰提西南五百里康也圓千餘里右涯素葉河王姓石治柘折城故康居小王窳匿城地西南有藥殺水入中國謂之真珠河亦曰質河東南有大山隋大業初西突厥殺其王以特勒匐職統其國顯慶三年以瞰羯城為大宛都督府開元初封其君莫賀咄吐屯有功為石國王二十八年又册順義王天寳中初封王子那俱車鼻施為懐化王賜鐡劵乆之安西節度使髙仙芝討之俘以獻斬闕下王子走大食乞兵攻怛邏斯城敗仙芝軍自是臣大食寳應時遣使朝貢按自左部哈薩克西南行曠野二千餘里逐水草無城郭在準噶爾西北以漢書烏孫西北與康居接之文証之哈薩克為康居故地其説畧備于前矣第按漢書大宛北與康居接烏孫西與大宛接休循捐毒西北至大宛國史記大宛土著耕田有城郭屋室是大宛當在烏孫之西康居之南休循捐毒之西北有城郭之國即是也今右部哈薩克西境直抵塔什罕其汗阿比里斯即居塔什罕城内而塔什罕城之東北西北一帶尚有城郭部落則今之右部哈薩克當屬漢康居之五小王地其西南鄙則接大宛之西北者也伏讀御製詩跋云大宛部落强盛附庸者多哈薩克在彼當是其部中之一國耳臣等竊惟大宛康居境界毗連故邊鄙部落附庸服屬以右部論之理有必然者矣唐書石國即漢康居苖裔在九姓昭武中其國稍北以今形勢考之其東境抵今塔拉斯郭勒而西境尤廣極於塔什罕之東南與安集延諸城相近所謂大宛北鄙者也石國之外别有曹米康史何安火尋戍地諸國皆康居分支始居祁連山北昭武城後稍南依蔥嶺者其未遷之前當屬今右部哈薩克境既遷之後當與今安集延諸城相屬也詳見次卷那木干條欽定皇輿西域圖志卷四十四欽定四庫全書欽定皇輿西域圖志卷四十四藩屬一左部哈薩克左部哈薩克東南與準噶爾接西與右部接北與俄羅斯接其常所㑹廷曰葉什勒傍葉什勒河東去塔爾巴噶台南去伊犁皆千里東南去鎮西府四千五百餘里其部曰鄂圖爾玉兹無城郭逐水草事游牧冬夏别居無常處地廣人稠甲於他部境西北隅有獨樹一株其上五枝盤拏䕃廣可容二百騎名鄂呼引噶克义莫朶為西域神物風俗物産大畧與準噶爾等文字同言語稍異其君曰汗其汗族而為首領者名蘇爾統相傳其地為古大宛今詳考之葢古康居國也其汗阿布賚初乘達瓦齊亂數侵擾準噶爾乾隆二十年二月準噶爾平詔遣使徃諭阿布賚言於使臣侍衛順徳訥達永阿曰向聞大皇帝臨御中土以山川之故貢譯未通今天威逺播掃伊犁興黄教俾與準夷俱生生實無疆之福敢以誠心歸於徳化九月順徳訥等以其使博洛布拜等歸伊犁阿睦爾撒納適以伊犁叛明年走哈薩克阿布賚納之詔遣將軍達爾黨阿由西路哈達哈由北路先後以大軍進阿睦爾撒納之走哈薩克也有奈曼鄂拓克納拉巴圖者邀刼之不獲勦其衆阿睦爾撒納以三騎走附阿布賚其屬欲擒獻阿布賚不可乃遣和集博爾根以兵從阿睦爾撒納走努拉自率千騎西行㑹於蒿哈薩拉克鄂拉下以待我師七月將軍達爾黨阿兵至於雅爾拉與和集博爾根前隊二千餘兵遇賊設伏佯敗我師登於山俯其隂則伏在焉蜂屯蟻聚隨以號火乃堅壁壘繕營伍賊不敢出越宿遣烏爾登以輕騎致師分阿里衮鄂實哈寧阿明瑞為左右翼將軍達爾黨阿副將軍扎拉豐阿執纛以中軍進齊努渾瑪瑺特通額額爾登分部從之賊倉猝不及顧潰於山麓斬首五百七十餘級餘敗去我兵乘勝進努拉擒楚魯克是時和集博爾根方與阿睦爾撒納引二千騎西行我軍逼之列而陣出入鏖戰良乆獲其纛及礟賊乃亂斬三百四十餘級阿睦爾撒納易纛褫衣冠而遁初順徳訥歸自哈薩克以阿布賚恭順狀聞復遣賫勑徃諭七月至博爾喀爾綽濶為哈薩克兵所阻不得達至將軍哈達哈營乃遣扎薩克三都布等擊敗阿布賚兵於蒿哈薩拉克鄂拉下斬首百餘級奪其馬匹輜重無算阿布賚遁師從之復斬首百餘級獲馬二百鎗械百餘獲昭華什由是三戰皆捷師至於伊什勒於是達爾黨阿哈達哈兩軍合魯楚克昭華什既獲而見將軍極陳阿布賚之欲内附也將軍縱之俾往諭曰大皇帝命將討叛爾從賊則死若能擒以來臣僕無二於是阿布賚亦稔知為阿睦爾撒納所賣將擒賊以求臣於我其謀泄阿睦爾撒納乃竊哈薩克馬十餘騎逃歸準噶爾二十二年將軍兆惠㕘贊大臣富徳等復將兵西征阿睦爾撒納再走哈薩克六月阿布賚以兵三萬助擒阿睦爾撒納遣其弟阿布勒比斯為前隊與我兵遇奉將軍馬一參贊馬一陳情請罪願受約束於是兆惠等復遣使徃諭阿布賚乃遣亨集噶爾等奉良馬四表請内附其文曰自臣祖額什木汗揚吉爾汗以來從未得通中國聲教今秪奉大皇帝諭㫖加恩邊末部落臣暨臣屬靡不懽忭感慕皇仁臣阿布賚願率哈薩克全部歸於鴻化永為中國臣僕聞於朝詔受之秋阿布賚使臣至避暑山莊朝謁賜宴萬樹園觀燈火阿布賚既臣於我遂以其兵助擒賊與順徳納遇於途而言曰我哈薩克以阿睦爾撒納之故獲罪天朝仰荷大皇帝鴻慈不棄覆載為臣為僕願悉力擒賊庶贖前罪毋有二心阿睦爾撒納敢外帡幪是不祥人也是有天道其何能活乃以托忒烏珠克字印文導我師巡行諸部是月阿布賚將以計擒阿睦爾撒納於阿爾察圖不獲奔俄羅斯執其從賊額布濟齊巴罕來獻二十一年努拉之役和集博爾根以殘兵遁至是聞阿布賚降乃與喀拉巴拉特者親率其屬三萬户欵於軍門曰外臣不識文字謹以身指降將軍兆惠為啟帳命東向坐將軍南向坐列筵食之牲體哈薩克俗必持咒破戒始食於是乃言為大皇帝臣豈敢稱禁因共飽餤畢引觀花馬射懸鎻子甲射之徹其裏益大駭服約助擒賊叩首去左部咸服二十三年五月哈薩克拜濟格特部落之拜布拉克巴圖魯等獲布庫查罕六月哈薩克哈爾津等獲厄魯特和碩齊皆獻於軍械送京師二十四年阿布賚復遣其兄子俄羅斯蘇爾統及其頭目伯克訥等來朝賜宴皇上較射於御園得與觀焉二十五年復遣使來朝宴賚令觀圍賜勅諭俾約束所部毋越境游牧二十六年正月賜勅諭寛所屬巴魯克巴圖爾侵掠烏梁海罪六月伴送使臣入覲回程定𣲖乾清門侍衛禁哈薩克于烏里雅蘇台市易二十七年二月哈薩克阿布勒瑪木比特等遣使來朝值聖駕南巡覲於揚州行在賜冠服所屬哈喇圖魯什送歸額魯特人口賞賚有加參贊大臣阿桂收取越界游牧之哈薩克等諭寛其罪而還之五月弛烏里雅蘇台市易之禁仍禁私市七月阿布賚遣使來朝命隨觀木蘭圍賜冠服以陪臣烏黙爾為乾清門侍衛令暫歸挈眷移居伊犁二十九年三月阿布勒瑪木比特遣使來朝賜冠服三十四年正月阿布勒比斯遣子卓爾齊來朝三月阿布賚遣子斡里蘇爾統來朝三十八年正月哈薩克波羅特繼其父阿布勒瑪木比特為汗遣使來朝阿布賚子卓爾齊亦來朝四十一年正月阿布賚遣使來朝俱宴賚如例哈薩克建廷葉什勒居客斯騰城其地北極髙四十六度二十分至四十八度距京師偏西三十二度至三十七度當準噶爾北全境東西千里南北六百里四山環繞山脈亦自西而東其南境之山曰喀拉巴克喀爾海鄂拉又東為喀爾克圖哈薩拉克鄂拉又東為扎拉圖哈薩拉克鄂拉又東為勒克楞鄂拉踰山而南入準噶爾境齋爾界又東為鄂綽沁吉斯鄂拉又東為阿爾津沙拉什保台鄂拉又東北為阿爾輝西里入準噶爾境額米爾界自喀拉巴克喀爾海鄂拉西北行折而東為厄勒伊們鄂拉葉什勒河源出焉又北為尼雅克圖鄂拉又東為尼滿哈濟蘭鄂拉又東北為喀爾瑪竒爾哈鄂拉又東為阿克竒位鄂拉又東為巴顔鄂拉又東為蒿哈薩拉克鄂拉即將軍哈達哈敗阿布賚處又東南為阿巴拉爾鄂拉又東至塔爾巴噶台而止羣山内外源泉經絡其最著者為綽多爾圖郭勒出喀拉巴克喀爾海鄂拉東為克巴什博爾濟爾郭勒又東為哈薩拉克布拉克又東為博爾喀得克布拉克又東為額特倫布拉克又東北為什納噶布拉克沮洳渙散燦若列星又東為奎蘇布拉克又東為阿爾齊圖布拉克又東為青吉斯布拉克又北為阿林布拉克又東為阿濟蘇布拉克又東為烏爾圖布拉克又東為色爾格郭勒又東為罕拉海圖布拉克又東北為三察爾郭勒又東為楚庫魯克郭勒又東南踰山入塔爾巴噶台界其在右哈薩克西北境者為葉什勒郭勒沿河西北行二百里為哈薩克春吉索波藍地苦寒其汗盛夏常居此自是以西地益曠渺左部境内岡阜層㳫折而西北行二千里為依底克鄂拉當塔拉斯郭勒東南境入右部御製哈薩克稱臣内屬遣使進貢詩以紀事有序丁丑哈薩克即大宛也從古不通中國雖漢武勞師動衆僅得其馬猶且動色頌功斯何稱焉去嵗我師因追叛冦阿睦爾撒納直入其境哈薩克撤帳驅畜遁去數千里朕以絶域駐師非計也命撤師哈薩克悔其為阿睦爾撒納所賣謀擒之以獻而奸賊復自哈薩克逃迴準噶爾乘噶爾藏多爾濟巴雅爾等之亂鴟張嘯聚今春我師重入伊犁問罪則噶爾藏多爾濟已被其姪扎納噶爾卜所害而扎納噶爾卜又為阿睦爾撒納所襲僅以身免我參贊大臣富徳率師窮追阿睦爾撒納巴雅爾適與哈薩克師遇哈薩克不敢犯我師顔其汗阿布賚随遣使稱臣入覲今巴雅爾已獲阿睦爾撒納亦不日成擒即或竄入哈薩克而哈薩克亦約縛之以獻喜銷兵之有日爰㸃翰以成辭冞入伊犁靖陸梁鯨鮞懲逆武維揚已看頡利成生虜又報洛那歸職方致馬本非如武帝閉闗未得學蕭王更欣願縛渠魁獻載戢干戈日月光御製哈薩克使臣至令隨圍獵並成是什丁丑伊古從來化外蠲間闗馳使逺朝天不知中土嵗月日乃隔長安萬二千塞野便教預獵喜山莊旋與錫恩駢即今行國多天馬附㑹誰窮太史編哈薩克在漢為西域地史漢所記匈奴在北西南夷在西南西域諸國在西為最遼逺相傳哈薩克為古大宛然史記言大宛為城郭之國則正今之葉爾羌喀什噶爾及吐魯番一帶回部非哈薩克也哈薩克雖亦回教而實行國與布魯特同俗又所稱大宛産苜蓿蒲陶今哈薩克亦絶無徒以産馬與大宛相似然西北諸部何處不産馬耶盖漢時大宛烏孫康居奄蔡月氏扞冞于闐諸國統為西域而大宛部落强盛附庸者多哈薩克在彼時當是其部中之一國耳史稱大宛東北則烏孫而吐魯番之東北即厄魯特諸部烏孫者䝉古語謂水也厄魯特逐水草而居史所謂隨畜與匈奴同俗者也且今哈薩克在厄魯特之北是又不同矣史稱大宛東則扞冞于闐扞冞音韻與今之哈密為近史記之扞冞漢書作扜彌又或作拘彌而史記所載為最先漢書之扜彌或因字畫偶誤相沿不改展轉訛謬至云拘彌則益失之逺矣且于寘于闐音聲迥異二者之間必有一誤子寘絶無可考于闐産玉歴代相傳今回部之和闐水多美玉當為于闐故地也亦知大宛非定哈薩克明矣或又以哈密為古伊吾引歴代開田屯兵建設州郡為據然焉知非漢占伊吾之地屯田設戍而扞冞乃西遷近于闐而居乎又安知非中國浸㣲而扞冞仍來其故處乎在昔夷漢言語絶不相通所傳不免悠謬今文武將吏往來西域與行内地無異則史所謂大宛烏孫康居奄蔡月氏扞冞于闐諸國與今之厄魯特哈薩克布魯特葉爾羌喀什噶爾其同異大小皆可以次而徐考且歴代傳記西域諸國所云勝兵數百者其實不過如今之準噶爾卄一昻吉之一回部賽里木阿克蘇等小城有一酋長即可稱一國之類耳設以今所定準噶爾哈薩克及回部相較則史所稱西域三十六國者不啻九牛一毛矣必執史漢為據則司馬遷班固並未身歴其地即至其地而語言不通文字不曉其傳訛有必然者故注其大畧如右御製寄題哈薩克獨樹有序丁丑哈薩克西北隅有獨樹一株其上五株盤拏隂廣可蔽二百騎哈薩克謂之鄂哷引噶克义莫朶鄂哷者河名噶克义莫朶者獨樹之謂本土爾扈特所稱名也樹生河源乆聞其語今問之來使信然夫宇宙之大何竒不有然非實據見聞者奚足稱焉昔既為長白瑞樹歌今復悉此物必有對其理信然獨惜其逺處天末異域伊古及今文人學士且不聞其名安能傳其實㸃筆紀事盖不如漆園寓物謬悠而已獨樹鬱輪囷物惟乆故神哈薩克過其下者必膜拜供獻而不敢稱其名盖如䝉古之鄂博矣鄂博見舊作詩卷中隂周二百騎嵗閲八千春建木誰曽見竒蹤我所詢依稀北谷子䭀飯此修真道書登真隠訣云䭀飯方受西梁真人時在大宛北谷御製萬樹園宴哈薩克使臣詩以紀事丁丑萬樹丹青艷霽霜秋陽送暖似春陽多須深目遵典屬鄂畚槎耏二處皆哈薩克地名歸職方耀武未煩貳師李窮源底藉鑿空張近安逺服休稱慶益勵吾心敬不遑御製九月十五日賜哈薩克使臣觀燈火丁丑九瀛一合貴山朝火樹依前綘蠟燒可識仙莊原月宇只疑鹽澤接星橋霜林葉落還裝葉霞嶠標藏重去聲建標惠逺行時詎尋樂漫稱預節賞元宵御製哈薩克汗阿布賚之姪俄羅斯蘇爾統及其陪臣來朝詩以紀事己夘貢徴曽弗責包茅厚往頻來不藉教命彼近親亦台吉獻其方物乃蒲捎皇輿豈必論疆界廣運何妨示與胞偶值咸賔殷保㤗乾元切體九三爻御製填倉日命哈薩克人觀燈火己夘委羽來經五月程上元盛典值都城得教餅節觀燈火為示懐柔洽衆情陪臣數已較前多更見親支遣洛那俄羅斯蘇爾統為阿布賚汗之姪在其台吉中分最親因専遣朝覲邀賞漫須惜繁費來人多則賞物多外夷見小習氣皆然古來服逺幾經麽化城蜃閣無邊幻翠火明燈依舊新亦有花翎曽至者解稱兩度沐恩人陪臣内有伯克訥者前年入覲得邀寵章之錫今再至即戴所賜花翎意殊自喜示榮侣伴虹光百道燭層霄信有龍門婪尾燒漫誚重儓増頓置上元屈指纔去聲旬朝御製御園賜宴哈薩克蘇爾統俄羅斯等即席得句己夘北紘向化至烝烝懐逺應施慶賜仍親族况來蘇爾統哈薩克汗族而為首領者則稱蘇爾統盖如準噶爾台吉之類闗河遥别客斯騰哈薩克阿卜爾嘛蜜特所居城名也玉花尚積嵰山雪火樹剛收太乙燈典盛漢家歌天馬持盈惟益厲兢兢勤逺寧同道出駹畏懐幸致望風降傳觴何必稱瑶水命舞還教出帝江眩耀口騰明吐火倒投跟絓戯緣橦奉時行慶非誇富錫命惟三協萬邦御製射八韻有序己夘紫籞韶昌九品正資宣對黄間春永四侯爰肄幾閒當御耦之催班更宛人之入侍既掄才而授位三五聫行喜弓燥而手柔疊雙呼雋前者蕃王負弩曽陪靈囿三驅今焉屬國奉琛復覩和門九節念兹觀徳為國朝所素嫺雖值率賔敢家法之稍懈非誇獨擅畧示大端園門曰出入賢良正大光明殿前正門名皇考御額也理事恒兹引對敭多士惟殷斯籲俊逺夷兼值彼來王綠籖器使掄庶位騂角親彎試廣場志正體平力奚主執專藝熟中去聲還常是日發二十矢中十八末一矢正中五層之中的示之所尚傾心服命以同為到手忙時命哈薩克能射者均得預列及彀弓注矢動不成節盖外夷或有習弓矢者然較之滿洲索倫相去不啻逕庭矣詎止朝儀浹宴樂要令平聲廟畧讋張皇外夷惟知重武宴㑹百戯彼雖樂觀終不若示以射獵彼乃誠心悦服不敢輕視中國故朕每於此亟亟焉恬文嬉武夙為戒祖制天庥敢不蘉珥筆儒臣從紀盛自予家法奉無疆御製宴哈薩克陪臣作庚辰哈薩陪臣候起居優恩錫宴示榮諸徐聞壺漏遲金狄不藉瓊筵命象胥塞限寒門帝京到風來暑節曉凉舒時和武定遐方順惟勵謙冲凜執虚御製哈薩克使至俾觀圍庚辰阿布賚汗哈薩克汗名候起居蘇爾平聲統阿布賚姪其名都勒特赫勒蘇爾統盖其貴族之稱如䝉古之台吉云至謁鑾輿兼程而進堪嘉彼前聞阿布賚遣使入覲念其道逺恐不能急馳傳諭緩程而行於十月初旬至熱河而蘇爾統以九月初三自烏里雅蘇台起程月之十八已抵波羅河屯據云途中驛騎餼糧並荷天朝優恤不知跋涉之勞急欲瞻覲天顔以申誠悃厚惠以加寧靳予北界控弦重習獵漢家連網笑周阹圍期二日應教展廿一日駐蹕海喇蘇台止餘一圍因哈薩克使至特命展加二日俾得扈從預觀射得肥麅便賜諸御製哈薩克陪臣到因擕觀廣陵風景壬午哈薩朝正貢馬頻路遥遲到值南巡因教馳驛來江國便挈行春閲綺闉昔嵗觀光稱使者辛未準噶爾使臣曽命至蘇州賜諭爾時準夷尚未𠞰滅哈薩克原屬準夷不通中國也今番優賚實陪臣廣陵鄂畚哈薩克地名何南北總我心懐保赤人御製賜賚哈薩克陪臣並擕遊御園詩以紀事甲申北戒遥踰萬里程陪臣乆乃達都京正月據報哈薩克使臣至邊因命留火戯待之兹以路逺雖命馳驛速行猶至三月始到遂不復賜觀煙火祗按例賜食頒賞遣還鐙宵早過九華照御苑方當百卉榮獻馬無過聊表愫同舟真是大聮情慣來可罷恩筵欵以彼嵗有來使且未值燈節遂弗賜宴厚往仍教例賚行御製上元前二日錫宴外藩即席得句己丑仰流鱗集賀元正錫宴欣逢雪後晴大幕穹窿慶雲擁西山迤邐玉屏横鐻鍝君長舊臣列都爾伯特今亦有出痘者來京賀正與舊藩無異㲥毦衣冠侍子伻哈薩克阿布勒比斯汗遣其子卓爾齊來京特命入宴正是逺來近悦候却教南顧繾遐情緬匪弗靖待之一嵗彼無投誠之信此無赦罪之理將籌大舉用繫逺懐御製哈薩克汗阿布賚遣其子斡里蘇爾統來請安於御園賜宴因成是什己丑未徴侍子入朝參却以輸誠叠遣男右部哈薩克阿布勒比斯遣子卓爾齊於新正入覲令隨朝正外藩宴賚今左部阿布賚之子亦至特命一例錫宴用均柔逺恩禮不督因之深感慕無私應與徧包含笙鏞並奏春光暢金帛優頒愷澤覃忽憶朱波方梗化一為愜意一為慙清晨細雨灑霏㣲開宴穹廬朗旭暉張大幕于西園凡宴外域每用之以順其俗尚也已是澤霑惟霽好敢誇天與及人歸戴恩永矢無他嚮式禮還嘉弗少違章服榮頒剛稱體被教異部耀光輝御製上元前一日宴哈薩克波羅特汗陪臣阿克台里克及卓爾齊即席成什癸巳波羅讀作上聲特兹馳使伻繼汗請命覲都京波羅特以繼其父阿布勒瑪木比特為汗遣陪臣阿克台里克入覲念其汗本受中朝封爵而請命有愛戴之忱且以十一月抄自伊犁馳驛行走便捷上元前即抵京殊屬恭順因優加宴賚底須更平聲置示威重便可允行奬恪誠卓爾齊别部阿布勒比斯王之子向曾來京尤習國禮理藩院引賀新正厚恩豐醼頒嘉節柔逺旁通萬里情御製幸西苑接見朝正外藩年班回部哈薩克來使及西川土司頭人等之初次覲謁者即事得句丙申步輦西華西苑巡匪逰圖覲逺徠臣夾衢左右分迎接露冕笑言普拊循回部更畨乆依例庫車三品阿竒木伯克阿克伯克等十三人朝覲如年例内旗扎薩乆稱賔内札薩克四十九旗之䝉古王公台吉等輪嵗朝正舊稱䝉古賔客以示優異土爾讀作平音扈入朝如雁土爾扈特及杜爾伯特新附之王公台吉等亦每年輪畨入覲哈薩克流仰集鱗哈薩克汗阿布賚遣使鄂托爾齊等朝貢適至來享來王來賀節土司土舍土頭人兩金川平定以後其餘各土司羣籲瞻仰因許其照回部例輪班朝賀今初次來京之土司明正宣慰司甲爾㕘徳沁等八人及綽斯甲布土舍綽爾甲爾㕘等三人土守備加頭等侍衛木塔爾等十一人徳爾格特頭目索特納木拉布坦等七人即命成都將軍明亮統率以行兹于西苑門外隨衆夾道叩謁隨傳㫖詢慰並加賞品級項帶及冠服有差撫兹武偃文修世益切盈持㤗保寅臣等謹按哈薩克地産良馬故相傳為即古大宛及恭讀御製哈薩克使臣至令隨圍獵詩跋辨析精詳哈薩克之非即大宛曠若發䝉矣臣等紬繹聖論研核史書按厥方隅証以風俗定其地為漢之康居唐之黠戛斯備録史書而申以論説如左史記大宛列傳康居在大宛西北可二千里行國控弦者八九萬人與大宛鄰國國小南羈事月氏東羈事匈奴漢書西域傳康居國王冬治樂越匿地到卑闐城去長安萬二千三百里不屬都䕶至越匿地馬行七日至王夏所居蕃内九千一百四里東至都䕶治所五千五百五十里東羈事匈奴宣帝時匈奴五單于並争漢擁立呼韓邪單于而郅支單于怨望殺漢使者西阻康居至成帝時康居遣子侍漢貢獻然自以絶逺獨驕嫚不肯與諸國相望漢為其新通重致逺人終羈縻而未絶烏孫小昆彌末振將弟卑爰疐共謀殺大昆彌將衆八萬餘口北附康居謀欲藉兵兼并兩昆彌魏畧西戎傳北烏伊國在康居北堅昆國在康居西北丁令國在康居北此上三國堅昆中央南去車師六國五千里唐書回鶻𫝊黠戛斯古堅昆國也郅支單于破堅昆於時東距單于廷七千里南車師五千里郅支留都之故後世得其地者訛為結骨稍號紇骨亦曰紇扢斯云直回紇西北三千里東至木馬突厥三部落曰都播彌列哥餓支堅昆之人得以役屬之堅昆本彊國也地與突厥等東至骨利斡南吐蕃西南葛邏禄始隸薛延陀未始與中國通貞觀二十二年聞鐡勒等已入臣即遣使者獻方物其酋長俟利發失鉢屈阿棧身入朝帝以其地為堅昆府隸燕然都䕶髙宗世再來朝景龍中獻方物元宗世四朝獻乾元中為回紇所破自是不能通中國後狄語訛為黠戛斯盖回紇謂之若曰黄赤面云又訛為戛戛斯按漢書西域傳烏孫東與匈奴西北與康居西與大宛南與城郭諸國相接西北與康居接西面北面皆與康居接故不别言北與某接也今之回部為天山以南城郭諸國今之準噶爾在天山北南與回部接為漢烏孫而左部哈薩克在準噶爾北迤邐西行至右部哈薩克與塔什罕接連延二千餘里偏西北行則為後哈薩克是哈薩克全境當準噶爾西北兩面此正漢書所云烏孫西北與康居接者其在於今當兼左右哈薩克而言也又史記漢書俱云康居東羈事匈奴又漢書云匈奴殺漢使者西阻康居又云烏孫北附康居是康居東為匈奴南為烏孫明矣今天山東北實漢匈奴舊壤其西則哈薩克居北準噶爾居南此漢書所謂康居東事匈奴匈奴西阻康居烏孫北附康居者也康居國王冬治樂越匿地夏居蕃内顔師古曰王每冬寒夏暑則别居不一處今哈薩克汗阿布賚夏則居葉什勒等處冬則居哈薩克固斯古爾班察爾等處所謂冬夏别居者其俗亦正相類晉魏以降康居國乃西遷其地屬今右部哈薩克與左部無涉至唐書載黠戛斯地當伊吾之西焉耆北白山之旁似與哈薩克方位不合然考唐書原文所謂伊吾西白山旁者乃推原古堅昆故地當屬今準噶爾境若就郅支單于西破堅昆之後遷都西北則東距單于廷七千里南車師五千里魏畧與唐書所載略同在今準噶爾部北其為哈薩克壤無疑且考伊犁東北即古葛邏禄部而哈薩克又在葛邏禄東北亦正與唐書黠戛斯西南葛邏禄之語相合也右部哈薩克右部哈薩克東去左部二千里北至俄羅斯界西南至塔什罕其部曰烏拉克玉兹汗曰阿比里斯其巴圖爾有三曰吐里拜曰輝格爾徳曰薩薩克拜阿比里斯駐塔什罕城不事事受成而已惟吐里拜實専其政其俗大畧與左部等其地在古康居國西境初阿布賚告於順徳納曰我哈薩克之有三玉兹如準噶爾之有四衛拉特也鄂圖爾玉兹則我為政矣他如竒齊克玉兹烏拉克玉兹族兄為之當與偕來作中土臣乃使其弟阿布勒比斯徃而參贊大臣富徳方以兵索逆賊哈薩克錫拉至右部遣䝉固爾岱赫善等徃撫次軍於莽格特城外是時吐里拜等方與塔什罕回人吐爾占戰不下平之乃下詳見次卷塔什罕條於是吐里拜等感徳畏威指軍門納欵奉馬進表以降其文曰伏念臣者乆思内附逺處邊末與左部阿布賚各長一方為準噶爾阻絶末由自通近聞左部輸服被恩優渥恭惟天使惠來祗領宸訓得均𨽻臣僕誠懽誠忭謹遣臣子弟入覲瞻仰天顔如天覆育之聖人在上臣願竭衰駑奮勉自効永無二心倍於左部表聞乃受正朔列外藩焉二十三年吐里拜遣其子卓蘭及輝格爾徳之弟博索爾滿朝京師賜宴盤山静寄山莊並隨至南苑與觀大閲及燈火恩賚甚渥今測其地北極髙四十三度至四十五度距京師偏西四十五度四十八分東與左部接東南與伊犁西北境接南與布魯特及安集延那木干諸部接西踰塔什罕西六百餘里北至依底克鄂拉名北哈薩克西南為格根郭勒又西南為納穆爾郭勒又南為雅哈爾斯郭勒又西南為錫爾郭勒又西為薩哈斯郭勒又北為塔拉斯郭勒格根郭勒東近塔拉斯郭勒者為哈拉庫爾為達布孫淖爾薩哈斯錫爾兩河之間岡巒綿亘為穆呼札爾鄂拉為哈拉綽克多達巴為莽阿錫魯達巴為柯格納斯達巴嶺北大澤名騰吉斯地周迴數百里盖小海也海之東南崖有部名沙爾又東北薩哈斯郭勒南有達拉什城噶拉楚克城錫爾郭勒西北有波拉克城其東有那斡喀特城又南有蒿達克城由蒿達克西踰錫爾郭勒為塔什罕其城寄居右哈薩克部内而别自為部不相統也御製右部哈薩克歸化遣使朝貢詩以紀事有序戊寅右部哈薩克其汗曰阿比里斯與塔什罕城回人等接壤雜居地廣人稠不下左部阿布賚所屬向為厄魯特間阻未通聲教今年秋參贊大臣都統富徳追捕準夷餘孽哈薩克錫拉兵至其地㑹塔什罕與右部哈薩克搆釁互擊因遣侍衛䝉固爾岱等宣諭威徳哈薩克叩首輸誠即日遣使朝貢而回目莫爾多薩木什和卓亦悔悟息争並令頭目同時入覲念兵非得已而所至如歸披閲郵函輙臚其緣起如此偏師西海剿逋逃取便恩宣雜種曹豈謂解紛更釋難時右部與回人方背水决勝䝉固爾岱等單騎入兩陣間指揮宣檄即解甲聴命匪徴目宿與萄萄情欣左部榮同被其疏畧云右部素與左部阿布賚同為雄長今得均𨽻臣僕自効請倍左部語尤愷摯徳慚去聲兩階㑹偶遭厚徃薄來九經式持盈保㤗一心操御製將之盤山駐蹕湯泉行宫作有序戊寅右部哈薩克歸化侍衛挈其首領將至故徃田盤令彼覲謁欲因携以行圍並至南苑大閲示我國家耿光大烈非為一已之豫遊實繫萬年之式度問安啟蹕卓午駐旌聊詠七言用誌初頓耆定伊犁車甲弢嶠山左右惠同叨扈行俾識朝家制大閲兼陳士氣豪垂拱待叅詎非逸覲揚永朂敢辭勞問安啟蹕初程近興引烟宫一染毫御製右部哈薩克及塔什罕城回人布魯特部首領胥來覲謁恰至山莊曲宴示恩㸃筆成什戊寅罷争歸化信堪嘉見前詩舉踵延頸平聲豈計遐左部哈薩克距京師萬里而贏至右部所居迤西去左部尤逺據云乆懐歸化之心以被準噶爾所隔今始遂本願塔什罕布魯時皆其毗連逺部也向日心殷身忘倦侍衛携之乗傳而來日行三百里厯兩月之乆方到皆不言勞且歡忻踴躍稱真從日入處得到日出處也敷天無外總為家詎期蔥嶺殊言侣也厠田盤曲宴加南苑紆臨俾扈駕視前來者肯教差先是哈薩克布魯特來朝俱令扈從木蘭行圍今時當仲冬大閲因於盤山覲謁之次道便携赴南苑俾得預觀講武以均恩禮輸誠乗傳走陪臣萬里餘程日六旬賜食山莊禮粗習隨圍海子惠重申獻芹乃解歸俘黨賚幣何妨不受人阿睦爾撒納之姪伊什扎布先為我兵所俘旋脱奔哈薩克又轉售於塔什罕城皆未知其為逆酋族屬也侍衛䝉固爾岱到彼識之告以其故遂縳來以獻與入覲人同至念其年幼無知且非逆酋嫡子孫比因嘉回人執送畏懐懇誠特賜以幣並勅釋還之自是開門胥識義應教漏網共懐仁御製南苑行圍雜詠戊寅盤谷迴鑾攜貴山栢冬苑景益蕭閒先來大獮均曽預上年左部哈薩克及今秋布魯特赴覲木蘭皆得随獵今右部哈薩克等繼至携赴南苑閲武錫宴乗便行圍亦令其隨列預觀小狩應教視此間草枯廣甸馬蹄輕疊中非誇技擅精驚喜從他逺方訝歡呼騐我衆人情疎蕪澹靄接寒林勒馬凝思亦偶吟二十年前習獵我原無爾許創垂心御製賜哈薩克布魯特等宴即席得句戊寅烏孫掃凈玉門開受號争先肯後哉獻馬不須金馬去右宛今效左宛來踵前露布相伯仲布魯特東西二部均於今秋覲謁而回兹西部最逺者與哈薩克同至罷戰康居總厠陪塔什罕城回人先與哈薩克相争今修好同來入覲誰道蒲萄經嵗乆三巡早各醉芳醅御製南苑賜哈薩克布魯特塔什罕回人等觀煙火燈詞戊寅欵闗定笮復存卭慶典頻煩舉仲冬為耀光明逮疏狄先陳曼衍引魚龍燈火城南六十春康熙二三十年間元宵盖曽在南苑陳煙火後以建暢春園率於彼度節不復在此觀燈者六十餘年矣重觀因賚逺來人村民遥近扶攜至不禁金吾例可循百道流虹貝闕朝光明彷彿上元宵田蠶事例雖云早已盼霏空六出飄後先接踵共來尊難學蕭王閉玉門爆響連珠成捷報便期早晚定堅昆時我師方圍葉爾羌城日夜望捷音之至風定時暄夜正長上弦魄影已騰光時十一月初五日周家建子原正月想是嫦娥也為去聲忙鱗集應教一視同避寒燈火夜深烘髙張黄幕三巡罷訝似清凉萬樹中山莊三十六景内無暑清凉後即萬樹園邇來觀燈火宴逺蕃之處翠火明燈玉樹攢化城蜃閣絳雲端元宵預借休相擬惠逺寧為好樂觀萬幕髙竿揭野燈半輪真是一條氷肩輿宴罷還行館惕夕因心畏益増御製大宛馬歌己夘今之哈薩昔大宛哈薩克雖三字急呼薩克則為一音盖本兩字漢字析而為三嶠山神種古所傳烏孫中閡阻聲教向為準噶爾所隔不通中國攘為已有曽貢閑準噶爾台吉噶爾丹䇿凌時屢貢哈薩克馬曽有詩不仁之守再世斬伊犁萬里拓幅員哈薩布魯布魯特字從上亦急呼成二字胥向化無他為賮致敬䖍騕褭汗血實方物左右部長及可汗遣其首領逺來獻却之失望厚賚還駩騢騮騅類實夥匍匐牽跪陳墀前為龍為徠各夭矯雄姿逸態英且間流珠歕玉誰則見奔霄追電有必然徃者貳師求善種徒勞數萬惡少年致一二耳猶艷詡奚稱歸徳開逺門闢疆勤逺非本意人歸天與寧可捐人歸天與寧可捐作歌自警示後昆漢書西域傳康居有小五王一曰蘇䪥王治蘇䪥城二曰附墨王治附墨城三曰窳匿王治窳匿城四曰罽王治罽城五曰奥鞬王治奥鞬城凡五王屬康居晉書西域傳康居國在大宛西北可二千里與粟弋伊列鄰接其王居蘇薤城風俗及人貌衣服畧同大宛地和暖饒桐栁蒲陶多牛羊出好馬㤗始中其王那鼻遣使上封事并獻善馬魏書西域傳者舌國在破洛那西北去代一萬五千四百五十里太延三年遣使朝貢自是不絶唐書西域傳石或曰柘支曰柘折曰赭時漢大宛北鄙也東北距西突厥西北波臘南二百里所抵俱戰提西南五百里康也圓千餘里右涯素葉河王姓石治柘折城故康居小王窳匿城地西南有藥殺水入中國謂之真珠河亦曰質河東南有大山隋大業初西突厥殺其王以特勒匐職統其國顯慶三年以瞰羯城為大宛都督府開元初封其君莫賀咄吐屯有功為石國王二十八年又册順義王天寳中初封王子那俱車鼻施為懐化王賜鐡劵乆之安西節度使髙仙芝討之俘以獻斬闕下王子走大食乞兵攻怛邏斯城敗仙芝軍自是臣大食寳應時遣使朝貢按自左部哈薩克西南行曠野二千餘里逐水草無城郭在準噶爾西北以漢書烏孫西北與康居接之文証之哈薩克為康居故地其説畧備于前矣第按漢書大宛北與康居接烏孫西與大宛接休循捐毒西北至大宛國史記大宛土著耕田有城郭屋室是大宛當在烏孫之西康居之南休循捐毒之西北有城郭之國即是也今右部哈薩克西境直抵塔什罕其汗阿比里斯即居塔什罕城内而塔什罕城之東北西北一帶尚有城郭部落則今之右部哈薩克當屬漢康居之五小王地其西南鄙則接大宛之西北者也伏讀御製詩跋云大宛部落强盛附庸者多哈薩克在彼當是其部中之一國耳臣等竊惟大宛康居境界毗連故邊鄙部落附庸服屬以右部論之理有必然者矣唐書石國即漢康居苖裔在九姓昭武中其國稍北以今形勢考之其東境抵今塔拉斯郭勒而西境尤廣極於塔什罕之東南與安集延諸城相近所謂大宛北鄙者也石國之外别有曹米康史何安火尋戍地諸國皆康居分支始居祁連山北昭武城後稍南依蔥嶺者其未遷之前當屬今右部哈薩克境既遷之後當與今安集延諸城相屬也詳見次卷那木干條欽定皇輿西域圖志卷四十四
