front:
  text: 欽定四庫全書欽定皇輿西域圖志卷三十九
  hash: sha256:1214b66c2a5b55051c1b962e71d9f2e82f1bc38a97969902b63bafa184bada66
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0039_WYG_049-1a}
body:
  text: 風俗臣等謹按五土之民剛柔燥濕異其齊大川廣谷異其制民生其間習尚判殊即同一沙漠之壤而種區族别其性情好惡所著暨嵗時伏臘交際吉凶諸事宜亦自各限土風彼此不能相效無他俗使然也若同生斯土或前弱而後強或今柔而昔悍惟視禁令驅使者之轉移而民不能以自主是則風之為矣史記漢書祗粗舉㳺牧田作之槩北魏以後記載較詳而彼此参差末由符契準噶爾為烏孫故地以逐水草為業舊史稱其剛惡貪狠最為彊國回部諸國多有城郭而土著頗亟三農之務毎當麥禾成熟時苦凖夷侵軼約輸粟而服屬焉徴發期㑹惟其所使夫是故準夷常彊回部常弱準夷恒役夫回部回部恒屬於準夷此積威約之漸也曩者準既違天回復偝德天戈所麾盡歸疆索加以拊循施之訓誨向之濡染舊習者弗遷其地蒸蒸然咸薫徳而善良猗歟休哉爰有荷㦸征人從軍書記役茲西土者因採樵營壘之餘尋風詢俗既得識其大凢奏凱言旋津津以道洎底定以來設官吏駐兵民耳目周知倍為審的揆厥大端可約而紀舉夫田畜之業刑禁之制婚姻之禮䘮葬之期嵗時聚㑹徴逐嬉游之事就所見聞述而志焉若其事稍渉荒誕詭異不足登星軺里鼓示信方来者概屏弗録志風俗第十五
  hash: sha256:917a36979a798deb8f6320872c3d1ccd54a2083f9e2b02b650138dbdc2085b6b
