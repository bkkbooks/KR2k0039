body:
  text: 山一安西南路南山金山獨登山寛臺山尖山青山懸泉山三危山鳴沙山羊膊山青墩峽三隴山龍勒山紅山安西北路星星峽㙮勒納沁鄂拉雅爾瑪罕鄂拉必栁鄂拉㙮什達巴庫舍圖達巴阿勒扎噶勒鄂拉鄂什竒鄂拉和洛圖達巴烏可克達巴托來達巴察罕托羅海哈套鄂拉察罕哈瑪爾鄂拉阿達爾干鄂拉庫克托木達巴必濟鄂拉阿濟鄂拉哈布㙮克欽定皇輿西域圖志巻二十目録欽定四庫全書欽定皇輿西域圖志卷二十目録山一安西南路南山金山獨登山寛臺山尖山青山懸泉山三危山鳴沙山羊膊山青墩峽三隴山龍勒山紅山安西北路星星峽㙮勒納沁鄂拉雅爾瑪罕鄂拉必栁鄂拉㙮什達巴庫舍圖達巴阿勒扎噶勒鄂拉鄂什竒鄂拉和洛圖達巴烏可克達巴托來達巴察罕托羅海哈套鄂拉察罕哈瑪爾鄂拉阿達爾干鄂拉庫克托木達巴必濟鄂拉阿濟鄂拉哈布㙮克欽定皇輿西域圖志巻二十目録
