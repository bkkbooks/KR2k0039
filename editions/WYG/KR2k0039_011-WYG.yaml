body:
  text: 疆域四天山北路一庫爾喀喇烏蘇路庫爾喀喇烏蘇奎屯布勒哈齊達木達喀喇烏蘇古爾圖喀喇烏蘇托多克鄂壘扎拉圖噶順烏里雅蘇圖晶河托里察罕拜甡托和木圖塔爾巴噶台路塔爾巴噶台雅爾竒爾噶遜齊布哈達遜愛呼斯烏蘭呼濟爾綽爾郭察罕呼濟爾額敏哲克得里克納林和博克格爾鄂爾格克特和博克烘郭爾鄂籠什巴爾圖烏爾圖薩里納木穆呼勒戴鄂多特達爾達木圖蘇海圖謨多圖布古圖尼楚滚布古圖伊竒爾布爾噶蘇台察拉垓綽爾齋爾額爾齊斯青吉勒欽定皇輿西域圖志卷十一目録欽定四庫全書欽定皇輿西域圖志卷十一目録疆域四天山北路一庫爾喀喇烏蘇路庫爾喀喇烏蘇奎屯布勒哈齊達木達喀喇烏蘇古爾圖喀喇烏蘇托多克鄂壘扎拉圖噶順烏里雅蘇圖晶河托里察罕拜甡托和木圖塔爾巴噶台路塔爾巴噶台雅爾竒爾噶遜齊布哈達遜愛呼斯烏蘭呼濟爾綽爾郭察罕呼濟爾額敏哲克得里克納林和博克格爾鄂爾格克特和博克烘郭爾鄂籠什巴爾圖烏爾圖薩里納木穆呼勒戴鄂多特達爾達木圖蘇海圖謨多圖布古圖尼楚滚布古圖伊竒爾布爾噶蘇台察拉垓綽爾齋爾額爾齊斯青吉勒欽定皇輿西域圖志卷十一目録欽定四庫全書欽定皇輿西域圖志卷十一疆域四天山北路一庫爾喀喇烏蘇路東至奎屯接安西北路迪化州綏來縣界西至托和木圖接伊犁東路之呼蘇圖布拉克臺界北接塔爾巴噶台界南界天山庫爾喀喇烏蘇庫爾喀喇烏蘇在迪化州綏來縣屬安濟哈雅西二十里庫爾郭勒源發天山北麓北流經其地乾隆二十八年於河濵建遂成堡門四東曰延和西曰迎灝南曰調薫北曰溥信設兵屯田見屯政門奎屯奎屯在庫爾喀喇烏蘇東五十里東有長河當孔道舊為布爾古特台吉呢嗎㳺牧處呢嗎内附授職從征後附阿睦爾撒納劫將軍和起乾隆二十二年將軍成衮扎布遣副都統由屯等追至哈什郭勒上㳺之阿爾齊圖山口擒之伏誅其地東與廸化州綏來縣屬之安濟哈雅接界舊相毗連為一部自奎屯北行九十里為庫爾郭勒東境又九十里為沙拉烏蘇又七十里為鄂倫布拉克又北接塔爾巴噶台界布勒哈齊布勒哈齊在庫爾喀喇烏蘇西六十五里西濵濟爾噶朗郭勒南境有水北流入濟爾噶朗郭勒下流彚入布勒哈齊郭勒西流入淖爾按布勒哈齊在布勒哈齊淖爾西南境支河之間自布勒哈齊迤西一帶應屬唐時西突厥之攝舍提暾部地説見後博羅塔拉條達木達喀喇烏蘇達木達喀喇烏蘇在布勒哈齊西六十里額布圖郭勒經流其地古爾圖喀喇烏蘇古爾圖喀喇烏蘇在達木達喀喇烏蘇西五十五里地有流泉瀦為小澤托多克托多克在古爾圖喀喇烏蘇西六十里有泉三道合而東北流南五十里曰阿克塔木鄂壘扎拉圖鄂壘扎拉圖在托多克西四十里乾隆二十一年冬阿睦爾撒納之叛準噶爾宰桑等俱為煽惑將軍兆惠自濟爾噶朗以偏師徃守伊犁甫至鄂壘扎拉圖突與達什䇿凌等賊遇乗夜出擊殱賊千餘而噶爾藏多爾濟扎納噶爾布等渠酋復合兵邀我師歸路適援兵圖倫楚至并力夾擊賊解圍潜遁我師全隊還巴爾庫勒御製戰圖補詠紀其事恭載卷首噶順噶順在鄂壘扎拉圖西三十里布勒哈齊淖爾瀦其北哈喇古顔鄂拉峙其南烏里雅蘇圖烏里雅蘇圖在噶順西七十里有土城向為西路大兵駐營之所晶河晶河地以河名在烏里雅蘇圖西三十里乾隆二十三年十月將軍兆惠擒布爾古特台吉渾齊於此初渾齊以從賊扎納噶爾布首級來獻及是降之入版圖後于乾隆二十八年建豐潤堡門三曰咸寧曰同軌曰景風其地土膏饒沃有屯田見屯政門托里托里在晶河西六十里地有小水清圓如鏡又西南有地名古爾班呼蘇台察罕拜甡察罕拜甡在托里西五十里有舊城托和木圖托和木圖在察罕拜甡西二十里踰庫克木蘇克郭勒至其地又西接伊犁界塔爾巴噶台路自塔爾巴噶台東行至額爾齊斯接喀爾喀界西行至齋爾接哈薩克界南踰沙磧接安西北路迪化州界北接藩屬俄羅斯界塔爾巴噶台塔爾巴噶台在迪化州北五百里東北距阿勒坦鄂拉千里地廣饒水草宜畜牧當準噶爾東北境舊為伊克明阿特部㳺牧之所巴雅爾之昻吉乾隆二十年大兵進討準噶爾巴雅爾以其屬降及阿睦爾撒納叛巴雅爾旋附為逆二十二年五月㕘贊大臣富徳窮追阿睦爾撒納至塔爾巴噶台鄂拉特里特達巴時巴雅爾潜據山谷間侍衛竒徹布等設伏於險驍騎校訥門徳勒等伏雅爾郭勒渡口夜半巴雅爾以其妻子及所屬逸出遇訥門徳勒殺四人擒一人竒徹布等追之至雅爾郭勒下流窄河山岩内賊方造食竒徹布麾軍繞岩進侍衛努三下流衝擊斬二十賊獲宰桑一及巴雅爾子塔拉巴爾巴雅爾又以餘衆走匿塔爾巴噶台山谷與䕶軍校占頗圖馬甲海蘭察遇擒之於是塔爾巴噶台左右諸境俱入版圖乾隆三十二年建綏靖城門三東曰翔和西曰布説南曰遂亨唐書回鶻傳葛邏禄本突厥諸族在北庭西北金山之西有三族一謀落或為謀刺二熾俟或為婆匐三踏實力永徽初高偘之伐車鼻可汗三族皆内屬顯慶二年以謀落部為隂山都督府熾俟部為大漠都督府踏實力部為元池都督府即用其酋長為都督熾俟部置金附州三族當東西突厥間常視其興衰附叛不常也後稍南徙自號三姓葉䕶廷州以西諸突厥皆畏之開元初再來朝天寳時與回紇抜悉密共攻殺烏蘇米施可汗又與回紇擊拔悉密走其可汗阿史那施於北庭奔京師葛禄即葛邏禄與九姓復立回紇葉䕶懐仁可汗於是葛禄之處烏徳鞬山者臣回紇在金山北庭者自立葉䕶嵗來朝乆之葉䕶頓毗伽縛突厥叛酋阿布思進封金山郡王天寳間凡五朝至徳後葛邏禄寖盛與回紇爭强徙十姓可汗故地盡有碎葉怛邏斯諸城地理志顯慶三年分葛邏禄三部置三府隂山州都督府以謀落部置大漠州都督府以熾俟部置元池州都督府以踏實力部置金附州都督府析大漠州置右𨽻北庭都䕶府按唐書回鶻傳載賀魯居多邏斯川時統有歌邏禄部歌邏禄即葛邏禄也賀魯滅於唐高宗永徽四年而葛邏禄已於永徽之初内附其三族分疆之處史無明文難以審証然考當時東西突厥分有烏孫故地葛邏禄居東西突厥間而沙陀突厥則與東西突厥雜居者為今塔爾巴噶台以南迪化州以北一帶沙磧以此推之葛邏禄舊壤當在沙磧之北與今塔爾巴噶台全境所屬方位相合其地東直金山南直廷州所謂在金山北庭者而頓毗伽封金山郡王亦以其附近金山故有是號也至三葛邏禄與車鼻接壤而史稱車鼻在金山之北益知葛邏禄在金山之西矣雅爾雅爾在塔爾巴噶台西北二百里舊為準噶爾伊克明阿特部㳺牧之所車凌班珠爾之昻吉乾隆二十八年建肇豐城門四東曰翔和南曰乘離西曰布説北曰暨朔土壤膏沃水草滋豐雅爾郭勒經流其北西北流入愛呼斯淖爾竒爾噶遜齊布哈達遜竒爾噶遜齊布哈達遜在塔爾巴噶台東南朱爾庫朱鄂拉西乾隆二十年阿睦爾撒納叛包沁部宰桑阿克諸爾等附為逆時侍衛竒徹布監其衆阿克諸爾以兵圍軍營竒徹布倉卒無備匹馬突圍引弓左右射賊盡辟易且戰且走入栁林内賊圍之數重懼其勇不敢犯復射殺十餘賊衆乃潰天子壯其勇賜名舒布圖鎧巴圖魯於是包沁賊衆䦨出卡倫竄走北路喀爾喀郡王巴扎爾錫第等窮追及此擒之所部乃定御製舒布圖鎧巴圖魯竒徹布歌丙子千人萬人敵昔有亦惟能將資衆力一人奮勇敵二千昔未前聞今始出其人曰惟竒徹布向為侍衛備宿值叶去嵗從軍監包沁包沁之人乃通賊厄魯特呼礟為包包沁其司礟人也上年五月其宰桑阿克諸爾率衆二千餘人來附逆賊阿睦爾撤納之亂包沁煽動闌出卡倫為官軍所殱來圍其帳欲肆害竒徹布曽無懼色徐腰櫜鞬手弓箭出帳跨馬聲霹靂蟻聚叫讙羣近前應弦馥倒賊辟易辟易復前恃其衆長鎗大銃近相逼竒徹布且戰且走得一栁林為障翼賊人圍之凡數重恐自傷無施銃隙持鎗人亦不敢進進被箭死屍横骼二千人各二千心一人氣奪二千魄侵尋天暮衆西奔竒徹布歸奏殊績賜金賜爵酬勤勞復請從師肯宴息舒布圖鎧巴圖魯神勇之名汝應得荆軻孟賁匹夫豪日月爝火光應熄我歌嘉爾豈徒然朂我八旗永為式愛呼斯愛呼斯在塔爾巴噶台西七十里愛呼斯淖爾發源其地瀦為大澤北接哈薩克界烏蘭呼濟爾烏蘭呼濟爾在雅爾東南北倚朱爾庫朱鄂拉舊為布庫弩特鄂拓克㳺牧之所後漢書西域傳蒲類王得罪單于徙六千餘口内之匈奴右部阿惡地因號阿惡國南去車師後部馬行九十餘日人口貧羸逃亡山谷間故留為國云按漢時匈奴烏孫交界處在焉耆直北今烏蘭呼濟爾在闢展直北應屬匈奴西境所謂右部者是己范史所稱阿惡國雖無里道逺近可考然當時蒲類王得罪匈奴單于而西遷其人於此以方位求之宜在今烏蘭呼濟爾南境近附沙磧之地也由是而南入沙磧為沙陀突厥故壤詳見本卷哲克得里克條綽爾郭綽爾郭在烏蘭呼濟爾西鄂爾和楚克鄂拉北地饒水草舊為阿睦爾撒納之昻吉察罕呼濟爾察罕呼濟爾在鄂爾和楚克鄂拉北綽爾郭西舊為達瓦齊之昻吉額敏額敏在察罕呼濟爾西烏里雅蘇台郭勒南岸地饒水草舊為鄂畢特鄂拓克㳺牧處自雅爾至此為塔爾巴噶台北境哲克得里克哲克得里克在塔爾巴噶台南境南至迪化州三百里北境有河合流南下其東南境沙漠彌望東西五百里南北三百里即唐所謂沙陀者也唐書沙陀傳西突厥别部處月種也始突厥東西部分治烏孫故地與處月處蜜雜居貞觀七年太宗立利邲咄陸可汗而族人步真􅔵望謀并其弟彌射乃自立彌射懼率處月等入朝而步真勢窮亦歸國其留者咄陸以射匱特勒刼越之子賀魯統之處月居金娑山之陽蒲類之東有大磧名沙陀故號沙陀突厥云賀魯來降拜瑶池都督處月朱邪闕俟斤阿厥亦請内屬永徽初賀魯反射脾俟斤沙陀那速不肯從髙宗以賀魯所領授之廢瑶池都督府即處月地置金滿沙陀二州皆領都督賀魯亡處月來歸乃置崑陵都䕶府統咄陸部以彌射為都䕶龍朔初以處月酋沙陀金山從武衛將軍薛仁貴討鐡勒長安二年為金滿州都督子輔國嗣先天初徙部北庭率其下入朝開元二年復領金滿州都督至徳寳應間中國多故北庭西州閉不通朝奏使皆道出回紇而虜多漁擷尤苦之雖沙陀之倚北庭者亦困其暴歛貞元中沙陀部七千帳附吐藩吐藩冦邊常以沙陀為前鋒元和三年悉衆三萬落循烏徳鞬山而東欵靈州塞詔處其部鹽州置隂山府按沙陀為西突厥别種而突厥治烏孫故地今準噶爾地屬漢烏孫塔爾巴噶台南境大磧綿亘其為沙陀故跡較然無疑漢時蒲類國得罪匈奴而遷右部在今迪化州説見前卷迪化州屬沙磧正當其北所謂沙陀即處月居蒲類之東者方位不爽沙磧之中山谷委蛇祁連分支東西相望金沙之山於是乎在賀魯居多邏斯川即今額爾齊斯説見本卷及卷二十五水葢建庭於此而南統沙陀諸部也賀魯叛沙陀不從廢瑶池都督府而置金滿沙陀二州於處月之地以賀魯所統授之者葢建庭於南而北統多邏斯川諸部也今自烘和圖淖爾額爾齊斯郭勒南至大磧竟六百里當時統馭所及方隅較然金滿沙陀二州交界莫考然按漢書車師後部有金滿城唐書地理志北庭大都䕶府有金滿縣則此金滿州宜居南附山為漢金滿城舊地而沙陀州宜居北以地有沙磧故名也賀魯亡後處月來歸即其地置崑陵都䕶府者所以統金滿沙陀二州之地而賀魯舊庭别置濛池都䕶府與崑陵都䕶府南北分治則崑陵都䕶府所轄當在今薩里山以南迄於天山而額爾齊斯郭勒一帶不及焉沙陀金山之後或徙北庭或附吐蕃叛服不常而故壤仍為所統自元和三年東徙鹽州范希朝鎮太原料其勁騎為沙陀軍其酋長朱邪執宜保神武川之黄花堆更號隂山北沙陀雖仍舊名而非舊地矣納林和博克納林和博克在哲克得里克西北八十里北倚鄂爾和楚克鄂拉山下有泉南流㑹克特和博克之水合流南注於哲克得里克舊為布庫努特鄂拓克㳺牧之所唐書突厥傳西突厥始與東突厥分烏孫故地而有之由焉耆西北七日行得南庭北八日行得北庭與都陸努失畢歌邏禄處月處蜜伊吾諸種雜按今山南回部之哈喇沙爾為古焉耆自哈喇沙爾踰山直北至納林和博克六百餘里所謂西突厥北庭由焉耆北八日行者宜屬此地也後自泥橛處羅可汗朝隋被留不遣國人别立射匱可汗徙庭三彌山其弟統葉䕶可汗復徙千泉在今伊犁西境非復焉耆直北為北庭之舊矣格爾鄂爾格格爾鄂爾格在納林和博克東又東為克特和博克舊謂酋長所居之地為鄂爾格疑當時部酋建庭於此故名克特和博克克特和博克在納林和博克東南二十里水南流㑹納林和博克郭勒入哲克得里克境西三里許有古廟為準噶爾境内舊蹟建置之始葢莫考矣唐書突厥傳使拔悉蜜奚契丹分道捕黙棘連黙棘連大恐抜悉蜜距北庭三百里乃分兵由他道襲拔其城天寳初其大部回紇葛邏禄拔悉蜜並起攻葉䕶殺之尊拔悉蜜之長為頡跌伊施可汗於是回紇葛邏禄自為左右葉䕶可汗國人奉判闕特勒子為烏蘇米施可汗以其子葛臘哆為西殺其下不與拔悉蜜等三部共攻烏蘇米施米施遁亡其西葉䕶阿布思及噶臘哆率五千帳降以葛臘哆為懐恩王三載拔悉蜜等殺烏蘇米施傳首京師其弟白眉特勒鶻隴匐立是謂白眉可汗於是突厥大亂國人推拔悉蜜酋為可汗詔朔方節度使王忠嗣以兵乗其亂抵薩河内山擊其左阿波達干十一部破之獨其右未下而回紇葛邏禄殺拔悉蜜可汗奉回紇骨力裴羅定其國是謂骨咄禄毗伽闕可汗明年殺白眉可汗傳首獻回鶻傳拔悉蜜貞觀二十三年始來朝天寳初與回紇葉䕶擊殺突厥可汗立㧞悉蜜大酋阿史那施為賀臘毗伽可汗遣使者入謝不三嵗為葛邏禄回紇所破奔北庭後朝京師拜左武衛將軍地與衆歸回紇按拔悉密與葛邏禄雜居東連回紇以暾欲谷距北庭三百里之文考之宜在今烏魯木齊北三百里外則正今之克特和博克納林和博克一帶地其與三葛邏禄分疆處所即不可考要其大槩自不可易也拔悉密為頡跌伊施可汗時葛邏禄為右葉䕶其地自當在拔悉密西至葛臘哆西殺之地方隅界址雖難確指然既名西殺地應偏右當與葛邏禄雜居北境矣突厥傳載白眉可汗立後拔悉蜜酋復為可汗應即回鶻傳所謂賀魯毗伽可汗者與頡跌伊施可汗分王故地不三嵗而或殺或奔於是其地皆歸葛邏禄唐書回鶻傳所謂在金山北庭自立葉䕶與回紇爭强者也餘詳前塔爾巴噶台條烘郭爾鄂籠烘郭爾鄂籠在克特和博克東十五里什巴爾圖什巴爾圖在烘郭爾鄂籠東北百里西倚山岩南臨沙磧無水有草烏爾圖烏爾圖在什巴爾圖東北五十里烏爾圖布拉克經其南薩里鄂拉環其北薩里薩里在烏爾圖東北六十里北有薩里鄂拉其下出泉東流入於沙磧納木納木在哲克得里克西踰哈畢爾噶布拉克托來布拉克至其地北倚高山南麓有泉左右二源合而南流入於沙磧舊為阿克巴集賽㳺牧之所穆呼勒戴鄂多特穆呼勒戴鄂多特在納木西四十里北倚鄂爾和楚克鄂拉南臨額彬格遜淖爾山麓有泉南流入於沙磧舊為阿克巴集賽㳺牧之所達爾達木圖達爾達木圖在穆呼勒戴鄂多特西二十里北倚髙山南臨淖爾山麓有泉南流入於沙磧亦阿克巴集賽㳺牧之所蘇海圖蘇海圖在達爾達木圖西二十里北倚高山南臨淖爾山麓有泉南流入於沙磧亦阿克巴集賽㳺牧之所謨多圖布古圖謨多圖布古圖在蘇海圖西南二十里北倚高山山麓有泉南流入於沙磧亦阿克巴集賽㳺牧之所泥楚滚布古圖泥楚滚布古圖在謨多圖布古圖西南有泉南流出谷入於沙磧亦阿克巴集賽㳺牧之所西十里有鄂倫布拉克接庫爾喀喇烏蘇界伊竒爾伊竒爾在泥楚滚布古圖西四十里踰鄂倫布拉克而止北倚高山山麓有泉南流入於沙磧舊為伊克呼拉爾集賽㳺牧之所布爾噶蘇台布爾噶蘇台在伊竒爾西四十里北倚高山山麓有泉南流入於沙磧亦伊克呼拉爾集賽㳺牧之所察拉垓察拉垓在布爾噶蘇台西三十里北倚高山山麓有泉南流入於沙磧舊為賚嗎里木集賽㳺牧之所綽爾綽爾在察拉垓西四十里北倚高山山麓有泉南流入於沙磧亦賚嗎里木集賽㳺牧之所齋爾齋爾在綽爾東北五十里踰山而至東北距額敏三百里地廣饒水草舊為阿克巴拉布里木杜爾巴推素隆伊克呼拉爾五集賽㳺牧之所乾隆二十四年大兵進勦凖噶爾五集賽宰桑達什䇿凌等以其地内屬自哲克得里克至此為塔爾巴噶台西南境額爾齊斯額爾齊斯在塔爾巴噶台東南青吉勒郭勒北境阿勒坦鄂拉西境東西七百里南北三百里額爾齊斯郭勒經流其地為都爾伯特部㳺牧之所乾隆十八年台吉䇿凌䇿凌伍巴什䇿凌孟克等率所屬二千六百餘户内附編設旗分優錫親王等爵俾長故地都爾伯特為四衛拉特之一厥後綽羅斯和碩特輝特以肆惡淪亡惟都爾伯特部終守臣節至今弗替云隋書西突厥傳西突厥者木杆可汗之子大邏便也與沙鉢畧有隙因分為二漸以彊盛東距都斤西越金山龜兹鐡勒諸胡悉附之後處羅可汗居無恒處然多在烏孫故地射匱襲處羅