草舊為阿睦爾撒納之昻吉察罕呼濟爾察罕呼濟爾在鄂爾和楚克鄂拉北綽爾郭西舊為達瓦齊之昻吉額敏額敏在察罕呼濟爾西烏里雅蘇台郭勒南岸地饒水草舊為鄂畢特鄂拓克㳺牧處自雅爾至此為塔爾巴噶台北境哲克得里克哲克得里克在塔爾巴噶台南境南至迪化州三百里北境有河合流南下其東南境沙漠彌望東西五百里南北三百里即唐所謂沙陀者也唐書沙陀傳西突厥别部處月種也始突厥東西部分治烏孫故地與處月處蜜雜居貞觀七年太宗立利邲咄陸可汗而族人步真􅔵望謀并其弟彌射乃自立彌射懼率處月等入朝而步真勢窮亦歸國其留者咄陸以射匱特勒刼越之子賀魯統之處月居金娑山之陽蒲類之東有大磧名沙陀故號沙陀突厥云賀魯來降拜瑶池都督處月朱邪闕俟斤阿厥亦請内屬永徽初賀魯反射脾俟斤沙陀那速不肯從髙宗以賀魯所領授之廢瑶池都督府即處月地置金滿沙陀二州皆領都督賀魯亡處月來歸乃置崑陵都䕶府統咄陸部以彌射為都䕶龍朔初以處月酋沙陀金山從武衛將軍薛仁貴討鐡勒長安二年為金滿州都督子輔國嗣先天初徙部北庭率其下入朝開元二年復領金滿州都督至徳寳應間中國多故北庭西州閉不通朝奏使皆道出回紇而虜多漁擷尤苦之雖沙陀之倚北庭者亦困其暴歛貞元中沙陀部七千帳附吐藩吐藩冦邊常以沙陀為前鋒元和三年悉衆三萬落循烏徳鞬山而東欵靈州塞詔處其部鹽州置隂山府按沙陀為西突厥别種而突厥治烏孫故地今準噶爾地屬漢烏孫塔爾巴噶台南境大磧綿亘其為沙陀故跡較然無疑漢時蒲類國得罪匈奴而遷右部在今迪化州説見前卷迪化州屬沙磧正當其北所謂沙陀即處月居蒲類之東者方位不爽沙磧之中山谷委蛇祁連分支東西相望金沙之山於是乎在賀魯居多邏斯川即今額爾齊斯説見本卷及卷二十五水葢建庭於此而南統沙陀諸部也賀魯叛沙陀不從廢瑶池都督府而置金滿沙陀二州於處月之地以賀魯所統授之者葢建庭於南而北統多邏斯川諸部也今自烘和圖淖爾額爾齊斯郭勒南至大磧竟六百里當時統馭所及方隅較然金滿沙陀二州交界莫考然按漢書車師後部有金滿城唐書地理志北庭大都䕶府有金滿縣則此金滿州宜居南附山為漢金滿城舊地而沙陀州宜居北以地有沙磧故名也賀魯亡後處月來歸即其地置崑陵都䕶府者所以統金滿沙陀二州之地而賀魯舊庭别置濛池都䕶府與崑陵都䕶府南北分治則崑陵都䕶府所轄當在今薩里山以南迄於天山而額爾齊斯郭勒一帶不及焉沙陀金山之後或徙北庭或附吐蕃叛服不常而故壤仍為所統自元和三年東徙鹽州范希朝鎮太原料其勁騎為沙陀軍其酋長朱邪執宜保神武川之黄花堆更號隂山北沙陀雖仍舊名而非舊地矣納林和博克納林和博克在哲克得里克西北八十里北倚鄂爾和楚克鄂拉山下有泉南流㑹克特和博克之水合流南注於哲克得里克舊為布庫努特鄂拓克㳺牧之所唐書突厥傳西突厥始與東突厥分烏孫故地而有之由焉耆西北七日行得南庭北八日行得北庭與都陸努失畢歌邏禄處月處蜜伊吾諸種雜按今山南回部之哈喇沙爾為古焉耆自哈喇沙爾踰山直北至納林和博克六百餘里所謂西突厥北庭由焉耆北八日行者宜屬此地也後自泥橛處羅可汗朝隋被留不遣國人别立射匱可汗徙庭三彌山其弟統葉䕶可汗復徙千泉在今伊犁西境非復焉耆直北為北庭之舊矣格爾鄂爾格格爾鄂爾格在納林和博克東又東為克特和博克舊謂酋長所居之地為鄂爾格疑當時部酋建庭於此故名克特和博克克特和博克在納林和博克東南二十里水南流㑹納林和博克郭勒入哲克得里克境西三里許有古廟為準噶爾境内舊蹟建置之始葢莫考矣唐書突厥傳使拔悉蜜奚契丹分道捕黙棘連黙棘連大恐抜悉蜜距北庭三百里乃分兵由他道襲拔其城天寳初其大部回紇葛邏禄拔悉蜜並起攻葉䕶殺之尊拔悉蜜之長為頡跌伊施可汗於是回紇葛邏禄自為左右葉䕶可汗國人奉判闕特勒子為烏蘇米施可汗以其子葛臘哆為西殺其下不與拔悉蜜等三部共攻烏蘇米施米施遁亡其西葉䕶阿布思及噶臘哆率五千帳降以葛臘哆為懐恩王三載拔悉蜜等殺烏蘇米施傳首京師其弟白眉特勒鶻隴匐立是謂白眉可汗於是突厥大亂國人推拔悉蜜酋為可汗詔朔方節度使王忠嗣以兵乗其亂抵薩河内山擊其左阿波達干十一部破之獨其右未下而回紇葛邏禄殺拔悉蜜可汗奉回紇骨力裴羅定其國是謂骨咄禄毗伽闕可汗明年殺白眉可汗傳首獻回鶻傳拔悉蜜貞觀二十三年始來朝天寳初與回紇葉䕶擊殺突厥可汗立㧞悉蜜大酋阿史那施為賀臘毗伽可汗遣使者入謝不三嵗為葛邏禄回紇所破奔北庭後朝京師拜左武衛將軍地與衆歸回紇按拔悉密與葛邏禄雜居東連回紇以暾欲谷距北庭三百里之文考之宜在今烏魯木齊北三百里外則正今之克特和博克納林和博克一帶地其與三葛邏禄分疆處所即不可考要其大槩自不可易也拔悉密為頡跌伊施可汗時葛邏禄為右葉䕶其地自當在拔悉密西至葛臘哆西殺之地方隅界址雖難確指然既名西殺地應偏右當與葛邏禄雜居北境矣突厥傳載白眉可汗立後拔悉蜜酋復為可汗應即回鶻傳所謂賀魯毗伽可汗者與頡跌伊施可汗分王故地不三嵗而或殺或奔於是其地皆歸葛邏禄唐書回鶻傳所謂在金山北庭自立葉䕶與回紇爭强者也餘詳前塔爾巴噶台條烘郭爾鄂籠烘郭爾鄂籠在克特和博克東十五里什巴爾圖什巴爾圖在烘郭爾鄂籠東北百里西倚山岩南臨沙磧無水有草烏爾圖烏爾圖在什巴爾圖東北五十里烏爾圖布拉克經其南薩里鄂拉環其北薩里薩里在烏爾圖東北六十里北有薩里鄂拉其下出泉東流入於沙磧納木納木在哲克得里克西踰哈畢爾噶布拉克托來布拉克至其地北倚高山南麓有泉左右二源合而南流入於沙磧舊為阿克巴集賽㳺牧之所穆呼勒戴鄂多特穆呼勒戴鄂多特在納木西四十里北倚鄂爾和楚克鄂拉南臨額彬格遜淖爾山麓有泉南流入於沙磧舊為阿克巴集賽㳺牧之所達爾達木圖達爾達木圖在穆呼勒戴鄂多特西二十里北倚髙山南臨淖爾山麓有泉南流入於沙磧亦阿克巴集賽㳺牧之所蘇海圖蘇海圖在達爾達木圖西二十里北倚高山南臨淖爾山麓有泉南流入於沙磧亦阿克巴集賽㳺牧之所謨多圖布古圖謨多圖布古圖在蘇海圖西南二十里北倚高山山麓有泉南流入於沙磧亦阿克巴集賽㳺牧之所泥楚滚布古圖泥楚滚布古圖在謨多圖布古圖西南有泉南流出谷入於沙磧亦阿克巴集賽㳺牧之所西十里有鄂倫布拉克接庫爾喀喇烏蘇界伊竒爾伊竒爾在泥楚滚布古圖西四十里踰鄂倫布拉克而止北倚高山山麓有泉南流入於沙磧舊為伊克呼拉爾集賽㳺牧之所布爾噶蘇台布爾噶蘇台在伊竒爾西四十里北倚高山山麓有泉南流入於沙磧亦伊克呼拉爾集賽㳺牧之所察拉垓察拉垓在布爾噶蘇台西三十里北倚高山山麓有泉南流入於沙磧舊為賚嗎里木集賽㳺牧之所綽爾綽爾在察拉垓西四十里北倚高山山麓有泉南流入於沙磧亦賚嗎里木集賽㳺牧之所齋爾齋爾在綽爾東北五十里踰山而至東北距額敏三百里地廣饒水草舊為阿克巴拉布里木杜爾巴推素隆伊克呼拉爾五集賽㳺牧之所乾隆二十四年大兵進勦凖噶爾五集賽宰桑達什䇿凌等以其地内屬自哲克得里克至此為塔爾巴噶台西南境額爾齊斯額爾齊斯在塔爾巴噶台東南青吉勒郭勒北境阿勒坦鄂拉西境東西七百里南北三百里額爾齊斯郭勒經流其地為都爾伯特部㳺牧之所乾隆十八年台吉䇿凌䇿凌伍巴什䇿凌孟克等率所屬二千六百餘户内附編設旗分優錫親王等爵俾長故地都爾伯特為四衛拉特之一厥後綽羅斯和碩特輝特以肆惡淪亡惟都爾伯特部終守臣節至今弗替云隋書西突厥傳西突厥者木杆可汗之子大邏便也與沙鉢畧有隙因分為二漸以彊盛東距都斤西越金山龜兹鐡勒諸胡悉附之後處羅可汗居無恒處然多在烏孫故地射匱襲處羅處羅大敗東走遁於髙昌鐡勒傳鐡勒之先匈奴之苖裔也金山西南有薛延陀咥勒兒十槃達契等一萬餘兵唐書突厥傳突厥阿史那氏葢匈奴北部也居金山之陽臣於蠕蠕種裔繁衍至吐門遂彊大回鶻傳裴羅攻殺突厥白眉可汗拜裴羅左驍衛員外大將軍斥地愈廣東極室韋西金山南控大漠盡得古匈奴地薛延陀者先與薛種雜居後滅延陀部有之姓一利咥氏在鐡勒諸部最雄張西突厥處羅可汗之殺鐡勒諸酋也其下往往相率叛去奉薛延陀乙失鉢為野咥可汗在金山西役葉䕶可汗貞觀二年乙失鉢孫曰夷男率部帳附頡利後突厥衰夷男反攻頡利弱之太宗册拜為真珠毗伽可汗樹牙鬱督軍山直京師西北六千里東靺西葉䕶突厥南沙磧北俱倫水地大衆附回紇諸部莫不伏屬頡利可汗之滅夷男率其部稍東保都尉楗山獨邏水之隂逺京師纔三千里而贏東室韋西金山南突厥北瀚海葢古匈奴地也按今阿勒坦為古金山額爾齊斯在金山西南境唐書稱阿史那氏居金山之陽裴羅西越金山者宜在此地也回鶻傳稱薛延陀為葉䕶可汗葉䕶可汗者伽那設之子畢賀咄葉䕶立為乙毗沙鉢羅葉䕶可汗建庭雖合水北東薄伊列河薛延陀西與為鄰則其地固當在伊犁之東金山之西由額爾齊斯以西迄於伊犁皆是也南沙磧者指沙陀所處之大磧北俱倫水者即多邏斯川之分支葢薛延陀未徙之前境界如是自頡利滅而夷男東徙則向之在金山西者乃始西倚金山而居金山之東矣青吉勒青吉勒在額爾齊斯西南即青吉勒郭勒北岸地東為布拉青吉勒西為哈達青吉勒皆青吉勒郭勒發源處自額爾齊斯至此為塔爾巴噶台東南境漢書匈奴傳西方呼揭王畔去自立為呼揭單于右奥鞬王聞之即自立為車犁單于烏籍都尉自立為烏籍單于屠耆兵擊車犁烏籍烏籍車犁皆敗西北走與呼揭單于合烏籍呼揭去單于號并力尊輔車犁屠耆單于自將西擊車犁車犁敗西北走明年屠耆單于擊呼韓邪單于兵敗自殺從弟休旬王自立為閏振單于在西邊東擊郅支單于郅支與戰殺之并其兵攻呼韓邪破走之郅支都單于庭後引其衆欲攻定右地屠耆單于小弟亦亡之右地自立為伊利目單于郅支并其兵留居右地自度力不能定匈奴乃益西近烏孫欲與并力遣使見小昆彌烏就屠烏就屠乃殺郅支使發八千騎迎郅支郅支勒兵逄擊烏孫破之因北擊烏揭烏揭降發其兵西破堅昆北降丁令并三國數遣兵擊烏孫常勝之郅支以道逺上書求侍子漢遣谷吉送之郅支殺吉呼韓邪益强恐見襲擊欲逺去㑹康居王數為烏孫所困與諸翕侯計郅支困阨在外可迎置東邊使合兵取烏孫以立之長無匈奴憂矣即使使至堅昆通語郅支遂與相結引兵而西康居亦遣貴人迎郅支後都䕶甘延夀副陳湯發兵即康居斬郅支按漢烏孫為今準噶爾康居為今哈薩克而準噶爾東境猶屬匈奴水經注稱敦薨水出焉耆北敦薨山在匈奴之西烏孫之東焉耆即今哈喇沙爾敦薨水即今海都郭勒郭薨山即今海都塔克以此求之則自哈喇沙爾直北踰天山為迪化州即烏魯木齊又直北為塔爾巴噶台當屬漢匈奴烏孫交界處今自迪化州北抵塔爾巴噶台以東之境均應屬漢匈奴右地呼揭車犁烏籍閏振郅支伊利目於此互相角逐而郅支西北通康居即今準部西北與哈薩克交壤之處灼然可見至魏書蠕蠕傳西則焉耆之地北渡沙漠高車主彌俄特與蠕蠕主伏圖戰於蒲類海北伏圖次於伊吾北山則塔爾巴噶台諸境在魏當為蠕蠕地也隋書突厥阿史那以五百家奔茹茹即蠕蠕史書互異唐書西突厥與東突厥分烏孫故地有之據此則烏孫東境即蠕蠕舊地後入突厥亦無可疑者欽定皇輿西域圖志卷十一
