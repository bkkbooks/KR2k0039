body:
  text: 疆域二安西北路一哈宻屬哈宻蘇木哈喇垓阿斯塔納托郭棲拉布楚喀哈喇都伯賽巴什達里雅格子烟墩星星峽多都摩垓德都摩垓塔勒納沁半池泉栁樹泉博羅圖阿滿察罕和羅海内勒滚阿薩爾圖伊里克庫木察克瑪克塔什額什墨鎮西府屬鎮西府治宜禾縣治鏡兒泉木城三塘石人子奎蘇松樹塘沙山子呼濟爾台圖古里克哈喇和屯廋濟庫爾墨圖西里克拜甡噶順竒臺縣治濟爾瑪台木壘伊勒巴爾和碩阿克塔斯烏蘭烏蘇格根吉布庫鏗格爾古城都爾伯勒津乾溝蘇博阿拉阿濟必濟華烏里雅蘇台察罕察竒爾圖阿拉克椿集奎屯郭勒圖蘇魯圖色爾克哈布塔克拜塔克欽定皇輿西域圖志卷九目録欽定四庫全書欽定皇輿西域圖志卷九目録疆域二安西北路一哈宻屬哈宻蘇木哈喇垓阿斯塔納托郭棲拉布楚喀哈喇都伯賽巴什達里雅格子烟墩星星峽多都摩垓德都摩垓塔勒納沁半池泉栁樹泉博羅圖阿滿察罕和羅海内勒滚阿薩爾圖伊里克庫木察克瑪克塔什額什墨鎮西府屬鎮西府治宜禾縣治鏡兒泉木城三塘石人子奎蘇松樹塘沙山子呼濟爾台圖古里克哈喇和屯廋濟庫爾墨圖西里克拜甡噶順竒臺縣治濟爾瑪台木壘伊勒巴爾和碩阿克塔斯烏蘭烏蘇格根吉布庫鏗格爾古城都爾伯勒津乾溝蘇博阿拉阿濟必濟華烏里雅蘇台察罕察竒爾圖阿拉克椿集奎屯郭勒圖蘇魯圖色爾克哈布塔克拜塔克欽定皇輿西域圖志卷九目録
