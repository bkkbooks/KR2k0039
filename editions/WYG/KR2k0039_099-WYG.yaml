爾占未至索諸野方與哈薩克戰於河上因諭以睦鄰守土之道並宣示聖主威福乃大感悟與哈薩克釋爭相睦如初遂遣其屬莫呢雅斯奉表降詔受之其文曰臣莫爾多薩木什跪奏大仁至聖普冐羣生大皇帝恭惟天使惠臨臣土臣不勝懽躍奉承諭㫖若開䝉瞽蠢兹邉末敢備外藩罔或有二心所有準孽額什木札布謹獻闕下外臣草莾冀隨星軺仰瞻聖容躬服彛訓回歸㳺牧宣示臣屬永永無極誠忻誠慶九月莫呢雅斯來朝賜宴盤山靜寄山荘與觀南苑大閱及燈火額什木札布阿睦爾撒納兄子也從賊亡走為塔什罕所得至是獻之其地北極髙三十度五分距京師偏西四十七度三十三分由塔什罕西南行七百里外踰錫爾河又踰那林河為賽瑪爾堪城又西南為哈拉克則城又西為烏爾根齊城又西臨達里岡阿鄂謨西境盡矣明史西域傳塔失罕舊作逹失干今改正西去賽瑪爾堪舊作撒馬兒罕今改正七百餘里城居平原周二里外多園林饒果木土宜五榖民居稠宻按北魏以降康居五王分為九姓後稍西南遷居漢大宛西南即北史所謂舊居祁連山北昭武城因被匈奴所破西踰葱嶺唐書所謂始居祁連北昭武城為突厥所破南依葱嶺者也今塔什罕城在古康居大宛之間當葱嶺直北四百里外必古所謂昭武城者去此不逺是以南遷則依葱嶺西遷則踰葱嶺也眀代去今差近達失干即塔什罕其名不昜所謂西去賽瑪爾堪七百餘里者即今自塔什罕西南行踰鍚爾那林兩河而至之賽瑪爾堪城也欽定皇輿西域圖志卷四十五欽定四庫全書欽定皇輿西域圖志卷四十五藩屬二東布魯特東布魯特在準噶爾部西南回部西北天山北麓近葱嶺東北距伊犁一千四百里東南距阿克蘇七百九十里其部有五最著者三曰薩雅克鄂拓克頭目不一而圖魯起拜為首戸一千有竒曰薩拉巴哈什鄂拓克頭目不一而車里克齊為首戸亦千有竒又一部舊居塔拉斯頭目不一而邁塔克為首戸四千有竒諸頭目不相統屬推一年長者有事則告俾與聞而已頭目之長瑪木克呼里則兼轄諸部其俗好利喜爭尚畜牧事耕種頗畏法度舊㳺牧地在格根喀爾竒拉特木爾圖為凖噶爾所侵西遷寓居安集延及凖噶爾平乃得復其故地乾隆二十三年將軍兆惠等追捕逆賊哈薩克錫拉兵臨布魯特界圖魯起拜等願内附乃遣侍衛烏爾登托倫泰徃撫行數日抵其㳺牧珠穆翰恭捧諭㫖宣讀畢薩雅克薩拉巴哈什兩鄂拓克人衆俱以手加額望闕叩首而言曰我部乆思投誠大皇帝為準噶爾間阻不能自通今得為天朝臣僕實望外之幸言訖復環向叩首歡聲殷地時塔拉斯頭目邁塔克子額什博洛適在其地亦願率所部來降托倫泰與俱徃行六日至其地撫定其衆於是東布魯特全部皆内附瑪木特呼里年九十餘形體肥平時趺坐腹垂至地不能逺行乃遣頭目車里克齊圖魯起拜尼沙三人獻牛羊百頭謁軍門因令入覲詔扈木蘭行圍賜宴萬樹園觀燈火三人者之至我軍也將軍兆惠等與之筵宴令觀軍營武藝咸驚詫曰天朝弓矢之利向固聞之至於有發必中層甲洞穿馬上三鎗連發五箭左右連射離馬及地騰躍而起此種竒特實罕聞見彼準噶爾殘虐不道固宜破㓕哈薩克素稱富强望風欵附何有於我等區區小部落乎相與駭歎不置云其地北極髙四十一度三十分至四十二度距京師偏西四十一度三十分至四十三度三十分其在於古為烏孫西鄙地其别部酋長額木爾貝於二十六年率所部内遷遣弟穆魯特歸誠願受安揷貢匕首帝嘉之賜額木爾貝三品頂帯御製布魯特稱臣内屬遣使詣闕詩以紀事有序戊寅布魯特為回部别族素與中土聲教不通比因逆回小和卓木背恩反覆戕我使臣既命將徃征屢戰大㨗而將軍兆惠亦以搜捕伊犁賊黨旋師會𠞰道經布魯特界其酋長圖魯起拜等遮道呼籲自陳向為厄魯特所阻自外王化今西域蕩平所部人衆皆願輸誠内屬並各遣其大首領馳驛赴闕納欵念此遐荒殊域固未脅以兵威亦非馭以智術望風歸附情詞諄懇已允將軍等所請許其攜從入覲而并識其縁起如此撻伐原因討逆回仰流詎意逺人徠舊傅勃律兩王㩀唐書西域傳有大小勃律王其地直吐蕃西去長安八千里以方域考之即今布魯特部落即見堅昆一靣摧回部葉爾羌喀什噶爾之地西即與布魯特連界今布魯特内附則已斷其一臂矣厚徃薄來風早樹東鶼西鰈道方開不招不拒敷吾惠王會何妨達九垓御製布魯特使臣至宴賜即席得句戊寅七戎舜教逺難稽布露通唐付狄鞮布魯特自古未通中國考唐書西域傳始載布露或云勃律有大小兩王其時雖稱内屬不過羈縻勿絶而已部昔兩王稱大小人今一派别東西布魯特有東西之號在東者分鄂拓克為五在西者分鄂拓克為十五新恩恰值伊綿峪布祜圖昻阿乙亥嵗平準噶爾噶爾藏多爾濟等來朝於此丁丑嵗哈薩克歸化使臣根札噶喇等亦來朝於此今嵗布魯特歸化其使臣亦適朝覲於此地靈佳兆有如此神竒者因名其峪曰伊綿伊綿者國語㑹極歸極之意也舊識兼逄達瓦齊時達瓦齊扈駕預宴詢諸使臣知其舊為台吉時曽識之笑語甚歡勤逺拓邉凛古戒捧盈恭已奉天禔御製萬樹園宴布魯特即席得句戊寅鱗集仰流鹿食苹筵開萬樹洽輿情舊藩每看聨新部夜雨剛欣凑午晴聲教逺通娑夷水恩膏直逮孽多城敢云揚烈幸無忝惟益臨深勵守成御製萬樹園賜布魯特人觀燈火戊寅錘峰正掛玉輪盈時九月望日夕合燦烟花愜逺情卉服毳裳朝麗正山荘正門名逖疎曶爽耀光明從來不識燈王法布魯特夲回部不是䝉古敬黄教幻裏疑逰迦布城彼處地名嵗嵗山荘行盛典心殷保泰益屏營御製布魯特額木爾貝所獻匕首歌壬午回部大定興農耕分駐宣撫留朝卿其中額什噶爾城近外部落嚴候偵有布魯特馳使伻厥長額木爾貝名獻玉匕首來輸誠佉盧回書仍左行譯出一一伸葵傾向因路阻兇醜兵戡逆靖亂今太平地為王土人王氓貢物表敬慙菲輕驛致金闕由海眀時侍郎海明駐喀什噶爾開匣尺八居然呈龍鱗其室橢以赬玉柄金鏤象鼻形抽看光如波溢青月芽直芒披電星封還銷鑄胥矯情咸賔用識王道貞北史西域傳波路國在阿鈎羌西北去代一萬三千九百里唐書西域傳大勃律或曰布露直吐蕃西與小勃律接萬嵗通天逮開元時三遣使者朝小勃律去京師九千里而贏東少南三千里距吐蕃贊普牙東八百里屬烏萇東南三百里大勃律南五百里箇失宻北五百里當䕶宻之娑勒城王居孽多城臨娑夷水其西山嶺有大城曰迦布羅開元初王没謹忙來朝元宗以兒子蓄之以其地為綏逺軍國廹吐蕃數為所困吐蕃曰我非謀爾國假道攻四鎮爾乆之吐蕃奪其九城没謹忙求救北庭節度使張孝嵩遣疏勒副使張思禮率銳兵四千倍道徃沒謹忙因出兵大破吐蕃復九城詔册為小勃律王没謹忙死貢獻不入安西都䕶三討之無功天寳六載詔使都䕶髙仙芝伐之遂平其國於是拂菻大食諸胡七十二國皆震恐咸歸附執小勃律王歸京師詔改其國號歸仁置歸仁軍按今布魯特為唐之布露一名勃律御製詩注辨晰精詳誠地志之指南灼千古而無惑者矣至唐以前沿革之概亦有可推而見者考漢書云烏孫南與城郭諸國相接所謂城郭諸國者指天山以南葱嶺以東之三十六國而言東自車師西迄疏勒其直北之境皆與烏孫接特烏孫在山北諸國在山南耳今之喀什噶爾古疏勒地踰山而北即今東布魯特之薩雅克薩拉巴哈什諸部落其境亦正相直此可見東布魯特之在漢尚為烏孫地矣又云烏孫夲塞地大月氏西破走塞王塞王南越縣度大月氏居其地後烏孫昆莫破大月氏大月氏西臣大夏而烏孫昆莫居之是月氏未為烏孫所破時實居塞王故地在葱嶺之北也又云烏秅國西有縣度烏秅為今㧞達克山㩀此則縣度山在今葱嶺南㧞達克山西而塞王故地當在㧞達克山東北也塞王南越縣度之後地屬月氏月氏西臣大夏之後地屬烏孫今東布魯特諸部正當葱嶺之北㧞達克山東北是即昆莫當時西走月氏之地為烏孫西鄙無疑漢書又稱烏孫不田作種樹隨畜逐水草與匈奴同俗今東布魯特諸部無城郭逐水草與迤東之準噶爾同俗是固烏孫之舊也過此以西則為霍罕安集延瑪爾噶朗諸城是皆土著有城郭為漢大宛地葢漢時烏孫西與大宛接壤而大宛與烏孫異俗史記稱其土著耕田有城郭宮室者是也又按北史波路國在阿鈎羌西北而阿鈎羌國在莎車西南西有縣度山以漢書烏秅國西有縣度之文証之則阿鈎羌國當與今㧞達克山連壤魏時波路在阿鈎羌西北今布魯特在㧞達克山西北形勢相合而波路之與布魯音亦相同外藩字無正音稱名類由口授積乆沿訛猶得與初稱近似者葢徃徃而有矣西布魯特西布魯特在喀什噶爾西北三百里道由鄂什踰葱嶺而至與東布魯特相望部落凡十有五其最著者四曰額徳格訥鄂拓克曰䝉科爾多爾鄂拓克頭目阿濟比兼轄之戸七百有竒曰齊里克鄂拓克頭目由瑪特户二百有竒曰巴斯子鄂拓克頭目噶爾住戸千三百有竒部落雖分而駐牧同地東南扼葱嶺西迄於布哈爾諸部落共二十萬人逐水草事㳺牧漢休循捐毒故地也乆思内附以準噶爾阻未得通乾隆二十四年將軍兆惠既定喀什噶爾追捕餘孽道經諸部遮道籲請内附乃遣二等侍衛達克塔納等徃撫阿濟比奉將軍書曰額徳格訥布魯特小臣阿濟比恭祝大皇帝萬萬夀恭呈如天普覆廣大無外富有四海乾隆大皇帝欽命將軍之前今將軍自喀什噶爾傳諭我部頒給印文謹已奉到不勝踴躍適慰心想當率諸部自布哈爾迤東二十萬人衆皆作臣僕兆惠嘉其誠表於朝詔受之由是十五部落皆内附諸頭目以未出痘不敢入中國乃遣由瑪特之兄名呼達里者朝京師覲於盤山靜寄山荘賜宴與觀南苑大閱及燈火二十五年正月額徳格訥阿濟比遣使錫喇噶斯等來朝賜宴八月遣侍衛索諾木等徃賜勅郊迎祗受如禮二十七年額徳格訥阿濟比所屬鄂斯諸處為霍罕額爾德尼侵㩀今註守新疆尚書永貴等遣諭額爾德尼還所侵地其地北極髙四十度一分至三十分距京師偏西四十三度三十一分至四十六度三十分二十八年其别部阿瓦勒比願以其部供内地㳺牧并悉心經理牧羣事宜帝嘉之賜四品頂帯漢書西域傳休循國王治鳥飛谷在葱嶺西去長安萬二百一十里東至都䕶治所三千一百二十一里至捐毒衍敦谷二百六十里西北至大宛國九百二十里西至大月氏千六百一十里民俗衣服類烏孫因畜隨水草捐毒國王治衍敦谷去長安九千八百六十里東至都䕶治所二千八百六十一里至疏勒南與葱嶺屬西上葱嶺則休循也西北至大宛千三十里北與烏孫接衣服類烏孫隨水草依葱嶺按漢書休循捐毒皆在葱嶺外二國相屬附葱嶺而居今喀什噶爾西鄂什一帯連屬葱嶺休循捐毒當在其西北麓班師所謂西上葱嶺者由鄂什口西出葱嶺也今西布魯特之䝉科爾多爾諸部落道由鄂什出葱嶺則諸部正當其麓應即休循捐毒故地且在安集延霍罕有城郭諸國之東南正班史所謂西北至大宛國也又烏孫西逐月氏而據其地休循捐毒境界毗連捐毒南直疏勒北與烏孫據有月氏之境相屬故風俗衣服類烏孫以月氏之先夲塞王地也以一方形勢考之北則烏孫據有月氏之地南則捐毒捐毒以西則休循大宛則當二國之西北而東與烏孫據有月氏之地接以今之東布魯特當古烏孫據有月氏之地今之西布魯特當古休循捐毒二國地在今則為無城郭之部落遺墟故俗大略可見又休循去都䕶治所三千一百二十一里捐毒去都䕶治所二千八百六十一里相距不及三百里以兩國戸口考之大小相等其地實不過六百里以今布魯特之䝉科爾多爾齊里克巴斯諸諸部落核之殆不啻兼有兩國之地矣霍罕霍罕在鄂什西北七百八十里喀什噶爾西北八百八十里東與布魯特部落錯處其東為瑪爾噶朗又東為安集延東北為那木干皆有城郭四城地當平陸南控葱嶺北濵那林河河流從東布魯特境西行過安集延城北又西過瑪爾噶朗城北又西過那木干城北又西過霍罕城南又西北行過賽瑪爾堪城北又東南入於達里岡阿鄂謨南北山泉支流會合襟帯諸城之間土膏沃衍氣候和煦人民殷庻畜牧饒富其人亦布魯特種奉回教習帕爾西語則皆古之大宛國也諸城皆有伯克而霍罕城伯克額爾德尼為之長衆咸聽命乾隆二十四年將軍兆惠追捕霍集占同侍衞達克塔納等撫定布魯特諸部遂至其地額爾德尼伯克遣都官伯克迎至城内日饋特羊爪果酒米又氊毺馬匹諸物感慕悅服偹極誠敬使旋乃遣頭目托克托瑪哈墨苐等謁軍門賫奉額爾德尼等恭進皇上表文併上將軍書曰額爾徳尼伯克等請大皇帝欽差統兵至威至勇將軍等安仰頼上天之德大皇帝洪福我等羣生亦䕶安業聞將軍至葉爾羌喀什噶爾後布魯特哈薩克等衆部落俱傳檄安定而我部檄書未至日夜以冀幸侍衞賫將軍書來我等得為大皇帝臣僕永受康寜不勝感悅於是四城咸内附二十五年正月遣安集延伯克托克托瑪哈墨苐來朝詳安集延條九月額爾徳尼遣使貢馬二十七年貢白鷹二十八年額爾德尼遵駐守新疆尚書永貴等檄還所侵布魯特地二十九年賜勅訓諭額爾德尼并免通信喀什噶爾伊沙噶伯克阿伯都喇伊木罪是年貢白海青三十五年額爾徳尼卒姪納禄博圗襲為伯克遣使來朝貢龍泉盤子其地北極髙四十一度二十三分距京師偏西四十五度五十六分御製白鷹歌霍罕額爾德尼伯克所進歌以紀事壬午受將軍檄遮賊魁設䍙未入慚雉媒逆酋霍集占兄弟窮竄至㧞達克山獻馘而安集延霍罕諸回部一奉軍門劄並請設計誘擒雖逆酋未及取道而先後悃忱偹著捧首以降心無乖方物屢獻表賔徠每教厚徃而薄來九經正義誠昭哉白鷹今復致鷙材雪毛金脚刷羽皚下鞲目不留狼豺鶻師赤飬皆旗回回人飬鷹鷂者謂之鶻師赤居之京師隸八旗蒲萄餵肉那可儕開門揖盗謀非佳博觀今古益凛懐作歌匪詡荒遐開御製白海青歌有序甲申霍罕汗額爾德尼嚮風欵塞獻白海青一重數譯而達京師所謂積雪全映飛花碎㸃信鷙鳥之竒特者也金元以來賦海青者率目為海東之産故有扶餘東溟之詠今林丞所掌金眸玉爪廻異凡材者葢習見習聞兹霍罕地在玉門萬里外於古為大荒以西順秋氣而應瑶光其精明俊竦為金方之英固宜既命郎世寜繪圖狀其神貎更賦七言長句以紀其實匪若天馬興歌極鋪張誇詡之為亦如旅獒底貢深持盈慎德之思耳海東翻飛下海西海青夲名海東青變青為白斯更竒東木西金五行配各從其色非人為霍罕部在天山右其汗名額爾德尼攄誠通貢致方物韝來鷙鳥隨譯鞮黄睛玉爪氣雋逸素翹皓羽光陸離籠育林監昭逺服為之造屋誠無稽見元史豪騰雄擊都弗藉純精明㓗覃宜題瑞圖越裳漫比擬冩形傳實寜可遺冩形傳實寜可遺乆安永奠殷吾思御製詠龍泉盤子有序庚寅向侍衞自吐魯蕃廻者曽携一盤至亦既有詩紀事此盤乃霍罕所貢霍罕安集延部類相近而霍罕為之長舊伯克額爾德尼今其姪納博圖襲為伯克其地葢逺於吐魯番數倍使使者貢萬夀並告新用事因成是什録實古宋龍泉世頗稀云何外域尚或有吐魯番器昔訝看霍罕包貢今復走不寳厚徃致頻來所嘉彼亦知獻夀質厚色葱弗茅蔑出遵生八牋磁器開路曰蔑少損曰茅定窑之下斯掄首趙家幅員未逮彼彼何以得故難剖長言紀實非玩物更厪深意慎所守史記大宛傳大宛在匈奴西南在漢正西去漢可萬里其俗土著耕田有城郭屋室其屬邑大小七十餘城其北則康居西則大月氏西南則大夏東北則烏孫東則扞冞于窴漢書西域傳大宛國王治貴山城去長安萬二千五百五十里東至都䕶治所四千三十一里北至康居卑闐城千五百一十里西南至大月氏六百九十里北與康居南與大月氏接宛别邑七十餘城多善馬張騫始為武帝言之上遣使者持千金及金馬以請宛善馬宛王不肯與漢使妄言宛遂攻殺漢使於是天子遣貳師將軍李廣利伐宛宛人斬其王母寡首獻馬三千匹漢軍乃還晉書西戎傳大宛去洛陽萬三千三百五十里南至大月氏北接康居大小七十餘城太康六年武帝遣使楊顥拜其王藍庾為大宛王藍庾卒其子摩之立遣使貢汗血馬魏書西域傳洛那國故大宛國也都貴山城在疏勒西北去代萬四千四百五十里太和三年遣使獻汗血馬自此每使朝貢唐書西域傳寜逺者夲㧞汗那或曰鏺汗元魏時謂破洛那去京師八千里居西鞬城在真珠河之北有大城六小城百貞觀中王契苾為西突厥瞰莫賀咄所殺阿瑟那䑕匿奪其城䑕匿死子遏波之立契苾兄子阿了參為王治呼悶城遏波之治渇塞城顯慶初遏波之遣使朝貢三年以渇塞城為休循州都督府授阿參了刺史自是嵗朝貢天寳三載改其國號寜逺按漢書稱自車師前王廷隨北山波河西行至疏勒為北道西踰葱嶺則出大宛康居奄蔡今喀什噶爾為古疏勒其踰葱嶺必經鄂什是即古自疏勒西踰葱嶺出大宛之北道也漢書休循在葱嶺西捐毒與葱嶺屬二國附葱嶺而居西北皆當大宛而捐毒稍東其北尚與烏孫接則是鄂什出葱嶺之道計之葱嶺西北為休循休循西北為大宛也休循捐毒為今布魯特說見前條由是西北為安集延瑪爾噶朗霍罕那木干塔什罕皆有城郭土著與史記大宛土著有城郭之說合則大古宛地當即今安集延諸城無疑元魏以洛那國為古大宛云在疏勒西北方位非誣唐之㧞汗那即魏破洛那而更名寜逺者應即漢大宛故地東界西突厥南接葱嶺是以其王契苾為西突厥所殺而以渇塞城為休循州者境當葱嶺北原夲漢休循國地是今安集延諸城在漢為大宛在唐為寜逺也御製詩䟦云史記言大宛為城郭之國則正今之回部非哈薩克也臣等紬繹聖訓考證方隅如今之葉爾羌一帯回部附近葱嶺雖與漢時大宛相去不逺尚在葱嶺之内其在葱嶺外者為今霍罕安集延諸城亦奉回教參互史書審證方位其為大宛故壤無疑安集延安集延在霍罕東三百八十里東南去鄂什四百里去喀什噶爾五百里西北為那木干西為瑪爾噶朗北濵那林河南接葱嶺乾隆二十四年奉將軍檄諭令協擒霍集占既内附專使籲請入覲二十五年正月其城伯克托克托瑪哈墨第等朝京師賜宴瀛䑓其地北極髙四十一度二十八分距京師偏西四十四度三十五分御製瀛䑓賜宴安集延來使即席得句庚辰奉檄猶慚力未宣安集延奉將軍遣侍衞檄諭即欲協擒霍集占兄弟以逆賊未至彼境即専使籲請入覲右旋書捧使來專閉關難學漢光武謁陛何期安集延西宛都稱到天上南蘭羣喜沐恩先時㧞逺山使尚未到仰流嘉彼明於順三接應申錫賚駢御製安集延匕首癸未持短入長不踰尺應速用近兩刄窄水晶為靶月芽直筠沖插腰豫戒廹感我厚澤貢弗惜徒觀羙理霜雪色纒綿經冗金錯餙漆龍文鞘偃蹇奕自來非擬鄧遵得錦袄襓更檀匣襲用昭絶域兵戈釋瑪爾噶朗瑪爾噶朗在安集延西百八十里北濱那林河東與安集延接南拱葱嶺西有河出葱嶺北山北行入那林河乾隆二十四年侍衞達克塔納徃撫其城伊拉斯呼里拜伯克以其屬内附其地北極髙四十一度二十四分距京師偏西四十五度十分那木干那木干在瑪爾噶朗城西北八十里霍罕城東北八十里南濱那林河東西有水出北山南流入那林河東北與布魯特雜處乾隆二十四年與霍罕安集延同時内附其地北極髙四十一度三十八分距京師偏西四十五度四十分東五十里踰河為塔爾罕按霍罕安集延瑪爾噶朗那木干諸部跨那林河之南北列城四五應即漢大宛别邑七十餘城唐寜逺大城六小城百之故地說並見前霍罕條又按唐時寜逺即破洛那其西南境别有曹史康米諸國即康居五小王支庻為匈奴突厥所請西南依葱嶺者亦應在今安集延諸城以西其詳備見北魏隋唐諸史爰摭録故實而繫以論說焉北史西域傳康國者康居之後也遷徙無常不恒故地自漢以來相承不絶其王本姓温月氏人也舊居祁連山北昭武城因被匈奴所破西踰葱嶺遂有國枝庻各分王故康國左右諸國並以昭武為姓示不忘夲也王字世夫畢其妻突厥達度可汗女也都於薩寳水阿禄迪城名為強國西域諸國多歸之大業中始遣使貢方物米國都那宻水西舊康居之地無王其城主姓昭武康國王之支庻字閉拙都城方二里西北去蘇對沙那國五百里西南去史國二百里東去𤓰州六千四百里大業中頻貢方物史國都獨莫水南舊康居之地也其王姓昭武字狄遮亦康國之支庻也都城方二里北去康國二百四十里南去吐火羅二百里西去那色波國二百里北去米國二百里東北去米國二百里東去𤓰州六千五百里大業中遣使貢方物曹國都那宻水南數里舊是康居之地也國無主康國王令子烏建領之都城方三里東南去康國百里西去何國百五十里東去𤓰州六千六百里大業中遣使貢方物何國都那林水南數里舊是康居地也其王姓昭武亦康國王之族類都城方二里東去曹國百五十里西去小女國三百里東去𤓰州六千七百五十里大業中遣貢貢方物魏書隋書載康米史曹何諸國與北史同唐書西域傳康者一曰薩末鞬亦曰颯株建元魏所謂悉萬斤者其南跨史百五十里西北距西曹百餘里東南屬米百里北中曹五十里在那宻水南大城三十小堡三百君姓温本月氏人始居祁連北昭武城為突厥所破稍南依葱嶺即有其地枝庻分王曰安曰曹曰石曰米曰何曰火尋曰戊地曰史世謂九姓皆氏昭武隋時其王屈木支娶西突厥女遂臣突厥武德十年始遣使來獻髙宗永徽時以其地為康居都督府東曹或曰率都沙那蘇對沙那刼布咀那蘇都識匿凡四名居波悉山之隂漢貳師城地也東北距俱戰提二百里北至石西至康東北寜逺皆四百里許南至吐火羅五百里有野义城武徳中與康同遣使入朝西曹者隋時曹也南接史及波覧治瑟底痕城武徳中入朝天寳元年獻方物中曹者居西曹東康之北王治迦底真城米或曰彌末曰彌秣賀北百里距康其君治鉢息德城永徽時為大食所破顯慶三年以其地為南謐州朝貢不絶何或曰屈霜你迦曰貴霜匿即康居小王附墨城故地史或曰佉沙曰羯霜那居獨莫水南康居小王蘇薤城故地西百五十里距那色波北二百里屬米南四百里吐火羅也按唐書吐火羅居葱嶺西烏滸水之南古大夏地那色波亦曰小史居吐火羅故地東扼葱嶺而於史國則稱其西距那色波南接吐火羅北史亦云史國南去吐火羅五百里是史國在葱嶺西北也北史米國西南去史國二百里史國北去米國二百里東北去米國二百里唐書史北二百里屬米是米為史直北偏東二百里國在葱嶺北也唐書康國南距史百五十里東南距米百里是康為史直北米西北百餘里國在葱嶺西北也唐書東曹即蘇對沙那西至康是東曹在康國之東而云南去吐火羅五百里亦應在葱嶺西北以北史米國西南去史國二百里西北去蘓對沙那五百里之文証之則東曹固在史國之北是以南去吐火羅與史國同也東曹之西為中曹南接康中曹之西為西曹南接史而康之南境亦接史是史國東西之境較長唐書東曹西至康北史曹國東南至康一專就東曹而言一兼中東西三曹國而言故其文不同北史稱何國東去曹國百五十里是何國又居諸國之西也總計史米曹康何五國南北約四百里東西六百餘里在葱嶺直北迤西境上以今形勢揆之當為霍罕安集延諸城西南五百餘里内地安集延諸城為唐之寜逺說見前條由是西南行得曹米諸國即唐書所謂東曹東北四百里至寜逺者也九姓昭武為匈奴突厥所破稍西南行依葱嶺者如此既遷之後在漢大宛西南依葱嶺未遷之前在漢大宛西北傍祁連舊屬康居五小王地漢書所謂大宛西北與康居接北道西踰葱嶺則出大宛康居者於此可見唐書稱東曹為漢貳師城猶在大宛境内又云西曹者隋時曹也隋書曹國舊康居之地是則唐之東曹西曹實漢之大宛康居交界處益灼然矣塔什罕塔什罕東北與右部哈薩克接東與布魯特接東南與那木干接距喀什噶爾城一千三百里漢大宛康居交界處唐則石國地也地居平原有城以三和卓分轄回衆曰莫爾多薩木什曰沙達曰吐爾占向為右部哈薩克羈屬嵗供差役莫爾多薩木什者哈薩克所置和卓也為吐爾占所逐哈薩克以兵問罪於吐爾占乆而不觧乾隆二十三年參贊大臣富德追擒哈薩克錫拉至其地遣䝉固爾岱赫善等徃撫塔什罕回衆及右部哈薩克次軍於莾格特城外以待之䝉固爾岱赫善既諭哈薩克降復憫回衆之受兵也將平之召吐爾占未至索諸野方與哈薩克戰於河上因諭以睦鄰守土之道並宣示聖主威福乃大感悟與哈薩克釋爭相睦如初遂遣其屬莫呢雅斯奉表降詔受之其文曰臣莫爾多薩木什跪奏大仁至聖普冐羣生大皇帝恭惟天使惠臨臣土臣不勝懽躍奉承諭㫖若開䝉瞽蠢兹邉末敢備外藩罔或有二心所有準孽額什木札布謹獻闕下外臣草莾冀隨星軺仰瞻聖容躬服彛訓回歸㳺牧宣示臣屬永永無極誠忻誠慶九月莫呢雅斯來朝賜宴盤山靜寄山荘與觀南苑大閱及燈火額什木札布阿睦爾撒納兄子也從賊亡走為塔什罕所得至是獻之其地北極髙三十度五分距京師偏西四十七度三十三分由塔什罕西南行七百里外踰錫爾河又踰那林河為賽瑪爾堪城又西南為哈拉克則城又西為烏爾根齊城又西臨達里岡阿鄂謨西境盡矣明史西域傳塔失罕舊作逹失干今改正西去賽瑪爾堪舊作撒馬兒罕今改正七百餘里城居平原周二里外多園林饒果木土宜五榖民居稠宻按北魏以降康居五王分為九姓後稍西南遷居漢大宛西南即北史所謂舊居祁連山北昭武城因被匈奴所破西踰葱嶺唐書所謂始居祁連北昭武城為突厥所破南依葱嶺者也今塔什罕城在古康居大宛之間當葱嶺直北四百里外必古所謂昭武城者去此不逺是以南遷則依葱嶺西遷則踰葱嶺也眀代去今差近達失干即塔什罕其名不昜所謂西去賽瑪爾堪七百餘里者即今自塔什罕西南行踰鍚爾那林兩河而至之賽瑪爾堪城也欽定皇輿西域圖志卷四十五
