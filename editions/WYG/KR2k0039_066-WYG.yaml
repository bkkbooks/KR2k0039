front:
  text: 欽定四庫全書欽定皇輿西域圖志巻二十九
  hash: sha256:6c4614548e09e74cf6413a8989bb85e4a3fe50674b53735aea1a134745fa7a14
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0039_WYG_066-1a}
body:
  text: 官制臣等謹按服外荒墟民稀事簡伊古蕃王部長遴簡才傑以資分理每於中土弗賓弗臣各自為其風氣故考官聨於遐徼周秦以前靡得而聞漢武通西域班傳紀載較詳如烏孫則有將相監吏等官其餘諸國則自輔國侯都尉以下而龜兹官屬尤衆北史載髙昌官制儼若中朝吐谷渾則有王公僕射尚書郎中將軍之號回紇則有内外將相都督将軍司馬之稱雖倣中國位號以名其官而要皆服畔不常未必胥隸臣僕若彼中名目如葉䕶特勒俟利發吐毛發屈律啜閻洪達之屬聲教曠隔音譯沿訛尤難審證準噶爾居烏孫突厥故壤游牧分地即為職守回部於漢為三十六國地各有城郭每城之中咸設官司體制攸殊名號亦别仰惟聖天子豐庸懋建全域來歸撫其地治其人開置伊始凡新疆諸境制之以將軍督提守之以監司丞倅將佐弁員既已挈夫領要而滋培既久郡縣斯設命官授秩大小相維規制尤稱賅備至準夷舊官名如圖什墨爾扎爾扈齊宰桑諸職當芟夷藴崇之餘無可復倣應與更新回部二酋授首後諸城伯克望風内附爰仍舊號如阿竒木沙噶納齊以下釐以中朝之品級而授職如故因俗宜民法良意美仍統壹於重臣以督領其事由是一階一秩無不自幸為王人而非直前世請封置吏與戊巳骨都僅存虚號者所可比倫萬一矣品秩既區掌司咸載旁徴故實各以類従将來稽典屬之班聫訪西陲之職守均於是編可詳訂焉志官制第八
  hash: sha256:d1bfee47ff56534686372765f333d5b064e723ee3982fe8c01556cd361b877f5
