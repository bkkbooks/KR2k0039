front:
  text: 欽定四庫全書欽定皇輿西域圖志卷四十四
  hash: sha256:0b4ab80dbe8b1947f022b5f9c0d1a8238dc0f318faad7dcf35662e3f2b61e607
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0039_WYG_095-1a}
body:
  text: 藩屬臣等謹按古盛王涵宥天下薄海内外咸訖聲教而必又有以及乎其餘於是乎享王接軌共球咸受朝正奉命史不絶書我國家累洽重熙化敷域外朝鮮琉球暹羅安南之屬皆受朔來朝奉職惟謹而䝉古部落北則四十九旗喀爾喀鄂爾多斯諸部舊為臣僕西南則青海西藏𨽻我典屬維藩維翰中外一家乾隆二十年準噶爾平二十一年左部哈薩克内附二十二年右部哈薩克塔什罕東布魯特繼之二十四年回部平是時西布魯特安集延那木干瑪爾噶朗霍罕諸城拔達克山博洛爾部亦相率來歸二十七年復有愛烏罕等鞠􅎽奉表而至於是和通諸部次第偕來大䝉咸就甄陶聲教及於無垠矣伏念西師之役皇上惟期底定準夷纘成先緒即回部用兵亦以逆酋稔惡義在必伸自出師以迄凱旋從未嘗勤思逺略有意招徠而王師所過萬衆傾心呼籲投誠争先恐後僉言乆慕天朝向為準噶爾所阻蔑以自通幸際廓清樂沾仁化此益見西域之不可不及時蕩平而至聖聲名洋溢凡有血氣莫不尊親此心此理洵有大同者也為考諸部方輿躔度風土之跡暨歸誠本末著於篇以誌一時慕義歸仁之盛昔司馬遷有言張騫使西域傳聞其旁大國五六其詞恍惚無可審證猶且詳諸史乘以誇逺馭矧今日梯航玉帛萬里來庭星拱雲從不煩期㑹凡在通名諸國俾得據實編摩用昭我皇朝大一統之業猗歟盛哉志藩屬第十九
  hash: sha256:15ddf55772a9865cb4772ad89de42488bc899bfdad8cf01c0f5d6153c795ee55
