front:
  text: 欽定四庫全書欽定皇輿西域圖志卷四十
  hash: sha256:361679d0df51687df1c9cd932063b748ce4f417cc3c512423a104e7b888bdf86
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0039_WYG_039-1a, image: WYG0500/WYG0500-0788a.png}
body:
  text: 音樂臣等謹按周禮春官有鞮鞻氏掌四夷之樂與其聲歌又有旄人掌教夷樂王者功德隆盛隂陽和調聲教所暨外浹八埏殊方絶域相與懐仁慕義詠歌而舞蹈之於是採其音聲按其節奏被諸管絃施於干戚朝㑹燕饗用陳門右所謂其德盛者其樂偹也按孝經鈎命訣云西方之樂謂之株離毛萇詩傳亦同其說白虎通義則以西方為昧夫昧屬東方明堂位已明言之康成之注周禮亦以東方為昧西方為株離從孝經緯以立訓周衰樂廢雅鄭俱佚漢張騫使西域得摩訶兜勒一曲傳之中國李延年翻為二十八解於是始有西音魏太武得西凉樂有陽翟新聲等曲周齊之代北曲與西凉雜奏梁有隔谷等三十六曲隋設九部樂而西凉天竺龜兹䟽勒安國康國西域之樂乃居其六葢是時依龜兹樂工五旦七聲之說以定律彼土之音始行於中國矣唐因隋舊增髙昌為十部總名燕樂後分坐立二部参以龜兹西凉之曲皆係别奏不参雅音至於開元乃合法曲戎樂而雜奏之識者譏焉若夫百音繁㑹角觝雜陳馴至都盧尋橦之竒眩人狄鞮之獻西京之風由斯寖熾而宋明帝時則有西傖羗胡雜舞元魏北齊参以西伎唐開元時有軟舞健舞西域之技大畧粗陳然而疆索未歸聲容弗偹亦苐以佐清暇歡娱無當於光被同和之盛也我皇上天縱聰明身度聲律邇者西域底定致其戎樂準部器物畧同䝉古既得審音以資考訂回部則譜在伶工参之嘉宴以察殊方聲氣之感以垂鐘虡無疆之庥惟古所紀天子建中和之極兼綜條貫金聲而玉振之爰是按其曲譜詳其樂器工衣而備載焉知聖朝德和所及實漸被於金方濛汜之區雖僻䖏遐陬亦得和其聲以鳴國家之盛焉志音樂第十六
