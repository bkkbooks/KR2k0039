body:
  text: 山三天山北路拜塔克拜塔克在鎮西府西北境之哈布塔克西一百十五里山脈自鎮西府北山東行至塔勒納沁之北折而西北行為阿濟鄂拉又西行為哈布塔克又西行至此盤回千有餘里蓋天山分支也烏里雅蘇台布爾噶蘇台烏爾圖諸布拉克皆出其南麓按準噶爾舊疆在拜塔克以西故以此為天山比路諸山之始又按後漢書陽嘉三年夏車師後部司馬率加特奴等千五百人掩擊北胸奴於閶吾陸谷四年北胸奴呼衍王侵後部帝以車師六國接近令敦煌太守發諸國兵及玉門關候伊吾司馬合六千三百騎救之掩擊於勒山今考車師前後部在博克達鄂拉東天山南北漢時呼衍王近與相接應在哈密西北博克達鄂拉東北一帶是以裴岑誅呼衍王碑即在哈密庫舍圖達巴而後漢書所謂閶吾陸谷與勒山者亦當在哈密西北博克達鄂拉東北一帶與今之哈布塔克拜塔克哈喇莽奈鄂拉為相近也特其地難確指為附見於此哈喇莽奈鄂拉哈喇莽奈鄂拉在天山北三百里拜塔克北東西綿亘山脈亦自東而西北距赫色勒巴什淖爾一百里又西一百里入於沙磧隋書突厥傳其先國於西海之上為鄰國所滅男女無少長盡殺之至一兒不忍殺刖足斷臂棄於大澤中有一牝狼每銜肉至其所此兒因食之得以不死其後遂與狼交有孕焉彼鄰國者復令人殺此兒而狼在側使者將殺之其狼若為神所憑歘然至於海東止於山上其山在高昌西北下有洞穴狼入其中遇得平壤茂草地方二百餘里其後狼生十男其一姓阿史那氏最賢遂為君長故牙門建狼頭纛示不忘本也唐書沙陀傳處月居金娑山之陽按自哈喇莽奈鄂拉而西岡巒相屬西過高昌疑即隋書所謂高昌西北之山苐其言荒渺逺近道里不著於史難以深考若唐時沙陀居蒲類之東境有大磧為今迪化州東北一帶無疑則唐書所謂金娑山者應即今之哈喇莽奈鄂拉以其地居迪化州東北正當沙陀北境故也古爾畢達巴古爾畢達巴在額爾齊斯郭勒東北哈喇圖郭勒發源西麓山脈自鎮西府東北境之必濟鄂拉西北行二百餘里至此崷崒特拔其支山西出走哈喇額爾齊斯郭勒哈喇圖郭勒之間庫爾圖達巴庫爾圖達巴在古爾畢達巴西北一百里山脈相屬哈喇額爾齊斯郭勒發源西麓其支山西出走哈喇額爾齊斯郭勒竒喇郭勒之間阿勒坦鄂拉阿勒坦鄂拉舊音阿爾泰為古金山在庫爾圖達巴西北三百里哈栁圖郭勒發源西南麓山脈自庫爾圖達巴屈折至此其迤東境峰巒層沓亘數百里為北路名山之冠東為舊藩喀爾喀蒙古諸部西為準噶爾部乾隆二十年大兵討準噶爾道出阿勒坦鄂拉遣官祭告告祭阿勒坦鄂拉文朕恭承鴻業撫馭寰區康乂柔懷中外一視準噶爾部落向逺王化篡弒相仍因而內亂達瓦齊又復殘虐其屬分崩離析人不聊生雖在殊荒均之赤子朕何忍不為拯救坐視阽危爰整王師分道並進今北路大兵道出神境惟神起幹西北綿亘東南實塞外之名區作內藩之屏障尚其默相翼我明威期迅奏乎膚功永敉寧夫逺服虔申昭告用布馨香惟神鑒焉乾隆二十年月日北魏蠕蠕傳那蓋出自金山纍有勝捷國人咸以那蓋為天所助乃殺豆崘母子那蓋襲位號候其伏代庫者可汗自稱太安元年子伏圖立號他汗可汗伏圖西征髙車為髙車王所殺子醜奴立禽其王殺之盡并叛者國遂強盛隋書突厥傳姓阿史那氏後魏太武滅沮渠氏阿史那以五百家奔茹茹世居金山工於鐵作金山狀如兜鍪俗呼兜鍪為突厥因以為號西突厥大邏便強盛東距都斤西越金山唐書突厥傳車鼻亦阿史那族而突利部人也頡利敗薛延陀稱可汗乃往歸焉延陀將殺之乃遁去竄金山之北自稱乙注車鼻可汗西葛邏祿北結骨皆并統之延陀後衰車鼻勢益張右驍衛郎將高侃擊之攻阿息山追至金山獲之景雲中葛邏祿胡屋鼠尼施三姓大漠都督特進朱斯隂山都督謀落匐雞元池都督踏實力胡鼻率衆內附詔處其衆於金山回鶻傳薛延陀乙失鉢為野嘻可汗在金山者西役葉護可汗乙失鉢孫夷男率其部稍東保都尉楗山獨邏水之隂東室韋西金山南突厥北瀚海按蒙古語謂金為阿勒坦與阿爾泰音相近更以方位考之阿勒坦鄂拉即古金山無疑也蠕蠕主那蓋西出金山而立國應在今阿勒坦鄂拉之西更以高車傳彌俄特與伏圖戰於蒲類海北之文證之則自阿勒坦鄂拉西南迄天山之北皆其境壤突厥世居金山因兜鍪之狀以為國號而邏便越金山之西車鼻竄金山之北皆以金山為望鎮者至葛邏祿三姓本處金山西境因其內附徙衆居之薛延陀乙失鉢未遷之前本處金山西南是以西役葉護至夷男東徙乃與回紇均以金山為西界焉烏可克達巴烏可克達巴在阿勒坦鄂拉東阿拉克鄂拉阿拉克鄂拉在阿勒坦鄂拉西三百餘里西南距烘和圖淖爾四十里山脈與阿勒坦鄂拉東西相屬乾隆二十年大兵討準噶爾二十二年追討阿睦爾撒納至此皆遣官祭告告祭阿拉克鄂拉文朕恭承鴻業撫馭寰區康乂柔懷中外一視準噶爾部落向逺王化篡弒相仍因而內亂達瓦齊又復殘虐其屬分崩離析人不聊生雖在殊荒均之赤子朕何忍不為拯救坐視阽危爰整王師分道並進今西路大兵道出神境惟神雄標兑域秀峙坤維磅礴鍾靈綿延西幹尚其默相翼我明威期迅奏乎膚功永敉寧夫逺服虔申昭告用布馨香惟神鑒焉乾隆二十年月日朕纘承祖緒中外一家撫順討逆式昭柔逺之模布德宣威丕振詰戎之略兹以西陲小醜負恩作叛煽惑邊疆實自外於生成斷難寬夫勦戮爰命定邊將軍喀爾喀札薩克和碩親王成衮扎布整師鞠旅盡掃餘氛大軍道出神境惟神建標兑域挺秀坤維磅礴鍾靈崔嵬綿亘尚其明昭翊應默佑膚功期計日以執俘幸彰武績用寧邊而敷化誕擴鴻圖敬薦馨香惟神鑒格乾隆二十二年月日博克達烏魯罕鄂拉博克達烏魯罕鄂拉在阿拉克鄂拉南三十里西距烘和圖淖爾三十里薩爾巴噶什達巴薩爾巴噶什達巴在阿勒坦鄂拉西南一百餘里古爾班竒喇鄂拉古爾班竒喇鄂拉在薩爾巴噶什達巴南一百里竒喇郭勒尼斯庫郭勒出其西麓阿爾察克鄂拉阿爾察克鄂拉在古爾班竒喇鄂拉南五十里阿斯哈圖阿斯哈圖達巴在古爾班竒喇鄂拉西二百里竒喇河南哈喇額爾齊斯河北哈爾巴郭勒出其南麓博喇濟郭勒出其西麓按自薩爾巴噶什達巴至此皆自阿勒坦鄂拉分支西走額爾齊斯支河之間朱爾庫朱鄂拉朱爾庫朱鄂拉在烘和圖淖爾西南八十里山脈自必濟鄂拉北古爾畢達巴南分支西出走青吉勒河北額爾齊斯河南六百餘里折而西北行四百里至此北路羣山之次髙者山北有水東南流滙為小澤乾隆二十年大兵進討凖噶爾遣官祭告告祭朱爾庫朱鄂拉文朕恭承鴻業撫馭寰區康乂柔懷中外一視準噶爾部落向逺王化篡弒相仍因而內亂達瓦齊又復殘虐其屬分崩離析人不聊生雖在殊荒均之赤子朕何忍不為拯救坐視阽危爰整王師分道並進今北路大兵道出神境惟神幹連北界勢控西陲雄峙邊隅鬱為要隘尚其默相翼我明威期迅奏乎膚功永敉寧夫逺服虔申昭告用布馨香惟神鑒焉乾隆二十年月日按阿勒坦鄂拉西南羣山縈落而朱爾庫朱鄂拉厥名較著處烘和圖淖爾之西南唐書葛邏祿部跨僕固振水包多怛嶺僕固振水為今烘和圖淖爾説見水則多怛嶺應於此山為近是矣塔爾巴噶台鄂拉塔爾巴噶台鄂拉在朱爾庫朱鄂拉西北一百里山脈相屬為準境北屏山有特里特額達巴尤稱險隘乾隆三十一年秩於祀典每嵗春秋致祭嵗祭塔爾巴噶台鄂拉文維神衍脈天山效靈中土表崇髙於北徼標形勝於西陲夙稱邊塞之屏藩聳重巒而特出永作鴻圖之拱衛環疊嶂以相維瑞靄祥氛答四時之靈貺升香薦幣昭萬載之懷柔秩祀攸隆洪庥丕著按自此西南行為鄂爾和楚克鄂拉其脈自博羅塔拉北山東行至此始合巴爾巴什鄂拉巴爾巴什鄂拉在迪化州城西北三十里通古斯巴什鄂拉通古斯巴什鄂拉在巴爾巴什鄂拉西二十里迪化州北境宋王延德髙昌行紀北廷北山中出碙砂山中嘗有煙氣涌起無雲霧至夕光焰若炬火照見禽鼠皆赤采者著木底鞋取之皮者即焦下有穴生青泥出穴外即變為砂石土人即以治皮按迪化州為唐北庭亦作北廷宋時山北并𨽻髙昌而北廷之稱不改則所謂北廷北山當屬今迪化州即烏魯木齊北境之山考其方位宜與巴爾巴什通古斯巴什諸山相近又隋書西域傳載阿羯山應即唐書龜茲國北之阿羯田山史亦稱其有煙火出碙砂疑延德所記有不定屬於烏魯木齊北境者或自今之烏魯木齊以西迄於阿克蘇北山皆屬天山正幹地氣積厚當時産吐煙焰有大略相同者是以諸書紀載率多近似不妨兩存之以備考證雅瑪里克鄂拉雅瑪里克鄂拉在昌吉郭勒西羅克倫郭勒東昌吉縣治西南五十里當孔道南阿顔台和洛鄂拉阿顔台和洛鄂拉在雅瑪里克鄂拉西四十里羅克倫郭勒西當孔道南巴顔哈瑪爾鄂拉巴顔哈瑪爾鄂拉在阿顔台和洛鄂拉西五十里呼圖克拜郭勒西圖古里克郭勒東河源發於北麓當孔道南博羅哈瑪爾鄂拉博羅哈瑪爾鄂拉在巴顔哈瑪爾鄂拉西七十里哈齊克郭勒西陽巴勒噶遜南和屯博克達鄂拉北當孔道南竒喇圖魯鄂拉竒喇圖魯鄂拉在博羅哈瑪爾鄂拉西五十里瑪納斯郭勒西烏蘭烏蘇東當孔道南阿爾噶里圖鄂拉阿爾噶里圖鄂拉在竒喇圖魯鄂拉西二百里奎屯西北庫爾郭勒東當孔道南按自巴爾巴什鄂拉至此皆附近天山之分支在迪化州迤西五百里之間哈喇古顔鄂拉哈喇古顔鄂拉在額布圖達巴西北二百里晶郭勒南哈什郭勒發源南麓山脈自額布圖達巴折北而西為天山分支至此孤峰聳竪博羅布爾噶蘇鄂拉博羅布爾噶蘇鄂拉在哈喇古顔鄂拉西一百里入東谷口西行三十里為覺羅托海又西南一百一十里為額博爾濟達巴又西九十里為塞特爾台哈喇海其地皆在山谷中又九十里出西谷口於是全山之形勢始盡乾隆二十二年六月將軍成衮扎布遣副都統由屯等窮追逆賊呢嗎至額博爾濟達巴口擒之殱其衆二百餘獲馬駝牛羊七百餘所部乃平阿布喇勒鄂拉阿布喇勒鄂拉在博羅布爾噶蘇鄂拉南由天山正幹之額布圖達巴分支迤西北行在哈什郭勒空格斯郭勒兩河環帶間當伊犁正東面乾隆二十八年秩於祀典每嵗春秋致祭嵗祭阿布喇勒鄂拉文惟神秀甲金方勝標玉塞崇岡起伏從蔥嶺以分支疊嶂崚嶒界烏孫而作鎮近通哈什逺控伊犁納喇特峙其陽翠屏儼對空格斯繞其左碧水如環緬靈異之夙傳宜馨香之式薦朕丕昭武略龕定遐荒昧谷之西遣亥章以測日輪臺以外駐戊巳而開屯乃眷名山實稱福地犁庭露布久徴默佑之功觸石雲興允著懷柔之效緬昄章之式闢庶沙磧之永寧嘉貺聿臻明禋肇舉刋旅未詳於禹貢始知際會有期庪懸載考夫周官益信報功不爽春秋望秩瞻峻極於北庭風雨和甘垂祜庥於西海自今以始申錫無疆塔勒竒鄂拉塔勒竒鄂拉在博羅布爾噶蘇鄂拉西北山形迤邐西南相屬庫色木蘇克郭勒發源西麓塔勒竒郭勒發源南麓其東谷口在察罕拜甡城西七十里托里西一百二十里南谷口距東谷口一百八十里由南谷口外一百里至伊犁郭勒北岸之阿里瑪圖為博羅塔拉之南山踰山而南即哈什空勒斯地乾隆二十八年秩於祀典每嵗春秋致祭嵗祭塔勒竒鄂拉文惟神保障金方安敦兑域南屏拱抱沿山之鄂博星羅北渚回環傍水之謨多錦簇源泉有本開一鑑於峰頭煙火相望聳孤城