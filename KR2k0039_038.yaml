body:
  text: 山四天山南路金嶺金嶺在闢展北境嶺脈係天山分支自迪化州東境之托克喇鄂拉東出為都魯達巴經土爾畨城北東至闢展四百餘里凡闢展所屬諸城皆以此山為屏障亦皆藉此山之水導之繞城以溉田園隋書高昌傳北有赤石山山北七十里有貪汙山夏有積雪唐書地理志西州交河郡開元中曰金山都督府宋史外國傳有水源出金嶺導之周圍國城以溉田園作水磑宋王延徳高昌行紀歴交河州凡六日至金嶺口寶貨所出又兩日至漢家砦又五日上金嶺嶺上有龍堂刻石記云小雪山也嶺上有積雪行人皆服毛罽度嶺一日至北廷按漢書西域傳卑陸國治天山東乾當國劉奉世曰下國字當作谷卑陸後國治畨渠類谷郁立師國治内咄谷西且彌國治天山東于大谷東且彌國治天山東兊虚谷刼國治天山東丹渠谷狐胡國治車師栁谷考諸國舊疆即今闢展所屬之蘇巴什森尼木汗和羅諸境居金嶺之北者則所謂乾當畨渠類内咄于大兊虚丹渠栁谷應即今金嶺以北博克達鄂拉東南一帶山谷而乾當于大兊虚丹渠云在天山東當與博克達鄂拉為尤近唐書薛延陀傳載契苾哥楞為易勿真莫賀可汗據貪汗山以隋書赤石山北七十里有貪汙汙為汗字之訛山之文証之則貪汗山當即今之博克達鄂拉詳見卷二十一而其南七十里之赤石山當即唐地理志所謂金山宋史所謂金嶺其名至今不易者但考唐書稱自交河縣北八十里有龍泉館又北入谷百三十里經栁谷度金沙嶺則自縣北二百一十里至金沙嶺也延徳行紀稱自交河州六日至金嶺口又兩日至漢家砦又五日上金嶺則自交河城十三日行至金嶺也疑當時自都魯達巴至托克喇鄂拉一帶總名金嶺今則専屬闢展諸城之北山矣都魯達巴都魯達巴在交河城西北一百二十里其脈從迪化州東之托克喇鄂拉分支迤邐而東屬於金嶺東西百里西有圓澤周數里名鄂蘭淖爾其支流出於嶺谷間乃雅木什以西諸城屏障也按宋王延徳高昌行紀歴交河州凡六日至今嶺口又兩日至漢家砦以今形勢証之都魯達巴與漢家砦為近蘇巴什塔克蘇巴什塔克在闢展南自博羅圖納林竒喇諸塔克迤邐東屬經闢展南境踰東界而止為闢展南屏過此而東南皆沙磧矣其北谷口在托克三西南五十里谷内有兩大石入谷行十里微有水草蓋古車師通焉耆道也唐書地理志自西州西南有南平安昌兩城百二十里至天山西南入谷經礌石磧按唐西州今為闢展蘇巴什㙮克在闢展西南一百七十里唐地理志稱西州西南入谷者當指蘇巴什山谷而言谷内兩大石意即所謂礌石也又按自托克三西出有三道其一出伊拉里克由阿拉癸鄂拉入谷口經裕勒都斯以抵伊犂其一經納林竒喇山口踰博羅圖谷口迤南以抵楚輝其一西南入蘇巴什谷口踰庫木什阿克瑪塔克亦抵楚輝納林竒喇塔克納林竒喇塔克在蘇巴什塔克西五十里其東谷口在托克三西南九十里山峯最高處為額爾坤達巴自谷口迤西南崷崪如屏博羅圖塔克博羅圖塔克在納林竒喇塔克西五十里當哈喇沙爾東北境山多積雪博羅圖郭勒發源北麓乾隆二十六年遣官告祭每嵗春秋致祀入北谷口西行通裕勒都斯出西南谷口西南行即哈喇沙爾境告祭博羅塔克文維神體結坤輿靈昭兊位連峰峻峙拔萬仞以倚天積雪高攢歴四時而浮玉作花門之巨鎮永奠西遐界蔥嶺以中維遥通南道朕統臨縣㝢式廓輿圖異域歸仁列嶂暨于闐之外殊方在宥興屯踰烏壘而遥乃諸部之往來仰崇山之綿亘雖幽遐不閉久已荷乎天休而梯棧無虞實更資乎神應用申秩祀練時日以薦馨敬遣専官肇庪縣而展告自此途開九折共遵王路之蕩平亦惟寒斂六花長被春風之和煦丕彰肸蠁來鑒苾芬乾隆二十六年月日嵗祭博羅圖塔克維神鍾靈遐域正宅西陲險闢蠶叢導我武維揚之路高踰龍阜界殊方内屬之區作巨鎮於回中峰層嶂疊通奥區于域外棧接梯連實惟名山允宜嘉秩朕八荒在闥六合為家既耆定乎準夷遂全收乎回部興屯更戍宜安枕席以過師駐牧游羣當順凉暄而應候惟神庥之是賴仰靈貺之攸昭爰伸圭幣之儀登諸祀典更肅春秋之祭載在秩宗並協柔懷宜彰肸蠁長此氷消寒玉調燭被于光天行當雷浹春膏湛恩漸於絶徼苾芬式薦歆格斯誠按博羅圖塔克與阿勒癸鄂拉南北相接形如鎖鑰西通準部南界回疆闢展西南境一大闗隘也楚輝塔克楚輝塔克在哈喇沙爾城北十里阿拉癸鄂拉分支也竒爾歸圖郭勒發源南麓南流至楚輝城東資以灌田後漢書西域傳焉耆國四面有大山按今哈喇沙爾古焉耆國楚輝塔克當其北是為古焉耆國之北山至周隋二書所謂焉耆國在白山南七十里者指天山正幹而言又當在楚輝塔克北以今之孟克圖達巴當之方位適合海都㙮克海都㙮克在楚輝㙮克西二百五十里哈布齊垓南哈喇沙爾北哈布齊垓郭勒裕勒都斯郭勒咸㑹而南行出此山之口為海都郭勒山脈自西九百里之汗騰格里鄂拉分支東南行至此為哈喇沙爾北屏水經注焉耆之北敦薨之山在匈奴之西烏孫之東按哈喇沙爾為古焉耆海都塔克正當其北應為古敦薨山也庫木什阿克瑪㙮克庫木什阿克瑪㙮克在蘇巴什塔克北谷口西南一百四十里自蘇巴什北谷迤邐西南行十里漸聞水聲遍谷皆淺水山勢漸狹兩厓壁立人行其間如一線天又里許即沙灘又二十里有大石﨑嶇者二處車不能行為古車師國西境闗隘又二十里至艾噶爾布拉克又五十里出南谷口山脈自蘇巴什塔克分支西南行至此唐書西域傳焉耆國王龍突騎支不朝貢命安西都䕶郭孝恪為西州道總管率兵出銀山道討之地理志西州西南經礌石磧二百二十里至銀山磧按回語庫木什銀也阿克瑪積而不散之謂庫木什阿克瑪塔克即唐書所謂銀山磧也郭孝恪進討焉耆兵出銀山道亦即此地額格爾齊㙮克額格爾齊塔克在庫木什阿克瑪塔克西南一百三十里自庫木什阿克瑪塔克東口西行四十里入南山之北口折而東南又迤邐西南行三十里出南口又轉而西行六十里至西山下玲瓏怪石徧地葦草掘之得水自此西南行入於沙磧晉書西戎傳焉耆國四面有大山道險隘百人守之千人不過唐書地理志銀山磧四十里至焉耆界吕光館又經盤石按今庫木什阿克瑪譯言銀山額格爾齊塔克有竒石當庫木什阿克瑪西南境即唐書所云盤石也吕光館雖不可考然總在額格爾齊塔克東據唐書稱焉耆國横六百里以今形勢考之東自庫木什阿克瑪塔克西至庫隴勒係焉耆全境則自當以銀山磧為東界而吕光舊館即在其西可知沙山沙山在博斯騰淖爾南一百二十里為哈喇沙爾之南屏山脈自額格爾齊塔克踰沙磧至此岡巒亘互西接庫隴勒塔克漢書西域傳山國西至尉犂二百四十里西北至焉耆百六十里西至危須二百六十里東南與鄯善且末接山出鐵民山居寄田糴榖於焉耆危須晉書西戎傳沙州刺史楊宣疆理西域以部將張植為前鋒所向風靡軍次焉耆熙焉耆國王名拒戰於賁崙城為植所敗植進鐵屯門未至十餘里熙又率衆先要之於遮留谷植將至或曰谷名遮留殆將有伏單騎嘗之果有伏發植馳擊敗之進據尉犂按漢書山國民山居師古注云常在山下居不不為城治也更以焉耆危須尉犂三國相距數里考之焉耆為今哈喇沙爾危須為今察罕通格尉犂為今哈勒噶阿璊則此山國當在今沙山之東麓山谷間所謂東南與鄯善且末接者由沙山東南行入沙磧正當古且末鄯善國地也至晉張植之伐焉耆由沙州西北行次其國當在焉耆東南境今沙山居哈喇沙爾之南其山東西相屬則所謂遮留谷者亦當在今沙山東南麓由是西行而據尉犂總在焉耆南境若賁崙城故址則不可考矣沙山以漢名相傳非準回語云庫隴勒塔克庫隴勒塔克在哈喇沙爾西南一百八十里脈自沙山西走百餘里至此勢極險峻古焉耆以西諸國闗隘也唐書西域傳自焉耆西南歩二百里度小山經大河二又歩七百里至龜兹按庫隴勒在漢為尉犂國地與額格爾齊塔克東西環抱所謂四面有山者也東距哈喇沙爾一百八十里唐書所謂二百里小山者指此又按自納林竒喇塔克至海都塔克為哈喇沙爾北境之山自庫木什阿克瑪塔克至庫隴勒塔克為哈喇沙爾南境之山西境皆抵海都郭勒達蘭達巴達蘭達巴在海都郭勒西八十里哈勒噶阿璊城西北一百八十里山脈自汗騰格里鄂拉東南行七百餘里至此東與海都塔克接拜拉克塔克拜拉克塔克在達蘭達巴西北三百里西裕勒都斯支河發源北麓烏什噶克塔克烏什噶克塔克在拜拉克塔克西一百里西裕勒都斯支河發源北麓哈喇庫爾達巴哈喇庫爾達巴在烏什噶克塔克西南一百里鄂頗爾西玉古爾北巖崖高峻為天山支峰之傑出者苐納爾郭勒伊蘭布拉克發源南麓愛呼木什塔克愛呼木什塔克在哈喇庫爾達巴西一百五十里山形卑小亦天山支峯庫克訥克達巴庫克訥克達巴在愛呼木什塔克西五十里額什克巴什郭勒發源南麓山脈自天山正幹之額什克巴什鄂拉分支東行六十里至此布里博克濟塔克布里博克濟塔克在賽喇木城南木素爾郭勒南岸自圖格哈納達巴至此山脈亦自西而東鄂克阿特庫塔克鄂克阿特庫塔克在布里博克濟塔克西拜城西南木素爾郭勒南岸却爾噶塔克却爾噶塔克在鄂克阿特庫塔克西木素爾郭勒西南又西與圖格哈納達巴接圖格哈納達巴圖格哈納達巴在木素爾郭勒西四十里山脈自天山正幹之薩瓦布齊鄂拉東南行二百里至此出白鹽色最瑩潔逺近資之哈喇裕勒衮塔克哈喇裕勒衮塔克在圖格哈納達巴西南四十五里亦小山也唐書西域傳龜兹國西三百里度石磧按此與圖格哈納南北相屬在庫車西三百里外庫車為古龜兹則唐書所載龜兹國北三百里之石磧當與今哈喇裕勒衮塔克相近又按東自達蘭達巴至此峰巒層疊山北即裕勒都斯全境泉源迭發裕勒都斯郭勒在古為鷹娑川則此一帶山嶺應屬唐時鷹娑都督府之南屏也額爾齊斯哈喇塔克額爾齊斯哈喇塔克在烏什西色帕爾拜西南行十里山形卑小當孔道由此喻天山而北為伯得里克鄂拉又折而西通布魯特境松塔什塔克松塔什塔克在額爾齊斯哈喇塔克西南四十里北當孔道因山名地亦稱松塔什固勒扎巴什達巴固勒扎巴什達巴在松塔什西南一百里為烏什西南屏山脈自喀克沙勒鄂拉分支東南行經托什干里達里雅南連山不斷至此嶺尤陡絶高數百丈層峰插天東行為松塔什塔克額爾齊斯哈喇塔克踰烏什而東四百餘里抵托什干達里雅西境其脈始盡按漢書尉頭國南與疏勒接山道不通尉頭為今烏什疏勒為今喀什噶爾説見疆域今自烏什西南之古勒扎巴什達巴東南行踰烏什而東山脈始盡此山之南沙磧千里為古疏勒東境即唐書所謂疏勒國環千里多沙磧少土壤者以此揆之則自烏什南山迤西至固勒扎巴什達巴更西南一帶之山正當漢時尉頭疏勒兩國間即漢書謂山道不通者今固勒扎巴什達巴以西山徑﨑嶇艱於步陟形勢猶可想見赫色勒額什墨塔克赫色勒額什墨塔克在固勒扎巴什達巴西南三十五里英額齊盤塔克英額齊盤塔克在葉爾羌西南英額齊盤西十里與裕勒阿里克塔克東西相望俱在葉爾羌諤斯騰西境其南境為裕勒阿里克塔克密爾岱塔克密爾岱塔克舊音闢爾塔克在葉爾羌東南産玉石由是東行接和闐南境諸山俱産玉庫克雅爾塔克庫克雅爾塔克在裕勒阿里克塔克東南庫克雅