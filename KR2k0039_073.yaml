body:
  text: 水一安西南路白楊河白楊河在玉門縣恵回堡南六十里南山中河有二源東南流二十五里合流十餘里當孔道折而西南流四十里名哈洮河恵回堡河恵回堡河源出恵回堡北山中西南行四十餘里至恵回堡北分東西流夾堡而趨各南流三十餘里入於地火燒溝火燒溝在騸馬城西三里南流二十餘里入於地赤金湖赤金湖在騸馬城西三十七里源在玉門縣南草地有數派合流三十五里由縣西南境北行逕赤金峽釃為三渠北流各三十里許至縣西北境復合流而西又一支流自縣西南境分流逕縣南東行三十餘里折而北釃為二源北流各三十里許過縣東境復合流而西與西三渠合流之水合復折而東北流三十里統名赤金湖入于阿拉克池亦名花海子其𨽻縣西境最西一渠名西沙河寰宇記玉門縣有衆泉北流入延興海一統志西几馬河在赤金所西原出所南草地有數派㑹流而北又折東北三百里注於阿拉克池又哈濟爾河在所東上流亦有數派北流折東北亦注於阿拉克池池周數十里按玉門縣地兼漢時㑹水池頭兩縣闞駰注云衆水所㑹故曰㑹水今赤金湖由玉門縣南分五渠環縣城北行曲折入北山中其下流地名花海子以形勢求之應即漢書注所謂衆水所㑹寰宇記所云衆泉北流者又考一統志載西几馬河在赤金所西哈濟爾河在所東源有數派北河合注河拉克他䝉古語謂花為阿拉克是今花海子即阿拉克池亦即寰宇記之延興海也石油河石油河在玊門縣南九十里南山中東南流三十里西有龍王廟劉昭郡國志延夀縣南有山石出泉注地為溝其水肥如煮肉洎肉汁也凝膏然之極明不可食謂之石漆元和志石脂水在玉門縣東南一百八十里泉中有苔如肥肉然之極明水上有黒脂人以草盝取用塗鴟夷酒囊及膏車周武帝宣政中突厥圍酒泉取此脂然火焚其攻具得水愈明酒泉賴以獲濟明一統志石油出肅州南山按石脂水在玉門縣東南與今石油河方位適合且石漆石脂石油義本相同其為然膏舊迹無可疑者蘇賴河蘇賴河源在玉門縣靖逆城東南三百二十里出南山中西北流百餘里昌馬河東北入之合流二十餘里出南山口分兩大支其東北一支行七十里折而北又分二支北流六十里出塔兒灣堡之西北境河流漸細其西北一支直趨三四道溝合流入布魯湖又南㑹十道溝水又南㑹窟窿河又西經安西州治北三十里為南籍端水又西經敦煌縣治西北二百里南㑹黨河又西流三十里入哈喇淖爾初兩河合流出山西北一支東流三十里分為靖逆東西二渠不通布魯湖而溉田甚廣乾隆四年接引西渠餘水折北而西仍入布魯湖於是蘇賴昌馬兩河下流分而復合經流一州二縣之地土田悉資灌溉水利倍饒按蘇賴與昌馬合流而蘇賴之名較著尋其源委則自濫觴南山歸墟黒海皆可以蘇賴名之矣苐如十道溝窟窿河黨河自南来㑹同流異源者又當别為一河即以蘇賴經流全體而論在栁溝衞城東北者古稱布魯湖在安西州城北者古稱南籍端水雖以古証今其名或著或否而審定形勢則較然不誣允宜隨地立名以資考証今舉全河經流形勢於此而因地著名之蹟仍分著於後焉昌馬河昌馬河源在靖逆城西南一百五十里南山下東北流百里與蘇賴河合流二十里出山餘詳見蘇賴河條下布魯湖布魯湖在栁溝城東北一百二十里即蘇賴昌馬兩河下流經流渟瀦之處澄波千頃葭葦彌望浴鳬飛鷺宛然澤國由是西行踰栁溝城為古南籍端水十道溝十道溝在玉門縣安西州交界二道溝以東屬玉門縣三道溝以西属安西州草地湧泉北流入於布魯湖其第三四道溝南承昌馬河上流夾栁溝堡城而北注所謂栁溝即第四道溝舊多檉栁故名也𨽻玉門縣者一道溝東距縣城一百五十里二道溝東距縣城一百六十里𨽻安西州者三道溝西距州城二百五十里四道溝西距州城二百三十里五道溝西距州城二百二十里六道溝西距州城二百十五里七道溝西距州城二百十里八道溝西距州城二百里九道溝西距州城一百七十里十道溝西距州城一百六十二里按漢書淵泉縣注闞駰云地多泉水盖即指此窟窿河窟窿河在安西州雙塔堡東西距州城一百三十里東西分流經雙塔堡東入蘇賴河内多窟穴上小下大深邃不測盤渦湍急流不及逺南為土葫蘆溝即窟窿河發源處也明史西域傳成化九年都督哈森舊作罕慎今改正及齊勤舊作赤斤今改正罕東諸部集兵進討土爾畨兵至布隆吉爾舊作布隆吉兒今改正川川按栁溝衛城地名布隆吉亦稱布隆吉城窟窿河居其西亦稱布隆吉河明史布隆吉爾川即謂此水也南籍端水南籍端水在安西州治北上承布魯湖西出之水經流安西州全境亦蘇賴昌馬兩河下流也又西行㑹南岸河渠三道西南流西距州城六十里曰屯田渠長九十里繞州城南西注𤓰州五堡間又東踰小灣堡五里曰回民渠長六十里經𤓰州五堡南又東二十里曰餘丁渠長三十五里自南籍端水西行㑹黨河入哈喇淖爾漢書地理志冥安縣南籍端水出南羌中西北入其澤元和志晉昌縣㝠水自吐谷渾界流入大澤東西二百六十里南北六十里按蘇賴昌馬二河舊經五衛故地在今安西州北者槩謂之蘇賴河顧考今安西州舊為淵泉縣即漢㝠安縣唐晉昌縣地則此州北經流之水為漢之南籍端水唐之㝠水無疑漢書云出南羌西北入澤元和志云自吐谷渾界流入大澤皆舉其全體而言之耳黒水河黒水河在安西州東南九十里水色㣲黒有魚發源迤東之沙窩西流入蘆水溝河上有橋名黒水橋厥名頗著宫皁河宫皁河在安西州踏實堡南二十里南山下有三道南通金鷄嶺西南有毛兔泉北距州城一百七里又西南有蛇窩泉北距州城一百三十里藥水泉藥水泉在石包城東泉有二源北流合一又北流為水峽又州治東南一百四十里有大泉南三百五十里有塔兒泉漢書地理志酒泉郡注應劭曰其水若酒故曰酒泉也師古曰舊俗傳云城下有金泉泉味如酒按一統志載藥泉在沙川衞東南石堡城味畧如酒相傳飲之愈疾疑藥泉即漢書酒泉金泉之舊茨窩泉茨窩泉在安西州城北五百里東長流水東長流水在茨窩泉西北五十里東南距州城一百里烏拉大泉烏拉大泉在安西州青山子北七十里東南距州城七百二十里蘆岡泉蘆岡泉在烏拉大泉西北九十里東南距州城八百十里接哈宻界魏書髙昌傳髙昌王馬儒求内徙割伊吾五百里以儒居之至羊榛水按伊吾為今哈密自伊吾五百里至羊榛水宜在今哈密東南五百里之地今蘆岡泉西北去哈密約五百里疑與古羊榛水為近月牙泉月牙泉在敦煌縣南鳴沙山麓南隣黨河淵渟澄澈映月無塵環以流沙雖遇烈風而泉不為沙掩舊傳水産鐵背魚七星草服之可長生肅州新志月牙泉人亦呼為藥泉按肅州新志載月牙泉人亦呼為藥泉今月牙泉在敦煌縣南藥泉在安西州東南一統志亦二泉分載而肅州志謂月牙泉亦名藥泉者以其産有七星草故並得是名歟又考今敦煌縣城東北一百四十里百齊堡南有小湖北近坡陀圓可周數里同名月牙盖縁蹟地山泉濬發所在多有不同源而名號偶符亦無可疑者鹽池鹽池在敦煌縣東四十七里池中鹽常自生百姓仰給又黨河西四十里有西鹽池四面皆沙山懸泉懸泉即今水硤在敦煌縣東一百三十里敦煌耆舊記水有懸泉之神元和志懸泉水在沙州東北一百三十里出懸泉山漢將李廣伐大宛還士衆渴乏引佩刀刺山泉飛湧出按懸泉之名于古最著今敦煌即沙洲故城詳見疆域則自圪塔井空心墩南境之山在敦煌縣直東迤北境上者應即懸泉山山中水硤應即懸泉為漢李廣刺山湧泉故處也黨河黨河在敦煌縣城西七十里源出縣東南山中北流二百餘里又西流百餘里東北㑹龍勒水又北流出山為黨河口又北流至敦煌縣城西又北流百餘里入蘇賴河西入哈喇淖爾東分二大渠曰永豐渠長三十二里經縣城南折而東曰大有渠長四十二里經縣城北西分三大渠曰通裕渠長二十里曰慶裕渠長十七里曰普利渠長二十三里其下流東岸復分四小渠曰窑溝渠曰伏羌舊渠曰伏羌新渠曰荘浪渠溉田甚廣即古氐置水也一名都鄉河其合流入喇喇淖爾處名葫蘆河漢書地理志敦煌郡龍勒縣氐置水出南羌中東北入澤溉民田五代髙居誨使于闐記𤓰州南十里鳴沙山西渡都鄉河至陽闗按敦煌縣西境即漢龍勒縣地今敦煌縣境内之水無大於黨河者其為漢氏置水無疑也黨河出南山入哈喇淖爾即漢書出南羌東北入澤之遺蹟其旁水分渠水利廣饒所謂溉民田者也鳴沙山在今敦煌縣東黨河在其西南北流則髙居誨自鳴沙山西渡之都鄉河亦非此莫属也惟黨河出山至河口皆西北流至敦煌縣西則北入哈喇淖爾而漢書乃云東北入澤似未全合然考漢龍勒故城在今黨河之西河流經其東則漢書所謂東北入者據其經流龍勒縣境者而言謂在縣境之東而北入大澤耳非謂全水形勢皆如是也唐岑參苜蓿峰寄家人詩云葫蘆河上淚沾巾苜蓿峰為今五峰之一葫蘆河與之相近今黨河下流哈喇淖爾一帶濵河之地名呼嚕蘇台河盖以地而得名者以葫蘆目之乃音轉之訛耳渥洼水渥洼水在敦煌縣界生天馬漢書武帝紀元鼎四年秋馬生渥洼中作天馬之歌注李斐曰南陽新野有暴利長當武帝時遭刑屯田敦煌界數於此水旁見郡野馬中有竒異者與凡馬来飲此水利長先作土人持勒靽於水旁後馬玩習久之代土人持勒靽收得其馬獻之欲神異此馬云從水中出按渥洼水遺跡無可考李注稱暴利長以屯田得之宜在敦煌境内水草耕牧之地今黨河分五大渠漑田甚廣黨城為效穀故縣以勤效得穀其為當時屯種畜牧之地無可疑者則渥洼水或即氐置之支流與今黨河相附近者與哈喇淖爾哈喇淖爾淖爾䝉古語謂池也餘倣此在敦煌縣西北距縣城二百八十里左右週遭小渚六七有三大源曰蘇賴河曰昌馬河曰黨河皆出南羌中歸墟於是蘇賴河水自靖逆城東南三百里出山北流至栁溝堡折而西南流㑹十道溝水繞安西州北過敦煌縣西北入於淖爾昌馬河水自靖逆城南二百二十一里東北入蘇賴河同入於淖爾黨河水自安西州南四百里出山西北流過黨河口至敦煌縣西北為呼嚕蘇郭勒㑹蘇賴河同入淖爾三河大槩分東西二支經流一州二縣包絡羣山内資灌溉外控形勢支流成渠旁水咸彚過此以西則地多沙磧矣按漢書南籍端水氏置水皆西北入澤所謂澤者即指哈喇淖爾而言淖爾當安西州之西北境諸水東南入之形勢方位適合也巴顔布拉克巴顔布拉克布拉克䝉古語謂泉也餘倣此在敦煌縣城西南八十里東傍紅山又西五十里有多布溝山中出泉南北環流當孔道龍勒水龍勒水在敦煌縣古城南一百八十里龍勒山下其水南流㑹黨河入於哈喇淖爾元和志夀昌縣有龍勒水在縣南一百八十里龍勒山下按古城為龍勒故城説見巻七疆域則古城南境之水當為龍勒水也又水出山而南流亦與元和志水出龍勒山之説合以上屬安西州色爾騰海色爾騰海在敦煌縣西南境外三百餘里水出南山之隂西北流瀦為大澤四周有山圍繞水不長流西八十里别有圓澤名小色爾騰海西南三百里有鹽池按唐書地理志載鹽池之名不一其在安西州西境外者有納職縣南六十里之陸鹽池今流沙以西古鄯善國地在唐為納職縣與所謂陸鹽池方位相合疑足當之然按蒲昌海一名鹽澤漢書謂其潜行地中水經注謂其地廣千里皆為鹽而剛堅掘發其下有大