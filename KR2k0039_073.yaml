蘇台河盖以地而得名者以葫蘆目之乃音轉之訛耳渥洼水渥洼水在敦煌縣界生天馬漢書武帝紀元鼎四年秋馬生渥洼中作天馬之歌注李斐曰南陽新野有暴利長當武帝時遭刑屯田敦煌界數於此水旁見郡野馬中有竒異者與凡馬来飲此水利長先作土人持勒靽於水旁後馬玩習久之代土人持勒靽收得其馬獻之欲神異此馬云從水中出按渥洼水遺跡無可考李注稱暴利長以屯田得之宜在敦煌境内水草耕牧之地今黨河分五大渠漑田甚廣黨城為效穀故縣以勤效得穀其為當時屯種畜牧之地無可疑者則渥洼水或即氐置之支流與今黨河相附近者與哈喇淖爾哈喇淖爾淖爾䝉古語謂池也餘倣此在敦煌縣西北距縣城二百八十里左右週遭小渚六七有三大源曰蘇賴河曰昌馬河曰黨河皆出南羌中歸墟於是蘇賴河水自靖逆城東南三百里出山北流至栁溝堡折而西南流㑹十道溝水繞安西州北過敦煌縣西北入於淖爾昌馬河水自靖逆城南二百二十一里東北入蘇賴河同入於淖爾黨河水自安西州南四百里出山西北流過黨河口至敦煌縣西北為呼嚕蘇郭勒㑹蘇賴河同入淖爾三河大槩分東西二支經流一州二縣包絡羣山内資灌溉外控形勢支流成渠旁水咸彚過此以西則地多沙磧矣按漢書南籍端水氏置水皆西北入澤所謂澤者即指哈喇淖爾而言淖爾當安西州之西北境諸水東南入之形勢方位適合也巴顔布拉克巴顔布拉克布拉克䝉古語謂泉也餘倣此在敦煌縣城西南八十里東傍紅山又西五十里有多布溝山中出泉南北環流當孔道龍勒水龍勒水在敦煌縣古城南一百八十里龍勒山下其水南流㑹黨河入於哈喇淖爾元和志夀昌縣有龍勒水在縣南一百八十里龍勒山下按古城為龍勒故城説見巻七疆域則古城南境之水當為龍勒水也又水出山而南流亦與元和志水出龍勒山之説合以上屬安西州色爾騰海色爾騰海在敦煌縣西南境外三百餘里水出南山之隂西北流瀦為大澤四周有山圍繞水不長流西八十里别有圓澤名小色爾騰海西南三百里有鹽池按唐書地理志載鹽池之名不一其在安西州西境外者有納職縣南六十里之陸鹽池今流沙以西古鄯善國地在唐為納職縣與所謂陸鹽池方位相合疑足當之然按蒲昌海一名鹽澤漢書謂其潜行地中水經注謂其地廣千里皆為鹽而剛堅掘發其下有大鹽如巨桃亦當納職之境則唐書所稱陸鹽池者又應指此而非色爾騰海西南之鹽池也噶斯淖爾噶斯淖爾在小色爾騰海西七百里其澤周迴二百里支流三道西南行百餘里北二百里至羅布淖爾唐書地理志自納職縣西經獨泉東華西華駝泉渡茨萁水過神泉三百九十里有羅䕶守捉按兩色爾騰海鹽池噶斯淖爾諸水皆在敦煌縣西古玉門闗外即唐以鄯善故城置之納職縣地所謂獨泉東華西華駝泉茨其水神泉者疑是其遺蹟也以上属安西州西境外地安西北路半池泉半池泉在安西州北蘆岡泉西北七十里西距哈密城六百三十里西長流水西長流水在格子烟墩西北七十里西北距哈密城一百三十里源出天山南麓西南流入於沙磧明一統志輝和爾舊作畏吾兒今改正河在哈密城東一百三十餘里沿河沙栁蓊蔚按輝和爾河與今西長流水距哈密里數相合疑為一水與哈密城東鞭桿必栁諸河同屬山泉之分支而西長流水經流較逺且當道又明一統志載娘子泉在輝和爾河東土人呼為哈屯舊作可敦今改正布拉克今無考附見於此賽巴什湖賽巴什湖在哈密城東北二十里湖分三渠曰大榆樹溝曰小榆樹溝曰廟兒溝雍正十二年開濬渠成西流入於南湖上建老閘鴛鴦閘以時蓄洩小榆樹溝老閘洩水半溉鴛鴦閘地畆半由北渠迴流以溉東渠地畝廟兒溝老閘洩水以溉一百顆樹地畝餘水由西老閘宣洩以溉鴛鴦閘地畝秋後山泉稀少復治盤道以大榆樹溝水改入盤道用溉秋田冬至後聚氷灘數十處以資春種有屯田詳見屯政南湖南湖在哈密城南二十里賽巴什湖東來入之又滙南山口以西諸泉折而西流二百里為沙磧所限元和志伊州東北四澗水並南流至州南十八里合流為一水側近皆有良田按元和志不載四澗水名而云在伊州東北與今賽巴什湖方位相符則賽巴什湖之三渠當即四澗舊地其南流至州南而合者即今賽巴什湖之入于南湖者也又按一統志載哈密東門外有黒水河土名喀喇烏蘇敦煌隨筆載哈密城外東有闌干水西有蘇巴什湖夾流十餘里滙於南湖以今形勢考之則闌干水當即黒水河與所謂蘇巴什湖皆賽巴什湖之支流環城而㑹於南湖者非賽巴什湖之外别有蘇巴什湖亦非賽巴什湖分流達於南湖之外别有闌干黒水諸河也栁樹泉栁樹泉在哈密城南六十里其西境傍近南湖水草豐縟鞭桿泉鞭桿泉在南山口東四十里源出塔什達巴南麓西南流㑹必栁泉入賽巴什湖必栁布拉克必栁布拉克在鞭桿河東三十里出必栁達巴南麓西南流㑹鞭桿泉入賽巴什湖按布拉克䝉古語即泉也志中凡以漢語名者係以泉如栁樹鞭桿之屬以䝉古語名者係以布拉克如必栁巴克塔什之属庶各以類從稱名較順云巴克塔什布拉克巴克塔什布拉克在南山口東一百里源出天山南麓南流入沙磧哈里勒齊馬克布拉克哈里勒齊馬克布拉克在巴克塔什布拉克東二十里源出天山南麓南流入沙磧恩納爾布拉克恩納爾布拉克在哈里勒齊馬克布拉克東十里源出天山南麓南流入砂磧哈套布拉克哈套布拉克在恩納爾布拉克東十五里源出天山南麓南流入沙磧烏拉台布拉克烏拉台布拉克在哈套布拉克東十里源出天山南麓南流入沙磧哈什馬克布拉克哈什馬克布拉克在烏拉台布拉克東十五里源出天山南麓南流入沙磧