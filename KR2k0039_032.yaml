阿拉克池當山之南麓元和志金山在玉門縣東六十里出金寰宇記玉門縣長三百里石門周帀山間按一統志載金山在赤金所東又稱赤斤山在赤金所西三十里似屬兩山今以形勢求之山在玉門縣北而亘乎東西盖一山而異名者自赤金峽折而北東逕縣城與寰宇記所云玉門縣長三百里石門周帀山間者相合是則縣名玉門衛名赤金皆取義於此獨登山獨登山在玉門縣北距城十里踰赤金湖而至又玉門縣南有紅山元和志獨登山在王門縣北十里其山出鹽甘美有異常鹽取充貢獻按今玉門縣北之山即赤金峽之折而東北者舊名獨登當縣城直北應屬金山之支峰寛臺山寛臺山在玉門縣城東九十里惠回堡北山寛如臺故名一統志寛臺山在赤金所東南嘉峪闗西按今嘉峪闗迤西之山統名南山寛臺亦應其支峰也又唐書玉門縣南有神雨山疑與寛臺山相近尖山尖山在安西州之東黄蘆岡西北九十里西南距州城四百五十里踰河而至其東為往哈宻孔道青山青山在尖山西北一百六十里中經東長流水至此西南距縣城六百十里地當孔道懸泉山懸泉山在敦煌縣東一百三十里即南山之支峰山脈自縣境南來復繞為東屏山中水峽即縣泉也元和志懸泉山在沙州東北百三十里按沙州東北百三十里當屬漢廣至縣地據後漢書注廣至故城在常樂東境又當為唐之常樂據此則漢書地理志稱廣至縣有昆侖障唐書地理志稱常樂縣有㧞河帝山當與懸泉山方位相近也三危山三危山在敦煌縣城東南四十里亦南山之支峰三峰聳峙勢極危峻故名山海經三危之山三青鳥居之是山也廣員百里水經注三危山在敦煌縣南隋書地理志敦煌郡敦煌縣有三危山唐書地理志沙州敦煌郡敦煌縣東四十七里有三危山括地志山在敦煌縣東南三十里山有三峯故曰三危按尚書舜典竄三苗于三危禹貢雍州三危既宅又導弱水至于三危孔安國傳三危西裔之山此西域山名見於經者厥名為最古矣更以山經以下諸書証之即今敦煌縣東南四十里之山無疑也唐一行叙北戒諸山獨以三危為首是不知皆葱嶺南山所分三危亦其支峯耳魏書太平真君六年討吐谷渾杜豐追被囊度三危山至雪山生擒之即謂此山又括地志三危山俗名卑羽山寰宇記俗名昇雨山皆一山而隨時異名者鳴沙山鳴沙山在敦煌縣東南十里黨河經其西南積沙所成峯巒危峭踰於石山四面皆沙隴背如刀刄人登之即鳴隨足墜落經宿雨吹輒復如舊天氣晴朗沙鳴聞於城内其西即禹貢謂餘波入于流沙者也山有泉曰沙井挹注不竭水極甘美山麓有泉名月牙其東為千佛洞有雷音寺建寺之始不詳年代岩石間佛像萬計寺有唐朝散大夫鄭王府諮議隴西李太賓碑唐涼州司馬檢校國子祭酒兼御史中丞姓氏缺碑各一水經注敦煌縣南七里有鳴沙山隋書地理志敦煌郡敦煌縣有神沙山元和志鳴沙山一名神沙山唐朝散大夫鄭王府諮議隴西李太賓碑文缺五十二字飛閣缺二字霞連衣缺二字居缺一字出人境聖缺一字時照一川星懸缺一字鐘缺四字雷缺一字靈仙鬼佛往往而在缺一字以賊臣千缺九字暴殄天物東自隴缺一字舊陌走狐之羣西盡陽闗遺邑聚豺狼之窟缺一字木夜驚和門晝扄㙮中委塵禪處生缺一字時有信士朝散大夫鄭王府諮議隴西李太賓其先指樹命氏紫氣度流沙之西㓨山騰芳缺一字名感懸泉之下時高射虎人望登龍開國西涼稱藩東晉諮議即興聖皇帝十三代孫逺派天分世濟其美靈根地植代不乏賢六代祖寶隨使持節侍中西陲諸軍事鎮西大將軍領䕶西戎校尉開府儀同三司沙州牧燉煌公玉門缺一字封邑三千户曽祖達皇燉煌司馬其後因家焉祖操皇大黄府車騎將軍考奉國皇昭武校尉甘州和平鎮將早逢昌運得展雄材一命是凌雲之資百齡懷捧日之慶垂條字從原刻布頴業繼弓裘築室連閎里成冠盖難兄令弟卓然履道之賢翼子謀孫宛爾保家之主諮議天授淳粹神假正直交遊仰其信鄉黨稱其仁義泉深沈酌而不竭道氣虚逺感而遂通嘗以為挹江海者難測其淺深望乾坤者不究其方圓况色空皆空性相無相豈可以名言悟豈可以文字知夫然故方丈小室黙然入不二之妙智度大道法爾表無念之真以其虚谷騰聲洪鐘應物所以魔宫山坼佛日天開愛水朝清昏衢夜曉一音演法四衆隨縁直解髻珠密傳心印凡依有相即是所依若住無為還成有住由是巡山作禮歴險經行盤迴未周軒檻缺一字斷刻削有地締搆無人遂千金貿工百堵興役奮鎚聾壑揭石聒山素湼盤像一鋪如意輪菩薩不空罥索菩薩各一鋪畫報恩天請問普賢菩薩文殊師利菩薩東方藥師西方淨土千手千眼觀世音菩薩彌勒上生下生如意輪不空罥索等變各一鋪賢刼千佛一千軀初坏土塗旋布錯彩豁開石壁儼現金容本自不生示生於千界今則無滅示滅於雙林考經尋源備物象設梵王奔世佛母下天如意聖輪圓轉三有不空妙索維持四生人其報恩天則請問六牙象寶摇紫佩以棲真五色獸王載青蓮而捧聖十二上願列於淨刹十六觀門開其樂土大悲來儀於鷲嶺慈缺一字降跡於龍華丕休哉千佛分身聚成沙界八部敷衆重圍鐵山希夷無聲悉窣欲動爾其簷飛雁翅砌盤龍鱗雲霧生於戸牖雷霆走於階陛左豁平陸目極逺山前流長河波映重閣風鳴道樹每韻苦空之聲露滴禪池更澄清淨之趣時節度觀察處置使開府儀同三司御史大夫蔡國公周公道洽生知才膺命世清明内照英華外敷氣邁風雲心縣日月文物居執憲之重武威當杖鉞之雄括囊九流住持十信爰因蒐練之暇以申禮敬之誠揭竿操矛闟㦸以從蓬頭駢脇傍車而趨熊羆啓行鵷鷺陪乗𨼆缺三字蕩谷摇川而至於斯窟也層軒九空複道一帶前引簫唱上干雲霓雖以身容身投迹無地而舉足缺一字足登天有堦目窮二儀心出三界有若僧政沙門釋靈悟法師即諮議之愛弟也戒珠圓明心鏡朗澈學探萬偈辯折千人出火宅於缺一字乘破空遣相指化城於四座虚往實歸於是引兄大賓弟朝英姪子良子液子望子羽等拜手於堦下法師及姪僧志融歛袂於堂上曰主人恤人求瘼戡難濟時井税且均家財自給是得旁開虚洞横敞危樓將以翼大化將以福先烈休庇一郡光昭六親况祖孫五枝圖素四刹堂構免墜詒厥無慚非石何以表其貞非文何以紀其逺且登高能賦古或無遺遇物斯銘今豈遐弃紛然遞進來以求䝉蔡公乃指精廬而謂愚曰操斧伐柯取則不逺屬詞比事固可當仁仰恭指歸俯就誠懇敢缺二字其狂簡庶髣髴於真宗缺十三字十缺一字年龍集景辰缺五字有十五日辛未建缺二字姝夫鄉貢明經攝燉煌州學博士隂庭誡唐涼州司馬撿校國子祭酒兼御史中丞缺碑以上缺籍缺二字乃缺八字字缺八字王缺二字也缺一字増祖缺九字司郎中賜緋魚袋缺十三字歸唐缺一字右散騎常侍英髦驤駟缺三字皆以缺一字古微言留心儒素或登華第更高㧞缺一字之名文戰都堂每中甲科之的雖云前䧟居缺一字而不墜弓裘暫冠缺二字猶次將軍之列子既承恩鳳闕父乃擢處貂蟬朱門不愧於五侯樹㦸崇隆於貴族至於源分特秀門繼簮裾家承九錫之枝流派祥雲之允時遭西陲汩沒至徳年中十郡土崩彌絶玉闗之路凡三甲子運偶大中之初中興啓途是金星耀芒之嵗皇化溥洽通乎八宏遐占雪山綿邈萬里府君春秋纔方弱冠文藝卓犖進止規常迥然獨秀時則妻父河西隴右一十一州節度管内觀察處置押蕃落營田支度等使金紫光禄大夫特進食邑二千户實封三百戸賜紫金魚袋南陽張公諱義潮慕公之高望藉公之文武於是乃為秦晉遂申伉儷之儀將奉承祧世祚潘揚之美公其時也始䝉表薦因依獻字從原刻親拜彤庭宣宗臨軒缺二字所以公具家諜面奏玉階上亦冲融破顔羣公愕視乃從别缺一字勅授涼州司馬檢校國子祭酒兼御史中丞賜紫金魚袋錫金銀寶貝詔命陪臣乃歸戎幕缺二字餘載河右麾戈㧞幟抉囊龍韜盡展克復神鳥而壹戎衣殘勍冦於河蘭馘獯戎於澣字從原刻義當作瀚海加以隴頭霧卷金河泯湍瀨之波蒲海梟鯨流沙㢮列烽之患復天寶之缺二字致唐堯之夀域晏如也百城無拜井之虞十郡豐登吏士賀來蘇之政此乃三槐神异百辟稀功英雄半千名流萬古公又累䝉朝奬恩渥日深方佩隼旟用堅磐石勲猷未缺一字俄已云亡享齡五十有二終於燉煌之私第亡叔僧妙弁在蕃以行高才峻遐邇瞻依名達戎王贊普追召特留在内兼假臨壇供奉之號缺一字以擅持談柄缺一字辯缺一字流恩洽燉煌庇休家井高僧寶月取以為儔僧叡餘蹤扇於河隴亡妣氾氏太夫人龍缺一字鼎鼐盛族孤標庭訓而保子謀孫軌範而清資不乏承家建業薦累代而揚名閥閲聨綿長緒帝王之室今乃逝矣佳譽存焉故府君贈右散騎常侍生前遇三邊無警四人有暇於東臯命駕傾誠謁先人之寶刹迴顧粉壁念疇昔之遺蹤瞻禮玉豪嘆紅樓之半側豈使林風透閨埃塵寶座之前峗嶺陽烏曝露茶毗之所嶝道之南復有當家三窟今亦重修泥金華石篆籕存焉於是乃募良工訪其杞梓貿材運斧百堵缺一字成魯國班輸親臨勝境雲霞大豁寶砌崇墉未及星環斯搆矗立雕簷化出巍巍不讓於龍宫懸閣重軒曉方缺一字於日際其功大矣筆何宣哉亡兄河西節度衙推兼監察御史明達天與孤貞松筠比節懷文挾武有張賓之策謀破虜擒奸每得玉堂之術曽朝綘闕敷奏金鸞指畫山川盡縱横於天險兄明徳任沙州録事參軍摻持吏理六曹無阿黨之言深避四知切慕乘鷗之詠兄明詮燉煌處士今古滿懷灑落卿雲之彩缺一字先效靈光騰矞露之文五字從原刻閑居慕逍遥於㽵字從原刻老夫人南陽郡君張氏即河西萬户侯太保張公第十四之女温和雅暢淑徳令聞深遵陶母之仁至切齊睂之摻先君歸覲不得同赴於京華外族留連各分飛於南北於是兄亡弟喪社稷傾淪假手托孤幾辛勤於茍免所賴太保神靈辜恩勦斃重光嗣子再整遺缺一字雖手剏大功而心全弃置見機取勝不以為懷乃義立姪男秉持旄鉞總兵戎於舊府樹勲績於新墀内外肅清秋毫屏迹慶豐山踴呈瑞色於朱軒陳霸動容歎缺三字壯室四方嚮義信結隣羌運籌不媿於梓橦貞烈缺一字慚於世婦間生神異成太保之徽猷雖處閨門實謂丈夫之女然心悟道併弃樊籠巡禮仙巖字從原刻圖鐐於缺二字於時頓捨青鳬缺一字紫金於上國解纓絡弃珠珍銷金鈿於廊廡運虚櫜於庭際乃得玉毫朗耀光衝有頂之峯室相發輝直抵大羅之所長男使持節沙州諸軍事缺一字沙州刺史兼節度副使檢校右散騎常侍御史大夫上柱國宏愿輔唐憂國政立祥風忠孝頗懇於君親禮讓靡忘於伯玉六條布化千里隨車人歌來暮之缺三字龔黄之績次男使持節𤓰州刺使墨離軍押蕃落等使兼御史大夫宏定文武全材英雄賈勇晉昌要險能布頗牧之威缺一字野大荒屏盪匈奴之迹挾纊缺三字士卒冺燧不媿於襄陽都河自注人知有道之君積貯万字從原刻廂東郡著彫金之好次男使持節甘州刺史缺一字御史中丞上柱國宏諫飛馳拔拒惟慶忌而難儔缺三字楊非由基而莫比洎分符於張掖改恤惸孤布皇化於専城懸魚發詠次男朝議郎前守左神武軍缺二字兼侍御史宏益三端俱備六藝精通工書有類缺四字札連芳於射㦸缺三字達文雅而徳重王音於時豐年天稔星使西臨親抵燉煌頒宣聖㫖内常侍缺六字玉裕稱克珣副倅師大夫稱齊珙判缺一字大夫缺二字回偕缺五字樞密杞材遐耀天威呈祥塞