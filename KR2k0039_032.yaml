也後倣此在必濟鄂拉西北四圍皆沙磧東南距鎮西府城四百里自此西北行與天山北路之拜塔克相接為準噶爾舊疆交界處山北六十里即布拉干郭勒以上屬鎮西府欽定皇輿西域圖志卷二十
