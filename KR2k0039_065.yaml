body:
  text: 貢賦安西州糧賦額徵糧四千五百九十二石九斗七升二合五勺本色小草四萬二千一百十八束七分四釐草折糧二千二十四石七斗田九萬九千七百九畝三分六釐二毫每畝科徵四升一合八勺七抄六撮又加耗糧每畝四合一勺八抄七撮六圭内科徵本色草地三萬二千二百十九畝三分六釐二毫每畝徵小草一束三分七毫二絲四忽九微七塵四𣺌三漠科徵草折糧地六萬七千四百九十畝每畝折徵糧三升租税田房契税儘徴儘解無定額餘税無州屬玉門敦煌縣同玉門縣糧賦額徵糧二千三百七石四斗五升九合三勺八撮五圭本色大草一萬七千一百八十四束五分四釐草折糧四百八十六石田五萬九千二畝九分每畝科徵四升一合八勺七抄六撮又加耗糧每畝四合一勺八抄七撮六圭内科徵本色草地三萬三千八百九十二畝九分每畝徵大草五分八釐三絲七忽四微六纎四塵科徵草折糧一萬六千二百畝每畝折徵糧三升敦煌縣糧賦額徵糧五千五百五十五石二斗七升一勺六抄本色大草六萬一千三百九束九分八釐一毫五絲八忽四微田十二萬六百畝每畝科徵四升一合八勺七抄六撮又加耗糧每畝四合一勺八抄七撮六圭每畝科徵大草五分八毫三絲七忽四微六纎四塵哈密土貢鷹五架羊角弓面十副綽塔爾布四疋及乾𤓰小刀礪石之屬按哈密除屯田地畝外俱係回人耕種無交納糧賦至菜園房租亦以商民租賃回人地基並無税入其牲畜房産契税因無土著民户未設市集故徵收均未及云鎮西府宜禾縣附郭糧賦額徵糧二千三百二十七石二斗一升五合九勺八抄六撮五圭草折糧一千五百十五石六斗五升四合田五萬五百二十一畝八分每畝科徵四升一合八勺七抄六撮又加耗糧每畝四合一勺八抄七撮六圭科徴草折糧每畝三升乾隆三十一年以招募安插民户墾種地畝陞科四千五百八十八畝五分後遞年増墾至三十九年如今額租税房地牲畜税每價銀一兩額徵銀三分儘收儘解無定額民蓋鋪房每間每月額徵銀一錢儘收儘解無定額官蓋鋪房每間每月額徵銀一兩二錢次一兩儘徵儘解無定額竒臺縣糧賦額徵糧三千三百八十五石四斗四升四合二勺八抄二撮草折糧二千二百四石八斗五升田七萬三千四百九十五畝每畝科徵四升一合八勺七抄六撮又加耗糧每畝四合一勺八抄七撮六圭科徵草折糧每畝三升乾隆三十七年以招募安插民户墾種地畝陞科六千畝後遞年増墾並木壘奇臺等處屯田遺地歸民墾種至四十年如今額租税房地牲畜税每價銀一兩額徵銀三分儘徵儘解無定額迪化州糧賦額徵糧三千八百七十一石八斗八勺田四萬二百十六畝每畝科徵細糧米麪八升折徵小麥九升六合三勺乾隆三十二年以招募安插民户墾種地畝陞科六千六百八十六畝後遞年増墾至四十年如今額按迪化州居山北候較寒不宜粟穀故草束無徵而細糧亦以小麥折收云租税州屬昌吉綏來阜康三縣並同房地牲畜每價銀一兩額徵銀三分儘徵儘解無定額民蓋鋪房每間每月額徵銀三錢次二錢又次一錢儘徵儘解無定額官蓋鋪房每間每月額徵銀一兩六錢次一兩五錢又次一兩四錢儘徵儘解無定額商民認墾菜園地每畝每年額徵銀一錢儘徵儘解無定額土貢野雞昌吉縣糧賦額徵糧六千六石二斗三升一合田六萬二千三百七十畝每畝科徵細糧米麪八升折徵小麥九升六合三勺乾隆三十二年以招募安插民户墾種地畝陞科六千三百四十四畝後遞年増墾至四十年如今額額徵蘆草溝昌吉縣屬糧一千六百七十二石七斗三升一合田一萬七千三百七十畝每畝科徵細糧米麪八升折徵小麥九升六合三勺乾隆三十七年以安插民户墾種地畝陞科二千六百四十畝後遞年増墾至四十年如今額綏來縣糧賦額徵糧七百四石九斗一升六合田七千三百二十畝每畝科徵細糧米麪八升折徵小麥九升六合三勺乾隆三十八年以安插民户墾種地畝陞科三千九百六十畝後遞年増墾至四十年如今額阜康縣糧賦額糧三千八百五十八石五斗九升七合二勺田三萬九千九百四十四畝每畝科徵細糧米麪八升折徵小麥九升六合三勺乾隆三十四年以招募安插民户墾種地畝陞科三千六十六畝後遞年増墾至四十年如今額庫爾喀喇烏蘇租税民蓋鋪房每間每月額徵銀一錢自乾隆三十年始儘徵儘解無定額商民認墾菜園地每畝每年額徵銀一錢自乾隆三十一年始儘徵儘解無定額土貢野雞塔爾巴噶台租税民蓋鋪房每間每月額徵銀七錢自乾隆三十一年始儘徵儘解無定額地基每段每月額徵銀二錢自乾隆三十一年始儘徵儘解無定額商民認墾菜園地每畝每年額徵銀一錢自乾隆三十一年始儘徵儘解無定額按庫爾喀喇烏蘇境専設屯田無他賦税非商賈凑集之區也若塔爾巴噶台當準部北境與外藩接内地人民鮮至其地故有屯兵而無民賦與庫爾喀喇烏蘇同伊犂糧賦額徵糧三百五十一石二斗八升田四千三百九十一畝每畝科徵細糧八升係安插民户承種自乾隆三十三年始遞年増墾至三十九年如今額額徵回戸糧九萬六千石回人墾種地畝計戸納糧自乾隆二十五年始每戸每年徵糧十六石額徵賦一百六兩五錢田二千一百三十畝每畝額徵銀五分係入籍民戸承種官借牛隻籽種口糧自開墾之次年分作三年每畝帶徵借項銀五分還欵後每畝止徵額銀五分自乾隆三十七年始遞年増墾至三十九年如今額租税房地牲畜每價銀一兩額徵銀三分儘徵儘解無定額牙儈二十三名每名每年額徵銀六錢儘徵儘解無定額官蓋鋪房每間每月額徵銀一兩儘徵儘解無定額民蓋鋪房每間每月額徵銀三錢次二錢又次一錢儘徵儘解無定額地基每間每月額徵銀二錢儘徵儘解無定額民蓋住房每間每月額徴銀二錢儘徵儘解無定額商民認墾菜園每畝每年額徵銀一錢儘徵儘解無定額商民認墾禾地每畝每年額徵銀五分儘徵儘解無定額土貢哈薩克馬黒獺皮野雞鹿尾按準噶爾舊俗逐水草事畜牧不以耕種為業是以舊無田賦其刼服回部因徵税入則回部有田而準部賦之耳在漢如匈奴之置僮僕都尉使領西域賦税諸國在唐如統葉䕶之霸西域命吐屯以督賦入由來已久邇者南北兩部咸歸疆索我皇上於生成一體之中立因地制宜之法始則移回部之人民理準疆之塍畎嗣是農功日闢賦役有經不惟山南習耒耜之勤即山北亦有口分之業不數年來蔚成都㑹地不愛寶尊親之慕無窮諸福之物畢至樂樂利利垂萬億年矣闢展糧賦額徵糧三千四百二十三石二斗本屬舊設屯田地三萬四千二百三十二畝乾隆二十六七年裁歸回部郡王額敏和卓公蘇賚滿所屬回戸承種每嵗每畝額徵十分之一現無増減租税商民認墾附郭菜園地每畝每年額徵銀三錢五分儘徵儘解無定額商民認墾逺郊菜園地每畝每年額徵銀一錢儘徵儘解無定額土貢糧三千石初土爾番回部郡王額敏和卓貢糧四千石恩賞布五疋茶五封乾隆二十七年奉㫖恩免交糧一千石其布疋茶封從駐劄大臣之請停止賞給葡萄二百四十斤及𤓰乾紬布手巾佩刀諸物其附近羅布淖爾回戸嵗貢水獺皮哈喇沙爾糧賦額徵糧九百八十二石哈喇沙爾所屬庫隴勒布古爾回戸每戸承種地二十六畝九分零額交糧一石六斗一升三合共額糧各七百石乾隆二十八年以回戸撥赴伊犂減存五百六十石四十年以折交紅銅減存糧四百九十一石共九百八十二石如今額雜賦額徵紅銅九百五斤初定庫隴勒二百三十五斤布古爾四百七十斤乾隆四十年各増一百斤如今額額徵硝四百二十八斤租税民蓋鋪房每間每月額徵銀三錢儘徵儘解無定額商民認墾菜園地每畝每年額徵銀一錢六分儘徴儘解無定額庫車糧賦額徵糧二千三百五十五石八斗原墾民田九百六十石籽種地畝徵嵗入十分之一定額九百六十石舊存官地於入版圖後一體歸民墾種者二百五十石籽種地畝徵嵗入十分之五定額一千二百五十石共二千二百一十名嗣以回人成丁及派撥種地採銅遞年増減至乾隆四十一年如今額雜賦額徵紅銅七百二十九斤十兩初乾隆二十六年徵八百十五斤二十七年按照各城回戸匀派共七百二十九斤十兩現無増減額徵火藥六百斤初乾隆二十四年徵火藥八百斤四十年減二百斤如今額額徵硫磺四百斤初乾隆二十八年徴二百斤三十一年増一百斤四十年増一百斤如今額額徵硝二百斤初乾隆三十一年徵一百斤四十年増一百斤如今額租税民蓋鋪房每間每月額徵銀二錢次一錢儘徵儘解無定額沙雅爾糧賦額徵糧八百七十二石六斗原墾民田五百六十五石籽種地畝徵嵗入十分之一定額五百六十五石舊存官地於入版圖後一體歸民墾種者七十五石籽種地畝徵嵗入十分之五定額三百七十五石共九百四十石嗣以回人成丁及派撥種地採銅遞年增減至三十六年如今額雜賦額徵紅銅三百五十八斤十兩五錢初乾隆二十六年徵三百五十斤二十七年按戸勻派實徵三百五十八斤十兩五錢額徵火藥三百斤初乾隆二十四年徵四百斤四十年減一百斤如今額額徵硫磺一百斤初乾隆三十一年徵五十斤四十年増五十斤如今額額徵硝一百斤初乾隆三十一年徵五十斤四十年増五十斤如今額租税民蓋鋪房每間每月額徵銀二錢次一錢儘徵解解無定額烏什糧賦額徴糧二千一十石原墾民田八萬四千畝徵嵗入十分之一定額二千二百五十石舊存官地於入版圖後一體歸民墾種者徵嵗入十分之五定額一百九十二石共二千四百四十二石嗣於乾隆三十年回户不靖勦平後於賽喇木拜喀什噶爾諸處遷移回戸墾種地畝分别抽交糧石三十四年按戸匀徴三石至三十五年如今額按乾隆二十六年初徵紅銅三千一百九十斤二十七年徵五千五百七十一斤至三十一年遷來賽喇木喀什噶爾諸城回戸止代阿克蘇交銅二百五十斤餘無徵額又初徵硝一百斤後遞増至一千一百斤三十一年後額除租税民蓋鋪房每間每月額徵銀一錢次徵銀五分儘徵儘解無定額商民認墾菜園地每畝每年額徵銀二錢儘徵儘解無定額商税凡外番人在烏什貿易者三十分抽一其緞布皮張則二十分抽一本地商人往外番各部貿易者二十分抽一其緞布皮張則十分抽一若牲畜貨物不及抽分之數者馬一匹抽收五十普爾大牛一頭則二十五普爾小牛一頭半之大羊一牽抽收十二普爾小羊一牽亦半之雜項物件視其值之貴賤折收騰格普爾遇有應貢物件即以充貢阿克蘇糧賦額徵糧三千九百四十五石二斗四升二合一勺乾隆二十四年原墾民田一萬四千二百餘石籽種地畝原額糧六千七百五十石舊存官地三百四十四畝一併歸民墾種徵嵗入五分之一遞年増減至三十五年如今額額賦普爾一千六百四十二騰格有奇按百普爾為一騰格後凡以騰格計者倣此乾隆三十一年於額糧内折收現無增減額徴布五百六十八疋乾隆三十二年於額糧内折收三十五年増如今額雜賦額徴紅銅四千六百六十七斤乾隆二十五年徴七百斤二十六年徴四千二百五十斤二十七年徴八千五百斤二十八年按戸匀徴共四千六百六十七斤如今額額徴硫磺四千二百斤乾隆二十五年徴三百斤二十七年増三百斤三十年増三百斤三十二年以應交硝斤改徴硫磺二百斤三十三年以應徴硝斤全改徴硫磺三千一百斤共如今額按阿克蘇於