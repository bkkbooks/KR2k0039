驄曰懸光驄曰決波騟曰飛霜驃曰發電赤曰流金騧曰翔麟紫曰奔虹赤杜環經行記刼國唐武徳二年貢玻瓈四百九十枚大者如棗小者如酸棗宋史外國傳建隆二年于闐國王聖天遣使貢圭一以玉為柙王枕一本國摩尼貢琉璃瓶二胡錦一段開寶二年遣使直末山來貢且言本國有玉一塊凡二百三十七斤願以上進乞取之僧善名至貢阿魏子因令還取玉文獻通考高昌宋乾徳三年獻佛牙琉璃器琥珀琖于闐梁武帝時獻方物及琉璃甖刻玉佛唐開元時獻馬駝豽漢乾祐元年遣使貢珪一以玉為柙天聖三年遣使貢玉鞍轡白玉帶胡錦獨峰駝乳香碙砂熙寜以來逺不踰一二嵗近則嵗再至所貢珠玉珊瑚翡翠象牙乳香木香琥珀花蕋布碙砂龍鹽胡錦玉鞦轡馬腽肭臍金星石水銀安息香雞舌香其來益多回紇宋乾徳二年遣使貢白玉團琥珀四十斤犛牛尾貂鼠等又獻佛牙琉璃器琥珀琖明史西域傳巴什伯里舊作别失八里今改正洪武中貢馬及海青永樂中貢玉璞名馬及文豹于闐永樂中獻璞玉及馬此西域之貢方物於中國者按西域貢賦之制當以周書西旅底貢厥獒始自時厥後黒齒貢白鹿白馬義渠以兹白渠搜以䶂犬規矩以麟西申以鳳鳥方楊以皇馬康民以桴苡獨鹿以卭卭距虚禺氏以騊駼大夏以兹白牛犬戎以文馬正西崑崙狗國以丹青白旄紕罽江歴角神龜為獻載之周書王㑹解者甚詳惟方隅里數不著與今準回諸部離合之間難以印證而文與禮經未協不免徒事鋪張兹舉漢唐以後與今西域可確指者隨地採録用兹審訂特其地於當時未入版圖即矯語輸將難云嵗入此惟聖朝恢絶域為疆理所以度越千古也至若史書所載遣使求得請婚納幣與夫陽托貢獻之名隂行互市之計者更無足道故均置弗録云欽定皇輿西域圖志卷三十四
