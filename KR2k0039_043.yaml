body:
  text: 兵防嘉峪闗駐防緑營馬步兵四百二十九名康熈十三年設𨽻遊擊轄安西州安西營駐防緑旗馬步兵七百九十四名原額五百名為安西提標城守營乾隆二十五年改設安西營二十六年増二百名二十七年増一百名二十八年裁五名三十年裁二百名三十二年裁一名續増二百名如今額𨽻叅將轄沙州協左右二營駐防緑旗馬步兵一千三百四十九名原額兵一千五百名乾隆二十八年裁五十一名三十二年裁一百名如今額𨽻副將轄靖逆營駐防緑旗馬步兵六百七十四名原額兵八百名乾隆二十六年裁二百名二十八年裁六名三十一年増八十名如今額𨽻遊擊轄布隆吉爾營駐防緑旗馬歩兵四百九十二名原額兵五百名乾隆二十八年裁八名如今額𨽻都司轄踏實堡營駐防緑旗馬步兵一百九十四名原額兵三百名乾隆二十八年裁六名三十二年裁一百名如今額𨽻都司轄橋灣營駐防緑旗馬步兵二百九十六名原額兵三百名乾隆二十八年裁四名如今額𨽻都司轄赤金營駐防緑旗馬步兵二百名𨽻都司轄𤓰州營駐防緑旗馬步兵九十六名原額兵六百名乾隆二十六年裁五百名二十八年裁四名如今額𨽻千總轄雙塔堡營駐防緑旗馬步兵九十九名原額兵一百名乾隆二十八年裁一名如今額𨽻千總轄恵回堡營駐防緑旗馬步兵一百名𨽻千總轄黄墩堡營駐防緑旗馬步兵九十七名原額兵三百名乾隆二十六年裁二百名二十八年裁三名如今額𨽻千總轄按塔爾灣舊設駐防緑旗馬步兵二百名乾隆三十一年裁百齊堡舊設駐防緑旗馬步兵一百名二十八年裁哈密駐防緑旗兵八百名原額兵二千名乾隆二十六年裁移𤓰州營兵三百名布隆吉爾營兵二百名黄墩營兵二百名二十七年添移安西提標營兵一百名来駐如今額𨽻副將轄聴差兵一百名於沙州營𣲖撥塔爾納沁屯田兵一百七十名蔡巴什湖屯田兵一百名牛毛湖屯田兵十名即於駐防額内分駐見屯政門鎮西府即巴爾庫勒駐防滿洲䝉古兵二千名乾隆三十八年設於西安寧夏駐防兵内移駐鎮標三營駐防緑旗馬步兵一千九百四十一名舊駐安西提標五營額設馬步兵三千五百名二十七年裁存一千七百四十一名改立三營三十年増二百名如今額𨽻總兵轄古城營駐防緑旗馬步兵二百名乾隆三十六年設𨽻遊擊轄木壘營駐防緑旗馬步兵三百一名乾隆三十一年設一百二十一名三十六年増一百八十名如今額𨽻守備轄臺差兵即於鎮標三營内派撥屯田兵五百名舊設一千名乾隆二十七年裁六百名三十一年増一百名如今額又古城屯兵五百五十名吉布庫屯兵一百五十名俱見屯政門按嘉峪闗外安西諸衞舊因外控準夷為涼肅門户設立提標統率五營弁兵駐防彈壓所以慎邊圉也西域蕩平後天山南北諸部悉𨽻版圖則安西哈宻已屬内地而巴爾庫勒實為新疆屯防首尾相應之總滙乾隆二十四年以安西提督駐巴爾庫勒其本標五營馬步兵悉行移駐並令攜家遷往有戍守之利無更畨之擾至安西哈宻防兵則以次遞減盖以巴爾庫勒為内外扼要之區而哈密以東無待多兵駐守也二十七年復移巴爾庫勒防兵一千四百九十二名駐烏魯木齊為協標二十八年改協設鎮二十九年改鎮設提遞増兵至四千由是屯墾日恢邊儲倍牣烏魯木齊又為新疆屯防首尾相應之總滙而巴爾庫勒以東尤居腹地固圉繕邊之良策稱大備矣迪化州即烏魯木齊駐防滿洲䝉古馬步兵三千三百七十六名乾隆二十六年駐滿洲兵二百名二十七年増察哈爾兵二百名索倫兵一百名三十七年改駐三千三百四十四名三十八年増三十二名如今額𨽻副都統轄駐防緑旗馬步兵四千名初于内地及軍營派撥無常額乾隆二十七年以安西提標前後二營移駐共一千四百九十二名𨽻副將轄二十八年改協設鎮二十九年改鎮設提遞増兵如今額屬提標中左右三營轄屯田臺差兵於陜西甘肅省除派按年輪替見屯政門伊犂駐防惠逺城滿洲䝉古兵四千二百四十名乾隆二十九年三十年三十一年陸續移駐分八旗每旗五佐領每佐領下馬步兵一百六名𨽻領隊大臣轄駐防恵寧城滿洲䝉古兵二千一百四十四名乾隆三十五年初駐二千八十八名嗣陸續裁増如今額分八旗毎旗二佐領毎佐領下一百三十四名𨽻領隊大臣轄駐防錫伯兵一千名乾隆三十年移駐初編一昻吉三十二年分八旗每旗一佐領毎佐領下一百二十五名𨽻領隊大臣轄駐防索倫達呼爾兵一千名乾隆二十九年移駐初編一昻吉三十二年分八旗毎旗一佐領毎佐領下一百二十五名𨽻領隊大臣轄駐防察哈爾兵一千八百名乾隆二十八年二十九年移駐初編一昻吉分左右翼各以六佐領分管三十二年分八旗毎旗二佐領一佐領下一百十二名一佐領下一百十三名𨽻領隊大臣轄按乾隆二十五年後伊犂駐有額魯特兵九百二十名分左右翼三十二年改設八旗三十七年續駐土爾扈特兵共九百七十六名内派往塔爾巴噶台三百五十名按年輪替分二十佐領管理四十二年全行移駐塔爾巴噶台屯田緑旗兵三千名於新疆駐防及陜西甘肅省内派撥見屯政門庫爾哈喇烏蘇駐防緑旗兵三百五十名乾隆二十七年初設差兵三十名臺兵七十五名二十九年増差兵二十名三十二年増臺兵四十五名三十六年増防守兵二百名共如今額由陜西甘肅省調派屯田兵一百十八名初設三百名後裁存如今額見屯政門塔爾巴噶台駐防滿洲䝉古錫伯索倫達呼爾察哈爾額魯特兵二千一百二十六名乾隆三十年於雅爾駐防京營滿洲黒龍江索倫兵九百名三十一年裁改駐滿洲䝉古錫伯索倫達呼爾察哈爾兵一千一百五十名額魯特兵三百五十名由伊犁調撥四十二年以原駐伊犂額魯特兵九百七十六名全行移駐駐防緑旗兵六十名乾隆三十年駐雅爾三十二年移駐塔爾巴噶台三十四年増四十名三十六年仍裁三十八年増二十四名三十九年仍裁如今額屯田兵五百四十名初設五百四十名三十四年増三百六十名三十六年仍裁三十八年増二百七十六名三十九年仍裁如今額見屯政門按準噶爾壤内接巴爾庫勒外界俄羅斯哈薩克布魯特諸畨疆域遼逺袤延數千里設立臺站卡倫頓兵防守自烏魯木齊改鎮設提後欎為重地由自西迄伊犂其駐防滿洲䝉古諸部兵數自一二千至三四千不等聲勢尤壮其間任使令供建築勤屯種則緑營兼資因地制宜咸有定額滿洲䝉古諸部𨽻以領隊大臣佐領協領諸員緑旗則𨽻營員而一惟將軍及辦事大臣統轄其制更畨輪換而烏魯木齊之緑營兵則令攜眷移駐並以察哈爾八旗中單寒人等及新舊額魯特亦令分往烏魯木齊伊犂資以田産牲畜永駐防守至塔爾巴噶台地居北境邊防較重亦分駐滿營諸部兵以壮牧圉而嚴征繕控扼形勢之道備焉盖準部兵防之大畧如此闢展駐防緑旗馬步兵三百三十名乾隆二十五年駐差兵四百四名臺兵二百九十四名二十七年裁存三百名二十八年増三十名如今額由陜西甘肅省除派𨽻都司轄按闢展舊設屯田兵一千八百九十名二十六年裁存六百名二十七年全裁見屯政門哈喇沙爾駐防緑旗馬步兵七百四十五名乾隆二十四年初駐八百十七名三十年裁一百名三十二年裁十二名三十五年裁五十名三十八年増一百名三十九年裁十名如今額由陜西甘肅省除派𨽻叅將轄按屯田兵即於駐防兵内派撥遞年増減三四百名不等見屯政門庫車駐防緑旗馬步兵二百二名乾隆二十四年初駐兵三百名二十五年後増裁不一至三十八年裁存如今額由陜西甘肅省除派𨽻都司轄按屯田兵即於駐防兵内派撥増減無常額見屯政門烏什駐防滿營馬步兵二百名乾隆三十一年設初自阿克蘇移駐三十四年後由伊犂調撥三十九年後由烏魯木齊巴爾庫勒調撥𨽻領隊大臣轄駐防緑旗馬步兵七百五十名乾隆三十一年自阿克蘇移駐六百五十名三十二年増五十名三十三年増一百五十名三十五年裁一百名如今額由陜西甘肅省派撥𨽻守備轄採銅兵二百五十名乾隆三十一年設五十名三十二年増一百名三十五年増一百名如今額屯田兵四百名乾隆三十一年原設一千名嗣裁五十名三十二年裁二百名三十三年裁一百五十名三十四年裁一百名三十五年裁一百名如今額由陜西甘肅省派調見屯政門阿克蘇駐防緑旗兵一百名乾隆二十五年原駐兵一千名二十七年裁三百名三十一年裁六百五十名三十二年増五十名如今額由陜西甘肅省調𣲖𨽻逰擊轄按乾隆二十五年原駐滿洲索倫兵二百名三十年裁賽喇木駐防緑旗兵四十名乾隆二十五年原駐兵一百二名二十七年裁六十二名如今額由陜西甘肅省派調𨽻遊擊轄分駐拜城緑旗兵十名乾隆二十五年原駐兵四十名二十七年裁三十名如今額喀什噶爾駐防滿營馬步兵三百三十四名乾隆二十四年原駐兵五百四十九名二十六年裁二百四十九名二十七年増一百十六名三十六年裁八十名三十七年裁二名如今額𨽻叅領轄駐防緑旗馬步兵六百二十五名乾隆二十四年原駐兵九百十名二十六年裁二百八十五名如今額𨽻叅将轄分駐英噶薩爾滿營馬步兵八十名乾隆二十四年原駐兵一百六十二名二十六年増三十八名二十七年裁一百名三十六年裁二十名如今額𨽻叅領轄分駐英噶薩爾緑旗馬步兵二百名乾隆二十四年原駐兵三百九十二名二十六年裁一百九十二名𨽻遊擊轄葉爾羌駐防滿營馬步兵二百十一名原於軍營内撥駐無定額乾隆二十六年駐兵三百名續裁一百名二十七年増二十二名三十七年裁十一名由伊犂派撥𨽻佐領轄駐防緑旗馬步兵六百八十名原於軍營内撥駐無定額乾隆二十七年設防兵六百名臺兵八十名由陜西甘肅省派調𨽻副將轄和闐駐防緑旗馬步兵二百三十二名原於軍營内派駐無定額乾隆二十七年設防兵二百名臺兵三十二名由陜西甘肅省派調𨽻都司轄按回部素習農功城邨絡繹視準疆數千里土曠人稀形勢迥别自全部輸誠内屬設立驛站卡倫之外其各城所在固無事多兵駐守矣初以阿克蘇為回部適中之地喀什噶爾葉爾羌為回部諸城之冠英噶薩爾則又境屬邊圉外藩鄰接皆兼設滿營緑營分兵防守他如哈喇沙爾庫車賽喇木烏什和闐則但酌留緑營以資捍衞乾隆三十一年以阿克蘇滿營防兵移駐烏什則烏什又為山南重鎮而阿克蘇祇駐緑營因時立制之要莫善於此其兵額増減令將軍大臣等隨時較量情形酌加變通計圖乆逺駐防滿營統以佐領緑旗統以營貟其回兵則令各城伯克經理而總以將軍大臣兼轄守兵中非攜眷永駐者分年以代俾得更番休息畧如山北諸路盖回部兵防之大畧如此漢書西域傳鄯善國勝兵二千九百十二人且末國勝兵三百二十人小宛國勝兵二百人精絶國勝兵五百人扞彌國勝兵三千五百四十人渠勒國勝兵三百人于闐國勝兵二千四百人皮山國勝兵五百人西夜國勝兵千人蒲犂國勝兵二千人依耐國勝兵三百五十人無雷國勝兵三千人難兠國勝兵八千人莎車國勝兵三千四十九人疏勒國勝兵二千人尉頭國勝兵八百人烏孫國勝兵十八萬八千八百人姑墨國勝兵四千五百人温宿國勝兵千五百人龜兹國勝兵二萬一千七十六人烏壘勝兵三百人渠犂城勝兵一百五十人尉犂國勝兵二千人危須國勝兵二千人焉耆國勝兵六千人烏貪訾離國勝兵五十七人卑陸國勝兵四百