body:
  text: 疆域一安西南路嘉峪關嘉峪關為西域東陲在肅州西七十里嘉峪山西麓西距玉門縣一百八十里距安西州六百五里其地屬漢酒泉郡之祿福縣後漢改福祿縣晉魏周因之隋大業初改屬張掖郡義寧初改酒泉縣唐武德二年屬肅州大歷初陷吐蕃宋入西夏元屬肅州路明屬肅州衛洪武五年馮勝下河西置嘉峪關以限中外為西域貢道所從入嘉靖二年閉關自守本朝初屬肅州衛雍正二年裁衛屬甘州府七年改屬肅州關城周二百二十二丈西四十里曰雙井又西接安西州玊門縣界明史地理志肅州衛西有嘉峪山其西麓即嘉峪關也宏治七年扁關曰鎮西西域傳太宗置哈密沙州赤斤罕東四衛於嘉峪關外以屏蔽西陲按漢列四郡唐據瓜沙古稱西域門戶以玉門陽關為扼要明初嘉峪關之設是曰重門季世因循諸番內徙但以嘉峪為中外巨防聲教所及不踰閨闥我朝初五衛之立聲援聯絡長䇿逺馭西屆流沙皇上德威遐暢底定西陲蔥嶺以西儼同內地惟是列聖經營之區撫綏駕御升廳衛為州縣適當大武告成之後未可以略而弗書爰追舊邊之屏翰拓全盛之山川仍以嘉峪關為首安西州屬舊為靖逆赤金柳溝安西沙州五衛地設安西鎮乾隆二十四年西域平以其地置安西府統縣三淵泉墩煌玊門三十八年裁府以淵泉縣地改安西州統縣二敦煌玊門州境東接肅州界北接哈密界西至流沙南至南山漢書地理志酒泉郡武帝太初元年開縣九祿福表是樂涫天䧇玉門會水池頭綏彌乾齊敦煌郡武帝後元年分酒泉置縣六敦煌冥安效穀淵泉廣至龍勒後漢書郡國志酒泉郡武帝置雒陽西四千七百里九城福祿表氏樂涫玉門會水沙頭安彌乾齊延夀敦煌郡武帝置雒陽西五千里六城敦煌冥安效穀拼泉廣至龍勒晉書地理志元康五年惠帝分敦煌郡之宜禾伊吾冥安深泉廣至等五縣分酒泉郡之沙頭縣又别立會稽新鄉凡八縣為晉昌郡張駿分酒泉為涼州敦煌晉昌為沙州張祚又以敦煌郡為商州隋書地理志敦煌郡舊置瓜州統縣三敦煌常樂玊門唐書地理志沙州敦煌郡下都督府本瓜州武德五年曰西沙州貞觀七年曰沙州縣二敦煌夀昌瓜州晉昌郡下都督府武德五年析沙州之常樂置縣二晉昌常樂肅州酒泉郡下武德二年析甘州之福祿瓜州之玊門置縣三酒泉福祿玉門五代史四裔附録唐文宗時嘗遣使者至西域見甘涼瓜沙等州城邑如故而陷虜之人語言稍變衣服猶不改至五代時吐蕃已微弱回鶻黨項分侵其地惟甘涼瓜沙四州常自通中國涼瓜沙三州將吏猶稱唐官數來請命周世宗時涼州遂絶於中國獨瓜沙二州終五代常來元史地理志宋景祐初西夏陷瓜沙肅三州盡得河西故地金因之元太祖二十二年破其城以𨽻八都大王至元十四年復立州十七年升為沙州路總管府瓜州𨽻焉按漢晉酒泉郡所屬之福祿表是樂涫三縣唐肅州酒泉郡所屬之福祿舊地在今俱屬肅州是今安西州本境及所屬敦煌玉門二縣境以漢晉敦煌一郡之全而兼酒泉郡之半以唐沙瓜兩州之全而兼肅州之半北魏分置會稽玊門常樂三郡隋并為敦煌一郡實與今之州屬全境相凖也唐至德後陷吐蕃大中五年沙州刺史張義潮以其地來歸唐末復陷五代因之宋入西夏元屬肅州沙州路明為赤斤蒙古沙州二衛地我朝初屬邊外雍正三年始設安西鎮領靖逆赤金柳溝安西沙州五衛近以武功耆定詔升府縣嗣因移設鎮西府于巴爾庫勒安西復改府為州關外雄封兹其首著矣安西州治安西州治在嘉峪關西六百五里玊門縣治西四百二十五里敦煌縣治東二百七十里乾隆二十四年以安西柳溝二衛地改置淵泉縣與安西府同城二十七年移安西府於敦煌縣遂為淵泉縣治三十七年復移安西府來治三十八年改府為直𨽻安西州淵泉縣裁以縣境為州境東至三道溝七十里西至蘆草溝九十里南至南山三百里北至半池泉八十里距京師六千三百十里城周四里二分東西南北凡四門城內有萬夀宫關帝廟城隍廟城外有風雲雷雨壇社稷壇先農壇乾隆三十三年移建新城於舊治南二里城周三里三分東南北三門全境所轄為漢冥安淵泉廣至三縣地漢書地理志敦煌郡淵泉縣師古曰闞駰云地多泉水故以為名隋書地理志敦煌郡統縣常樂後魏置常樂郡後周併涼興大至冥安閏泉合為涼興縣開皇初郡廢縣改為常樂唐書地理志瓜州晉昌郡縣二晉昌武德四年更名常樂武德五年别置按淵泉縣漢時舊名後漢改拼泉晉曰深泉並屬敦煌郡苐考漢書敦煌郡在酒泉郡西所領六縣淵泉最東西曰冥安又西北曰廣至又西曰敦煌又西南曰效穀又西曰龍勒今安西州屬之柳溝衛城左右為十道溝水西南有黑水橋亂泉子等處當為漢淵泉縣地又今安西州城北有蘇賴昌馬兩河合流西注為南籍端水又西入於哈喇淖爾南籍端水即冥水當為漢冥安縣地漢廣至縣為唐常樂縣東至瓜州一百五十里今安西州治西北一百五十里為百齊堡當為漢廣至縣地是今安西州本境兼有漢時冥安淵泉廣至三縣地也晉之宜禾新鄉伊吾為廣至分邑境地毗連是又兼有晉時廣至宜禾冥安深泉伊吾新鄉六縣地而隋之常樂縣唐之常樂晉昌二縣皆與今安西州本境疆域相凖也至於漢敦煌效穀龍勒乃今之敦煌縣境説見後得勝墩得勝墩在州治北五里舊無水泉乾隆二十二年大兵討凖噶爾師出其地湧甘泉數十處士馬得濟敕建龍神廟於此封助順昭靈龍神遣官告祭每歲春秋致祀敕建助順昭靈龍神廟碑文國家德被遐方威宣絶漠不惟師武臣力亦實有神靈之助用能厚集士衆克成大勛惟嘉峪關本酒泉故郡素稱天險關門外為戈壁地沙磧彌望澶漫逶迤向因艱於水泉行旅重困朕蕩平西域誅其一二苞蘖之不順命者爰整六師冞入其阻初慮士馬萬衆綆汲或缺於供及行其地而甘泉隨地湧出滃滃然汩汩然渟泓滲漉不特荷殳之士潄濯清流而馬駝絡繹赴飲不匱按酒泉城下舊有金泉泉味如酒漢氏遂以名郡兹泉出自沙漢瑞應尤異守土之吏以告朕惟祭法德施於民則祀之當疆事方殷而泉流肆溢天人協應靈貺聿臻其事非偶爰封神為助順昭靈龍神命守臣經營髙敞建立神廟春秋祀事惟謹繡棟雲楣崇巖巨鎮屹峙關外廟既成當建碑紀述神之功烈守臣鍥石以請稽諸古人君為政太平則醴泉湧朕嗣守鴻業圖大思艱命將出師龔行天討掃百年逋誅之冦用以纘承先緒式廓丕基計自今邊圉靜謐屯牧安恬其所以荷天庥而迓神祐者萬萬祀靡有紀極爰系以銘銘曰嘉峪之山巖關峩峩六師于征後舞前歌宛宛流沙迢迢逺道天戈所臨地不愛寶連巖滋液並醴疏甘光澄氷鏡潔比秋潭汲之日新挹之無竭士飽馬騰霜清月徹乃營髙敞乃建甍標春秋載薦丹荔黃蕉斟酌靈泉惟神之庇洗兵萬載錫我繁祉敕建助順昭靈龍神廟歲祭文惟神德漙澤民恩施育物拱巖關而作鎮氣感風雲臨瀚海以垂波功先潤澤惟酒泉之故地實戈壁之荒陲沙礫彌途向乏靈源之涌輪蹄遄邁載深渴飲之思朕命將于征指平沙而迅發全師所過恰膏液之滂滋萬馬騰驤快適奔泉之性千軍挹注咸歌泂酌之甘儼賚賜之壺漿飲和食德等驅馳於袵席養欲給求凡兹行李之往來普頌淵澄之功烈仰承天佑敬迓神庥申命守臣經營敞地閟宫大啓雕几恪陳繡栱嵳峩薈蔚川原之氣采椽嵽嵲繽紛藻荇之華爰於靈廟之落成更遣專官而將事雲旓羽罕覘祕殿之森㽔桂酒椒漿共明流而瀲灧嗣此涵濡庶彚覩清泚之常流衍護深源永濬發而不竭尚祈昭格鑒此精禋小灣堡小灣堡在得勝墩東南七十五里踰河而至西距州治七十里雙塔堡雙塔堡在小灣堡東五十里西距州治一百三十里有城周一里有竒雍正六年築西南境有雙塔西三十里地名渠口布朗吉布朗吉在雙塔堡東四十里西距安西州治一百六十里地多柳柳有泉水東為十道溝西為布朗吉河一名窟窿河舊有安西鎮城後改柳溝衛治今廢按漢淵泉縣東與酒泉郡之池頭會水相接地皆以水得名今布朗吉城東有十道溝水與闞駰所云地多泉水之説合又考唐書地理志晉昌縣東此有合河鎮今蘇賴昌馬兩河合流由靖逆衛北折而西會十道溝水西流經此則所謂合河鎮者當與今布朗吉之柳構故城相近也柳溝堡柳溝堡在布朗吉東七十里西距州治二百三十里十道溝水經流左右本朝康熙五十七年初建柳溝所築堡於此雍正五年升衛移治布朗吉改舊所為柳溝堡是為安西州東界馬蓮井馬蓮井在州治西北三百二十里自州治北行七十里為白墩又八十里為紅柳園又八十里為大泉又西北九十里至此為安西州最北境接哈密界橋灣堡橋灣堡在柳溝堡北四十里西距州治二百七十里有城雍正十年築南北二門自堡西北行九十里為東黃蘆岡又九十里為尖山子又九十里為茨窩泉又九十里為東長流水又一百里為白芨芨灘又一百里至馬蓮井别自東長流水西北行五十里為青山子又七十里為烏拉大泉又北七十里為蘆岡泉為安西州東北境接哈密界按漢時廣至一縣晉分四縣曰廣至曰宜禾曰新鄉曰伊吾今百齊堡即廣至縣地説見後東接沙頭西界敦煌由是而南為新鄉即今踏實堡説見後北為宜禾為伊吾伊吾縣以伊吾盧故地得名附近敦煌北境則宜禾一縣當在今安西州北境自得勝墩橋灣堡迤北一帶無疑特其故城基址不可考耳一統志載宜禾故城在晉昌郡北界方位亦合新瓜州新瓜州在安西州西南三十里舊為安西衛治地雍正十三年土爾番為凖噶爾所擾其酋額敏和卓率所部回民內附於安西鎮西築五堡居之頭堡在鎮西南二十五里二堡在頭堡西南十里三堡在二堡西北十里四堡在三堡西北四里五堡在四堡東北十里别於頭堡數里之內築新瓜州城古瓜州古瓜州在新瓜州西十五里東距安西州治四十五里有土城唐書吐蕃傳悉諾邏恭祿燭龍莽布支入陷瓜州毁其城明史西域傳自赤斤蒙古西行二百里曰苦峪自苦峪南折而西百九十里曰瓜州按左傳襄公十四年范宣子將執戎子駒支親數諸朝曰昔秦人迫逐乃祖吾離於瓜州昭公九年詹桓伯曰允姓之姦居於瓜州漢書地理志敦煌郡敦煌縣廣步侯官以為古瓜州地生美瓜是春秋時之瓜州為漢敦煌縣地與淵泉冥安廣至之地無涉元和志沙州漢敦煌郡前涼張駿於此置沙州後魏太武於郡置敦煌鎮明帝廢鎮立瓜州則已併漢淵泉冥安廣至縣統名瓜州矣明帝尋改義州莊帝又改瓜州大業三年罷州為敦煌郡武德二年復置瓜州五年改為沙州而析沙州之常樂置晉昌常樂二縣為瓜州晉昌郡於是瓜州之名又專屬漢時冥安淵泉廣至三縣之地而敦煌縣以西反不及焉今之新舊瓜州在漢為冥安縣境後魏初唐稱名可考第按諸春秋時之瓜州已非其舊即視武德析置之始亦偏而不全沿革所係遺迹粗存新舊之名存而不論可也百齊堡百齊堡在新瓜州西北六十里東距州治九十里城周一里五分雍正十二年築為漢廣至縣地西有舊百齊堡漢書地理志廣至縣宜禾都尉治昆侖障莽曰廣桓後漢書西域傳延光二年敦煌太守張璫上書以酒泉屬國吏士二千餘人集昆侖塞擊呼衍王唐章懷太子賢注云廣至故城在今瓜州常樂縣東元和志常樂縣東至州一百十五里本漢廣至縣地寰宇記廣至故城在常樂縣西北恆以大石棧之稍開即有風暴至傷人按漢之廣至縣在唐為常樂據後漢書注廣至故城在常樂東境今百齊堡東至安西州治一百五十里州治為唐瓜州