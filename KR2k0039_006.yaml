明史西域傳自出嘉峪關西行至黑山兒又七十里曰回回墓按今惠回堡即回回墓故地而墓不可考矣又今靖逆城南亦有回回墓靖逆城靖逆城東南距玉門縣治一百二十里城周二里南北四門本朝康熙五十七年置靖逆衛治於此乾隆二十四年裁衛改屬玉門縣城南有仙姑廟觀音寺城北有牛王廟又北有沙岡西有紅廟又西至三道溝接安西州本境西南三十里有龍王廟為蘇賴昌馬兩河合流處三國志魏初河右擾亂敦煌功曹張恭遣從弟華攻沙頭縣十六國春秋段業天璽二年酒泉太守王德叛敗奔晉昌沮渠蒙遜逐至沙頭破之按靖逆城當屬漢沙頭縣地肅州新志云在漢為冥安縣屬敦煌郡又引漢書地理志冥安縣有南籍端水謂今之蘇賴河介於柳溝靖逆之間據此斷為冥安縣地不知漢之置郡東為酒泉西為敦煌今安西州本境之安西故衛乃漢之冥安縣三國晉魏其名不易至靖逆衛地尚在其東實漢池頭乾齊會水三縣地而衛城所建當在池頭所屬之郡為酒泉而非敦煌至隋始屬敦煌而縣名玉門亦與冥安無涉至漢志所云南籍端水固即今昌馬蘇賴合流西注之河然考其源出今玉門縣南之南山經流五衛故地會十道溝黨河諸水逺輸哈喇淖爾三百餘里漢志謂出南羌中西北入其澤者乃舉其全體而言不得但云介於柳溝靖逆之間而以此證靖逆之為冥安也塔兒灣堡塔兒灣堡在靖逆城東北二十里東南距玊門縣治一百四十里以上屬玊門縣敦煌縣治敦煌縣治舊為沙州衛治乾隆二十四年西域平以其地置敦煌縣二十七年移安西府來治三十七年復移府治於淵泉三十八年改府為直𨽻州敦煌屬焉治在嘉峪關西八百七十里東至甜水井一百四十五里西至古營盤二百九十五里南至南山一百里北至青墩峽一百九十里西北至哈喇淖爾二百八十里縣治東距安西州治二百七十里距京師六千五百八十里城周三里三分東西南三門濠深七尺雍正三年建九年於東南北三面加築外郭周五里七分東南北三面及西南面共四門城內有萬夀宫關帝廟城隍廟城外有風雲雷雨壇社稷壇東有先農壇西有龍王廟初府城西踰黨河有沙州故城以黨水北衝圮其東隅始移建沙州城於黨河之東今為敦煌縣治全境所轄為漢敦煌效穀龍勒三縣地漢書地理志敦煌郡敦煌中部都尉治效穀師古曰本漁澤障也隋書地理志敦煌郡統縣敦煌舊置敦煌郡後周併效穀夀昌二郡入焉又併敦煌鳴沙平康效穀東鄉龍勒六縣為鳴沙縣開皇初郡廢大業置敦煌郡改鳴沙為敦煌唐書地理志沙州敦煌郡有府三曰龍勒效穀懸泉有豆盧軍神龍元年置縣二敦煌夀昌武德二年析敦煌置永徽元年省乾封二年復置開元二十六年又省後復置明史西域傳自瓜州而西四百四十里始達沙州永樂二年酋長坤濟勒曼集舊作買住今改正率衆來歸命置沙州衛其部下齊納舊作赤納今改正來附朝貢不絶宣德十年為哈密所侵走附塞下自是不復還沙州但遙領其衆而已正統十一年收其全部入塞居甘州沙州遂空為罕東酋巴特瑪戩舊作班麻思結今改正所有歷景泰天順朝朝貢不廢成化十五年於沙州故城置罕東左衛正德十一年土爾番復據哈密左衛不能自立徙肅州塞內其部下仍居沙州服屬土爾番嘉靖七年率屬來歸沙州遂為土爾番所有沙州衛罕東左衛傳合纂按敦煌為漢時舊名漢敦煌郡所領六縣東則淵泉冥安廣至為今安西州地西則效穀西南則龍勒皆與敦煌同郡而分縣後漢因之今縣西境之黨河有農田水利之益當為效穀故縣而龍勒故城以古營盤一帶廢城基址審之亦約略可考是今之敦煌兼有漢時敦煌效榖龍勒三縣地矣晉隆安中分置陽關昌蒲二縣後魏分效穀縣置效穀郡分龍勒縣置夀昌縣至後周改縣曰鳴沙而敦煌郡名則古今不易隋大業初復縣名曰敦煌兼效穀龍勒二縣地自唐武德以漢龍勒故地析置夀昌於是敦煌僅兼效穀之地是今敦煌縣境實與隋之敦煌縣疆域相凖而於唐則兼有夀昌也建中二年陷吐蕃大中五年沙州首領張義潮以州來歸建歸德軍五代時號歸義軍宋入西夏元為沙州路明置沙州衛改置罕東左衛後廢入本朝為沙州衛今改縣此其沿革大略之可見者又明時安定衛阿端衛曲先衛皆在今敦煌縣西南境外甜水井甜水井在敦煌縣治東一百四十五里自縣城東行四十里為新店又三十里為圪塔井又東北四十里為空心墩又東北三十五里至此為敦煌縣東境與安西州本境西之蘆草溝接界黃墩堡黃墩堡在敦煌縣治西北四十里有土城周四里有竒雍正五年築自堡西北行三十里踰河又十餘里至庫克砂石隋書地理志後周併涼興大至冥安淵泉為涼興縣按肅州舊志涼興城在廢瓜州西一百七十里今黃墩堡東南距安西州之古瓜州一百七十里與肅州舊志所載涼興城距廢瓜州里數相合則涼興故城當在於是青墩峽互見山青墩峽地以峽名在黃墩堡西北一百五十里西北山中為敦煌縣北境入峽口西北行經博羅特口大泉酤水紅柳峽哈什布拉克柳樹泉五百三十五里至哈密沙棗墩沙棗墩在敦煌縣治東北三十里黨城黨城在敦煌縣治南一百六十里黨河口建置不知所始城基尚存又西十里有古城又西一百二十五里有古營盤亦稱古城居髙原之上南臨髙山西有古邊墻又南踰山嶺有三舊城基亦稱古營盤按漢書地理志載敦煌郡效穀縣本漁澤障孝武元封六年濟南崔不意為漁澤尉教民力田以勤效得穀因以為縣名是效穀故縣當與黨河相近者又稱龍勒縣為都尉治至唐為夀昌縣元和志稱夀昌縣東至州一百十里本漢龍勒縣是也一統志稱效穀龍勒故縣俱在沙州衛西與漢唐諸史所載相合今自敦煌縣西踰黨河舊城基址不一而足則效穀龍勒城郭遺址疑於是乎在也其謂為古營盤者明初設安定阿端曲先罕東赤斤沙州諸衛皆以番族受邊臣羈絡北拒蒙古南捍諸番後乃轉相侵掠甚者邀劫朝使屢勤征討厥後土爾番據哈密蒙古入青海南北受制沙州衛最西則最先廢諸部亦次第殘毀而沙州遂為土爾番所有肅州兵事日亟想見當時都督李文西征巡撫許進會罕東兵促哈密或即舊城基址所在以為行師頓旅之處覽其遺墟可以見前代興衰之迹矣呼羅蘇台呼羅蘇台地有呼羅河故名東南距敦煌縣治一百里地濵哈喇淖爾通志呼魯蘇台其地濵哈喇池蘇賴河所滙也按蘇賴河會流哈喇淖爾黨河南來入之兩水殊源而合流西注通志舊稱葫蘆斯太即呼魯蘇台字音之訛為蘇賴河所滙知在黨河下流滙入蘇賴河處也又云濵臨哈喇池者此指呼魯蘇台之地而言若呼魯河固入於哈喇淖爾者豈止濵之而已古玊門關古玊門關在呼羅蘇台西南黨河之西東距敦煌縣治一百五十里漢武帝時置關外有五峰為赴車師前庭及疏勒之道所謂北道也關今無存漢書西域傳東則接漢厄以玉門陽關地理志龍勒縣有玊門關元和志玊門故關在龍勒縣西北一百十八里唐書地理志夀昌西北有玊門關按漢龍勒縣有玉門關氐置水氐置水即今黨河則黨河之在龍勒縣地玉門關之近黨河可知也肅州新志玉門關外有三斷山石極大世謂之三隴山今黨河西有三斷山應即三隴山則黨河西之為玊門關外又可知也又漢班超疏言不敢望到酒泉郡但願生入玊門關酒泉郡即今玊門縣地在黨河東七百六十里超當時自疏勒東歸先由玊門而後至酒泉語意亦合五代髙居誨使於闐記肅州渡金河西百里出天門關又西百里出玉門關是即玉門縣西關距酒泉郡僅二百餘里又土爾番有玉門口或謂即古玉門關舊輿圖謂玉門關近伊犂兩説逺近大殊皆與古傳志方隅形勢不合未足為據也古陽關古陽關在玉門關南紅山口西東距敦煌縣治一百三十里漢武帝時置為赴鄯善莎車之道所謂南道也後魏於此置陽關縣周廢漢書地理志龍勒縣有陽關晉書地理志敦煌郡統陽關縣元和志陽關在夀昌縣西六里晉髙居誨使於闐記西渡都鄉河至陽關御製陽關考陽關之名自漢唐以來咸所稱引而遺蹤湮廢道里莫徵比因西域並𨽻昄章爰有纂輯圖志之役猷詢所及或據肅州新志載烏魯木齊西境有地名陽巴爾噶遜以為陽關之舊者殊不知陽乃回語蓋謂新而巴爾噶遜則厄魯特語蓋謂城亦非為關也况烏魯木齊地在天山之北揆其方位懸隔奚啻謬以千里計耶按漢書地理志敦煌郡龍勒縣有陽關玉門關後晉髙居誨使于闐記西渡都鄉河至陽關考都鄉河即今黨河龍勒縣即沙州衛今為敦煌縣地黨河在縣西境而陽關玉門關均在黨河之西陽關西而偏南故以陽名詳核形勢正應在今黨河西南與紅山口相近又漢書西域傳西域三十六國東則接漢扼以玉門陽關考漢時三十六國即今回部回部東境直安西府敦煌縣亦與漢書三十六國東扼陽關之文吻合至王維詩西出陽關云云送元二使安西作也考唐之安西號安西大都護府初治西州在伊州之西即今闢展也再徙髙昌故地即今土魯番之交河也三徙龜兹即今庫車也前後三遷總在哈密之西是安西實在陽關以外而陽關之屬在敦煌縣境尤為昭晳無疑矣夫古今邊陲故迹其考信之艱非貫串諸書即源流未備然徒眩惑於志乘家之聚訟膠轕而不能確征之我疆我理如目營手畫者然又何以斥傳訛鑿空之誣而炳焉揭以正鵠哉書此宣付館臣俾綴於編且以示一隅之舉云按漢晉諸書陽關在今敦煌縣境而肅州新志謬引烏魯木齊西境之陽巴爾噶遜聞見淆訛末由審定伏讀御製援據史書印合今古疏通貫串曠若發矇由是陽關之名指歸不惑而玉門關之近在陽關迤北者亦從此可推不得以土爾番之玊門口當之益可見矣以上屬敦煌縣白龍堆白龍堆在敦煌縣西境玉門關之西沙形如卧龍髙者二三丈卑者丈餘綿延起伏西盡流沙之地漢書地理志敦煌郡正西關外有白龍堆沙西域傳樓蘭最近漢東垂當白龍堆乏水草魏略西戎傳從玉門關西出發都護井回三隴沙北頭經居盧倉從沙西井轉西北過龍堆按白龍堆為流沙之東境象形以名其沙者也今自敦煌縣西南境之巴顔布拉克以西流沙極目蜒蜿出沒之狀猶有存者龍堆之舊於此可見至魏略三隴沙應與今三隴山相近所云都護井居盧倉沙西井者今雖難以確指要在敦煌縣西境沙磧中槩可知也流沙流沙在白龍堆西沙多土少東西數百里渺無垠涘尚書禹貢導弱水至于三危餘波入于流沙山海經流沙出鐘山西行又南行至崑崙墟西南入海漢書顔師古注流沙在敦煌西八十里郭義恭廣志流沙在玉門關外南北二十里東西數百里周書西域傳善鄯西北有流沙數百里夏日有熱風為行旅之患風之欲至惟老駝知之即鳴而聚立埋其口鼻于沙中人每以為候即將氊擁鼻口其風迅駛斯須過盡按禹貢三危山即今敦煌縣南境之山迤西為鳴沙山又西為流沙所謂餘波入于流沙也山海經所謂崑崙山指在青海境內之庫勒坤山而言庫勒坤譯言崑崙在西寧邊外一千四百五十五里正當敦煌縣西南境也漢書鄯善國去陽關千六百里周書鄯善國即白龍堆路流沙在白龍堆西鄯善在白龍堆南則流沙宜在鄯善西北矣色爾騰海互見水色爾騰海在安西州西南境外四百里地有廣澤在古為鄯善國地漢書西域傳鄯善國本名樓蘭王治杅柅城去陽關千六百里西北去都護治所千七百八十五里西北至車師千八百九十里武帝通大宛諸國樓蘭當道苦之攻劫漢使王恢等以輕騎虜樓蘭王於是列亭障至玊門矣樓蘭最在漢東垂為丐奴反間數遮殺漢使元鳳四年平樂監傅介子刺其王縣首北闕下乃更立尉屠耆為王更名其國為鄯善有伊循城置都尉伊循官鄯善當漢道衝西通且末七百二十里後漢書西域傳建武中小宛精絶戎廬且末為鄯善所并元初六年行長史索班屯伊吾於是鄯善王來降數月北胸奴攻沒班等鄯善求救不許又自敦煌西出玉門關涉鄯善北通伊吾千餘里自鄯善踰蔥嶺出西諸國有兩道魏書西域傳世祖平涼州沮渠牧犍弟無諱謀渡流沙遣弟安周擊鄯善王比龍連戰不能剋比龍懼西奔且末其世子乃應安周詔散騎常侍成周公萬度歸討之度歸以輕騎五千渡流沙至其境其王真達面縛出降賦役其人比之郡縣周書異域傳鄯善古樓蘭也所治城方一里地多沙鹵少水草北即白龍堆西北有流沙數百里大統八年率衆內附隋書地理志鄯善郡大業五年平吐谷渾置在鄯善城即古樓蘭也有蒲昌海鄯善水統縣二顯武濟逺吐谷渾傳煬帝即位鐡勒犯塞令擊吐谷渾大敗之復令觀王雄出澆河許公宇文述出西平以掩之伏允吐谷渾王名懼南遁山谷間其故地皆空自西平臨羌城以西且末以東祁連以南雪山以北東西四千里南北二千里皆為隋有唐書地理志伊州伊吾郡納職縣貞觀四年以鄯善故城置開元六年省十五年復置自縣西經獨泉東華西華駝泉渡茨萁水過神泉三百九十里有羅護守捉又西南經達匪草堆百九十里至赤亭守捉與伊西路合别自羅護守捉西北上乏驢嶺百二十里至赤谷又出谷口經長泉龍泉百八十里有獨山守捉又經蒲類百六十里至北庭都護府西域傳故納縛波古樓蘭也按漢書西域傳既云樓蘭國最在漢東垂近漢當白龍堆又云鄯善國去陽關一千六百里夫果有一千六百里之隔安得謂之近接龍堆乎且車師為今闢展噶斯淖爾見下條處其西南史稱鄯善西北至車師其國必在車師東南而居噶斯淖爾之東矣隋書鄯善郡有蒲昌海者隋并吐谷渾地以置郡臨羌城以西且末以東皆為隋有是蒲昌當鄯善之西境實為且末國地而鄯善故國尚居其東也今合羣書所載證以王延德髙昌行紀歷納職縣望王門關甚近之文則今色爾騰海以東地接流沙當屬鄯善納職之故地延德由伊州而益都而納職則益都當在哈密之南納職當在沙州之西故望玉門關甚近也噶斯噶斯在安西州西境外色爾騰海西七百里地有廣澤名噶斯淖爾詳見水在古當為且末國地漢書西域傳且末國王治且末城西北至都護治所二千二百五十八里北接尉犂南至小宛可三日行西通精絶二千里後漢書西域傳光武以天下初定末遑外事小宛精絶戎廬且末為鄯善所并後其國並復立魏略南道西行且志國小宛國精絶國樓蘭國皆并屬鄯善也按且志國疑是且末之訛魏書西域傳且末國都且末城在鄯善西後役屬鄯善西北方流沙數百里唐書西域傳于闐東行入大流沙人行無迹故返輒迷聚遺骸以識道無水草多熱風觸人及六畜皆迷仆行四百里至故都邏又六百里至故折摩馱那古且末也按漢自敦煌郡出玉門關西行為鄯善又西為且末色爾騰海為鄯善境則噶斯淖爾為且末境矣又漢書且末北接尉犁又云尉犁東南與且末接又云焉耆南百里至尉犁焉耆為今之哈喇沙爾尉犁當在哈喇沙爾南境噶斯淖爾又在其東南則正所謂尉犁東南與且末接者也惟今自陽關西至噶斯淖爾僅行一千二百餘里以鄯善去陽關一千六百里西通且末七百里之文證之得二千一百七十里似不相合然漢書既云樓蘭近白龍堆即不應有一千六百里之隔且使且末西去陽關二千一百七十里其境當在焉耆尉犁西南又不應云尉犁東南與且末接也今以漢西域形勢考之出陽關西南為婼羌正西為鄯善婼羌之西為且末且末之南為小宛皆在烏壘城偏東南境故皆西北至都護治所也且末之西為精絶精絶之南為戎廬皆北與烏壘城相直故皆北至都護治所也精絶之西為扜彌扜彌之南為渠勒皆在烏壘城偏西南境故皆東北至都護治所也漢烏壘城在今天山南路之海都郭勒側則噶斯淖爾正其東南境其為且末之地無疑又西則為精絶當都護治所之正南西與于闐接壤矣以上屬敦煌縣西境外地欽定皇輿西域圖志卷八欽定四庫全書欽定皇輿西域圖志卷八
