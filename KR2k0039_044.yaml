front:
  text: 欽定四庫全書欽定皇輿西域圖志卷三十七
  hash: sha256:f33066845b0162b3b9ec055dc10d7c132648bcda61f12692144d9df5efaab3b5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0039_WYG_044-1a, image: WYG0500/WYG0500-0867a.png}
body:
  text: 封爵臣等謹按周禮職方氏辨九服九州之外謂之蕃國世一見蓋言蕃服肆覲非甸男采衛比是以寶貴為贄既不同於輯瑞而宫室車旗命卿立軍之制均未遑及則象寄狄鞮所司其不在五等之列明矣漢唐侈語鴻圖往往遣使册封類祗順其國人所推虛錫名號宋元明以來規模隘狹典制缺如析圭擔爵之榮難與同風域外我國家幅員廣逺恩澤普汜蒙古內扎薩克暨喀爾喀青海西藏諸部舊𨽻藩封自親王郡王以下貝勒貝子公遞為差次其賜留汗號者視王爵為倍優帶礪光榮久已量侔幬載矣仰惟聖天子德威遐播式廓西陲乾隆癸酉冬都爾伯特部伯克䇿凌䇿凌烏巴什䇿凌孟克等欵關內面為凖回諸部倡嗣是輝特和碩特鱗集麕至爰乘時會簡將帥以新附為前驅當王師入境伊始壺漿載道綽羅斯諸台吉以巨族率先迎附雨行風偃不動戈鋋衛拉全疆統歸涵宥逮乾隆辛卯土爾扈特部復自西北萬里外率屬偕來由是凖屬人民無一不霑醲化統觀慕義歸仁之全局大無外而應自然固已曠古罕倫我皇上天地為懷班爵錫封其於忠謹一節從征戮力者承襲恩榮世及弗替若回部舊爵之在哈密土爾畨者及新附之留依京邸者以前此五年式集兩勳山南城郭諸境胥𨽻版籍爰並為編載用著衣冠王會之盛句臚備列九賓無間於殊方逺徼猗歟盛哉志封爵第十四
  hash: sha256:a02f85b1777fe9a7d4b4bef60c9cd10abed11745e4e6e81c7746a23f8cc58a96
