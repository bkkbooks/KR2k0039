body:
  text: 官制一嘉峪闗巡檢一員遊擊一員千總二員把總二員以上康熙十三年設乾隆二十四年西域平後如舊制按嘉峪闗夲隸肅州因為西域新疆門户故首紀闗外駐員以著我國家控馭邊陲之義匪今伊昔云安西州知州一員乾隆二十四年西域平以靖逆安西栁溝三衛地置安西府統淵泉玉門敦煌三縣設知府一員三十八年改直隸州以淵泉縣為州境設知州統縣二玉門敦煌馬蓮井州判一員乾隆三十八年設學正一員乾隆二十四年設府教授一員三十八年改設吏目一員乾隆二十四年設府經歴一員三十八年改設按乾隆二十四年設有淵泉縣知縣一員縣丞一員訓𨗳一員典史一員乾隆三十八年改淵泉縣為州境舊設知縣縣丞訓𨗳典史俱裁安西營㕘将一員守備一員千總二員把總四員以上乾隆二十四年設二十八年添把總一員三十年仍裁布隆爾吉都司一員千總一員把總二員𤓰州千總一員以上乾隆二十四年設踏實堡都司一員把總一員橋灣堡都司一員把總一員雙塔堡千總一員以上俱原設乾隆二十四年後如舊制按百齊堡舊設把總一員乾隆二十八年裁玉門縣知縣一員乾隆二十四年以靖逆衛地置縣裁通判改設訓𨗳一員典史一員以上乾隆二十四年設靖逆營遊擊一員千總一員把總二員赤金堡都司一員把總一員惠回堡千總一員以上俱原設乾隆二十四年後如舊制按塔爾灣舊設守備一員把總一員乾隆三十一年裁敦煌縣知縣一員乾隆二十四年以沙州衛地置縣裁同知改設訓𨗳一員典史一員以上乾隆二十四年設沙州協副将一員左右營都司二員左右營千總四員左右營把總八員黄墩堡千總一員以上俱原設乾隆二十四年後如舊制哈宻辦事大臣二員統理諸務其聴差各員於駐防緑營員弁内隨時酌委無定額印房章京一員驍騎校一員筆帖式六員通判一員巡檢一員以上乾隆二十四年設酤水巡檢一員乾隆三十八年設哈宻協副将一員都司一員千總一員把總四員經制外委六員塔爾納沁都司一員把總一員經制外委一員以上乾隆二十四年設蔡巴什湖把總一員乾隆二十八年設總理回衆郡王一員管轄五堡回民承種地畆鎮西府知府一員乾隆二十四年以安西府同知駐巴爾庫勒三十八年置府改設知府統宜禾縣迪化州昌吉縣是年八月陞迪化為直隸州析昌吉為州屬今府統縣二宜禾竒臺教授一員經歴一員以上乾隆三十八年設按巴爾庫勒舊設巡檢一員乾隆三十八年裁宜禾縣知縣一員訓𨗳一員典史一員以上乾隆三十八年設竒臺縣知縣一員舊駐通判一員乾隆四十一年置縣改設訓𨗳一員典史一員分駐古城巡檢一員以上乾隆四十一年設按東濟爾瑪台舊駐巡檢一員今裁㕘贊大臣一員乾隆三十九年設滿營協領四員佐領十六員防禦十六員驍騎校十六員筆帖式二員以上乾隆三十九年設巴爾庫勒總兵一員乾隆二十四年設提督一員二十九年移駐烏魯木齊改設總兵中營遊擊一員乾隆二十四年設㕘將一員二十九年改設守備一員千總二員把總四員經制外委六員左營遊擊一員守備一員千總二員把總四員經制外委六員右營遊擊一員守備一員千總二員把總四員經制外委六員以上乾隆二十四年設按乾隆二十四年原設有前後二營遊擊各一員守備各一員千總各二員把總各四員乾隆二十七年裁古城遊擊一員千總一員把總一員以上乾隆三十六年設木壘守備一員乾隆三十一年設把總二員一乾隆三十一年設一乾隆三十六年設漢書匈奴傳置左右賢王左右谷蠡左右大将左右大都尉左右大當户左右骨都侯匈奴謂賢曰屠耆故常以太子為左屠耆王自左右賢王以下至當户大者萬餘騎小者數千凡二十四長立號曰萬騎其大臣皆世官北史蠕蠕傳心慕中國立官號僣擬王者遂有侍中黄門之屬按今哈宻鎮西府即巴爾庫勒在漢為匈奴右地右賢王将居之官制自左右賢王以下畧見漢書又稱左右賢王各置禆小王今鎮西府城西北有漢永和二年敦煌太守誅呼衍王碑所謂呼衍王疑即右賢王所屬當時分地居此也蠕蠕慕中國以名官而境弗内屬亦與實有其地而設官授職者異矣迪化州知州一員乾隆二十五年於烏魯木齊駐同知一員三十八年置州改設學正一員吏目一員乾隆二十五年設倉大使一員三十八年置州改設迪化州舊城巡檢一員乾隆四十一年設昌吉縣知縣一員乾隆二十五年於昌吉駐通判一員為寧邊㕔三十八年改駐州同尋置縣改設訓𨗳一員典史一員分駐景化城巡檢一員以上乾隆三十八年設綏來縣知縣一員舊以昌吉縣縣丞分駐縣屬之綏來堡乾隆四十四年置縣改設訓𨗳一員典史一員以上俱乾隆四十四年設阜康縣知縣一員乾隆二十五年於烏魯木齊屬之特納格爾駐縣丞一員三十八年改駐州判一員四十一年置縣改設分駐濟木薩縣丞一員乾隆四十一年設濟木薩㕘將一員守備一員千總一員把總三員以上乾隆三十六年設訓𨗳一員典史一員以上乾隆四十一年設分巡鎮迪屯田糧務兵備道一員乾隆二十四年設初駐哈宻為安西道三十八年改今名移駐鎮西府四十一年移駐迪化州統轄鎮西府安西州迪化州並哈宻闢展二㕔按烏魯木齊舊設管理糧務道差缺於陕甘兩省滿洲員内調派三年更換乾隆三十七年裁又按闢展㕔亦兵備道所屬因地屬山南回部官制見次卷管理烏魯木齊等䖏事務都統一員舊係㕘賛大臣乾隆三十八年改設總理滿洲緑營事務副都統一員按舊設領隊大臣二員乾隆四十二年裁協領六員佐領二十四員防禦二十四員驍騎校二十四員九品筆帖式二員安西提督一員乾隆二十七年設副将一員二十八年改設總兵一