渺流傳判異有難於牽合附麗者至於班史稱烏孫大吏等皆賜金紫印綬其時雖受漢官而仍為彼國之臣以用事今準夷全部滌瑕蕩穢建官分職與之更始至治維新我聖朝措置規為誠度越漢唐逺矣欽定皇輿西域圖志卷二十九欽定四庫全書欽定皇輿西域圖志卷二十九
